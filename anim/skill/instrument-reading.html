<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪器读数专题实验台</title>
<link rel="icon" href="data:,">
<style>
.param[hidden]{display:none!important}
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:12px;padding:12px;min-height:700px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}.panel{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:900;margin-bottom:7px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tabs button.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:3px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;gap:8px;color:#486581}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range],select{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.6;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:880px){.root{grid-template-columns:1fr}.tabs{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="930" height="620" aria-label="仪器读数专题实验台：游标卡尺、螺旋测微器、多用电表、量程、刻度、估读、零误差、多视角记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>切换仪器并拖动红色读数指针，看主尺、游标、旋钮和电表量程如何共同决定最终读数。</div>
    <div class="card">
      <div class="title">选择仪器</div>
      <div class="tabs"><button id="caliper" class="active">卡尺</button><button id="micrometer">测微器</button><button id="meter">线性电表</button><button id="ohmmeter">欧姆表</button></div>
      <label class="param"><span>被测量/指针位置 <b id="valueLabel">23.40</b></span><input id="value" type="range" min="0" max="100" step="0.1" value="46.8"></label>
      <label class="param"><span><span id="zeroName">零误差</span> <b id="zeroLabel">0 格</b></span><input id="zero" type="range" min="-5" max="5" step="1" value="0"></label>
      <label class="param" id="rangeRow" hidden><span><span id="rangeName">量程</span> <b id="rangeLabel">3 V</b></span><select id="range"><option value="0.6A">0.6 A</option><option value="3V" selected>3 V</option><option value="15V">15 V</option></select></label>
      <div class="buttons"><button id="play">播放</button><button id="record">记录读数</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">读数记录</div><table><thead><tr><th>仪器</th><th>原读数</th><th>修正后</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula">
      <div class="title">读数公式</div>
      <div>卡尺：L=主尺读数+游标格数×精度-零误差</div>
      <div>测微器：L=固定尺+可动刻度×0.01 mm-零误差</div>
      <div>电表：实际值=刻度读数×量程/满偏刻度</div>
      <div>欧姆表：先欧姆调零，再读非线性刻度并乘倍率</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const E={caliper:document.getElementById('caliper'),micrometer:document.getElementById('micrometer'),meter:document.getElementById('meter'),ohmmeter:document.getElementById('ohmmeter'),value:document.getElementById('value'),zero:document.getElementById('zero'),range:document.getElementById('range'),rangeRow:document.getElementById('rangeRow'),rangeName:document.getElementById('rangeName'),rangeLabel:document.getElementById('rangeLabel'),zeroName:document.getElementById('zeroName'),valueLabel:document.getElementById('valueLabel'),zeroLabel:document.getElementById('zeroLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7048e8'};
const S={mode:'caliper',run:false,t:0,drag:false,records:[]};
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
function text(s,x,y,c=C.ink,a='center',z=13,w='800'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function raw(){const v=+E.value.value,z=+E.zero.value;if(S.mode==='caliper'){const truth=v/2,zero=z*.02,indicated=truth+zero;return{raw:indicated,fix:indicated-zero,zero,unit:'mm',hint:'主尺+游标',precision:.02}}if(S.mode==='micrometer'){const truth=v/2.5,zero=z*.01,indicated=truth+zero;return{raw:indicated,fix:indicated-zero,zero,unit:'mm',hint:'固定尺+可动刻度',precision:.01}}if(S.mode==='ohmmeter'){const multiplier=+E.range.value,adjusted=Math.max(1,Math.min(100,v-z)),base=adjusted>=99.5?0:1000/adjusted-10,fix=Math.max(0,base*multiplier);return{raw:base,fix,zero:z,unit:'Ω',range:multiplier,hint:'非线性欧姆刻度×倍率',precision:null}}const spec=E.range.value,range=parseFloat(spec),unit=spec.endsWith('A')?'A':'V',scale=Math.max(0,Math.min(50,v/2+z)),corrected=Math.max(0,Math.min(50,scale-z));return{raw:scale,fix:corrected*range/50,zero:z,unit,range,hint:'刻度×量程/满偏',precision:range/50}}
function draw(){const r=raw();ctx.clearRect(0,0,930,620);box(34,30,862,548,'#fff');text('G-03 仪器读数：仪器、量程、分度和零误差分别处理',465,56,C.ink,'center',17,'900');if(S.mode==='caliper')drawCaliper(r);else if(S.mode==='micrometer')drawMicrometer(r);else if(S.mode==='meter')drawMeter(r);else drawOhmmeter(r);drawSide(r);update(r);window.__ANIM_TEST_STATE__={mode:S.mode,running:S.run,range:E.range.value,zero:+E.zero.value,raw:r.raw,corrected:r.fix,unit:r.unit}}
function drawCaliper(r){box(70,92,560,210,'#fbfdff');text('游标卡尺装置正视图：主尺读数 + 游标重合刻度',350,116,C.muted,'center',12,'900');const x0=106,y=180;line(x0,y,x0+470,y,'#52606d',6);for(let i=0;i<=50;i++){const x=x0+i*9.4;line(x,y-18,x,y+(i%10===0?24:12),'#52606d',1);if(i%10===0)text(String(i/10),x,y+42,C.muted,'center',10,'700')}const pos=x0+r.raw/50*470;box(pos-46,y+12,150,50,'#e6fffa','#38b2ac');for(let i=0;i<=10;i++){const x=pos-34+i*12.2;line(x,y+24,x,y+48,i===Math.round((r.raw*10)%10)?C.red:'#087f5b',i===Math.round((r.raw*10)%10)?3:1)}arrow(pos,y-76,pos,y-26,C.red,3);text('拖动游标零线',pos,y-88,C.red,'center',12,'900');text('精度 0.02 mm，零误差修正后才是答案',350,276,C.green,'center',12,'900');drawMiniChart(r)}
function drawMicrometer(r){box(70,92,560,210,'#fbfdff');text('螺旋测微器侧视图：固定尺 + 可动刻度',350,116,C.muted,'center',12,'900');const base=145+r.raw/40*360;box(120,158,390,54,'#eef4ff','#9fb3c8');box(base,142,92,88,'#fff7e6','#f0a500');for(let i=0;i<=40;i++){const x=130+i*9;line(x,158,x,176,i%5===0?'#52606d':'#9fb3c8',1);if(i%10===0)text(String(i/2),x,190,C.muted,'center',10,'700')}for(let i=0;i<=50;i+=5){const y=150+i*1.4;line(base+58,y,base+84,y,i===Math.round((r.raw*100)%50/5)*5?C.red:'#9fb3c8',1)}arrow(base+46,120,base+46,145,C.red,3);text('拖动旋钮',base+46,108,C.red,'center',12,'900');text('估读到 0.01 mm，注意固定尺半毫米线',350,276,C.green,'center',12,'900');drawMiniChart(r)}
function drawMeter(r){box(70,92,560,275,'#fbfdff');text('线性电表：零位偏差与量程分别设置',350,116,C.muted,'center',12,'900');const cx=350,cy=278,R=150;ctx.strokeStyle='#52606d';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,R,Math.PI*1.12,Math.PI*1.88);ctx.stroke();for(let i=0;i<=50;i+=2){const a=Math.PI*1.12+(i/50)*Math.PI*.76;const len=i%10===0?18:10;line(cx+Math.cos(a)*(R-len),cy+Math.sin(a)*(R-len),cx+Math.cos(a)*R,cy+Math.sin(a)*R,'#52606d',1);if(i%10===0)text(String(i),cx+Math.cos(a)*(R-38),cy+Math.sin(a)*(R-38),C.muted,'center',10,'700')}const a=Math.PI*1.12+(r.raw/50)*Math.PI*.76;arrow(cx,cy,cx+Math.cos(a)*(R-34),cy+Math.sin(a)*(R-34),C.red,4);text('拖动指针',cx+Math.cos(a)*(R-12),cy+Math.sin(a)*(R-12),C.red,'center',12,'900');text('量程 '+r.range+' '+r.unit+'；先扣零位偏差，再乘量程/50',350,340,C.green,'center',12,'900');drawMiniChart(r)}
function drawOhmmeter(r){box(70,92,560,275,'#fbfdff');text('欧姆表：右端 0 Ω、左端 ∞，刻度不均匀',350,116,C.muted,'center',12,'900');const cx=350,cy=278,R=150;ctx.strokeStyle='#52606d';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,R,Math.PI*1.12,Math.PI*1.88);ctx.stroke();const marks=[[0,'∞'],[20,'40'],[33.3,'20'],[50,'10'],[66.7,'5'],[83.3,'2'],[100,'0']];marks.forEach(([v,label])=>{const a=Math.PI*1.12+(v/100)*Math.PI*.76;line(cx+Math.cos(a)*(R-18),cy+Math.sin(a)*(R-18),cx+Math.cos(a)*R,cy+Math.sin(a)*R,'#52606d',2);text(label,cx+Math.cos(a)*(R-38),cy+Math.sin(a)*(R-38),C.muted,'center',10,'700')});const indicated=Math.max(0,Math.min(100,+E.value.value));const a=Math.PI*1.12+(indicated/100)*Math.PI*.76;arrow(cx,cy,cx+Math.cos(a)*(R-34),cy+Math.sin(a)*(R-34),C.red,4);text('先短接调零，再接入元件',350,324,C.green,'center',12,'900');text('读数 '+(Number.isFinite(r.fix)?r.fix.toFixed(r.fix<100?1:0):'∞')+' Ω（刻度×'+r.range+'）',350,346,C.purple,'center',12,'900');drawMiniChart(r)}
function drawMiniChart(r){box(86,330,530,180,'#fff');text('读数记录图像：原读数、零误差/倍率、最终值',351,354,C.muted,'center',12,'900');const x0=132,y0=472,w=410,h=82;arrow(x0,y0,x0+w+20,y0,'#52606d',2);arrow(x0,y0,x0,y0-h-18,'#52606d',2);const bars=[Math.abs(r.raw),Math.abs(+E.zero.value),Math.abs(r.fix)];['原读数','修正量','最终值'].forEach((lab,i)=>{const bh=Math.min(h,bars[i]/Math.max(1,Math.max(...bars))*h);ctx.fillStyle=[C.blue,C.gold,C.green][i];ctx.fillRect(x0+70+i*110,y0-bh,54,bh);text(lab,x0+97+i*110,y0+18,C.muted,'center',11,'800')});text('多视角：仪器装置 + 表盘刻度 + 数据图像',351,504,C.purple,'center',12,'900')}
function drawSide(r){box(664,92,196,418,'#fff');text('读数流程',762,118,C.ink,'center',14,'900');['看清量程','看清最小分度','估读到要求位数','代入倍率/精度','零误差修正','写单位'].forEach((s,i)=>{box(686,146+i*52,152,34,i===0?'#eef4ff':i===2?'#fff7e6':i===4?'#e6fffa':'#fff');text(s,762,163+i*52,i===2?C.gold:i===4?C.green:C.blue,'center',12,'900')});text('公式绑定',762,468,C.muted,'center',12,'800');text(r.hint,762,492,C.purple,'center',12,'900')}
function update(r){E.caliper.classList.toggle('active',S.mode==='caliper');E.micrometer.classList.toggle('active',S.mode==='micrometer');E.meter.classList.toggle('active',S.mode==='meter');E.ohmmeter.classList.toggle('active',S.mode==='ohmmeter');E.rangeRow.hidden=!(S.mode==='meter'||S.mode==='ohmmeter');E.zeroName.textContent=S.mode==='ohmmeter'?'欧姆调零偏差':'零误差/零位偏差';E.valueLabel.textContent=Number.isFinite(r.raw)?r.raw.toFixed(2):'∞';E.zeroLabel.textContent=(+E.zero.value).toFixed(0)+' 格';E.rangeLabel.textContent=S.mode==='ohmmeter'?'×'+r.range:r.range+' '+r.unit;const rawText=Number.isFinite(r.raw)?r.raw.toFixed(2):'∞',fixText=Number.isFinite(r.fix)?r.fix.toFixed(r.fix<10?3:r.fix<100?2:1):'∞';E.readout.innerHTML='仪器：<b>'+({caliper:'游标卡尺',micrometer:'螺旋测微器',meter:'线性电表',ohmmeter:'欧姆表'}[S.mode])+'</b><br>示值/刻度：<b>'+rawText+(S.mode==='meter'?' 格':' '+r.unit)+'</b><br>修正/换算后：<b>'+fixText+' '+r.unit+'</b><br>读数依据：<b>'+r.hint+'</b>';E.rows.innerHTML=S.records.slice(-6).map(x=>'<tr><td>'+x.m+'</td><td>'+x.raw+'</td><td>'+x.fix+'</td></tr>').join('')||'<tr><td colspan="3">暂无记录</td></tr>';E.status.textContent=S.mode==='ohmmeter'?'欧姆表每次换挡后先短接调零；被测电路断电、元件至少断开一端，再读非线性刻度并乘倍率。':'量程、最小分度和零误差相互独立；先读示值，再按当前仪器规则修正并写单位。'}
function record(){const r=raw(),name={caliper:'卡尺',micrometer:'测微器',meter:'线性电表',ohmmeter:'欧姆表'}[S.mode];S.records.push({m:name,raw:Number.isFinite(r.raw)?r.raw.toFixed(2):'∞',fix:(Number.isFinite(r.fix)?r.fix.toFixed(3):'∞')+' '+r.unit});if(S.records.length>8)S.records.shift();update(r)}
function setRangeOptions(mode){if(mode==='meter')E.range.innerHTML='<option value="0.6A">0.6 A</option><option value="3V" selected>3 V</option><option value="15V">15 V</option>';else if(mode==='ohmmeter')E.range.innerHTML='<option value="1">×1</option><option value="10" selected>×10</option><option value="100">×100</option>'}
function mode(m){S.mode=m;if(m==='meter'||m==='ohmmeter')setRangeOptions(m);E.zero.value=0;record();draw()}E.caliper.onclick=()=>mode('caliper');E.micrometer.onclick=()=>mode('micrometer');E.meter.onclick=()=>mode('meter');E.ohmmeter.onclick=()=>mode('ohmmeter');[E.value,E.zero,E.range].forEach(el=>el.addEventListener('input',draw));E.record.onclick=record;E.play.onclick=()=>{S.run=!S.run;E.play.textContent=S.run?'暂停':'播放'};function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setValue(p){E.value.value=Math.max(0,Math.min(100,(p.x-105)/520*100)).toFixed(1);draw()}canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>80&&p.x<640&&p.y>90&&p.y<370){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setValue(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setValue(pos(e))});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;if(!S.drag)E.value.value=(50+35*Math.sin(S.t*.8)).toFixed(1)}draw();requestAnimationFrame(loop)}record();loop();
S.t=0;last=performance.now();setTimeout(()=>loop(performance.now()),0);
})();
</script>
<script src="guided-lesson.js"></script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
