<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真实情境建模专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:10px;padding:10px;max-width:1280px;margin:auto}
.stage,.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px}
.stage{overflow:hidden}
canvas{display:block;width:100%;height:620px;touch-action:none;cursor:grab}
.panel{display:flex;flex-direction:column;gap:8px}
.card{padding:9px}
.task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.55}
.tabs,.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.toolbar{grid-template-columns:1fr 1fr 1fr}
.tabs button.active{background:#102a43;color:#fff;border-color:#102a43;font-weight:800}
.params{display:grid;gap:6px}
.param{display:grid;gap:2px;font-size:12px;color:#475569}
.param span{display:flex;justify-content:space-between;gap:8px}
.param b,.readout b{color:#102a43;font-variant-numeric:tabular-nums}
input[type=range]{width:100%;accent-color:#2563eb}
button{min-height:32px;padding:4px 6px;border:1px solid #94a3b8;border-radius:7px;background:#fff;color:#102a43;cursor:pointer;font:inherit;font-size:12px}
button:hover{background:#f1f5f9}
button.primary{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:800}
.readout{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#0f172a;border-radius:8px;padding:8px;color:#dbeafe;font-size:11px}
.readout div{border-bottom:1px solid #334155;padding-bottom:4px}
.readout div:nth-last-child(-n+2){border-bottom:0;padding-bottom:0}
.readout b{display:block;margin-top:2px;color:#fbbf24;font-size:14px}
.formula{font-size:12px;line-height:1.55;color:#475569}
.formula div{padding:3px 0;border-bottom:1px dashed #d7dee8}
.formula div:last-child{border-bottom:0}
.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;line-height:1.5;font-weight:800}
@media(max-width:880px){.root{grid-template-columns:1fr;padding:6px}.panel{gap:6px}canvas{height:590px}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="620" aria-label="真实情境建模实验台：汽车制动和无人机投放的真实场景、抽象模型、过程图像和结果读数"></canvas></div>
  <div class="panel">
    <div class="card task"><b>建模不是套公式：</b>先认出真实对象，再决定保留什么、忽略什么，最后把过程翻译成图像和方程。<b>拖动画面里的汽车或无人机，改变初速度。</b></div>
    <div class="card tabs"><button id="brake" class="active">汽车制动</button><button id="drop">无人机投放</button></div>
    <div class="toolbar"><button id="play" class="primary">播放</button><button id="step">单步</button><button id="reset">重置</button></div>
    <div class="card params">
      <label class="param"><span id="vName">初速度 v₀ <b id="vLabel">20.0 m/s</b></span><input id="v" type="range" min="5" max="35" step="0.5" value="20"></label>
      <label class="param"><span id="p1Name">反应时间 tᵣ <b id="p1Label">1.0 s</b></span><input id="p1" type="range" min="0.2" max="3" step="0.1" value="1"></label>
      <label class="param"><span id="p2Name">路面摩擦因数 μ <b id="p2Label">0.70</b></span><input id="p2" type="range" min="0.2" max="1.2" step="0.05" value="0.7"></label>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card formula"><b>模型翻译</b><div id="formula1">汽车 → 质点；反应段匀速，制动段匀减速</div><div id="formula2">a=μg，x总=v₀tᵣ+v₀²/(2μg)</div><div id="formula3">检查：距离单位 m，结果数量级要合理</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const el={brake:document.getElementById('brake'),drop:document.getElementById('drop'),play:document.getElementById('play'),step:document.getElementById('step'),reset:document.getElementById('reset'),v:document.getElementById('v'),p1:document.getElementById('p1'),p2:document.getElementById('p2'),vName:document.getElementById('vName'),p1Name:document.getElementById('p1Name'),p2Name:document.getElementById('p2Name'),vLabel:document.getElementById('vLabel'),p1Label:document.getElementById('p1Label'),p2Label:document.getElementById('p2Label'),formula1:document.getElementById('formula1'),formula2:document.getElementById('formula2'),formula3:document.getElementById('formula3'),readout:document.getElementById('readout'),status:document.getElementById('status')};
  const C={ink:'#102a43',muted:'#64748b',grid:'#dbe5ef',blue:'#2563eb',orange:'#ea580c',green:'#059669',gold:'#d97706',red:'#dc2626',purple:'#7c3aed',pink:'#db2777'};
  const S={mode:'brake',running:false,time:0,drag:false,trail:[],lastTrail:-1};
  const g=9.8;
  let W=960,H=620,dpr=1,last=performance.now();
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const fmt=(v,d=2)=>Number.isFinite(v)?v.toFixed(d):'—';
  function box(x,y,w,h,fill='#fff',stroke='#cbd5e1'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
  function text(s,x,y,color=C.ink,align='center',size=13,weight='700'){ctx.fillStyle=color;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,color=C.muted,width=2,dash){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,color=C.blue,width=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,color,width);ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
  function calc(){const v=+el.v.value,p1=+el.p1.value,p2=+el.p2.value;if(S.mode==='brake'){const a=p2*g,reaction=v*p1,brake=v*v/(2*a),total=reaction+brake,tStop=p1+v/a,T=tStop+1;return{mode:'brake',v,tr:p1,mu:p2,a,reaction,brake,total,tStop,T}}const h=p1,wind=p2,fall=Math.sqrt(2*h/g),horizontal=v+wind,range=horizontal*fall,T=fall+1;return{mode:'drop',v,h,wind,fall,horizontal,range,T}}
  function stateAt(t,q){const time=clamp(t,0,q.T);if(q.mode==='brake'){if(time<=q.tr){return{phase:'反应段：匀速',color:C.gold,t:time,x:q.v*time,v:q.v,a:0}}const u=Math.min(q.tStop-q.tr,time-q.tr);return{phase:time<q.tStop?'制动段：匀减速':'已经停车',color:time<q.tStop?C.red:C.green,t:time,x:q.reaction+q.v*u-.5*q.a*u*u,v:Math.max(0,q.v-q.a*u),a:time<q.tStop?-q.a:0}}const fallTime=Math.min(time,q.fall),y=Math.max(0,q.h-.5*g*fallTime*fallTime),x=q.horizontal*fallTime;return{phase:time<q.fall?'包裹下落：水平匀速+竖直自由落体':'已经落地',color:time<q.fall?C.blue:C.green,t:fallTime,x,y,vx:q.horizontal,vy:-g*fallTime}}
  function layout(){const small=W<640;return{small,left:small?28:58,right:small?W-22:W-35,sceneY:small?120:132,graphY:small?360:382,graphH:small?205:180}}
  function drawCar(x,y,color){ctx.save();ctx.fillStyle=color;ctx.strokeStyle='#9a3412';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x-32,y-24,64,28,6);ctx.fill();ctx.stroke();ctx.fillStyle='#bfdbfe';ctx.fillRect(x-18,y-20,28,12);ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(x-20,y+7,7,0,Math.PI*2);ctx.arc(x+20,y+7,7,0,Math.PI*2);ctx.fill();ctx.restore()}
  function drawDrone(x,y,color){ctx.save();ctx.fillStyle=color;ctx.fillRect(x-28,y-10,56,20);line(x-44,y-18,x+44,y-18,color,3);line(x-35,y-25,x-35,y-11,color,2);line(x+35,y-25,x+35,y-11,color,2);ctx.restore()}
  function drawScene(q,s,L){
    box(24,34,W-48,228,'#fbfdff');text(L.small?(q.mode==='brake'?'真实汽车：反应后制动':'真实无人机：投放包裹'):(q.mode==='brake'?'真实场景：汽车制动 → 抽象为质点和两段运动':'真实场景：无人机投放 → 抽象为水平与竖直两个方向'),W/2,58,C.ink,'center',Math.max(13,Math.min(16,W/50)),'900');
    if(q.mode==='brake'){const roadY=L.sceneY,roadLeft=L.left,roadRight=L.right;line(roadLeft,roadY,roadRight,roadY,C.muted,5);line(roadLeft,roadY+10,roadRight,roadY+10,'#cbd5e1',2);const px=roadLeft+clamp(s.x/q.total,0,1)*(roadRight-roadLeft);S.trail.slice(-70).forEach(dot=>{ctx.fillStyle=dot.color;ctx.globalAlpha=.2+dot.alpha*.4;ctx.beginPath();ctx.arc(roadLeft+dot.ratio*(roadRight-roadLeft),roadY-4,3,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;drawCar(px,roadY,s.color);if(s.v>0)arrow(px+38,roadY-25,px+38+clamp(s.v,0,35)*2,roadY-25,s.color,3);text('v='+fmt(s.v,1)+' m/s',px,roadY-57,s.color,'center',11,'800');line(roadLeft,roadY+39,roadLeft+q.reaction/q.total*(roadRight-roadLeft),roadY+39,C.gold,6);line(roadLeft+q.reaction/q.total*(roadRight-roadLeft),roadY+39,roadRight,roadY+39,C.red,6);text('反应距离',roadLeft+q.reaction/q.total*(roadRight-roadLeft)/2,roadY+56,C.gold,'center',10,'800');text('制动距离',roadLeft+(q.reaction/q.total+(q.brake/q.total)/2)*(roadRight-roadLeft),roadY+56,C.red,'center',10,'800');if(s.phase.indexOf('制动')>=0){arrow(px-48,roadY+76,px-108,roadY+76,C.red,3);text('摩擦力 f=μmg',px-120,roadY+92,C.red,'center',10,'800')}else{text('反应段只保留匀速运动',W/2,roadY+88,C.gold,'center',11,'800')}}else{const ground=L.sceneY+48,skyTop=78,range=Math.max(q.range,1),px=L.left+clamp(s.x/range,0,1)*(L.right-L.left-40),py=skyTop+clamp((q.h-s.y)/q.h,0,1)*(ground-skyTop);line(L.left,ground,L.right,ground,C.muted,4);for(let i=0;i<5;i++)line(L.left+50+i*90,ground,L.left+50+i*90,ground+8,'#94a3b8',2);S.trail.slice(-70).forEach(dot=>{ctx.fillStyle=C.blue;ctx.globalAlpha=.2+dot.alpha*.4;ctx.beginPath();ctx.arc(L.left+dot.x/range*(L.right-L.left-40),skyTop+dot.y/q.h*(ground-skyTop),3,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;drawDrone(L.left+50,skyTop,C.blue);ctx.fillStyle=C.orange;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();if(s.t<q.fall){arrow(L.left+50,skyTop+32,L.left+50+q.horizontal*2,skyTop+32,C.green,3);arrow(px,py+12,px,py+42,C.red,3)}text('包裹',px+12,py,C.orange,'left',10,'800');line(px,py,px,ground,C.gold,2,[4,3]);text('h='+fmt(s.y,1)+' m',px+12,(py+ground)/2,C.gold,'left',10,'800');text('忽略空气阻力：水平方向匀速，竖直方向只受重力',W/2,ground+28,C.green,'center',11,'800')}}
  function drawModel(q,s,L){const y=272,h=78,w=W-48;box(24,y,w,h,'#fff');text('把情境翻译成模型',W/2,y+15,C.ink,'center',12,'900');const labels=q.mode==='brake'?['汽车→质点','保留 μ、v₀、tᵣ','反应→制动','x总=x反应+x制动']:['包裹→质点','忽略空气阻力','水平/竖直分解','x=v_xt，h=½gt²'];const colors=[C.blue,C.gold,C.purple,C.green],gap=7,bw=(w-32-3*gap)/4;labels.forEach((label,i)=>{const x=32+i*(bw+gap);box(x,y+29,bw,32,i===2?'#f5f3ff':'#f8fafc',colors[i]);text(label,x+bw/2,y+45,colors[i],'center',Math.max(9,Math.min(11,bw/12)),'800');if(i<3)arrow(x+bw+2,y+45,x+bw+gap-2,y+45,C.muted,2)})}
  function drawGraph(q,s,L){const x=24,y=L.graphY,w=W-48,h=L.graphH;box(x,y,w,h,'#fff');text(q.mode==='brake'?(L.small?'v-t图像：反应水平，制动斜降':'v-t 图像：反应段水平，制动段斜率为 −μg'):(L.small?'投放图像：x-t直线，h-t曲线':'投放图像：x-t 是直线，h-t 是抛物线'),W/2,y+16,C.ink,'center',Math.max(11,Math.min(14,W/48)),'900');const left=x+36,right=x+w-16,top=y+34,bottom=y+h-28;line(left,bottom,right,bottom,C.muted,1);line(left,top,left,bottom,C.muted,1);for(let i=0;i<=3;i++)line(left,top+i*(bottom-top)/3,right,top+i*(bottom-top)/3,C.grid,1);const cursor=left+clamp(S.time/q.T,0,1)*(right-left);line(cursor,top,cursor,bottom,C.gold,2,[4,3]);text('现在',cursor,top+10,C.gold,'center',9,'800');if(q.mode==='brake'){const vmax=q.v;ctx.save();ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();const n=120;for(let i=0;i<=n;i++){const t=q.T*i/n,st=stateAt(t,q),xx=left+t/q.T*(right-left),yy=bottom-(st.v/vmax)*(bottom-top)*.82;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)}ctx.stroke();ctx.restore();text('v/(m·s⁻¹)',left,top-12,C.blue,'left',9,'800');text('t/s',right,bottom,C.muted,'right',9,'800');text('x总='+fmt(q.total,1)+' m',left+70,bottom-14,C.purple,'left',10,'800')}else{const maxX=Math.max(q.range,1);ctx.save();ctx.strokeStyle=C.green;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=100;i++){const t=q.fall*i/100,xx=left+t/q.fall*(right-left),yy=bottom-(q.horizontal*t/maxX)*(bottom-top)*.78;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)}ctx.stroke();ctx.strokeStyle=C.red;ctx.beginPath();for(let i=0;i<=100;i++){const t=q.fall*i/100,xx=left+t/q.fall*(right-left),yy=top+(.5*g*t*t/q.h)*(bottom-top)*.78;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)}ctx.stroke();ctx.restore();text('绿 x-t',left+60,top-12,C.green,'left',9,'800');text('红 h变化',left+120,top-12,C.red,'left',9,'800');text('水平位移='+fmt(q.range,1)+' m',left+210,bottom-14,C.purple,'left',10,'800')}}
  function update(q,s){el.brake.classList.toggle('active',q.mode==='brake');el.drop.classList.toggle('active',q.mode==='drop');if(q.mode==='brake'){el.vName.firstChild.textContent='初速度 v₀ ';el.p1Name.firstChild.textContent='反应时间 tᵣ ';el.p2Name.firstChild.textContent='路面摩擦因数 μ ';el.vLabel.textContent=fmt(q.v,1)+' m/s';el.p1Label.textContent=fmt(q.tr,1)+' s';el.p2Label.textContent=fmt(q.mu,2);el.formula1.textContent='汽车 → 质点；反应段匀速，制动段匀减速';el.formula2.textContent='a=μg，x总=v₀tᵣ+v₀²/(2μg)';el.formula3.textContent='检查：停车距离单位 m，μ 越大制动距离越短';el.readout.innerHTML='<div>当前过程<b>'+s.phase+'</b></div><div>时间 t<b>'+fmt(s.t,2)+' s</b></div><div>当前速度 v<b>'+fmt(s.v,2)+' m/s</b></div><div>反应距离<b>'+fmt(q.reaction,1)+' m</b></div><div>制动距离<b>'+fmt(q.brake,1)+' m</b></div><div>停车距离<b>'+fmt(q.total,1)+' m</b></div>';el.status.textContent=s.phase.indexOf('反应')>=0?'先把驾驶员反应时间单独建成匀速段：这一段没有制动加速度。':'把汽车抽象成质点，制动段用 a=−μg；两段距离相加得到停车距离。'}else{el.vName.firstChild.textContent='无人机水平速度 v₀ ';el.p1Name.firstChild.textContent='投放高度 h ';el.p2Name.firstChild.textContent='水平风速 u ';el.vLabel.textContent=fmt(q.v,1)+' m/s';el.p1Label.textContent=fmt(q.h,1)+' m';el.p2Label.textContent=fmt(q.wind,1)+' m/s';el.formula1.textContent='包裹 → 质点；忽略空气阻力，水平/竖直运动独立';el.formula2.textContent='t=√(2h/g)，x=(v₀+u)t';el.formula3.textContent='检查：竖直初速度为 0，风只改变水平位移';el.readout.innerHTML='<div>当前过程<b>'+s.phase+'</b></div><div>下落时间<b>'+fmt(q.fall,2)+' s</b></div><div>当前高度<b>'+fmt(s.y,2)+' m</b></div><div>水平速度<b>'+fmt(q.horizontal,2)+' m/s</b></div><div>落地位移<b>'+fmt(q.range,1)+' m</b></div><div>竖直速度<b>'+fmt(s.vy||0,2)+' m/s</b></div>';el.status.textContent=s.phase.indexOf('下落')>=0?'同一包裹拆成两个方向：水平保持匀速，竖直只受重力。':'包裹已落地；模型给出的水平位移是投放点到落地点的距离。'}}
  function draw(){const q=calc(),s=stateAt(S.time,q),L=layout();ctx.clearRect(0,0,W,H);const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#ffffff');bg.addColorStop(1,'#eef4fa');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);text(L.small?(q.mode==='brake'?'G-11 建模：汽车制动':'G-11 建模：无人机投放'):'G-11 真实情境建模：真实对象 → 模型假设 → 过程图像 → 结果',W/2,18,C.ink,'center',Math.max(14,Math.min(19,W/46)),'900');drawScene(q,s,L);drawModel(q,s,L);drawGraph(q,s,L);update(q,s);window.__ANIM_TEST_STATE__={mode:q.mode,running:S.running,time:S.time,phase:s.phase,x:s.x||0,y:s.y||0,result:q.mode==='brake'?q.total:q.range}}
  function addTrail(q,s){const L=layout();if(S.lastTrail<0||S.time-S.lastTrail>.08){S.trail.push(q.mode==='brake'?{ratio:clamp(s.x/q.total,0,1),color:s.color,alpha:1}:{x:s.x,y:q.h-s.y,alpha:1});S.trail=S.trail.slice(-70);S.lastTrail=S.time}}
  function reset(){S.running=false;S.time=0;S.trail=[];S.lastTrail=-1;el.play.textContent='播放';draw()}
  function switchMode(mode){S.mode=mode;S.running=true;S.time=0;S.trail=[];S.lastTrail=-1;el.play.textContent='暂停';if(mode==='brake'){el.p1.min=.2;el.p1.max=3;el.p1.step=.1;el.p1.value=1;el.p2.min=.2;el.p2.max=1.2;el.p2.step=.05;el.p2.value=.7}else{el.p1.min=2;el.p1.max=30;el.p1.step=.1;el.p1.value=20;el.p2.min=-5;el.p2.max=5;el.p2.step=.1;el.p2.value=0}draw()}
  [el.v,el.p1,el.p2].forEach(input=>input.addEventListener('input',()=>{S.time=0;S.trail=[];S.lastTrail=-1;draw()}));el.brake.onclick=()=>switchMode('brake');el.drop.onclick=()=>switchMode('drop');el.play.onclick=()=>{S.running=!S.running;el.play.textContent=S.running?'暂停':'播放';draw()};el.step.onclick=()=>{S.running=false;el.play.textContent='播放';const q=calc();S.time=clamp(S.time+.25,0,q.T);addTrail(q,stateAt(S.time,q));draw()};el.reset.onclick=reset;
  function point(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
  function setV(p){const L=layout(),v=clamp(5+(p.x-L.left)/Math.max(1,L.right-L.left)*30,5,35);el.v.value=v.toFixed(1);S.time=0;S.trail=[];S.lastTrail=-1;draw()}
  canvas.addEventListener('pointerdown',e=>{const p=point(e),L=layout();if(p.y>62&&p.y<245){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setV(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setV(point(e))});canvas.addEventListener('pointerup',e=>{S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>S.drag=false);
  function resize(){const r=canvas.getBoundingClientRect();W=clamp(r.width||960,320,960);H=W<640?590:620;dpr=Math.min(window.devicePixelRatio||1,2);canvas.style.height=H+'px';canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
  function loop(now){const dt=Math.min(Math.max((now-last)/1000,0),.04);last=now;const q=calc();if(S.running){S.time+=dt;if(S.time>=q.T){S.time=q.T;S.running=false;el.play.textContent='播放'}addTrail(q,stateAt(S.time,q))}draw();requestAnimationFrame(loop)}
  if(window.ResizeObserver)new ResizeObserver(resize).observe(canvas);resize();requestAnimationFrame(loop);
})();
</script>
</body>
