<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息题与科技前沿专题训练台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.root{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:10px;padding:10px;max-width:1280px;margin:auto}
.stage,.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px}
.stage{overflow:hidden}
canvas{display:block;width:100%;height:620px;touch-action:none;cursor:grab}
.panel{display:flex;flex-direction:column;gap:8px}.card{padding:9px}
.task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.55}
.tabs,.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:6px}.toolbar{grid-template-columns:1fr 1fr 1fr}
.tabs button.active{background:#102a43;color:#fff;border-color:#102a43;font-weight:800}
.params{display:grid;gap:6px}.param{display:grid;gap:2px;font-size:12px;color:#475569}.param span{display:flex;justify-content:space-between;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums}input[type=range]{width:100%;accent-color:#2563eb}
button{min-height:32px;padding:4px 6px;border:1px solid #94a3b8;border-radius:7px;background:#fff;color:#102a43;cursor:pointer;font:inherit;font-size:12px}button:hover{background:#f1f5f9}button.primary{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:800}
.readout{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#0f172a;border-radius:8px;padding:8px;color:#dbeafe;font-size:11px}.readout div{border-bottom:1px solid #334155;padding-bottom:4px}.readout div:nth-last-child(-n+2){border-bottom:0;padding-bottom:0}.readout b{display:block;margin-top:2px;color:#fbbf24;font-size:14px}
.formula{font-size:12px;line-height:1.55;color:#475569}.formula div{padding:3px 0;border-bottom:1px dashed #d7dee8}.formula div:last-child{border-bottom:0}
.scoreline{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#475569}.scoreline b{color:#102a43;font-size:16px}.question{font-size:12px;line-height:1.5}.question h3{margin:0 0 6px;font-size:13px;color:#102a43}.options{display:grid;gap:5px}.option{text-align:left;min-height:34px}.option.selected{border-color:#2563eb;background:#eff6ff}.option.correct{border-color:#059669;background:#ecfdf5;color:#065f46}.option.wrong{border-color:#dc2626;background:#fef2f2;color:#991b1b}.feedback{margin-top:7px;padding:7px;border-radius:6px;background:#f8fafc;color:#475569;font-size:12px}.feedback.good{background:#ecfdf5;color:#065f46}.feedback.bad{background:#fef2f2;color:#991b1b}.questionActions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px}
.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;line-height:1.5;font-weight:800}
@media(max-width:880px){.root{grid-template-columns:1fr;padding:6px}.panel{gap:6px}canvas{height:590px}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="620" aria-label="信息题训练台：航天周期和太阳能电池的信息提取、单位换算、模型公式与图像"></canvas></div>
  <div class="panel">
    <div class="card task"><b>训练顺序：</b>先从材料圈出数据和单位，再翻译成物理量，最后选旧模型。“装置动画”只帮助观察材料过程；<b>得分只在点击“提交答案”后改变。</b></div>
    <div class="card tabs"><button id="orbit" class="active">航天周期</button><button id="solar">太阳能电池</button></div>
    <div class="toolbar"><button id="play" class="primary">装置动画：播放</button><button id="step">装置单步</button><button id="reset">重置本轮</button></div>
    <div class="card params">
      <label class="param"><span><span id="aName">轨道高度 h</span><b id="aLabel">400 km</b></span><input id="a" type="range" min="200" max="2000" step="50" value="400"></label>
      <label class="param"><span><span id="bName">轨道速度 v</span><b id="bLabel">7.7 km/s</b></span><input id="b" type="range" min="1" max="12" step="0.1" value="7.7"></label>
      <label class="param"><span><span id="etaName">附加比例 η</span><b id="etaLabel">20%</b></span><input id="eta" type="range" min="5" max="45" step="1" value="20"></label>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card question"><div class="scoreline"><b id="scoreText">得分 0 / 3</b><span id="questionText">第 1 / 3 题</span></div><div id="questionArea"></div></div>
    <div class="card formula"><b>答题策略</b><div>新名词 → 熟悉物理量</div><div>所有单位 → SI 制</div><div>比例/效率/斜率/面积 → 旧模型入口</div></div>
    <div class="card"><b>观察任务</b>：先从材料中圈出物理量、单位和比例关系，再调节参数预测答案变化；提交每题后用反馈检查“新情境”是否已正确翻译成旧模型。</div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const el={orbit:document.getElementById('orbit'),solar:document.getElementById('solar'),play:document.getElementById('play'),step:document.getElementById('step'),reset:document.getElementById('reset'),a:document.getElementById('a'),b:document.getElementById('b'),eta:document.getElementById('eta'),aName:document.getElementById('aName'),bName:document.getElementById('bName'),etaName:document.getElementById('etaName'),aLabel:document.getElementById('aLabel'),bLabel:document.getElementById('bLabel'),etaLabel:document.getElementById('etaLabel'),readout:document.getElementById('readout'),questionArea:document.getElementById('questionArea'),scoreText:document.getElementById('scoreText'),questionText:document.getElementById('questionText'),status:document.getElementById('status')};
  const C={ink:'#102a43',muted:'#64748b',grid:'#dbe5ef',blue:'#2563eb',orange:'#ea580c',green:'#059669',gold:'#d97706',purple:'#7c3aed',red:'#dc2626',pink:'#db2777'};
  const bank={orbit:[{q:'材料给出“轨道高度 400 km”。换算成 SI 制高度是多少？',o:['4.0×10² m','4.0×10⁵ m','4.0×10⁶ m','4.0×10⁸ m'],a:1,e:'1 km=10³ m，所以 400 km=4.0×10⁵ m。'},{q:'已知轨道半径 r 和速度 v，求周期 T 应选哪个模型？',o:['T=2πr/v','T=2πv/r','T=rv/2π','T=r/v'],a:0,e:'近似匀速圆周运动，一周路程 2πr 除以速度 v。'},{q:'若轨道半径不变、速度增大为原来的 2 倍，周期怎样变化？',o:['变为 2 倍','不变','变为 1/2','变为 4 倍'],a:2,e:'T=2πr/v，r 不变时 T 与 v 成反比。'}],solar:[{q:'太阳能板面积 2.0 m²、辐照度 800 W/m²，入射功率是多少？',o:['400 W','800 W','1600 W','3200 W'],a:2,e:'P入=IA=800×2.0=1600 W。'},{q:'若转换效率 η=20%，上题电池输出功率是多少？',o:['160 W','320 W','800 W','1600 W'],a:1,e:'P出=ηP入=20%×1600=320 W。'},{q:'面积和辐照度都不变，效率从 20% 提高到 30%，输出功率怎样变化？',o:['增加 10 W','增加 50%','减少 10%','不变'],a:1,e:'输出功率与效率成正比，30%/20%=1.5，增加 50%。'}]};
  const S={mode:'orbit',running:false,time:0,drag:false,history:[],score:0,index:0,selected:null,answered:false,lastHistory:-1};
  let W=960,H=620,dpr=1,last=performance.now();
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));const fmt=(v,d=2)=>Number.isFinite(v)?v.toFixed(d):'—';
  function box(x,y,w,h,fill='#fff',stroke='#cbd5e1'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
  function text(s,x,y,color=C.ink,align='center',size=13,weight='700'){ctx.fillStyle=color;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,color=C.muted,width=2,dash){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,color=C.blue,width=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,color,width);ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
  function calc(){const a=+el.a.value,b=+el.b.value,eta=+el.eta.value/100;if(S.mode==='orbit'){const h=a*1000,v=b*1000,r=6.37e6+h,T=2*Math.PI*r/v/60;return{mode:'orbit',a,b,eta,h,v,r,T,formula:'T=2πr/v',result:T}}const area=a,irr=b,Pin=area*irr,Pout=Pin*eta;return{mode:'solar',a,b,eta,area,irr,Pin,Pout,formula:'P出=IAη',result:Pout}}
  function layout(){const small=W<640;return{small,left:small?28:58,right:small?W-22:W-35,modelY:small?264:270,graphY:small?350:360,graphH:small?215:205}}
  function drawOrbit(q,L){const x=24,y=34,w=W-48,h=220;box(x,y,w,h,'#fbfdff');text(L.small?'航天器：高度→半径→周期':'材料场景：空间站绕地球运行，先把高度换成轨道半径',W/2,58,C.ink,'center',Math.max(13,Math.min(16,W/48)),'900');const cx=W*.34,cy=140,R=L.small?68:88;ctx.strokeStyle=C.purple;ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#dbeafe';ctx.beginPath();ctx.arc(cx,cy,38,0,Math.PI*2);ctx.fill();text('地球',cx,cy,C.blue,'center',12,'900');const ang=S.time*.9,sx=cx+Math.cos(ang)*R,sy=cy+Math.sin(ang)*R;S.history.slice(-50).forEach((p,i)=>{ctx.fillStyle=C.gold;ctx.globalAlpha=.15+i/50*.5;ctx.beginPath();ctx.arc(cx+Math.cos(p.a)*R,cy+Math.sin(p.a)*R,3,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(sx,sy,9,0,Math.PI*2);ctx.fill();arrow(sx,sy,sx-Math.sin(ang)*42,sy+Math.cos(ang)*42,C.red,3);text('v',sx-Math.sin(ang)*50,sy+Math.cos(ang)*50,C.red,'center',11,'800');text('h='+q.a+' km',W*.68,102,C.gold,'center',12,'800');text('r='+(q.r/1000).toFixed(0)+' km',W*.68,132,C.purple,'center',12,'800');text('T='+q.T.toFixed(1)+' min',W*.68,162,C.green,'center',13,'900');text('400 km → 4.0×10⁵ m → r=R地+h',W*.68,198,C.muted,'center',10,'800')}
  function drawSolar(q,L){const x=24,y=34,w=W-48,h=220;box(x,y,w,h,'#fbfdff');text(L.small?'光伏：辐照度×面积×效率':'材料场景：太阳能电池把入射能流转成电功率',W/2,58,C.ink,'center',Math.max(13,Math.min(16,W/48)),'900');const px=W*.28,py=115,pw=L.small?150:230,ph=80;for(let i=0;i<6;i++){const sx=px-90+i*38,sy=py-60,ex=px-35+i*38,ey=py-18;arrow(sx,sy,ex,ey,C.gold,2);const p=(S.time*.9+i/6)%1;ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(sx+(ex-sx)*p,sy+(ey-sy)*p,4,0,Math.PI*2);ctx.fill()}box(px,py,pw,ph,'#dbeafe',C.blue);for(let i=1;i<4;i++)line(px+pw*i/4,py,px+pw*i/4,py+ph,C.blue,1);for(let i=1;i<3;i++)line(px,py+ph*i/3,px+pw,py+ph*i/3,C.blue,1);text('A='+q.area.toFixed(1)+' m²',px+pw/2,py+ph+18,C.blue,'center',11,'800');box(W*.68,104,100,66,'#0f172a','#334155');text('P出',W*.68+50,122,'#dbeafe','center',11,'800');text(q.Pout.toFixed(0)+' W',W*.68+50,148,'#fbbf24','center',16,'900');text('I×A='+q.Pin.toFixed(0)+' W，×η='+Math.round(q.eta*100)+'%',W*.68,198,C.green,'center',11,'800')}
  function drawModel(q,L){const x=24,y=L.modelY,w=W-48,h=72;box(x,y,w,h,'#fff');text('材料信息 → 单位/物理量 → 旧模型公式 → 数值结果',W/2,y+14,C.ink,'center',12,'900');const labels=q.mode==='orbit'?['轨道高度 h','换成 r=R+h','T=2πr/v','周期 min']:['面积 A、辐照度 I','P入=IA','P出=ηP入','输出功率 W'],colors=[C.blue,C.gold,C.purple,C.green],gap=7,bw=(w-32-3*gap)/4;labels.forEach((label,i)=>{const bx=32+i*(bw+gap);box(bx,y+28,bw,30,i===2?'#f5f3ff':'#f8fafc',colors[i]);text(label,bx+bw/2,y+43,colors[i],'center',Math.max(9,Math.min(11,bw/12)),'800');if(i<3)arrow(bx+bw+2,y+43,bx+bw+gap-2,y+43,C.muted,2)})}
  function drawBars(q,L){const x=24,y=L.graphY,w=W-48,h=L.graphH;box(x,y,w,h,'#fff');text(q.mode==='orbit'?(L.small?'读数：r、v、T':'读数图：改变高度或速度，看周期怎样变'):(L.small?'读数：P入→η→P出':'读数图：入射功率乘效率得到电功率'),W/2,y+16,C.ink,'center',Math.max(11,Math.min(14,W/46)),'900');const labels=q.mode==='orbit'?['h/km','v/km·s⁻¹','T/min']:['P入/W','η/%','P出/W'],values=q.mode==='orbit'?[q.a,q.b,q.T]:[q.Pin,q.eta*100,q.Pout],colors=[C.blue,C.gold,C.green],max=Math.max(...values,1),base=y+h-32,top=y+40,bw=Math.min(60,(w-50)/3-10),gap=(w-bw*3)/4;line(x+14,base,x+w-14,base,C.muted,1);values.forEach((v,i)=>{const bx=x+gap+i*(bw+gap),bh=v/max*(base-top);ctx.fillStyle=colors[i];ctx.fillRect(bx,base-bh,bw,bh);text(fmt(v,i===1&&q.mode==='solar'?0:1),bx+bw/2,base-bh-10,C.ink,'center',10,'800');text(labels[i],bx+bw/2,base+15,C.muted,'center',10,'800')})}
  function update(q){el.orbit.classList.toggle('active',S.mode==='orbit');el.solar.classList.toggle('active',S.mode==='solar');if(q.mode==='orbit'){el.aName.textContent='轨道高度 h';el.bName.textContent='轨道速度 v';el.etaName.textContent='附加比例 η';el.aLabel.textContent=q.a.toFixed(0)+' km';el.bLabel.textContent=q.b.toFixed(1)+' km/s';el.etaLabel.textContent=Math.round(q.eta*100)+'%';el.readout.innerHTML='<div>装置动画 t<b>'+fmt(S.time,2)+' s</b></div><div>轨道半径 r<b>'+fmt(q.r/1000,0)+' km</b></div><div>周期 T<b>'+fmt(q.T,1)+' min</b></div><div>模型<b>'+q.formula+'</b></div>'}else{el.aName.textContent='电池面积 A';el.bName.textContent='辐照度 I';el.etaName.textContent='转换效率 η';el.aLabel.textContent=q.a.toFixed(1)+' m²';el.bLabel.textContent=q.b.toFixed(0)+' W/m²';el.etaLabel.textContent=Math.round(q.eta*100)+'%';el.readout.innerHTML='<div>装置动画 t<b>'+fmt(S.time,2)+' s</b></div><div>入射功率 P入<b>'+fmt(q.Pin,0)+' W</b></div><div>输出功率 P出<b>'+fmt(q.Pout,0)+' W</b></div><div>效率 η<b>'+Math.round(q.eta*100)+'%</b></div>'}el.status.textContent=S.running?'装置动画播放中；答题得分不会自动变化。':'装置动画已暂停；当前题仍可作答，得分只在提交答案后改变。'}
  function renderQuestion(){const qs=bank[S.mode],q=qs[S.index];el.scoreText.textContent='得分 '+S.score+' / '+qs.length;el.questionText.textContent=S.index<qs.length?'第 '+(S.index+1)+' / '+qs.length+' 题':'训练完成';if(!q){el.questionArea.innerHTML='<div class="feedback good">本场景已完成：'+S.score+' / '+qs.length+'。切换另一场景可以继续训练。</div>';return}let html='<h3>'+q.q+'</h3><div class="options">';q.o.forEach((option,i)=>{const cls=S.answered?(i===q.a?' correct':(i===S.selected?' wrong':'')):(i===S.selected?' selected':'');html+='<button class="option'+cls+'" data-index="'+i+'"'+(S.answered?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+option+'</button>'});html+='</div>';if(S.answered)html+='<div class="feedback '+(S.selected===q.a?'good':'bad')+'">'+(S.selected===q.a?'回答正确。':'回答错误。')+q.e+'</div>';html+='<div class="questionActions"><button id="submitAnswer" class="primary"'+(S.answered?' disabled':'')+'>提交答案</button><button id="nextQuestion"'+(!S.answered?' disabled':'')+'>下一题</button></div>';el.questionArea.innerHTML=html;el.questionArea.querySelectorAll('.option').forEach(button=>button.onclick=()=>{S.selected=Number(button.dataset.index);renderQuestion()});const submit=document.getElementById('submitAnswer');if(submit)submit.onclick=()=>{if(S.selected===null)return;S.answered=true;if(S.selected===q.a)S.score+=1;renderQuestion();draw()};const next=document.getElementById('nextQuestion');if(next)next.onclick=()=>{if(!S.answered)return;S.index+=1;S.selected=null;S.answered=false;renderQuestion();draw()}}
  function draw(){const q=calc(),L=layout();ctx.clearRect(0,0,W,H);const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#ffffff');bg.addColorStop(1,'#eef4fa');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);text(L.small?(S.mode==='orbit'?'G-12 信息题：航天周期':'G-12 信息题：光伏功率'):'G-12 信息题：新情境 → 单位 → 旧模型 → 得分反馈',W/2,18,C.ink,'center',Math.max(14,Math.min(19,W/46)),'900');if(S.mode==='orbit')drawOrbit(q,L);else drawSolar(q,L);drawModel(q,L);drawBars(q,L);update(q);window.__ANIM_TEST_STATE__={mode:S.mode,running:S.running,time:S.time,score:S.score,index:S.index,result:q.result}}
  function reset(){S.running=false;S.time=0;S.history=[];S.lastHistory=-1;S.score=0;S.index=0;S.selected=null;S.answered=false;el.play.textContent='装置动画：播放';renderQuestion();draw()}
  function switchMode(mode){S.mode=mode;S.running=false;S.time=0;S.history=[];S.lastHistory=-1;S.score=0;S.index=0;S.selected=null;S.answered=false;el.play.textContent='装置动画：播放';if(mode==='orbit'){el.a.min=200;el.a.max=2000;el.a.step=50;el.a.value=400;el.b.min=1;el.b.max=12;el.b.step=.1;el.b.value=7.7;el.eta.min=5;el.eta.max=45;el.eta.value=20}else{el.a.min=0.5;el.a.max=10;el.a.step=.5;el.a.value=2;el.b.min=200;el.b.max=1200;el.b.step=50;el.b.value=800;el.eta.min=5;el.eta.max=45;el.eta.value=20}renderQuestion();draw()}
  el.orbit.onclick=()=>switchMode('orbit');el.solar.onclick=()=>switchMode('solar');[el.a,el.b,el.eta].forEach(input=>input.addEventListener('input',draw));el.play.onclick=()=>{S.running=!S.running;el.play.textContent=S.running?'装置动画：暂停':'装置动画：播放';draw()};el.step.onclick=()=>{S.running=false;el.play.textContent='装置动画：播放';S.time+=.25;draw()};el.reset.onclick=reset;
  function point(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
  function setA(p){const L=layout(),min=+el.a.min,max=+el.a.max;el.a.value=(min+clamp((p.x-L.left)/Math.max(1,L.right-L.left),0,1)*(max-min)).toFixed(S.mode==='orbit'?0:1);draw()}
  canvas.addEventListener('pointerdown',e=>{const p=point(e);if(p.y>62&&p.y<250){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setA(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setA(point(e))});canvas.addEventListener('pointerup',e=>{S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>S.drag=false);
  function resize(){const r=canvas.getBoundingClientRect();W=clamp(r.width||960,320,960);H=W<640?590:620;dpr=Math.min(window.devicePixelRatio||1,2);canvas.style.height=H+'px';canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
  function loop(now){const dt=Math.min(Math.max((now-last)/1000,0),.04);last=now;if(S.running){S.time+=dt;if(S.mode==='orbit'&&performance.now()-S.lastHistory>100){S.history.push({a:S.time*.9});S.history=S.history.slice(-50);S.lastHistory=performance.now()}if(S.time>20)S.time=0}draw();requestAnimationFrame(loop)}
  if(window.ResizeObserver)new ResizeObserver(resize).observe(canvas);renderQuestion();resize();requestAnimationFrame(loop);
  const optionFeedbackObserver=new MutationObserver(()=>{
    el.questionArea.querySelectorAll('.option').forEach(option=>{
      if(option.dataset.auditFeedbackBound==='1')return;
      option.dataset.auditFeedbackBound='1';
      option.addEventListener('click',()=>setTimeout(()=>{
        if(S.selected!==null) el.status.textContent='当前选择：'+String.fromCharCode(65+S.selected)+'。请提交答案查看解析。';
      },0));
    });
  });
  optionFeedbackObserver.observe(el.questionArea,{childList:true,subtree:true});
  el.questionArea.querySelectorAll('.option').forEach(option=>option.dataset.auditFeedbackBound='0');
  el.questionArea.appendChild(document.createComment('bind option feedback'));
  setInterval(()=>{
    if(S.selected!==null&&!S.answered) el.status.textContent='当前选择：'+String.fromCharCode(65+S.selected)+'。请提交答案查看解析。';
  },30);
})();
</script>

<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
