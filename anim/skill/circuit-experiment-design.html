<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电路实验设计专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:12px;padding:12px;min-height:700px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}.panel{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:900;margin-bottom:7px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px}.tabs button.active,.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:3px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;gap:8px;color:#486581}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range],select{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.6;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.status.bad{background:#fff5f5;color:#c92a2a;border-color:#ffa8a8}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:880px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="930" height="620" aria-label="电路实验设计专题实验台：电源、电流表、电压表、滑动变阻器、内接外接、分压限流、电路图像和数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动滑片，切换内接/外接与分压/限流，看电表读数、调节范围和测量误差如何改变。</div>
    <div class="card">
      <div class="title">方案选择</div>
      <div class="tabs"><button id="inner">内接法</button><button id="outer" class="active">外接法</button></div>
      <div class="tabs" style="margin-top:6px"><button id="divider" class="active">分压式</button><button id="limiter">限流式</button></div>
      <label class="param"><span>待测电阻 Rx <b id="rxLabel">20.0 Ω</b></span><input id="rx" type="range" min="2" max="80" step="1" value="20"></label>
      <label class="param"><span>滑片位置 <b id="posLabel">0.50</b></span><input id="pos" type="range" min="0.05" max="0.95" step="0.01" value="0.5"></label>
      <label class="param"><span>电源电压 <b id="eLabel">6.0 V</b></span><input id="emf" type="range" min="2" max="12" step="0.1" value="6"></label>
      <div class="buttons"><label>电流表量程<select id="aRange"><option value="0.6" selected>0.6 A</option><option value="3">3 A</option></select></label><label>电压表量程<select id="vRange"><option value="3" selected>3 V</option><option value="15">15 V</option></select></label></div>
      <div class="buttons"><button id="play">播放调节</button><button id="record">记录方案</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">方案记录</div><table><thead><tr><th>接法</th><th>调节</th><th>R测</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula">
      <div class="title">设计判据</div>
      <div>内接法：电压表测 Rx 与 A，总电压偏大，R测偏大</div>
      <div>外接法：电流表测 Rx 与 V，总电流偏大，R测偏小</div>
      <div>分压式：电压可从近 0 连续调节</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const E={inner:document.getElementById('inner'),outer:document.getElementById('outer'),divider:document.getElementById('divider'),limiter:document.getElementById('limiter'),rx:document.getElementById('rx'),pos:document.getElementById('pos'),emf:document.getElementById('emf'),aRange:document.getElementById('aRange'),vRange:document.getElementById('vRange'),rxLabel:document.getElementById('rxLabel'),posLabel:document.getElementById('posLabel'),eLabel:document.getElementById('eLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7048e8'};
const S={inner:false,divider:true,run:false,t:0,drag:false,records:[]};
const RA=.5,RV=2000,RP=50,PRATED=2;
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
function text(s,x,y,c=C.ink,a='center',z=13,w='800'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function values(){const rx=+E.rx.value,e=+E.emf.value,p=+E.pos.value,aRange=+E.aRange.value,vRange=+E.vRange.value,Rtop=RP*(1-p),Rbottom=RP*p;let Vth,Rth;if(S.divider){Vth=e*p;Rth=Rtop*Rbottom/(Rtop+Rbottom)}else{Vth=e;Rth=Rtop}let Rload,u,i,ix,sourceI,terminal;if(S.inner){const branch=rx+RA;Rload=branch*RV/(branch+RV);terminal=Vth*Rload/(Rth+Rload);i=terminal/branch;ix=i;u=terminal;sourceI=terminal/Rload}else{const parallel=rx*RV/(rx+RV);Rload=RA+parallel;sourceI=Vth/(Rth+Rload);terminal=sourceI*Rload;i=sourceI;u=sourceI*parallel;ix=u/rx}const rmeas=u/i,err=(rmeas-rx)/rx*100,rheoPower=S.divider?Math.pow((e-terminal)/Rtop,2)*Rtop+Math.pow(terminal/Rbottom,2)*Rbottom:sourceI*sourceI*Rth,overA=Math.abs(i)>aRange,overV=Math.abs(u)>vRange,overR=rheoPower>PRATED,innerRel=RA/rx,outerRel=rx/RV,recommended=innerRel<=outerRel?'内接':'外接';return{rx,e,p,u,i,ix,sourceI,terminal,rmeas,err,rheoPower,overA,overV,overR,recommended,aRange,vRange,Rth,Rload}}
function draw(){const v=values();ctx.clearRect(0,0,930,620);box(34,30,862,548,'#fff');text('G-05 电路实验设计：拓扑、内阻、量程和安全来自同一电路',465,56,C.ink,'center',17,'900');drawCircuit(v);drawGraph(v);drawFlow(v);update(v);canvas.dataset.circuitModel='loaded-thevenin-topology-ranges-and-power-safety';window.__ANIM_TEST_STATE__={inner:S.inner,divider:S.divider,running:S.run,values:v}}
function meter(x,y,label,val,unit,c){ctx.fillStyle='#fff';ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,26,0,7);ctx.fill();ctx.stroke();text(label,x,y-6,c,'center',12,'900');text(val.toFixed(unit==='A'?3:2)+unit,x,y+11,C.ink,'center',10,'800')}
function drawCircuit(v){box(70,88,560,250,'#fbfdff');text('当前真实拓扑：'+(S.inner?'电流表内接':'电流表外接')+' + '+(S.divider?'分压式':'限流式'),350,108,C.muted,'center',12,'900');const left=120,right=585,top=176,bottom=276,rxL=245,rxR=325,aX=425;line(left,top,rxL,top,C.ink,3);box(rxL,top-22,rxR-rxL,44,'#eef4ff','#2c7be5');text('Rx '+v.rx.toFixed(0)+'Ω',(rxL+rxR)/2,top,C.blue,'center',12,'900');line(rxR,top,aX-28,top,C.ink,3);meter(aX,top,'A',v.i,'A',C.red);line(aX+28,top,right,top,C.ink,3);line(right,top,right,bottom,C.ink,3);line(right,bottom,left,bottom,C.ink,3);line(left,bottom,left,top,C.ink,3);box(left-24,top+25,48,52,'#fff7e6','#f0a500');text(v.e.toFixed(1)+'V',left,top+51,C.gold,'center',11,'900');const vLeft=rxL,vRight=S.inner?aX+28:rxR,vY=124;line(vLeft,top,vLeft,vY,C.green,2);line(vRight,top,vRight,vY,C.green,2);line(vLeft,vY,(vLeft+vRight)/2-28,vY,C.green,2);line((vLeft+vRight)/2+28,vY,vRight,vY,C.green,2);meter((vLeft+vRight)/2,vY,'V',v.u,'V',C.green);line(left+78,bottom,right-65,bottom,'#52606d',6);const sx=left+78+v.p*(right-left-143);arrow(sx,bottom+48,sx,bottom+8,C.red,3);text(S.divider?'滑片作分压抽头':'滑片改变串联限流电阻',sx,bottom+62,C.red,'center',10,'900');text(S.inner?'V 跨接 Rx+A，A 只读 Rx 支路电流':'V 只跨接 Rx，A 读 Rx 与 V 的总电流',350,326,C.green,'center',11,'900')}
function drawGraph(v){box(70,360,560,170,'#fff');text('数据图像：U-I 点与 R测=U/I',350,382,C.muted,'center',12,'900');const x0=112,y0=496,w=455,h=86;arrow(x0,y0,x0+w+18,y0,'#52606d',2);arrow(x0,y0,x0,y0-h-18,'#52606d',2);text('I/A',x0+w+30,y0,C.muted,'left',12,'800');text('U/V',x0-4,y0-h-30,C.muted,'right',12,'800');for(let i=0;i<=5;i++){line(x0+i*w/5,y0,x0+i*w/5,y0-h,'rgba(130,154,177,.16)',1);line(x0,y0-i*h/5,x0+w,y0-i*h/5,'rgba(130,154,177,.16)',1)}const maxI=Math.max(.05,+E.emf.value/+E.rx.value),px=x0+Math.min(1,v.i/maxI)*w,py=y0-Math.min(1,v.u/+E.emf.value)*h;line(x0,y0,px,py,C.blue,3);ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(px,py,9,0,7);ctx.fill();text('记录点',px,py-20,C.gold,'center',11,'900');text('多视角：实物装置 + 电路图 + U-I 图像 + 电表记录',350,520,C.purple,'center',12,'900')}
function drawFlow(v){box(664,88,196,444,'#fff');text('设计流程',762,114,C.ink,'center',14,'900');['明确测什么','估计电阻大小','选内接/外接','选分压/限流','检查量程','判断误差方向'].forEach((s,i)=>{box(686,142+i*54,152,34,i===2?'#fff7e6':i===3?'#e6fffa':'#eef4ff');text(s,762,159+i*54,i===2?C.gold:i===3?C.green:C.blue,'center',12,'900')});text('R测='+v.rmeas.toFixed(2)+'Ω',762,474,C.red,'center',14,'900');text('误差 '+v.err.toFixed(1)+'%',762,502,C.muted,'center',12,'800')}
function update(v){E.inner.classList.toggle('active',S.inner);E.outer.classList.toggle('active',!S.inner);E.divider.classList.toggle('active',S.divider);E.limiter.classList.toggle('active',!S.divider);E.rxLabel.textContent=v.rx.toFixed(1)+' Ω';E.posLabel.textContent=v.p.toFixed(2);E.eLabel.textContent=v.e.toFixed(1)+' V';E.readout.innerHTML='电压表：<b>'+v.u.toFixed(2)+' / '+v.vRange.toFixed(1)+' V</b><br>电流表：<b>'+v.i.toFixed(3)+' / '+v.aRange.toFixed(1)+' A</b><br>测得电阻：<b>'+v.rmeas.toFixed(2)+' Ω（'+(v.err>0?'偏大':'偏小')+' '+Math.abs(v.err).toFixed(2)+'%）</b><br>滑变器功率：<b>'+v.rheoPower.toFixed(2)+' / '+PRATED.toFixed(1)+' W</b>';E.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.s+'</td><td>'+r.r+'</td></tr>').join('')||'<tr><td colspan="3">暂无记录</td></tr>';const unsafe=v.overA||v.overV||v.overR;E.status.classList.toggle('bad',unsafe);E.status.textContent=unsafe?'安全门禁失败：'+[v.overA?'电流表过量程':'',v.overV?'电压表过量程':'',v.overR?'滑变器功率超额定':''].filter(Boolean).join('；')+'。先改量程、电源或方案。':'当前未过载；按 RA='+RA+'Ω、RV='+RV+'Ω 比较误差，建议优先'+v.recommended+'。临界 Rx≈√(RA·RV)='+Math.sqrt(RA*RV).toFixed(1)+'Ω。'}
function record(){const v=values();S.records.push({m:S.inner?'内接':'外接',s:S.divider?'分压':'限流',r:v.rmeas.toFixed(2)});if(S.records.length>8)S.records.shift();update(v)}
E.inner.onclick=()=>{S.inner=true;draw()};E.outer.onclick=()=>{S.inner=false;draw()};E.divider.onclick=()=>{S.divider=true;draw()};E.limiter.onclick=()=>{S.divider=false;draw()};[E.rx,E.pos,E.emf,E.aRange,E.vRange].forEach(el=>el.addEventListener('input',draw));E.record.onclick=record;E.play.onclick=()=>{S.run=!S.run;E.play.textContent=S.run?'暂停调节':'播放调节'};function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setPos(p){E.pos.value=Math.max(.05,Math.min(.95,(p.x-198)/(585-120-143))).toFixed(2);draw()}canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>170&&p.x<560&&p.y>245&&p.y<340){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setPos(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setPos(pos(e))});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run&&!S.drag){S.t+=dt;E.pos.value=(.5+.38*Math.sin(S.t*.7)).toFixed(2)}draw();requestAnimationFrame(loop)}record();loop();
S.t=0;last=performance.now();setTimeout(()=>loop(performance.now()),0);
})();
</script>
<script src="guided-lesson.js"></script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
