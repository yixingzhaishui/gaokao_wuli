<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电路实验设计专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:12px;padding:12px;min-height:700px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}.panel{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:900;margin-bottom:7px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px}.tabs button.active,.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:3px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;gap:8px;color:#486581}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.6;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:880px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="930" height="620" aria-label="电路实验设计专题实验台：电源、电流表、电压表、滑动变阻器、内接外接、分压限流、电路图像和数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动滑片，切换内接/外接与分压/限流，看电表读数、调节范围和测量误差如何改变。</div>
    <div class="card">
      <div class="title">方案选择</div>
      <div class="tabs"><button id="inner">内接法</button><button id="outer" class="active">外接法</button></div>
      <div class="tabs" style="margin-top:6px"><button id="divider" class="active">分压式</button><button id="limiter">限流式</button></div>
      <label class="param"><span>待测电阻 Rx <b id="rxLabel">20.0 Ω</b></span><input id="rx" type="range" min="2" max="80" step="1" value="20"></label>
      <label class="param"><span>滑片位置 <b id="posLabel">0.50</b></span><input id="pos" type="range" min="0.05" max="0.95" step="0.01" value="0.5"></label>
      <label class="param"><span>电源电压 <b id="eLabel">6.0 V</b></span><input id="emf" type="range" min="2" max="12" step="0.1" value="6"></label>
      <div class="buttons"><button id="play">暂停</button><button id="record">记录方案</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">方案记录</div><table><thead><tr><th>接法</th><th>调节</th><th>R测</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula">
      <div class="title">设计判据</div>
      <div>内接法：电压表测 Rx 与 A，总电压偏大，R测偏大</div>
      <div>外接法：电流表测 Rx 与 V，总电流偏大，R测偏小</div>
      <div>分压式：电压可从近 0 连续调节</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const E={inner:document.getElementById('inner'),outer:document.getElementById('outer'),divider:document.getElementById('divider'),limiter:document.getElementById('limiter'),rx:document.getElementById('rx'),pos:document.getElementById('pos'),emf:document.getElementById('emf'),rxLabel:document.getElementById('rxLabel'),posLabel:document.getElementById('posLabel'),eLabel:document.getElementById('eLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7048e8'};
const S={inner:false,divider:true,run:true,t:0,drag:false,records:[]};
const RA=.5,RV=2000,RP=50;
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
function text(s,x,y,c=C.ink,a='center',z=13,w='800'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function values(){const rx=+E.rx.value,e=+E.emf.value,p=+E.pos.value;let ux=S.divider?e*p:e*rx/(rx+RP*(1-p));let ix=ux/rx;let u=ux,i=ix;if(S.inner){u=ux+ix*RA;i=ix}else{u=ux;i=ix+ux/RV}return{rx,e,p,ux,ix,u,i,rmeas:u/i,err:(u/i-rx)/rx*100}}
function draw(){const v=values();ctx.clearRect(0,0,930,620);box(34,30,862,548,'#fff');text('G-05 电路实验设计：先定目标，再选接法、量程和滑变器方案',465,56,C.ink,'center',17,'900');drawCircuit(v);drawGraph(v);drawFlow(v);update(v)}
function meter(x,y,label,val,unit,c){ctx.fillStyle='#fff';ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,26,0,7);ctx.fill();ctx.stroke();text(label,x,y-6,c,'center',12,'900');text(val.toFixed(unit==='A'?3:2)+unit,x,y+11,C.ink,'center',10,'800')}
function drawCircuit(v){box(70,88,560,250,'#fbfdff');text('电路装置与原理图：电表、滑动变阻器、待测电阻同步显示',350,112,C.muted,'center',12,'900');const x=140,y=218;line(x,y,x+380,y,C.ink,3);line(x,y,x,y-90,C.ink,3);line(x+380,y,x+380,y-90,C.ink,3);line(x,y-90,x+380,y-90,C.ink,3);box(x-30,y-30,60,45,'#fff7e6','#f0a500');text('电源 '+v.e.toFixed(1)+'V',x,y-8,C.gold,'center',11,'900');box(x+150,y-113,80,45,'#eef4ff','#2c7be5');text('Rx',x+190,y-91,C.blue,'center',13,'900');meter(x+285,y-90,'A',v.i,'A',C.red);meter(S.inner?x+190:x+255,y-145,'V',v.u,'V',C.green);line(x+72,y,x+306,y,'#52606d',5);const sx=x+72+v.p*234;arrow(sx,y+52,sx,y+8,C.red,3);text('拖动滑片',sx,y+66,C.red,'center',12,'900');text(S.divider?'分压式：电压可接近 0 起调':'限流式：电流受限但低电压范围较窄',350,314,C.green,'center',12,'900')}
function drawGraph(v){box(70,360,560,170,'#fff');text('数据图像：U-I 点与 R测=U/I',350,382,C.muted,'center',12,'900');const x0=112,y0=496,w=455,h=86;arrow(x0,y0,x0+w+18,y0,'#52606d',2);arrow(x0,y0,x0,y0-h-18,'#52606d',2);text('I/A',x0+w+30,y0,C.muted,'left',12,'800');text('U/V',x0-4,y0-h-30,C.muted,'right',12,'800');for(let i=0;i<=5;i++){line(x0+i*w/5,y0,x0+i*w/5,y0-h,'rgba(130,154,177,.16)',1);line(x0,y0-i*h/5,x0+w,y0-i*h/5,'rgba(130,154,177,.16)',1)}const maxI=Math.max(.05,+E.emf.value/+E.rx.value),px=x0+Math.min(1,v.i/maxI)*w,py=y0-Math.min(1,v.u/+E.emf.value)*h;line(x0,y0,px,py,C.blue,3);ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(px,py,9,0,7);ctx.fill();text('记录点',px,py-20,C.gold,'center',11,'900');text('多视角：实物装置 + 电路图 + U-I 图像 + 电表记录',350,520,C.purple,'center',12,'900')}
function drawFlow(v){box(664,88,196,444,'#fff');text('设计流程',762,114,C.ink,'center',14,'900');['明确测什么','估计电阻大小','选内接/外接','选分压/限流','检查量程','判断误差方向'].forEach((s,i)=>{box(686,142+i*54,152,34,i===2?'#fff7e6':i===3?'#e6fffa':'#eef4ff');text(s,762,159+i*54,i===2?C.gold:i===3?C.green:C.blue,'center',12,'900')});text('R测='+v.rmeas.toFixed(2)+'Ω',762,474,C.red,'center',14,'900');text('误差 '+v.err.toFixed(1)+'%',762,502,C.muted,'center',12,'800')}
function update(v){E.inner.classList.toggle('active',S.inner);E.outer.classList.toggle('active',!S.inner);E.divider.classList.toggle('active',S.divider);E.limiter.classList.toggle('active',!S.divider);E.rxLabel.textContent=v.rx.toFixed(1)+' Ω';E.posLabel.textContent=v.p.toFixed(2);E.eLabel.textContent=v.e.toFixed(1)+' V';E.readout.innerHTML='电压表读数：<b>'+v.u.toFixed(2)+' V</b><br>电流表读数：<b>'+v.i.toFixed(3)+' A</b><br>测得电阻：<b>'+v.rmeas.toFixed(2)+' Ω</b><br>误差方向：<b>'+(v.err>0?'偏大':'偏小')+'</b>';E.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.s+'</td><td>'+r.r+'</td></tr>').join('')||'<tr><td colspan="3">暂无记录</td></tr>';E.status.textContent=v.rx>30?'提示：大电阻常优先考虑电流表内接，减小电压表分流影响。':'提示：小电阻常优先考虑电流表外接，减小电流表分压影响。'}
function record(){const v=values();S.records.push({m:S.inner?'内接':'外接',s:S.divider?'分压':'限流',r:v.rmeas.toFixed(2)});if(S.records.length>8)S.records.shift();update(v)}
E.inner.onclick=()=>{S.inner=true;draw()};E.outer.onclick=()=>{S.inner=false;draw()};E.divider.onclick=()=>{S.divider=true;draw()};E.limiter.onclick=()=>{S.divider=false;draw()};[E.rx,E.pos,E.emf].forEach(el=>el.addEventListener('input',draw));E.record.onclick=record;E.play.onclick=()=>{S.run=!S.run;E.play.textContent=S.run?'暂停':'播放'};function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setPos(p){E.pos.value=Math.max(.05,Math.min(.95,(p.x-212)/234)).toFixed(2);draw()}canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>190&&p.x<480&&p.y>190&&p.y<300){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setPos(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setPos(pos(e))});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run&&!S.drag){S.t+=dt;E.pos.value=(.5+.38*Math.sin(S.t*.7)).toFixed(2)}draw();requestAnimationFrame(loop)}record();loop();
S.t=0;last=performance.now();setTimeout(()=>loop(performance.now()),0);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
