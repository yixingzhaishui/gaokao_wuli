<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>误差分析专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:12px;padding:12px;min-height:700px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}.panel{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:900;margin-bottom:7px}.param{display:grid;gap:3px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;gap:8px;color:#486581}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.active{background:#102a43;color:#fff;border-color:#102a43}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.6;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:880px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="930" height="620" aria-label="误差分析专题实验台：装置读数、数据散点、平均值、系统误差、偶然误差、相对误差、多视角图像记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动红色零点指针，比较“平均值变稳”和“系统偏差仍在”的区别。</div>
    <div class="card">
      <div class="title">误差来源</div>
      <label class="param"><span>真实值 <b id="trueLabel">10.00</b></span><input id="trueValue" type="range" min="6" max="14" step="0.1" value="10"></label>
      <label class="param"><span>系统误差 <b id="sysLabel">0.60</b></span><input id="sys" type="range" min="-2" max="2" step="0.05" value="0.6"></label>
      <label class="param"><span>偶然误差幅度 <b id="ranLabel">0.45</b></span><input id="random" type="range" min="0" max="1.5" step="0.05" value="0.45"></label>
      <label class="param"><span>测量次数 <b id="nLabel">5</b></span><input id="n" type="range" min="1" max="8" step="1" value="5"></label>
      <div class="buttons"><button id="play">暂停</button><button id="correct">零误差修正</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">测量记录</div><table><thead><tr><th>次序</th><th>读数</th><th>偏差</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula">
      <div class="title">误差公式</div>
      <div>绝对误差：Δ=|测量值-真实值|</div>
      <div>相对误差：δ=Δ/真实值×100%</div>
      <div>修正值：x=读数-零误差</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const E={trueValue:document.getElementById('trueValue'),sys:document.getElementById('sys'),random:document.getElementById('random'),n:document.getElementById('n'),trueLabel:document.getElementById('trueLabel'),sysLabel:document.getElementById('sysLabel'),ranLabel:document.getElementById('ranLabel'),nLabel:document.getElementById('nLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),correct:document.getElementById('correct')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7048e8'};
const S={run:true,t:0,drag:false,correct:false,seed:[-.70,.38,.15,-.22,.62,-.42,.28,-.12]};
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
function text(s,x,y,c=C.ink,a='center',z=13,w='800'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function readings(){const tv=+E.trueValue.value,sys=+E.sys.value,ran=+E.random.value,n=+E.n.value;return S.seed.slice(0,n).map((e,i)=>{const raw=tv+sys+e*ran+(S.run?Math.sin(S.t*1.6+i)*ran*.08:0);return{raw,fix:S.correct?raw-sys:raw,err:raw-tv}})}
function stats(arr){const xs=arr.map(p=>p.fix),avg=xs.reduce((a,b)=>a+b,0)/xs.length,tv=+E.trueValue.value,abs=Math.abs(avg-tv),rel=abs/tv*100;return{avg,abs,rel}}
function draw(){const arr=readings(),st=stats(arr);ctx.clearRect(0,0,930,620);box(34,30,862,548,'#fff');text('G-04 误差分析：偶然误差靠平均，系统误差靠修正',465,56,C.ink,'center',17,'900');drawApparatus(arr,st);drawPlot(arr,st);drawFlow(st);update(arr,st)}
function mapY(v){return 500-(v-4)/12*330}
function drawApparatus(arr,st){box(70,88,560,170,'#fbfdff');text('侧视装置：刻度尺零点偏移会造成系统误差',350,112,C.muted,'center',12,'900');const x0=112,y=184;line(x0,y,x0+440,y,'#52606d',5);for(let i=0;i<=12;i++){const x=x0+i*36;line(x,y-18,x,y+16,'#52606d',1);text(String(i),x,y+36,C.muted,'center',10,'700')}const zero=x0+(+E.sys.value)*36;arrow(zero,118,zero,154,C.red,3);text('拖动零点偏差',zero,104,C.red,'center',12,'900');ctx.fillStyle='#2c7be5';ctx.fillRect(x0+(+E.trueValue.value)*36-8,154,16,40);text('真实位置',x0+(+E.trueValue.value)*36,140,C.blue,'center',11,'900');text('读数表会整体偏大/偏小，这不是多测几次就能消失',350,238,C.green,'center',12,'900')}
function drawPlot(arr,st){box(70,282,560,250,'#fbfdff');text('俯视数据图像：散点宽度=偶然误差，整体偏移=系统误差',350,304,C.muted,'center',12,'900');const x0=118,y0=500,w=450,h=180;arrow(x0,y0,x0+w+18,y0,'#52606d',2);arrow(x0,y0,x0,y0-h-20,'#52606d',2);text('测量次序',x0+w+30,y0,C.muted,'left',12,'800');text('读数',x0-4,y0-h-30,C.muted,'right',12,'800');for(let v=4;v<=16;v+=2){line(x0,y0-(v-4)/12*h,x0+w,y0-(v-4)/12*h,'rgba(130,154,177,.16)',1);text(v,x0-14,y0-(v-4)/12*h,C.muted,'right',10,'700')}const tv=+E.trueValue.value;line(x0,mapY(tv),x0+w,mapY(tv),C.green,2,[6,5]);text('真实值',x0+48,mapY(tv)-14,C.green,'center',11,'900');line(x0,mapY(st.avg),x0+w,mapY(st.avg),C.blue,3);text('平均值',x0+48,mapY(st.avg)+14,C.blue,'center',11,'900');arr.forEach((p,i)=>{const x=x0+45+i*(w-90)/Math.max(1,arr.length-1);ctx.fillStyle=Math.abs(p.err)>1?C.red:C.gold;ctx.beginPath();ctx.arc(x,mapY(p.fix),9,0,7);ctx.fill();line(x,mapY(tv),x,mapY(p.fix),C.red,1,[4,4])});text('多视角：装置零点 + 数据散点 + 平均线/真实线',350,522,C.purple,'center',12,'900')}
function drawFlow(st){box(664,88,196,444,'#fff');text('分析流程',762,114,C.ink,'center',14,'900');['判定误差类型','偶然误差：多次平均','系统误差：校准修正','算绝对误差 Δ','算相对误差 δ','写改进方案'].forEach((s,i)=>{box(686,142+i*54,152,34,i===0?'#eef4ff':i===1?'#fff7e6':i===2?'#e6fffa':'#fff');text(s,762,159+i*54,i===1?C.gold:i===2?C.green:C.blue,'center',12,'900')});text('δ='+st.rel.toFixed(1)+'%',762,476,C.red,'center',14,'900');text('公式绑定：Δ=|x-x0|',762,502,C.muted,'center',12,'800')}
function update(arr,st){E.trueLabel.textContent=(+E.trueValue.value).toFixed(2);E.sysLabel.textContent=(+E.sys.value).toFixed(2);E.ranLabel.textContent=(+E.random.value).toFixed(2);E.nLabel.textContent=E.n.value;E.correct.textContent=S.correct?'取消修正':'零误差修正';E.correct.classList.toggle('active',S.correct);E.readout.innerHTML='平均值：<b>'+st.avg.toFixed(3)+'</b><br>绝对误差 Δ：<b>'+st.abs.toFixed(3)+'</b><br>相对误差 δ：<b>'+st.rel.toFixed(1)+'%</b><br>当前处理：<b>'+(S.correct?'已修正零误差':'未修正零误差')+'</b>';E.rows.innerHTML=arr.map((p,i)=>'<tr><td>'+(i+1)+'</td><td>'+p.fix.toFixed(2)+'</td><td>'+p.err.toFixed(2)+'</td></tr>').join('');E.status.textContent=st.rel<2?'判定：误差较小，结论可信。':'判定：误差偏大，优先检查零点、量程、摩擦、读数视线和环境条件。'}
function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setSys(p){E.sys.value=Math.max(-2,Math.min(2,(p.x-112)/36)).toFixed(2);draw()}canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>70&&p.x<630&&p.y>80&&p.y<260){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setSys(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setSys(pos(e))});canvas.addEventListener('pointerup',e=>{S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});[E.trueValue,E.sys,E.random,E.n].forEach(el=>el.addEventListener('input',draw));E.correct.onclick=()=>{S.correct=!S.correct;draw()};E.play.onclick=()=>{S.run=!S.run;E.play.textContent=S.run?'暂停':'播放'};let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run)S.t+=dt;draw();requestAnimationFrame(loop)}loop();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
