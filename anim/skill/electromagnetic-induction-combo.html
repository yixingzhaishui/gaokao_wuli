<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁感应综合专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:10px;padding:10px;max-width:1280px;margin:auto}
.stage,.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px}
.stage{overflow:hidden}
canvas{display:block;width:100%;height:620px;touch-action:none;cursor:grab}
.panel{display:flex;flex-direction:column;gap:8px}
.card{padding:9px}
.task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.55}
.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.params{display:grid;gap:6px}
.param{display:grid;gap:2px;font-size:12px;color:#475569}
.param span{display:flex;justify-content:space-between;gap:8px}
.param b,.readout b{color:#102a43;font-variant-numeric:tabular-nums}
input[type=range]{width:100%;accent-color:#2563eb}
button{min-height:32px;padding:4px 6px;border:1px solid #94a3b8;border-radius:7px;background:#fff;color:#102a43;cursor:pointer;font:inherit;font-size:12px}
button:hover{background:#f1f5f9}
button.primary{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:800}
.readout{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#0f172a;border-radius:8px;padding:8px;color:#dbeafe;font-size:11px}
.readout div{border-bottom:1px solid #334155;padding-bottom:4px}
.readout div:nth-last-child(-n+2){border-bottom:0;padding-bottom:0}
.readout b{display:block;margin-top:2px;color:#fbbf24;font-size:14px}
.formula{font-size:12px;line-height:1.55;color:#475569}
.formula div{padding:3px 0;border-bottom:1px dashed #d7dee8}
.formula div:last-child{border-bottom:0}
.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;line-height:1.5;font-weight:800}
@media(max-width:880px){.root{grid-template-columns:1fr;padding:6px}.panel{gap:6px}canvas{height:590px}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="620" aria-label="电磁感应综合实验台：导体棒在磁场中运动，磁通量、感应电流、安培力和能量读数同步变化"></canvas></div>
  <div class="panel">
    <div class="card task"><b>只追一条链：</b>导体棒移动 → 回路面积和磁通量 Φ 改变 → 感应电流 I 出现 → 安培力反向阻碍运动 → 机械功转成电热。<b>拖动橙色导体棒时，观察电流方向如何反转。</b></div>
    <div class="toolbar"><button id="play" class="primary">播放</button><button id="step">单步</button><button id="reset">重置</button></div>
    <div class="card params">
      <label class="param"><span>磁感应强度 B <b id="bLabel">0.60 T</b></span><input id="B" type="range" min="0.1" max="1.2" step="0.05" value="0.6"></label>
      <label class="param"><span>导体棒长度 L <b id="lLabel">0.50 m</b></span><input id="L" type="range" min="0.2" max="1" step="0.05" value="0.5"></label>
      <label class="param"><span>速度大小 |v| <b id="vLabel">3.0 m/s</b></span><input id="v" type="range" min="0" max="5" step="0.1" value="3"></label>
      <label class="param"><span>电阻 R <b id="rLabel">2.0 Ω</b></span><input id="R" type="range" min="0.5" max="8" step="0.1" value="2"></label>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card formula"><b>公式和画面绑定</b><div>磁通量：Φ=B·S，S 对应导体棒位置围成的面积</div><div>动生电动势：|ε|=BL|v|=|ΔΦ/Δt|</div><div>安培力：F安=BIL，方向总是阻碍相对运动</div><div>能量：P机械=|F安·v|=I²R</div></div>
    <div class="card"><b>观察任务</b>：先只增大速度 |v|，比较 ε、I 和安培力；再分别改变 B 与 R，验证感应电流方向始终使安培力阻碍相对运动，并核对机械功率与 I²R。</div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const el={B:document.getElementById('B'),L:document.getElementById('L'),v:document.getElementById('v'),R:document.getElementById('R'),bLabel:document.getElementById('bLabel'),lLabel:document.getElementById('lLabel'),vLabel:document.getElementById('vLabel'),rLabel:document.getElementById('rLabel'),play:document.getElementById('play'),step:document.getElementById('step'),reset:document.getElementById('reset'),readout:document.getElementById('readout'),status:document.getElementById('status')};
  const C={ink:'#102a43',muted:'#64748b',grid:'#dbe5ef',blue:'#2563eb',orange:'#ea580c',green:'#059669',gold:'#d97706',purple:'#7c3aed',red:'#dc2626',pink:'#db2777'};
  const S={running:false,position:.28,heading:1,drag:false,manualV:0,lastX:0,history:[],lastHistory:-1};
  let W=960,H=620,dpr=1,last=performance.now();
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const fmt=(v,d=2)=>Number.isFinite(v)?v.toFixed(d):'—';
  function box(x,y,w,h,fill='#fff',stroke='#cbd5e1'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
  function text(s,x,y,color=C.ink,align='center',size=13,weight='700'){ctx.fillStyle=color;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,color=C.muted,width=2,dash){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,color=C.blue,width=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,color,width);ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
  function layout(){const small=W<640;return{small,left:small?28:58,right:small?W-22:W-35,railY:small?118:136,graphY:small?292:310,chartH:small?126:220}}
  function model(){const B=+el.B.value,L=+el.L.value,vSetting=+el.v.value,R=+el.R.value,actualV=S.drag?S.manualV:vSetting*S.heading,flux=B*L*S.position,fluxRate=B*L*actualV,eps=B*L*actualV,I=eps/R,F=-B*I*L,Pmech=Math.abs(F*actualV),Pheat=I*I*R;return{B,L,vSetting,R,actualV,flux,fluxRate,eps,I,F,Pmech,Pheat,dir:Math.abs(actualV)<.01?'无电流':actualV>0?'逆时针':'顺时针'}}
  function drawField(x,y,w,h){ctx.save();ctx.fillStyle='#e0f2fe';ctx.fillRect(x,y,w,h);for(let i=0;i<6;i++)for(let j=0;j<4;j++)text('×',x+45+i*58,y+30+j*40,C.blue,'center',17,'900');ctx.restore();text('B 垂直纸面向里',x+w-8,y+14,C.blue,'right',11,'800')}
  function drawRod(x,y,color){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(x,y-52);ctx.lineTo(x,y+52);ctx.stroke();ctx.strokeStyle='#7c2d12';ctx.lineWidth=2;ctx.stroke();ctx.restore()}
  function drawAmmeter(x,y,value,dir){box(x,y,72,74,'#0f172a','#334155');ctx.strokeStyle='#94a3b8';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x+36,y+35,23,Math.PI,Math.PI*2);ctx.stroke();const needle=clamp(value,-1,1)*20;line(x+36,y+35,x+36+needle,y+14,C.gold,3);text('G',x+36,y+53,'#dbeafe','center',11,'800');text(dir,x+36,y+67,value===0?C.muted:C.gold,'center',9,'800')}
  function drawScene(m,L){
    box(24,34,W-48,244,'#fbfdff');text(L.small?'导体棒在磁场中移动':'导轨实验台：橙色导体棒移动，蓝色磁场穿过回路',W/2,58,C.ink,'center',Math.max(14,Math.min(17,W/52)),'900');
    const x0=L.left+30,x1=L.right-80,railTop=L.railY-62,railBottom=L.railY+62;drawField(x0,railTop,x1-x0,124);line(x0,railTop,x1,railTop,C.muted,4);line(x0,railBottom,x1,railBottom,C.muted,4);line(x0,railTop,x0,railBottom,C.muted,4);
    const rodX=x0+clamp(S.position,0,1)*(x1-x0);drawRod(rodX,L.railY,m.drag?C.gold:C.orange);
    const motionColor=m.actualV===0?C.muted:m.actualV>0?C.green:C.red;arrow(rodX+18,L.railY-79,rodX+18+m.actualV*12,L.railY-79,motionColor,3);if(!L.small)text('v='+fmt(m.actualV,1)+' m/s',rodX+18,L.railY-94,motionColor,'center',10,'800');
    const currentColor=m.I===0?C.muted:m.I>0?C.purple:C.pink;arrow(x0+34,railTop+12,x0+105,railTop+12,currentColor,3);arrow(x1-105,railBottom-12,x1-34,railBottom-12,currentColor,3);text(m.dir,x0+70,L.railY+78,currentColor,'center',11,'900');drawAmmeter(x0-4,L.railY-37,m.I/3,m.dir);
    const forceColor=m.F===0?C.muted:m.F>0?C.red:C.green;arrow(rodX,L.railY+88,rodX-m.F*18,L.railY+88,forceColor,3);text(L.small?'F安阻碍运动':'F安='+fmt(Math.abs(m.F),2)+' N，阻碍运动',rodX,L.railY+105,forceColor,'center',10,'800');
    line(rodX,railTop-8,rodX,railBottom+8,C.gold,2,[4,3]);text('面积 S 对应 Φ=B·S',W/2,L.small?238:224,C.purple,'center',11,'800');text(L.small?'拖动导体棒：电流和安培力反向':'拖动橙色导体棒时，电流方向和安培力会同时反向',W/2,L.small?260:248,C.green,'center',11,'800');
  }
  function drawGraph(m,L){const x=24,y=L.graphY,w=W-48,h=L.chartH;box(x,y,w,h,'#fff');text(L.small?'磁通量记录：斜率=ΔΦ/Δt，ε随斜率变':'磁通量—时间记录：曲线斜率就是 ΔΦ/Δt，ε 与斜率同步',W/2,y+17,C.ink,'center',Math.max(11,Math.min(14,W/45)),'900');const left=x+34,right=x+w-16,top=y+34,bottom=y+h-26,maxFlux=Math.max(+el.B.value*+el.L.value,0.5);line(left,bottom,right,bottom,C.muted,1);line(left,top,left,bottom,C.muted,1);for(let i=0;i<=3;i++)line(left,top+i*(bottom-top)/3,right,top+i*(bottom-top)/3,C.grid,1);ctx.save();ctx.strokeStyle=C.green;ctx.lineWidth=3;ctx.beginPath();S.history.forEach((p,i)=>{const px=left+(i/Math.max(1,S.history.length-1))*(right-left),py=bottom-clamp(p.flux/maxFlux,0,1)*(bottom-top);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)});ctx.stroke();ctx.restore();text('Φ/Wb',left-4,top-12,C.green,'right',10,'800');text('时间',right,bottom,C.muted,'right',10,'800');const cursor=right-3;line(cursor,top,cursor,bottom,C.gold,2,[4,3]);text('现在',cursor,top+10,C.gold,'right',10,'800');text('斜率：'+fmt(m.fluxRate,2)+' Wb/s',left+80,top+12,C.purple,'left',10,'800');text((L.small?'ε=':'ε=BLv=')+fmt(Math.abs(m.eps),2)+' V',L.small?left+180:left+230,top+12,C.red,'left',10,'800')}
  function bars(m,L){const small=L.small,x=24,y=L.small?428:540,w=W-48,h=L.small?132:66;box(x,y,w,h,'#fff');const labels=['|ε| V','|I| A','|F安| N','P热 W'],vals=[Math.abs(m.eps),Math.abs(m.I),Math.abs(m.F),m.Pheat],colors=[C.red,C.purple,C.green,C.gold],max=Math.max(...vals,1),base=y+h-25,top=y+30,bw=Math.min(46,(w-36)/4-8),gap=(w-bw*4)/5;text('量值联动：电动势 → 电流 → 安培力 → 电热',x+w/2,y+14,C.ink,'center',Math.max(10,Math.min(13,w/38)),'900');for(let i=0;i<4;i++){const bx=x+gap+i*(bw+gap),bh=vals[i]/max*(base-top);ctx.fillStyle=colors[i];ctx.fillRect(bx,base-bh,bw,bh);text(fmt(vals[i],2),bx+bw/2,base-bh-9,C.ink,'center',9,'800');text(labels[i],bx+bw/2,base+12,C.muted,'center',9,'800')}}
  function update(m){el.bLabel.textContent=fmt(m.B,2)+' T';el.lLabel.textContent=fmt(m.L,2)+' m';el.vLabel.textContent=fmt(Math.abs(m.vSetting),1)+' m/s';el.rLabel.textContent=fmt(m.R,1)+' Ω';el.readout.innerHTML='<div>当前速度 v<b>'+fmt(m.actualV,2)+' m/s</b></div><div>磁通量 Φ<b>'+fmt(m.flux,3)+' Wb</b></div><div>感应电动势 ε<b>'+fmt(Math.abs(m.eps),2)+' V</b></div><div>感应电流 I<b>'+fmt(Math.abs(m.I),2)+' A</b></div><div>电流方向<b>'+m.dir+'</b></div><div>安培力 F安<b>'+fmt(Math.abs(m.F),2)+' N</b></div>';if(Math.abs(m.actualV)<.01)el.status.textContent='导体棒没有移动：Φ 不变，ε=0，电流表回零。';else el.status.textContent='链条正在发生：Φ 变化率='+fmt(m.fluxRate,2)+' Wb/s → ε='+fmt(Math.abs(m.eps),2)+' V → I='+fmt(Math.abs(m.I),2)+' A；安培力方向阻碍运动，P机械≈P热='+fmt(m.Pheat,2)+' W。'}
  function draw(){const m=model(),L=layout();ctx.clearRect(0,0,W,H);const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#ffffff');bg.addColorStop(1,'#eef4fa');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);text(L.small?'G-09 电磁感应：Φ→ε→I→F':'G-09 电磁感应综合：Φ变化 → ε → I方向 → 安培力 → 能量',W/2,18,C.ink,'center',Math.max(14,Math.min(19,W/45)),'900');drawScene(m,L);drawGraph(m,L);bars(m,L);update(m);window.__ANIM_TEST_STATE__={running:S.running,position:S.position,actualV:m.actualV,flux:m.flux,eps:m.eps,I:m.I,F:m.F,P:m.Pheat}}
  function sample(m){if(S.lastHistory<0||performance.now()-S.lastHistory>80){S.history.push({flux:m.flux});S.history=S.history.slice(-100);S.lastHistory=performance.now()}}
  function reset(){S.running=false;S.position=.28;S.heading=1;S.manualV=0;S.drag=false;S.history=[];S.lastHistory=-1;el.play.textContent='播放';draw()}
  function stepBy(dt){const m=model();if(!S.drag){const speed=Math.abs(+el.v.value);S.position+=Math.sign(+el.v.value||1)*S.heading*dt*speed/4;if(S.position<=.03||S.position>=.97){S.position=clamp(S.position,.03,.97);S.heading*=-1}}sample(model());draw()}
  [el.B,el.L,el.v,el.R].forEach(input=>input.addEventListener('input',draw));
  el.play.onclick=()=>{S.running=!S.running;el.play.textContent=S.running?'暂停':'播放';draw()};el.step.onclick=()=>{S.running=false;el.play.textContent='播放';stepBy(.25)};el.reset.onclick=reset;
  function point(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
  canvas.addEventListener('pointerdown',e=>{const p=point(e),L=layout(),x0=L.left+30,x1=L.right-80,rodX=x0+S.position*(x1-x0);if(Math.abs(p.x-rodX)<34&&p.y>L.railY-75&&p.y<L.railY+75){S.drag=true;S.lastX=p.x;S.manualV=0;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing'}});
  canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const p=point(e),L=layout(),x0=L.left+30,x1=L.right-80,dx=p.x-S.lastX;S.position=clamp(S.position+dx/Math.max(1,x1-x0),.03,.97);S.manualV=clamp(dx*.12,-5,5);S.lastX=p.x;sample(model());draw()});
  canvas.addEventListener('pointerup',e=>{S.drag=false;S.manualV=0;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false;S.manualV=0});
  function resize(){const r=canvas.getBoundingClientRect();W=clamp(r.width||960,320,960);H=W<640?590:620;dpr=Math.min(window.devicePixelRatio||1,2);canvas.style.height=H+'px';canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
  function loop(now){const dt=Math.min(Math.max((now-last)/1000,0),.04);last=now;if(S.running&&!S.drag){const speed=+el.v.value;S.position+=Math.sign(speed||1)*S.heading*dt*speed/4;if(S.position<=.03||S.position>=.97){S.position=clamp(S.position,.03,.97);S.heading*=-1}sample(model())}draw();requestAnimationFrame(loop)}
  if(window.ResizeObserver)new ResizeObserver(resize).observe(canvas);resize();requestAnimationFrame(loop);
})();
</script>

<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
