<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁感应综合专题实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:12px;padding:12px;min-height:700px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}.panel{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:900;margin-bottom:7px}.param{display:grid;gap:3px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;gap:8px;color:#486581}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.6;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:880px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="930" height="620" aria-label="电磁感应综合实验台：导轨、导体棒、磁场、电流表、磁通量图像、感应电动势、安培力、能量转化、多视角"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动导体棒速度，看磁通量变化率、感应电动势、电流方向和安培阻力如何同步变化。</div>
    <div class="card">
      <div class="title">导轨模型</div>
      <label class="param"><span>磁感应强度 B <b id="bLabel">0.60 T</b></span><input id="B" type="range" min="0.1" max="1.2" step="0.05" value="0.6"></label>
      <label class="param"><span>导轨宽度 L <b id="lLabel">0.50 m</b></span><input id="L" type="range" min="0.2" max="1" step="0.05" value="0.5"></label>
      <label class="param"><span>速度 v <b id="vLabel">3.0 m/s</b></span><input id="v" type="range" min="-5" max="5" step="0.1" value="3"></label>
      <label class="param"><span>电阻 R <b id="rLabel">2.0 Ω</b></span><input id="R" type="range" min="0.5" max="8" step="0.1" value="2"></label>
      <div class="buttons"><button id="play">暂停</button><button id="record">记录读数</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">读数记录</div><table><thead><tr><th>ε</th><th>I</th><th>F安</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula">
      <div class="title">公式绑定</div>
      <div>磁通量：Φ=BS</div>
      <div>感应电动势：ε=BLv=|ΔΦ/Δt|</div>
      <div>安培阻力：F=BIL，机械功率转化为电热</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const E={B:document.getElementById('B'),L:document.getElementById('L'),v:document.getElementById('v'),R:document.getElementById('R'),bLabel:document.getElementById('bLabel'),lLabel:document.getElementById('lLabel'),vLabel:document.getElementById('vLabel'),rLabel:document.getElementById('rLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7048e8'};
const S={run:true,t:0,drag:false,records:[]};
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
function text(s,x,y,c=C.ink,a='center',z=13,w='800'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function calc(){const B=+E.B.value,L=+E.L.value,v=+E.v.value,R=+E.R.value,eps=B*L*Math.abs(v),I=eps/R,F=B*I*L,P=F*Math.abs(v);return{B,L,v,R,eps,I,F,P,dir:v>=0?'逆时针':'顺时针'}}
function draw(){const q=calc();ctx.clearRect(0,0,930,620);box(34,30,862,548,'#fff');text('G-09 电磁感应综合：磁通量变化 → 电动势 → 电流方向 → 能量转化',465,56,C.ink,'center',16,'900');drawRail(q);drawGraph(q);drawFlow(q);update(q)}
function drawRail(q){box(70,88,560,252,'#fbfdff');text('俯视导轨装置：磁场垂直纸面，导体棒切割磁感线',350,112,C.muted,'center',12,'900');const x0=130,y1=166,y2=276,w=390;line(x0,y1,x0+w,y1,C.ink,4);line(x0,y2,x0+w,y2,C.ink,4);for(let x=150;x<500;x+=42)for(let y=144;y<298;y+=42){text('×',x,y,C.blue,'center',16,'900')}const rod=x0+160+(S.t*40%180);line(rod,y1-18,rod,y2+18,C.gold,8);arrow(rod+16,221,rod+70,221,q.v>=0?C.red:C.green,4);text('拖动 v',rod+78,221,q.v>=0?C.red:C.green,'left',12,'900');arrow(rod,160,rod,128,C.purple,3);text('F安阻碍相对运动',rod+4,116,C.purple,'center',12,'900');box(92,182,46,78,'#102a43','#102a43');text('A',115,202,'#ffd166','center',14,'900');text(q.I.toFixed(2)+'A',115,228,'#ffd166','center',11,'900');text('电流方向：'+q.dir+'；楞次定律：感应电流效果阻碍磁通量变化',350,320,C.green,'center',12,'900')}
function drawGraph(q){box(70,366,560,166,'#fff');text('图像视角：Φ-t 斜率决定 ε，I 与 ε 同步变化',350,388,C.muted,'center',12,'900');const x0=112,y0=500,w=450,h=78;arrow(x0,y0,x0+w+18,y0,'#52606d',2);arrow(x0,y0,x0,y0-h-18,'#52606d',2);for(let i=0;i<=5;i++){line(x0+i*w/5,y0,x0+i*w/5,y0-h,'rgba(130,154,177,.16)',1);line(x0,y0-i*h/5,x0+w,y0-i*h/5,'rgba(130,154,177,.16)',1)}ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=100;i++){const x=x0+i*w/100,y=y0-h*.2-h*.55*(i/100)*(q.v>=0?1:-1);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();text('Φ-t 斜率 = ΔΦ/Δt',x0+170,y0-58,C.blue,'center',12,'900');text('多视角：导轨实物 + 电流表 + Φ-t 图像 + 能量流',350,526,C.purple,'center',12,'900')}
function drawFlow(q){box(664,88,196,444,'#fff');text('综合步骤',762,114,C.ink,'center',14,'900');['判磁通量增减','求 ε=BLv','用楞次定律定方向','算 I=ε/R','求 F安=BIL','能量：P=Fv=I²R'].forEach((s,i)=>{box(686,142+i*54,152,34,i===0?'#fff7e6':i===2?'#e6fffa':'#eef4ff');text(s,762,159+i*54,i===0?C.gold:i===2?C.green:C.blue,'center',12,'900')});text('ε='+q.eps.toFixed(2)+'V',762,474,C.red,'center',14,'900');text('P='+q.P.toFixed(2)+'W',762,502,C.muted,'center',12,'800')}
function update(q){E.bLabel.textContent=q.B.toFixed(2)+' T';E.lLabel.textContent=q.L.toFixed(2)+' m';E.vLabel.textContent=q.v.toFixed(1)+' m/s';E.rLabel.textContent=q.R.toFixed(1)+' Ω';E.readout.innerHTML='感应电动势：<b>'+q.eps.toFixed(2)+' V</b><br>感应电流：<b>'+q.I.toFixed(2)+' A</b><br>安培阻力：<b>'+q.F.toFixed(2)+' N</b><br>电热功率：<b>'+q.P.toFixed(2)+' W</b>';E.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.e+'</td><td>'+r.i+'</td><td>'+r.f+'</td></tr>').join('')||'<tr><td colspan="3">暂无记录</td></tr>';E.status.textContent='电磁感应综合题按链条走：磁通量变化、方向、大小、受力、能量。'}
function record(){const q=calc();S.records.push({e:q.eps.toFixed(2),i:q.I.toFixed(2),f:q.F.toFixed(2)});if(S.records.length>8)S.records.shift();update(q)}
[E.B,E.L,E.v,E.R].forEach(el=>el.addEventListener('input',draw));E.record.onclick=record;E.play.onclick=()=>{S.run=!S.run;E.play.textContent=S.run?'暂停':'播放'};function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setV(p){E.v.value=Math.max(-5,Math.min(5,(p.x-320)/160*5)).toFixed(1);draw()}canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>80&&p.x<620&&p.y>90&&p.y<340){S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setV(p)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setV(pos(e))});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run)S.t+=dt;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
</body>
</html>
