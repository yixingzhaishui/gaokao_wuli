<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-12 追及相遇实验台</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}
  .stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}
  .stage,.panel{min-width:0}
  canvas{display:block;width:100%;max-width:100%;height:auto;aspect-ratio:940/560;touch-action:none}
  .hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:white;border-radius:6px;padding:7px 10px;font-size:12px}
  .panel{display:flex;flex-direction:column;gap:8px}
  .box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}
  .task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}
  .buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{min-width:0;border:1px solid #bcccdc;background:white;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer;overflow-wrap:anywhere}
  button.active{background:#2f80ed;color:white;border-color:#2f80ed}
  .readout{background:#102a43;color:white;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}
  .readout b{color:#ffd166}
  .formula{font-size:13px;line-height:1.55}
  .warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}
  [hidden]{display:none!important}
  @media (max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap" id="app" data-phase="guided" data-revealed="false">
  <div class="stage">
    <canvas id="canvas" width="940" height="560" aria-label="追及相遇交互实验台"></canvas>
    <div class="hint" id="hint" hidden>演示完成后可拖动前车起点 d、速度图参数和橙色时间游标</div>
  </div>
  <div class="panel">
    <div class="box task" id="task"><b>观察任务：</b>后车逐渐变快。系统暂停时，请判断下一关键时刻表示相遇、距离最大还是距离最小。</div>
    <div class="buttons" id="predictionChoices" hidden>
      <button data-prediction="meet">两车相遇</button><button data-prediction="max">距离达到最大</button><button data-prediction="min">距离达到最小</button>
    </div>
    <div class="box" id="explore" hidden>
      <b>情境</b>
      <div class="buttons" style="margin-top:7px">
        <button id="mStart" class="active">静止追匀速</button><button id="mInitial">有初速追赶</button>
        <button id="mSlow">加速度较小</button><button id="mEqual">临界共速</button>
      </div>
    </div>
    <div class="box"><div class="buttons"><button id="play">▶ 播放运动</button><button id="resetBtn">重置</button></div></div>
    <div class="readout" id="readout"></div>
    <div class="box formula" id="formulaBox" hidden>
      <b>公式绑定</b><br>
      x1=v10t+1/2at²。<br>
      x2=d+v2t。<br>
      Δx=x2-x1；相遇看 Δx=0，共速看 v1=v2。
    </div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(() => {
  const app=document.getElementById('app');
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const readout=document.getElementById('readout');
  const status=document.getElementById('status');
  const buttons={
    start:document.getElementById('mStart'),
    initial:document.getElementById('mInitial'),
    slow:document.getElementById('mSlow'),
    equal:document.getElementById('mEqual')
  };
  const task=document.getElementById('task'),predictionChoices=document.getElementById('predictionChoices'),formulaBox=document.getElementById('formulaBox'),explore=document.getElementById('explore'),hint=document.getElementById('hint');
  const state={v10:0,a:2,v2:8,d:40,t:0,mode:'start',prediction:null,revealed:false};
  const track={x:82,y:110,w:720};
  const gd={ox:82,oy:405,w:340,h:210,tMax:15,dxMin:-30,dxMax:130};
  const gv={ox:510,oy:405,w:310,h:210,tMax:15,vMin:0,vMax:32};
  let drag=null, layout={};
  function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
  function x1(t){return state.v10*t+0.5*state.a*t*t;}
  function x2(t){return state.d+state.v2*t;}
  function dx(t){return x2(t)-x1(t);}
  function v1(t){return state.v10+state.a*t;}
  function tEq(){return Math.abs(state.a)<1e-8?null:(state.v2-state.v10)/state.a;}
  function meetTimes(){
    const A=0.5*state.a,B=state.v10-state.v2,C=-state.d,eps=1e-8;
    if(Math.abs(A)<eps){if(Math.abs(B)<eps)return[];const t=-C/B;return t>=0?[t]:[];}
    const D=B*B-4*A*C;if(D<0)return[];
    const r1=(-B-Math.sqrt(D))/(2*A),r2=(-B+Math.sqrt(D))/(2*A);
    return [r1,r2].filter(t=>t>=0).sort((a,b)=>a-b);
  }
  function domainX(){const roots=meetTimes();const tMax=Math.max(15,roots[0]?roots[0]*1.1:15);let m=80;for(let t=0;t<=Math.min(tMax,18);t+=1){m=Math.max(m,x1(t),x2(t));}return m*1.15;}
  function px(x){return track.x+x/domainX()*track.w;}
  function tFromG(x,g){return clamp((x-g.ox)/g.w*g.tMax,0,g.tMax);}
  function gdX(t){return gd.ox+t/gd.tMax*gd.w;}
  function gdY(dv){return gd.oy-(dv-gd.dxMin)/(gd.dxMax-gd.dxMin)*gd.h;}
  function gvX(t){return gv.ox+t/gv.tMax*gv.w;}
  function gvY(v){return gv.oy-(v-gv.vMin)/(gv.vMax-gv.vMin)*gv.h;}
  function vFromGv(y){return clamp(gv.vMin+(gv.oy-y)/gv.h*(gv.vMax-gv.vMin),0,gv.vMax);}
  function dFromPx(x){return clamp((x-track.x)/track.w*domainX(),5,130);}
  function setMode(mode){
    state.mode=mode;
    if(mode==='start'){state.v10=0;state.a=2;state.v2=8;state.d=40;state.t=0;}
    if(mode==='initial'){state.v10=6;state.a=1.1;state.v2=10;state.d=35;state.t=0;}
    if(mode==='slow'){state.v10=0;state.a=0.6;state.v2=10;state.d=35;state.t=0;}
    if(mode==='equal'){state.v10=2;state.a=1.5;state.v2=8;state.d=18;state.t=0;}
    Object.entries(buttons).forEach(([k,b])=>b.classList.toggle('active',k===mode));
    draw();
  }
  Object.entries(buttons).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
  function line(x1,y1,x2,y2,color,width=1,dash=[]){ctx.save();ctx.setLineDash(dash);ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
  function text(s,x,y,color='#243b53',size=13,align='left',weight='600'){ctx.fillStyle=color;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y);}
  function arrow(x1,y1,x2,y2,color,width=3){line(x1,y1,x2,y2,color,width);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-0.55),y2-l*Math.sin(a-0.55));ctx.lineTo(x2-l*Math.cos(a+0.55),y2-l*Math.sin(a+0.55));ctx.closePath();ctx.fillStyle=color;ctx.fill();}
  function handle(x,y,label,color){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=3;ctx.stroke();text(label,x+14,y-15,color,13);}
  function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();}
  function drawTrack(){
    card(50,36,835,142);
    line(track.x,track.y,track.x+track.w,track.y,'#9fb3c8',4);
    const m=domainX();
    for(let s=0;s<=m;s+=Math.max(20,Math.ceil(m/8/10)*10)){const x=px(s);line(x,track.y-8,x,track.y+8,'#bcccdc');text(String(Math.round(s)),x,track.y+25,'#7b8794',10,'center','500');}
    const r=px(x1(state.t)), f=px(x2(state.t)), d0=px(state.d);
    line(d0,track.y-55,d0,track.y+14,'#e03131',2,[6,5]);handle(d0,track.y+54,'d','#e03131');layout.d={x:d0,y:track.y+54};
    ctx.fillStyle='#2f80ed';ctx.beginPath();ctx.roundRect(r-25,track.y-48,50,26,6);ctx.fill();
    ctx.fillStyle='#e03131';ctx.beginPath();ctx.roundRect(f-25,track.y-48,50,26,6);ctx.fill();
    ctx.fillStyle='#243b53';for(const c of [r-15,r+15,f-15,f+15]){ctx.beginPath();ctx.arc(c,track.y-20,5,0,Math.PI*2);ctx.fill();}
    arrow(r,track.y-60,r+clamp(v1(state.t)*5,18,90),track.y-60,'#2f80ed',4);
    arrow(f,track.y-80,f+clamp(state.v2*5,18,90),track.y-80,'#e03131',4);
    if(dx(state.t)>0){line(r+25,track.y-90,f-25,track.y-90,'#f08c00',2,[5,5]);text(`Δx=${dx(state.t).toFixed(1)} m`,(r+f)/2,track.y-102,'#f08c00',13,'center','800');}
    text(state.revealed?'蓝=后车，红=前车；演示后可拖动参数继续探索':'蓝=后车，红=前车；先观察当前距离怎样变化',468,58,'#334e68',14,'center','800');
    text(`t=${state.t.toFixed(1)} s，v1=${v1(state.t).toFixed(1)} m/s，v2=${state.v2.toFixed(1)} m/s`,468,86,'#0b7285',14,'center','800');
  }
  function drawAxes(){
    card(50,198,835,310);
    for(const g of [gd,gv]){
      line(g.ox,g.oy,g.ox+g.w+25,g.oy,'#334e68',2);line(g.ox,g.oy,g.ox,g.oy-g.h-18,'#334e68',2);
      for(let t=0;t<=15;t+=5){const x=g.ox+t/g.tMax*g.w;line(x,g.oy-5,x,g.oy+5,'#9fb3c8');text(String(t),x,g.oy+19,'#627d98',11,'center','500');}
    }
    text('Δx/m',gd.ox-18,gd.oy-gd.h-20,'#334e68',12,'right');text('v/(m/s)',gv.ox-24,gv.oy-gv.h-20,'#334e68',12,'right');
    for(let d=-20;d<=120;d+=40){const y=gdY(d);line(gd.ox-5,y,gd.ox+gd.w,y,d===0?'#7b8794':'#d9e2ec',d===0?1.7:1);text(String(d),gd.ox-12,y,'#627d98',11,'right','500');}
    for(let v=0;v<=30;v+=10){const y=gvY(v);line(gv.ox-5,y,gv.ox+gv.w,y,'#d9e2ec');text(String(v),gv.ox-12,y,'#627d98',11,'right','500');}
  }
  function drawGraphs(){
    ctx.beginPath();for(let i=0;i<=120;i++){const t=gd.tMax*i/120,sx=gdX(t),sy=gdY(dx(t));if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);}ctx.strokeStyle='#f08c00';ctx.lineWidth=3;ctx.stroke();
    line(gd.ox,gdY(0),gd.ox+gd.w,gdY(0),'#7b8794',1.5,[5,5]);
    const te=tEq();
    if(state.revealed&&te!==null&&te>0&&te<gd.tMax){line(gdX(te),gd.oy,gdX(te),gdY(dx(te)),'#7b2cbf',2,[6,5]);handle(gdX(te),gdY(dx(te)),'v相等','#7b2cbf');}
    if(state.revealed)for(const rt of meetTimes().filter(t=>t<=gd.tMax)){handle(gdX(rt),gdY(0),'相遇','#12b886');}
    const curD={x:gdX(state.t),y:gdY(dx(state.t))};handle(curD.x,curD.y,'t','#f08c00');layout.time=curD;
    if(state.revealed){
      ctx.beginPath();for(let i=0;i<=80;i++){const t=gv.tMax*i/80,sx=gvX(t),sy=gvY(v1(t));if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);}ctx.strokeStyle='#2f80ed';ctx.lineWidth=3;ctx.stroke();
      line(gvX(0),gvY(state.v2),gvX(gv.tMax),gvY(state.v2),'#e03131',3);
      const v0p={x:gvX(0),y:gvY(state.v10)}, vend={x:gvX(gv.tMax),y:gvY(v1(gv.tMax))}, v2p={x:gvX(12.5),y:gvY(state.v2)};
      handle(v0p.x,v0p.y,'v10','#2f80ed');handle(vend.x,vend.y,'调a','#2f80ed');handle(v2p.x,v2p.y,'v2','#e03131');layout.v10=v0p;layout.a=vend;layout.v2=v2p;
      if(te!==null&&te>0&&te<gv.tMax){line(gvX(te),gv.oy,gvX(te),gvY(state.v2),'#7b2cbf',2,[6,5]);text('v1=v2',gvX(te)+8,gvY(state.v2)-13,'#7b2cbf',12);}
      text('Δx-t：位置相同与距离极值是不同证据',250,214,'#334e68',13,'center','800');text('v-t：验证后开放完整速度证据',665,214,'#334e68',13,'center','800');
    }else{text('距离随时间怎样变化？',250,214,'#334e68',13,'center','800');text('完成预测后显示速度证据',665,300,'#627d98',14,'center','700');}
  }
  function drawFormula(){
    const x=655,y=255,w=185,h=118,roots=meetTimes(),te=tEq();
    ctx.fillStyle='rgba(16,42,67,0.94)';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();
    text('临界读数',x+92,y+24,'#fff',14,'center','800');
    text(`t等=${te!==null&&te>0?te.toFixed(2)+' s':'无未来共速'}`,x+16,y+55,'#ffd166',12);
    text(`Δx(t等)=${te!==null&&te>0?dx(te).toFixed(2)+' m':'--'}`,x+16,y+78,'#ffd166',12);
    text(`相遇=${roots.length?roots.map(t=>t.toFixed(2)).join(', ')+' s':'无正时刻'}`,x+16,y+101,'#9ff3d4',12);
  }
  function draw(){
    var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};
    drawTrack();drawAxes();drawGraphs();if(state.revealed)drawFormula();
    const te=tEq(),roots=meetTimes();
    readout.innerHTML=state.revealed?`v10=<b>${state.v10.toFixed(1)}</b> m/s<br>a=<b>${state.a.toFixed(2)}</b> m/s²<br>v2=<b>${state.v2.toFixed(1)}</b> m/s<br>d=<b>${state.d.toFixed(1)}</b> m<br>t=<b>${state.t.toFixed(2)}</b> s<br>Δx=<b>${dx(state.t).toFixed(2)}</b> m<br>t等=<b>${te!==null&&te>0?te.toFixed(2):'无'}</b><br>相遇=<b>${roots.length?roots[0].toFixed(2)+' s':'无'}</b>`:`t=<b>${state.t.toFixed(2)}</b> s<br>当前距离 Δx=<b>${dx(state.t).toFixed(2)}</b> m<br>预测结果尚未揭示`;
    app.dataset.revealed=String(state.revealed);
    if(!state.revealed){status.textContent=v1(state.t)<state.v2?'当前事实：后车较慢，距离正在增大。':'当前事实：后车较快，距离正在减小。';return}
    if(dx(state.t)<=0) status.textContent='已经相遇或超过：相遇条件是位置相同，也就是 Δx=0。';
    else if(te!==null&&Math.abs(state.t-te)<0.08) status.textContent='当前是速度相等时刻；距离变化率为零。';
    else if(te!==null&&state.t<te) status.textContent='后车仍比前车慢，距离还在增大。';
    else status.textContent='后车已比前车快，距离开始缩小。';
  }
  function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height};}
  canvas.addEventListener('pointerdown',e=>{if(!state.revealed)return;const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30){drag=k;canvas.setPointerCapture(e.pointerId);break;}}});
  canvas.addEventListener('pointermove',e=>{
    const p=pointer(e);
    if(drag==='d') state.d=Math.round(dFromPx(p.x));
    if(drag==='time') state.t=Math.round(tFromG(p.x,gd)*20)/20;
    if(drag==='v10') state.v10=Math.round(vFromGv(p.y)*10)/10;
    if(drag==='a') state.a=Math.round(((vFromGv(p.y)-state.v10)/gv.tMax)*100)/100;
    if(drag==='v2') state.v2=Math.round(vFromGv(p.y)*10)/10;
    if(drag){draw();return;}
    let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30)hit=true;}
    canvas.style.cursor=hit?'grab':'default';
  });
  window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default';});
  draw();
const playBtn=document.getElementById("play"),resetBtn=document.getElementById("resetBtn");
let __run=false,__last=performance.now(),__phase='ready';
function guidedEnd(){const roots=meetTimes();return roots.length?Math.min(15,roots[0]):15;}
function predictionTime(){const te=tEq();return te!==null&&te>0?Math.max(0,te-0.35):null;}
playBtn.addEventListener("click",()=>{
  const cap=guidedEnd();
  if(__phase==='predict'){
    if(!state.prediction)return;__phase='verify';app.dataset.phase='verify';state.revealed=true;predictionChoices.hidden=true;__run=true;playBtn.textContent='⏸ 验证中';
    status.textContent='预测已保存；现在显示速度与位置证据进行验证。';draw();
    return;
  }
  if(state.t>=cap||__phase==='done'){state.t=0;__phase='ready';}
  __run=!__run;
  playBtn.textContent=__run?'⏸ 暂停':'▶ 播放运动';
});
document.querySelectorAll('[data-prediction]').forEach(b=>b.addEventListener('click',()=>{state.prediction=b.dataset.prediction;document.querySelectorAll('[data-prediction]').forEach(x=>x.classList.toggle('active',x===b));playBtn.disabled=false;playBtn.textContent='▶ 验证预测';status.textContent='预测已保存；答案仍隐藏，点击验证。'}));
resetBtn.addEventListener("click",()=>{__run=false;__phase='ready';Object.assign(state,{prediction:null,revealed:false});app.dataset.phase='guided';predictionChoices.hidden=true;formulaBox.hidden=true;explore.hidden=true;hint.hidden=true;playBtn.disabled=false;playBtn.textContent="▶ 播放运动";document.querySelectorAll('[data-prediction]').forEach(x=>x.classList.remove('active'));setMode('start');});
canvas.addEventListener("pointerdown",()=>{if(__run){__run=false;playBtn.textContent="▶ 播放运动";}});
function __loop(now){
  const dt=Math.min((now-__last)/1000,.05);__last=now;
  const cap=guidedEnd(),pauseAt=predictionTime();
  if(__run){
    state.t=Math.min(cap,state.t+dt);
    if(__phase==='ready'&&pauseAt!==null&&state.t>=pauseAt){
      state.t=pauseAt;__run=false;__phase='predict';
      app.dataset.phase='prediction';predictionChoices.hidden=false;playBtn.disabled=true;playBtn.textContent='先选择预测';draw();
      status.textContent='预测暂停：下一关键时刻表示相遇、距离最大还是距离最小？先选择再验证。';
      requestAnimationFrame(__loop);return;
    }
    if(state.t>=cap){
      __run=false;__phase='done';app.dataset.phase='final';state.revealed=true;formulaBox.hidden=false;explore.hidden=false;hint.hidden=false;playBtn.disabled=false;playBtn.textContent='▶ 重新播放';draw();
      status.textContent=meetTimes().length&&meetTimes()[0]<=15?'演示完成：Δx=0，位置相同才是相遇；共速只标记此前的最大距离。':'当前 15 s 观察窗内尚未相遇；本理想模型继续运行后仍会追上。';
      requestAnimationFrame(__loop);return;
    }
    draw();
  }
  requestAnimationFrame(__loop);
}
requestAnimationFrame(__loop);
})();
</script>
</body>
</html>
