<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-24 牛顿第二定律引导实验</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#eef3f8;color:#102a43;font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:10px;padding:10px;max-width:100%}.stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}.stage,.panel{min-width:0}canvas{display:block;width:100%;max-width:100%;height:auto;aspect-ratio:920/540}.panel{display:flex;flex-direction:column;gap:8px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px;overflow-wrap:anywhere}.task{border-left:4px solid #f59e0b;background:#fff7ed;line-height:1.5;font-size:13px}.choices,.buttons{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.buttons{grid-template-columns:repeat(2,minmax(0,1fr))}button{min-width:0;min-height:36px;border:1px solid #94a3b8;background:#fff;color:#102a43;border-radius:7px;font-weight:750;cursor:pointer;overflow-wrap:anywhere}button.active{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}button:disabled{opacity:.45;cursor:not-allowed}.readout{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.meter{min-width:0;background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px}.meter span{display:block;color:#94a3b8;font-size:11px}.meter b{display:block;color:#fbbf24;font-size:16px;margin-top:2px}.evidence{font-size:12px;width:100%;border-collapse:collapse}.evidence th,.evidence td{border-bottom:1px solid #e2e8f0;padding:4px;text-align:center}.formula{background:#ecfdf5;border-color:#10b981;color:#065f46;font-weight:800;line-height:1.55}.status{background:#eff6ff;border-color:#60a5fa;color:#1e40af;font-size:12px;line-height:1.5;font-weight:750}.extension[hidden],.formula[hidden],.choices[hidden]{display:none}.extension{background:#f8fafc}.extension .buttons{grid-template-columns:repeat(3,minmax(0,1fr))}@media(max-width:780px){.root{grid-template-columns:minmax(0,1fr)}.panel{grid-row:2}.choices{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(prefers-reduced-motion:reduce){button{scroll-behavior:auto}}
</style>
</head>
<body>
<div class="root" id="app" data-phase="predict-force">
  <div class="stage"><canvas id="canvas" width="920" height="540" aria-label="牛顿第二定律控制变量实验：小车、逐点数据表和关系图"></canvas></div>
  <div class="panel">
    <div class="card task" id="task"><b>预测 1：</b>保持质量不变，合力加倍，加速度会怎样？先选择，再开始取点。</div>
    <div class="choices" id="choices1">
      <button data-predict-force="half">变为一半</button><button data-predict-force="same">保持不变</button><button data-predict-force="double">变为两倍</button>
    </div>
    <div class="choices" id="choices2" hidden>
      <button data-predict-mass="m">直接画 a-m</button><button data-predict-mass="inv">改画 a-1/m</button><button data-predict-mass="square">改画 a-m²</button>
    </div>
    <div class="buttons"><button id="playBtn" disabled>▶ 开始第一轮取点</button><button id="resetBtn">重置</button></div>
    <div class="readout">
      <div class="meter"><span>本轮固定量</span><b id="fixedText">m=3.0 kg</b></div>
      <div class="meter"><span>当前测量</span><b id="measureText">等待预测</b></div>
      <div class="meter"><span>合力 F合</span><b id="netText">—</b></div>
      <div class="meter"><span>加速度 a</span><b id="aText">—</b></div>
    </div>
    <div class="card"><table class="evidence"><thead><tr><th>轮次</th><th>F合/N</th><th>m/kg</th><th>a/(m/s²)</th></tr></thead><tbody id="dataBody"><tr><td colspan="4">尚未取点</td></tr></tbody></table></div>
    <div class="card formula" id="formula" hidden>证据归纳：a∝F合，a∝1/m<br>同一物体同一时刻：F合=ma，且 a 与 F合同向。</div>
    <div class="card extension" id="extension" hidden>
      <b>演示后拓展：粗糙面</b>
      <div class="buttons" style="margin-top:7px"><button data-surface="smooth" class="active">光滑面</button><button data-surface="static">静摩擦</button><button data-surface="slide">滑动摩擦</button></div>
      <p id="roughText" style="margin:7px 0 0;font-size:12px">光滑面：无摩擦；F合=6.0 N，a=2.00 m/s²。</p>
    </div>
    <div class="card status" id="status">先作出预测；未选择前不会显示理论线或最终公式。</div>
  </div>
</div>
<script>
(()=>{
'use strict';
const app=document.getElementById('app'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const task=document.getElementById('task'),playBtn=document.getElementById('playBtn'),dataBody=document.getElementById('dataBody'),formula=document.getElementById('formula'),extension=document.getElementById('extension'),status=document.getElementById('status');
const fixedText=document.getElementById('fixedText'),measureText=document.getElementById('measureText'),netText=document.getElementById('netText'),aText=document.getElementById('aText');
const forceCases=[3,6,9,12],massCases=[2,3,4,6];
const state={phase:'predict-force',prediction1:null,prediction2:null,pointsF:[],pointsM:[],index:0,running:false,timer:null,surface:'smooth',F:6,m:3,mus:.32,muk:.24};
const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
const colors={ink:'#102a43',muted:'#64748b',blue:'#2563eb',red:'#dc2626',purple:'#7c3aed',green:'#059669',grid:'#e2e8f0'};
function setPhase(p){state.phase=p;app.dataset.phase=p}
function line(x1,y1,x2,y2,c=colors.grid,w=1,d=[]){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function text(s,x,y,c=colors.ink,size=13,align='center',weight='700'){ctx.fillStyle=c;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const q=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(q-.5),y2-l*Math.sin(q-.5));ctx.lineTo(x2-l*Math.cos(q+.5),y2-l*Math.sin(q+.5));ctx.closePath();ctx.fillStyle=c;ctx.fill()}
function round(x,y,w,h,fill='#fff',stroke='#cbd5e1'){ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.stroke()}
function roughValues(){
  if(state.surface==='smooth')return{f:0,net:state.F,a:state.F/state.m,label:'光滑面：无摩擦'};
  const fsMax=state.mus*state.m*10;
  if(state.surface==='static'||state.F<=fsMax)return{f:state.F,net:0,a:0,label:`静止：fₛ=F外=${state.F.toFixed(1)} N（≤fₛ,max=${fsMax.toFixed(1)} N）`};
  const f=state.muk*state.m*10,net=Math.max(0,state.F-f);return{f,net,a:net/state.m,label:`滑动：fₖ=μₖmg=${f.toFixed(1)} N`};
}
function current(){
  if(state.phase.includes('mass')||state.phase==='final'){const p=state.pointsM.at(-1);if(p)return p}
  const p=state.pointsF.at(-1);return p||null;
}
function axes(x,y,w,h,xLabel,yLabel,title){round(x,y,w,h,'#f8fafc');const ox=x+48,oy=y+h-38,gw=w-76,gh=h-80;for(let i=0;i<=4;i++){line(ox+i*gw/4,oy-gh,ox+i*gw/4,oy);line(ox,oy-i*gh/4,ox+gw,oy-i*gh/4)}arrow(ox,oy,ox+gw+14,oy,colors.ink,2);arrow(ox,oy,ox,oy-gh-14,colors.ink,2);text(title,x+w/2,y+22,colors.ink,14);text(xLabel,ox+gw+22,oy,colors.muted,11,'left');text(yLabel,ox-8,oy-gh-20,colors.muted,11,'right');return{ox,oy,gw,gh}}
function plot(g,pts,xValue,xMax,yMax,color,showLine){
  if(showLine&&pts.length>1){ctx.beginPath();pts.forEach((p,i)=>{const x=g.ox+xValue(p)/xMax*g.gw,y=g.oy-p.a/yMax*g.gh;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke()}
  pts.forEach(p=>{ctx.beginPath();ctx.arc(g.ox+xValue(p)/xMax*g.gw,g.oy-p.a/yMax*g.gh,6,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()});
}
function draw(){
  ctx.clearRect(0,0,920,540);const bg=ctx.createLinearGradient(0,0,0,540);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,920,540);
  text('牛顿第二定律：先取证，后归纳',460,28,colors.ink,19);
  round(42,52,410,188);const p=current(),F=p?p.F:0,m=p?p.m:3,a=p?p.a:0,carX=120+Math.min(190,a*18);line(72,190,420,190,'#334155',5);round(carX,142,92,48,'#dbeafe','#2563eb');text(`m=${m.toFixed(1)} kg`,carX+46,166,colors.blue,13);if(F>0)arrow(carX+92,166,carX+92+Math.min(130,F*8),166,colors.red,4);if(a>0)arrow(carX+46,128,carX+46+Math.min(130,a*24),128,colors.purple,4);text(p?`测得：F合=${F.toFixed(1)} N，a=${a.toFixed(2)} m/s²`:'等待第一次测量',247,218,p?colors.green:colors.muted,13);
  const g1=axes(478,52,400,210,'F合/N','a','实验一：固定 m，逐点形成 a-F合');plot(g1,state.pointsF,q=>q.F,12,6,colors.purple,state.phase==='force-revealed'||state.phase.includes('mass')||state.phase==='final');
  const massRaw=state.phase==='mass-collect'||state.phase==='mass-predict-transform',transformed=state.phase==='final';canvas.dataset.secondaryAxis=transformed?'inverse-mass':'mass';
  const g2=axes(42,278,836,224,transformed?'1/m (kg⁻¹)':'m/kg','a',transformed?'实验二验证：横轴变换后检验直线关系':massRaw?'实验二证据：质量与加速度呈怎样的关系？':'实验二：固定 F合，研究质量与加速度');
  plot(g2,state.pointsM,transformed?q=>1/q.m:q=>q.m,transformed?.5:6,7,colors.blue,transformed);
  if(state.phase==='predict-force')text('最终公式与拟合线尚未揭示',460,518,colors.muted,12);
}
function renderTable(){const pts=[...state.pointsF.map(p=>({...p,round:'一'})),...state.pointsM.map(p=>({...p,round:'二'}))];dataBody.innerHTML=pts.length?pts.map(p=>`<tr><td>${p.round}</td><td>${p.F.toFixed(1)}</td><td>${p.m.toFixed(1)}</td><td>${p.a.toFixed(2)}</td></tr>`).join(''):'<tr><td colspan="4">尚未取点</td></tr>'}
function updateMeters(p){if(!p){measureText.textContent='等待预测';netText.textContent='—';aText.textContent='—';return}measureText.textContent=`第 ${state.index}/${state.phase.includes('force')?forceCases.length:massCases.length} 点`;netText.textContent=`${p.F.toFixed(1)} N`;aText.textContent=`${p.a.toFixed(2)} m/s²`}
function schedule(fn){state.timer=setTimeout(fn,850)}
function completeForce(){state.running=false;setPhase('force-revealed');playBtn.disabled=false;playBtn.textContent='继续：第二轮预测';task.innerHTML=`<b>证据反馈：</b>你的预测“${state.prediction1==='double'?'变为两倍':state.prediction1==='same'?'保持不变':'变为一半'}”。固定 m 时四点落在过原点直线上，a 与 F合成正比。`;status.textContent='第一轮完成：拟合线现在才揭示。点击继续，准备固定合力改变质量。';draw()}
function completeMass(){state.running=false;setPhase('mass-predict-transform');document.getElementById('choices2').hidden=false;playBtn.disabled=true;playBtn.textContent='等待第二次预测';task.innerHTML='<b>预测 2：</b>a-m 数据形成曲线。横轴改成什么量，数据才会成为直线？';status.textContent='先根据表格作答；坐标变换与最终公式仍然隐藏。';draw()}
function collectForce(){
  if(state.index>=forceCases.length){completeForce();return}
  const F=forceCases[state.index++],p={F,m:3,a:F/3};state.pointsF.push(p);renderTable();updateMeters(p);draw();schedule(collectForce)
  if(reduced){clearTimeout(state.timer);state.running=false;if(state.index>=forceCases.length){completeForce();return}playBtn.textContent='▶ 下一数据点';status.textContent='减少动态模式：每次点击只记录一个数据点。'}
}
function collectMass(){
  if(state.index>=massCases.length){completeMass();return}
  const m=massCases[state.index++],p={F:12,m,a:12/m};state.pointsM.push(p);renderTable();updateMeters(p);draw();schedule(collectMass)
  if(reduced){clearTimeout(state.timer);state.running=false;if(state.index>=massCases.length){completeMass();return}playBtn.textContent='▶ 下一数据点';status.textContent='减少动态模式：每次点击只记录一个数据点。'}
}
document.querySelectorAll('[data-predict-force]').forEach(b=>b.addEventListener('click',()=>{state.prediction1=b.dataset.predictForce;document.querySelectorAll('[data-predict-force]').forEach(x=>x.classList.toggle('active',x===b));playBtn.disabled=false;status.textContent='预测已保存。现在可以开始第一轮逐点测量。'}));
document.querySelectorAll('[data-predict-mass]').forEach(b=>b.addEventListener('click',()=>{state.prediction2=b.dataset.predictMass;document.querySelectorAll('[data-predict-mass]').forEach(x=>x.classList.toggle('active',x===b));playBtn.disabled=false;playBtn.textContent='揭示 a-1/m 与最终公式';status.textContent='第二次预测已保存，点击后再改画坐标并归纳。'}));
playBtn.addEventListener('click',()=>{
  if(state.running){state.running=false;clearTimeout(state.timer);playBtn.textContent=state.phase==='force-collect'?'▶ 继续第一轮':'▶ 继续第二轮';status.textContent='取点已暂停，当前数据和画面保持冻结。';return}
  if(state.phase==='force-collect'){state.running=true;playBtn.textContent='⏸ 暂停第一轮';collectForce();return}
  if(state.phase==='mass-collect'){state.running=true;playBtn.textContent='⏸ 暂停第二轮';collectMass();return}
  if(state.phase==='predict-force'){document.getElementById('choices1').hidden=true;state.running=true;state.index=0;setPhase('force-collect');playBtn.disabled=false;playBtn.textContent='⏸ 暂停第一轮';fixedText.textContent='m=3.0 kg';collectForce();return}
  if(state.phase==='force-revealed'){state.index=0;setPhase('mass-collect');state.running=true;playBtn.disabled=false;playBtn.textContent='⏸ 暂停第二轮';fixedText.textContent='F合=12.0 N';task.innerHTML='<b>观察：</b>保持 F合=12 N，逐步增加质量，先记录 a-m 数据。';collectMass();return}
  if(state.phase==='mass-predict-transform'){setPhase('final');document.getElementById('choices2').hidden=true;formula.hidden=false;extension.hidden=false;playBtn.disabled=true;playBtn.textContent='两轮实验完成';task.innerHTML=`<b>证据反馈：</b>你的选择是“${state.prediction2==='inv'?'a-1/m':state.prediction2==='m'?'a-m':'a-m²'}”。改画 a-1/m 后四点成过原点直线，说明 a∝1/m。`;status.textContent='两轮控制变量证据完成后，才揭示 F合=ma。粗糙面现作为独立拓展开放。';draw()}
});
document.querySelectorAll('[data-surface]').forEach(b=>b.addEventListener('click',()=>{state.surface=b.dataset.surface;state.F=state.surface==='static'?6:state.surface==='slide'?14:6;document.querySelectorAll('[data-surface]').forEach(x=>x.classList.toggle('active',x===b));const v=roughValues();document.getElementById('roughText').textContent=`${v.label}；F合=${v.net.toFixed(1)} N，a=${v.a.toFixed(2)} m/s²。`;status.textContent=state.surface==='static'?'静摩擦按维持静止所需取值，不会无条件等于 μmg。':state.surface==='slide'?'超过最大静摩擦后改用 μₖ，受力读数与加速度一致。':'光滑主实验只研究合力和质量。'}));
document.getElementById('resetBtn').addEventListener('click',()=>{clearTimeout(state.timer);Object.assign(state,{phase:'predict-force',prediction1:null,prediction2:null,pointsF:[],pointsM:[],index:0,running:false,timer:null,surface:'smooth',F:6,m:3});setPhase('predict-force');document.querySelectorAll('.choices button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('[data-surface]').forEach(b=>b.classList.toggle('active',b.dataset.surface==='smooth'));document.getElementById('roughText').textContent='光滑面：无摩擦；F合=6.0 N，a=2.00 m/s²。';document.getElementById('choices1').hidden=false;document.getElementById('choices2').hidden=true;formula.hidden=true;extension.hidden=true;playBtn.disabled=true;playBtn.textContent='▶ 开始第一轮取点';task.innerHTML='<b>预测 1：</b>保持质量不变，合力加倍，加速度会怎样？先选择，再开始取点。';fixedText.textContent='m=3.0 kg';renderTable();updateMeters(null);status.textContent='先作出预测；未选择前不会显示理论线或最终公式。';draw()});
renderTable();draw();
})();
</script>
</body>
</html>
