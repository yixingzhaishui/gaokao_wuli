<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>传送带模型实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef3f8;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:10px;padding:10px;min-height:760px}
  .stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}
  .panel{display:flex;flex-direction:column;gap:8px}
  .card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px}
  .task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.45}
  .title{font-weight:800;margin-bottom:5px;color:#0f172a}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{border:1px solid #94a3b8;background:#fff;border-radius:7px;min-height:31px;cursor:pointer;color:#102a43;font-weight:700}
  button.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .readout{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .meter{background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px;min-height:50px}
  .meter span{display:block;font-size:11px;color:#b6c5d8}
  .meter b{display:block;margin-top:2px;color:#fbbf24;font-size:15px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .formula{display:grid;gap:5px;font-size:12px;color:#334155}
  .formula div{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed #d7dee8;padding-bottom:4px}
  .formula div:last-child{border-bottom:0;padding-bottom:0}
  .formula b{white-space:nowrap;color:#0f172a}
  .small{font-size:12px;line-height:1.5;color:#475569}
  .status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;font-weight:800;line-height:1.45}
  .status.warn{border-color:#f59e0b;background:#fff7ed;color:#b45309}
  .status.bad{border-color:#f87171;background:#fef2f2;color:#b91c1c}
  @media(max-width:820px){.root{grid-template-columns:1fr}.readout{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="760" aria-label="传送带模型交互实验台"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>先比 v物 和 v带，看红色摩擦箭头方向；再拖时间游标，看是否共速、划痕 Δx 和摩擦生热 Q 怎样积累。</div>
    <div class="card">
      <div class="title">实验模式</div>
      <div class="chips">
        <button id="horizontalMode" class="active">水平传送带</button>
        <button id="inclineMode">倾斜向上输送</button>
      </div>
    </div>
    <div class="card">
      <div class="title">快速情境</div>
      <div class="chips">
        <button data-case="slow">轻放加速</button>
        <button data-case="fast">初速更快</button>
        <button data-case="short">短带未共速</button>
        <button data-case="incline">斜面下滑</button>
      </div>
    </div>
    <div class="card">
      <div class="title">实时读数</div>
      <div class="readout">
        <div class="meter"><span>当前 v物</span><b id="vText">0.0 m/s</b></div>
        <div class="meter"><span>阶段</span><b id="phaseText">滑动</b></div>
        <div class="meter"><span>共速位移/带长</span><b id="syncText">4.0 / 10 m</b></div>
        <div class="meter"><span>划痕 / 生热</span><b id="heatText">4.0 m / 8 J</b></div>
      </div>
    </div>
    <div class="card formula">
      <div><span>先比速度</span><b>v相=v物-v带</b></div>
      <div><span>水平滑动</span><b>a=±μg</b></div>
      <div><span>倾斜输送</span><b>a=f/m-gsinθ</b></div>
      <div><span>热量</span><b>Q=μmgcosθ·Δx</b></div>
    </div>
    <div class="card small"><b>三视图绑定：</b>左侧是侧视实物过程，底部是俯视划痕尺；右侧 v-t 与 Δx-t 图用同一时间游标取读数。</div>
    <div class="chips"><button id="playBtn">播放过程</button><button id="resetBtn">重置时间</button></div>
    <div class="status" id="status">先比较速度：物块比传送带慢，摩擦力向前。</div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const G=10;
  const state={mode:'horizontal',vb:4,v0:0,mu:.2,L:10,theta:24,t:0,drag:null,playing:false};
  const els={v:document.getElementById('vText'),phase:document.getElementById('phaseText'),sync:document.getElementById('syncText'),heat:document.getElementById('heatText'),status:document.getElementById('status')};
  const horizontalBtn=document.getElementById('horizontalMode');
  const inclineBtn=document.getElementById('inclineMode');
  const playBtn=document.getElementById('playBtn');
  const colors={ink:'#102a43',blue:'#2563eb',red:'#dc2626',orange:'#f59e0b',green:'#0f766e',purple:'#7c3aed',muted:'#64748b'};
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
  const fmt=(v,d=1)=>Number.isFinite(v)?v.toFixed(d):'--';
  function text(s,x,y,c=colors.ink,a='center',size=13,weight='700'){
    ctx.fillStyle=c;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y);
  }
  function line(x1,y1,x2,y2,c='#94a3b8',w=2,dash){
    ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();
  }
  function arrow(x1,y1,x2,y2,c,w=3){
    const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-13*Math.cos(a-.42),y2-13*Math.sin(a-.42));ctx.lineTo(x2-13*Math.cos(a+.42),y2-13*Math.sin(a+.42));ctx.closePath();ctx.fill();ctx.restore();
  }
  function box(x,y,w,h,r,fill,stroke='#cbd5e1'){
    ctx.save();ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke()}ctx.restore();
  }
  function handle(x,y,label,active,c){
    ctx.save();ctx.fillStyle=active?'#fde68a':'#fff';ctx.strokeStyle=active?'#b45309':c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();ctx.stroke();text(label,x,y-22,active?'#92400e':c,'center',12,'900');ctx.restore();
  }
  function plotArea(x,y,w,h,title){
    box(x,y,w,h,8,'#fff','#d7dee8');text(title,x+w/2,y+18,'#0f172a','center',14,'900');
    line(x+35,y+h-30,x+w-16,y+h-30,'#94a3b8',1.5);line(x+35,y+h-30,x+35,y+34,'#94a3b8',1.5);
  }
  function physicsFor(t){
    const theta=(state.mode==='incline'?state.theta:0)*Math.PI/180;
    const sin=Math.sin(theta),cos=Math.cos(theta);
    const fMag=state.mu*G*cos;
    let v=state.v0,x=0,slip=0,phase='相对滑动',fricDir=0,a=0,hitSync=false;
    const dt=.01,steps=Math.ceil(Math.min(t,10)/dt);
    for(let i=0;i<steps;i++){
      const h=Math.min(dt,t-i*dt);
      const rel=v-state.vb;
      if(Math.abs(rel)<.015){
        const holdNeed=G*sin;
        if(state.mode==='horizontal'||holdNeed<=fMag){
          a=0;v=state.vb;fricDir=0;phase='共速';hitSync=true;
        }else{
          fricDir=1; a=fMag-G*sin; phase='共速后仍下滑'; v+=a*h; slip+=Math.abs(v-state.vb)*h;
        }
      }else{
        fricDir=rel<0?1:-1;
        a=fricDir*fMag-G*sin;
        const oldRel=rel;
        x+=v*h+.5*a*h*h;
        v+=a*h;
        const newRel=v-state.vb;
        slip+=Math.abs(oldRel)*h;
        if(oldRel*newRel<0){v=state.vb;phase='共速';hitSync=true}
        else phase=fricDir>0?'摩擦向前':'摩擦向后';
      }
      if(phase==='共速'){x+=state.vb*h}
      if(x>=state.L){x=state.L;phase='已到末端';break}
      if(x<0){x=0;phase='向下滑离';break}
    }
    const heat=state.mu*G*cos*slip;
    return{t,v,x,slip,heat,phase,fricDir,a,hitSync,theta,sin,cos,fMag};
  }
  function eventValues(){
    const theta=(state.mode==='incline'?state.theta:0)*Math.PI/180;
    const sin=Math.sin(theta),cos=Math.cos(theta),fMag=state.mu*G*cos;
    const dir=state.v0<state.vb?1:(state.v0>state.vb?-1:0);
    const aSlide=dir*fMag-G*sin;
    const canCatch=dir!==0 && ((state.vb-state.v0)/aSlide)>0;
    const tSync=canCatch?Math.abs((state.vb-state.v0)/aSlide):Infinity;
    const xSync=canCatch?state.v0*tSync+.5*aSlide*tSync*tSync:(dir===0?0:Infinity);
    return{tSync,xSync,canCatch,aSlide,fMag};
  }
  function values(){
    const ev=eventValues();
    let endT=8;
    if(Number.isFinite(ev.tSync) && ev.xSync>=0 && ev.xSync<state.L) endT=Math.min(8,ev.tSync+(state.L-ev.xSync)/Math.max(state.vb,.1));
    const v=physicsFor(clamp(state.t,0,endT));
    return Object.assign(v,ev,{endT,reachesBeforeSync:!(Number.isFinite(ev.xSync)&&ev.xSync<state.L)});
  }
  function sampleAt(t){const old=state.t;state.t=t;const v=values();state.t=old;return v}
  function geometry(){
    const v=values();
    return{
      time:{x:78+(state.t/Math.max(.2,v.endT))*330,y:704},
      vb:{x:70+(state.vb-1)/7*170,y:662},
      v0:{x:270+state.v0/8*170,y:662},
      mu:{x:470+(state.mu-.08)/.52*170,y:662},
      L:{x:670+(state.L-4)/12*170,y:662},
      theta:{x:670+(state.theta)/37*170,y:624}
    };
  }
  function drawBelt(v){
    box(34,56,522,398,8,'#fbfdff','#d7dee8');
    text(state.mode==='horizontal'?'侧视实物：水平传送带，先比 v物 与 v带':'侧视实物：倾斜向上输送，还要看重力分量',295,82,'#0f172a','center',17,'900');
    const baseX=110,baseY=300,lenPx=330,ang=state.mode==='incline'?-state.theta*Math.PI/180:0;
    const ux=Math.cos(ang),uy=Math.sin(ang),nx=-uy,ny=ux;
    const x0=baseX,y0=baseY,x1=baseX+lenPx*ux,y1=baseY+lenPx*uy;
    line(x0,y0,x1,y1,'#334155',26);
    line(x0+nx*16,y0+ny*16,x1+nx*16,y1+ny*16,'#94a3b8',5);
    for(let i=0;i<=8;i++){
      const s=i/8,px=x0+lenPx*s*ux,py=y0+lenPx*s*uy;
      arrow(px+nx*26,py+ny*26,ux*26,uy*26,colors.purple,2);
    }
    const ratio=clamp(v.x/state.L,0,1),bx=x0+lenPx*ratio*ux+nx*-28,by=y0+lenPx*ratio*uy+ny*-28;
    box(bx-28,by-20,56,40,6,colors.blue,'#102a43');
    text('物块',bx,by,'#fff','center',13,'900');
    arrow(bx,by-48,bx+ux*Math.min(95,Math.max(-95,v.v*18)),by-48+uy*Math.min(95,Math.max(-95,v.v*18)),colors.blue,3);
    text(`v物=${fmt(v.v,2)}`,bx+86,by-54,colors.blue,'center',12,'900');
    if(v.fricDir!==0) arrow(bx,by+30,bx+ux*v.fricDir*70,by+30+uy*v.fricDir*70,colors.red,3);
    else text('f=0',bx,by+32,colors.green,'center',12,'900');
    if(state.mode==='incline'){
      arrow(bx+45,by,bx+45,by+58,colors.orange,3);
      text('mg sinθ 向下',bx+95,by+35,colors.orange,'center',12,'900');
    }
    arrow(x0+40,y0+80,x0+40+state.vb*20,y0+80,colors.purple,3);
    text(`v带=${fmt(state.vb)}m/s`,x0+122,y0+80,colors.purple,'center',12,'900');
    line(x0,y0+118,x0+lenPx,y0+118,'#cbd5e1',8);
    line(x0,y0+118,x0+Math.min(1,v.x/state.L)*lenPx,y0+118,colors.blue,8);
    line(x0,y0+138,x0+Math.min(1,v.slip/Math.max(state.L,.1))*lenPx,y0+138,colors.red,5);
    text(`x物=${fmt(v.x,2)}m`,x0+85,y0+106,colors.blue,'center',12,'900');
    text(`俯视划痕 Δx=${fmt(v.slip,2)}m`,x0+130,y0+158,colors.red,'center',13,'900');
    box(196,348,224,42,7,v.phase.includes('末端')||v.phase.includes('滑离')?'#fef2f2':(v.phase==='共速'?'#ecfdf5':'#fff7ed'),v.phase==='共速'?'#14b8a6':'#f59e0b');
    text(v.phase,308,369,v.phase==='共速'?colors.green:(v.phase.includes('末端')||v.phase.includes('滑离')?colors.red:'#b45309'),'center',16,'900');
  }
  function drawJudgement(v){
    box(580,56,330,154,8,'#f8fafc','#d7dee8');
    text('共速/末端判定',745,82,'#0f172a','center',15,'900');
    text(`x共=${Number.isFinite(v.xSync)?fmt(v.xSync,2):'不能共速'} m`,745,124,colors.blue,'center',13,'900');
    text(`L=${fmt(state.L,1)} m`,745,154,colors.purple,'center',13,'900');
    text(v.reachesBeforeSync?'共速前到末端/滑离':'能先达到共速',745,184,v.reachesBeforeSync?colors.red:colors.green,'center',13,'900');
  }
  function drawGraphs(v){
    const gx=615,gw=260;
    plotArea(580,230,330,154,'v-t 图：两线相交是共速');
    const gy=354,gh=88,end=Math.max(.2,v.endT),maxV=Math.max(8,state.vb,state.v0,Math.abs(v.v),1);
    line(gx,gy-state.vb/maxV*gh,gx+gw,gy-state.vb/maxV*gh,colors.purple,2,[5,5]);
    ctx.beginPath();
    for(let i=0;i<=80;i++){const tt=end*i/80,r=sampleAt(tt);const x=gx+gw*i/80,y=gy-r.v/maxV*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
    ctx.strokeStyle=colors.blue;ctx.lineWidth=3;ctx.stroke();
    const tx=gx+gw*v.t/end;line(tx,gy,tx,gy-gh-8,colors.orange,2,[4,4]);text(`t=${fmt(v.t,2)}s`,tx,gy+16,colors.orange,'center',12,'900');
    plotArea(580,402,330,176,'Δx-t 图：面积差形成划痕');
    const sy=548,sh=108,maxS=Math.max(state.L,v.slip,1);
    ctx.beginPath();
    for(let i=0;i<=80;i++){const tt=end*i/80,r=sampleAt(tt);const x=gx+gw*i/80,y=sy-Math.min(1,r.slip/maxS)*sh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
    ctx.strokeStyle=colors.red;ctx.lineWidth=3;ctx.stroke();
    const tx2=gx+gw*v.t/end;line(tx2,sy,tx2,sy-sh-8,colors.orange,2,[4,4]);
    text('v物',865,250,colors.blue,'right',12,'900');text('v带',865,270,colors.purple,'right',12,'900');text('Δx',865,426,colors.red,'right',12,'900');
  }
  function ruler(x1,y,x2,label,c,hx,txt,active){
    line(x1,y,x2,y,'#0f172a',2);for(let i=0;i<=10;i++){const x=x1+(x2-x1)*i/10;line(x,y-5,x,y+5,'#0f172a',1)}text(label,(x1+x2)/2,y-18,c,'center',12,'900');handle(hx,y,txt,active,c);
  }
  function drawControls(v,g){
    box(34,610,876,108,8,'#fff','#d7dee8');
    text('拖时间游标，看摩擦方向、共速判定、划痕和图像记录同步变化',242,628,colors.orange,'center',12,'900');
    line(78,704,408,704,'#0f172a',2);for(let i=0;i<=10;i++)line(78+i*33,699,78+i*33,709,'#0f172a',1);
    handle(g.time.x,g.time.y,`t=${fmt(v.t,2)}s`,state.drag==='time',colors.orange);
    ruler(70,662,240,'v带',colors.purple,g.vb,`v带=${fmt(state.vb)}`,state.drag==='vb');
    ruler(270,662,440,'v0',colors.blue,g.v0,`v0=${fmt(state.v0)}`,state.drag==='v0');
    ruler(470,662,640,'μ',colors.red,g.mu,`μ=${fmt(state.mu,2)}`,state.drag==='mu');
    ruler(670,662,840,'L',colors.green,g.L,`L=${fmt(state.L)}m`,state.drag==='L');
    if(state.mode==='incline') ruler(670,624,840,'θ',colors.orange,g.theta,`θ=${fmt(state.theta,0)}°`,state.drag==='theta');
  }
  function update(v){
    els.v.textContent=`${fmt(v.v,2)} m/s`;
    els.phase.textContent=v.phase;
    els.sync.textContent=`${Number.isFinite(v.xSync)?fmt(v.xSync,2):'--'} / ${fmt(state.L,1)} m`;
    els.heat.textContent=`${fmt(v.slip,2)} m / ${fmt(v.heat,2)} J`;
    const bad=v.phase.includes('滑离')||v.phase.includes('末端'),warn=v.reachesBeforeSync||state.mode==='incline';
    els.status.className='status'+(bad?' bad':warn?' warn':'');
    els.status.textContent=(state.mode==='horizontal'?'水平带：摩擦只看相对速度，共速后通常为 0。':'倾斜带：除相对速度外，还要比较 μmgcosθ 与 mgsinθ。')+` 当前：${v.phase}，Q=μmgcosθ·Δx=${fmt(v.heat,2)} J。`;
  }
  function draw(){
    const v=values(),g=geometry();
    ctx.clearRect(0,0,960,760);
    const bg=ctx.createLinearGradient(0,0,0,760);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,960,760);
    text('传送带模型实验台：相对滑动决定摩擦方向，划痕决定生热',480,28,'#0f172a','center',20,'900');
    drawBelt(v);drawJudgement(v);drawGraphs(v);drawControls(v,g);update(v);
  }
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
  function near(p,h,rad=26){return Math.hypot(p.x-h.x,p.y-h.y)<=rad}
  function setMode(mode){
    state.mode=mode;state.t=0;state.playing=false;playBtn.textContent='播放过程';
    horizontalBtn.classList.toggle('active',mode==='horizontal');inclineBtn.classList.toggle('active',mode==='incline');draw();
  }
  function down(e){
    state.playing=false;playBtn.textContent='播放过程';
    const p=pos(e),g=geometry();state.drag=null;
    if(near(p,g.time,24))state.drag='time';
    else if(near(p,g.vb,24))state.drag='vb';
    else if(near(p,g.v0,24))state.drag='v0';
    else if(near(p,g.mu,24))state.drag='mu';
    else if(near(p,g.L,24))state.drag='L';
    else if(state.mode==='incline'&&near(p,g.theta,24))state.drag='theta';
    if(state.drag){canvas.setPointerCapture(e.pointerId);move(e)}
  }
  function move(e){
    if(!state.drag)return;
    const p=pos(e),v=values();
    if(state.drag==='time')state.t=clamp((p.x-78)/330*Math.max(.2,v.endT),0,v.endT);
    if(state.drag==='vb')state.vb=clamp(1+(p.x-70)/170*7,1,8);
    if(state.drag==='v0')state.v0=clamp((p.x-270)/170*8,0,8);
    if(state.drag==='mu')state.mu=clamp(.08+(p.x-470)/170*.52,.08,.6);
    if(state.drag==='L')state.L=clamp(4+(p.x-670)/170*12,4,16);
    if(state.drag==='theta')state.theta=clamp((p.x-670)/170*37,0,37);
    state.t=clamp(state.t,0,values().endT);draw();
  }
  function up(e){if(state.drag){state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}draw()}}
  canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);
  horizontalBtn.addEventListener('click',()=>setMode('horizontal'));
  inclineBtn.addEventListener('click',()=>setMode('incline'));
  document.querySelectorAll('[data-case]').forEach(btn=>btn.addEventListener('click',()=>{
    const c=btn.dataset.case;state.playing=false;playBtn.textContent='播放过程';
    if(c==='slow'){state.mode='horizontal';state.v0=0;state.vb=4;state.mu=.2;state.L=10;state.t=0}
    if(c==='fast'){state.mode='horizontal';state.v0=7;state.vb=3;state.mu=.2;state.L=10;state.t=0}
    if(c==='short'){state.mode='horizontal';state.v0=0;state.vb=6;state.mu=.12;state.L=4;state.t=0}
    if(c==='incline'){state.mode='incline';state.v0=0;state.vb=2;state.mu=.35;state.theta=37;state.L=10;state.t=0}
    setMode(state.mode);
  }));
  playBtn.addEventListener('click',()=>{
    state.playing=!state.playing;playBtn.textContent=state.playing?'暂停':'播放过程';
    let last=performance.now();
    function step(now){
      if(!state.playing)return;
      const dt=(now-last)/1000;last=now;state.t+=dt;
      const v=values();
      if(state.t>=v.endT){state.t=v.endT;state.playing=false;playBtn.textContent='播放过程';draw();return}
      draw();requestAnimationFrame(step);
    }
    if(state.playing)requestAnimationFrame(step);else draw();
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{state.playing=false;state.t=0;playBtn.textContent='播放过程';draw()});
  draw();
})();
</script>
</body>
</html>
