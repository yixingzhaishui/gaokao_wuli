<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-10 匀变速直线运动实验台</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}
  .stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}
  .hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:white;border-radius:6px;padding:7px 10px;font-size:12px}
  .panel{display:flex;flex-direction:column;gap:8px}
  .box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}
  .task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}
  .buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{border:1px solid #bcccdc;background:white;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}
  button.active{background:#2f80ed;color:white;border-color:#2f80ed}
  .readout{background:#102a43;color:white;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}
  .readout b{color:#ffd166}
  .formula{font-size:13px;line-height:1.55}
  .warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}
  @media (max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="canvas" width="940" height="560" aria-label="匀变速直线运动交互实验台"></canvas>
    <div class="hint">可拖动 v0 点、6 s 端点和橙色 t 游标，直接改变三条运动学公式里的量</div>
  </div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>拖右端点改变加速度，看频闪间距差是否恒定；拖 t 游标，看面积 x 与小车位移同步；拖 v0 点，看面积从三角形变成梯形。</div>
    <div class="box">
      <b>运动情境</b>
      <div class="buttons" style="margin-top:7px">
        <button id="mAccel" class="active">匀加速</button><button id="mBrake">匀减速</button>
        <button id="mReverse">反向加速</button><button id="mZero">由静止开始</button>
      </div>
    </div>
    <div class="box"><button id="play" style="width:100%">▶ 播放运动</button></div>
    <div class="readout" id="readout"></div>
    <div class="box formula">
      <b>三式同源</b><br>
      v=v0+at：图上纵坐标。<br>
      x=v0t+1/2at²：v-t 面积。<br>
      v²-v0²=2ax：消去时间后的校验。
    </div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(() => {
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const readout=document.getElementById('readout');
  const status=document.getElementById('status');
  const buttons={
    accel:document.getElementById('mAccel'),
    brake:document.getElementById('mBrake'),
    reverse:document.getElementById('mReverse'),
    zero:document.getElementById('mZero')
  };
  const state={v0:2,a:1.4,t:4,mode:'accel'};
  const g={ox:82,oy:412,w:520,h:300,tMax:6,vMin:-10,vMax:18};
  const track={x:82,y:112,w:720,min:-30,max:80};
  let drag=null, layout={};

  function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
  function vAt(t){return state.v0+state.a*t;}
  function xAt(t){return state.v0*t+0.5*state.a*t*t;}
  function gx(t){return g.ox+t/g.tMax*g.w;}
  function gy(v){return g.oy-(v-g.vMin)/(g.vMax-g.vMin)*g.h;}
  function tFromX(x){return clamp((x-g.ox)/g.w*g.tMax,0,g.tMax);}
  function vFromY(y){return clamp(g.vMin+(g.oy-y)/g.h*(g.vMax-g.vMin),g.vMin,g.vMax);}
  function pxOf(x){return track.x+(x-track.min)/(track.max-track.min)*track.w;}
  function setMode(mode){
    state.mode=mode;
    if(mode==='accel'){state.v0=2;state.a=1.4;state.t=4;}
    if(mode==='brake'){state.v0=10;state.a=-1.8;state.t=4;}
    if(mode==='reverse'){state.v0=-4;state.a=-1.2;state.t=4;}
    if(mode==='zero'){state.v0=0;state.a=2;state.t=4;}
    Object.entries(buttons).forEach(([k,b])=>b.classList.toggle('active',k===mode));
    draw();
  }
  Object.entries(buttons).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
  function line(x1,y1,x2,y2,color,width=1){ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  function text(s,x,y,color='#243b53',size=13,align='left',weight='600'){ctx.fillStyle=color;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y);}
  function arrow(x1,y1,x2,y2,color,width=3){
    line(x1,y1,x2,y2,color,width);
    const a=Math.atan2(y2-y1,x2-x1),l=10;
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-l*Math.cos(a-0.55),y2-l*Math.sin(a-0.55));
    ctx.lineTo(x2-l*Math.cos(a+0.55),y2-l*Math.sin(a+0.55));
    ctx.closePath();ctx.fillStyle=color;ctx.fill();
  }
  function handle(x,y,label,color){
    ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=3;ctx.stroke();
    text(label,x+14,y-15,color,13);
  }
  function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();}
  function drawAxes(){
    card(50,36,835,128); card(50,188,835,310);
    line(g.ox,g.oy,g.ox+g.w+28,g.oy,'#334e68',2);
    line(g.ox,g.oy,g.ox,g.oy-g.h-20,'#334e68',2);
    text('t/s',g.ox+g.w+38,g.oy+5,'#334e68',13); text('v/(m/s)',g.ox-42,g.oy-g.h-22,'#334e68',13);
    for(let t=0;t<=6;t++){const x=gx(t);line(x,g.oy-5,x,g.oy+5,'#9fb3c8');text(String(t),x,g.oy+21,'#627d98',12,'center','500');}
    for(let v=-10;v<=15;v+=5){const y=gy(v);line(g.ox-5,y,g.ox+g.w,y,v===0?'#7b8794':'#d9e2ec',v===0?1.7:1);text(String(v),g.ox-14,y,'#627d98',12,'right','500');}
  }
  function drawTrack(){
    line(track.x,track.y,track.x+track.w,track.y,'#9fb3c8',4);
    for(let m=-20;m<=80;m+=10){const px=pxOf(m);line(px,track.y-8,px,track.y+8,'#bcccdc');text(String(m),px,track.y+25,'#7b8794',10,'center','500');}
    const T=0.5, count=Math.floor(state.t/T);
    let lastPx=null, lastGap=null;
    for(let i=0;i<=count;i++){
      const tt=i*T, px=pxOf(xAt(tt));
      if(px>=track.x&&px<=track.x+track.w){ctx.fillStyle='#2f80ed';ctx.beginPath();ctx.arc(px,track.y-8,4.6,0,Math.PI*2);ctx.fill();}
      if(i>0&&lastPx!==null&&px>=track.x&&px<=track.x+track.w){
        const gap=px-lastPx; if(i<=4) line(lastPx,track.y-30,px,track.y-30,'#f08c00',2);
        lastGap=gap;
      }
      lastPx=px;
    }
    const p=clamp(pxOf(xAt(state.t)),track.x,track.x+track.w), v=vAt(state.t);
    ctx.fillStyle='#2f80ed';ctx.beginPath();ctx.roundRect(p-24,track.y-50,48,26,6);ctx.fill();
    ctx.fillStyle='#243b53';ctx.beginPath();ctx.arc(p-15,track.y-22,5,0,Math.PI*2);ctx.arc(p+15,track.y-22,5,0,Math.PI*2);ctx.fill();
    if(Math.abs(v)>0.05) arrow(p,track.y-62,p+Math.sign(v)*clamp(Math.abs(v)*10,20,90),track.y-62,'#e8590c',4);
    if(Math.abs(state.a)>0.05) arrow(p,track.y-82,p+Math.sign(state.a)*clamp(Math.abs(state.a)*25,24,80),track.y-82,'#7b2cbf',4);
    text('频闪点：相同 Δt=0.5 s；匀变速时相邻位移差 Δs 恒定',468,55,'#334e68',14,'center','800');
    text(`x=${xAt(state.t).toFixed(1)} m，v=${v.toFixed(1)} m/s，Δs=aT²=${(state.a*T*T).toFixed(2)} m`,468,84,'#0b7285',14,'center','800');
  }
  function drawArea(tCur){
    const zero=gy(0), steps=160;
    for(let i=0;i<steps;i++){
      const t1=tCur*i/steps,t2=tCur*(i+1)/steps;
      const v1=vAt(t1),v2=vAt(t2),x1=gx(t1),x2=gx(t2),y1=gy(v1),y2=gy(v2);
      ctx.beginPath();ctx.moveTo(x1,zero);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x2,zero);ctx.closePath();
      ctx.fillStyle=(v1+v2)>=0?'rgba(240,140,0,0.24)':'rgba(44,123,229,0.20)';ctx.fill();
    }
  }
  function drawGraph(){
    const t=state.t,v=vAt(t),x=xAt(t);
    drawArea(t);
    ctx.beginPath();
    for(let i=0;i<=120;i++){const tt=g.tMax*i/120,sx=gx(tt),sy=gy(vAt(tt));if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);}
    ctx.strokeStyle='#2f80ed';ctx.lineWidth=3;ctx.stroke();
    const p0={x:gx(0),y:gy(state.v0)}, pe={x:gx(g.tMax),y:gy(vAt(g.tMax))}, pc={x:gx(t),y:gy(v)};
    line(pc.x,g.oy,pc.x,pc.y,'#f08c00',2); line(g.ox,pc.y,pc.x,pc.y,'#8ab4ff',1.5);
    arrow(gx(1),gy(vAt(1)),gx(2),gy(vAt(2)),'#7b2cbf',3);
    text(`斜率 a=${state.a.toFixed(2)} m/s²`,gx(2)+12,gy(vAt(2))-13,'#7b2cbf',13);
    text(`面积 x=${x.toFixed(1)} m`,gx(Math.max(0.5,t*0.48)),gy(Math.max(0,v*0.45))+18,'#f08c00',13);
    handle(p0.x,p0.y,'v0','#2f80ed');
    handle(pe.x,pe.y,'调 a','#7b2cbf');
    handle(pc.x,pc.y,'t','#f08c00');
    layout={v0:p0,end:pe,time:pc};
  }
  function drawFormulaPanel(){
    const x=662,y=215,w=180,h=230,t=state.t,v=vAt(t),s=xAt(t);
    ctx.fillStyle='rgba(16,42,67,0.94)';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();
    text('公式即时校验',x+90,y+24,'#fff',14,'center','800');
    text(`v = v0 + at`,x+16,y+58,'#dbeafe',13);
    text(`${v.toFixed(2)} = ${state.v0.toFixed(1)} + ${state.a.toFixed(2)}×${t.toFixed(2)}`,x+16,y+78,'#ffd166',12);
    text(`x = v0t + 1/2at²`,x+16,y+112,'#dbeafe',13);
    text(`x = ${s.toFixed(2)} m`,x+16,y+132,'#ffd166',12);
    text(`v²-v0² = 2ax`,x+16,y+166,'#dbeafe',13);
    text(`${(v*v-state.v0*state.v0).toFixed(2)} ≈ ${(2*state.a*s).toFixed(2)}`,x+16,y+186,'#ffd166',12);
    text('同一条 v-t 直线',x+90,y+215,'#9fb3c8',12,'center','600');
  }
  function draw(){
    var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);
    drawAxes(); drawTrack(); drawGraph(); drawFormulaPanel();
    const t=state.t,v=vAt(t),x=xAt(t),lhs=v*v-state.v0*state.v0,rhs=2*state.a*x;
    readout.innerHTML=`v0=<b>${state.v0.toFixed(1)}</b> m/s<br>a=<b>${state.a.toFixed(2)}</b> m/s²<br>t=<b>${t.toFixed(2)}</b> s<br>v=<b>${v.toFixed(2)}</b> m/s<br>x=<b>${x.toFixed(2)}</b> m<br>v²-v0²=<b>${lhs.toFixed(2)}</b>，2ax=<b>${rhs.toFixed(2)}</b>`;
    if(Math.abs(state.a)<0.03) status.textContent='a≈0：退化为匀速直线运动，v-t 近似水平，频闪间距相等。';
    else if(state.v0>0&&state.a<0&&t>-state.v0/state.a) status.textContent='数学模型已经越过 v=0 后反向；真实刹车题要在 v=0 处停止，下一节专门处理。';
    else status.textContent='匀变速的关键不是速度相等，而是速度每秒改变量相等；频闪表现为相邻位移差恒定。';
  }
  function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height};}
  canvas.addEventListener('pointerdown',e=>{
    const p=pointer(e);
    for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30){drag=k;canvas.setPointerCapture(e.pointerId);break;}}
  });
  canvas.addEventListener('pointermove',e=>{
    const p=pointer(e);
    if(drag==='v0') state.v0=Math.round(vFromY(p.y)*10)/10;
    if(drag==='end') state.a=Math.round(((vFromY(p.y)-state.v0)/g.tMax)*100)/100;
    if(drag==='time') state.t=Math.round(tFromX(p.x)*20)/20;
    if(drag){draw();return;}
    let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30)hit=true;}
    canvas.style.cursor=hit?'grab':'default';
  });
  window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default';});
  draw();
const playBtn=document.getElementById("play");let __run=false,__last=performance.now();playBtn.addEventListener("click",()=>{const cap=(6);if(state.t>=cap)state.t=0;__run=!__run;playBtn.textContent=__run?"⏸ 暂停":"▶ 播放运动";});canvas.addEventListener("pointerdown",()=>{if(__run){__run=false;playBtn.textContent="▶ 播放运动";}});function __loop(now){const dt=Math.min((now-__last)/1000,.05);__last=now;const cap=(6);if(__run){state.t=Math.min(cap,state.t+dt);if(state.t>=cap){__run=false;playBtn.textContent="▶ 重新播放";}draw();}requestAnimationFrame(__loop);}requestAnimationFrame(__loop);
})();
</script>
</body>
</html>
