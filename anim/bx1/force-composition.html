<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B1-19 力的合成</title>
<style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{min-height:38px;border:1px solid #bcccdc;background:#fff;border-radius:6px;font-weight:700;cursor:pointer}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;line-height:1.6}.readout b{color:#ffd166}.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:9px;font-size:12px;font-weight:800;line-height:1.5}[hidden]{display:none!important}@media(max-width:760px){.wrap{grid-template-columns:minmax(0,1fr)}.panel{grid-row:2}}</style></head>
<body><div class="wrap" id="app" data-mode="fixed-magnitudes" data-guided-complete="false"><div class="stage"><canvas id="canvas" width="940" height="560" aria-label="力的合成：固定分力大小改变夹角与自由矢量合成"></canvas></div><div class="panel">
<div class="box task"><b>观察任务：</b>自动演示锁定 F1、F2 大小，只改变夹角；开始扫描前先预测合力怎样变化。演示后只拖 F2 端点，F1 保持不变。</div>
<div class="box buttons"><button id="play">▶ 固定大小扫描夹角</button><button id="reset">重置</button></div>
<div class="box" id="predictCard" hidden><b>暂停预测：</b>保持 F1、F2 大小不变，夹角增大时合力怎样变化？<div class="buttons"><button data-predict="decrease">减小</button><button data-predict="increase">增大</button></div></div>
<div class="box" id="feedbackCard" hidden></div>
<div class="box buttons"><button data-case="same">同向</button><button data-case="right">垂直</button><button data-case="opposite">反向</button><button data-case="free">自由示例</button></div>
<div class="readout" id="readout"></div><div class="box"><b>等效关系</b><br>红色合力替代两个蓝色力的共同作用效果，不是额外第三个真实力。</div><div class="status" id="status"></div></div></div>
<script>(()=>{const app=document.getElementById('app'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status'),play=document.getElementById('play'),predictCard=document.getElementById('predictCard'),feedbackCard=document.getElementById('feedbackCard');const O={x:380,y:320},scale=30;const state={m1:7,m2:5,a1:0,a2:0,mode:'fixed-magnitudes',running:false,last:0,prediction:'',complete:false};const vec=(m,a)=>({x:m*Math.cos(a),y:m*Math.sin(a)}),text=(s,x,y,c='#243b53',z=14,al='center',w=700)=>{ctx.fillStyle=c;ctx.font=`${w} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(s,x,y)},line=(x1,y1,x2,y2,c,w=2,d=[])=>{ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()};function arrow(v,c,w){const x=O.x+v.x*scale,y=O.y-v.y*scale;line(O.x,O.y,x,y,c,w);const a=Math.atan2(y-O.y,x-O.x);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-12*Math.cos(a-.45),y-12*Math.sin(a-.45));ctx.lineTo(x-12*Math.cos(a+.45),y-12*Math.sin(a+.45));ctx.fill();return{x,y}}
function draw(){const f1=vec(state.m1,state.a1),f2=vec(state.m2,state.a2),R={x:f1.x+f2.x,y:f1.y+f2.y},theta=Math.acos(Math.max(-1,Math.min(1,(f1.x*f2.x+f1.y*f2.y)/(state.m1*state.m2))))*180/Math.PI;ctx.clearRect(0,0,940,560);const bg=ctx.createLinearGradient(0,0,0,560);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,940,560);text('力的合成：合力是等效替代，不是第三个力',470,35,'#102a43',20);for(let i=-10;i<=10;i+=2){line(O.x+i*scale,70,O.x+i*scale,500,'#eef2f7',1);line(60,O.y+i*scale,820,O.y+i*scale,'#eef2f7',1)}const A=arrow(f1,'#2563eb',4),B=arrow(f2,'#2563eb',4),C=arrow(R,'#dc2626',5);line(A.x,A.y,C.x,C.y,'#94a3b8',2,[6,5]);line(B.x,B.y,C.x,C.y,'#94a3b8',2,[6,5]);text('F1（锁定）',A.x,A.y-20,'#2563eb');text('F2（可拖）',B.x,B.y-20,'#2563eb');text('F合（等效）',C.x+10,C.y-20,'#dc2626',14,'left');text(`θ=${theta.toFixed(0)}°`,120,110,'#b45309',16);readout.innerHTML=`F1=<b>${state.m1.toFixed(1)} N（锁定）</b><br>F2=<b>${state.m2.toFixed(1)} N</b><br>夹角=<b>${theta.toFixed(1)}°</b><br>合力=<b>${Math.hypot(R.x,R.y).toFixed(2)} N</b>`;if(state.mode==='fixed-magnitudes')status.textContent='F1、F2 大小保持不变：夹角从 0° 增至 180° 时，合力单调减小。';else status.textContent='自由模式拖动 F2 会同时改变它的大小和夹角：只能按当前矢量合成，不能声称“夹角越大合力必越小”。';app.dataset.mode=state.mode;app.dataset.f1=state.m1.toFixed(2);app.dataset.f2=state.m2.toFixed(2);app.dataset.resultantIsThirdForce='false';app.dataset.guidedComplete=String(state.complete)}
function setCase(c){state.running=false;play.textContent='▶ 固定大小扫描夹角';if(c==='same'){state.m1=7;state.m2=5;state.a1=0;state.a2=0;state.mode='fixed-magnitudes'}if(c==='right'){state.m1=7;state.m2=5;state.a1=0;state.a2=Math.PI/2;state.mode='fixed-magnitudes'}if(c==='opposite'){state.m1=7;state.m2=5;state.a1=0;state.a2=Math.PI;state.mode='fixed-magnitudes'}if(c==='free'){state.m1=4;state.m2=8;state.a1=.3;state.a2=2.1;state.mode='free-magnitudes-and-angle'}draw()}
document.querySelectorAll('[data-case]').forEach(b=>b.onclick=()=>setCase(b.dataset.case));
document.getElementById('reset').onclick=()=>{setCase('same');state.complete=false;state.prediction='';predictCard.hidden=true;feedbackCard.hidden=true;draw()};
play.onclick=()=>{state.running=false;state.mode='fixed-magnitudes';state.m1=7;state.m2=5;state.a1=0;state.a2=0;predictCard.hidden=false;feedbackCard.hidden=true;play.textContent='等待预测';draw()};
document.querySelectorAll('[data-predict]').forEach(btn=>btn.onclick=()=>{state.prediction=btn.dataset.predict;predictCard.hidden=true;state.running=true;state.last=performance.now();play.textContent='⏸ 暂停扫描';requestAnimationFrame(loop)});
function loop(now){if(!state.running)return;const dt=Math.min(.05,(now-state.last)/1000);state.last=now;state.a2+=dt*.8;if(state.a2>=Math.PI){state.a2=Math.PI;state.running=false;state.complete=true;play.textContent='▶ 重播固定大小扫描';feedbackCard.hidden=false;feedbackCard.innerHTML=`<b>你的预测：</b>${state.prediction==='decrease'?'减小':'增大'}<br><b>实际结果：</b>两分力大小不变时，夹角越大，合力越小。<br><b>证据：</b>读数从 12.0 N 逐渐降到 2.0 N。<br><b>原因：</b>平行四边形的对角线随夹角张开而缩短。`}draw();if(state.running)requestAnimationFrame(loop)}
let dragging=false;
canvas.addEventListener('pointerdown',event=>{dragging=true;state.running=false;play.textContent='▶ 固定大小扫描夹角';canvas.setPointerCapture(event.pointerId)});
canvas.addEventListener('pointermove',event=>{if(!dragging)return;const rect=canvas.getBoundingClientRect(),x=(event.clientX-rect.left)*canvas.width/rect.width,y=(event.clientY-rect.top)*canvas.height/rect.height,dx=(x-O.x)/scale,dy=(O.y-y)/scale;state.m2=Math.max(.5,Math.min(10,Math.hypot(dx,dy)));state.a2=Math.atan2(dy,dx);state.mode='free-magnitudes-and-angle';draw()});
canvas.addEventListener('pointerup',()=>{dragging=false});
draw()})();</script></body></html>
