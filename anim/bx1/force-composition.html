<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-19 力的合成实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="力的合成交互实验台：共点力俯视装置、平行四边形图像和数据记录"></canvas><div class="hint">可直接拖 F1、F2 端点；红色对角线是两个力的等效合力</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>拖两个蓝色端点，对照共点力俯视装置、平行四边形图像和数据记录，看夹角从 0°、90° 到 180° 时合力怎样变化。</div>
    <div class="box"><b>快捷角度</b><div class="buttons" style="margin-top:7px"><button id="mSame" class="active">同向</button><button id="mRight">垂直</button><button id="mOpp">反向</button><button id="mFree">自由拖动</button></div></div>
  <div class="box"><div class="buttons"><button id="play">▶ 旋转 F2</button><button id="resetBtn">重置</button></div></div>
    <div class="readout" id="readout"></div>
    <div class="box formula"><b>公式绑定</b><br>F合²=F1²+F2²+2F1F2cosθ。<br>同向最大：F1+F2。<br>反向最小：|F1-F2|。</div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={same:document.getElementById('mSame'),right:document.getElementById('mRight'),opp:document.getElementById('mOpp'),free:document.getElementById('mFree')};const O={x:320,y:315},scale=28;let s={f1:{x:7,y:0},f2:{x:5,y:0},mode:'same'};let drag=null,layout={};function mag(v){return Math.hypot(v.x,v.y)}function theta(){const m1=mag(s.f1),m2=mag(s.f2);if(m1*m2<1e-6)return 0;return Math.acos(Math.max(-1,Math.min(1,(s.f1.x*s.f2.x+s.f1.y*s.f2.y)/(m1*m2))))*180/Math.PI}function R(){return{x:s.f1.x+s.f2.x,y:s.f1.y+s.f2.y}}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=12;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}function toScreen(v){return{x:O.x+v.x*scale,y:O.y-v.y*scale}}function fromScreen(p){return{x:Math.max(-12,Math.min(12,(p.x-O.x)/scale)),y:Math.max(-9,Math.min(9,(O.y-p.y)/scale))}}function setMode(m){s.mode=m;if(m==='same'){s.f1={x:7,y:0};s.f2={x:5,y:0}}if(m==='right'){s.f1={x:6,y:0};s.f2={x:0,y:5}}if(m==='opp'){s.f1={x:7,y:0};s.f2={x:-5,y:0}}Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};card(50,36,835,462);text('力的合成实验台：共点力俯视装置 + 平行四边形图像 + 数据记录',468,64,'#334e68',16,'center','800');for(let x=-12;x<=12;x+=2)line(O.x+x*scale,O.y-9*scale,O.x+x*scale,O.y+9*scale,'#eef2f7');for(let y=-8;y<=8;y+=2)line(O.x-12*scale,O.y-y*scale,O.x+13*scale,O.y-y*scale,'#eef2f7');const A=toScreen(s.f1),B=toScreen(s.f2),C=toScreen(R());line(A.x,A.y,C.x,C.y,'#9fb3c8',2,[6,5]);line(B.x,B.y,C.x,C.y,'#9fb3c8',2,[6,5]);arrow(O.x,O.y,A.x,A.y,'#2f80ed',4);arrow(O.x,O.y,B.x,B.y,'#2f80ed',4);arrow(O.x,O.y,C.x,C.y,'#e03131',5);handle(A.x,A.y,'F1','#2f80ed');handle(B.x,B.y,'F2','#2f80ed');layout.f1=A;layout.f2=B;text('F合',C.x+12,C.y-15,'#e03131',15,'left','800');ctx.strokeStyle='#f08c00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(O.x,O.y,46,Math.atan2(-s.f1.y,s.f1.x),Math.atan2(-s.f2.y,s.f2.x),false);ctx.stroke();text(`θ=${theta().toFixed(0)}°`,O.x+70,O.y-28,'#b36b00',13,'left','800');card(602,112,210,210);text('读图提醒',707,140,'#102a43',15,'center','800');text(`F1=${mag(s.f1).toFixed(1)} N`,707,176,'#2f80ed',14,'center','800');text(`F2=${mag(s.f2).toFixed(1)} N`,707,205,'#2f80ed',14,'center','800');text(`F合=${mag(R()).toFixed(1)} N`,707,245,'#e03131',16,'center','800');text('画合力后不要再把',707,284,'#486581',12,'center');text('F1、F2重复相加',707,304,'#486581',12,'center');readout.innerHTML=`模式=<b>${s.mode}</b><br>F1=<b>${mag(s.f1).toFixed(2)}</b> N<br>F2=<b>${mag(s.f2).toFixed(2)}</b> N<br>θ=<b>${theta().toFixed(1)}</b>°<br>F合=<b>${mag(R()).toFixed(2)}</b> N<br>方向=<b>${(Math.atan2(R().y,R().x)*180/Math.PI).toFixed(1)}</b>°`;let msg=s.mode==='free'?'自由拖动：拖动 F1/F2 端点观察夹角与合力。':'夹角越大，合力通常越小；红色箭头是等效合力。';if(theta()<3)msg='两力同向：合力最大，F合=F1+F2。';else if(Math.abs(theta()-90)<3)msg='两力垂直：F合²=F1²+F2²。';else if(Math.abs(theta()-180)<3)msg='两力反向：合力最小，F合=|F1-F2|。';status.textContent=msg}
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{const p=pointer(e);for(const k of ['f1','f2']){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<34){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag){s[drag]=fromScreen(p);s.mode='free';Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k==='free'));draw();return}let hit=false;for(const k of ['f1','f2']){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<34)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
const playBtn=document.getElementById('play');const resetBtn=document.getElementById('resetBtn');let running=false,last=performance.now();
playBtn.addEventListener('click',()=>{running=!running;playBtn.textContent=running?'⏸ 暂停':'▶ 旋转 F2';});
resetBtn.addEventListener('click',()=>{running=false;s={f1:{x:7,y:0},f2:{x:5,y:0},mode:'same'};Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k==='same'));playBtn.textContent='▶ 旋转 F2';draw();});
canvas.addEventListener('pointerdown',()=>{if(running){running=false;playBtn.textContent='▶ 旋转 F2';}});
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running){const m2=mag(s.f2)||5;const ang=Math.atan2(s.f2.y,s.f2.x)+dt*0.9;s.f2={x:Math.round(m2*Math.cos(ang)*100)/100,y:Math.round(m2*Math.sin(ang)*100)/100};s.mode='free';draw();}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
