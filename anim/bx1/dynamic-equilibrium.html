<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-22 动态平衡：准静态边界</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#eef3f8;color:#102a43;font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:920/520;touch-action:none}.panel{display:flex;flex-direction:column;gap:8px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px}.task{border-left:4px solid #f59e0b;background:#fff7ed;font-size:12px;line-height:1.5}.chips{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #94a3b8;background:#fff;border-radius:7px;min-height:36px;cursor:pointer;color:#102a43;font-weight:700}button.active{background:#e0f2fe;border-color:#0284c7;color:#075985}.readout{display:grid;grid-template-columns:1fr 1fr;gap:6px}.meter{background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px}.meter span{display:block;font-size:11px;color:#b6c5d8}.meter b{display:block;color:#fbbf24;font-size:15px}.formula{font-size:12px;line-height:1.55}.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;font-weight:800;line-height:1.45}.status.warn{border-color:#f59e0b;background:#fff7ed;color:#b45309}.status.bad{border-color:#ef4444;background:#fef2f2;color:#b91c1c}[hidden]{display:none!important}@media(max-width:760px){.root{grid-template-columns:minmax(0,1fr)}.panel{grid-row:2}}
</style>
</head>
<body>
<div class="root" id="app" data-mode="quasistatic" data-equilibrium="true" data-guided-complete="false">
  <div class="stage"><canvas id="canvas" width="920" height="520" aria-label="对称双绳准静态与快速运动对比：实物场景、受力图、T-theta图像和数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>先观察绳端按真实时间步长缓慢放平；接近水平前必须预测张力变化。完成准静态证据后，才开放快速反例、公式和自由拖动。</div>
    <div class="chips"><button id="playBtn">▶ 开始准静态慢放</button><button id="resetBtn">重置</button></div>
    <div class="card" id="predictCard" hidden><b>暂停预测：</b>绳继续接近水平，每根绳张力怎样变化？<div class="chips"><button data-predict="increase">增大</button><button data-predict="decrease">减小</button></div></div>
    <div class="card" id="feedbackCard" hidden></div>
    <div class="card" id="exploreCard" hidden><b>演示完成后探索</b><div class="chips"><button id="slowBtn" class="active">准静态慢速</button><button id="fastBtn">快速移动反例</button></div><div class="chips"><button data-theta="20">接近水平</button><button data-theta="55">常规角度</button></div></div>
    <div class="card"><div class="readout"><div class="meter"><span>绳角 θ</span><b id="thetaText"></b></div><div class="meter"><span>每根绳 T</span><b id="tText"></b></div><div class="meter"><span>加速度 a</span><b id="aText"></b></div><div class="meter"><span>合力 ΣFy</span><b id="sumText"></b></div></div></div>
    <div class="card formula" id="formulaCard" hidden><b>模型边界：</b>仅对称双绳、准静态平衡时，$2T\sin\theta=G$，$T=G/(2\sin\theta)$。快速运动出现明显加速度时改用 $\Sigma F_y=ma$。</div>
    <div class="status" id="status">准备：默认模式为准静态慢速变化。</div>
  </div>
</div>
<script>
(()=>{
  'use strict';
  const app=document.getElementById('app'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const playBtn=document.getElementById('playBtn'),predictCard=document.getElementById('predictCard'),feedbackCard=document.getElementById('feedbackCard'),exploreCard=document.getElementById('exploreCard'),formulaCard=document.getElementById('formulaCard'),status=document.getElementById('status');
  const out={theta:document.getElementById('thetaText'),T:document.getElementById('tText'),a:document.getElementById('aText'),sum:document.getElementById('sumText')};
  const state={theta:55,G:20,mode:'quasistatic',phase:'ready',playing:false,last:0,dt:0,ay:0,fastTime:0,fastY:0,dragging:false,complete:false,prediction:''};
  const C={blue:'#2563eb',red:'#dc2626',ink:'#102a43',muted:'#64748b',green:'#0f766e',orange:'#f59e0b'};
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function text(s,x,y,c=C.ink,size=13,align='center',weight=700){ctx.fillStyle=c;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c='#94a3b8',w=2,dash=[]){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-12*Math.cos(a-.43),y2-12*Math.sin(a-.43));ctx.lineTo(x2-12*Math.cos(a+.43),y2-12*Math.sin(a+.43));ctx.fill()}
  function panel(x,y,w,h,fill='#fff'){ctx.fillStyle=fill;ctx.strokeStyle='#d7dee8';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}
  function values(){const rad=state.theta*Math.PI/180,m=state.G/10;const T=state.mode==='quasistatic'?state.G/(2*Math.sin(rad)):(state.G+m*state.ay)/(2*Math.sin(rad));return{rad,m,T,Ty:T*Math.sin(rad),net:m*state.ay}}
  function geometry(){if(state.mode==='fast'){const O={x:270,y:235-state.fastY*120};return{O,L:{x:90,y:80},R:{x:450,y:80}}}const O={x:270,y:235},len=185,rad=state.theta*Math.PI/180;return{O,L:{x:O.x-len*Math.cos(rad),y:O.y-len*Math.sin(rad)},R:{x:O.x+len*Math.cos(rad),y:O.y-len*Math.sin(rad)}}}
  function drawScene(v,g){panel(35,62,490,390);line(g.L.x,g.L.y,g.O.x,g.O.y,'#334155',5);line(g.O.x,g.O.y,g.R.x,g.R.y,'#334155',5);const loadTop=g.O.y+112;line(g.O.x,g.O.y,g.O.x,loadTop,'#64748b',3);ctx.fillStyle='#fee2e2';ctx.strokeStyle=C.red;ctx.beginPath();ctx.roundRect(g.O.x-38,loadTop,76,58,7);ctx.fill();ctx.stroke();text('重物',g.O.x,loadTop+29,'#991b1b');[g.L,g.R].forEach(p=>{ctx.fillStyle='#fff';ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();ctx.stroke()});const scale=Math.min(5,125/Math.max(v.T,state.G));arrow(g.O.x,g.O.y,g.O.x-v.T*Math.cos(v.rad)*scale,g.O.y-v.T*Math.sin(v.rad)*scale,C.blue,4);arrow(g.O.x,g.O.y,g.O.x+v.T*Math.cos(v.rad)*scale,g.O.y-v.T*Math.sin(v.rad)*scale,C.blue,4);arrow(g.O.x,g.O.y,g.O.x,g.O.y+state.G*scale,C.red,4);text(`θ=${state.theta.toFixed(1)}°`,g.O.x+95,g.O.y+20,C.muted);text(`T=${v.T.toFixed(1)} N`,g.O.x-118,g.O.y-75,C.blue);text(state.mode==='quasistatic'?'绳端缓慢移动：a≈0':`重物竖直振动：y=${state.fastY.toFixed(2)} m`,g.O.x,Math.min(438,loadTop+82),state.mode==='quasistatic'?C.green:C.red,14)}
  function graphT(theta){return state.G/(2*Math.sin(theta*Math.PI/180))}
  function drawGraph(v){panel(550,62,335,235,'#f8fafc');text('T-θ 图像（蓝线为准静态模型）',718,85,C.ink,15);const ox=600,oy=255,w=235,h=140;line(ox,oy,ox+w,oy,'#334155');line(ox,oy,ox,oy-h,'#334155');ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();for(let t=12;t<=80;t++){const x=ox+(t-12)/68*w,y=oy-clamp(graphT(t),0,100)/100*h;if(t===12)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();const px=ox+(state.theta-12)/68*w,py=oy-clamp(v.T,0,100)/100*h;ctx.fillStyle=state.mode==='quasistatic'?C.orange:C.red;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();text(state.mode==='quasistatic'?'当前准静态数据点':'快速数据点不在平衡模型上',718,278,state.mode==='quasistatic'?C.orange:C.red,12)}
  function drawEvidence(v){panel(550,320,335,132);text('受力证据',580,344,C.ink,14,'left',900);const total=2*v.Ty,max=Math.max(total,state.G,25),w1=220*total/max,w2=220*state.G/max;line(620,378,620+w1,378,C.blue,9);line(620,411,620+w2,411,C.red,9);text(`2Tsinθ=${total.toFixed(1)} N`,610,378,C.blue,11,'right');text(`G=${state.G.toFixed(1)} N`,610,411,C.red,11,'right');text(state.mode==='quasistatic'?'ΣFy≈0，平衡近似成立':`ΣFy=${v.net.toFixed(1)} N=ma，不是 0`,855,440,state.mode==='quasistatic'?C.green:C.red,12,'right')}
  function update(v){out.theta.textContent=`${state.theta.toFixed(1)}°`;out.T.textContent=`${v.T.toFixed(1)} N`;out.a.textContent=state.mode==='quasistatic'?'≈ 0':`${state.ay.toFixed(2)} m/s²`;out.sum.textContent=state.mode==='quasistatic'?'≈ 0':`${v.net.toFixed(2)} N`;app.dataset.mode=state.mode;app.dataset.equilibrium=String(state.mode==='quasistatic');app.dataset.guidedComplete=String(state.complete);app.dataset.dtSeconds=state.dt.toFixed(4);app.dataset.formulaAvailable=String(state.complete&&state.mode==='quasistatic');app.dataset.motionY=state.fastY.toFixed(4);app.dataset.motionAy=state.ay.toFixed(4);app.dataset.motionConsistent=String(state.mode!=='fast'||Math.abs(state.fastY)>0||Math.abs(state.ay)>0);app.dataset.predictionFeedback=feedbackCard.hidden?'hidden':'visible';if(state.mode==='fast'){status.className='status bad';status.textContent='快速反例：画面中的重物正在竖直加速，ΣF=ma≠0；不得继续强制显示平衡成立。'}else if(state.phase==='prediction'){status.className='status warn';status.textContent='已在绳接近水平前暂停：请先预测张力变化。'}else{status.className='status';status.textContent=state.complete?'准静态证据成立：a≈0、ΣF≈0；现已开放公式与自由探索。':'准静态慢速变化：a≈0、ΣF≈0。'}}
  function draw(){const v=values(),g=geometry();ctx.clearRect(0,0,920,520);const bg=ctx.createLinearGradient(0,0,0,520);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,920,520);text(state.mode==='quasistatic'?'准静态动态平衡：慢速变化不是任意运动':'快速移动反例：出现加速度后不满足平衡',460,30,state.mode==='quasistatic'?C.ink:C.red,19);drawScene(v,g);drawGraph(v);drawEvidence(v);update(v)}
  function finishGuided(){state.playing=false;state.complete=true;state.phase='complete';state.theta=16;playBtn.textContent='▶ 重播准静态演示';exploreCard.hidden=false;formulaCard.hidden=false;feedbackCard.hidden=false;feedbackCard.innerHTML=`<b>你的预测：</b>${state.prediction==='increase'?'增大':'减小'}<br><b>实际结果：</b>绳接近水平时，每根绳张力增大。<br><b>证据：</b>重力不变而每根绳的竖直分量比例变小。<br><b>原因：</b>准静态时仍要满足 2Tsinθ=G，所以 sinθ 变小必须由 T 增大补偿。`;draw()}
  function updateFastMotion(){const A=.18,omega=3;state.fastY=A*Math.sin(omega*state.fastTime);state.ay=-A*omega*omega*Math.sin(omega*state.fastTime);const nodeY=235-state.fastY*120;state.theta=Math.atan2(nodeY-80,180)*180/Math.PI}
  function loop(now){if(!state.playing)return;state.dt=Math.min(.05,Math.max(0,(now-state.last)/1000));state.last=now;if(state.mode==='quasistatic'){state.theta-=24*state.dt;if(state.phase==='moving'&&state.theta<=30){state.theta=30;state.playing=false;state.phase='prediction';predictCard.hidden=false;playBtn.textContent='等待预测';draw();return}if(state.phase==='after-prediction'&&state.theta<=16){finishGuided();return}}else{state.fastTime+=state.dt;updateFastMotion()}draw();requestAnimationFrame(loop)}
  function startGuided(){state.mode='quasistatic';state.theta=55;state.ay=0;state.fastY=0;state.phase='moving';state.playing=true;state.last=performance.now();state.prediction='';predictCard.hidden=true;feedbackCard.hidden=true;playBtn.textContent='⏸ 暂停准静态演示';requestAnimationFrame(loop)}
  playBtn.onclick=()=>{if(state.phase==='prediction')return;if(!state.playing)startGuided();else{state.playing=false;playBtn.textContent='▶ 继续准静态演示';draw()}};
  document.querySelectorAll('[data-predict]').forEach(btn=>btn.onclick=()=>{state.prediction=btn.dataset.predict;predictCard.hidden=true;state.phase='after-prediction';state.playing=true;state.last=performance.now();playBtn.textContent='⏸ 继续观察';requestAnimationFrame(loop)});
  document.getElementById('slowBtn').onclick=()=>{state.playing=false;state.mode='quasistatic';state.ay=0;state.fastY=0;draw()};
  document.getElementById('fastBtn').onclick=()=>{state.mode='fast';state.phase='fast';state.fastTime=.4;updateFastMotion();state.playing=true;state.last=performance.now();playBtn.textContent='▶ 重播准静态演示';draw();requestAnimationFrame(loop)};
  document.querySelectorAll('[data-theta]').forEach(btn=>btn.onclick=()=>{if(!state.complete)return;state.playing=false;state.mode='quasistatic';state.ay=0;state.theta=+btn.dataset.theta;draw()});
  function pointerPosition(event){const r=canvas.getBoundingClientRect();return{x:(event.clientX-r.left)*canvas.width/r.width,y:(event.clientY-r.top)*canvas.height/r.height}}
  canvas.addEventListener('pointerdown',event=>{if(!state.complete)return;state.playing=false;state.dragging=true;canvas.setPointerCapture(event.pointerId)});
  canvas.addEventListener('pointermove',event=>{if(!state.dragging)return;const p=pointerPosition(event),g=geometry();state.mode='quasistatic';state.ay=0;state.theta=clamp(Math.atan2(g.O.y-p.y,Math.abs(p.x-g.O.x))*180/Math.PI,12,80);draw()});
  canvas.addEventListener('pointerup',()=>{state.dragging=false});
  document.getElementById('resetBtn').onclick=()=>{state.playing=false;state.theta=55;state.mode='quasistatic';state.phase='ready';state.ay=0;state.fastTime=0;state.fastY=0;state.complete=false;state.prediction='';state.dt=0;predictCard.hidden=true;feedbackCard.hidden=true;exploreCard.hidden=true;formulaCard.hidden=true;playBtn.textContent='▶ 开始准静态慢放';draw()};
  draw();
})();
</script>
</body>
</html>
