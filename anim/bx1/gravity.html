<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-15 重力实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="重力交互实验台：斜面侧视装置、分力图像和数据记录"></canvas><div class="hint">可拖动斜面端点、质量旋钮和 g 旋钮；红色 G 始终竖直向下</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>拖斜面端点改变 θ，对照斜面侧视装置、分力图像和数据记录，看红色 G 是否跟着斜面转。</div>
    <div class="box"><b>地点</b><div class="buttons" style="margin-top:7px"><button id="mEarth" class="active">地球</button><button id="mMoon">月球</button><button id="mJupiter">木星</button><button id="mCustom">自定义</button></div></div>
    <div class="box"><button id="play" style="width:100%">▶ 释放下滑</button></div>
    <div class="readout" id="readout"></div><div class="box formula"><b>公式绑定</b><br>G=mg：红色箭头大小。<br>方向：从重心竖直向下。<br>斜面分力：G∥=Gsinθ，G⊥=Gcosθ。</div><div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={earth:document.getElementById('mEarth'),moon:document.getElementById('mMoon'),jupiter:document.getElementById('mJupiter'),custom:document.getElementById('mCustom')};const s={m:2,g:9.8,theta:25,mode:'earth'};let drag=null,layout={};function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function G(){return s.m*s.g}function rad(){return s.theta*Math.PI/180}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}function setMode(m){s.mode=m;if(m==='earth')s.g=9.8;if(m==='moon')s.g=1.6;if(m==='jupiter')s.g=24.8;Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
function drawBlock(cx,cy,w,h,a){ctx.save();ctx.translate(cx,cy);ctx.rotate(-a);ctx.fillStyle='#d9e2ec';ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.fillRect(-w/2,-h/2,w,h);ctx.strokeRect(-w/2,-h/2,w,h);ctx.restore()}
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};card(50,36,835,462);text('重力实验台：斜面侧视装置 + 分力图像 + 数据记录',468,62,'#334e68',17,'center','800');const base={x:145,y:392},L=600,a=rad(),end={x:base.x+L*Math.cos(a),y:base.y-L*Math.sin(a)};line(base.x,base.y,end.x,end.y,'#7b8794',6);handle(end.x,end.y,'拖θ','#7b2cbf');layout.theta=end;text(`θ=${s.theta.toFixed(0)}°`,end.x-28,end.y-28,'#7b2cbf',13,'center','800');const _sl=window.__gslide||0,cx=430-Math.cos(a)*_sl,cy=base.y-(430-base.x)*Math.tan(a)-26+Math.sin(a)*_sl;drawBlock(cx,cy,86,52,a);ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();text('重心',cx+30,cy-12,'#e03131',12,'left','700');const gl=clamp(45+G()*2.1,50,165);arrow(cx,cy,cx,cy+gl,'#e03131',4);text(`G=mg=${G().toFixed(1)} N`,cx+14,cy+gl/2,'#e03131',14,'left','800');const ux={x:Math.cos(a),y:-Math.sin(a)},un={x:Math.sin(a),y:Math.cos(a)},gp=G()*Math.sin(a),gn=G()*Math.cos(a);arrow(cx,cy,cx+ux.x*gp*2.8,cy+ux.y*gp*2.8,'#f08c00',3);arrow(cx,cy,cx+un.x*gn*1.9,cy+un.y*gn*1.9,'#2f80ed',3);text('G∥',cx+ux.x*gp*2.8+10,cy+ux.y*gp*2.8,'#b36b00',13);text('G⊥',cx+un.x*gn*1.9+10,cy+un.y*gn*1.9,'#2f80ed',13);card(92,430,704,46);text('斜面转动时，橙/蓝分力改变；红色重力 G 仍竖直向下。',444,453,'#102a43',14,'center','800');
const mx=130+(s.m-.5)/(8-.5)*230;line(130,520,360,520,'#bcccdc',3);handle(mx,520,'m','#12b886');layout.m={x:mx,y:520};text(`质量 m=${s.m.toFixed(1)} kg`,245,500,'#0b7285',13,'center','800');const gx=500+(s.g-1.6)/(24.8-1.6)*260;line(500,520,760,520,'#bcccdc',3);handle(gx,520,'g','#7b2cbf');layout.g={x:gx,y:520};text(`g=${s.g.toFixed(1)} N/kg`,630,500,'#7b2cbf',13,'center','800');readout.innerHTML=`m=<b>${s.m.toFixed(1)}</b> kg<br>g=<b>${s.g.toFixed(1)}</b> N/kg<br>G=mg=<b>${G().toFixed(2)}</b> N<br>θ=<b>${s.theta.toFixed(0)}</b>°<br>G∥=<b>${gp.toFixed(2)}</b> N<br>G⊥=<b>${gn.toFixed(2)}</b> N`;status.textContent='质量 m 是物体属性；换地点时 m 不变，g 变，所以重力大小 G 变。方向仍竖直向下。'}
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag==='theta'){const base={x:145,y:392};s.theta=Math.round(clamp(Math.atan2(base.y-p.y,p.x-base.x)*180/Math.PI,0,55))}if(drag==='m')s.m=Math.round(clamp(.5+(p.x-130)/230*(8-.5),.5,8)*10)/10;if(drag==='g'){s.g=Math.round(clamp(1.6+(p.x-500)/260*(24.8-1.6),1.6,24.8)*10)/10;s.mode='custom';Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k==='custom'))}if(drag){draw();return}let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
const playBtn=document.getElementById('play');let running=false,vel=0,last=performance.now();window.__gslide=0;
playBtn.addEventListener('click',()=>{running=!running;if(running&&(window.__gslide||0)>295){window.__gslide=0;vel=0;}playBtn.textContent=running?'⏸ 暂停':'▶ 释放下滑';});
canvas.addEventListener('pointerdown',()=>{if(running){running=false;playBtn.textContent='▶ 释放下滑';}});
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running){vel+=s.g*Math.sin(rad())*dt*9;window.__gslide=(window.__gslide||0)+vel*dt;if(window.__gslide>300){window.__gslide=300;running=false;playBtn.textContent='▶ 重新释放';}draw();}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
