<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-16 弹力与形变实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="弹力与形变交互实验台：弹簧侧视装置、F-x图像和数据记录"></canvas><div class="hint">可直接拖压块、绳端或弹簧端点；x=0 时弹力消失</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>把形变拖到 0，对照弹簧侧视装置、F-x 图像和数据记录，看弹力是否消失；再增大形变，看箭头和读数变大。</div>
    <div class="box"><b>场景</b><div class="buttons" style="margin-top:7px"><button id="mSupport" class="active">支持力</button><button id="mRope">绳拉力</button><button id="mSpring">弹簧</button></div></div>
    <div class="box"><button id="play" style="width:100%">▶ 释放回弹</button></div>
    <div class="readout" id="readout"></div>
    <div class="box formula"><b>判据</b><br>弹力产生：接触/连接 + 弹性形变。<br>方向：指向恢复原状。<br>本节看条件和方向，精确定量到胡克定律。</div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={support:document.getElementById('mSupport'),rope:document.getElementById('mRope'),spring:document.getElementById('mSpring')};const s={mode:'support',x:4,k:6};let drag=null,layout={};function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function F(){return Math.abs(s.x)*s.k}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}function box(x,y,w,h,fill='#d9e2ec'){ctx.fillStyle=fill;ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,w,h,7);ctx.fill();ctx.stroke()}function springPath(x1,y,x2){const turns=12,amp=14,span=x2-x1,step=span/(turns*2);ctx.beginPath();ctx.moveTo(x1,y);for(let i=1;i<turns*2;i++)ctx.lineTo(x1+i*step,y+(i%2?amp:-amp));ctx.lineTo(x2,y);ctx.strokeStyle='#334e68';ctx.lineWidth=3;ctx.stroke()}function setMode(m){s.mode=m;s.x=m==='spring'?4:s.x<0?4:s.x;Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
function drawSupport(){const tableY=352,blockY=238+s.x*4;box(145,tableY,650,42,'#edf2f7');ctx.fillStyle='#bcccdc';ctx.beginPath();ctx.ellipse(470,tableY,175,8+s.x*2,0,0,Math.PI*2);ctx.fill();box(410,blockY,120,86);handle(470,blockY+43,'拖物块','#2f80ed');layout.x={x:470,y:blockY+43};if(s.x>0){arrow(470,blockY+86,470,blockY+8,'#e03131',4);text('N：桌面恢复原状，向上推物块',500,blockY+36,'#e03131',14);arrow(470,blockY+86,470,tableY+34,'#2f80ed',2);text('压力使桌面下陷',490,tableY+25,'#2f80ed',12)}else text('x=0：没有挤压形变，支持力为 0',470,220,'#b30000',15,'center','800');text('支持力不是“凭空向上”，来自接触面被压弯后恢复原状',470,78,'#334e68',16,'center','800')}
function drawRope(){const anchor=150,y=270,boxX=470+s.x*18;line(anchor,y,boxX,y,s.x>0?'#334e68':'#bcccdc',5);box(boxX,232,86,76);handle(boxX+43,270,'拖物块','#2f80ed');layout.x={x:boxX+43,y:270};text('固定点',anchor,y-24,'#486581',12,'center');if(s.x>0){arrow(boxX,y,boxX-110,y,'#e03131',4);text('T：沿绳，指向绳收缩方向',boxX-62,y-25,'#e03131',14,'center')}else text('绳松弛：轻绳只能拉，不能推',470,210,'#b30000',15,'center','800');text('绳的弹力条件：连接且绷紧；方向只能沿绳拉回',470,78,'#334e68',16,'center','800')}
function drawSpring(){const wall=150,y=270,origin=505,end=origin+s.x*22;line(105,y,wall,y,'#334e68',5);springPath(wall,y,end);box(end,234,86,72);line(origin,198,origin,352,'#7b8794',1,[6,5]);text('原长端点',origin,372,'#486581',12,'center');handle(end+43,y,'拖端点','#2f80ed');layout.x={x:end+43,y};if(Math.abs(s.x)>0.1){const dir=s.x>0?-1:1;arrow(end,y,end+dir*110,y,'#e03131',4);text(s.x>0?'伸长：弹簧拉回':'压缩：弹簧推开',end+dir*62,y-25,'#e03131',14,'center')}else text('x=0：弹簧在原长，弹力为 0',470,210,'#b30000',15,'center','800');text('弹簧弹力沿轴线，方向总是恢复原长',470,78,'#334e68',16,'center','800')}
function drawKnob(){line(290,505,650,505,'#bcccdc',3);const x=290+(s.k-1)/9*360;handle(x,505,'k','#12b886');layout.k={x,y:505};text(`材料硬度 k=${s.k.toFixed(1)} N/cm`,470,482,'#0b7285',13,'center','800')}
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};card(50,36,835,440);if(s.mode==='support')drawSupport();if(s.mode==='rope')drawRope();if(s.mode==='spring')drawSpring();card(190,400,560,42);text('形变量越大、材料越硬，弹力越明显；没有弹性形变时弹力为 0。',470,421,'#102a43',14,'center','800');drawKnob();const names={support:'桌面支持力',rope:'绳的拉力',spring:'弹簧弹力'},dirs={support:'垂直接触面向上',rope:'沿绳指向绳收缩方向',spring:s.x>=0?'沿弹簧拉回':'沿弹簧推开'};readout.innerHTML=`场景=<b>${names[s.mode]}</b><br>形变量 x=<b>${s.x.toFixed(1)}</b> cm<br>材料硬度 k=<b>${s.k.toFixed(1)}</b> N/cm<br>弹力示意 F∝kx=<b>${F().toFixed(1)}</b><br>方向=<b>${dirs[s.mode]}</b>`;status.textContent=Math.abs(s.x)<0.1?'没有弹性形变：这一场景下弹力为 0。':'有弹性形变：弹力指向恢复原状方向，不是固定向上或固定向右。'}
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag==='k')s.k=Math.round(clamp(1+(p.x-290)/360*9,1,10)*10)/10;if(drag==='x'&&s.mode==='support')s.x=Math.round(clamp((p.y-238)/4,0,10)*10)/10;if(drag==='x'&&s.mode==='rope')s.x=Math.round(clamp((p.x-513)/18,0,10)*10)/10;if(drag==='x'&&s.mode==='spring')s.x=Math.round(clamp((p.x-548)/22,-6,10)*10)/10;if(drag){draw();return}let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
const playBtn=document.getElementById('play');let running=false,amp=4,ph=0,last=performance.now();
playBtn.addEventListener('click',()=>{running=!running;if(running){amp=Math.max(2,Math.abs(s.x)||4);ph=0;}playBtn.textContent=running?'⏸ 暂停':'▶ 释放回弹';});
canvas.addEventListener('pointerdown',()=>{if(running){running=false;playBtn.textContent='▶ 释放回弹';}});
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running){ph+=dt;const w=Math.sqrt(s.k)*1.0;s.x=Math.round(amp*(0.5-0.5*Math.cos(w*ph))*10)/10;draw();}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
