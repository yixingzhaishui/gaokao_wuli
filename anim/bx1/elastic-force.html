<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-16 弹力与形变</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}button{min-height:38px;border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65}.readout b{color:#ffd166}.status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;font-weight:800;line-height:1.45}@media(max-width:760px){.wrap{grid-template-columns:minmax(0,1fr)}.panel{grid-row:2}.buttons{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="wrap" id="app" data-universal-kx="false" data-phase="explore">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="弹力与形变：接触无挤压和挤压、余绳和绷紧绳、弹簧形变"></canvas></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>先播放四态对比，再拖动画布切换状态。实物场景、状态图像和数据记录同步；这里只判断弹力是否存在及方向，不把桌面和绳统一套成 F=kx。</div>
    <div class="box buttons"><button id="play">▶ 对比四种状态</button><button id="reset">重置</button></div>
    <div class="box buttons"><button data-mode="support" class="active">桌面</button><button data-mode="rope">绳</button><button data-mode="spring">弹簧</button></div>
    <div class="box buttons"><button id="zero">无形变/松弛</button><button id="deformed">有形变/绷紧</button></div>
    <div class="readout" id="readout"></div>
    <div class="box"><b>本页边界</b><br>支持力、普通绳拉力的大小由具体受力状态决定，不能统一使用 $F=kx$。弹簧的定量胡克定律放在 B1-17。</div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(()=>{
  const app=document.getElementById('app'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const readout=document.getElementById('readout'),status=document.getElementById('status'),play=document.getElementById('play');
  const state={mode:'support',deformed:true,running:false,elapsed:0,last:0};
  const text=(s,x,y,c='#243b53',size=15,align='center',weight=700)=>{ctx.fillStyle=c;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)};
  const line=(x1,y1,x2,y2,c='#334e68',w=3)=>{ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()};
  function arrow(x1,y1,x2,y2,c){line(x1,y1,x2,y2,c,4);const a=Math.atan2(y2-y1,x2-x1);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-12*Math.cos(a-.45),y2-12*Math.sin(a-.45));ctx.lineTo(x2-12*Math.cos(a+.45),y2-12*Math.sin(a+.45));ctx.fill()}
  function box(x,y,w,h,fill='#d9e2ec'){ctx.fillStyle=fill;ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,w,h,7);ctx.fill();ctx.stroke()}
  function spring(x1,y,x2){ctx.strokeStyle='#334e68';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x1,y);const n=20,step=(x2-x1)/n;for(let i=1;i<n;i++)ctx.lineTo(x1+i*step,y+(i%2?15:-15));ctx.lineTo(x2,y);ctx.stroke()}
  function drawSupport(){const table=340,blockY=state.deformed?245:254;box(160,table,620,42,'#edf2f7');box(410,blockY,120,86);if(state.deformed){ctx.fillStyle='#bcccdc';ctx.beginPath();ctx.ellipse(470,table,150,18,0,0,Math.PI*2);ctx.fill();arrow(470,blockY+86,470,blockY+18,'#e03131');text('接触并挤压：桌面对物块的支持力垂直接触面向上',470,115,'#087f5b')}else{text('接触但无挤压：没有支持力',470,115,'#b45309');line(300,table,640,table,'#94a3b8',2)}}
  function drawRope(){const a={x:150,y:270},b={x:690,y:270};box(690,230,90,80);if(state.deformed){line(a.x,a.y,b.x,b.y,'#334e68',6);arrow(b.x,b.y,b.x-130,b.y,'#e03131');text('绳绷紧：拉力沿绳指向绳收缩方向',470,115,'#087f5b');canvas.dataset.ropeState='taut'}else{ctx.strokeStyle='#94a3b8';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.bezierCurveTo(300,410,530,410,b.x,b.y);ctx.stroke();text('绳松弛：可见余绳，没有拉力',470,115,'#b45309');canvas.dataset.ropeState='slack-visible-sag'}}
  function drawSpring(){const end=state.deformed?650:500;line(110,270,160,270,'#334e68',6);spring(160,270,end);box(end,230,90,80);line(500,170,500,370,'#94a3b8',2);text('原长端点',500,390,'#64748b',13);if(state.deformed){arrow(end+45,270,end-80,270,'#e03131');text('弹簧伸长：弹力指向恢复原长',470,115,'#087f5b')}else text('弹簧处于原长：弹力为 0',470,115,'#b45309')}
  function draw(){ctx.clearRect(0,0,940,560);const bg=ctx.createLinearGradient(0,0,0,560);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,940,560);text('弹力判断：先看形变或绳是否绷紧，再判断方向',470,36,'#102a43',20);ctx.fillStyle='#fff';ctx.strokeStyle='#d9e2ec';ctx.beginPath();ctx.roundRect(50,65,840,390,10);ctx.fill();ctx.stroke();if(state.mode==='support')drawSupport();if(state.mode==='rope')drawRope();if(state.mode==='spring')drawSpring();text('本页不输出桌面或绳的通用 kx 数值',470,430,'#334e68',15);const exists=state.deformed;readout.innerHTML=`场景=<b>${state.mode==='support'?'桌面':state.mode==='rope'?'绳':'弹簧'}</b><br>状态=<b>${exists?(state.mode==='rope'?'绷紧':'有弹性形变'):(state.mode==='rope'?'松弛且有余绳':'无弹性形变')}</b><br>弹力=<b>${exists?'存在':'不存在'}</b><br>定量=<b>${state.mode==='spring'?'转到 B1-17':'由具体受力条件决定'}</b>`;status.textContent=exists?'弹力存在；方向由形变恢复趋势决定。':'当前没有弹性形变或绳未绷紧，因此弹力不存在。';app.dataset.mode=state.mode;app.dataset.deformed=String(state.deformed);app.dataset.universalKx='false';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode))}
  function set(mode,deformed){state.mode=mode;state.deformed=deformed;draw()}
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>set(b.dataset.mode,state.deformed));
  document.getElementById('zero').onclick=()=>set(state.mode,false);document.getElementById('deformed').onclick=()=>set(state.mode,true);
  document.getElementById('reset').onclick=()=>{state.running=false;play.textContent='▶ 对比四种状态';set('support',true)};
  let dragging=false;
  canvas.addEventListener('pointerdown',event=>{dragging=true;canvas.setPointerCapture(event.pointerId)});
  canvas.addEventListener('pointermove',event=>{if(!dragging)return;const rect=canvas.getBoundingClientRect(),x=(event.clientX-rect.left)*canvas.width/rect.width;set(state.mode,x>canvas.width/2)});
  canvas.addEventListener('pointerup',()=>{dragging=false});
  play.onclick=()=>{state.running=!state.running;state.elapsed=0;state.last=performance.now();play.textContent=state.running?'⏸ 暂停四态对比':'▶ 对比四种状态';if(state.running)requestAnimationFrame(loop)};
  function loop(now){if(!state.running)return;const dt=Math.min(.05,(now-state.last)/1000);state.last=now;state.elapsed+=dt;const stage=Math.min(3,Math.floor(state.elapsed/1.25));set(stage<2?'support':'rope',stage%2===1);if(state.elapsed>=5){state.running=false;play.textContent='▶ 重播四种状态';return}requestAnimationFrame(loop)}
  draw();
})();
</script>
</body>
</html>
