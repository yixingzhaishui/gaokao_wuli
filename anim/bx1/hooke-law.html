<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-17 胡克定律实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}.bad{border-color:#e03131;background:#fff0f0;color:#9b1c1c}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="胡克定律交互实验台：弹簧侧视装置、F-x图像和数据记录"></canvas><div class="hint">可拖弹簧端点或 F-x 红点改 x，拖斜率点改 k，拖限度线改弹性限度</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>拖红点让 x 加倍，对照弹簧侧视装置、F-x 图像和数据记录，看 F 是否加倍；拖紫色斜率点改变 k。</div>
    <div class="box"><b>快捷情境</b><div class="buttons" style="margin-top:7px"><button id="mStretch" class="active">伸长</button><button id="mCompress">压缩</button><button id="mHard">硬弹簧</button><button id="mOver">超过限度</button></div></div>
    <div class="box"><div class="buttons"><button id="play">▶ 释放振动</button><button id="resetBtn">重置</button></div></div>
    <div class="readout" id="readout"></div>
    <div class="box formula"><b>公式绑定</b><br>大小：F=k|x|。<br>方向：总指向恢复原长。<br>F-x 图像斜率大小就是 k。<br>只在弹性限度内成立。</div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={stretch:document.getElementById('mStretch'),compress:document.getElementById('mCompress'),hard:document.getElementById('mHard'),over:document.getElementById('mOver')};const s={x:4,k:5,limit:8,mode:'stretch'};const spring={wall:92,y:156,origin:330};const g={ox:485,oy:420,w:330,h:300,xMin:-12,xMax:12,fMin:-120,fMax:120};let drag=null,layout={};function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function ok(){return Math.abs(s.x)<=s.limit}function F(){return s.k*Math.abs(s.x)}function signedF(){return -s.k*s.x}function sx(x){return g.ox+(x-g.xMin)/(g.xMax-g.xMin)*g.w}function sy(f){return g.oy-(f-g.fMin)/(g.fMax-g.fMin)*g.h}function xFromSx(px){return clamp(g.xMin+(px-g.ox)/g.w*(g.xMax-g.xMin),g.xMin,g.xMax)}function fFromSy(py){return clamp(g.fMin+(g.oy-py)/g.h*(g.fMax-g.fMin),g.fMin,g.fMax)}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}function box(x,y,w,h,fill='#d9e2ec'){ctx.fillStyle=fill;ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,w,h,7);ctx.fill();ctx.stroke()}function springPath(x1,y,x2){const turns=12,amp=13,step=(x2-x1)/(turns*2);ctx.beginPath();ctx.moveTo(x1,y);for(let i=1;i<turns*2;i++)ctx.lineTo(x1+i*step,y+(i%2?amp:-amp));ctx.lineTo(x2,y);ctx.strokeStyle='#334e68';ctx.lineWidth=3;ctx.stroke()}function setMode(m){s.mode=m;if(m==='stretch'){s.x=4;s.k=5;s.limit=8}if(m==='compress'){s.x=-4;s.k=5;s.limit=8}if(m==='hard'){s.x=4;s.k=9;s.limit=8}if(m==='over'){s.x=10;s.k=5;s.limit=7}Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
function drawSpring(){card(50,36,385,220);text('x 是相对原长的形变量，不是弹簧总长度',242,64,'#334e68',15,'center','800');const end=spring.origin+s.x*18;line(spring.wall-35,spring.y,spring.wall,spring.y,'#334e68',6);line(spring.wall,spring.y-72,spring.wall,spring.y+72,'#334e68',6);springPath(spring.wall,spring.y,end);box(end,spring.y-34,88,68);line(spring.origin,92,spring.origin,230,'#7b8794',1,[6,5]);text('原长端点',spring.origin,246,'#486581',12,'center');handle(end+44,spring.y,'拖端点','#2f80ed');layout.xSpring={x:end+44,y:spring.y};if(Math.abs(s.x)>0.1){const dir=s.x>0?-1:1;arrow(end+44,spring.y,end+44+dir*clamp(F()*1.5,32,120),spring.y,'#e03131',4);text(s.x>0?'伸长：弹力拉回':'压缩：弹力推开',242,96,'#e03131',14,'center','800')}else text('原长：x=0，F=0',242,96,'#b30000',14,'center','800');text(`x=${s.x.toFixed(1)} cm，F=${F().toFixed(1)} N`,242,278,'#0b7285',14,'center','800')}
function drawGraph(){card(455,36,395,462);line(g.ox,sy(0),g.ox+g.w+25,sy(0),'#334e68',2);line(sx(0),g.oy,sx(0),g.oy-g.h-20,'#334e68',2);text('x/cm',g.ox+g.w+36,sy(0)+4,'#334e68',13);text('F/N',sx(0)-8,g.oy-g.h-27,'#334e68',13,'right');for(let x=-12;x<=12;x+=4){line(sx(x),g.oy,sx(x),g.oy-g.h,'#d9e2ec');text(String(x),sx(x),sy(0)+20,'#627d98',11,'center','500')}for(let f=-120;f<=120;f+=40){line(g.ox,sy(f),g.ox+g.w,sy(f),'#d9e2ec');text(String(f),sx(0)-14,sy(f),'#627d98',11,'right','500')}line(sx(-s.limit),g.oy,sx(-s.limit),g.oy-g.h,'#12b886',2,[6,5]);line(sx(s.limit),g.oy,sx(s.limit),g.oy-g.h,'#12b886',2,[6,5]);handle(sx(s.limit),g.oy-g.h+18,'限度','#12b886');layout.limit={x:sx(s.limit),y:g.oy-g.h+18};line(sx(-12),sy(12*s.k),sx(12),sy(-12*s.k),ok()?'#2f80ed':'#e03131',3);line(sx(-12),sy(12*s.k),sx(-s.limit),sy(s.limit*s.k),'#e03131',2,[6,5]);line(sx(s.limit),sy(-s.limit*s.k),sx(12),sy(-12*s.k),'#e03131',2,[6,5]);handle(sx(-8),sy(8*s.k),'调k','#7b2cbf');layout.k={x:sx(-8),y:sy(8*s.k)};handle(sx(s.x),sy(signedF()),'红点','#f08c00');layout.xGraph={x:sx(s.x),y:sy(signedF())};text('蓝线斜率大小=k；绿线之间是弹性限度',652,74,'#334e68',14,'center','800')}
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};drawSpring();drawGraph();readout.innerHTML=`x=<b>${s.x.toFixed(1)}</b> cm<br>k=<b>${s.k.toFixed(1)}</b> N/cm<br>弹性限度=<b>${s.limit.toFixed(1)}</b> cm<br>F=k|x|=<b>${F().toFixed(1)}</b> N<br>方向=<b>${s.x>0?'指向原长，向左':s.x<0?'指向原长，向右':'无弹力'}</b>`;status.className='box warn'+(ok()?'':' bad');status.textContent=ok()?'在弹性限度内：F=kx 可用于定量计算，F-x 图像为直线。':'超过弹性限度：弹簧可能不能恢复原长，不能再直接套 F=kx。'}
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag==='xSpring')s.x=Math.round(clamp((p.x-44-spring.origin)/18,-12,12)*10)/10;if(drag==='xGraph')s.x=Math.round(xFromSx(p.x)*10)/10;if(drag==='k'){const f=fFromSy(p.y);s.k=Math.round(clamp(Math.abs(f/8),1,10)*10)/10}if(drag==='limit')s.limit=Math.round(clamp(Math.abs(xFromSx(p.x)),4,12)*10)/10;if(drag){draw();return}let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<32)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
const playBtn=document.getElementById('play'),resetBtn=document.getElementById('resetBtn');let running=false,amp=4,ph=0,last=performance.now();
playBtn.addEventListener('click',()=>{running=!running;if(running){amp=s.x||4;ph=0;}playBtn.textContent=running?'⏸ 暂停':'▶ 释放振动';});
resetBtn.addEventListener('click',()=>{running=false;amp=4;ph=0;s.x=4;s.k=5;s.limit=8;s.mode='stretch';Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k==='stretch'));playBtn.textContent='▶ 释放振动';draw();});
canvas.addEventListener('pointerdown',()=>{if(running){running=false;playBtn.textContent='▶ 释放振动';}});
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running){ph+=dt;const w=Math.sqrt(s.k)*1.1;s.x=Math.round(amp*Math.cos(w*ph)*10)/10;draw();}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
