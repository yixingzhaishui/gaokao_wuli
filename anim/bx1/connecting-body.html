<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连接体模型实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef3f8;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:10px;padding:10px;min-height:760px}
  .stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}
  .panel{display:flex;flex-direction:column;gap:8px}
  .card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px}
  .task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.45}
  .title{font-weight:800;margin-bottom:5px;color:#0f172a}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{border:1px solid #94a3b8;background:#fff;border-radius:7px;min-height:31px;cursor:pointer;color:#102a43;font-weight:700}
  button.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .readout{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .meter{background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px;min-height:50px}
  .meter span{display:block;font-size:11px;color:#b6c5d8}
  .meter b{display:block;margin-top:2px;color:#fbbf24;font-size:15px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .formula{display:grid;gap:5px;font-size:12px;color:#334155}
  .formula div{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed #d7dee8;padding-bottom:4px}
  .formula div:last-child{border-bottom:0;padding-bottom:0}
  .formula b{white-space:nowrap;color:#0f172a}
  .small{font-size:12px;line-height:1.5;color:#475569}
  .status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;font-weight:800;line-height:1.45}
  .status.warn{border-color:#f59e0b;background:#fff7ed;color:#b45309}
  .status.bad{border-color:#f87171;background:#fef2f2;color:#b91c1c}
  @media(max-width:820px){.root{grid-template-columns:1fr}.readout{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="760" aria-label="连接体模型交互实验台"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>切换连接方式，先看哪些力是整体外力；再隔离 m1，看绳张力 T 为什么不能在整体方程里重复写。</div>
    <div class="chips"><button id="playBtn">播放过程</button><button id="resetBtn">重置</button></div>
    <div class="card">
      <div class="title">连接方式</div>
      <div class="chips">
        <button data-mode="horizontal" class="active">水平轻绳</button>
        <button data-mode="incline">斜面-水平</button>
        <button data-mode="pulley">滑轮悬挂</button>
        <button data-mode="rough">粗糙水平</button>
      </div>
    </div>
    <div class="card">
      <div class="title">实时读数</div>
      <div class="readout">
        <div class="meter"><span>共同加速度 a</span><b id="aText">2.00 m/s²</b></div>
        <div class="meter"><span>绳张力 T</span><b id="tText">4.00 N</b></div>
        <div class="meter"><span>整体净外力</span><b id="netText">6.00 N</b></div>
        <div class="meter"><span>约束关系</span><b id="constraintText">a1=a2</b></div>
      </div>
    </div>
    <div class="card formula">
      <div><span>整体法</span><b id="formulaWhole">F外=(m1+m2)a</b></div>
      <div><span>隔离法</span><b id="formulaLocal">T-f1=m1a</b></div>
      <div><span>摩擦</span><b>f=μN</b></div>
      <div><span>顺序</span><b>先整体求 a，再隔离求 T</b></div>
    </div>
    <div class="card small"><b>三视图绑定：</b>左侧是实物连接，右侧是整体/隔离方程和 a-F 图；底部刻度尺拖 `m1、m2、μ、θ、g`，红色箭头拖外力 `F`。</div>
    <div class="status" id="status">整体法求 a，隔离法求 T；绳张力是内力，不进整体方程。</div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const state={mode:'horizontal',m1:2,m2:1,F:8,mu:0,theta:30,g:10,t:0,drag:null,playing:false};
  const els={
    a:document.getElementById('aText'),T:document.getElementById('tText'),net:document.getElementById('netText'),constraint:document.getElementById('constraintText'),
    status:document.getElementById('status'),whole:document.getElementById('formulaWhole'),local:document.getElementById('formulaLocal')
  };
  const colors={ink:'#102a43',blue:'#2563eb',red:'#dc2626',orange:'#f59e0b',green:'#0f766e',purple:'#7c3aed',muted:'#64748b'};
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
  const fmt=(v,d=1)=>Number.isFinite(v)?v.toFixed(d):'--';
  function text(s,x,y,c=colors.ink,a='center',size=13,weight='700'){ctx.fillStyle=c;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c='#94a3b8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-13*Math.cos(a-.42),y2-13*Math.sin(a-.42));ctx.lineTo(x2-13*Math.cos(a+.42),y2-13*Math.sin(a+.42));ctx.closePath();ctx.fill();ctx.restore()}
  function box(x,y,w,h,r,fill,stroke='#cbd5e1'){ctx.save();ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke()}ctx.restore()}
  function handle(x,y,label,active,c){ctx.save();ctx.fillStyle=active?'#fde68a':'#fff';ctx.strokeStyle=active?'#b45309':c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();ctx.stroke();text(label,x,y-22,active?'#92400e':c,'center',12,'900');ctx.restore()}
  function car(x,y,w,h,fill,label){box(x,y,w,h,6,fill,'#334155');text(label,x+w/2,y+h/2,'#fff','center',12,'900');ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(x+16,y+h+6,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+w-16,y+h+6,6,0,Math.PI*2);ctx.fill()}
  function values(){
    const m1=state.m1,m2=state.m2,g=state.g,mu=state.mu,th=state.theta*Math.PI/180;
    let net=0,a=0,T=0,f1=0,f2=0,formula='F外=(m1+m2)a',local='T-f1=m1a',constraint='a1=a2';
    if(state.mode==='pulley'){
      f1=mu*m1*g; net=m2*g-f1; a=net/(m1+m2); if(a<0)a=0; T=m1*a+f1;
      formula='m2g-μm1g=(m1+m2)a'; local='T-μm1g=m1a'; constraint='桌面 m1 与悬挂 m2 加速度大小相同';
    }else if(state.mode==='incline'){
      f1=mu*m1*g*Math.cos(th); f2=mu*m2*g; net=state.F-m1*g*Math.sin(th)-f1-f2; a=net/(m1+m2); if(a<0)a=0; T=m1*a+m1*g*Math.sin(th)+f1;
      formula='F-m1gsinθ-f1-f2=(m1+m2)a'; local='T-m1gsinθ-f1=m1a'; constraint='绳约束：沿绳方向 a1=a2';
    }else{
      f1=mu*m1*g; f2=mu*m2*g; net=state.F-f1-f2; a=net/(m1+m2); if(a<0)a=0; T=m1*a+f1;
      formula='F-μ(m1+m2)g=(m1+m2)a'; local='T-μm1g=m1a'; constraint='轻绳不可伸长：a1=a2';
    }
    return{net,a,T,f1,f2,formula,local,constraint};
  }
  function geometry(){
    return{
      F:{x:430+state.F/30*180,y:220},
      m1:{x:70+(state.m1-.5)/4.5*155,y:662},
      m2:{x:250+(state.m2-.5)/4.5*155,y:662},
      mu:{x:430+state.mu/.35*155,y:662},
      theta:{x:610+state.theta/45*155,y:662},
      g:{x:790+(state.g-2)/8*110,y:662}
    };
  }
  function drawHorizontal(v,g0){
    const off=state.playing?Math.min(70,.5*v.a*state.t*state.t*18):0,ground=300,x1=138+off,w1=78+state.m1*8,x2=x1+w1+54,w2=78+state.m2*8,h=48;
    line(78,ground,520,ground,'#334155',5);car(x1,ground-h,w1,h,colors.blue,`m1=${fmt(state.m1)}kg`);car(x2,ground-h,w2,h,colors.red,`m2=${fmt(state.m2)}kg`);
    line(x1+w1,ground-h/2,x2,ground-h/2,'#64748b',3);
    arrow(x2+w2,ground-h/2,g0.F.x,ground-h/2,colors.red,4);handle(g0.F.x,g0.F.y,`F=${fmt(state.F)}N`,state.drag==='F',colors.red);
    arrow(x1+w1/2,ground-h-22,x1+w1/2+Math.min(110,v.a*30),ground-h-22,colors.purple,4);
    arrow((x1+w1+x2)/2+Math.min(70,v.T*6),ground-h/2-28,(x1+w1+x2)/2,ground-h/2-28,colors.orange,3);
    if(state.mu>0){arrow(x1,ground-h/2,x1-Math.min(60,v.f1*3),ground-h/2,colors.orange,3);arrow(x2,ground-h/2,x2-Math.min(60,v.f2*3),ground-h/2,colors.orange,3)}
  }
  function drawIncline(v,g0){
    const th=state.theta*Math.PI/180,baseX=92,baseY=318,len=220,ux=Math.cos(-th),uy=Math.sin(-th),off=state.playing?Math.min(60,.5*v.a*state.t*state.t*15):0;
    line(baseX,baseY,baseX+len*ux,baseY+len*uy,'#334155',8);
    const bx=baseX+60*ux+off*ux,by=baseY+60*uy+off*uy;box(bx-28,by-20,58,40,6,colors.blue,'#102a43');text('m1',bx,by,'#fff');
    const x2=360+off,y2=292;line(320,y2+8,520,y2+8,'#334155',5);car(x2,y2-48,92,48,colors.red,`m2=${fmt(state.m2)}kg`);
    line(bx+28*ux,by+28*uy,x2,y2-24,'#64748b',3);
    arrow(x2+92,y2-24,g0.F.x,y2-24,colors.red,4);handle(g0.F.x,g0.F.y,`F=${fmt(state.F)}N`,state.drag==='F',colors.red);
    arrow(bx,by+34,bx+ux*72,by+34+uy*72,colors.orange,3);text('T',bx+ux*84,by+34+uy*84,colors.orange);
    arrow(bx-40,by,bx-40,by+62,colors.red,3);text('m1g',bx-52,by+72,colors.red);
    text(`θ=${fmt(state.theta,0)}°`,baseX+80,baseY+24,colors.orange);
  }
  function drawPulley(v){
    const off=state.playing?Math.min(64,.5*v.a*state.t*state.t*16):0,ground=305,x1=150+off,y1=ground-48,pX=430,pY=185;
    line(82,ground,430,ground,'#334155',5);car(x1,y1,96,48,colors.blue,`m1=${fmt(state.m1)}kg`);
    ctx.strokeStyle='#334155';ctx.lineWidth=4;ctx.beginPath();ctx.arc(pX,pY,28,0,Math.PI*2);ctx.stroke();
    line(x1+96,y1+24,pX,pY,'#64748b',3);line(pX+28,pY,pX+28,pY+112,'#64748b',3);
    box(pX+4,pY+112+off,54,48,6,colors.red,'#102a43');text(`m2`,pX+31,pY+136+off,'#fff');
    arrow(pX+31,pY+160+off,pX+31,pY+220+off,colors.red,3);text('m2g',pX+62,pY+190+off,colors.red,'left');
    arrow(x1+50,y1-22,x1+50+Math.min(100,v.a*32),y1-22,colors.purple,4);
    if(state.mu>0)arrow(x1,y1+24,x1-Math.min(60,v.f1*3),y1+24,colors.orange,3);
  }
  function drawEquations(v){
    box(580,60,330,160,8,'#f8fafc','#d7dee8');text('整体法：只保留外力',745,88,'#0f172a','center',15,'900');
    text(v.formula,745,128,colors.red,'center',13,'900');text(`F净=${fmt(v.net,2)}N`,745,160,colors.purple,'center',13,'900');text(`a=${fmt(v.a,2)}m/s²`,745,192,colors.green,'center',13,'900');
    box(580,240,330,150,8,'#fff','#d7dee8');text('隔离 m1：内力 T 出现',745,268,'#0f172a','center',15,'900');
    text(v.local,745,306,colors.orange,'center',13,'900');text(`T=${fmt(v.T,2)}N`,745,340,colors.orange,'center',14,'900');
  }
  function drawGraph(v){
    box(580,410,330,154,8,'#fff','#d7dee8');text('a-F 图：斜率约为 1/(m1+m2)',745,436,'#0f172a','center',14,'900');
    const gx=620,gy=532,gw=240,gh=72;line(gx,gy,gx+gw,gy,'#94a3b8',1.5);line(gx,gy,gx,gy-gh,'#94a3b8',1.5);
    ctx.beginPath();for(let i=0;i<=60;i++){const old=state.F;state.F=30*i/60;const r=values();state.F=old;const x=gx+gw*i/60,y=gy-Math.min(1,r.a/8)*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.strokeStyle=colors.purple;ctx.lineWidth=3;ctx.stroke();
    const px=gx+gw*state.F/30,py=gy-Math.min(1,v.a/8)*gh;ctx.fillStyle=colors.red;ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
  }
  function ruler(x1,y,x2,label,c,hx,txt,active){line(x1,y,x2,y,'#0f172a',2);for(let i=0;i<=10;i++){const x=x1+(x2-x1)*i/10;line(x,y-5,x,y+5,'#0f172a',1)}text(label,(x1+x2)/2,y-18,c,'center',12,'900');handle(hx,y,txt,active,c)}
  function drawControls(g){
    box(34,610,876,108,8,'#fff','#d7dee8');text('拖参数尺：质量改变总惯性；μ 改变外力损失；θ/g 改变重力分量',300,628,colors.orange,'center',12,'900');
    ruler(70,662,225,'m1',colors.blue,g.m1,`m1=${fmt(state.m1)}`,state.drag==='m1');
    ruler(250,662,405,'m2',colors.red,g.m2,`m2=${fmt(state.m2)}`,state.drag==='m2');
    ruler(430,662,585,'μ',colors.orange,g.mu,`μ=${fmt(state.mu,2)}`,state.drag==='mu');
    ruler(610,662,765,'θ',colors.green,g.theta,`θ=${fmt(state.theta,0)}°`,state.drag==='theta');
    ruler(790,662,900,'g',colors.purple,g.g,`g=${fmt(state.g)}`,state.drag==='g');
  }
  function update(v){
    els.a.textContent=`${fmt(v.a,2)} m/s²`;els.T.textContent=`${fmt(v.T,2)} N`;els.net.textContent=`${fmt(v.net,2)} N`;els.constraint.textContent=v.constraint;
    els.whole.textContent=v.formula;els.local.textContent=v.local;
    els.status.className='status'+(v.net<=0?' warn':'');
    els.status.textContent=(v.net<=0?'净外力不足：当前约束方向上不能按设定方向共同加速。':'整体法求 a，隔离法求 T；绳张力是内力，不进整体方程。')+(state.playing?'（播放中）':'');
  }
  function draw(){
    const v=values(),g=geometry();ctx.clearRect(0,0,960,760);
    const bg=ctx.createLinearGradient(0,0,0,760);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,960,760);
    text('M-01 连接体模型实验台：侧视实物场景 + 隔离受力图 + 图像记录',480,28,'#0f172a','center',19,'900');
    box(34,56,522,528,8,'#fbfdff','#d7dee8');
    text('侧视实物场景',120,82,colors.muted,'left',12,'900');
    if(state.mode==='incline')drawIncline(v,g);else if(state.mode==='pulley')drawPulley(v);else drawHorizontal(v,g);
    drawEquations(v);drawGraph(v);drawControls(g);update(v);
  }
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
  function near(p,h,rad=26){return Math.hypot(p.x-h.x,p.y-h.y)<=rad}
  function setMode(mode){
    state.mode=mode==='rough'?'horizontal':mode;if(mode==='rough')state.mu=.18;if(mode==='horizontal')state.mu=0;
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));state.t=0;state.playing=false;document.getElementById('playBtn').textContent='播放过程';draw();
  }
  function down(e){
    state.playing=false;document.getElementById('playBtn').textContent='播放过程';
    const p=pos(e),g=geometry();state.drag=null;
    if(state.mode!=='pulley'&&near(p,g.F,34))state.drag='F';
    else if(near(p,g.m1))state.drag='m1';else if(near(p,g.m2))state.drag='m2';else if(near(p,g.mu))state.drag='mu';else if(near(p,g.theta))state.drag='theta';else if(near(p,g.g))state.drag='g';
    if(state.drag){canvas.setPointerCapture(e.pointerId);move(e)}
  }
  function move(e){
    if(!state.drag)return;const p=pos(e);
    if(state.drag==='F')state.F=clamp((p.x-430)/180*30,0,30);
    if(state.drag==='m1')state.m1=clamp(.5+(p.x-70)/155*4.5,.5,5);
    if(state.drag==='m2')state.m2=clamp(.5+(p.x-250)/155*4.5,.5,5);
    if(state.drag==='mu')state.mu=clamp((p.x-430)/155*.35,0,.35);
    if(state.drag==='theta')state.theta=clamp((p.x-610)/155*45,0,45);
    if(state.drag==='g')state.g=clamp(2+(p.x-790)/110*8,2,10);
    draw();
  }
  function up(e){if(state.drag){state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}draw()}}
  canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
  function animate(){if(!state.playing)return;state.t+=.035;draw();if(state.t>2.4){state.playing=false;document.getElementById('playBtn').textContent='播放过程';draw();return}requestAnimationFrame(animate)}
  document.getElementById('playBtn').addEventListener('click',()=>{state.playing=!state.playing;document.getElementById('playBtn').textContent=state.playing?'暂停':'播放过程';if(state.playing){state.t=0;animate()}else draw()});
  document.getElementById('resetBtn').addEventListener('click',()=>{
    // This control is labelled “reset”, so restore the complete experiment
    // rather than merely rewinding the animation clock.
    Object.assign(state,{mode:'horizontal',m1:2,m2:1,F:8,mu:0,theta:30,g:10,t:0,drag:null,playing:false});
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='horizontal'));
    document.getElementById('playBtn').textContent='播放过程';draw();
  });
  draw();
})();
</script>
<script src="../model/guided-lesson.js"></script>
</body>
</html>
