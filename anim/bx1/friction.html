<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-18 摩擦力引导演示</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#eef3f8;color:#102a43;font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:10px;padding:10px;max-width:100%}.stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}.stage,.panel{min-width:0}canvas{display:block;width:100%;max-width:100%;height:auto;aspect-ratio:920/540}.panel{display:flex;flex-direction:column;gap:8px}.card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px;overflow-wrap:anywhere}.task{border-left:4px solid #f59e0b;background:#fff7ed;font-size:13px;line-height:1.5}.choices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}button{min-width:0;min-height:36px;border:1px solid #94a3b8;background:#fff;color:#102a43;border-radius:7px;font-weight:750;cursor:pointer;overflow-wrap:anywhere}button.active{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}button:disabled{opacity:.45;cursor:not-allowed}.status{background:#eff6ff;border-color:#60a5fa;color:#1e40af;font-size:12px;line-height:1.5;font-weight:750}.formula{background:#ecfdf5;border-color:#10b981;color:#065f46;font-size:12px;line-height:1.55;font-weight:750}.readout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px}.meter{min-width:0;background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px}.meter span{display:block;color:#94a3b8;font-size:11px}.meter b{display:block;color:#fbbf24;font-size:15px;margin-top:2px}[hidden]{display:none!important}.explore label{display:grid;grid-template-columns:75px minmax(0,1fr) 48px;gap:6px;align-items:center;font-size:12px;margin-top:6px}.explore input{width:100%}.qualitative-note{margin:7px 0 0;color:#475569;font-size:12px;font-weight:700}@media(max-width:780px){.root{grid-template-columns:minmax(0,1fr)}.panel{grid-row:2}.choices{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="root" id="app" data-phase="predict-static">
  <div class="stage"><canvas id="canvas" width="920" height="540" aria-label="摩擦力引导演示：推箱三幕、接触面趋势和传送带方向迁移"></canvas></div>
  <div class="panel">
    <div class="card task" id="task"><b>观察任务·预测 1：</b>箱子仍静止时，水平推力逐渐增大，静摩擦力怎样变化？</div>
    <div class="choices" id="choices1"><button data-p1="zero">始终为 0</button><button data-p1="follow">随需要增大</button><button data-p1="max">始终取最大值</button></div>
    <div class="choices" id="choices2" hidden><button data-p2="left">向左</button><button data-p2="zero">为 0</button><button data-p2="right">向右</button></div>
    <div class="buttons"><button id="playBtn" disabled>▶ 开始第一幕</button><button id="resetBtn">重置</button></div>
    <div class="buttons"><button id="motionBtn">播放方式：自动</button><button id="replayBtn" disabled>重播完整演示</button></div>
    <div class="readout" id="readout">
      <div class="meter"><span>水平推力 F</span><b id="fText">0.0 N</b></div><div class="meter"><span>摩擦力 f</span><b id="frText">0.0 N</b></div>
      <div class="meter"><span>最大静摩擦</span><b id="maxText">25.0 N</b></div><div class="meter"><span>当前状态</span><b id="stateText">等待预测</b></div>
    </div>
    <div class="card formula" id="formula" hidden>证据归纳：静止时先求所需静摩擦并检验 0≤fₛ≤fₛ,max；恰要滑动才取 fₛ,max=μₛN；已经滑动才用 fₖ=μₖN。方向阻碍接触面间相对运动或趋势。</div>
    <div class="card explore" id="explore" hidden>
      <b>演示后自由探索</b>
      <div class="choices" style="margin-top:7px"><button data-mode="push" class="active">推箱</button><button data-mode="walk">人走路</button><button data-mode="belt">传送带</button></div>
      <div id="quantitativeControls">
        <label><span>推力 F</span><input id="forceRange" type="range" min="0" max="50" step="1" value="32"><output id="forceOut">32</output></label>
        <label><span>μₛ</span><input id="musRange" type="range" min="0.1" max="0.5" step="0.05" value="0.25"><output id="musOut">0.25</output></label>
        <label><span>μₖ</span><input id="mukRange" type="range" min="0.05" max="0.45" step="0.05" value="0.20"><output id="mukOut">0.20</output></label>
      </div>
      <p class="qualitative-note" id="qualitativeNote" hidden>此处只判断相对运动与摩擦方向，不做定量计算。</p>
    </div>
    <div class="card status" id="status">预测必须先发生；结果、公式和自由参数尚未揭示。</div>
  </div>
</div>
<script>
(()=>{
'use strict';
const app=document.getElementById('app'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),task=document.getElementById('task'),playBtn=document.getElementById('playBtn'),status=document.getElementById('status'),formula=document.getElementById('formula'),explore=document.getElementById('explore'),readout=document.getElementById('readout');
const fText=document.getElementById('fText'),frText=document.getElementById('frText'),maxText=document.getElementById('maxText'),stateText=document.getElementById('stateText'),motionBtn=document.getElementById('motionBtn'),replayBtn=document.getElementById('replayBtn');
const state={phase:'predict-static',prediction1:null,prediction2:null,F:0,m:10,mus:.25,muk:.20,mode:'push',running:false,last:0,stepMode:matchMedia('(prefers-reduced-motion: reduce)').matches};
const colors={ink:'#102a43',muted:'#64748b',blue:'#2563eb',red:'#dc2626',purple:'#7c3aed',orange:'#f59e0b',green:'#059669',grid:'#dbe3ec'};
function setPhase(p){state.phase=p;app.dataset.phase=p}
function fsMax(){return state.mus*state.m*10}function kinetic(){return state.muk*state.m*10}function moving(){return state.F>fsMax()}function friction(){return moving()?kinetic():Math.min(state.F,fsMax())}
function line(x1,y1,x2,y2,c=colors.grid,w=1,d=[]){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function text(s,x,y,c=colors.ink,size=13,align='center',weight='700'){ctx.fillStyle=c;ctx.font=`${weight} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.5),y2-l*Math.sin(a-.5));ctx.lineTo(x2-l*Math.cos(a+.5),y2-l*Math.sin(a+.5));ctx.closePath();ctx.fillStyle=c;ctx.fill()}
function round(x,y,w,h,fill='#fff',stroke='#cbd5e1'){ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.stroke()}
function drawPush(){
  round(42,52,836,232);const ground=226,boxX=235+(moving()?45:0);line(82,ground,838,ground,'#334155',5);for(let x=90;x<830;x+=28)line(x,ground+8,x+12,ground+18,'#94a3b8');round(boxX,142,130,84,moving()?'#fee2e2':'#dbeafe','#334155');text(`m=${state.m.toFixed(0)} kg`,boxX+65,184,colors.ink,14);
  if(state.F>0)arrow(boxX+130,184,boxX+130+Math.min(205,state.F*5),184,colors.blue,4);if(friction()>0)arrow(boxX,184,boxX-Math.min(180,friction()*5),184,colors.red,4);
  const noTrend=state.F===0;canvas.dataset.trend=moving()?'sliding':noTrend?'none':'right';text(moving()?'接触面已向右相对滑动':noTrend?'尚无水平相对运动趋势':'若去掉摩擦：箱底将向右滑动',460,80,moving()?colors.red:colors.purple,15);text(moving()?`fₖ=${kinetic().toFixed(1)} N，阻碍相对滑动`:noTrend?'f=0 N':'fₛ按需要向左，阻碍相对趋势',460,108,moving()?colors.red:colors.green,14);
  const ox=110,oy=490,gw=690,gh=150,maxF=50,maxY=35;line(ox,oy,ox+gw+18,oy,colors.ink,2);line(ox,oy,ox,oy-gh-18,colors.ink,2);text('F外/N',ox+gw+28,oy,colors.muted,11,'left');text('f/N',ox-8,oy-gh-22,colors.muted,11,'right');for(let i=0;i<=5;i++){line(ox+i*gw/5,oy-gh,ox+i*gw/5,oy);line(ox,oy-i*gh/5,ox+gw,oy-i*gh/5)}
  ctx.beginPath();for(let F=0;F<=state.F;F+=.5){const fr=F>fsMax()?kinetic():F,x=ox+F/maxF*gw,y=oy-fr/maxY*gh;F?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.strokeStyle=colors.orange;ctx.lineWidth=3;ctx.stroke();line(ox+fsMax()/maxF*gw,oy,ox+fsMax()/maxF*gw,oy-gh,colors.purple,2,[6,5]);text('临界',ox+fsMax()/maxF*gw,oy-gh-10,colors.purple,11);
}
function drawTransfer(){
  round(42,52,836,432);const ground=280;if(state.mode==='walk'){line(90,ground,830,ground,'#334155',5);ctx.beginPath();ctx.arc(460,110,22,0,Math.PI*2);ctx.fillStyle=colors.blue;ctx.fill();line(460,132,460,205,colors.blue,8);line(460,205,405,274,colors.blue,8);line(460,205,515,274,colors.blue,8);arrow(410,260,545,260,colors.red,5);arrow(410,305,320,305,colors.purple,3);text('脚向后蹬地：脚相对地面有向后滑动趋势',460,72,colors.purple,15);text('地面对人的静摩擦向前',460,352,colors.red,18)}else{line(100,ground,820,ground,'#334155',16);for(let x=130;x<790;x+=60)arrow(x,315,x+38,315,colors.purple,2);round(380,200,150,72,'#dbeafe','#334155');arrow(380,236,555,236,colors.red,5);arrow(300,145,470,145,colors.purple,3);text('传送带向右，物块初速更小',460,82,colors.purple,15);text('物块相对传送带向左滑，带对物块摩擦向右',460,365,colors.red,18)}text('迁移情境只判断相对运动与方向，不显示无来源的精确力值',460,438,colors.muted,13)}
function draw(){ctx.clearRect(0,0,920,540);const bg=ctx.createLinearGradient(0,0,0,540);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,920,540);text(state.phase==='final'?'摩擦力：阻碍接触面间相对运动或趋势':'摩擦力证据实验',460,28,colors.ink,19);state.mode==='push'?drawPush():drawTransfer();updateReadout()}
function updateReadout(){if(state.mode!=='push'){readout.hidden=true;return}readout.hidden=false;fText.textContent=`${state.F.toFixed(1)} N`;frText.textContent=`${friction().toFixed(1)} N`;maxText.textContent=`${fsMax().toFixed(1)} N`;stateText.textContent=state.phase==='predict-static'?'等待预测':moving()?'已经滑动':Math.abs(state.F-fsMax())<.5?'恰要滑动':'仍静止'}
function arriveStatic(){state.running=false;state.F=20;setPhase('static-evidence');playBtn.disabled=false;playBtn.textContent='下一证据：达到临界';task.innerHTML='<b>证据 1：</b>箱子仍静止，推力增大时摩擦按需要同步增大。';status.textContent=`你的预测是“${state.prediction1==='follow'?'随需要增大':state.prediction1==='zero'?'始终为0':'始终取最大值'}”；当前 F=20 N，仍未达到上限。`;draw()}
function arriveCritical(){state.running=false;state.F=fsMax();setPhase('critical-evidence');playBtn.disabled=false;playBtn.textContent='下一证据：越过临界';task.innerHTML='<b>证据 2：</b>此刻达到最大静摩擦，箱子恰要滑动。';status.textContent='临界证据停留：F=fₛ,max=25 N；下一步才越过临界。';draw()}
function arriveSlide(){state.running=false;state.F=32;setPhase('slide-evidence');playBtn.disabled=false;playBtn.textContent='进入方向预测';task.innerHTML='<b>证据 3：</b>箱子已经滑动，摩擦切换为滑动摩擦。';status.textContent=`滑动证据停留：F=32 N，fₖ=${kinetic().toFixed(1)} N，不再随 F 同步增大。`;draw()}
function promptDirection(){state.running=false;setPhase('predict-direction');document.getElementById('choices2').hidden=false;playBtn.disabled=true;playBtn.textContent='等待方向预测';task.innerHTML='<b>预测 2：</b>传送带向右、物块初速度更小，带对物块的摩擦向哪边？';status.textContent='推箱的静止—临界—滑动证据已经完成。现在单独预测传送带方向。';draw()}
function finish(){state.running=false;state.mode='belt';setPhase('final');formula.hidden=false;explore.hidden=false;document.getElementById('choices2').hidden=true;playBtn.disabled=true;playBtn.textContent='方向验证完成';replayBtn.disabled=false;document.getElementById('quantitativeControls').hidden=true;document.getElementById('qualitativeNote').hidden=false;task.innerHTML=`<b>证据反馈：</b>你预测摩擦“${state.prediction2==='right'?'向右':state.prediction2==='left'?'向左':'为0'}”。物块相对带向左滑，所以带对物块的摩擦向右。`;status.textContent='静止—临界—滑动—方向迁移均已完成；公式和自由探索现在才开放。';draw()}
function arriveFor(phase){if(phase==='static-run')arriveStatic();else if(phase==='critical-run')arriveCritical();else arriveSlide()}
function startSegment(phase,target,label){setPhase(phase);state.mode='push';if(state.stepMode){state.F=target;arriveFor(phase);return}state.running=true;state.last=performance.now();playBtn.disabled=false;playBtn.textContent=`⏸ ${label}`;status.textContent='自动模式按真实时间步长推进到下一个证据节点。'}
function tick(now){if(!state.running){requestAnimationFrame(tick);return}const dt=Math.min((now-state.last)/1000,.05);state.last=now;const target=state.phase==='static-run'?20:state.phase==='critical-run'?fsMax():32;state.F=Math.min(target,state.F+2*dt);if(state.F>=target){arriveFor(state.phase);requestAnimationFrame(tick);return}draw();requestAnimationFrame(tick)}
function runStatic(){document.getElementById('choices1').hidden=true;state.F=0;startSegment('static-run',20,'暂停第一幕')}
document.querySelectorAll('[data-p1]').forEach(b=>b.addEventListener('click',()=>{state.prediction1=b.dataset.p1;document.querySelectorAll('[data-p1]').forEach(x=>x.classList.toggle('active',x===b));playBtn.disabled=false;status.textContent='第一项预测已保存。现在开始只改变推力的证据演示。'}));
document.querySelectorAll('[data-p2]').forEach(b=>b.addEventListener('click',()=>{state.prediction2=b.dataset.p2;document.querySelectorAll('[data-p2]').forEach(x=>x.classList.toggle('active',x===b));playBtn.disabled=false;playBtn.textContent='▶ 只验证传送带方向';status.textContent='方向预测已保存；传送带结果尚未显示。'}));
playBtn.addEventListener('click',()=>{if(state.running){state.running=false;playBtn.textContent='▶ 继续当前证据';status.textContent='演示已暂停，物理量保持冻结。';return}if(['static-run','critical-run','slide-run'].includes(state.phase)){state.running=true;state.last=performance.now();playBtn.textContent='⏸ 暂停当前证据';return}if(state.phase==='predict-static')runStatic();else if(state.phase==='static-evidence')startSegment('critical-run',fsMax(),'暂停临界段');else if(state.phase==='critical-evidence')startSegment('slide-run',32,'暂停滑动段');else if(state.phase==='slide-evidence')promptDirection();else if(state.phase==='predict-direction')finish()});
motionBtn.addEventListener('click',()=>{state.stepMode=!state.stepMode;motionBtn.textContent=`播放方式：${state.stepMode?'分步':'自动'}`;status.textContent=state.stepMode?'分步模式不会连续运动，每次点击直接到下一个证据节点。':'自动模式使用真实时间步长推进，不依赖屏幕刷新率。'});motionBtn.textContent=`播放方式：${state.stepMode?'分步':'自动'}`;
document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{state.mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));const quantitative=state.mode==='push';document.getElementById('quantitativeControls').hidden=!quantitative;document.getElementById('qualitativeNote').hidden=quantitative;draw()}));
for(const [id,key,out] of [['forceRange','F','forceOut'],['musRange','mus','musOut'],['mukRange','muk','mukOut']])document.getElementById(id).addEventListener('input',e=>{state[key]=+e.target.value;document.getElementById(out).textContent=(+e.target.value).toFixed(key==='F'?0:2);state.mode='push';document.getElementById('quantitativeControls').hidden=false;document.getElementById('qualitativeNote').hidden=true;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x.dataset.mode==='push'));draw()});
function reset(){state.running=false;Object.assign(state,{phase:'predict-static',prediction1:null,prediction2:null,F:0,m:10,mus:.25,muk:.20,mode:'push'});setPhase('predict-static');document.querySelectorAll('.choices button').forEach(b=>b.classList.remove('active'));document.getElementById('choices1').hidden=false;document.getElementById('choices2').hidden=true;formula.hidden=true;explore.hidden=true;document.getElementById('quantitativeControls').hidden=false;document.getElementById('qualitativeNote').hidden=true;playBtn.disabled=true;playBtn.textContent='▶ 开始第一幕';replayBtn.disabled=true;task.innerHTML='<b>观察任务·预测 1：</b>箱子仍静止时，水平推力逐渐增大，静摩擦力怎样变化？';status.textContent='预测必须先发生；结果、公式和自由参数尚未揭示。';draw()}
document.getElementById('resetBtn').addEventListener('click',reset);replayBtn.addEventListener('click',reset);draw();requestAnimationFrame(tick);
})();
</script>
</body>
</html>
