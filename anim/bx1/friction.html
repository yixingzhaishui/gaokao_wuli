<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-18 摩擦力实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}.bad{border-color:#e03131;background:#fff0f0;color:#9b1c1c}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="摩擦力交互实验台：木箱侧视装置、f-F图像和数据记录"></canvas><div class="hint">拖蓝色 F 端点推箱子；拖 μ 和 m 旋钮改变最大静摩擦</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>缓慢拖大 F，对照木箱侧视装置、f-F 图像和数据记录，看静摩擦红箭头如何自动跟随；越过临界线后是否还随 F 增大？</div>
    <div class="box"><b>引导演示与迁移</b><div class="buttons" style="margin-top:7px"><button id="mStatic" class="active">推箱未动</button><button id="mCritical">恰要滑动</button><button id="mSlide">已经滑动</button><button id="mHeavy">重箱子</button><button id="mWalk">人走路</button><button id="mBelt">传送带</button></div><div class="buttons" style="margin-top:7px"><button id="playBtn">▶ 引导演示</button><button id="resetBtn">重置</button></div></div>
    <div class="readout" id="readout"></div>
    <div class="box formula"><b>模型边界</b><br>静摩擦：0≤fₛ≤fₛ,max，具体值由运动状态决定。<br>临界：fₛ,max=μₛN。<br>滑动：fₖ=μₖN；本演示取 μₛ&gt;μₖ。<br>方向：阻碍接触面间相对运动或趋势。</div>
    <div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={static:document.getElementById('mStatic'),critical:document.getElementById('mCritical'),slide:document.getElementById('mSlide'),heavy:document.getElementById('mHeavy'),walk:document.getElementById('mWalk'),belt:document.getElementById('mBelt')};const s={F:10,mus:.25,muk:.2,m:10,mode:'static'};let playing=false,demoStep=0;const playBtn=document.getElementById('playBtn');const g=10,graph={ox:90,oy:430,w:420,h:210,max:60};let drag=null,layout={};function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function fmax(){return s.mus*s.m*g}function fk(){return s.muk*s.m*g}function moving(){return !['walk','belt'].includes(s.mode)&&s.F>fmax()}function f(){return moving()?fk():Math.min(s.F,fmax())}function acc(){return moving()?(s.F-f())/s.m:0}function gx(F){return graph.ox+F/graph.max*graph.w}function gy(ff){return graph.oy-ff/graph.max*graph.h}function FfromX(x){return clamp((x-graph.ox)/graph.w*graph.max,0,graph.max)}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}function box(x,y,w,h,fill='#d9e2ec'){ctx.fillStyle=fill;ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,w,h,7);ctx.fill();ctx.stroke()}function setMode(m){s.mode=m;if(m==='static'){s.F=10;s.mus=.25;s.muk=.2;s.m=10}if(m==='critical'){s.mus=.25;s.muk=.2;s.m=10;s.F=fmax()}if(m==='slide'){s.F=34;s.mus=.25;s.muk=.2;s.m=10}if(m==='heavy'){s.F=34;s.mus=.25;s.muk=.2;s.m=18}if(m==='walk'||m==='belt'){s.F=12;s.m=10}Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>{playing=false;playBtn.textContent='▶ 引导演示';setMode(k)}));
function drawScene(){card(50,36,835,210);const ground=185;if(s.mode==='walk'){line(100,ground,820,ground,'#7b8794',4);ctx.beginPath();ctx.arc(430,82,18,0,Math.PI*2);ctx.fillStyle='#2f80ed';ctx.fill();line(430,100,430,145,'#2f80ed',7);line(430,145,390,182,'#2f80ed',7);line(430,145,470,182,'#2f80ed',7);arrow(395,174,490,174,'#e03131',4);arrow(400,205,325,205,'#7b2cbf',3);text('脚向后蹬地',325,220,'#7b2cbf',13,'center','800');text('地面对人的静摩擦向前：摩擦可以是动力',470,70,'#0b7285',16,'center','800');return}if(s.mode==='belt'){line(120,ground,800,ground,'#334e68',12);for(let x=140;x<790;x+=55)arrow(x,205,x+35,205,'#7b2cbf',2);box(390,ground-60,120,55,'#d9e2ec');arrow(390,ground-30,500,ground-30,'#e03131',4);arrow(330,120,450,120,'#7b2cbf',3);text('v带',455,120,'#7b2cbf',13);text('物块相对传送带向左滑，摩擦向右',470,70,'#0b7285',16,'center','800');return}const boxX=350+(moving()?Math.min(60,acc()*20):0);line(100,ground,820,ground,'#7b8794',4);for(let x=110;x<810;x+=26)line(x,ground,x+10,ground+10,'#bcccdc',1);box(boxX,ground-70,110,70,moving()?'#ffe3e3':'#d9e2ec');text(`m=${s.m.toFixed(1)} kg`,boxX+55,ground-35,'#102a43',13,'center','800');arrow(boxX+110,ground-35,boxX+110+clamp(s.F*4,20,230),ground-35,'#2f80ed',4);handle(boxX+110+clamp(s.F*4,20,230),ground-35,'F','#2f80ed');layout.F={x:boxX+110+clamp(s.F*4,20,230),y:ground-35};arrow(boxX,ground-35,boxX-clamp(f()*4,20,230),ground-35,'#e03131',4);text(moving()?'已滑动：fₖ=μₖN':'静止：fₛ 按需要调节',470,70,moving()?'#e03131':'#0b7285',16,'center','800');arrow(boxX+55,ground,boxX+55,ground-55,'#7b2cbf',3);arrow(boxX+55,ground-70,boxX+55,ground-18,'#7b2cbf',3);text(`fₛ,max=μₛN=${fmax().toFixed(1)} N`,470,100,'#7b2cbf',13,'center','800')}
function drawGraph(){card(50,265,560,225);line(graph.ox,graph.oy,graph.ox+graph.w+28,graph.oy,'#334e68',2);line(graph.ox,graph.oy,graph.ox,graph.oy-graph.h-18,'#334e68',2);text('F外/N',graph.ox+graph.w+40,graph.oy+4,'#334e68',13);text('f/N',graph.ox-18,graph.oy-graph.h-24,'#334e68',13,'right');for(let x=0;x<=60;x+=10){line(gx(x),graph.oy,gx(x),graph.oy-graph.h,'#d9e2ec');text(String(x),gx(x),graph.oy+18,'#627d98',11,'center','500')}for(let y=0;y<=60;y+=10){line(graph.ox,gy(y),graph.ox+graph.w,gy(y),'#d9e2ec');text(String(y),graph.ox-12,gy(y),'#627d98',11,'right','500')}line(gx(0),gy(0),gx(Math.min(fmax(),60)),gy(Math.min(fmax(),60)),'#2f80ed',3);line(gx(Math.min(fmax(),60)),gy(Math.min(fk(),60)),gx(60),gy(Math.min(fk(),60)),'#e03131',3);line(gx(fmax()),graph.oy,gx(fmax()),gy(fmax()),'#7b2cbf',2,[6,5]);line(gx(fmax()),gy(fmax()),gx(fmax()),gy(fk()),'#e03131',2,[3,3]);text('临界 F=fₛ,max',gx(Math.min(fmax(),58))+8,gy(Math.min(fmax(),55))-16,'#7b2cbf',12);handle(gx(s.F),gy(f()),'红点','#f08c00');layout.point={x:gx(s.F),y:gy(f())};text('蓝段：静摩擦按需调节；红段：滑动摩擦 fₖ=μₖN',330,286,'#334e68',13,'center','800')}
function drawKnobs(){line(675,320,850,320,'#bcccdc',3);const mx=675+s.mus/.6*175;handle(mx,320,'μₛ','#12b886');layout.mu={x:mx,y:320};text(`μₛ=${s.mus.toFixed(2)}，μₖ=${s.muk.toFixed(2)}`,762,296,'#0b7285',13,'center','800');line(675,425,850,425,'#bcccdc',3);const mm=675+(s.m-1)/19*175;handle(mm,425,'m','#7b2cbf');layout.m={x:mm,y:425};text(`m=${s.m.toFixed(1)} kg`,762,401,'#7b2cbf',13,'center','800')}
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};drawScene();drawGraph();drawKnobs();const transfer=['walk','belt'].includes(s.mode);readout.innerHTML=`情境=<b>${s.mode==='walk'?'人走路':s.mode==='belt'?'传送带':'推箱子'}</b><br>F外=<b>${s.F.toFixed(1)}</b> N<br>μₛ=<b>${s.mus.toFixed(2)}</b>，μₖ=<b>${s.muk.toFixed(2)}</b><br>N=<b>${(s.m*g).toFixed(1)}</b> N<br>fₛ,max=<b>${fmax().toFixed(1)}</b> N<br>f=<b>${f().toFixed(1)}</b> N<br>状态=<b>${transfer?'方向迁移':moving()?'滑动':'静止'}</b>`;status.className='box warn'+(moving()?' bad':'');if(transfer)status.textContent=s.mode==='walk'?'预测：脚相对地面有向后滑动趋势，所以地面对人的静摩擦向前。':'预测：物块比带慢，物块相对带向左滑，所以带对物块的摩擦向右。';else if(Math.abs(s.F-fmax())<.6)status.textContent='暂停预测：箱子恰好要动，此时静摩擦才达到 fₛ,max。';else status.textContent=moving()?'已经滑动：改用 fₖ=μₖN，不能继续沿用最大静摩擦。':'仍静止：这一单推力情境中，静摩擦按需要与 F 等大。';status.textContent+=playing?'（引导演示中）':''}
function animate(){if(!playing)return;s.mode='static';s.F=Math.min(42,s.F+0.3);if(s.F>fmax()+4&&demoStep===0){demoStep=1;playing=false;playBtn.textContent='▶ 继续：方向迁移';draw();status.textContent='关键暂停：超过最大静摩擦后，为什么摩擦反而变为较小的 fₖ？作答后继续。';return}draw();if(s.F>=42){playing=false;playBtn.textContent='▶ 引导演示';setMode('walk');return}requestAnimationFrame(animate)}
playBtn.addEventListener('click',()=>{if(!playing&&demoStep===1){demoStep=2;setMode('walk');playBtn.textContent='▶ 下一幕：传送带';return}if(!playing&&demoStep===2){demoStep=0;setMode('belt');playBtn.textContent='▶ 引导演示';return}playing=!playing;playBtn.textContent=playing?'⏸ 暂停':'▶ 引导演示';if(playing){setMode('static');s.F=0;animate()}else draw()});
document.getElementById('resetBtn').addEventListener('click',()=>{playing=false;demoStep=0;playBtn.textContent='▶ 引导演示';setMode('static')});
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{if(playing){playing=false;playBtn.textContent='▶ 引导演示'}const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<34){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag==='F')s.F=Math.round(clamp((p.x-(350+110))/4,0,60)*10)/10;if(drag==='point')s.F=Math.round(FfromX(p.x)*10)/10;if(drag==='mu'){s.mus=Math.round(clamp((p.x-675)/175*.6,.05,.6)*100)/100;s.muk=Math.max(.02,Math.round((s.mus-.05)*100)/100)}if(drag==='m')s.m=Math.round(clamp(1+(p.x-675)/175*19,1,20)*10)/10;if(drag){draw();return}let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<34)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
})();
</script>
</body>
</html>
