<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1-14 竖直上抛实验台</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#243b53;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:10px;padding:10px}.stage{position:relative;background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;aspect-ratio:940/560;touch-action:none}.hint{position:absolute;left:14px;bottom:12px;background:#243b53;color:#fff;border-radius:6px;padding:7px 10px;font-size:12px}.panel{display:flex;flex-direction:column;gap:8px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:9px}.task{background:#fff8e6;border-color:#f0a202;font-size:13px;line-height:1.5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px}button{border:1px solid #bcccdc;background:#fff;color:#243b53;border-radius:6px;padding:8px 6px;font-weight:700;cursor:pointer}button.active{background:#2f80ed;color:#fff;border-color:#2f80ed}.readout{background:#102a43;color:#fff;border-radius:7px;padding:10px;font-size:13px;line-height:1.65;font-weight:700}.readout b{color:#ffd166}.formula{font-size:13px;line-height:1.55}.warn{border-color:#f0a202;color:#7c4d00;background:#fff8e6;font-size:13px;line-height:1.5;font-weight:700}@media(max-width:850px){.wrap{grid-template-columns:1fr}.panel{grid-row:2}.hint{position:static;border-radius:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage"><canvas id="canvas" width="940" height="560" aria-label="竖直上抛交互实验台：小球侧视装置、v-t图像和数据记录"></canvas><div class="hint">可拖动 v0 点、调 g 点和橙色时间游标；最高点处 v=0 但 a 仍向下</div></div>
  <div class="panel">
    <div class="box task"><b>观察任务：</b>拖 t 到紫色最高点竖线，对照小球侧视装置、v-t 图像和数据记录，看速度为 0 时加速度箭头是否消失。</div>
    <div class="box"><b>环境</b><div class="buttons" style="margin-top:7px"><button id="mEarth" class="active">地球</button><button id="mMoon">月球</button><button id="mHigh">大 g</button><button id="mFast">高速上抛</button></div></div>
    <div class="box"><button id="play" style="width:100%">▶ 播放上抛</button></div>
    <div class="readout" id="readout"></div><div class="box formula"><b>公式绑定</b><br>v=v0-gt。<br>h=v0t-1/2gt²。<br>t上=v0/g，Hmax=v0²/(2g)。<br>回抛点：t总=2t上，v=-v0。</div><div class="box warn" id="status"></div>
  </div>
</div>
<script>
(()=>{const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),readout=document.getElementById('readout'),status=document.getElementById('status');const btn={earth:document.getElementById('mEarth'),moon:document.getElementById('mMoon'),high:document.getElementById('mHigh'),fast:document.getElementById('mFast')};const s={v0:20,g:9.8,t:2,mode:'earth'};const sc={x:82,y0:454,w:310,top:50};const gv={ox:470,oy:320,w:330,h:230,tMax:6,vMax:42};let drag=null,layout={};function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function tUp(){return s.v0/s.g}function tTot(){return 2*tUp()}function hMax(){return s.v0*s.v0/(2*s.g)}function te(){return Math.min(s.t,tTot())}function v(t){return s.v0-s.g*t}function h(t){return Math.max(0,s.v0*t-.5*s.g*t*t)}function yH(x){return sc.y0-x/Math.max(20,hMax()*1.15)*(sc.y0-sc.top)}function gx(t){return gv.ox+t/gv.tMax*gv.w}function gy(vv){return gv.oy-vv/(gv.vMax*2)*(gv.h)+gv.h/2}function tFromX(x){return clamp((x-gv.ox)/gv.w*gv.tMax,0,gv.tMax)}function valFromY(y){return clamp((gv.oy+gv.h/2-y)/(gv.h)*(gv.vMax*2),-gv.vMax,gv.vMax)}function line(x1,y1,x2,y2,c,w=1,d=[]){ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function text(a,x,y,c='#243b53',z=13,al='left',wt='600'){ctx.fillStyle=c;ctx.font=`${wt} ${z}px system-ui`;ctx.textAlign=al;ctx.textBaseline='middle';ctx.fillText(a,x,y)}function arrow(x1,y1,x2,y2,c,w=3){line(x1,y1,x2,y2,c,w);const a=Math.atan2(y2-y1,x2-x1),l=10;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.55),y2-l*Math.sin(a-.55));ctx.lineTo(x2-l*Math.cos(a+.55),y2-l*Math.sin(a+.55));ctx.closePath();ctx.fillStyle=c;ctx.fill()}function handle(x,y,l,c){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text(l,x+14,y-15,c,13)}function card(x,y,w,h){ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke()}
function setMode(m){s.mode=m;if(m==='earth'){s.v0=20;s.g=9.8;s.t=2}if(m==='moon'){s.v0=20;s.g=1.6;s.t=4}if(m==='high'){s.v0=20;s.g=18;s.t=1.1}if(m==='fast'){s.v0=32;s.g=9.8;s.t=3}Object.entries(btn).forEach(([k,b])=>b.classList.toggle('active',k===m));draw()}Object.entries(btn).forEach(([k,b])=>b.addEventListener('click',()=>setMode(k)));
function drawScene(){card(50,36,365,462);line(sc.x,sc.y0,sc.x+sc.w,sc.y0,'#334e68',3);const top=yH(hMax());line(sc.x,top,sc.x+sc.w,top,'#7b2cbf',2,[6,5]);text(`Hmax=${hMax().toFixed(1)} m`,sc.x+10,top-15,'#7b2cbf',13);const x=sc.x+sc.w/2,y=yH(h(te()));for(let tt=0;tt<=te()+1e-6;tt+=.18){ctx.fillStyle='rgba(47,128,237,.25)';ctx.beginPath();ctx.arc(x,yH(h(tt)),3.5,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#2f80ed';ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();if(Math.abs(v(te()))>.15)arrow(x+20,y,x+20,y+(v(te())>0?-clamp(Math.abs(v(te()))*2,20,85):clamp(Math.abs(v(te()))*2,20,85)),'#2f80ed',4);else text('v=0',x+18,y,'#f08c00',13);arrow(x-20,y,x-20,y+clamp(s.g*4,24,90),'#7b2cbf',4);text('加速度 a=g 始终向下',232,64,'#334e68',14,'center','800');text(`h=${h(te()).toFixed(1)} m，v=${v(te()).toFixed(1)} m/s`,232,92,'#0b7285',14,'center','800')}
function drawGraph(){card(438,36,410,462);line(gv.ox,gv.oy,gv.ox+gv.w+28,gv.oy,'#334e68',2);line(gv.ox,gv.oy+gv.h/2,gv.ox+gv.w,gv.oy+gv.h/2,'#7b8794',1.5);line(gv.ox,gv.oy+gv.h/2,gv.ox,gv.oy-gv.h/2-22,'#334e68',2);text('t/s',gv.ox+gv.w+38,gv.oy+gv.h/2+4,'#334e68',13);text('v/(m/s)',gv.ox-42,gv.oy-gv.h/2-24,'#334e68',13);for(let t=0;t<=6;t++){line(gx(t),gv.oy+gv.h/2-5,gx(t),gv.oy+gv.h/2+5,'#9fb3c8');text(String(t),gx(t),gv.oy+gv.h/2+20,'#627d98',11,'center','500')}for(let vv=-40;vv<=40;vv+=20){line(gv.ox-5,gy(vv),gv.ox+gv.w,gy(vv),'#d9e2ec');text(String(vv),gv.ox-12,gy(vv),'#627d98',11,'right','500')}ctx.beginPath();ctx.moveTo(gv.ox,gv.oy+gv.h/2);for(let i=0;i<=100;i++){const t=te()*i/100;ctx.lineTo(gx(t),gy(v(t)))}ctx.lineTo(gx(te()),gv.oy+gv.h/2);ctx.closePath();ctx.fillStyle=v(te())>=0?'rgba(240,140,0,.23)':'rgba(44,123,229,.18)';ctx.fill();line(gx(0),gy(s.v0),gx(tTot()),gy(-s.v0),'#2f80ed',3);line(gx(tUp()),gv.oy+gv.h/2,gx(tUp()),gy(0),'#7b2cbf',2,[6,5]);handle(gx(0),gy(s.v0),'v0','#2f80ed');layout.v0={x:gx(0),y:gy(s.v0)};handle(gx(1),gy(v(1)),'调g','#7b2cbf');layout.g={x:gx(1),y:gy(v(1))};handle(gx(te()),gy(v(te())),'t','#f08c00');layout.t={x:gx(te()),y:gy(v(te()))};text(`t上=${tUp().toFixed(2)} s`,gx(tUp())+10,gv.oy+gv.h/2+34,'#7b2cbf',12);text('上方面积=上升高度；下方面积=回落位移',642,74,'#334e68',14,'center','800')}
function draw(){var _bg=ctx.createLinearGradient(0,0,0,560);_bg.addColorStop(0,"#fbfdff");_bg.addColorStop(1,"#eaf0f7");ctx.fillStyle=_bg;ctx.fillRect(0,0,940,560);layout={};drawScene();drawGraph();readout.innerHTML=`v0=<b>${s.v0.toFixed(1)}</b> m/s<br>g=<b>${s.g.toFixed(2)}</b> m/s²<br>t=<b>${te().toFixed(2)}</b> s<br>v=<b>${v(te()).toFixed(2)}</b> m/s<br>h=<b>${h(te()).toFixed(2)}</b> m<br>t上=<b>${tUp().toFixed(2)}</b> s<br>Hmax=<b>${hMax().toFixed(2)}</b> m<br>t总=<b>${tTot().toFixed(2)}</b> s`;status.textContent=Math.abs(te()-tUp())<.06?'最高点：v=0，但紫色 a=g 箭头仍向下，不为零。':(te()>tUp()?'下落阶段：速度向下，g 仍向下；落回抛点速度为 -v0。':'上升阶段：速度向上但加速度向下，速度逐渐变小。')}
function pointer(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{const p=pointer(e);for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30){drag=k;canvas.setPointerCapture(e.pointerId);break}}});canvas.addEventListener('pointermove',e=>{const p=pointer(e);if(drag==='v0')s.v0=Math.round(clamp(valFromY(p.y),5,40)*10)/10;if(drag==='g')s.g=Math.round(clamp((s.v0-valFromY(p.y)),1,24)*10)/10;if(drag==='t')s.t=Math.round(tFromX(p.x)*20)/20;if(drag){draw();return}let hit=false;for(const k of Object.keys(layout)){const h=layout[k];if(Math.hypot(p.x-h.x,p.y-h.y)<30)hit=true}canvas.style.cursor=hit?'grab':'default'});window.addEventListener('pointerup',()=>{drag=null;canvas.style.cursor='default'});draw();
const playBtn=document.getElementById('play');let running=false,last=performance.now();
playBtn.addEventListener('click',()=>{if(s.t>=tTot())s.t=0;running=!running;playBtn.textContent=running?'⏸ 暂停':'▶ 播放上抛';});
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running){s.t=Math.min(tTot(),s.t+dt);if(s.t>=tTot()){running=false;playBtn.textContent='▶ 重新上抛';}draw();}requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
