<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波的反射与折射水波槽：俯视图、侧视剖面与角度图像</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f5f7fb; color: #102a43; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
  .root { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 12px; padding: 12px; min-height: 680px; }
  .stage { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; overflow: hidden; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; }
  .panel { display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 10px; }
  .task { background: #fff7e6; border-left: 4px solid #f0a500; color: #486581; font-size: 13px; line-height: 1.5; }
  .title { font-weight: 800; margin-bottom: 7px; color: #102a43; }
  .param { display: grid; gap: 2px; margin: 8px 0; font-size: 13px; }
  .param span { display: flex; justify-content: space-between; gap: 8px; color: #486581; }
  .param b { color: #102a43; font-variant-numeric: tabular-nums; white-space: nowrap; }
  input[type=range] { width: 100%; accent-color: #2c7be5; }
  .readout { background: #102a43; color: #d9e2ec; border-radius: 8px; padding: 10px; line-height: 1.65; font-size: 13px; }
  .readout b { color: #ffd166; font-variant-numeric: tabular-nums; }
  .status { border: 1px solid #38b2ac; background: #e6fffa; color: #087f5b; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 800; line-height: 1.45; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  .formula { font-size: 13px; color: #334e68; line-height: 1.6; }
  button { border: 1px solid #b0bcc9; background: #fff; border-radius: 6px; padding: 7px 8px; cursor: pointer; font: inherit; font-size: 13px; }
  @media (max-width: 820px) { .root { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="root">
  <div class="stage">
    <canvas id="canvas" width="900" height="600" aria-label="水波槽实验台装置：俯视图、侧视剖面、入射波、反射波、折射波、法线、角度读数、波前图像和数据记录"></canvas>
  </div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>对照水波槽实验台装置，在俯视图看波前转向，在侧视剖面看深浅水导致波速变化；拖动画面中的蓝色入射方向手柄，改变入射角；再调第二介质波速，看反射角是否等于入射角、折射波长如何随波速改变，频率是否保持不变。</div>
    <div class="card">
      <div class="title">调水波槽</div>
      <label class="param"><span>入射角 θ₁ <b id="angleLabel">35°</b></span><input id="angle" type="range" min="5" max="70" step="1" value="35"></label>
      <label class="param"><span>介质1波速 v₁ <b id="v1Label">2.0 m/s</b></span><input id="v1" type="range" min="1" max="4" step="0.1" value="2"></label>
      <label class="param"><span>介质2波速 v₂ <b id="v2Label">1.2 m/s</b></span><input id="v2" type="range" min="0.6" max="4" step="0.1" value="1.2"></label>
      <label class="param"><span>频率 f <b id="fLabel">5.0 Hz</b></span><input id="freq" type="range" min="2" max="10" step="0.5" value="5"></label>
      <button id="record">记录一组读数</button><button id="playBtn" type="button">暂停演示</button>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card">
      <div class="title">实验记录</div>
      <table>
        <thead><tr><th>θ₁</th><th>θ反</th><th>θ₂</th><th>λ₂</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="card formula">
      <div class="title">公式与图像</div>
      <div>反射：θ反 = θ₁，角度都相对法线测量。</div>
      <div>折射：sinθ₁ / v₁ = sinθ₂ / v₂。</div>
      <div>过边界：频率 f 不变，波长 λ = v/f 随波速改变。</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const els = {
    angle: document.getElementById('angle'), v1: document.getElementById('v1'), v2: document.getElementById('v2'), freq: document.getElementById('freq'),
    angleLabel: document.getElementById('angleLabel'), v1Label: document.getElementById('v1Label'), v2Label: document.getElementById('v2Label'), fLabel: document.getElementById('fLabel'),
    readout: document.getElementById('readout'), status: document.getElementById('status'), rows: document.getElementById('rows'), record: document.getElementById('record')
  };
  const state = { t: 0, drag: false, records: [], running: true };
  const colors = { ink:'#102a43', muted:'#486581', blue:'#2c7be5', red:'#e03131', green:'#087f5b', gold:'#f0a500', purple:'#7c3aed' };
  function p() {
    const a = +els.angle.value * Math.PI / 180, v1 = +els.v1.value, v2 = +els.v2.value, f = +els.freq.value;
    const s2 = Math.sin(a) * v2 / v1;
    const total = Math.abs(s2) > 1;
    const b = total ? Math.PI / 2 : Math.asin(s2);
    return { a, deg: +els.angle.value, v1, v2, f, b, deg2: b*180/Math.PI, total, l1: v1/f, l2: v2/f };
  }
  function fmt(n,d=1){ return n.toFixed(d); }
  function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=w; if(dash)ctx.setLineDash(dash); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore(); }
  function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ ctx.save(); ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke(); ctx.restore(); }
  function text(s,x,y,c=colors.ink,align='center',size=13,weight='700'){ ctx.fillStyle=c; ctx.font=weight+' '+size+'px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif'; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.fillText(s,x,y); }
  function arrow(x1,y1,x2,y2,c,w=3){ const a=Math.atan2(y2-y1,x2-x1); line(x1,y1,x2,y2,c,w); ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45)); ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45)); ctx.closePath(); ctx.fill(); }
  function rayFromBoundary(theta, side, len) {
    const x0 = 450, y0 = 300;
    const dx = Math.sin(theta) * len;
    const dy = Math.cos(theta) * len;
    return side === 'in' ? [x0-dx, y0-dy, x0, y0] : [x0, y0, x0+dx, y0+dy];
  }
  function drawWavefronts(theta, side, lambda, color) {
    const [x1,y1,x2,y2] = side === 'in' ? rayFromBoundary(theta,'in',300) : rayFromBoundary(theta,'out',300);
    const vx = x2-x1, vy = y2-y1, L = Math.hypot(vx,vy), ux=vx/L, uy=vy/L, nx=-uy, ny=ux;
    const spacing = Math.max(18, lambda*55);
    for(let s=(state.t*30)%spacing; s<L; s+=spacing){
      const cx=x1+ux*s, cy=y1+uy*s;
      line(cx-nx*52, cy-ny*52, cx+nx*52, cy+ny*52, color, 2);
    }
  }
  function draw(){
    const q=p();
    ctx.clearRect(0,0,900,600);
    box(36,34,828,520,'#fff');
    ctx.fillStyle='#e0f2fe'; ctx.fillRect(58,76,784,224);
    ctx.fillStyle='#dcfce7'; ctx.fillRect(58,300,784,224);
    line(58,300,842,300,colors.ink,3);
    line(450,86,450,520,colors.muted,2,[6,6]);
    text('俯视图：介质1 波速 v₁，波长 λ₁=v₁/f',250,104,colors.blue,'center',14,'800');
    text('俯视图：介质2 波速 v₂，波长 λ₂=v₂/f',650,496,colors.green,'center',14,'800');
    box(96,470,220,48,'#f8fafc','#d9e2ec');
    text('侧视剖面：深水 v大 / 浅水 v小',206,488,colors.muted,'center',12,'800');
    line(120,508,292,508,colors.blue,3); line(120,518,292,518,colors.green,2);
    text('法线',470,104,colors.muted,'left',12,'800');
    drawWavefronts(q.a,'in',q.l1,colors.blue);
    drawWavefronts(-q.a,'in',q.l1,colors.red);
    const [ix,iy,bx,by] = rayFromBoundary(q.a,'in',285);
    arrow(ix,iy,bx,by,colors.blue,4);
    const [rx1,ry1,rx2,ry2] = rayFromBoundary(-q.a,'in',285);
    arrow(rx2,ry2,rx1,ry1,colors.red,4);
    if (!q.total) {
      drawWavefronts(q.b,'out',q.l2,colors.green);
      const [tx1,ty1,tx2,ty2] = rayFromBoundary(q.b,'out',270);
      arrow(tx1,ty1,tx2,ty2,colors.green,4);
    } else {
      text('无折射传播：出现全反射边界',650,360,colors.gold,'center',15,'900');
      arrow(450,300,660,205,colors.gold,4);
    }
    text('入射波',230,190,colors.blue,'center',13,'900');
    text('反射波',248,405,colors.red,'center',13,'900');
    text(q.total?'临界/全反射':'折射波',642,390, q.total?colors.gold:colors.green,'center',13,'900');
    drawAngleArc(450,300,-Math.PI/2,q.a-Math.PI/2,54,colors.blue,'θ₁='+fmt(q.deg,0)+'°');
    drawAngleArc(450,300,-Math.PI/2,-q.a-Math.PI/2,84,colors.red,'θ反');
    if(!q.total) drawAngleArc(450,300,Math.PI/2-q.b,Math.PI/2,62,colors.green,'θ₂='+fmt(q.deg2,0)+'°');
    const hx = 450 - Math.sin(q.a)*170, hy = 300 - Math.cos(q.a)*170;
    ctx.fillStyle = colors.purple; ctx.beginPath(); ctx.arc(hx,hy,10,0,Math.PI*2); ctx.fill();
    text('拖动',hx,hy-20,colors.purple,'center',11,'800');
    drawMiniGraph(q);
  }
  function drawAngleArc(x,y,a1,a2,r,c,label){
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,r,a1,a2,a2<a1); ctx.stroke(); ctx.restore();
    text(label,x+r*Math.cos((a1+a2)/2),y+r*Math.sin((a1+a2)/2),c,'center',11,'900');
  }
  function drawMiniGraph(q){
    box(610,112,190,92,'#fff','#d9e2ec');
    text('λ=v/f 读数',705,132,colors.ink,'center',13,'800');
    line(650,174,790,174,'#d9e2ec',8);
    line(650,174,650+q.l1*50,174,colors.blue,8);
    line(650,194,790,194,'#d9e2ec',8);
    line(650,194,650+q.l2*50,194,colors.green,8);
    text('λ₁ '+fmt(q.l1,2)+' m',626,174,colors.blue,'right',11,'800');
    text('λ₂ '+fmt(q.l2,2)+' m',626,194,colors.green,'right',11,'800');
  }
  function update(){
    const q=p();
    els.angleLabel.textContent = fmt(q.deg,0)+'°';
    els.v1Label.textContent = fmt(q.v1,1)+' m/s';
    els.v2Label.textContent = fmt(q.v2,1)+' m/s';
    els.fLabel.textContent = fmt(q.f,1)+' Hz';
    els.readout.innerHTML = '反射角：<b>'+fmt(q.deg,0)+'°</b><br>折射角：<b>'+(q.total?'全反射':fmt(q.deg2,1)+'°')+'</b><br>频率：<b>'+fmt(q.f,1)+' Hz，两侧不变</b><br>波长：<b>λ₁='+fmt(q.l1,2)+' m，λ₂='+fmt(q.l2,2)+' m</b>';
    els.status.textContent = q.total ? '从慢介质到快介质且入射角足够大时，折射角达到 90° 后出现全反射。' : (q.v2 < q.v1 ? '进入较慢介质：折射角变小，波长变短，频率不变。' : '进入较快介质：折射角变大，波长变长，频率不变。');
    els.rows.innerHTML = state.records.slice(-6).map(r=>'<tr><td>'+r.a+'°</td><td>'+r.r+'°</td><td>'+r.b+'</td><td>'+r.l+' m</td></tr>').join('') || '<tr><td colspan="4">暂无记录</td></tr>';
  }
  function record(){
    const q=p();
    state.records.push({ a: fmt(q.deg,0), r: fmt(q.deg,0), b: q.total?'全反射':fmt(q.deg2,1)+'°', l: fmt(q.l2,2) });
    if(state.records.length>8) state.records.shift();
    update();
  }
  [els.angle,els.v1,els.v2,els.freq].forEach(el=>el.addEventListener('input',()=>{draw();update();}));
  els.record.addEventListener('click',record);
  canvas.addEventListener('pointerdown',e=>{ state.drag=true; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointermove',e=>{
    if(!state.drag) return;
    const r=canvas.getBoundingClientRect(), x=(e.clientX-r.left)*canvas.width/r.width, y=(e.clientY-r.top)*canvas.height/r.height;
    const dx=Math.max(10,450-x), dy=Math.max(10,300-y);
    const deg=Math.max(5,Math.min(70,Math.atan2(dx,dy)*180/Math.PI));
    els.angle.value = deg;
    draw(); update();
  });
  canvas.addEventListener('pointerup',e=>{ state.drag=false; record(); try{canvas.releasePointerCapture(e.pointerId);}catch(_){} });
  const playBtn=document.getElementById('playBtn');
  playBtn.addEventListener('click',()=>{state.running=!state.running;playBtn.textContent=state.running?'暂停演示':'播放演示';if(state.running){draw();update()}});
  function loop(){if(state.running){state.t+=0.04;draw();update()}requestAnimationFrame(loop);}
  record(); loop();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
