<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>反冲实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--blue:#2c7be5;--red:#e03131;--green:#159a6b;--gold:#f0a500;--orange:#e8590c;--purple:#6f42c1}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}.chip.ok{background:#0b7285}.chip.warn{background:#7b341e}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>反冲：系统初动量为零，分裂后两部分动量等大反向</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="470" aria-label="反冲交互实验台：火箭侧视装置、动量图像和数据记录"></canvas></div>
    <section class="panel">
      <div class="buttons"><button id="fire">释放</button><button id="reset">复位</button></div>
      <div class="read">
        <div class="chip">主体质量 M = <b id="Mout">50</b> kg</div>
        <div class="chip">喷出质量 m = <b id="mout">2.0</b> kg</div>
        <div class="chip">喷出速度 v = <b id="vout">10.0</b> m/s</div>
        <div class="chip ok">主体速度 V = <b id="Vout">-0.40</b> m/s</div>
        <div class="chip">喷出物动量 mv = <b id="pout">20.0</b></div>
        <div class="chip warn">系统总动量 = <b id="sumout">0.00</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖蓝色主体右侧金色把手改变 M，对照火箭侧视装置、动量图像和数据记录，看红色反冲箭头是否总与绿色喷出箭头反向。</div>
      <div class="formula">
        <b>画面绑定</b><br>
        取向右为正，喷出物动量为 +mv，主体动量为 MV。初动量为 0，所以 MV + mv = 0，主体速度 V = -mv/M。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let M=50,m=2,v=10,drag=null,fired=false,t=0,last=performance.now();
const els={M:id('Mout'),m:id('mout'),v:id('vout'),V:id('Vout'),p:id('pout'),sum:id('sumout')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function calc(){const V=-(m*v)/M;return{V,pg:m*v,pb:M*V,sum:M*V+m*v,w:70+M*.9,r:10+m*5}}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1),len=Math.hypot(x2-x1,y2-y1);
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(len>10){ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.48),y2-10*Math.sin(a-.48));ctx.lineTo(x2-10*Math.cos(a+.48),y2-10*Math.sin(a+.48));ctx.closePath();ctx.fill();}
}
function roundRect(x,y,w,h,r){ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);else ctx.rect(x,y,w,h);ctx.fill();ctx.stroke();}
function drawGrid(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}
function bar(x,y,label,value,color){
  const len=clamp(value*4,-170,170);
  ctx.fillStyle='#486581';ctx.font='13px system-ui';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(label,x-10,y);
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-176,y);ctx.lineTo(x+176,y);ctx.stroke();
  ctx.strokeStyle=color;ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+len,y);ctx.stroke();
  ctx.fillStyle=color;ctx.textAlign=len>=0?'left':'right';ctx.fillText(value.toFixed(1),x+len+(len>=0?8:-8),y);
}
function draw(){
  drawGrid();
  const c=calc(),cy=238,baseX=360,bodyX=baseX+c.V*60*t,gasX=baseX+90+v*10*t,bodyW=c.w,bodyH=54;
  ctx.strokeStyle='#8aa4bd';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(58,cy+44);ctx.lineTo(662,cy+44);ctx.stroke();
  ctx.fillStyle='#d9ecff';ctx.strokeStyle='#334e68';ctx.lineWidth=2;roundRect(bodyX-bodyW/2,cy-bodyH/2,bodyW,bodyH,8);
  ctx.fillStyle='#2c7be5';ctx.fillRect(bodyX-bodyW/2+10,cy-bodyH/2-20,bodyW-20,20);
  ctx.strokeStyle='#334e68';ctx.strokeRect(bodyX-bodyW/2+10,cy-bodyH/2-20,bodyW-20,20);
  ctx.fillStyle='#fff';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('主体 M',bodyX,cy);
  const mx=bodyX+bodyW/2+12;ctx.fillStyle='#f0a500';ctx.strokeStyle='#8a5a00';ctx.beginPath();ctx.arc(mx,cy,10,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.fillText('M',mx+22,cy+4);
  ctx.fillStyle='#e8590c';ctx.strokeStyle='#7b341e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(gasX,cy,c.r,0,7);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='700 12px system-ui';ctx.fillText('m',gasX,cy);
  ctx.fillStyle='#f0a500';ctx.beginPath();ctx.arc(gasX+c.r+12,cy,8,0,7);ctx.fill();ctx.strokeStyle='#8a5a00';ctx.stroke();
  arrow(gasX,cy-66,gasX+v*14,cy-66,'#159a6b',4);
  ctx.beginPath();ctx.arc(gasX+v*14,cy-66,9,0,7);ctx.fillStyle='#159a6b';ctx.fill();
  ctx.fillStyle='#159a6b';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.fillText('喷出速度 v',gasX+v*7,cy-86);
  arrow(bodyX,cy-44,bodyX+c.V*210,cy-44,'#e03131',4);
  ctx.fillStyle='#e03131';ctx.font='700 13px system-ui';ctx.fillText('反冲 V',bodyX+c.V*105,cy-24);
  bar(360,356,'主体 MV',c.pb,'#e03131');
  bar(360,394,'喷出 mv',c.pg,'#159a6b');
  ctx.fillStyle=Math.abs(c.sum)<0.01?'#0b7285':'#e8590c';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.fillText('MV + mv = '+c.sum.toFixed(2)+'，总动量守恒',360,426);
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText(fired?'释放后：两部分反向分离':'释放前：系统静止，总动量为 0',28,34);
  ctx.fillStyle='#243b53';ctx.font='13px system-ui';ctx.fillText('公式：动量守恒 p=MV+mv=0 → V=−mv/M',28,455);
  update();
}
function update(){const c=calc();els.M.textContent=M.toFixed(0);els.m.textContent=m.toFixed(1);els.v.textContent=v.toFixed(1);els.V.textContent=c.V.toFixed(2);els.p.textContent=c.pg.toFixed(1);els.sum.textContent=c.sum.toFixed(2)}
cv.addEventListener('pointerdown',e=>{
  const p=pos(e),c=calc(),cy=238,baseX=360,bodyX=baseX+c.V*60*t,gasX=baseX+90+v*10*t,bodyW=c.w;
  if(Math.hypot(p.x-(bodyX+bodyW/2+12),p.y-cy)<24){drag='M';fired=false;t=0;cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-(gasX+c.r+12),p.y-cy)<24){drag='m';fired=false;t=0;cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-(gasX+v*14),p.y-(cy-66))<24){drag='v';fired=false;t=0;cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e),c=calc(),cy=238,bodyW=c.w;
  if(drag==='M')M=clamp((p.x-407)/.45,15,120);
  if(drag==='m')m=clamp((p.x-472)/5,.5,8);
  if(drag==='v')v=clamp((p.x-450)/14,2,18);
  draw();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
id('fire').onclick=()=>{fired=true;t=0};
id('reset').onclick=()=>{M=50;m=2;v=10;fired=false;t=0;draw()};
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(fired)t=Math.min(t+dt,2.2);draw();requestAnimationFrame(loop)}
draw();requestAnimationFrame(loop);
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
