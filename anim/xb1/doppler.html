<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多普勒效应</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
h2{font-size:16px;margin:0 0 8px;color:#102a43}
canvas{display:block;width:100%;max-width:660px;background:#fff;border:1px solid #d9e2ec;border-radius:8px}
.readouts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;font-size:13px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 10px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#334e68}
.controls input[type=range]{width:120px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 14px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>多普勒效应：波源运动使波前一边挤密、一边拉疏</h2>
  <canvas id="canvas" width="660" height="360" aria-label="多普勒效应实验台：波面俯视装置、频率图像和数据记录"></canvas>
  <div class="readouts">
    <span class="r">波速 v = <b id="v-v">120</b></span>
    <span class="r">波源速度 vs = <b id="vs-v">40</b></span>
    <span class="r">前方接收 f前 = <b id="ff-v">—</b> f₀</span>
    <span class="r">后方接收 f后 = <b id="fb-v">—</b> f₀</span>
  </div>
  <div class="controls">
    <label>波源速度 vs = <span id="vs-d">40</span>
      <input type="range" id="vs" min="0" max="110" step="5" value="40"></label>
    <button id="play-btn">暂停</button>
    <button id="reset-btn">重置</button>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：黑点是运动的波源（喇叭/救护车），对照波面俯视装置、频率图像和数据记录，看前方波圈变密、后方波圈变疏。拖动 <b>vs</b> 变大，前后疏密差别更明显。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const v=120;            // wave speed px/s
  const T=0.6;            // emit period s
  let vs=40, t=0, running=true,dragVs=false;
  const cy=H/2;
  let emits=[];          // {x0, t0}
  let lastEmit=-1;
  function srcX(tt){ // source oscillates back to left when it exits, to keep on screen
    let x=60 + vs*tt;
    const span=W-120;
    // bounce within [60, W-60]
    const period=2*span/Math.max(vs,1e-3);
    // simpler: wrap
    x=60 + ((vs*tt)%span);
    return x;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // draw wavefronts
    ctx.lineWidth=2;
    for(const e of emits){
      const age=t-e.t0;
      const r=v*age;
      if(r<2||r>760)continue;
      ctx.strokeStyle='rgba(44,123,229,'+Math.max(0.08,0.6-r/700)+')';
      ctx.beginPath();ctx.arc(e.x0,cy,r,0,Math.PI*2);ctx.stroke();
    }
    // source（带辉光真实感）
    const sx=srcX(t);
    const glow=ctx.createRadialGradient(sx,cy,1,sx,cy,44);glow.addColorStop(0,'rgba(44,123,229,0.5)');glow.addColorStop(1,'rgba(44,123,229,0)');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(sx,cy,44,0,7);ctx.fill();
    ctx.fillStyle='#102a43';ctx.beginPath();ctx.arc(sx,cy,8,0,Math.PI*2);ctx.fill();
    // velocity arrow
    ctx.strokeStyle='#c92a2a';ctx.fillStyle='#c92a2a';ctx.lineWidth=2.5;
    const al=vs*0.4;
    if(al>4){ctx.beginPath();ctx.moveTo(sx,cy);ctx.lineTo(sx+al,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+al,cy);ctx.lineTo(sx+al-8,cy-5);ctx.lineTo(sx+al-8,cy+5);ctx.closePath();ctx.fill();}
    // observers
    ctx.fillStyle='#0b7285';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.beginPath();ctx.arc(W-30,cy,7,0,Math.PI*2);ctx.fill();ctx.fillText('前',W-30,cy-12);
    ctx.beginPath();ctx.arc(30,cy,7,0,Math.PI*2);ctx.fill();ctx.fillText('后',30,cy-12);
    // readouts: f' = v/(v ∓ vs) * f0
    const ff = v/Math.max(1,(v-vs));
    const fb = v/(v+vs);
    document.getElementById('v-v').textContent=v;
    document.getElementById('vs-v').textContent=vs;
    document.getElementById('ff-v').textContent=(vs>=v?'≫1(激波)':ff.toFixed(2));
    document.getElementById('fb-v').textContent=fb.toFixed(2);
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('f′ = v/(v∓vs)·f₀   前方用 v−vs（升高），后方用 v+vs（降低）',18,H-14);
    ctx.font='bold 13px sans-serif';ctx.fillStyle='#c92a2a';
    ctx.fillText('状态：波源接近前方 → 波前挤密、频率升高；远离后方 → 波前拉疏、频率降低',18,26);
  }

  function step(dt){
    t+=dt;
    if(t-lastEmit>=T){lastEmit=t;emits.push({x0:srcX(t),t0:t});}
    emits=emits.filter(e=> (t-e.t0)*v < 800);
  }
  document.getElementById('vs').addEventListener('input',e=>{vs=parseFloat(e.target.value);document.getElementById('vs-d').textContent=vs;draw();});
  function pos(e){const r=canvas.getBoundingClientRect(),s=canvas.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
  canvas.addEventListener('pointerdown',e=>{
    const p=pos(e),sx=srcX(t),tip=sx+vs*.4;
    if(Math.hypot(p.x-tip,p.y-cy)<24){dragVs=true;canvas.style.cursor='grabbing';}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!dragVs)return;const p=pos(e),sx=srcX(t);
    vs=Math.round(Math.max(0,Math.min(110,(p.x-sx)/.4))/5)*5;
    document.getElementById('vs').value=vs;document.getElementById('vs-d').textContent=vs;draw();
  });
  window.addEventListener('pointerup',()=>{dragVs=false;canvas.style.cursor='grab';});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{t=0;lastEmit=-1;emits=[];draw();});
  let last=performance.now();
  function loop(now){const dt=Math.min((now-last)/1000,0.03);last=now;if(running)step(dt);draw();requestAnimationFrame(loop);}
  draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
