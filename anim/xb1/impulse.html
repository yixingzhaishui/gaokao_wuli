<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>冲量实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--blue:#2c7be5;--red:#e03131;--green:#159a6b;--gold:#f0a500;--orange:#e8590c}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.chip.ok{background:#0b7285}.chip.neg{background:#7b341e}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>冲量：拖力箭头和时间边界，看 F-t 图面积 I = F·t</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="470" aria-label="冲量交互实验台"></canvas></div>
    <section class="panel">
      <div class="buttons"><button id="mode">缓冲目标</button><button id="play">播放</button><button id="reset">复位</button></div>
      <div class="read">
        <div class="chip">质量 m = <b id="mout">1.0</b> kg</div>
        <div class="chip">力 F = <b id="fout">4.0</b> N</div>
        <div class="chip">作用时间 t = <b id="tout">2.0</b> s</div>
        <div class="chip ok">冲量 I = F·t = <b id="iout">8.0</b> N·s</div>
        <div class="chip">动量变化 Δp = <b id="dpout">8.0</b> kg·m/s</div>
        <div class="chip neg">末速度 v′ = <b id="vout">9.0</b> m/s</div>
        <div class="chip">状态：<b id="stout">自由探索</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖小车上的红色力箭头改变 F，拖 F-t 图右侧金色时间边界改变 t。看蓝/橙色面积如何就是冲量；把力拖到左边时，面积落到时间轴下方，冲量和 Δp 一起变负。</div>
      <div class="formula">
        <b>画面绑定</b><br>
        红色箭头对应 F，金色竖线对应 t，图中有色面积对应 I。右侧速度传感器显示 v′，满足 F·t = Δp = mv′ - mv₀。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let m=1,F=4,t=2,v0=1,mode='free',targetDp=8,play=false,clock=0,drag=null,forceBase=0,last=performance.now(),cartX=492,marks=[];
const els={m:id('mout'),F:id('fout'),t:id('tout'),I:id('iout'),dp:id('dpout'),v:id('vout'),st:id('stout')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function forceNow(){return mode==='buffer'?targetDp/t:F}
function calc(){const f=forceNow(),I=f*t,vf=v0+I/m;return{I,dp:I,vf,F:f}}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1),len=Math.hypot(x2-x1,y2-y1);
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(len>10){ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.48),y2-10*Math.sin(a-.48));ctx.lineTo(x2-10*Math.cos(a+.48),y2-10*Math.sin(a+.48));ctx.closePath();ctx.fill();}
}
function roundRect(x,y,w,h,r){ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);else ctx.rect(x,y,w,h);ctx.fill();ctx.stroke();}
function drawGrid(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}
const gx=58,gy=366,gw=330,gh=230,gMid=gy-gh/2;
function tToX(val){return gx+val/4*gw}
function fToY(val){return gMid-val/10*(gh*.42)}
function drawGraph(){
  ctx.fillStyle='#fff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1.5;roundRect(26,80,402,328,8);
  ctx.strokeStyle='#9fb3c8';ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(gx,gy-gh);ctx.lineTo(gx,gy);ctx.lineTo(gx+gw+18,gy);ctx.stroke();
  ctx.strokeStyle='#d9e2ec';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(gx,gMid);ctx.lineTo(gx+gw+18,gMid);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#486581';ctx.font='11px system-ui';ctx.textAlign='center';
  for(let i=0;i<=4;i++){const x=tToX(i);ctx.strokeStyle='#9fb3c8';ctx.beginPath();ctx.moveTo(x,gy-6);ctx.lineTo(x,gy+6);ctx.stroke();ctx.fillText(i,x,gy+22);}
  [-10,0,10].forEach(val=>{const y=fToY(val);ctx.fillText(val,gx-22,y+4);});
  ctx.fillText('t/s',gx+gw+24,gy+5);ctx.save();ctx.translate(gx-36,gMid);ctx.rotate(-Math.PI/2);ctx.fillText('F/N',0,0);ctx.restore();
  const c=calc(),xEnd=tToX(t),yF=fToY(c.F),showX=tToX(play?clock:t);
  ctx.fillStyle=c.F>=0?'rgba(44,123,229,.34)':'rgba(232,89,12,.32)';
  ctx.fillRect(gx,Math.min(gMid,yF),showX-gx,Math.abs(yF-gMid));
  ctx.strokeStyle=c.F>=0?'#2c7be5':'#e8590c';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(gx,gMid);ctx.lineTo(gx,yF);ctx.lineTo(xEnd,yF);ctx.lineTo(xEnd,gMid);ctx.stroke();
  ctx.strokeStyle='#f0a500';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(xEnd,gy-gh+8);ctx.lineTo(xEnd,gy+10);ctx.stroke();
  ctx.fillStyle='#f0a500';ctx.beginPath();ctx.arc(xEnd,gMid,10,0,7);ctx.fill();
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.fillText('拖 t',xEnd,gMid-18);
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';
  ctx.fillText('面积 I = F·t = '+c.I.toFixed(1)+' N·s',gx+gw/2,c.F>=0?yF-12:yF+22);
  if(mode==='buffer')ctx.fillText('缓冲目标：Δp 固定，拖长 t 会压低 F',gx+gw/2,gMid+52);
}
function drawCart(){
  const c=calc(),trackY=258,boxW=72+m*18,boxH=44,x=cartX-boxW/2;
  ctx.strokeStyle='#8aa4bd';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(452,trackY+23);ctx.lineTo(684,trackY+23);ctx.stroke();
  marks.forEach((mk,i)=>{ctx.globalAlpha=(i+1)/marks.length*.55;ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(mk,trackY+34,3,0,7);ctx.fill();});ctx.globalAlpha=1;
  ctx.fillStyle='#d9ecff';ctx.strokeStyle='#334e68';ctx.lineWidth=2;roundRect(x,trackY-boxH,boxW,boxH,6);
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('m',cartX,trackY-boxH/2);
  ctx.fillStyle='#243b53';
  [[x+16,trackY+2],[x+boxW-16,trackY+2]].forEach(([wx,wy])=>{ctx.beginPath();ctx.arc(wx,wy,10,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(wx,wy,4,0,7);ctx.fill();ctx.fillStyle='#243b53';});
  const startX=c.F>=0?x+boxW:x,tipX=startX+c.F*18;
  arrow(startX,trackY-boxH/2,tipX,trackY-boxH/2,c.F>=0?'#e03131':'#e8590c',4);
  ctx.beginPath();ctx.arc(tipX,trackY-boxH/2,10,0,7);ctx.fillStyle=c.F>=0?'#e03131':'#e8590c';ctx.fill();
  ctx.fillStyle=c.F>=0?'#e03131':'#e8590c';ctx.font='700 13px system-ui';ctx.fillText(mode==='buffer'?'拖目标':'拖 F',startX+(tipX-startX)/2,trackY-boxH/2-18);
  arrow(474,154,474+v0*22,154,'#2c7be5',3);ctx.fillStyle='#2c7be5';ctx.font='700 12px system-ui';ctx.fillText('初速度 v0',506,136);
  arrow(474,186,474+c.vf*11,186,'#159a6b',3);ctx.fillStyle='#159a6b';ctx.fillText('末速度 v′',526,204);
  ctx.fillStyle='#fff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1.5;roundRect(456,82,224,62,8);
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText('速度传感器',472,108);
  ctx.fillText('v′ = '+c.vf.toFixed(1)+' m/s',570,108);
  ctx.fillText('Δp = '+c.dp.toFixed(1)+' kg·m/s',472,130);
}
function update(){
  const c=calc();
  els.m.textContent=m.toFixed(1);els.F.textContent=c.F.toFixed(1);els.t.textContent=t.toFixed(1);
  els.I.textContent=c.I.toFixed(1);els.dp.textContent=c.dp.toFixed(1);els.v.textContent=c.vf.toFixed(1);
  els.st.textContent=play?'运动中：冲量正在累积':(mode==='buffer'?'缓冲模式：Δp 固定，延长 t 可减小 F':(c.F>=0?'状态：正向冲量，Δp 为正':'状态：反向冲量，Δp 为负'));
}
function draw(){drawGrid();drawGraph();drawCart();update();}
cv.addEventListener('pointerdown',e=>{
  const pnt=pos(e),c=calc(),boxW=72+m*18,boxH=44,trackY=258,x=cartX-boxW/2,startX=c.F>=0?x+boxW:x,tipX=startX+c.F*18,xEnd=tToX(t);
  if(Math.hypot(pnt.x-tipX,pnt.y-(trackY-boxH/2))<28||Math.abs(pnt.y-(trackY-boxH/2))<20&&pnt.x>=Math.min(startX,tipX)-18&&pnt.x<=Math.max(startX,tipX)+18){drag='F';forceBase=startX;cv.style.cursor='grabbing';return}
  if(Math.abs(pnt.x-xEnd)<22&&pnt.y>gy-gh&&pnt.y<gy+16){drag='t';cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const pnt=pos(e),boxW=72+m*18,x=cartX-boxW/2,startRight=x+boxW;
  if(drag==='F'){
    const newF=clamp((pnt.x-forceBase)/18,-10,10);
    if(mode==='buffer')targetDp=newF*t;else F=newF;
  }
  if(drag==='t')t=clamp((pnt.x-gx)/gw*4,.4,4);
  clock=Math.min(clock,t);draw();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
id('mode').onclick=()=>{const c=calc();mode=mode==='free'?'buffer':'free';targetDp=c.I;id('mode').textContent=mode==='free'?'缓冲目标':'自由探索';draw()};
id('play').onclick=()=>{if(clock>=t)clock=0;play=!play;id('play').textContent=play?'暂停':'播放'};
id('reset').onclick=()=>{m=1;F=4;t=2;v0=1;mode='free';targetDp=8;play=false;clock=0;cartX=492;marks=[];id('mode').textContent='缓冲目标';id('play').textContent='播放';draw()};
function step(now){
  const dt=Math.min((now-last)/1000,.05);last=now;
  if(play){clock+=dt;if(clock>=t){clock=t;play=false;id('play').textContent='播放';}
    const vNow=v0+forceNow()*clock/m;cartX+=vNow*16*dt;if(cartX>672)cartX=456;if(cartX<456)cartX=672;marks.push(cartX);if(marks.length>30)marks.shift();
  }
  draw();requestAnimationFrame(step);
}
draw();requestAnimationFrame(step);
})();
</script>
</body>
</html>
