<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>阻尼振动实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--blue:#2c7be5;--red:#e03131;--green:#159a6b;--gold:#f0a500;--orange:#e8590c;--purple:#6f42c1}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.control{display:grid;gap:4px;font-size:12px;color:#486581;margin-bottom:10px}.control input{width:100%;accent-color:var(--gold)}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}.chip.ok{background:#0b7285}.chip.warn{background:#7b341e}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>阻尼振动：拖阻尼阀，看振幅包络和能量怎样衰减</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="470" data-damping-boundaries="underdamped:zeta<1;critical:zeta=1;overdamped:zeta>1" aria-label="阻尼振动交互实验台：振子侧视装置、三种阻尼响应图像和数据记录"></canvas></div>
    <section class="panel">
      <div class="buttons"><button id="play">暂停</button><button id="reset">复位</button></div>
      <label class="control">阻尼比 ζ = <span id="zlabel">0.15</span><input id="zeta" type="range" min="0.05" max="1.60" step="0.05" value="0.15"></label>
      <div class="read">
        <div class="chip">初始振幅 A₀ = <b id="Aout">8.0</b> cm</div>
        <div class="chip">阻尼比 ζ = <b id="zout">0.15</b></div>
        <div class="chip ok">当前响应量级 = <b id="envout">8.0</b> cm</div>
        <div class="chip">机械能比例 = <b id="Eout">100</b>%</div>
        <div class="chip warn">状态：<b id="stateout">欠阻尼：振荡衰减</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖蓝色振子改变初始振幅，对照振子侧视装置、振幅包络图像和数据记录，拖右侧金色阻尼阀改变阻尼比。</div>
      <div class="formula">
        <b>画面绑定</b><br>
        欠阻尼 ζ&lt;1 时振荡衰减；临界阻尼只在 ζ=1，且无振荡、回到平衡最快；过阻尼 ζ&gt;1 时由两个衰减指数叠加。虚线只在欠阻尼时表示指数包络。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let A0=8,zeta=.15,t=0,running=true,drag=null,last=performance.now();
const W=cv.width,H=cv.height,eqX=190,cy=168,pxPerCm=10;
const els={A:id('Aout'),z:id('zout'),env:id('envout'),E:id('Eout'),state:id('stateout')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function omega(){return 2*Math.PI/2}
function state(){
  if(zeta<1)return '欠阻尼：振荡衰减';
  if(Math.abs(zeta-1)<.005)return '临界阻尼：最快无振荡平复';
  return '过阻尼：不振荡但回得慢';
}
function model(tt){
  const w0=omega();
  if(zeta<1){
    const decay=Math.exp(-zeta*w0*tt),wd=w0*Math.sqrt(1-zeta*zeta);
    const x=A0*decay*Math.cos(wd*tt);
    const v=A0*decay*(-zeta*w0*Math.cos(wd*tt)-wd*Math.sin(wd*tt));
    return {x,v,env:A0*decay,kind:'underdamped'};
  }
  if(Math.abs(zeta-1)<.005){
    const x=A0*(1+w0*tt)*Math.exp(-w0*tt);
    const v=-A0*w0*w0*tt*Math.exp(-w0*tt);
    return {x,v,env:Math.abs(x),kind:'critical'};
  }
  const s=Math.sqrt(zeta*zeta-1),r1=-w0*(zeta-s),r2=-w0*(zeta+s);
  const c1=-r2*A0/(r1-r2),c2=r1*A0/(r1-r2);
  const x=c1*Math.exp(r1*tt)+c2*Math.exp(r2*tt);
  const v=c1*r1*Math.exp(r1*tt)+c2*r2*Math.exp(r2*tt);
  return {x,v,env:Math.abs(x),kind:'overdamped'};
}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function spring(x1,x2,y){
  ctx.strokeStyle='#829ab1';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y);
  const n=13,dx=(x2-x1)/n;
  for(let i=1;i<n;i++){ctx.lineTo(x1+dx*i,y+(i%2?9:-9))}
  ctx.lineTo(x2,y);ctx.stroke();
}
function arrow(x1,y1,x2,y2,color){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-.48),y2-9*Math.sin(a-.48));ctx.lineTo(x2-9*Math.cos(a+.48),y2-9*Math.sin(a+.48));ctx.closePath();ctx.fill();
}
function drawGrid(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}
function drawGraph(){
  const gx=365,gy=86,gw=305,gh=210,gc=gy+gh/2;
  ctx.fillStyle='#fff';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect?ctx.roundRect(gx-20,gy-20,gw+42,gh+60,8):ctx.rect(gx-20,gy-20,gw+42,gh+60);ctx.fill();ctx.stroke();
  ctx.strokeStyle='#9fb3c8';ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
  ctx.strokeStyle='#dbe4ee';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(gx,gc);ctx.lineTo(gx+gw,gc);ctx.stroke();ctx.setLineDash([]);
  if(zeta<1){
    ctx.strokeStyle='#f0a500';ctx.setLineDash([5,4]);ctx.beginPath();
    for(let i=0;i<=gw;i++){const tt=i/gw*8,env=model(tt).env,y=gc-env*7;if(i===0)ctx.moveTo(gx+i,y);else ctx.lineTo(gx+i,y)}
    ctx.stroke();ctx.beginPath();
    for(let i=0;i<=gw;i++){const tt=i/gw*8,env=model(tt).env,y=gc+env*7;if(i===0)ctx.moveTo(gx+i,y);else ctx.lineTo(gx+i,y)}
    ctx.stroke();ctx.setLineDash([]);
  }
  ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=gw;i++){const tt=i/gw*8,x=model(tt).x,y=gc-x*7;if(i===0)ctx.moveTo(gx+i,y);else ctx.lineTo(gx+i,y)}
  ctx.stroke();
  const curX=gx+clamp(t/8,0,1)*gw,curY=gc-model(t).x*7;ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(curX,curY,5,0,7);ctx.fill();
  ctx.fillStyle='#486581';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('x-t 衰减曲线与包络',gx,gy-6);ctx.fillText('t',gx+gw-8,gy+gh+20);
}
function draw(){
  drawGrid();
  const m=model(t),bx=eqX+m.x*pxPerCm;
  ctx.fillStyle='#b0bcc9';ctx.fillRect(42,cy-38,8,76);
  spring(50,bx-20,cy);
  ctx.strokeStyle='#dbe4ee';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(eqX,cy-70);ctx.lineTo(eqX,cy+90);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#2c7be5';ctx.strokeStyle='#243b53';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect?ctx.roundRect(bx-22,cy-22,44,44,7):ctx.rect(bx-22,cy-22,44,44);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('拖',bx,cy);
  const f=-m.x*7;if(Math.abs(f)>4)arrow(bx,cy+34,bx+f,cy+34,'#e03131');
  const valveX=292,valveY=95+zeta/1.6*190;
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(valveX,95);ctx.lineTo(valveX,285);ctx.stroke();
  ctx.fillStyle='#f0a500';ctx.strokeStyle='#8a5a00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(valveX,valveY,12,0,7);ctx.fill();ctx.stroke();
  ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.fillText('阻尼阀 ζ',valveX,72);
  drawGraph();
  const E=Math.min(100,Math.max(0,(m.x*m.x+(m.v/omega())*(m.v/omega()))/(A0*A0)*100));
  ctx.fillStyle='#eef4ff';ctx.fillRect(70,360,190,24);ctx.fillStyle='#159a6b';ctx.fillRect(70,360,190*E/100,24);ctx.strokeStyle='#334e68';ctx.strokeRect(70,360,190,24);
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText('机械能随振幅平方衰减',70,350);
  ctx.fillStyle='#243b53';ctx.font='13px system-ui';ctx.fillText(zeta<1?'欠阻尼：指数包络内振荡':'无振荡响应：按临界/过阻尼方程衰减',70,455);
  cv.dataset.dampingClass=m.kind;cv.dataset.zeta=zeta.toFixed(2);
  update(m,E);
}
function update(m,E){els.A.textContent=A0.toFixed(1);els.z.textContent=zeta.toFixed(2);els.env.textContent=m.env.toFixed(1);els.E.textContent=E.toFixed(0);els.state.textContent=state()}
cv.addEventListener('pointerdown',e=>{
  const p=pos(e),m=model(t),bx=eqX+m.x*pxPerCm,valveY=95+zeta/1.6*190;
  if(Math.hypot(p.x-bx,p.y-cy)<30){drag='A';running=false;id('play').textContent='播放';t=0;cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-292,p.y-valveY)<28){drag='z';cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e);
  if(drag==='A'){A0=clamp(Math.abs((p.x-eqX)/pxPerCm),2,12);t=0;}
  if(drag==='z'){zeta=clamp((p.y-95)/190*1.6,.05,1.6);id('zeta').value=zeta;id('zlabel').textContent=zeta.toFixed(2);}
  draw();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
id('zeta').addEventListener('input',()=>{zeta=Number(id('zeta').value);id('zlabel').textContent=zeta.toFixed(2);t=0;draw()});
id('play').onclick=()=>{running=!running;id('play').textContent=running?'暂停':'播放'};
id('reset').onclick=()=>{A0=8;zeta=.15;t=0;running=true;id('zeta').value=zeta;id('zlabel').textContent=zeta.toFixed(2);id('play').textContent='暂停';draw()};
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(running)t+=dt;draw();requestAnimationFrame(loop)}
draw();requestAnimationFrame(loop);
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
