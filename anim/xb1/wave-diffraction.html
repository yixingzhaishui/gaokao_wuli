<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波的衍射</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
h2{font-size:16px;margin:0 0 8px;color:#102a43}
canvas{display:block;width:100%;max-width:660px;background:#fff;border:1px solid #d9e2ec;border-radius:8px}
.readouts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;font-size:13px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 10px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#334e68}
.controls input[type=range]{width:120px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 14px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>波的衍射：缝宽 a 与波长 λ 相近时最明显</h2>
  <canvas id="canvas" width="660" height="360"></canvas>
  <div class="readouts">
    <span class="r">波长 λ = <b id="lam-v">40</b> px</span>
    <span class="r">缝宽 a = <b id="a-v">80</b> px</span>
    <span class="r">a/λ = <b id="ratio-v">2.0</b></span>
    <span class="r">衍射：<b id="st-v">—</b></span>
  </div>
  <div class="controls">
    <label>波长 λ = <span id="lam-d">40</span> px
      <input type="range" id="lam" min="15" max="90" step="5" value="40"></label>
    <label>缝宽 a = <span id="a-d">80</span> px
      <input type="range" id="a" min="20" max="220" step="10" value="80"></label>
    <button id="play-btn">暂停</button>
    <button id="reset-btn">重置</button>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：左侧是<b>向右传播的平面波</b>，中间挡板开一条缝。看波穿过缝后如何<b>绕到挡板后面</b>展开。拖<b>缝宽 a</b> 变小、或拖<b>波长 λ</b> 变大：当 a 与 λ 差不多（a/λ→1）时，缝口近似一个子波源，波前接近<b>半圆形</b>；当缝远大于波长（a/λ≫1）时，缝内许多子波叠加，中央近似直行，只在边缘弯折。衍射只说<b>明显/不明显</b>，不说加强/减弱。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let lam=40,a=80,t=0,running=true,dragA=false;
  const barX=300, cy=H/2;

  function draw(){
    ctx.clearRect(0,0,W,H);
    const phase0 = (t*lam*1.2)%lam;
    // incoming plane wavefronts (vertical lines) moving right toward the slit
    ctx.lineWidth=2.5;
    for(let x=-lam; x<barX; x+=lam){
      const xx=x + phase0;
      if(xx<barX-2 && xx>0){
        const crest=(xx/lam);
        ctx.strokeStyle='rgba(44,123,229,'+(0.35+0.4*Math.abs(Math.cos(crest*Math.PI)))+')';
        ctx.beginPath();ctx.moveTo(xx,20);ctx.lineTo(xx,H-20);ctx.stroke();
      }
    }
    ctx.strokeStyle='rgba(44,123,229,0.7)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(58,52);ctx.lineTo(112,52);ctx.lineTo(102,46);
    ctx.moveTo(112,52);ctx.lineTo(102,58);
    ctx.stroke();
    ctx.fillStyle='#2c7be5';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('传播方向',42,72);

    // diffracted wavefronts right of barrier. Narrow slit acts like one source;
    // wide slit is many Huygens sources, so the center stays almost planar.
    const ratio=a/lam;
    const spread=Math.min(Math.PI/2, Math.asin(Math.min(1,lam/a)));
    const strength=Math.max(0,Math.min(1,(4-ratio)/3));
    const sourceCount=ratio<1.3?1:(ratio<3?3:7);
    const sourceYs=[];
    if(sourceCount===1)sourceYs.push(cy);
    else for(let i=0;i<sourceCount;i++)sourceYs.push(cy-a/2+a*i/(sourceCount-1));
    ctx.lineWidth=2;
    for(let R=0; R<420; R+=lam){
      const rr=R + phase0;
      if(rr<=2)continue;
      const alpha=0.32+0.45*Math.abs(Math.cos((rr)/lam*Math.PI));
      sourceYs.forEach((sy,i)=>{
        const sourceAlpha=(sourceCount===1?alpha:alpha*(0.35+0.25*strength));
        ctx.strokeStyle='rgba(11,114,133,'+sourceAlpha+')';
        ctx.beginPath();
        ctx.arc(barX, sy, rr, -spread, spread);
        ctx.stroke();
      });
      if(ratio>1.7){
        const straightHalf=Math.max(6,a/2-lam*0.35);
        ctx.strokeStyle='rgba(11,114,133,'+(0.18+0.34*Math.min(1,(ratio-1.7)/3))+')';
        ctx.beginPath();
        ctx.moveTo(barX+rr,cy-straightHalf);
        ctx.lineTo(barX+rr,cy+straightHalf);
        ctx.stroke();
      }
    }
    // 缝口辉光真实感（次波源）
    const glow=ctx.createRadialGradient(barX,cy,1,barX,cy,90);glow.addColorStop(0,'rgba(11,114,133,0.34)');glow.addColorStop(1,'rgba(11,114,133,0)');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(barX,cy,90,-Math.PI/2,Math.PI/2);ctx.fill();
    // barrier with slit
    ctx.fillStyle='#334e68';
    ctx.fillRect(barX-6,20,12,(cy-a/2)-20);
    ctx.fillRect(barX-6,cy+a/2,12,(H-20)-(cy+a/2));
    // slit width markers
    ctx.strokeStyle='#c92a2a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(barX+16,cy-a/2);ctx.lineTo(barX+16,cy+a/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(barX+12,cy-a/2);ctx.lineTo(barX+20,cy-a/2);ctx.moveTo(barX+12,cy+a/2);ctx.lineTo(barX+20,cy+a/2);ctx.stroke();
    ctx.fillStyle='#c92a2a';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('a',barX+22,cy+4);
    // labels
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('入射平面波',40,32);
    ctx.fillText('缝内子波叠加：窄缝近半圆，宽缝中央近直行',barX+30,32);
    ctx.fillText('判据：λ/a 越大，衍射越明显；a/λ 越大，中央越接近直行',barX+30,H-14);
    // readouts
    let st;
    if(ratio<=1.3)st='非常明显（近半圆展开）';
    else if(ratio<=3)st='比较明显（边缘弯折清楚）';
    else st='不明显（中央近似直行）';
    document.getElementById('lam-v').textContent=lam;
    document.getElementById('a-v').textContent=a;
    document.getElementById('ratio-v').textContent=ratio.toFixed(1);
    document.getElementById('st-v').textContent=st;
  }
  function bind(id,cb){document.getElementById(id).addEventListener('input',e=>{cb(parseFloat(e.target.value));draw();});}
  bind('lam',v=>{lam=v;document.getElementById('lam-d').textContent=v;});
  bind('a',v=>{a=v;document.getElementById('a-d').textContent=v;});
  function pos(e){const r=canvas.getBoundingClientRect(),s=canvas.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
  canvas.addEventListener('pointerdown',e=>{
    const p=pos(e);
    if(Math.abs(p.x-(barX+16))<24&&p.y>cy-a/2-20&&p.y<cy+a/2+20){dragA=true;canvas.style.cursor='grabbing';}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!dragA)return;const p=pos(e);
    a=Math.round(Math.max(20,Math.min(220,2*Math.abs(p.y-cy)))/10)*10;
    document.getElementById('a').value=a;document.getElementById('a-d').textContent=a;draw();
  });
  window.addEventListener('pointerup',()=>{dragA=false;canvas.style.cursor='grab';});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{t=0;draw();});
  let last=performance.now();
  function loop(now){const dt=Math.min((now-last)/1000,0.03);last=now;if(running)t+=dt;draw();requestAnimationFrame(loop);}
  draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
