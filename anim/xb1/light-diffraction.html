<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光的单缝衍射</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#eef2f7;color:#102a43}
.wrap{padding:12px}
h2{font-size:16px;margin:0 0 8px}
canvas{display:block;width:100%;max-width:720px;background:#07101d;border-radius:12px;box-shadow:0 2px 10px rgba(16,42,67,.12);touch-action:none;cursor:grab}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.chip{background:#102a43;color:#e6eef7;padding:6px 11px;border-radius:8px;font-size:13px}
.chip b{color:#ffd166}
.ctrls{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0;align-items:center}
.ctrls label{display:flex;flex-direction:column;gap:2px;font-size:12px;color:#334e68}
.ctrls input[type=range]{width:130px;accent-color:#2c7be5}
.btn{font:inherit;font-size:13px;padding:6px 12px;border:1px solid #b0bcc9;background:#fff;border-radius:8px;cursor:pointer}
.btn:hover{background:#eef2f7}
.btn.on{background:#2c7be5;color:#fff;border-color:#2c7be5}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:9px 12px;border-radius:6px;font-size:13px;color:#5a6b7b;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h2>光的单缝衍射：入射光从左向右，通过单缝后在屏上成条纹</h2>
  <div class="ctrls">
    <button class="btn on" id="play">⏸ 暂停</button>
    <button class="btn" id="reset">重置</button>
    <label>波长 λ = <span id="ll">550</span> nm<input type="range" id="lamr" min="400" max="700" step="10" value="550"></label>
    <label>缝宽 a = <span id="al">0.10</span> mm<input type="range" id="ar" min="0.02" max="0.30" step="0.01" value="0.10"></label>
    <span style="font-size:13px;color:#5a6b7b">或<b>拖动缝的上下边</b>改缝宽</span>
  </div>
  <canvas id="cv" width="720" height="420" aria-label="光的衍射实验台：单缝侧视装置、屏幕条纹图像和数据记录"></canvas>
  <div class="chips">
    <span class="chip">波长 λ = <b id="lam">550</b> nm</span>
    <span class="chip">缝宽 a = <b id="aw">0.10</b> mm</span>
    <span class="chip">a/λ = <b id="ratio">—</b></span>
    <span class="chip">中央亮纹半角 ≈ <b id="ang">—</b>°</span>
  </div>
  <div class="hint"><b>观察任务</b>：光从<b>左侧</b>以平面波形式向右入射。对照单缝侧视装置、屏幕条纹图像和数据记录，拖<b>缝宽 a</b> 变小或<b>波长 λ</b> 变大，看中央亮纹变宽。</div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
let lam=550,a=0.10,t=0,playing=true,dragEdge=0;
const slitX=300,cy=H/2,scrX=560;
function halfPix(){return Math.max(8,a*260);} // visual slit half-height ∝ a
function wlColor(l){let r,g,b;if(l<440){r=.3;g=0;b=1;}else if(l<490){r=0;g=(l-440)/50;b=1;}else if(l<510){r=0;g=1;b=1-(l-490)/20;}else if(l<580){r=(l-510)/70;g=1;b=0;}else if(l<645){r=1;g=1-(l-580)/65;b=0;}else{r=1;g=0;b=0;}return[r*255|0,g*255|0,b*255|0];}
function render(){
  ctx.fillStyle='#07101d';ctx.fillRect(0,0,W,H);
  const col=wlColor(lam),cs='rgb('+col[0]+','+col[1]+','+col[2]+')';
  const half=halfPix();
  const period=lam/22;
  const phase=(t*60)%period;
  // incoming plane wavefronts: vertical crests move right toward the slit
  ctx.lineWidth=2;
  for(let x=-period;x<slitX-20;x+=period){const xx=x+phase;if(xx>4&&xx<slitX-6){ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.5)';ctx.beginPath();ctx.moveTo(xx,30);ctx.lineTo(xx,H-30);ctx.stroke();}}
  ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.9)';
  ctx.lineWidth=1.6;
  ctx.beginPath();
  ctx.moveTo(64,50);ctx.lineTo(132,50);ctx.lineTo(120,43);
  ctx.moveTo(132,50);ctx.lineTo(120,57);
  ctx.stroke();
  ctx.fillStyle='rgba(230,238,247,0.92)';ctx.font='12px system-ui';ctx.textAlign='left';
  ctx.fillText('入射光向右',56,70);
  // diffracted wavefronts from slit. The visual angle is intentionally enlarged;
  // the numeric angle below still uses sinθ≈λ/a for the first dark fringe.
  const ratioPhys=lam*1e-9/(a*1e-3);
  const spread=Math.min(1.15,0.14+ratioPhys*55);
  const glow=ctx.createRadialGradient(slitX,cy,2,slitX,cy,90);
  glow.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+',0.55)');glow.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(slitX,cy,90,-spread,spread);ctx.fill();
  ctx.save();ctx.shadowColor=cs;ctx.shadowBlur=10;
  for(let R=0;R<300;R+=period){const rr=R+phase;if(rr<=2)continue;ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+Math.max(0.08,0.58-rr/320)+')';ctx.beginPath();ctx.arc(slitX,cy,rr,-spread,spread);ctx.stroke();}
  ctx.restore();
  // barrier with slit
  ctx.fillStyle='#2b3a4d';ctx.fillRect(slitX-6,20,12,(cy-half)-20);ctx.fillRect(slitX-6,cy+half,12,(H-20)-(cy+half));
  ctx.strokeStyle='#ff6a56';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(slitX+14,cy-half);ctx.lineTo(slitX+14,cy+half);ctx.stroke();
  ctx.beginPath();ctx.moveTo(slitX+10,cy-half);ctx.lineTo(slitX+18,cy-half);ctx.moveTo(slitX+10,cy+half);ctx.lineTo(slitX+18,cy+half);ctx.stroke();
  ctx.fillStyle='#ff6a56';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('a',slitX+20,cy);
  // screen intensity (sinc^2), central half-width ∝ λ/a
  const centralHalf=Math.min(150,(lam*1e-9/(a*1e-3))*3000);
  for(let y=20;y<H-20;y++){const u=(y-cy)/centralHalf;const beta=Math.PI*u;let I=(beta===0)?1:Math.pow(Math.sin(beta)/beta,2);ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+I+')';ctx.fillRect(scrX,y,90,1);}
  ctx.fillStyle='#5a7a99';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('右侧观察屏',scrX+45,16);
  ctx.strokeStyle='rgba(230,238,247,0.55)';
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(slitX+26,cy);ctx.lineTo(scrX-20,cy);ctx.lineTo(scrX-32,cy-6);
  ctx.moveTo(scrX-20,cy);ctx.lineTo(scrX-32,cy+6);
  ctx.stroke();
  ctx.fillStyle='rgba(230,238,247,0.72)';ctx.font='11px system-ui';ctx.textAlign='left';
  ctx.fillText('通过单缝后向右传播',slitX+42,cy-10);
  // central fringe width markers
  ctx.strokeStyle='#fff';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(scrX+92,cy-centralHalf);ctx.lineTo(scrX+92,cy+centralHalf);ctx.stroke();
  ctx.beginPath();ctx.moveTo(scrX+88,cy-centralHalf);ctx.lineTo(scrX+96,cy-centralHalf);ctx.moveTo(scrX+88,cy+centralHalf);ctx.lineTo(scrX+96,cy+centralHalf);ctx.stroke();
  ctx.fillStyle='#e6eef7';ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillText('中央亮纹',scrX-2,cy-centralHalf-6);
  // formula
  const ang=Math.asin(Math.min(1,lam*1e-9/(a*1e-3)))*180/Math.PI;
  ctx.fillStyle='#e6eef7';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText('第一暗纹角 θ：sinθ≈λ/a；图中波前展开为示意放大，读数 θ = '+ang.toFixed(2)+'°',18,H-14);
  // 状态反馈：衍射是否明显
  const strong=ratioPhys>0.004;
  ctx.font='bold 13px system-ui';ctx.fillStyle=strong?'#ffd166':'#7fd1ff';
  ctx.fillText(strong?'状态：中央亮纹展宽明显（λ/a 较大）':'状态：中央亮纹较窄（λ/a 较小，近似直线传播）',18,34);
  document.getElementById('lam').textContent=lam;document.getElementById('aw').textContent=a.toFixed(2);
  document.getElementById('ratio').textContent=(a*1e-3/(lam*1e-9)).toFixed(0);document.getElementById('ang').textContent=ang.toFixed(2);
}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:((e.touches?e.touches[0].clientX:e.clientX)-r.left)*s,y:((e.touches?e.touches[0].clientY:e.clientY)-r.top)*s};}
cv.addEventListener('pointerdown',e=>{const p=pos(e);if(Math.abs(p.x-slitX)<24){dragEdge=1;}});
cv.addEventListener('pointermove',e=>{if(!dragEdge)return;const p=pos(e);const half=Math.abs(p.y-cy);a=Math.max(0.02,Math.min(0.30,half/260));document.getElementById('ar').value=a;document.getElementById('al').textContent=a.toFixed(2);});
window.addEventListener('pointerup',()=>dragEdge=0);
document.getElementById('play').onclick=function(){playing=!playing;this.classList.toggle('on',playing);this.textContent=playing?'⏸ 暂停':'▶ 播放';};
document.getElementById('reset').onclick=function(){t=0;lam=550;a=0.10;document.getElementById('lamr').value=550;document.getElementById('ar').value=0.10;document.getElementById('ll').textContent=550;document.getElementById('al').textContent='0.10';};
document.getElementById('lamr').addEventListener('input',e=>{lam=parseInt(e.target.value);document.getElementById('ll').textContent=lam;});
document.getElementById('ar').addEventListener('input',e=>{a=parseFloat(e.target.value);document.getElementById('al').textContent=a.toFixed(2);});
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.05);last=now;if(playing)t+=dt;render();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
