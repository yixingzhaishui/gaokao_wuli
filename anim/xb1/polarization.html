<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光的偏振</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
h2{font-size:16px;margin:0 0 8px;color:#102a43}
canvas{display:block;width:100%;max-width:660px;background:#fff;border:1px solid #d9e2ec;border-radius:8px;touch-action:none;cursor:grab}
.readouts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;font-size:13px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 10px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#334e68}
.controls input[type=range]{width:160px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 14px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>偏振（马吕斯定律）：I = I₀cos²θ</h2>
  <canvas id="canvas" width="660" height="360"></canvas>
  <div class="readouts">
    <span class="r">两偏振片夹角 θ = <b id="th-v">30</b>°</span>
    <span class="r">cos²θ = <b id="c2-v">—</b></span>
    <span class="r">出射光强 I = <b id="i-v">—</b> I₀</span>
    <span class="r">状态：<b id="st-v">—</b></span>
  </div>
  <div class="controls">
    <button id="play-btn">⏸ 暂停</button>
    <label>检偏器角度 θ = <span id="th-d">30</span>°
      <input type="range" id="th" min="0" max="180" step="1" value="30"></label>
    <button id="reset-btn">重置</button>
    <span style="font-size:13px;color:#486581">或直接拖 P₂ 转动</span>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：自然光（各方向都振动）先过<b>起偏器 P₁</b> 变成只沿一个方向振动的偏振光（强度 I₀）。再过<b>检偏器 P₂</b>，出射强度 I=I₀cos²θ。直接拖动<b>P₂</b>旋转：θ=0°（两片平行）最亮 I=I₀；θ=90°（正交）<b>全黑</b> I=0；θ=180° 又最亮。看右侧亮度条随 cos²θ 变化——这证明光是<b>横波</b>（纵波无法偏振）。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let th=30,t=0,dragP2=false,running=true;
  const D=Math.PI/180, cy=150;
  const p1x=200, p2x=400;
  function draw(){
    ctx.clearRect(0,0,W,H);
    const c2=Math.cos(th*D)**2;
    // natural light (left): many random orientation ticks
    ctx.strokeStyle='#f0a500';ctx.lineWidth=2;
    for(let k=0;k<8;k++){const ang=(k*22+t*40)*D;
      ctx.save();ctx.translate(90,cy);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(10,0);ctx.stroke();ctx.restore();}
    ctx.fillStyle='#5a7a99';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('自然光',90,cy+70);ctx.fillText('（各向振动）',90,cy+85);
    // beam to P1
    ctx.strokeStyle='rgba(240,165,0,0.5)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(115,cy);ctx.lineTo(p1x-30,cy);ctx.stroke();
    // P1 (vertical transmission axis)
    drawPolarizer(p1x,cy,0,'P₁ 起偏','#2c7be5');
    // beam P1->P2 polarized vertical, intensity I0
    beam(p1x+30,p2x-30,cy,1,0);
    // P2 at angle th
    drawPolarizer(p2x,cy,th,'P₂ 检偏','#c92a2a');
    // output beam intensity c2
    beam(p2x+30,600,cy,c2,th);
    // brightness panel（带辉光真实感，亮度∝cos²θ）
    ctx.fillStyle='#0b1a2b';ctx.fillRect(600,60,40,180);
    const glow=ctx.createLinearGradient(600,60,640,240);glow.addColorStop(0,'rgba(240,220,120,'+c2+')');glow.addColorStop(1,'rgba(240,180,60,'+(c2*0.6)+')');
    ctx.fillStyle=glow;ctx.fillRect(600,60,40,180);
    ctx.strokeStyle='#334e68';ctx.strokeRect(600,60,40,180);
    ctx.fillStyle='#5a7a99';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('屏',620,52);
    // formula
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('I = I₀cos²θ = I₀·cos²('+th+'°) = '+c2.toFixed(3)+'·I₀',18,H-14);
    document.getElementById('th-v').textContent=th;
    document.getElementById('c2-v').textContent=c2.toFixed(3);
    document.getElementById('i-v').textContent=c2.toFixed(3);
    document.getElementById('st-v').textContent = c2<0.02?'正交消光（全黑）': (c2>0.98?'平行最亮':'部分透过');
  }
  function beam(x1,x2,y,inten,angDeg){
    ctx.strokeStyle='rgba(240,165,0,'+(0.2+0.6*inten)+')';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
    // polarization tick showing single orientation
    ctx.strokeStyle='#e8590c';ctx.lineWidth=2;
    const offset=(t*55)%40;
    for(let x=x1+20+offset;x<x2-10;x+=40){ctx.save();ctx.translate(x,y);ctx.rotate(angDeg*Math.PI/180);ctx.beginPath();ctx.moveTo(0,-12*Math.max(0.25,inten));ctx.lineTo(0,12*Math.max(0.25,inten));ctx.stroke();ctx.restore();}
  }
  function drawPolarizer(x,y,angDeg,label,col){
    ctx.fillStyle='rgba(44,123,229,0.12)';ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(x,y,26,58,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // transmission axis lines
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.save();ctx.translate(x,y);ctx.rotate(angDeg*Math.PI/180);
    for(let o=-40;o<=40;o+=13){ctx.beginPath();ctx.moveTo(o*0.5,-48);ctx.lineTo(o*0.5,48);ctx.stroke();}
    ctx.restore();
    ctx.fillStyle=col;ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(label,x,y+78);
  }
  function sync(){document.getElementById('th').value=th;document.getElementById('th-d').textContent=th;}
  function pos(e){const r=canvas.getBoundingClientRect(),s=canvas.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s};}
  canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(Math.hypot(p.x-p2x,p.y-cy)<90){dragP2=true;canvas.setPointerCapture(e.pointerId);}});
  canvas.addEventListener('pointermove',e=>{if(!dragP2)return;const p=pos(e);let deg=Math.atan2(p.x-p2x,cy-p.y)/D;if(deg<0)deg+=180;th=Math.max(0,Math.min(180,Math.round(deg)));sync();draw();});
  canvas.addEventListener('pointerup',()=>{dragP2=false;});
  canvas.addEventListener('pointercancel',()=>{dragP2=false;});
  document.getElementById('th').addEventListener('input',e=>{th=parseInt(e.target.value);sync();draw();});
  document.getElementById('play-btn').addEventListener('click',e=>{running=!running;e.currentTarget.textContent=running?'⏸ 暂停':'▶ 播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{th=30;t=0;sync();draw();});
  let last=performance.now();
  function loop(now){const dt=Math.min((now-last)/1000,0.05);last=now;if(running)t+=dt;draw();requestAnimationFrame(loop);}
  sync();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
