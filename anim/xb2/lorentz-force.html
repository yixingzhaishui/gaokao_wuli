<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洛伦兹力</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
canvas{display:block;width:100%;max-width:600px;background:#fff;border:1px solid #d9e2ec;border-radius:8px;touch-action:none;cursor:grab}
.readouts{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0;font-size:14px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 12px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:16px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:4px;font-size:13px;color:#334e68}
.controls input[type=range]{width:140px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 16px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>洛伦兹力：F = qvB sinθ</h2>
  <canvas id="canvas" width="600" height="360"></canvas>
  <div class="readouts">
    <span class="r">力 F = <b id="f-val">3.2</b>×10⁻¹³ N</span>
    <span class="r">速度 v = <b id="v-val">2.0</b>×10⁶ m/s</span>
    <span class="r">磁感应强度 B = <b id="b-val">1.0</b> T</span>
    <span class="r" id="dir-val">方向：垂直纸面向里</span>
  </div>
  <div class="controls">
    <label>速度 v = <span id="v-display">2.0</span>×10⁶ m/s
      <input type="range" id="v" min="0.5" max="5" step="0.1" value="2"></label>
    <label>磁感应强度 B = <span id="b-display">1.0</span> T
      <input type="range" id="bf" min="0.1" max="3" step="0.1" value="1"></label>
    <label>电荷 q = <span id="q-display">+1</span> e
      <input type="range" id="q" min="-2" max="2" step="1" value="1"></label>
    <label>夹角 θ = <span id="th-display">90</span>°
      <input type="range" id="th" min="0" max="90" step="5" value="90"></label>
    <button id="play-btn">播放</button>
    <button id="reset-btn">重置</button>
    <span style="font-size:13px;color:#486581">或拖蓝色速度箭头</span>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：直接拖<b>蓝色速度箭头</b>改变 v 和 θ，看 F 如何随 vBsinθ 变化；θ=90° 时最大，θ=0° 时 F=0。拖动 q 看力方向反转。洛伦兹力始终垂直于 v 和 B，只改变方向不改变速度大小。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let v=2,B=1,q=1,th=90;
  let running=false,t=0,dragV=false;
  const e=1.6; // e = 1.6×10⁻¹⁹ C；v 的读数单位是 ×10⁶ m/s

  function calcF(){
    return Math.abs(q)*e*v*B*Math.sin(th*Math.PI/180); // ×10⁻¹³ N
  }

  function updateReadouts(){
    document.getElementById('f-val').textContent=calcF().toFixed(2);
    document.getElementById('v-val').textContent=v.toFixed(1);
    document.getElementById('b-val').textContent=B.toFixed(1);
    const dir=document.getElementById('dir-val');
    if(q>0)dir.textContent='F 方向：左手定则判定';
    else if(q<0)dir.textContent='F 方向：反向（负电荷）';
    else dir.textContent='q=0，无力';
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const cx=W/2,cy=H/2;
    // magnetic field (into page = × symbols)
    ctx.strokeStyle='#2c7be5';ctx.fillStyle='#2c7be5';
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    for(let x=40;x<W-40;x+=50){
      for(let y=40;y<H-40;y+=50){
        if(Math.abs(x-cx)<60&&Math.abs(y-cy)<60)continue;
        ctx.fillText('×',x,y);
      }
    }
    ctx.fillStyle='#2c7be5';ctx.font='11px sans-serif';
    ctx.fillText('B（垂直纸面向里）',W-100,20);
    // velocity vector
    const vLen=v*30;
    const ang=th*Math.PI/180;
    const vx=Math.cos(ang)*vLen;
    const vy=-Math.sin(ang)*vLen;
    ctx.strokeStyle='#2c7be5';ctx.fillStyle='#2c7be5';ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+vx,cy+vy);
    ctx.stroke();
    // arrowhead
    const a=Math.atan2(vy,vx);
    ctx.beginPath();
    ctx.moveTo(cx+vx,cy+vy);
    ctx.lineTo(cx+vx-10*Math.cos(a-0.4),cy+vy-10*Math.sin(a-0.4));
    ctx.lineTo(cx+vx-10*Math.cos(a+0.4),cy+vy-10*Math.sin(a+0.4));
    ctx.closePath();ctx.fill();
    ctx.fillText('v',cx+vx+12,cy+vy-5);
    if(running){
      const phase=(t*1.4)%1;
      ctx.fillStyle='#74c0fc';ctx.beginPath();ctx.arc(cx+vx*phase,cy+vy*phase,4,0,Math.PI*2);ctx.fill();
    }
    // charge（带辉光真实感）
    const qcolor=q>0?'#e03131':(q<0?'#2c7be5':'#aab8c2');
    const glow=ctx.createRadialGradient(cx,cy,3,cx,cy,32);glow.addColorStop(0,q>0?'rgba(224,49,49,0.5)':'rgba(44,123,229,0.5)');glow.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,32,0,7);ctx.fill();
    ctx.fillStyle=qcolor;
    ctx.beginPath();ctx.arc(cx,cy,14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';
    ctx.fillText(q>0?'+':(q<0?'−':'0'),cx,cy);
    // Lorentz force (perpendicular to v, into page plane)
    const f=calcF();
    const fLen=Math.min(100,f*20+10);
    // F perpendicular to v, for +q with B into page: F = qv×B
    // v in plane, B into page → F perpendicular to v in plane
    // For v at angle θ from horizontal, F is perpendicular (rotated -90° for +q)
    const fAng=a-(q>0?Math.PI/2:(q<0?-Math.PI/2:0));
    const fx=Math.cos(fAng)*fLen;
    const fy=Math.sin(fAng)*fLen;
    if(q!==0&&th>0){
      ctx.strokeStyle='#e03131';ctx.fillStyle='#e03131';ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+fx,cy+fy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx+fx,cy+fy);
      ctx.lineTo(cx+fx-10*Math.cos(fAng-0.4),cy+fy-10*Math.sin(fAng-0.4));
      ctx.lineTo(cx+fx-10*Math.cos(fAng+0.4),cy+fy-10*Math.sin(fAng+0.4));
      ctx.closePath();ctx.fill();
      ctx.font='12px sans-serif';
      ctx.fillText('F',cx+fx+12,cy+fy);
    }
    // formula
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('F = |q|vB sinθ = '+Math.abs(q)+'e×'+v.toFixed(1)+'×10⁶×'+B.toFixed(1)+'×sin'+th+'° = '+f.toFixed(2)+'×10⁻¹³ N',15,H-10);
    ctx.font='bold 12px sans-serif';ctx.fillStyle='#e03131';ctx.textAlign='left';
    ctx.fillText('状态：'+(th>=85?'θ≈90°，F 最大（v⊥B）':(th<=5?'θ≈0°，F=0（v∥B 不受力）':'θ 增大 → F 加强，θ 减小 → F 减弱')),15,20);
  }

  function step(dt){if(!running)return;t+=dt;draw();}

  function sync(){
    document.getElementById('v').value=v;document.getElementById('bf').value=B;document.getElementById('q').value=q;document.getElementById('th').value=th;
    document.getElementById('v-display').textContent=v.toFixed(1);document.getElementById('b-display').textContent=B.toFixed(1);
    document.getElementById('q-display').textContent=(q>=0?'+':'')+q;document.getElementById('th-display').textContent=th.toFixed(0);
    updateReadouts();
  }
  function pos(e){const r=canvas.getBoundingClientRect(),s=canvas.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s};}
  canvas.addEventListener('pointerdown',e=>{const p=pos(e);const cx=W/2,cy=H/2,ang=th*Math.PI/180,vx=Math.cos(ang)*v*30,vy=-Math.sin(ang)*v*30;if(Math.hypot(p.x-(cx+vx),p.y-(cy+vy))<24){dragV=true;canvas.setPointerCapture(e.pointerId);}});
  canvas.addEventListener('pointermove',e=>{if(!dragV)return;const p=pos(e),cx=W/2,cy=H/2;const dx=p.x-cx,dy=p.y-cy;v=Math.max(0.5,Math.min(5,Math.round(Math.hypot(dx,dy)/30*10)/10));th=Math.max(0,Math.min(90,Math.round(Math.atan2(Math.max(0,-dy),Math.max(0.001,dx))*180/Math.PI/5)*5));sync();draw();});
  canvas.addEventListener('pointerup',()=>{dragV=false;});
  canvas.addEventListener('pointercancel',()=>{dragV=false;});
  document.getElementById('v').addEventListener('input',e=>{v=parseFloat(e.target.value);sync();draw();});
  document.getElementById('bf').addEventListener('input',e=>{B=parseFloat(e.target.value);sync();draw();});
  document.getElementById('q').addEventListener('input',e=>{q=parseFloat(e.target.value);sync();draw();});
  document.getElementById('th').addEventListener('input',e=>{th=parseFloat(e.target.value);sync();draw();});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{running=false;t=0;v=2;B=1;q=1;th=90;document.getElementById('play-btn').textContent='播放';sync();draw();});

  let lastTime=performance.now();
  function loop(now){const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;step(dt);requestAnimationFrame(loop);}
  sync();draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
