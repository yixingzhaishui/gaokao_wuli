<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涡流、电磁阻尼与电磁驱动实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:680px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}.panel{display:flex;flex-direction:column;gap:10px}.card{padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}button.active{border-color:#2c7be5;background:#e0f2fe;color:#1554ad;font-weight:800}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}th:first-child,td:first-child{text-align:left}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="900" height="600" aria-label="涡流实验台装置：铜管侧视装置、金属盘俯视图、磁场空间方向、涡流环形图像、速度热量数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动磁体穿过铜管或拖动金属盘进入磁场，对照侧视装置、俯视图和速度图像，看磁通量变化怎样产生涡流，涡流安培力怎样阻碍相对运动并转化为热。</div>
    <div class="card"><div class="title">模式</div><div class="buttons"><button data-mode="tube" class="active">铜管阻尼</button><button data-mode="disc">金属盘</button><button data-mode="drive">电磁驱动</button></div></div>
    <div class="card">
      <div class="title">调参数</div>
      <label class="param"><span>磁场 B <b id="bLabel">0.80 T</b></span><input id="b" type="range" min="0.1" max="1.5" step="0.05" value="0.8"></label>
      <label class="param"><span>速度 v <b id="vLabel">1.6 m/s</b></span><input id="v" type="range" min="0.2" max="4" step="0.1" value="1.6"></label>
      <label class="param"><span>电阻率 ρ <b id="rhoLabel">低</b></span><input id="rho" type="range" min="1" max="10" step="1" value="3"></label>
      <label class="param"><span>开槽程度 <b id="slotLabel">0%</b></span><input id="slot" type="range" min="0" max="90" step="5" value="0"></label>
      <button id="record">记录读数</button>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">数据记录</div><table><thead><tr><th>模式</th><th>涡流</th><th>阻尼</th><th>热</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula"><div class="title">公式与图像</div><div>磁通量变化 → 感应电流呈环形，称为涡流。</div><div>电磁阻尼：F阻 与 B、v、导体电阻有关，方向阻碍相对运动。</div><div>热效应：P热 = I²R；开槽可切断涡流回路。</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={b:document.getElementById('b'),v:document.getElementById('v'),rho:document.getElementById('rho'),slot:document.getElementById('slot'),bLabel:document.getElementById('bLabel'),vLabel:document.getElementById('vLabel'),rhoLabel:document.getElementById('rhoLabel'),slotLabel:document.getElementById('slotLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),record:document.getElementById('record')};
const buttons=Array.from(document.querySelectorAll('button[data-mode]'));const state={mode:'tube',t:0,drag:false,records:[]};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
function p(){const B=+els.b.value,v=+els.v.value,rho=+els.rho.value,slot=+els.slot.value/100;const eddy=Math.max(0,B*v*(1-slot)/(rho/3));return{B,v,rho,slot,eddy,damp:Math.min(1,eddy/3.5),heat:Math.min(1,eddy*eddy*.16*rho)}}
function fmt(n,d=2){return n.toFixed(d)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,900,600);box(34,34,832,520,'#fff');text('涡流：闭合导体内部的环形感应电流',450,60,C.ink,'center',16,'800');state.mode==='tube'?drawTube(q):drawDisc(q);drawGraph(q);update()}
function drawTube(q){box(68,92,430,330,'#fbfdff');text('铜管侧视装置：磁体下落受阻',283,116,C.ink,'center',14,'800');ctx.fillStyle='#e2e8f0';ctx.fillRect(260,150,90,230);ctx.clearRect(284,150,42,230);line(260,150,260,380,'#94a3b8',4);line(350,150,350,380,'#94a3b8',4);const y=170+((state.t*q.v*26)%175);drawMagnet(305,y);arrow(360,y,360,y+54,C.blue,3);text('v',374,y+30,C.blue,'left',12,'900');arrow(250,y+42,250,y-16,C.red,3);text('F阻',232,y+12,C.red,'right',12,'900');for(let k=0;k<5;k++){const cy=y-28+k*16;ctx.strokeStyle=k%2?C.purple:C.gold;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(305,cy,48,10,0,0,Math.PI*2);ctx.stroke()}text('环形涡流阻碍磁体相对铜管运动',283,398,C.purple,'center',12,'900')}
function drawMagnet(x,y){box(x-28,y-34,56,68,'#fff','#d9e2ec');ctx.fillStyle=C.red;ctx.fillRect(x-28,y-34,56,34);ctx.fillStyle=C.blue;ctx.fillRect(x-28,y,56,34);text('N',x,y-17,'#fff','center',14,'900');text('S',x,y+17,'#fff','center',14,'900')}
function drawDisc(q){box(68,92,430,330,'#fbfdff');text(state.mode==='drive'?'金属盘俯视图：旋转磁场驱动':'金属盘俯视图：进入磁场产生阻尼',283,116,C.ink,'center',14,'800');ctx.fillStyle='rgba(44,123,229,.14)';ctx.fillRect(300,150,130,210);text('B 区域 ⊗',365,136,C.blue,'center',12,'900');const cx=state.mode==='drive'?260+Math.sin(state.t)*34:220+((state.t*q.v*38)%180),cy=255;ctx.fillStyle='#e5e7eb';ctx.beginPath();ctx.arc(cx,cy,74,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#94a3b8';ctx.stroke();for(let i=0;i<q.slot*8;i++){const a=i*Math.PI/4;line(cx,cy,cx+70*Math.cos(a),cy+70*Math.sin(a),'#fff',4)}for(let r=28;r<=58;r+=15){ctx.strokeStyle=C.purple;ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r,state.t,state.t+Math.PI*1.55);ctx.stroke()}arrow(cx-35,cy+80,cx+35,cy+80,C.blue,3);text('v/旋转',cx,cy+104,C.blue,'center',12,'900');arrow(cx+78,cy,cx+38,cy,state.mode==='drive'?C.green:C.red,3);text(state.mode==='drive'?'驱动力':'阻力',cx+96,cy,state.mode==='drive'?C.green:C.red,'left',12,'900')}
function drawGraph(q){box(540,92,286,330,'#fff');text('速度-热量图像与读数',683,116,C.ink,'center',14,'800');const gx=585,gy=338,gw=205,gh=150;line(gx,gy,gx+gw,gy,C.ink,2);line(gx,gy,gx,gy-gh,C.ink,2);let p1,p2;for(let i=0;i<32;i++){const x=gx+i*gw/31,speed=q.v*Math.exp(-q.damp*i/18),heat=Math.min(1,q.heat*i/18),y1=gy-(speed/4)*gh,y2=gy-heat*gh;if(i>0){line(gx+(i-1)*gw/31,p1,x,y1,C.blue,2);line(gx+(i-1)*gw/31,p2,x,y2,C.red,2)}p1=y1;p2=y2}text('蓝：速度衰减',642,374,C.blue,'center',12,'900');text('红：热量增加',730,374,C.red,'center',12,'900');box(585,172,198,34,'#eef2ff','#9fb3c8');ctx.fillStyle=C.purple;ctx.fillRect(585,172,198*Math.min(1,q.eddy/4),34);text('涡流强度',684,189,C.ink,'center',12,'900');box(585,224,198,34,'#fff7e6','#f0a500');ctx.fillStyle=C.red;ctx.fillRect(585,224,198*q.heat,34);text('热效应',684,241,C.ink,'center',12,'900')}
function update(){const q=p();els.bLabel.textContent=fmt(q.B,2)+' T';els.vLabel.textContent=fmt(q.v,1)+' m/s';els.rhoLabel.textContent=q.rho<4?'低':q.rho<7?'中':'高';els.slotLabel.textContent=Math.round(q.slot*100)+'%';els.readout.innerHTML='涡流强度：<b>'+fmt(q.eddy,2)+'</b><br>阻尼系数：<b>'+Math.round(q.damp*100)+'%</b><br>热效应：<b>'+Math.round(q.heat*100)+'%</b><br>方向判断：<b>阻碍磁通量变化</b>';els.status.textContent=q.slot>.55?'开槽切断环形电流路径，涡流显著减弱，阻尼和发热都变小。':'闭合金属内部形成环形涡流，安培力按楞次定律阻碍相对运动。';els.rows.innerHTML=state.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.e+'</td><td>'+r.d+'</td><td>'+r.h+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();state.records.push({m:modeName(),e:fmt(q.eddy,1),d:Math.round(q.damp*100)+'%',h:Math.round(q.heat*100)+'%'});if(state.records.length>8)state.records.shift();update()}function modeName(){return state.mode==='tube'?'铜管':state.mode==='disc'?'阻尼盘':'驱动'}
buttons.forEach(b=>b.addEventListener('click',()=>{state.mode=b.dataset.mode;buttons.forEach(x=>x.classList.toggle('active',x===b));record();draw()}));[els.b,els.v,els.rho,els.slot].forEach(el=>el.addEventListener('input',()=>{draw();update()}));els.record.addEventListener('click',record);canvas.addEventListener('pointerdown',e=>{state.drag=true;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!state.drag)return;const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;els.v.value=Math.max(.2,Math.min(4,(x-100)/160));draw()});canvas.addEventListener('pointerup',e=>{state.drag=false;record();try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});function loop(){state.t+=.035;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
</body>
</html>
