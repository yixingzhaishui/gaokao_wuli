<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁波谱频谱滑尺实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:680px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#7c3aed}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}.formula{font-size:13px;color:#334e68;line-height:1.6}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="900" height="600" aria-label="电磁波谱实验台装置：频谱俯视滑尺、波长侧视图、能量柱图像、应用防护数据记录"></canvas></div>
<div class="panel">
<div class="card"><button id="playBtn" type="button">暂停演示</button></div>
<div class="card task"><b>观察任务：</b>拖动频谱滑尺探针，对照频谱俯视图、波长侧视图和能量柱图像，看频率升高时波长如何变短、光子能量如何增大，以及应用和防护要求如何改变。</div>
<div class="card"><div class="title">调频谱探针</div><label class="param"><span>频率指数 log₁₀f <b id="logLabel">8.0</b></span><input id="logf" type="range" min="4" max="21" step="0.1" value="8"></label><button id="record">记录当前波段</button></div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">记录</div><table><thead><tr><th>波段</th><th>λ</th><th>E/eV</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>c=λf：频率越高，波长越短。</div><div>E=hf：频率越高，单个光子能量越大。</div><div>高频紫外、X 射线、γ 射线更需防护。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),els={logf:document.getElementById('logf'),logLabel:document.getElementById('logLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),record:document.getElementById('record')};
const S={t:0,drag:false,records:[],running:true},C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const bands=[['无线电',4,9,'通信、广播','一般防护'],['微波',9,12,'雷达、通信、加热','避免强照射'],['红外',12,14.3,'遥控、热成像','热防护'],['可见光',14.3,14.9,'照明、视觉','强光护眼'],['紫外',14.9,16.5,'杀菌、荧光','防晒护眼'],['X射线',16.5,19,'医疗、安检','铅屏蔽'],['γ射线',19,21,'核医学、天体','严格屏蔽']];
function p(){const log=+els.logf.value,f=Math.pow(10,log),lambda=3e8/f,e=4.136e-15*f,band=bands.find(b=>log>=b[1]&&log<b[2])||bands[bands.length-1];return{log,f,lambda,e,band}}function fmtSci(n){const e=Math.floor(Math.log10(n)),m=n/Math.pow(10,e);return m.toFixed(2)+'×10^'+e}
function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function draw(){const q=p();ctx.clearRect(0,0,900,600);box(34,34,832,520,'#fff');text('电磁波谱：从无线电到 γ 射线',450,60,C.ink,'center',16,'800');drawScale(q);drawWave(q);drawEnergy(q);update()}
function drawScale(q){box(72,105,760,170,'#fbfdff');text('频谱俯视滑尺：频率向右增大，波长向右减小',452,130,C.ink,'center',14,'800');const x0=110,w=680,y=190,cols=['#86efac','#7dd3fc','#fbbf24','#fde047','#c084fc','#f87171','#ef4444'];bands.forEach((b,i)=>{const x=x0+(b[1]-4)/17*w,ww=(b[2]-b[1])/17*w;ctx.fillStyle=cols[i];ctx.fillRect(x,y-26,ww,52);text(b[0],x+ww/2,y, C.ink,'center',12,'800')});const px=x0+(q.log-4)/17*w;line(px,150,px,248,C.purple,4);ctx.fillStyle=C.purple;ctx.beginPath();ctx.arc(px,248,9,0,Math.PI*2);ctx.fill();text('探针',px,265,C.purple,'center',12,'900')}
function drawWave(q){box(72,310,360,190,'#fff');text('波长侧视图',252,334,C.ink,'center',14,'800');const cycles=Math.max(1,Math.min(14,(q.log-4)/1.4));ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=240;i++){const u=i/240,x=105+u*290,y=410-Math.sin(u*Math.PI*2*cycles+S.t*2)*42;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();text('λ='+fmtSci(q.lambda)+' m',252,478,C.blue,'center',12,'900')}
function drawEnergy(q){box(472,310,360,190,'#fff');text('能量柱图像与应用防护',652,334,C.ink,'center',14,'800');const h=Math.min(130,Math.max(8,(q.log-4)/17*130));box(535,360,70,130,'#f8fafc','#d9e2ec');ctx.fillStyle=q.log>16.5?C.red:q.log>14.9?C.gold:C.green;ctx.fillRect(535,490-h,70,h);text('E=hf',570,346,C.purple,'center',12,'900');text(q.band[3],714,390,C.green,'center',13,'900');text(q.band[4],714,430,q.log>16.5?C.red:C.gold,'center',13,'900')}
function update(){const q=p();els.logLabel.textContent=q.log.toFixed(1);els.readout.innerHTML='波段：<b>'+q.band[0]+'</b><br>频率 f：<b>'+fmtSci(q.f)+' Hz</b><br>波长 λ：<b>'+fmtSci(q.lambda)+' m</b><br>光子能量：<b>'+q.e.toExponential(2)+' eV</b>';els.status.textContent=q.band[0]+'：典型应用是'+q.band[3]+'；防护要点：'+q.band[4]+'。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.b+'</td><td>'+r.l+'</td><td>'+r.e+'</td></tr>').join('')||'<tr><td colspan="3">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({b:q.band[0],l:fmtSci(q.lambda),e:q.e.toExponential(1)});if(S.records.length>8)S.records.shift();update()}
const playBtn=document.getElementById('playBtn');playBtn.addEventListener('click',()=>{S.running=!S.running;playBtn.textContent=S.running?'暂停演示':'播放演示';if(S.running)draw()});els.logf.addEventListener('input',draw);els.record.addEventListener('click',record);canvas.addEventListener('pointerdown',e=>{S.drag=true;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;els.logf.value=Math.max(4,Math.min(21,4+(x-110)/680*17));draw()});canvas.addEventListener('pointerup',e=>{S.drag=false;record();try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});function loop(){if(S.running){S.t+=.02;draw()}requestAnimationFrame(loop)}record();loop();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
