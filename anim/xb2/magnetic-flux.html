<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磁通量</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#eef2f7;color:#102a43}
.wrap{padding:12px}
h2{font-size:16px;margin:0 0 8px}
canvas{display:block;width:100%;max-width:700px;background:#fff;border:1px solid #d9e2ec;border-radius:12px;touch-action:none;cursor:grab}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.chip{background:#102a43;color:#e6eef7;padding:6px 11px;border-radius:8px;font-size:13px}
.chip b{color:#ffd166}
.ctrls{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0;align-items:center}
.ctrls label{display:flex;flex-direction:column;gap:2px;font-size:12px;color:#334e68}
.ctrls input[type=range]{width:125px;accent-color:#2c7be5}
.btn{font:inherit;font-size:13px;padding:6px 12px;border:1px solid #b0bcc9;background:#fff;border-radius:8px;cursor:pointer}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:9px 12px;border-radius:6px;font-size:13px;color:#5a6b7b;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h2>磁通量：Φ = BScosθ（θ 是 B 与面积法线的夹角）</h2>
  <div class="ctrls">
    <button class="btn" id="play">▶ 自动转动</button>
    <button class="btn" id="reset">重置</button>
    <label>B = <span id="bl">0.50</span> T<input id="br" type="range" min="0" max="1.2" step="0.05" value="0.5"></label>
    <label>S = <span id="sl">0.020</span> m²<input id="sr" type="range" min="0.005" max="0.050" step="0.005" value="0.020"></label>
    <label>θ = <span id="tl">0</span>°<input id="tr" type="range" min="0" max="90" step="1" value="0"></label>
    <span style="font-size:13px;color:#5a6b7b">或拖蓝色法线箭头</span>
  </div>
  <canvas id="cv" width="700" height="400" aria-label="磁通量实验台：三维线圈法线装置、投影面积图像和数据记录"></canvas>
  <div class="chips">
    <span class="chip">B = <b id="bv">0.50</b> T</span>
    <span class="chip">S = <b id="sv">0.020</b> m²</span>
    <span class="chip">θ = <b id="tv">0</b>°</span>
    <span class="chip">Φ = <b id="pv">0.0100</b> Wb</span>
  </div>
  <div class="hint"><b>观察任务</b>：直接拖<b>蓝色面积法线</b>转动线圈。对照三维线圈法线装置、投影面积图像和数据记录，θ=0° 时磁感线最多；θ=90° 时投影面积为 0。</div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
let B=0.5,S=0.02,theta=0,drag=false,running=false,tdir=1;
const cx=350,cy=205,D=Math.PI/180;
function phi(){return B*S*Math.cos(theta*D)}
function sync(){document.getElementById('br').value=B;document.getElementById('sr').value=S;document.getElementById('tr').value=theta;document.getElementById('bl').textContent=B.toFixed(2);document.getElementById('sl').textContent=S.toFixed(3);document.getElementById('tl').textContent=theta.toFixed(0);document.getElementById('bv').textContent=B.toFixed(2);document.getElementById('sv').textContent=S.toFixed(3);document.getElementById('tv').textContent=theta.toFixed(0);document.getElementById('pv').textContent=phi().toFixed(4)}
function arrow(x1,y1,x2,y2,col){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-0.45),y2-10*Math.sin(a-0.45));ctx.lineTo(x2-10*Math.cos(a+0.45),y2-10*Math.sin(a+0.45));ctx.closePath();ctx.fill()}
function draw(){
  ctx.clearRect(0,0,W,H);
  const density=5+B*8;
  ctx.strokeStyle='rgba(138,63,251,.5)';ctx.fillStyle='rgba(138,63,251,.7)';ctx.lineWidth=2;
  for(let y=60;y<340;y+=38)for(let x=50;x<650;x+=Math.max(30,90-density*5)){arrow(x,y,x+28,y,'rgba(138,63,251,.55)')}
  ctx.fillStyle='#8a3ffb';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('匀强磁场 B 向右',24,28);
  const faceW=40+S/0.05*110*Math.cos(theta*D), faceH=70+S/0.05*80;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(theta*D);
  // 线圈面辉光真实感（正对磁场时穿过磁通最多、最亮）
  const gg=ctx.createRadialGradient(0,0,2,0,0,Math.max(faceW,faceH)/2+10);const bright=Math.max(0,Math.cos(theta*D));gg.addColorStop(0,'rgba(232,89,12,'+(0.1+0.35*bright)+')');gg.addColorStop(1,'rgba(232,89,12,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.ellipse(0,0,Math.max(3,faceW/2),faceH/2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(232,89,12,.08)';ctx.strokeStyle='#e8590c';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(0,0,Math.max(3,faceW/2),faceH/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();
  const nx=cx+110*Math.cos(theta*D),ny=cy+110*Math.sin(theta*D);
  arrow(cx,cy,nx,ny,'#1971c2');ctx.fillStyle='#1971c2';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('面积法线 n',nx,ny-12);
  ctx.strokeStyle='#486581';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,42,0,theta*D);ctx.stroke();ctx.fillStyle='#486581';ctx.fillText('θ',cx+50,cy+18);
  const pass=Math.round(14*Math.max(0,Math.cos(theta*D))*B/0.5*S/0.02);
  ctx.fillStyle='#2b8a3e';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText('穿过线圈的磁感线约 '+pass+' 条（示意）',24,360);
  ctx.fillStyle='#243b53';ctx.fillText('Φ = BScosθ = '+B.toFixed(2)+'×'+S.toFixed(3)+'×cos'+theta.toFixed(0)+'° = '+phi().toFixed(4)+' Wb',24,382);
  ctx.font='bold 12px system-ui';ctx.fillStyle='#e8590c';
  ctx.fillText('状态：'+(theta<10?'θ≈0°，正对磁场，磁通最大(加强)':(theta>80?'θ≈90°，平行磁场，Φ 减弱到 0':'θ 增大 → 投影减小 → Φ 减弱')),24,46);
  sync();
}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
cv.addEventListener('pointerdown',e=>{const p=pos(e);const nx=cx+110*Math.cos(theta*D),ny=cy+110*Math.sin(theta*D);if(Math.hypot(p.x-nx,p.y-ny)<28){drag=true;cv.setPointerCapture(e.pointerId)}});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e);theta=Math.max(0,Math.min(90,Math.round(Math.atan2(Math.max(0,p.y-cy),Math.max(1,p.x-cx))/D)));draw()});
cv.addEventListener('pointerup',()=>drag=false);cv.addEventListener('pointercancel',()=>drag=false);
document.getElementById('br').addEventListener('input',e=>{B=parseFloat(e.target.value);draw()});
document.getElementById('sr').addEventListener('input',e=>{S=parseFloat(e.target.value);draw()});
document.getElementById('tr').addEventListener('input',e=>{theta=parseInt(e.target.value);draw()});
document.getElementById('play').onclick=function(){running=!running;this.textContent=running?'⏸ 暂停':'▶ 自动转动';};
document.getElementById('reset').onclick=()=>{B=0.5;S=0.02;theta=0;tdir=1;running=false;document.getElementById('br').value=B;document.getElementById('sr').value=S;document.getElementById('tr').value=theta;document.getElementById('play').textContent='▶ 自动转动';draw()};
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.05);last=now;if(running&&!drag){theta+=tdir*40*dt;if(theta>=90){theta=90;tdir=-1;}if(theta<=0){theta=0;tdir=1;}}draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
