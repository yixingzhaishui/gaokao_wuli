<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楞次定律</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#eef3f8;color:#102a43}
.wrap{padding:12px}
h2{font-size:16px;margin:0 0 8px;color:#102a43}
canvas{display:block;width:100%;max-width:780px;background:#f8fbff;border:1px solid #cad7e3;border-radius:8px;touch-action:none;cursor:grab}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:9px 0}
.chip{background:#102a43;color:#e8f1fb;padding:6px 10px;border-radius:6px;font-size:13px}
.chip b{color:#ffd166}
.ctrls{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0;align-items:center}
.ctrls label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#334e68}
.ctrls input[type=range]{width:130px;accent-color:#2c7be5}
.btn{font:inherit;padding:6px 12px;border:1px solid #b6c5d4;background:#fff;border-radius:6px;cursor:pointer}
.btn.on{background:#2c7be5;color:#fff;border-color:#2c7be5}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:9px 12px;border-radius:4px;font-size:13px;color:#486581;line-height:1.55;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h2>楞次定律：3D磁铁-线圈实验台 + 俯视电流 + 电流计/Φ图像记录</h2>
  <canvas id="cv" width="780" height="500"></canvas>
  <div class="chips">
    <span class="chip">磁通量 Φ = <b id="phi-v">0.00</b></span>
    <span class="chip">ΔΦ/Δt = <b id="dphi-v">0.000</b></span>
    <span class="chip">感应电流 = <b id="cur-v">无</b></span>
    <span class="chip">线圈近端 = <b id="pole-v">—</b></span>
    <span class="chip">作用 = <b id="force-v">—</b></span>
  </div>
  <div class="ctrls">
    <button class="btn" id="play-btn">自动靠近/远离</button>
    <button class="btn on" id="n-btn">N 极朝线圈</button>
    <button class="btn" id="s-btn">S 极朝线圈</button>
    <button class="btn" id="reset-btn">重置</button>
    <label>自动速度 = <span id="speed-d">2</span>
      <input id="speed" type="range" min="0" max="8" step="1" value="2"></label>
  </div>
  <div class="hint">
    <b>观察任务</b>：直接拖左侧条形磁铁靠近/远离线圈。先看 Φ 是增大还是减小，再看蓝色 B感 如何“反抗变化”，最后用俯视小图判断电流顺/逆时针。核心不是“线圈讨厌磁铁”，而是：感应电流总阻碍<b>磁通量变化</b>；靠近多为排斥，远离多为吸引，即“来拒去留”。
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
const coilX=485,coilY=215,coilR=78,magW=144,magH=50;
let magnetX=120,lastMagnetX=120,polarity=1,auto=false,autoDir=1,t=0,drag=false,needle=0,trace=[];
let lastPhi=phiAt(magnetX),dPhi=0;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function phiAt(x){
  const nose=x+magW/2;
  const d=Math.max(28,coilX-nose);
  return polarity/(1+Math.pow(d/135,2));
}
function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill()} if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}
}
function arrow(x1,y1,x2,y2,color,lw=2){
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-0.48),y2-9*Math.sin(a-0.48));ctx.lineTo(x2-9*Math.cos(a+0.48),y2-9*Math.sin(a+0.48));ctx.closePath();ctx.fill();
  ctx.lineCap='butt';
}
function panel(x,y,w,h,title){
  ctx.fillStyle='#fff';ctx.strokeStyle='#d7e2ec';ctx.lineWidth=1;roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#334e68';ctx.font='bold 12px system-ui';ctx.textAlign='left';ctx.fillText(title,x+10,y+18);
}
function drawTable(){
  const g=ctx.createLinearGradient(18,40,18,390);g.addColorStop(0,'#fff');g.addColorStop(1,'#e9f1f8');
  ctx.fillStyle=g;ctx.strokeStyle='#cbd8e4';roundRect(18,40,500,350,8);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(82,112,140,0.16)';
  for(let x=42;x<500;x+=28){ctx.beginPath();ctx.moveTo(x,76);ctx.lineTo(x+52,360);ctx.stroke()}
  for(let y=92;y<360;y+=28){ctx.beginPath();ctx.moveTo(42,y);ctx.lineTo(492,y-24);ctx.stroke()}
  ctx.fillStyle='#5b7083';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('3D空间实验台：拖动磁铁，观察线圈如何反抗 Φ 的变化',38,66);
}
function drawMagnet(){
  const x=magnetX,y=coilY-magH/2,w=magW,h=magH;
  ctx.save();
  ctx.shadowColor='rgba(16,42,67,0.20)';ctx.shadowBlur=10;ctx.shadowOffsetY=7;
  roundRect(x,y,w,h,12,'#fff','#cbd5e1');
  ctx.shadowBlur=0;
  const leftN=polarity<0;
  ctx.save();ctx.beginPath();ctx.rect(x,y,w/2,h);ctx.clip();roundRect(x,y,w,h,12,leftN?'#d64545':'#2c7be5');ctx.restore();
  ctx.save();ctx.beginPath();ctx.rect(x+w/2,y,w/2,h);ctx.clip();roundRect(x,y,w,h,12,polarity>0?'#d64545':'#2c7be5');ctx.restore();
  ctx.fillStyle='#fff';ctx.font='bold 22px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(leftN?'N':'S',x+w*0.25,coilY);ctx.fillText(polarity>0?'N':'S',x+w*0.75,coilY);
  ctx.restore();
}
function drawCoil(inducedB){
  ctx.save();ctx.translate(coilX,coilY);
  for(let i=-3;i<=3;i++){ctx.strokeStyle='#64748b';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(i*9,0,15,coilR,0,0,7);ctx.stroke()}
  ctx.restore();
  ctx.fillStyle='#102a43';ctx.font='bold 13px system-ui';ctx.textAlign='center';ctx.fillText('闭合线圈',coilX,coilY+coilR+26);
  if(Math.abs(dPhi)>0.002){
    const ccw=inducedB<0;
    for(let k=0;k<5;k++){
      const a=t*0.06*(ccw?1:-1)+k*2*Math.PI/5;
      const a2=a+(ccw?0.35:-0.35);
      arrow(coilX+Math.cos(a)*45,coilY+Math.sin(a)*67,coilX+Math.cos(a2)*45,coilY+Math.sin(a2)*67,'#16a34a',3);
    }
    const nearPole=inducedB<0?'N':'S';
    ctx.fillStyle=nearPole==='N'?'#d64545':'#2c7be5';
    ctx.beginPath();ctx.arc(coilX-62,coilY,19,0,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 18px system-ui';ctx.fillText(nearPole,coilX-62,coilY+1);
  }
}
function drawFields(inducedB){
  const start=magnetX+magW+8,end=coilX-42,dir=polarity>0?1:-1;
  for(let i=-2;i<=2;i++){
    const y=coilY+i*24;
    if(dir>0)arrow(start,y,end,y,'rgba(214,69,69,0.75)',2);else arrow(end,y,start,y,'rgba(214,69,69,0.75)',2);
  }
  ctx.fillStyle='#c92a2a';ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.fillText('B原',Math.max(start+55,(start+end)/2),coilY-72);
  if(Math.abs(dPhi)>0.002){
    const y=coilY-112;
    if(inducedB>0)arrow(coilX-76,y,coilX+76,y,'#2c7be5',4);else arrow(coilX+76,y,coilX-76,y,'#2c7be5',4);
    ctx.fillStyle='#2c7be5';ctx.fillText('B感：阻碍 ΔΦ',coilX,y-16);
  }
}
function drawMotionForce(v,nearPole){
  if(Math.abs(v)<0.2)return;
  const dir=v>0?1:-1;
  arrow(magnetX+magW/2,coilY+50,magnetX+magW/2+dir*46,coilY+50,'#0f766e',3);
  ctx.fillStyle='#0f766e';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(v>0?'靠近':'远离',magnetX+magW/2+dir*24,coilY+72);
  const face=polarity>0?'N':'S';
  const repel=nearPole&&nearPole===face;
  const fdir=repel?-dir:dir;
  arrow(magnetX+magW/2,coilY+86,magnetX+magW/2+fdir*46,coilY+86,'#16a34a',3);
  ctx.fillStyle='#16a34a';ctx.fillText(repel?'排斥阻碍靠近':'吸引阻碍远离',magnetX+magW/2+fdir*28,coilY+108);
}
function drawTopView(inducedB){
  panel(536,40,218,126,'俯视/磁铁侧看：右手定则');
  const x=606,y=105;
  ctx.strokeStyle='#64748b';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(x,y,32,50,0,0,7);ctx.stroke();
  if(Math.abs(dPhi)>0.002){
    const ccw=inducedB<0;
    for(let k=0;k<4;k++){
      const a=t*0.06*(ccw?1:-1)+k*2*Math.PI/4;
      const a2=a+(ccw?0.42:-0.42);
      arrow(x+Math.cos(a)*30,y+Math.sin(a)*45,x+Math.cos(a2)*30,y+Math.sin(a2)*45,'#16a34a',2.4);
    }
  }
  const label= Math.abs(dPhi)<0.002?'无电流':(inducedB<0?'逆时针':'顺时针');
  ctx.fillStyle='#102a43';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(label,684,108);
  ctx.fillStyle='#5b7083';ctx.font='11px system-ui';ctx.fillText('大拇指指 B感，四指为电流',645,146);
}
function drawSideView(inducedB,nearPole){
  panel(536,178,218,104,'侧视截面：线圈等效磁极');
  ctx.fillStyle='#eef3f8';ctx.strokeStyle='#cbd8e4';ctx.fillRect(556,214,176,40);ctx.strokeRect(556,214,176,40);
  ctx.fillStyle=polarity>0?'#d64545':'#2c7be5';ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.fillText(polarity>0?'N 极朝线圈':'S 极朝线圈',614,239);
  if(nearPole){ctx.fillStyle=nearPole==='N'?'#d64545':'#2c7be5';ctx.beginPath();ctx.arc(705,234,18,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(nearPole,705,239)}
}
function drawMeterTrace(){
  panel(536,294,218,142,'电流计 + Φ 图像记录');
  const mx=592,my=362,r=34,target=clamp(-dPhi*7,-1,1);
  needle+=(target-needle)*0.18;
  ctx.strokeStyle='#9fb3c8';ctx.lineWidth=8;ctx.beginPath();ctx.arc(mx,my,r,Math.PI,0);ctx.stroke();
  const a=-Math.PI*0.75+needle*Math.PI*0.5;
  arrow(mx,my,mx+30*Math.sin(a),my-30*Math.cos(a),'#c92a2a',2);
  ctx.fillStyle='#102a43';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('G 电流计',mx,my+25);
  const gx=640,gy=326,gw=94,gh=72;
  ctx.strokeStyle='#d7e2ec';ctx.lineWidth=1;ctx.strokeRect(gx,gy,gw,gh);
  trace.push(phiAt(magnetX)); if(trace.length>110)trace.shift();
  ctx.strokeStyle='#7c3aed';ctx.lineWidth=2;ctx.beginPath();
  trace.forEach((p,i)=>{const px=gx+i/109*gw,py=gy+gh/2-p*30;if(i)ctx.lineTo(px,py);else ctx.moveTo(px,py)});
  ctx.stroke();ctx.fillStyle='#7c3aed';ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillText('Φ记录',gx+4,gy+14);
}
function updateReadouts(inducedB,v,nearPole){
  const phi=phiAt(magnetX),face=polarity>0?'N':'S';
  document.getElementById('phi-v').textContent=phi.toFixed(2);
  document.getElementById('dphi-v').textContent=dPhi.toFixed(3);
  document.getElementById('cur-v').textContent=Math.abs(dPhi)<0.002?'无':(inducedB<0?'逆时针':'顺时针');
  document.getElementById('pole-v').textContent=nearPole||'—';
  document.getElementById('force-v').textContent=Math.abs(v)<0.2?'—':(nearPole===face?'排斥':'吸引');
}
function draw(){
  t++;
  const phi=phiAt(magnetX);
  dPhi=phi-lastPhi;
  const v=magnetX-lastMagnetX;
  const inducedB=-dPhi;
  const nearPole=Math.abs(dPhi)<0.002?'':(inducedB<0?'N':'S');
  ctx.clearRect(0,0,W,H);
  drawTable();drawFields(inducedB);drawMagnet();drawCoil(inducedB);drawMotionForce(v,nearPole);drawTopView(inducedB);drawSideView(inducedB,nearPole);drawMeterTrace();
  const inc=Math.abs(phi)>Math.abs(lastPhi);
  ctx.fillStyle='#243b53';ctx.font='13px system-ui';ctx.textAlign='left';
  ctx.fillText('公式绑定：ε = -N·ΔΦ/Δt；负号表示 B感/感应电流方向阻碍磁通量变化',28,454);
  ctx.fillText('多视角：3D磁铁-线圈 + 俯视右手定则 + 侧视磁极 + 电流计/Φ图像记录',28,476);
  ctx.fillStyle=Math.abs(dPhi)<0.002?'#486581':'#1a7a1a';ctx.font='bold 12px system-ui';
  ctx.fillText(Math.abs(dPhi)<0.002?'状态：磁铁静止，Φ 不变，无感应电流':'状态：Φ 正在'+(inc?'增大，增反':'减小，减同')+'；线圈通过感应磁场阻碍这个变化',32,30);
  updateReadouts(inducedB,v,nearPole);
  lastPhi=phi; lastMagnetX=magnetX;
}
function pos(e){const r=cv.getBoundingClientRect(),sx=cv.width/r.width;return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sx}}
cv.addEventListener('pointerdown',e=>{const p=pos(e);if(p.x>magnetX-14&&p.x<magnetX+magW+18&&Math.abs(p.y-coilY)<70){drag=true;auto=false;cv.setPointerCapture(e.pointerId);document.getElementById('play-btn').classList.remove('on');cv.style.cursor='grabbing'}});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e);magnetX=clamp(p.x-magW/2,62,coilX-42);draw()});
window.addEventListener('pointerup',()=>{drag=false;cv.style.cursor='grab'});
document.getElementById('play-btn').onclick=function(){auto=!auto;this.classList.toggle('on',auto);this.textContent=auto?'暂停自动':'自动靠近/远离'};
document.getElementById('n-btn').onclick=function(){polarity=1;trace=[];this.classList.add('on');document.getElementById('s-btn').classList.remove('on');draw()};
document.getElementById('s-btn').onclick=function(){polarity=-1;trace=[];this.classList.add('on');document.getElementById('n-btn').classList.remove('on');draw()};
document.getElementById('speed').oninput=e=>{document.getElementById('speed-d').textContent=e.target.value};
document.getElementById('reset-btn').onclick=()=>{magnetX=120;lastMagnetX=120;lastPhi=phiAt(magnetX);polarity=1;auto=false;autoDir=1;trace=[];needle=0;document.getElementById('n-btn').classList.add('on');document.getElementById('s-btn').classList.remove('on');document.getElementById('play-btn').classList.remove('on');document.getElementById('play-btn').textContent='自动靠近/远离';draw()};
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.05);last=now;if(auto){magnetX+=autoDir*(Number(document.getElementById('speed').value)+1)*55*dt;if(magnetX>coilX-42){magnetX=coilX-42;autoDir=-1}if(magnetX<62){magnetX=62;autoDir=1}}draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
