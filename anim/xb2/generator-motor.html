<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发电机、电动机与能量转化实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.mode{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mode button{font-weight:800}.mode button.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="发电机电动机实验台装置：3D线圈、磁极、换向器电刷、侧视受力方向、俯视转动方向、能量流和电动势图像记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>切换发电机/电动机模式，看同一线圈在磁场中如何完成“机械能变电能”或“电能变机械能”。拖动线圈或调 B、ω、I、负载，观察电动势、安培力、转矩和能量流同步变化。</div>
<div class="card">
<div class="title">切换工作模式</div>
<div class="mode"><button id="gen" class="active">发电机</button><button id="mot">电动机</button></div>
<label class="param"><span>磁感应强度 B <b id="bLabel">0.60 T</b></span><input id="b" type="range" min="0.1" max="1.2" step="0.05" value="0.6"></label>
<label class="param"><span>角速度 ω <b id="wLabel">2.0 rad/s</b></span><input id="w" type="range" min="0.4" max="5" step="0.1" value="2"></label>
<label class="param"><span>线圈电流 I <b id="iLabel">4.0 A</b></span><input id="i" type="range" min="0" max="10" step="0.5" value="4"></label>
<label class="param"><span>负载/阻力 <b id="loadLabel">45%</b></span><input id="load" type="range" min="0" max="100" step="1" value="45"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录状态</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">状态记录</div><table><thead><tr><th>模式</th><th>B</th><th>ω/I</th><th>输出</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与画面绑定</div><div>发电机：e=NBSω sinθ，机械能输入，电能输出。</div><div>电动机：F=BIL，线圈受安培力产生转矩，电能输入，机械能输出。</div><div>换向器/滑环让外电路得到所需方向的电流或让转矩方向持续。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={gen:document.getElementById('gen'),mot:document.getElementById('mot'),b:document.getElementById('b'),w:document.getElementById('w'),i:document.getElementById('i'),load:document.getElementById('load'),bLabel:document.getElementById('bLabel'),wLabel:document.getElementById('wLabel'),iLabel:document.getElementById('iLabel'),loadLabel:document.getElementById('loadLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const S={mode:'gen',t:0,run:true,drag:false,records:[]},C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',orange:'#e8590c',purple:'#7c3aed'};
function val(){const B=+els.b.value,w=+els.w.value,I=+els.i.value,load=+els.load.value/100,theta=(S.t*w)%(Math.PI*2),em=B*w*2.4,e=em*Math.sin(theta),force=B*I*.52,torque=force*Math.abs(Math.sin(theta));return{B,w,I,load,theta,em,e,force,torque,mechIn:load*w*1.8,eOut:Math.abs(e)*(1-load*.45),elecIn:I*B*2.1,mechOut:torque*(1-load*.35)}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=val();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('发电机、电动机：同一线圈在磁场中的能量转化',460,60,C.ink,'center',17,'900');drawMachine(q);drawViews(q);drawGraph(q);drawFlow(q);update(q)}
function drawMachine(q){box(64,96,480,315,'#fbfdff');text('3D线圈实验台：N-S磁极、线圈、滑环/换向器、电刷',304,120,C.muted,'center',12,'800');ctx.save();ctx.shadowColor='rgba(16,42,67,.16)';ctx.shadowBlur=12;ctx.shadowOffsetY=8;ctx.fillStyle='#d64545';ctx.fillRect(96,170,68,160);ctx.fillStyle='#2c7be5';ctx.fillRect(444,170,68,160);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 24px system-ui';ctx.textAlign='center';ctx.fillText('N',130,252);ctx.fillText('S',478,252);ctx.restore();for(let y=190;y<=310;y+=30)arrow(170,y,438,y,'rgba(44,123,229,'+(0.18+q.B*.5)+')',2.2);text('B',306,164,C.blue,'center',13,'900');
const cx=304,cy=250,r=86,flat=Math.cos(q.theta),rx=Math.max(8,Math.abs(r*flat));ctx.strokeStyle=C.orange;ctx.lineWidth=6;ctx.beginPath();ctx.ellipse(cx,cy,rx,r,0,0,Math.PI*2);ctx.stroke();ctx.lineWidth=3;ctx.strokeStyle='#8a4b0f';line(cx-rx,cy,cx+rx,cy,'#8a4b0f',3);const side1={x:cx+rx,y:cy},side2={x:cx-rx,y:cy};ctx.fillStyle=C.orange;ctx.beginPath();ctx.arc(side1.x,side1.y,7,0,7);ctx.fill();ctx.beginPath();ctx.arc(side2.x,side2.y,7,0,7);ctx.fill();
const nX=Math.cos(q.theta),nY=-.45*Math.sin(q.theta);arrow(cx,cy,cx+70*nX,cy+70*nY,C.green,3);text('n',cx+80*nX,cy+80*nY,C.green,'center',13,'900');ctx.strokeStyle='#5b7083';ctx.lineWidth=5;ctx.beginPath();ctx.arc(cx-34,360,16,0,7);ctx.stroke();ctx.beginPath();ctx.arc(cx+34,360,16,0,7);ctx.stroke();line(cx-34,346,cx-rx,cy+r*.92,'#5b7083',2);line(cx+34,346,cx+rx,cy+r*.92,'#5b7083',2);text(S.mode==='gen'?'滑环输出交流电':'换向器保持转矩方向',cx,390,C.muted,'center',12,'800');
if(S.mode==='gen'){arrow(116,388,252,388,C.green,4);text('外力输入转动',176,366,C.green,'center',13,'900');arrow(358,388,498,388,C.blue,4);text('电能输出',428,366,C.blue,'center',13,'900');text('e='+q.e.toFixed(2)+' V',cx,145,Math.abs(q.e)>.5?C.red:C.muted,'center',14,'900')}else{arrow(112,388,250,388,C.blue,4);text('电能输入',176,366,C.blue,'center',13,'900');arrow(358,388,500,388,C.green,4);text('机械转动输出',430,366,C.green,'center',13,'900');const up=q.force>0.1;arrow(side1.x,side1.y,side1.x,side1.y-(up?56:20),C.red,4);arrow(side2.x,side2.y,side2.x,side2.y+(up?56:20),C.red,4);text('F=BIL',cx,145,C.red,'center',14,'900')}}
function drawViews(q){box(570,96,278,174,'#fff');text('俯视/侧视：力与转动方向',709,120,C.ink,'center',14,'900');const ox=650,oy=190;arrow(ox-58,oy,ox+58,oy,C.blue,2);const a=-q.theta;arrow(ox,oy,ox+58*Math.cos(a),oy+58*Math.sin(a),C.orange,3);ctx.strokeStyle='#9fb3c8';ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(ox,oy,36,a,0);ctx.stroke();text('θ',ox+22,oy-18,C.muted,'center',12,'900');const sx=770,sy=190;ctx.fillStyle='#eef3f8';ctx.strokeStyle='#cbd8e4';ctx.fillRect(sx-48,sy-38,96,76);ctx.strokeRect(sx-48,sy-38,96,76);text('侧视',sx,sy-54,C.muted,'center',12,'800');if(S.mode==='mot'){ctx.strokeStyle=C.red;ctx.lineWidth=3;ctx.beginPath();ctx.arc(sx,sy,22,0,7);ctx.stroke();line(sx-14,sy-14,sx+14,sy+14,C.red,3);line(sx+14,sy-14,sx-14,sy+14,C.red,3);text('F⊗/F⊙',sx,sy+52,C.red,'center',12,'900')}else{text('ΔΦ/Δt',sx,sy,C.purple,'center',15,'900');text('感应电动势',sx,sy+52,C.purple,'center',12,'900')}}
function drawGraph(q){box(570,292,278,154,'#fff');text(S.mode==='gen'?'e-t 图像记录':'转矩-t 图像记录',709,316,C.ink,'center',14,'900');const x0=598,y0=378,w=220,h=90;line(x0,y0,x0+w,y0,'#b0bcc9',1.5);line(x0,y0-h/2,x0,y0+h/2,'#b0bcc9',1.5);ctx.strokeStyle=S.mode==='gen'?C.blue:C.red;ctx.lineWidth=2.5;ctx.beginPath();for(let i=0;i<=220;i++){const tt=S.t-4+i/55,ang=tt*q.w,yy=S.mode==='gen'?y0-Math.sin(ang)*42:y0-Math.abs(Math.sin(ang))*46,xx=x0+i;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)}ctx.stroke();ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(x0+w,S.mode==='gen'?y0-q.e/q.em*42:y0-q.torque/Math.max(q.force,.1)*46,5,0,7);ctx.fill();text(S.mode==='gen'?'e=NBSωsinθ':'τ∝BILsinθ',708,430,C.muted,'center',12,'800')}
function drawFlow(q){box(94,438,754,88,'#fbfdff');text('能量流',126,462,C.ink,'left',14,'900');if(S.mode==='gen'){arrow(190,486,372,486,C.green,6);arrow(548,486,730,486,C.blue,6);text('机械能输入 '+q.mechIn.toFixed(1),278,466,C.green,'center',13,'900');text('电能输出 '+q.eOut.toFixed(1),640,466,C.blue,'center',13,'900');text('线圈切割磁感线，磁通量变化产生感应电动势',460,508,C.muted,'center',13,'800')}else{arrow(190,486,372,486,C.blue,6);arrow(548,486,730,486,C.green,6);text('电能输入 '+q.elecIn.toFixed(1),278,466,C.blue,'center',13,'900');text('机械能输出 '+q.mechOut.toFixed(1),640,466,C.green,'center',13,'900');text('通电线圈受安培力，换向器让转矩方向持续推动转动',460,508,C.muted,'center',13,'800')}}
function update(q){els.bLabel.textContent=q.B.toFixed(2)+' T';els.wLabel.textContent=q.w.toFixed(1)+' rad/s';els.iLabel.textContent=q.I.toFixed(1)+' A';els.loadLabel.textContent=Math.round(q.load*100)+'%';els.gen.classList.toggle('active',S.mode==='gen');els.mot.classList.toggle('active',S.mode==='mot');els.readout.innerHTML=S.mode==='gen'?'峰值电动势 Eₘ：<b>'+q.em.toFixed(2)+' V</b><br>瞬时电动势 e：<b>'+q.e.toFixed(2)+' V</b><br>负载后输出：<b>'+q.eOut.toFixed(2)+'</b><br>判据：<b>ω、B 越大，Eₘ 越大</b>':'安培力 F：<b>'+q.force.toFixed(2)+' N</b><br>等效转矩：<b>'+q.torque.toFixed(2)+'</b><br>负载后输出：<b>'+q.mechOut.toFixed(2)+'</b><br>判据：<b>B、I 越大，驱动越强</b>';els.status.textContent=S.mode==='gen'?'发电机把外力做功输入的机械能，经电磁感应转化为电能。':'电动机把电源提供的电能，经安培力做功转化为线圈和负载的机械能。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.B+'</td><td>'+r.x+'</td><td>'+r.o+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=val();S.records.push({m:S.mode==='gen'?'发电':'电动',B:q.B.toFixed(2),x:S.mode==='gen'?q.w.toFixed(1):q.I.toFixed(1),o:S.mode==='gen'?q.eOut.toFixed(1):q.mechOut.toFixed(1)});if(S.records.length>8)S.records.shift();update(q)}
function setMode(m){S.mode=m;record();draw()}els.gen.onclick=()=>setMode('gen');els.mot.onclick=()=>setMode('mot');[els.b,els.w,els.i,els.load].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;canvas.addEventListener('pointerdown',e=>{S.drag=true;canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing'});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;S.t=Math.atan2(250-y,x-304)/(+els.w.value||1);draw()});canvas.addEventListener('pointerup',e=>{S.drag=false;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}record()});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run)S.t+=dt;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
</body>
</html>
