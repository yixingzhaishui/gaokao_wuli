<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互感</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#eef2f7;color:#102a43}
.wrap{padding:12px}
h2{font-size:16px;margin:0 0 8px}
canvas{display:block;width:100%;max-width:700px;background:#fff;border:1px solid #d9e2ec;border-radius:12px;touch-action:none;cursor:grab}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.chip{background:#102a43;color:#e6eef7;padding:6px 11px;border-radius:8px;font-size:13px}
.chip b{color:#ffd166}
.ctrls{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0;align-items:center}
.ctrls label{display:flex;flex-direction:column;gap:2px;font-size:12px;color:#334e68}
.ctrls input[type=range]{width:130px;accent-color:#2c7be5}
.btn{font:inherit;font-size:13px;padding:6px 12px;border:1px solid #b0bcc9;background:#fff;border-radius:8px;cursor:pointer}
.btn.on{background:#2c7be5;color:#fff;border-color:#2c7be5}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:9px 12px;border-radius:6px;font-size:13px;color:#5a6b7b;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h2>互感：一个线圈电流变化 → 另一个线圈磁通量变化</h2>
  <canvas id="cv" width="700" height="400"></canvas>
  <div class="chips">
    <span class="chip">原线圈电流 I₁ = <b id="i1v">0.00</b> A</span>
    <span class="chip">变化率 dI₁/dt = <b id="dv">0.00</b></span>
    <span class="chip">耦合 k = <b id="kv">0.70</b></span>
    <span class="chip">副线圈 E₂ ∝ <b id="e2v">0.00</b></span>
    <span class="chip">状态：<b id="statev">交流持续互感</b></span>
  </div>
  <div class="ctrls">
    <button class="btn on" id="ac">交流变化</button>
    <button class="btn" id="dc">直流稳定</button>
    <button class="btn" id="pulse">通断瞬间</button>
    <label>频率 f = <span id="fl">1.0</span> Hz<input id="fr" type="range" min="0.2" max="2.5" step="0.1" value="1"></label>
    <button class="btn" id="play-btn">暂停</button>
    <button class="btn" id="reset-btn">重置</button>
    <span style="font-size:13px;color:#5a6b7b">或拖蓝色副线圈远近</span>
  </div>
  <div class="hint"><b>观察任务</b>：看副线圈电流计。交流时 I₁ 一直变化，副线圈持续有感应；直流稳定后 I₁ 虽然不为零，但 dI₁/dt=0，副线圈无感应；点“通断瞬间”只在电流突变时偏一下。拖副线圈远离，耦合 k 变小，E₂ 变弱。</div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
let mode='ac',f=1,t=0,secX=470,drag=false,pulseT=-1,lastI=0,running=true;
function coupling(){return Math.max(0.12,Math.min(1,1-(secX-350)/260))}
function current(){if(mode==='ac')return Math.sin(2*Math.PI*f*t);if(mode==='dc')return 1;if(mode==='pulse')return pulseT>=0&&t-pulseT<0.7?1:0;return 0}
function drawCoil(x,y,col,label,currentSign){
  ctx.strokeStyle=col;ctx.lineWidth=4;ctx.beginPath();
  for(let k=0;k<7;k++)ctx.arc(x+k*14,y,9,Math.PI,0,false);
  ctx.stroke();ctx.fillStyle=col;ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(label,x+42,y+36);
  if(Math.abs(currentSign)>0.05){ctx.fillStyle=col;ctx.globalAlpha=.18;ctx.fillRect(x-14,y-34,120,26);ctx.globalAlpha=1}
}
function galvanometer(x,y,val){
  ctx.fillStyle='#102a43';ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,34,0,7);ctx.fill();ctx.stroke();
  const a=Math.max(-1,Math.min(1,val))*0.9;ctx.strokeStyle='#ffd166';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,y+5);ctx.lineTo(x+Math.sin(a)*26,y-Math.cos(a)*26);ctx.stroke();
  ctx.fillStyle='#e6eef7';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('G',x,y+24);
}
function draw(i,di,e2){
  ctx.clearRect(0,0,W,H);
  const glow=ctx.createRadialGradient(350,150,20,350,150,230);glow.addColorStop(0,'rgba(138,63,251,.16)');glow.addColorStop(1,'rgba(138,63,251,0)');
  ctx.fillStyle=glow;ctx.fillRect(70,60,560,205);
  drawCoil(130,150,'#e8590c','原线圈 1',i);
  drawCoil(secX,150,'#1971c2','副线圈 2',e2);
  // coupling field lines
  ctx.strokeStyle='rgba(138,63,251,.45)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  for(let k=-2;k<=2;k++){ctx.beginPath();ctx.moveTo(235,150+k*14);ctx.bezierCurveTo(305,90+k*10,secX-40,90+k*10,secX,150+k*14);ctx.stroke()}
  ctx.setLineDash([]);ctx.fillStyle='#8a3ffb';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('变化磁场耦合 k',350,92);
  galvanometer(secX+54,260,e2);
  // I-t / E2 trace
  ctx.strokeStyle='#e8590c';ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<180;x++){const tt=t-(180-x)/60,yy=320-35*Math.sin(2*Math.PI*f*tt);if(x)ctx.lineTo(70+x,yy);else ctx.moveTo(70+x,yy)}ctx.stroke();
  ctx.strokeStyle='#1971c2';ctx.beginPath();for(let x=0;x<180;x++){const tt=t-(180-x)/60,yy=365-30*Math.cos(2*Math.PI*f*tt)*coupling();if(x)ctx.lineTo(70+x,yy);else ctx.moveTo(70+x,yy)}ctx.stroke();
  ctx.fillStyle='#486581';ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillText('橙：I₁(t)；蓝：E₂∝-k·dI₁/dt',70,388);
  ctx.fillStyle='#243b53';ctx.font='13px system-ui';ctx.fillText('互感链条：I₁变化 → B变化 → Φ₂变化 → E₂。直流稳定：I₁≠0 但 dI₁/dt=0，所以 E₂=0。',24,32);
  document.getElementById('i1v').textContent=i.toFixed(2);document.getElementById('dv').textContent=di.toFixed(2);
  document.getElementById('kv').textContent=coupling().toFixed(2);document.getElementById('e2v').textContent=e2.toFixed(2);
  document.getElementById('statev').textContent=!running?'暂停观察':(mode==='ac'?'交流持续互感':(mode==='dc'?'直流稳定无互感':'通断瞬间互感'));
}
function setMode(m){mode=m;document.getElementById('ac').classList.toggle('on',m==='ac');document.getElementById('dc').classList.toggle('on',m==='dc');document.getElementById('pulse').classList.toggle('on',m==='pulse');if(m==='pulse')pulseT=t}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
cv.addEventListener('pointerdown',e=>{const p=pos(e);if(Math.abs(p.x-(secX+42))<80&&p.y>95&&p.y<210){drag=true;cv.setPointerCapture(e.pointerId)}});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e);secX=Math.max(360,Math.min(610,p.x-42))});
cv.addEventListener('pointerup',()=>drag=false);cv.addEventListener('pointercancel',()=>drag=false);
document.getElementById('ac').onclick=()=>setMode('ac');document.getElementById('dc').onclick=()=>setMode('dc');document.getElementById('pulse').onclick=()=>setMode('pulse');
document.getElementById('fr').oninput=e=>{f=parseFloat(e.target.value);document.getElementById('fl').textContent=f.toFixed(1)};
document.getElementById('play-btn').onclick=()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放'};
document.getElementById('reset-btn').onclick=()=>{mode='ac';f=1;t=0;secX=470;pulseT=-1;lastI=0;running=true;document.getElementById('fr').value=f;document.getElementById('fl').textContent=f.toFixed(1);document.getElementById('play-btn').textContent='暂停';setMode('ac')};
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.04);last=now;if(running)t+=dt;const i=current(),di=running?(i-lastI)/Math.max(dt,0.01):0;lastI=i;const e2=-coupling()*di*0.35;draw(i,di,e2);requestAnimationFrame(loop)}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
