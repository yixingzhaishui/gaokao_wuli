<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麦克斯韦电磁场理论初步实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:680px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="900" height="600" aria-label="麦克斯韦电磁场实验台装置：三维空间传播图、E场侧视图、B场俯视图、波形图像和数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>对照三维空间传播图、E 场侧视图和 B 场俯视图，拖动蓝色场强手柄，看变化电场怎样伴随磁场，变化磁场怎样伴随电场，电磁波如何脱离电路向外传播。</div>
    <div class="card"><div class="title">调场源</div>
      <label class="param"><span>振荡频率 f <b id="fLabel">2.0 Hz</b></span><input id="f" type="range" min="0.5" max="6" step="0.1" value="2"></label>
      <label class="param"><span>电场幅度 E₀ <b id="eLabel">70%</b></span><input id="e" type="range" min="20" max="100" step="1" value="70"></label>
      <label class="param"><span>相位探针 x <b id="xLabel">45%</b></span><input id="x" type="range" min="0" max="100" step="1" value="45"></label>
      <div class="buttons"><button id="play">暂停</button><button id="record">记录状态</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">数据记录</div><table><thead><tr><th>x</th><th>E</th><th>B</th><th>方向</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula"><div class="title">公式与图像</div><div>变化电场产生磁场，变化磁场产生电场。</div><div>电磁波中 E、B 与传播方向两两垂直。</div><div>真空中传播速度 c≈3.0×10⁸ m/s，且 c=λf。</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={f:document.getElementById('f'),e:document.getElementById('e'),x:document.getElementById('x'),fLabel:document.getElementById('fLabel'),eLabel:document.getElementById('eLabel'),xLabel:document.getElementById('xLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const S={t:0,run:true,drag:false,records:[]},C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
function p(){const f=+els.f.value,E0=+els.e.value/100,xp=+els.x.value/100,phase=2*Math.PI*(xp-S.t*f*.22),E=E0*Math.sin(phase),B=E0*Math.sin(phase);return{f,E0,xp,phase,E,B,lambda:3e8/f}}
function fmt(n,d=2){return n.toFixed(d)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,900,600);box(34,34,832,520,'#fff');text('麦克斯韦图像：变化电场和变化磁场互相激发',450,60,C.ink,'center',16,'800');drawWave(q);drawPanels(q);update()}
function drawWave(q){box(62,92,520,310,'#fbfdff');text('三维空间传播图：E、B、传播方向两两垂直',322,116,C.ink,'center',14,'800');arrow(110,330,520,330,C.green,3);text('传播方向 x',536,330,C.green,'left',12,'900');for(let i=0;i<18;i++){const x=120+i*23,ph=i*.55-S.t*q.f*1.6,E=Math.sin(ph)*80*q.E0,B=Math.sin(ph)*50*q.E0;line(x,330,x,330-E,C.blue,3);line(x,330,x+B,330+B*.45,C.red,3);if(i%3===0){text('E',x,330-E-12,C.blue,'center',11,'900');text('B',x+B+10,330+B*.45,C.red,'left',11,'900')}}const px=120+q.xp*410;line(px,160,px,390,C.purple,3,[5,4]);ctx.fillStyle=C.purple;ctx.beginPath();ctx.arc(px,330,9,0,Math.PI*2);ctx.fill();text('探针',px,145,C.purple,'center',12,'900');box(112,160,90,44,'#eef2ff','#9fb3c8');text('变化 E',157,178,C.blue,'center',12,'900');text('→ 产生 B',157,194,C.red,'center',12,'900');box(430,160,90,44,'#fff7e6','#f0a500');text('变化 B',475,178,C.red,'center',12,'900');text('→ 产生 E',475,194,C.blue,'center',12,'900')}
function drawPanels(q){box(615,92,210,145,'#fff');text('E 场侧视图',720,114,C.blue,'center',14,'800');line(650,180,790,180,C.muted,2);arrow(720,210,720,150,q.E>=0?C.blue:C.gold,4);text(q.E>=0?'E 向上':'E 向下',720,224,C.blue,'center',12,'900');box(615,255,210,145,'#fff');text('B 场俯视图',720,277,C.red,'center',14,'800');for(let k=0;k<5;k++){ctx.strokeStyle=C.red;ctx.beginPath();ctx.arc(720,330,18+k*10,0,Math.PI*2);ctx.stroke()}text(q.B>=0?'B：⊙ 出屏':'B：⊗ 入屏',720,382,C.red,'center',12,'900');drawGraph(q)}
function drawGraph(q){box(62,425,763,96,'#fff');const gx=100,gy=485,gw=670,gh=34;line(gx,gy,gx+gw,gy,C.ink,2);let lx,le,lb;for(let i=0;i<=160;i++){const u=i/160,x=gx+u*gw,val=Math.sin(2*Math.PI*(u-S.t*q.f*.22))*gh*q.E0,yE=gy-val,yB=gy+val*.75;if(i){line(lx,le,x,yE,C.blue,2);line(lx,lb,x,yB,C.red,2)}lx=x;le=yE;lb=yB}text('蓝 E 波形，红 B 波形；同相并随 x 传播',435,506,C.muted,'center',12,'800')}
function update(){const q=p();els.fLabel.textContent=fmt(q.f,1)+' Hz';els.eLabel.textContent=Math.round(q.E0*100)+'%';els.xLabel.textContent=Math.round(q.xp*100)+'%';els.readout.innerHTML='探针处 E：<b>'+fmt(q.E,2)+'</b><br>探针处 B：<b>'+fmt(q.B,2)+'</b><br>关系：<b>E、B 同相且垂直</b><br>波速：<b>c=λf</b>';els.status.textContent='电磁波不需要介质：变化电场和变化磁场互相激发，能脱离振荡电路向外传播。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.x+'</td><td>'+r.e+'</td><td>'+r.b+'</td><td>x</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({x:Math.round(q.xp*100)+'%',e:fmt(q.E,2),b:fmt(q.B,2)});if(S.records.length>8)S.records.shift();update()}
[els.f,els.e,els.x].forEach(el=>el.addEventListener('input',()=>{draw();update()}));els.play.addEventListener('click',()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'});els.record.addEventListener('click',record);canvas.addEventListener('pointerdown',e=>{S.drag=true;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;els.x.value=Math.max(0,Math.min(100,(x-120)/410*100));draw()});canvas.addEventListener('pointerup',e=>{S.drag=false;record();try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});function loop(){if(S.run)S.t+=.016;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
