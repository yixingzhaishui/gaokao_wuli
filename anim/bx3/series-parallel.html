<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>串并联电路实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
.seg button{border:0;border-radius:0}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button.on{background:#2c7be5;color:#fff}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>串并联电路：拖 R1、R2、U，看分压与分流</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="串并联电路实验台：电路俯视装置、电流图像和数据记录"></canvas><div style="padding:6px 10px;display:flex;gap:12px;align-items:center;font-size:13px;border-top:1px solid #eef2f7"><button id="play-btn" style="font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer">⏸ 暂停</button><span>状态：<b id="run-st">运行中</b></span></div></div>
    <section class="panel">
      <div class="seg" id="mode"><button class="on" data-mode="series">串联</button><button data-mode="parallel">并联</button></div>
      <div class="read">
        <div class="chip">电源 U = <b id="uv">12.0</b> V</div>
        <div class="chip">R1 = <b id="r1v">3.0</b> Ω，R2 = <b id="r2v">6.0</b> Ω</div>
        <div class="chip">等效电阻 R = <b id="reqv">9.0</b> Ω</div>
        <div class="chip">总电流 I = <b id="itv">1.33</b> A</div>
        <div class="chip">支路/元件：<b id="detail">U1=4.0V, U2=8.0V</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：串联时拖 R1/R2，对照电路俯视装置、电流图像和数据记录，看同一电流下电阻越大分压越多；并联时看两支路电压相同。</div>
      <div class="formula"><b>画面绑定</b><br>金色手柄读 R1/R2，红色手柄读电源 U。串联：R=R1+R2，I 相同；并联：1/R=1/R1+1/R2，U 相同。</div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let mode='series',U=12,R1=3,R2=6,drag=null,phase=0,last=performance.now();
const els={uv:id('uv'),r1v:id('r1v'),r2v:id('r2v'),reqv:id('reqv'),itv:id('itv'),detail:id('detail')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function req(){return mode==='series'?R1+R2:1/(1/R1+1/R2)}
function totalI(){return U/req()}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-8*Math.cos(a-.45),y2-8*Math.sin(a-.45));ctx.lineTo(x2-8*Math.cos(a+.45),y2-8*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function resistor(x,y,r,label){const len=50+r/12*80;ctx.strokeStyle='#f0a500';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-len/2,y);for(let i=0;i<=8;i++)ctx.lineTo(x-len/2+i*len/8,y+(i%2?8:-8));ctx.stroke();ctx.fillStyle='#f0a500';ctx.beginPath();ctx.arc(x+len/2,y,9,0,7);ctx.fill();ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(label+'='+r.toFixed(1)+'Ω',x,y-18);return{x:x+len/2,y}}
function drawCircuit(){
  ctx.strokeStyle='#5b7089';ctx.lineWidth=6;ctx.lineJoin='round';
  if(mode==='series'){
    ctx.beginPath();ctx.rect(105,110,510,220);ctx.stroke();resistor(260,110,R1,'R1');resistor(460,110,R2,'R2');
    const I=totalI();for(let i=0;i<18;i++){const x=105+((phase+i*45)%510);ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(x,330,4,0,7);ctx.fill()}
    ctx.fillStyle='#159a6b';ctx.font='13px system-ui';ctx.fillText('同一电流 I='+I.toFixed(2)+'A 依次通过 R1、R2',220,360);
  }else{
    ctx.beginPath();ctx.moveTo(105,220);ctx.lineTo(180,220);ctx.lineTo(180,130);ctx.lineTo(610,130);ctx.lineTo(610,310);ctx.lineTo(180,310);ctx.lineTo(180,220);ctx.lineTo(105,220);ctx.stroke();
    resistor(395,130,R1,'R1');resistor(395,310,R2,'R2');
    ctx.fillStyle='#159a6b';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('两支路电压都等于 U='+U.toFixed(1)+'V',395,360);
  }
  const uh=45+U/24*120;ctx.strokeStyle='#e03131';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(75,292);ctx.lineTo(75,292-uh);ctx.stroke();ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(75,292-uh,10,0,7);ctx.fill();ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('拖 U',75,310);
}
function drawBars(){
  const x=640,y=330,scale=18;
  let vals=mode==='series'?[['U1',totalI()*R1,'#2c7be5'],['U2',totalI()*R2,'#7b2cbf']]:[['I1',U/R1,'#2c7be5'],['I2',U/R2,'#7b2cbf']];
  vals.forEach((v,i)=>{const h=clamp(v[1]*scale,2,150);ctx.fillStyle=v[2];ctx.fillRect(x+i*34,y-h,22,h);ctx.fillStyle='#334e68';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(v[0],x+11+i*34,y+18);ctx.fillText(v[1].toFixed(1),x+11+i*34,y-h-6)});
}
function update(){
  const I=totalI();els.uv.textContent=U.toFixed(1);els.r1v.textContent=R1.toFixed(1);els.r2v.textContent=R2.toFixed(1);els.reqv.textContent=req().toFixed(2);els.itv.textContent=I.toFixed(2);
  els.detail.textContent=mode==='series'?`U1=${(I*R1).toFixed(1)}V, U2=${(I*R2).toFixed(1)}V`:`I1=${(U/R1).toFixed(2)}A, I2=${(U/R2).toFixed(2)}A`;
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);const bg=ctx.createLinearGradient(0,0,0,cv.height);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='rgba(16,42,67,.06)';for(let x=0;x<cv.width;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke()}for(let y=0;y<cv.height;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke()}
  drawCircuit();drawBars();ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText(mode==='series'?`串联：R=R1+R2=${req().toFixed(1)}Ω，I处处相等，电压按电阻分配`:`并联：1/R=1/R1+1/R2，R=${req().toFixed(2)}Ω，支路电压相同`,24,34);update();
}
cv.addEventListener('pointerdown',e=>{const p=pos(e);if(Math.hypot(p.x-75,p.y-(292-(45+U/24*120)))<24){drag='U';return}const targets=mode==='series'?[{x:260+(50+R1/12*80)/2,y:110,d:'R1'},{x:460+(50+R2/12*80)/2,y:110,d:'R2'}]:[{x:395+(50+R1/12*80)/2,y:130,d:'R1'},{x:395+(50+R2/12*80)/2,y:310,d:'R2'}];for(const t of targets)if(Math.hypot(p.x-t.x,p.y-t.y)<24){drag=t.d;return}});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e);if(drag==='U')U=clamp((292-p.y-45)/120*24,2,24);if(drag==='R1')R1=clamp(((p.x-(mode==='series'?260:395))*2-50)/80*12,1,12);if(drag==='R2')R2=clamp(((p.x-(mode==='series'?460:395))*2-50)/80*12,1,12);draw()});
window.addEventListener('pointerup',()=>drag=null);
document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));draw()});
function loop(now){if(window.__paused){requestAnimationFrame(loop);return;}const dt=Math.min((now-last)/1000,.05);last=now;phase+=totalI()*50*dt;draw();requestAnimationFrame(loop)}
draw();requestAnimationFrame(loop);
var _pb=document.getElementById("play-btn");if(_pb)_pb.onclick=function(){window.__paused=!window.__paused;this.textContent=window.__paused?"▶ 播放":"⏸ 暂停";var st=document.getElementById("run-st");if(st)st.textContent=window.__paused?"已暂停":"运行中";};
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
