<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闭合电路欧姆定律</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
canvas{display:block;width:100%;max-width:600px;background:#fff;border:1px solid #d9e2ec;border-radius:8px}
.readouts{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0;font-size:14px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 12px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:16px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:4px;font-size:13px;color:#334e68}
.controls input[type=range]{width:140px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 16px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>闭合电路欧姆定律：I = ε/(R+r)，U = ε - Ir</h2>
  <div class="controls">
    <label>外阻 R = <span id="r-display">10</span> Ω
      <input type="range" id="r" min="0.5" max="30" step="0.5" value="10"></label>
    <label>电动势 ε = <span id="emf-display">6</span> V
      <input type="range" id="emf" min="1" max="12" step="0.5" value="6"></label>
    <label>内阻 r = <span id="ri-display">2</span> Ω
      <input type="range" id="ri" min="0.5" max="8" step="0.5" value="2"></label>
    <button id="play-btn">播放</button>
    <button id="reset-btn">重置</button>
  </div>
  <canvas id="canvas" width="600" height="400" aria-label="闭合电路实验台：电路俯视装置、U-I图像和数据记录"></canvas>
  <div class="readouts">
    <span class="r">电流 I = <b id="i-val">0.50</b> A</span>
    <span class="r">路端电压 U = <b id="u-val">5.0</b> V</span>
    <span class="r">内压降 Ir = <b id="ir-val">1.0</b> V</span>
    <span class="r">电源功率 = <b id="p-val">3.0</b> W</span>
    <span class="r">通过截面的电荷 Q = <b id="q-flow-val">0.00</b> C</span>
    <span class="r">演示时间 = <b id="t-val">0.00</b> s</span>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：拖动 R 滑块，或直接<b>拖动右侧 U-I 图像上的红色工作点</b>，对照电路俯视装置、U-I 图像和数据记录，看路端电压 U 和电流 I 如何反向变化。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let R=10,emf=6,ri=2;
  let running=false,t=0,dragPoint=false;
  const pointHot={x:0,y:0,gx:0,gy:0,gw:0,gh:0,Ishort:1};

  function calcI(){return emf/(R+ri);}
  function calcU(){return emf-ri*calcI();}

  function updateReadouts(){
    const I=calcI(),U=calcU();
    document.getElementById('i-val').textContent=I.toFixed(2);
    document.getElementById('u-val').textContent=U.toFixed(2);
    document.getElementById('ir-val').textContent=(ri*I).toFixed(2);
    document.getElementById('p-val').textContent=(emf*I).toFixed(1);
    document.getElementById('q-flow-val').textContent=(I*t).toFixed(2);
    document.getElementById('t-val').textContent=t.toFixed(2);
  }

  function drawCircuit(){
    const cx=180,cy=200;
    // battery (left side)
    ctx.strokeStyle='#334e68';ctx.lineWidth=2;
    ctx.beginPath();
    // outer rectangle
    ctx.moveTo(cx-60,cy-80);ctx.lineTo(cx+60,cy-80);
    ctx.lineTo(cx+60,cy+80);ctx.lineTo(cx-60,cy+80);ctx.closePath();
    ctx.stroke();
    // battery symbol on left
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cx-60,cy-15);ctx.lineTo(cx-60,cy+15);
    ctx.moveTo(cx-56,cy-8);ctx.lineTo(cx-56,cy+8);
    ctx.stroke();
    ctx.lineWidth=2;
    ctx.fillStyle='#334e68';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('ε='+emf.toFixed(1)+'V',cx-58,cy-25);
    ctx.fillText('r='+ri.toFixed(1)+'Ω',cx-58,cy+30);
    // resistor on right (zigzag)
    const rx=cx+60;
    ctx.beginPath();
    ctx.moveTo(rx,cy-40);
    for(let i=0;i<6;i++){
      const y=cy-40+(i+0.5)*13.3;
      ctx.lineTo(rx+(i%2===0?8:-8),y);
    }
    ctx.lineTo(rx,cy+40);
    ctx.stroke();
    ctx.fillText('R='+R.toFixed(1)+'Ω',rx+20,cy);
    // current arrows
    const I=calcI();
    const arrowSize=Math.min(12,3+I*4);
    ctx.fillStyle='#f0a500';
    // top wire arrow
    ctx.beginPath();
    ctx.moveTo(cx,cy-80);
    ctx.lineTo(cx+arrowSize,cy-80-arrowSize/2);
    ctx.lineTo(cx+arrowSize,cy-80+arrowSize/2);
    ctx.closePath();ctx.fill();
    ctx.fillText('I='+I.toFixed(2)+'A',cx,cy-95);
    // bottom wire arrow
    ctx.beginPath();
    ctx.moveTo(cx-20,cy+80);
    ctx.lineTo(cx-20-arrowSize,cy+80-arrowSize/2);
    ctx.lineTo(cx-20-arrowSize,cy+80+arrowSize/2);
    ctx.closePath();ctx.fill();
    // voltage label on R
    const U=calcU();
    ctx.fillStyle='#e03131';ctx.font='11px sans-serif';
    ctx.fillText('U='+U.toFixed(2)+'V',rx+20,cy+18);
    // 正在流动的载流子：播放时沿闭合回路移动，位置和累计电荷 Q=It 同步。
    if(running){
      const phase=t*I*0.55;
      for(let n=0;n<8;n++){
        const u=(phase+n/8)%1;let x,y;
        if(u<.25){x=cx-60+u/.25*120;y=cy-80;}
        else if(u<.5){x=cx+60;y=cy-80+(u-.25)/.25*160;}
        else if(u<.75){x=cx+60-(u-.5)/.25*120;y=cy+80;}
        else{x=cx-60;y=cy+80-(u-.75)/.25*160;}
        ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      }
    }
  }

  function drawGraph(){
    const gx=380,gy=80,gw=190,gh=240;
    // axes
    ctx.strokeStyle='#334e68';ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);
    ctx.lineTo(gx+gw,gy+gh);
    ctx.stroke();
    ctx.fillStyle='#334e68';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('I/A',gx+gw/2,gy+gh+18);
    ctx.save();
    ctx.translate(gx-10,gy+gh/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillText('U/V',0,0);
    ctx.restore();
    // U-I line: U = emf - r*I
    const Imax=emf/ri;
    const Ishort=emf/Math.max(ri,0.5);
    const scaleI=gw/Math.max(Ishort,0.5);
    const scaleU=gh/Math.max(emf,1);
    // plot line from (0, emf) to (Ishort, 0)
    ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(gx,gy+gh-emf*scaleU);
    ctx.lineTo(gx+Ishort*scaleI,gy+gh);
    ctx.stroke();
    // working point
    const I=calcI(),U=calcU();
    const px=gx+I*scaleI,py=gy+gh-U*scaleU;
    pointHot.x=px;pointHot.y=py;pointHot.gx=gx;pointHot.gy=gy;pointHot.gw=gw;pointHot.gh=gh;pointHot.Ishort=Ishort;
    ctx.save();ctx.shadowColor='rgba(224,49,49,.8)';ctx.shadowBlur=10;
    ctx.fillStyle='#e03131';
    ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // dashed lines to axes
    ctx.strokeStyle='#e03131';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(px,py);ctx.lineTo(px,gy+gh);
    ctx.moveTo(px,py);ctx.lineTo(gx,py);
    ctx.stroke();
    ctx.setLineDash([]);
    // labels
    ctx.fillStyle='#e03131';ctx.font='10px sans-serif';ctx.textAlign='left';
    ctx.fillText('('+I.toFixed(2)+', '+U.toFixed(2)+')',px+6,py-6);
    ctx.fillStyle='#486581';ctx.textAlign='right';
    ctx.fillText(emf.toFixed(1),gx-4,gy+gh-emf*scaleU+4);
    ctx.fillText(Ishort.toFixed(2),gx+Ishort*scaleI,gy+gh+12);
    // title
    ctx.fillStyle='#243b53';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('U-I 图像',gx+gw/2,gy-8);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawCircuit();
    drawGraph();
    // formula
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    const I=calcI(),U=calcU();
    ctx.fillText('I = ε/(R+r) = '+emf+'/'+(R+ri).toFixed(1)+' = '+I.toFixed(2)+' A',15,H-30);
    ctx.fillText('U = ε - Ir = '+emf+' - '+I.toFixed(2)+'×'+ri+' = '+U.toFixed(2)+' V',15,H-10);
  }

  function step(dt){if(!running)return;t+=dt;updateReadouts();draw();}

  function eventPos(ev){const rc=canvas.getBoundingClientRect();return{x:(ev.clientX-rc.left)*canvas.width/rc.width,y:(ev.clientY-rc.top)*canvas.height/rc.height};}
  canvas.addEventListener('pointerdown',ev=>{const p=eventPos(ev);if(Math.hypot(p.x-pointHot.x,p.y-pointHot.y)<16)dragPoint=true;});
  canvas.addEventListener('pointermove',ev=>{
    if(!dragPoint)return;const p=eventPos(ev);
    const I=Math.max(0.02,Math.min(pointHot.Ishort,(p.x-pointHot.gx)/(pointHot.gw/pointHot.Ishort)));
    R=Math.max(0.5,Math.min(30,emf/I-ri));
    document.getElementById('r').value=R;document.getElementById('r-display').textContent=R.toFixed(1);
    updateReadouts();draw();
  });
  window.addEventListener('pointerup',()=>dragPoint=false);
  document.getElementById('r').addEventListener('input',e=>{R=parseFloat(e.target.value);document.getElementById('r-display').textContent=R.toFixed(1);updateReadouts();draw();});
  document.getElementById('emf').addEventListener('input',e=>{emf=parseFloat(e.target.value);document.getElementById('emf-display').textContent=emf.toFixed(1);updateReadouts();draw();});
  document.getElementById('ri').addEventListener('input',e=>{ri=parseFloat(e.target.value);document.getElementById('ri-display').textContent=ri.toFixed(1);updateReadouts();draw();});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{running=false;t=0;document.getElementById('play-btn').textContent='播放';updateReadouts();draw();});

  let lastTime=performance.now();
  function loop(now){const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;step(dt);requestAnimationFrame(loop);}
  updateReadouts();draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
