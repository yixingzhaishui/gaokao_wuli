<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电源电动势实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>电源电动势：拖 q、ε、R，看 ε=W非/q 与 U=ε-Ir</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="电源电动势实验台：闭合电路侧视装置、电压表图像和数据记录"></canvas></div>
    <section class="panel">
      <button id="playBtn" style="font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;width:100%;margin-bottom:10px">▶ 播放：电荷搬运与电流循环</button>
      <div class="read">
        <div class="chip">电动势 ε = <b id="ev">6.0</b> V = J/C</div>
        <div class="chip">搬运电荷 q = <b id="qv">2.0</b> C</div>
        <div class="chip">非静电力做功 W非 = <b id="wv">12.0</b> J</div>
        <div class="chip">外阻 R = <b id="Rv">8.0</b> Ω，内阻 r=1Ω</div>
        <div class="chip">闭合时 I = <b id="iv">0.67</b> A</div>
        <div class="chip">路端电压 U = <b id="uv">5.33</b> V</div>
        <div class="chip">电路状态：<b id="statev">—</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖 q 看 W非 随电荷量成正比，但 ε 不变；对照闭合电路侧视装置、电压表图像和数据记录，拖 R 看接外电路后路端电压 U 会小于 ε。</div>
      <div class="formula"><b>公式绑定</b><br>电源内部绿色箭头表示非静电力把正电荷从负极搬到正极。ε=W非/q 是电源属性；接外电路后 U=ε-Ir。</div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let E=6,q=2,R=8,r=1,drag=null,playing=false,loopT=0;
const els={ev:id('ev'),qv:id('qv'),wv:id('wv'),Rv:id('Rv'),iv:id('iv'),uv:id('uv'),statev:id('statev')};
const loop=[[155,150],[300,120],[410,120],[410,300],[300,330],[155,330],[155,240]];
function loopPoint(t){
  const n=loop.length,f=((t%1)+1)%1*n,i=Math.floor(f),k=f-i,a=loop[i],b=loop[(i+1)%n];
  return {x:a[0]+(b[0]-a[0])*k,y:a[1]+(b[1]-a[1])*k};
}
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function I(){return E/(R+r)}
function U(){return I()*R}
function Wn(){return E*q}
function pos(e){const rc=cv.getBoundingClientRect(),s=cv.width/rc.width;return{x:(e.clientX-rc.left)*s,y:(e.clientY-rc.top)*s}}
function knob(x,y,label,color){ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,11,0,7);ctx.fill();ctx.fillStyle=color;ctx.font='700 12px system-ui';ctx.textAlign='center';ctx.fillText(label,x,y-18)}
function arrow(x1,y1,x2,y2,color,w){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-8*Math.cos(a-.45),y2-8*Math.sin(a-.45));ctx.lineTo(x2-8*Math.cos(a+.45),y2-8*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);const bg=ctx.createLinearGradient(0,0,0,cv.height);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='rgba(16,42,67,.06)';for(let x=0;x<cv.width;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke()}for(let y=0;y<cv.height;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke()}
  ctx.fillStyle='#eef4ff';ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.fillRect(105,120,210,150);ctx.strokeRect(105,120,210,150);ctx.fillStyle='#102a43';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.fillText('电源内部',210,112);
  arrow(155,240,155,150,'#159a6b',4);ctx.fillStyle='#159a6b';ctx.fillText('非静电力',192,190);
  ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(155,150,10,0,7);ctx.fill();ctx.strokeStyle='#8a5a00';ctx.stroke();ctx.fillStyle='#5a3d00';ctx.fillText('+q',155,154);
  const ex=410,ey=300-(E-2)/10*150,qx=115+(q-.5)/4.5*210,Rx=420+(R-1)/19*190;
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(410,300);ctx.lineTo(410,150);ctx.stroke();knob(ex,ey,'拖 ε','#e03131');
  ctx.strokeStyle='#ccd6e0';ctx.beginPath();ctx.moveTo(115,360);ctx.lineTo(325,360);ctx.stroke();knob(qx,360,'拖 q','#f0a500');
  ctx.strokeStyle='#ccd6e0';ctx.beginPath();ctx.moveTo(420,390);ctx.lineTo(610,390);ctx.stroke();knob(Rx,390,'拖 R','#2c7be5');
  const base=320,scale=170/Math.max(Wn(),E*q,12);[['W非',Wn(),'#159a6b',500],['qε',E*q,'#e03131',565],['qU',q*U(),'#2c7be5',630]].forEach(([lab,val,col,x])=>{const h=val*scale;ctx.fillStyle=col;ctx.fillRect(x,base-h,30,h);ctx.fillStyle='#334e68';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(lab,x+15,base+18);ctx.fillText(val.toFixed(1),x+15,base-h-6)});
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText(`ε=W非/q=${Wn().toFixed(1)}/${q.toFixed(1)}=${E.toFixed(1)}V；闭合时 U=ε-Ir=${U().toFixed(2)}V`,24,34);
  if(playing){const p=loopPoint(loopT);ctx.fillStyle='#ffd166';ctx.strokeStyle='#8a5a00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,9,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#5a3d00';ctx.font='700 10px system-ui';ctx.textAlign='center';ctx.fillText('+',p.x,p.y+1)}
  update();
}
function update(){els.ev.textContent=E.toFixed(1);els.qv.textContent=q.toFixed(1);els.wv.textContent=Wn().toFixed(1);els.Rv.textContent=R.toFixed(1);els.iv.textContent=I().toFixed(2);els.uv.textContent=U().toFixed(2);els.statev.textContent=playing?'闭合回路，电荷循环搬运（I='+I().toFixed(2)+'A）':'静态：拖动滑块改变参数'}
cv.addEventListener('pointerdown',e=>{const p=pos(e),ey=300-(E-2)/10*150,qx=115+(q-.5)/4.5*210,Rx=420+(R-1)/19*190;if(Math.hypot(p.x-410,p.y-ey)<24)drag='E';else if(Math.hypot(p.x-qx,p.y-360)<24)drag='q';else if(Math.hypot(p.x-Rx,p.y-390)<24)drag='R'});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e);if(drag==='E')E=clamp(2+(300-p.y)/150*10,2,12);if(drag==='q')q=clamp(.5+(p.x-115)/210*4.5,.5,5);if(drag==='R')R=clamp(1+(p.x-420)/190*19,1,20);draw()});
window.addEventListener('pointerup',()=>drag=null);
function animate(){
  if(!playing)return;
  loopT+=0.006*(0.4+I());
  draw();
  requestAnimationFrame(animate);
}
id('playBtn').onclick=()=>{
  playing=!playing;
  id('playBtn').textContent=playing?'⏸ 暂停':'▶ 播放：电荷搬运与电流循环';
  if(playing)animate();else draw();
};
draw();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
