<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电场强度与电场线</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
canvas{display:block;width:100%;max-width:600px;background:#fff;border:1px solid #d9e2ec;border-radius:8px}
.readouts{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0;font-size:14px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 12px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:16px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:4px;font-size:13px;color:#334e68}
.controls input[type=range]{width:140px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 16px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>电场强度：E = kQ/r²</h2>
  <canvas id="canvas" width="600" height="380"></canvas>
  <div class="readouts">
    <span class="r">源电荷 Q = <b id="q-val">+5.0</b> μC</span>
    <span class="r">距离 r = <b id="r-val">3.0</b> m</span>
    <span class="r">场强 E = <b id="e-val">5.00</b> N/C</span>
    <span class="r" id="dir-val">方向：向外</span>
    <span class="r">场强状态：<b id="trend-val">—</b></span>
  </div>
  <div class="controls">
    <label>Q = <span id="q-display">+5.0</span> μC
      <input type="range" id="q" min="-10" max="10" step="0.5" value="5"></label>
    <label>试探距离 r = <span id="r-display">3.0</span> m
      <input type="range" id="r" min="1" max="6" step="0.1" value="3"></label>
    <button id="play-btn">播放</button>
    <button id="reset-btn">重置</button>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：直接<b>拖动画面里橙色的试探点</b>改变 r，看场强如何按 1/r² 减小；拖动 Q 看场强如何正比变化；Q 为正时电场线向外，Q 为负时向内。注意 E 与试探电荷无关。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let Q=5,r=3;
  let running=false,t=0,dragTest=false,lastE=0;
  const k=9;
  const scale=40;

  function calcE(){
    return k*Math.abs(Q)/(r*r);
  }

  function updateReadouts(){
    const e=calcE();
    document.getElementById('e-val').textContent=e.toFixed(2);
    document.getElementById('q-val').textContent=(Q>=0?'+':'')+Q.toFixed(1);
    document.getElementById('r-val').textContent=r.toFixed(1);
    document.getElementById('dir-val').textContent=Q>0?'方向：向外（正电荷）':(Q<0?'方向：向内（负电荷）':'Q=0，无场');
    document.getElementById('trend-val').textContent=e>lastE+0.01?'增强中':(e<lastE-0.01?'减弱中':'稳定');
    lastE=e;
  }

  function drawArrow(x1,y1,x2,y2,color,lw){
    ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw||2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const ang=Math.atan2(y2-y1,x2-x1);
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-7*Math.cos(ang-0.4),y2-7*Math.sin(ang-0.4));
    ctx.lineTo(x2-7*Math.cos(ang+0.4),y2-7*Math.sin(ang+0.4));
    ctx.closePath();ctx.fill();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const cx=W/2,cy=H/2;
    // field lines
    const nLines=12;
    const lineLen=160;
    for(let i=0;i<nLines;i++){
      const ang=(i/nLines)*Math.PI*2;
      const dir=Q>0?1:(Q<0?-1:0);
      if(dir===0)continue;
      const x1=cx+Math.cos(ang)*22;
      const y1=cy+Math.sin(ang)*22;
      const x2=cx+Math.cos(ang)*(22+lineLen);
      const y2=cy+Math.sin(ang)*(22+lineLen);
      if(dir>0){
        // outward: draw line with arrow at end
        ctx.strokeStyle='#e03131';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        // arrowhead at ~60% and end
        for(let frac=0.5;frac<=1.0;frac+=0.5){
          const ax=cx+Math.cos(ang)*(22+lineLen*frac);
          const ay=cy+Math.sin(ang)*(22+lineLen*frac);
          drawArrow(ax-Math.cos(ang)*5,ay-Math.sin(ang)*5,ax,ay,'#e03131',1.5);
        }
      }else{
        // inward: draw line, arrow pointing toward center
        ctx.strokeStyle='#2c7be5';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x1,y1);ctx.stroke();
        for(let frac=0.5;frac<=1.0;frac+=0.5){
          const ax=cx+Math.cos(ang)*(22+lineLen*(1-frac));
          const ay=cy+Math.sin(ang)*(22+lineLen*(1-frac));
          drawArrow(ax+Math.cos(ang)*5,ay+Math.sin(ang)*5,ax,ay,'#2c7be5',1.5);
        }
      }
    }
    // source charge
    const color=Q>0?'#e03131':(Q<0?'#2c7be5':'#aab8c2');
    const srcG=ctx.createRadialGradient(cx-6,cy-6,3,cx,cy,20);
    srcG.addColorStop(0,Q>0?'#ff9a86':(Q<0?'#7bb6ff':'#dfe7ee'));srcG.addColorStop(1,color);
    ctx.save();ctx.shadowColor=color;ctx.shadowBlur=16;
    ctx.fillStyle=srcG;
    ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(Q>0?'+':(Q<0?'−':'0'),cx,cy);
    ctx.fillStyle='#334e68';ctx.font='12px sans-serif';
    ctx.fillText('Q='+(Q>=0?'+':'')+Q.toFixed(1)+' μC',cx,cy+35);
    // test charge position (on the right)
    const testX=cx+r*scale;
    const testY=cy;
    // r line
    ctx.strokeStyle='#aab8c2';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(cx+20,cy);ctx.lineTo(testX,cy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#486581';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('r='+r.toFixed(1)+' m',(cx+testX)/2,cy-8);
    // test point
    ctx.save();ctx.shadowColor='rgba(240,165,0,.7)';ctx.shadowBlur=10;
    ctx.fillStyle='#f0a500';
    ctx.beginPath();ctx.arc(testX,testY,8,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='#334e68';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#334e68';ctx.font='11px sans-serif';
    ctx.fillText('试探点',testX,testY+22);
    // E vector at test point
    const e=calcE();
    const eLen=Math.min(100,e*10+10);
    if(Q>0){
      drawArrow(testX,testY,testX+eLen,testY,'#e03131',3);
      ctx.fillStyle='#e03131';ctx.font='12px sans-serif';
      ctx.fillText('E',testX+eLen+8,testY+4);
    }else if(Q<0){
      drawArrow(testX,testY,testX-eLen,testY,'#2c7be5',3);
      ctx.fillStyle='#2c7be5';ctx.font='12px sans-serif';
      ctx.fillText('E',testX-eLen-12,testY+4);
    }
    // formula
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('E = k|Q|/r² = '+k+'×'+Math.abs(Q).toFixed(1)+'/'+r.toFixed(1)+'² = '+e.toFixed(2)+' N/C',15,H-15);
  }

  function step(dt){if(!running)return;t+=dt;draw();}

  function eventPos(ev){const rc=canvas.getBoundingClientRect();return {x:(ev.clientX-rc.left)*canvas.width/rc.width,y:(ev.clientY-rc.top)*canvas.height/rc.height};}
  canvas.addEventListener('pointerdown',ev=>{
    const p=eventPos(ev),cx=W/2,cy=H/2,testX=cx+r*scale;
    if(Math.hypot(p.x-testX,p.y-cy)<20){dragTest=true;}
  });
  canvas.addEventListener('pointermove',ev=>{
    if(!dragTest)return;const p=eventPos(ev),cx=W/2;
    r=Math.max(1,Math.min(6,(p.x-cx)/scale));
    document.getElementById('r').value=r;document.getElementById('r-display').textContent=r.toFixed(1);
    updateReadouts();draw();
  });
  window.addEventListener('pointerup',()=>dragTest=false);
  document.getElementById('q').addEventListener('input',e=>{Q=parseFloat(e.target.value);document.getElementById('q-display').textContent=(Q>=0?'+':'')+Q.toFixed(1);updateReadouts();draw();});
  document.getElementById('r').addEventListener('input',e=>{r=parseFloat(e.target.value);document.getElementById('r-display').textContent=r.toFixed(1);updateReadouts();draw();});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{running=false;t=0;document.getElementById('play-btn').textContent='播放';draw();});

  let lastTime=performance.now();
  function loop(now){const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;step(dt);requestAnimationFrame(loop);}
  updateReadouts();draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
