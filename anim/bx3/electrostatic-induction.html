<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静电感应、静电利用与防护</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;padding:12px;min-height:650px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}button.active{background:#2c7be5;color:#fff;border-color:#2c7be5;font-weight:800}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43}input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="900" height="600" aria-label="静电感应实验台：带电棒导体侧视、法拉第笼剖面、电场线图像和验电器读数"></canvas></div><div class="panel">
<div class="card task"><b>观察任务：</b>拖动带电棒靠近导体；切换接地和法拉第笼，观察电荷分布、电场线和验电器张角。</div>
<div class="card"><div class="title">实验条件</div><div class="buttons"><button data-mode="induce" class="active">感应</button><button data-mode="ground">接地</button><button data-mode="cage">屏蔽</button><button data-mode="rod">避雷针</button></div><label class="param"><span>带电棒距离 <b id="dLab">160</b></span><input id="dist" type="range" min="50" max="260" step="5" value="160"></label><label class="param"><span>外场强度 <b id="eLab">60%</b></span><input id="field" type="range" min="0" max="100" step="1" value="60"></label><div class="buttons"><button id="play">播放</button><button id="reset">重置</button></div></div>
<div class="readout" id="readout"></div><div class="card formula"><div class="title">规律绑定</div><div>静电平衡：导体内部 E=0，净电荷分布在外表面。</div><div>接地可让电子流入或流出；法拉第笼用导体外壳实现静电屏蔽。</div></div><div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const el={dist:id('dist'),field:id('field'),dLab:id('dLab'),eLab:id('eLab'),readout:id('readout'),status:id('status'),play:id('play')};const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};const state={mode:'induce',playing:false,t:0,drag:null};function id(s){return document.getElementById(s)}function vals(){const d=+el.dist.value,E=+el.field.value/100,ind=(260-d)/210*E;return{d,E,ind:Math.max(0,ind)}}function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
function charge(x,y,s,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,11,0,Math.PI*2);ctx.fill();text(s,x,y,'#fff','center',14,'900')}function drawScene(v){box(42,72,810,292,'#fff');text('导体静电感应侧视：靠近、接地、屏蔽与尖端放电',447,100,colors.ink,'center',16,'900');const rodX=170+v.d;box(rodX,142,42,138,'#ffe3e3',colors.red);for(let y=160;y<270;y+=28)charge(rodX+21,y,'+',colors.red);box(378,160,160,86,'#eef4ff',colors.blue);text('中性导体',458,204,colors.blue,'center',14,'900');for(let i=0;i<5;i++){charge(398+i*18,178,'-',colors.blue);charge(508-i*18,228,'+',colors.red)}for(let i=0;i<6;i++)arrow(rodX-12,160+i*20,382,170+i*12,colors.gold,1.4);if(state.mode==='ground'){line(458,246,458,310,colors.green,4);line(430,310,486,310,colors.green,3);text('接地：电子可流动',458,330,colors.green,'center',13,'900');arrow(458,300,458,250,colors.blue,3)}if(state.mode==='cage'){box(610,142,148,132,'#f8fafc',colors.muted);ctx.strokeStyle=colors.muted;ctx.lineWidth=5;ctx.strokeRect(628,160,112,96);text('法拉第笼剖面',684,138,colors.ink,'center',13,'900');for(let i=0;i<5;i++)arrow(570,168+i*20,625,168+i*20,colors.gold,1.5);text('内部 E≈0',684,208,colors.green,'center',15,'900')}if(state.mode==='rod'){line(660,278,660,145,colors.ink,5);arrow(660,145,660,100,colors.purple,4);text('避雷针尖端增强电场，引导放电',660,320,colors.purple,'center',13,'900')}const ang=Math.min(.9,v.ind);ctx.save();ctx.translate(270,292);line(0,0,-24,-62,colors.ink,2);line(0,0,24,-62,colors.ink,2);line(-24,-62,-24-35*ang,-62-18*ang,colors.gold,3);line(24,-62,24+35*ang,-62-18*ang,colors.gold,3);ctx.restore();text('验电器张角',270,330,colors.gold,'center',12,'900')}
function drawGraph(v){box(42,396,810,130,'#fff');text('距离-感应强度图像',447,422,colors.ink,'center',15,'900');const gx=110,gy=492,gw=650,gh=62;line(gx,gy,gx+gw,gy,colors.ink,2);line(gx,gy,gx,gy-gh,colors.ink,2);ctx.strokeStyle=colors.blue;ctx.lineWidth=3;ctx.beginPath();for(let d=50;d<=260;d+=5){const ind=(260-d)/210*v.E,x=gx+(d-50)/210*gw,y=gy-ind*gh;if(d===50)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();const px=gx+(v.d-50)/210*gw,py=gy-v.ind*gh;ctx.fillStyle=colors.red;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();text('越近感应越明显',450,520,colors.muted,'center',12,'900')}
function update(v){el.dLab.textContent=v.d;el.eLab.textContent=Math.round(v.E*100)+'%';const name={induce:'感应起电',ground:'接地感应',cage:'静电屏蔽',rod:'尖端放电/避雷'}[state.mode];el.readout.innerHTML='模式：<b>'+name+'</b><br>感应强度：<b>'+(v.ind*100).toFixed(0)+'%</b><br>导体内部电场：<b>'+(state.mode==='cage'||state.mode==='induce'?'约为0':'接地调整中')+'</b><br>验电器：<b>'+(v.ind>.4?'明显张开':'张角较小')+'</b>';el.status.textContent='关键：外电场使自由电荷重新分布；静电平衡时导体内部电场为零。'}
function draw(){const v=vals();ctx.clearRect(0,0,900,600);const bg=ctx.createLinearGradient(0,0,0,600);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,600);text('B3-21 静电感应、静电利用与防护：导体侧视 + 法拉第笼 + 电场图像',450,34,colors.ink,'center',18,'900');drawScene(v);drawGraph(v);update(v)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{state.drag='rod';canvas.setPointerCapture(e.pointerId);move(e)});canvas.addEventListener('pointermove',move);function move(e){if(!state.drag)return;const p=pos(e);el.dist.value=Math.max(50,Math.min(260,Math.round(p.x-170)));draw();e.preventDefault()}canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));draw()});[el.dist,el.field].forEach(x=>x.addEventListener('input',draw));el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};id('reset').onclick=()=>{el.dist.value=160;el.field.value=60;draw()};function loop(){if(state.playing){state.t+=.04;el.dist.value=Math.round(155+100*Math.sin(state.t))}draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
