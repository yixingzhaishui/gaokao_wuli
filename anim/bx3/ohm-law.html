<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>欧姆定律实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
.seg button{border:0;border-radius:0}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button.on{background:#2c7be5;color:#fff}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>欧姆定律：拖 U、R 和 I-U 图工作点，看 I=U/R</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="欧姆定律交互实验台：电路俯视装置、I-U图像和数据记录"></canvas><div style="padding:6px 10px;display:flex;gap:12px;align-items:center;font-size:13px;border-top:1px solid #eef2f7"><button id="play-btn" style="font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer">⏸ 暂停</button><span>状态：<b id="run-st">运行中</b></span></div></div>
    <section class="panel">
      <div class="seg" id="mode">
        <button class="on" data-mode="linear">线性电阻</button>
        <button data-mode="lamp">灯泡非线性</button>
      </div>
      <div class="read">
        <div class="chip">电压 U = <b id="uv">6.0</b> V</div>
        <div class="chip">电阻 R = <b id="rv">10.0</b> Ω</div>
        <div class="chip">电流 I = <b id="iv">0.60</b> A</div>
        <div class="chip">I-U 斜率 = <b id="kv">0.100</b> A/V</div>
        <div class="chip">判断：<b id="judge">I=U/R 成立</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖红色电压手柄，对照电路俯视装置、I-U 图像和数据记录，在线性电阻模式下 I 和 U 成正比；切到灯泡模式看曲线弯曲。</div>
      <div class="formula"><b>画面绑定</b><br>电池高度读 U，电阻长度读 R，蓝色工作点在 I-U 图上。线性元件图线过原点且为直线，斜率 k=I/U=1/R。</div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let U=6,R=10,mode='linear',drag=null,phase=0,last=performance.now();
const els={uv:id('uv'),rv:id('rv'),iv:id('iv'),kv:id('kv'),judge:id('judge')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function current(){return mode==='linear'?U/R:0.22*Math.pow(U,0.72)}
function effR(){return U/Math.max(current(),.001)}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-8*Math.cos(a-.45),y2-8*Math.sin(a-.45));ctx.lineTo(x2-8*Math.cos(a+.45),y2-8*Math.sin(a+.45));ctx.closePath();ctx.fill();
}
function drawCircuit(){
  const x0=85,y0=110,w=285,h=220,I=current();
  ctx.strokeStyle='#5b7089';ctx.lineWidth=6;ctx.lineJoin='round';ctx.beginPath();ctx.rect(x0,y0,w,h);ctx.stroke();
  ctx.strokeStyle='#f3f6fa';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(x0,y0+70);ctx.lineTo(x0,y0+150);ctx.stroke();
  const uh=35+U/12*110;ctx.strokeStyle='#e03131';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x0-18,y0+160);ctx.lineTo(x0-18,y0+160-uh);ctx.stroke();
  ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(x0-18,y0+160-uh,10,0,7);ctx.fill();ctx.fillStyle='#e03131';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.fillText('拖 U',x0-18,y0+174);
  const rx=x0+w/2,ry=y0,rl=48+R/30*110;
  ctx.strokeStyle='#f3f6fa';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(rx-90,ry);ctx.lineTo(rx+90,ry);ctx.stroke();
  ctx.strokeStyle='#f0a500';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(rx-rl/2,ry);
  for(let i=0;i<=8;i++)ctx.lineTo(rx-rl/2+i*rl/8,ry+(i%2?9:-9));
  ctx.stroke();ctx.fillStyle='#f0a500';ctx.beginPath();ctx.arc(rx+rl/2,ry,9,0,7);ctx.fill();ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.fillText('拖 R',rx+rl/2+28,ry+4);
  for(let i=0;i<16;i++){const t=(phase+i*60)%1010;let p;if(t<285)p={x:x0+t,y:y0};else if(t<505)p={x:x0+w,y:y0+t-285};else if(t<790)p={x:x0+w-(t-505),y:y0+h};else p={x:x0,y:y0+h-(t-790)};ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fill()}
  const glow=Math.min(1,I/1.2);
  ctx.fillStyle='rgba(255,210,80,'+(0.15+glow*.35)+')';ctx.beginPath();ctx.arc(x0+w,y0+h/2,35,0,7);ctx.fill();
  ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x0+w,y0+h/2,18,0,7);ctx.stroke();
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.fillText('A 表 '+I.toFixed(2)+'A',x0+98,y0+h+35);
}
function drawGraph(){
  const gx=430,gy=342,gw=245,gh=245,I=current();
  ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(gx,gy-gh);ctx.lineTo(gx,gy);ctx.lineTo(gx+gw,gy);ctx.stroke();
  ctx.fillStyle='#52677a';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('U/V',gx+gw+18,gy+4);ctx.fillText('I/A',gx-12,gy-gh-8);
  ctx.strokeStyle=mode==='linear'?'#2c7be5':'#e03131';ctx.lineWidth=3;ctx.beginPath();
  for(let u=0;u<=12;u+=.2){const i=mode==='linear'?u/R:0.22*Math.pow(u,0.72);const x=gx+u/12*gw,y=gy-clamp(i/1.5,0,1)*gh;if(u===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
  ctx.stroke();
  const px=gx+U/12*gw,py=gy-clamp(I/1.5,0,1)*gh;
  ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(px,py,9,0,7);ctx.fill();ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#102a43';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('拖工作点',px+12,py-10);
  ctx.strokeStyle='rgba(21,154,107,.6)';ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(gx,py);ctx.lineTo(px,py);ctx.lineTo(px,gy);ctx.stroke();ctx.setLineDash([]);
}
function update(){
  const I=current(),k=U>0?I/U:1/R;
  els.uv.textContent=U.toFixed(1);els.rv.textContent=(mode==='linear'?R:effR()).toFixed(1);els.iv.textContent=I.toFixed(2);els.kv.textContent=k.toFixed(3);
  els.judge.textContent=mode==='linear'?'I=U/R 成立':'非线性：R 随工作点变';
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const bg=ctx.createLinearGradient(0,0,0,cv.height);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='rgba(16,42,67,.06)';for(let x=0;x<cv.width;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke()}for(let y=0;y<cv.height;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke()}
  drawCircuit();drawGraph();
  const I=current();ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';
  ctx.fillText(mode==='linear'?('I=U/R='+U.toFixed(1)+'/'+R.toFixed(1)+'='+I.toFixed(2)+' A，I-U 斜率=1/R'):('灯泡曲线弯曲：当前等效 R=U/I='+effR().toFixed(1)+' Ω，不是定值'),24,34);
  update();
}
cv.addEventListener('pointerdown',e=>{
  const p=pos(e),uh=35+U/12*110,ux=67,uy=270-uh,rx=227,rl=48+R/30*110;
  const gx=430,gy=342,gw=245,gh=245,I=current(),px=gx+U/12*gw,py=gy-clamp(I/1.5,0,1)*gh;
  if(Math.hypot(p.x-ux,p.y-uy)<24){drag='U';return}
  if(mode==='linear'&&Math.hypot(p.x-(rx+rl/2),p.y-110)<24){drag='R';return}
  if(Math.hypot(p.x-px,p.y-py)<24){drag='point';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e);
  if(drag==='U')U=clamp((270-p.y-35)/110*12,0,12);
  if(drag==='R')R=clamp(((p.x-227)*2-48)/110*30,2,30);
  if(drag==='point')U=clamp((p.x-430)/245*12,0,12);
  draw();
});
window.addEventListener('pointerup',()=>{drag=null});
document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));draw()});
function loop(now){if(window.__paused){requestAnimationFrame(loop);return;}const dt=Math.min((now-last)/1000,.05);last=now;phase+=current()*75*dt;draw();requestAnimationFrame(loop)}
draw();requestAnimationFrame(loop);
var _pb=document.getElementById("play-btn");if(_pb)_pb.onclick=function(){window.__paused=!window.__paused;this.textContent=window.__paused?"▶ 播放":"⏸ 暂停";var st=document.getElementById("run-st");if(st)st.textContent=window.__paused?"已暂停":"运行中";};
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
