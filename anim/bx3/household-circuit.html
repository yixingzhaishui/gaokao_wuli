<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭电路、安全用电与节约用电</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;padding:12px;min-height:650px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}button.active{background:#2c7be5;color:#fff;border-color:#2c7be5;font-weight:800}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43}input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="900" height="600" aria-label="家庭电路实验台：火线零线地线侧视、空气开关、漏电保护器、电流表和风险图像"></canvas></div><div class="panel">
<div class="card task"><b>观察任务：</b>切换短路、过载、漏电和正常接线；看电流路径、空气开关/漏保是否动作，以及人体电流风险。</div>
<div class="card"><div class="title">用电情境</div><div class="buttons"><button data-mode="normal" class="active">正常</button><button data-mode="overload">过载</button><button data-mode="short">短路</button><button data-mode="leak">漏电</button></div><label class="param"><span>用电器总功率 P <b id="pLab">2200 W</b></span><input id="power" type="range" min="200" max="9000" step="100" value="2200"></label><label class="param"><span>人体/漏电电阻 <b id="rLab">2000 Ω</b></span><input id="bodyR" type="range" min="500" max="8000" step="100" value="2000"></label><div class="buttons"><button id="play">播放</button><button id="reset">重置</button></div></div>
<div class="readout" id="readout"></div><div class="card formula"><div class="title">公式绑定</div><div>家庭电路电压约 U=220 V，I=P/U。</div><div>短路电阻很小，电流很大；漏电保护器比较火线与零线电流差。</div></div><div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const el={power:id('power'),bodyR:id('bodyR'),pLab:id('pLab'),rLab:id('rLab'),readout:id('readout'),status:id('status'),play:id('play')};const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};const state={mode:'normal',playing:false,t:0,drag:null};function id(s){return document.getElementById(s)}function vals(){const P=+el.power.value,R=+el.bodyR.value,U=220,I=P/U,shortI=80,leakI=U/R;let trip=false,risk='低';if(state.mode==='overload')trip=I>20;if(state.mode==='short')trip=true;if(state.mode==='leak'){trip=leakI>.03;risk=leakI>.05?'高':leakI>.03?'中':'低'}return{P,R,U,I,shortI,leakI,trip,risk}}function fmt(n,d=1){return n.toFixed(d)}function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
function drawCircuit(v){box(42,72,810,300,'#fff');text('家庭电路侧视：火线-开关-用电器-零线，地线保护金属外壳',447,100,colors.ink,'center',16,'900');const yL=158,yN=242,yE=308;line(120,yL,780,yL,colors.red,5);line(120,yN,780,yN,colors.blue,5);line(120,yE,780,yE,colors.green,4);text('火线 L',90,yL,colors.red,'right',13,'900');text('零线 N',90,yN,colors.blue,'right',13,'900');text('地线 PE',90,yE,colors.green,'right',13,'900');box(190,130,70,54,v.trip?'#ffe3e3':'#e6fffa',v.trip?colors.red:colors.green);text(v.trip?'跳闸':'合闸',225,157,v.trip?colors.red:colors.green,'center',14,'900');box(315,128,96,58,'#fff7e6',colors.gold);text('漏保',363,154,colors.gold,'center',14,'900');box(520,132,118,82,'#eef4ff',colors.blue);text(state.mode==='short'?'短路线':'用电器',579,158,state.mode==='short'?colors.red:colors.blue,'center',14,'900');text(v.P+' W',579,184,colors.muted,'center',12,'900');line(579,214,579,yN,colors.ink,3);if(state.mode==='short'){line(530,yL,530,yN,colors.red,7);text('短路：绕过用电器',664,204,colors.red,'center',13,'900')}if(state.mode==='leak'){line(638,176,690,176,colors.ink,3);box(690,138,48,80,'#f8fafc',colors.muted);text('人',714,178,colors.ink,'center',13,'900');arrow(714,218,714,yE,colors.red,4);text('漏电流入地',742,264,colors.red,'left',12,'900')}const amp=state.mode==='short'?80:state.mode==='leak'?v.leakI:v.I;for(let x=275;x<500;x+=54)arrow(x,yL,x+34,yL,amp>20?colors.red:colors.gold,3);for(let x=500;x>275;x-=54)arrow(x,yN,x-34,yN,colors.blue,2.5);box(130,405,690,78,'#fbfdff');text('电流表/状态记录',475,428,colors.ink,'center',14,'900');line(220,460,220+Math.min(520,amp/40*520),460,amp>20?colors.red:colors.green,16);text('I≈'+(state.mode==='short'?'>80':fmt(amp,3))+' A',180,460,amp>20?colors.red:colors.green,'right',13,'900')}
function drawRisk(v){box(42,500,810,58,'#fff');const risk=state.mode==='leak'?v.risk:(state.mode==='short'||state.mode==='overload'?'火灾风险':'低风险');text('风险判定：'+risk,450,528,risk==='低'||risk==='低风险'?colors.green:colors.red,'center',16,'900')}
function update(v){el.pLab.textContent=v.P+' W';el.rLab.textContent=v.R+' Ω';const current=state.mode==='short'?'>80 A':state.mode==='leak'?fmt(v.leakI,3)+' A':fmt(v.I,1)+' A';el.readout.innerHTML='模式：<b>'+state.mode+'</b><br>总电流：<b>'+current+'</b><br>空开/漏保：<b>'+(v.trip?'动作':'未动作')+'</b><br>人体风险：<b>'+v.risk+'</b>';el.status.textContent=state.mode==='normal'?'开关应接在火线上，地线接金属外壳。':state.mode==='overload'?'总功率过大导致电流过大，空气开关应跳闸。':state.mode==='short'?'短路使回路电阻极小，电流很大，必须由保护装置切断。':'漏电时火线电流与零线电流不等，漏电保护器应动作。'}
function draw(){const v=vals();ctx.clearRect(0,0,900,600);const bg=ctx.createLinearGradient(0,0,0,600);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,600);text('B3-22 家庭电路安全实验台：电路侧视 + 电流表 + 风险图像',450,34,colors.ink,'center',18,'900');drawCircuit(v);drawRisk(v);update(v)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{state.drag='power';canvas.setPointerCapture(e.pointerId);move(e)});canvas.addEventListener('pointermove',move);function move(e){if(!state.drag)return;const p=pos(e);el.power.value=Math.max(200,Math.min(9000,Math.round((p.x-120)/700*9000/100)*100));draw();e.preventDefault()}canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));draw()});[el.power,el.bodyR].forEach(x=>x.addEventListener('input',draw));el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};id('reset').onclick=()=>{el.power.value=2200;el.bodyR.value=2000;state.mode='normal';document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x.dataset.mode==='normal'));draw()};function loop(){if(state.playing){state.t+=.04;el.power.value=Math.round(4600+3600*Math.sin(state.t))}draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
