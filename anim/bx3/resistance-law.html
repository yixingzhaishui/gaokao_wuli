<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电阻定律实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.seg{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
.seg button{border:0;border-radius:0}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button.on{background:#2c7be5;color:#fff}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>电阻定律：拖 L、S、材料，观察 R=ρL/S</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="电阻定律交互实验台：导线侧视装置、R-L图像和数据记录"></canvas><div style="padding:6px 10px;display:flex;gap:12px;align-items:center;font-size:13px;border-top:1px solid #eef2f7"><button id="play-btn" style="font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer">⏸ 暂停</button><span>状态：<b id="run-st">运行中</b></span></div></div>
    <section class="panel">
      <div class="seg" id="mat">
        <button class="on" data-rho="1.7" data-name="铜">铜</button>
        <button data-rho="2.8" data-name="铝">铝</button>
        <button data-rho="10" data-name="镍铬">镍铬</button>
      </div>
      <div class="read">
        <div class="chip">材料电阻率 ρ = <b id="rv">1.7</b> ×10⁻⁸ Ω·m</div>
        <div class="chip">长度 L = <b id="lv">1.0</b> m</div>
        <div class="chip">截面积 S = <b id="sv">1.0</b> mm²</div>
        <div class="chip">电阻 R = ρL/S = <b id="resv">0.017</b> Ω</div>
        <div class="chip">接 3V 时 I=U/R = <b id="iv">176.5</b> A</div>
      </div>
      <div class="hint"><b>观察任务</b>：拖右端红色手柄把导线拉长，对照导线侧视装置、R-L 图像和数据记录，看 R 如何增大；拖金色管壁把导线变粗，看 R 如何减小。</div>
      <div class="formula"><b>画面绑定</b><br>导线长度对应 L，粗细对应 S，材料按钮对应 ρ。固定电压下，R 越大，电子漂移越慢，电流越小。</div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let L=1.0,S=1.0,rho=1.7,mat='铜',drag=null,phase=0,last=performance.now();
const els={rv:id('rv'),lv:id('lv'),sv:id('sv'),resv:id('resv'),iv:id('iv')};
function id(s){return document.getElementById(s)}
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function R(){return rho*1e-8*L/(S*1e-6)}
function I(){return 3/R()}
function geom(){const x1=130,w=150+L/3*410,h=30+S*28,cy=220;return{x1,x2:x1+w,w,h,cy,y1:cy-h/2,y2:cy+h/2}}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-8*Math.cos(a-.45),y2-8*Math.sin(a-.45));ctx.lineTo(x2-8*Math.cos(a+.45),y2-8*Math.sin(a+.45));ctx.closePath();ctx.fill();
}
function draw(){
  const W=cv.width,H=cv.height,g=geom();
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  const grad=ctx.createLinearGradient(g.x1,g.y1,g.x2,g.y2);grad.addColorStop(0,mat==='铜'?'#d98a3f':mat==='铝'?'#c6d2dd':'#7e8790');grad.addColorStop(1,'#f4d3a5');
  ctx.fillStyle=grad;ctx.fillRect(g.x1,g.y1,g.w,g.h);ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.strokeRect(g.x1,g.y1,g.w,g.h);
  ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(g.x2,g.cy,11,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.font='700 12px system-ui';ctx.textAlign='center';ctx.fillText('L',g.x2,g.cy+4);
  ctx.fillStyle='#f0a500';ctx.fillRect(g.x1,g.y2-6,g.w,12);ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('拖 S',g.x1+10,g.y2+28);
  ctx.strokeStyle='#159a6b';ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(g.x1,g.y1-30);ctx.lineTo(g.x2,g.y1-30);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#159a6b';ctx.textAlign='center';ctx.fillText('L = '+L.toFixed(1)+' m',g.x1+g.w/2,g.y1-40);
  for(let i=0;i<20;i++){const x=g.x1+((i*35+phase)%(g.w));const y=g.cy+(i%3-1)*g.h/4;ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill()}
  arrow(g.x1+20,g.y1-66,g.x2-20,g.y1-66,'#e03131',3);ctx.fillStyle='#e03131';ctx.font='700 13px system-ui';ctx.fillText('接 3V，电流方向',g.x1+g.w/2,g.y1-76);
  ctx.fillStyle='#102a43';ctx.textAlign='left';ctx.font='13px system-ui';
  ctx.fillText('R=ρL/S = '+R().toFixed(3)+' Ω；U=3V 时 I='+I().toFixed(1)+' A',24,34);
  ctx.fillText('材料 '+mat+'：ρ='+rho.toFixed(1)+'×10⁻⁸ Ω·m。L 变长 R↑，S 变大 R↓',24,54);
  update();
}
function update(){els.rv.textContent=rho.toFixed(1);els.lv.textContent=L.toFixed(1);els.sv.textContent=S.toFixed(1);els.resv.textContent=R().toFixed(3);els.iv.textContent=I().toFixed(1)}
cv.addEventListener('pointerdown',e=>{const p=pos(e),g=geom();if(Math.hypot(p.x-g.x2,p.y-g.cy)<24){drag='L';return}if(Math.abs(p.y-g.y2)<22&&p.x>g.x1&&p.x<g.x2){drag='S';return}});
cv.addEventListener('pointermove',e=>{if(!drag)return;const p=pos(e),g=geom();if(drag==='L')L=clamp((p.x-g.x1-150)/410*3,.4,3.2);if(drag==='S')S=clamp((p.y-(g.cy-15))/28,.4,3.5);draw()});
window.addEventListener('pointerup',()=>{drag=null});
document.querySelectorAll('#mat button').forEach(b=>b.onclick=()=>{rho=Number(b.dataset.rho);mat=b.dataset.name;document.querySelectorAll('#mat button').forEach(x=>x.classList.toggle('on',x===b));draw()});
function loop(now){if(window.__paused){requestAnimationFrame(loop);return;}const dt=Math.min((now-last)/1000,.05);last=now;phase+=Math.min(70,I())*dt;draw();requestAnimationFrame(loop)}
draw();requestAnimationFrame(loop);
var _pb=document.getElementById("play-btn");if(_pb)_pb.onclick=function(){window.__paused=!window.__paused;this.textContent=window.__paused?"▶ 播放":"⏸ 暂停";var st=document.getElementById("run-st");if(st)st.textContent=window.__paused?"已暂停":"运行中";};
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
