<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电势差与电场力做功实验台</title>
<style>
:root{--ink:#102a43;--muted:#52677a;--line:#d9e2ec;--blue:#2c7be5;--red:#e03131;--purple:#7b2cbf;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button:hover{background:#f0f4f8}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>电势差：拖 B 点、E 箭头和 q 滑钮，看 U=Ed 与 W=qU</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="电势差与做功交互实验台"></canvas><div style="padding:6px 10px;display:flex;gap:12px;align-items:center;font-size:13px;border-top:1px solid #eef2f7"><button id="play-btn" style="font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer">⏸ 暂停</button><span>状态：<b id="run-st">运行中</b></span></div></div>
    <section class="panel">
      <div class="tools">
        <button id="play" data-audit-play>演示 A→B</button>
        <button id="reset">复位</button>
      </div>
      <div class="read">
        <div class="chip">场强 E = <b id="ev">200</b> V/m</div>
        <div class="chip">沿 E 距离 d = <b id="dv">0.080</b> m</div>
        <div class="chip">电势差 UAB = φA-φB = <b id="uv">16.0</b> V</div>
        <div class="chip">电荷 q = <b id="qv">+2.0</b> μC</div>
        <div class="chip">电场力做功 WAB = qUAB = <b id="wv">32.0</b> μJ</div>
      </div>
      <div class="hint"><b>观察任务</b>：拖动蓝色 B 点，先横向拖、再沿红色 E 方向拖，比较 U 的变化；拖动紫色 E 箭头端点看 U=Ed；拖动底部 q 滑钮，看 q 只改 W，不改 U。</div>
      <div class="formula">
        <b>画面绑定</b><br>
        红箭头是电场方向；虚线竖距是 d；右侧读数 UAB=E·d。黄色 q 从 A 到 B 时，电场力做功 WAB=qUAB。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height,pxPerM=1500;
let E=200,q=2,playing=false,prog=0,drag=null;
let A={x:295,y:145},B={x:440,y:265};
const minE=60,maxE=520;
const els={ev:id('ev'),dv:id('dv'),uv:id('uv'),qv:id('qv'),wv:id('wv')};
function id(s){return document.getElementById(s)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dPar(){return (B.y-A.y)/pxPerM}
function U(){return E*dPar()}
function Wj(){return q*U()}
function eLen(){return 46+(E-minE)/(maxE-minE)*126}
function setEFromLen(len){E=clamp(minE+(clamp(len,46,172)-46)/126*(maxE-minE),minE,maxE)}
function qX(){return 170+(q+5)/10*390}
function setQFromX(x){q=clamp((clamp(x,170,560)-170)/390*10-5,-5,5)}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-.45),y2-9*Math.sin(a-.45));ctx.lineTo(x2-9*Math.cos(a+.45),y2-9*Math.sin(a+.45));ctx.closePath();ctx.fill();
}
function plateScene(){
  const left=115,right=615,top=82,bottom=342;
  ctx.fillStyle='#fff8f0';ctx.fillRect(left,top,right-left,bottom-top);
  ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1.5;ctx.strokeRect(left,top,right-left,bottom-top);
  ctx.fillStyle='#e03131';ctx.fillRect(left,top-8,right-left,8);
  ctx.fillStyle='#2c7be5';ctx.fillRect(left,bottom,right-left,8);
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.textAlign='left';ctx.fillText('高电势板 φ 高',left,top-18);
  ctx.textAlign='right';ctx.fillText('低电势板 φ 低',right,bottom+28);
  for(let x=150;x<=580;x+=72)arrow(x,top+24,x,bottom-22,'rgba(224,49,49,.78)',2.2);
  ctx.setLineDash([7,5]);ctx.strokeStyle='#2c7be5';ctx.lineWidth=1.6;
  for(let y=top+42;y<bottom;y+=42){ctx.beginPath();ctx.moveTo(left+12,y);ctx.lineTo(right-12,y);ctx.stroke()}
  ctx.setLineDash([]);
}
function drawPoints(){
  ctx.strokeStyle='rgba(8,127,91,.65)';ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(A.x,B.y);ctx.lineTo(B.x,B.y);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#087f5b';ctx.beginPath();ctx.arc(A.x,A.y,8,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('A',A.x,A.y+1);
  ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(B.x,B.y,11,0,7);ctx.fill();
  ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='700 12px system-ui';ctx.fillText('B',B.x,B.y+1);
  ctx.fillStyle='#087f5b';ctx.font='12px system-ui';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('d 只取沿 E 方向的距离',A.x+12,(A.y+B.y)/2);
}
function drawEHandle(){
  const x=72,y=112,len=eLen();
  arrow(x,y,x,y+len,'#7b2cbf',4);
  ctx.fillStyle='#7b2cbf';ctx.beginPath();ctx.arc(x,y+len,9,0,7);ctx.fill();
  ctx.fillStyle='#7b2cbf';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.fillText('拖 E',x,y-14);
}
function drawQRail(){
  const y=404,x1=170,x2=560,x=qX();
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.fillStyle='#52677a';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('-5 μC',x1,y+25);ctx.fillText('0',365,y+25);ctx.fillText('+5 μC',x2,y+25);
  ctx.fillStyle=q>=0?'#e03131':'#2c7be5';ctx.beginPath();ctx.arc(x,y,12,0,7);ctx.fill();
  ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.fillText('拖 q 滑钮',365,y-18);
}
function drawCharge(){
  const x=A.x+(B.x-A.x)*prog,y=A.y+(B.y-A.y)*prog;
  ctx.fillStyle=q>=0?'#ffd166':'#7bb6ff';ctx.beginPath();ctx.arc(x,y,10,0,7);ctx.fill();
  ctx.strokeStyle='#8a5a00';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#5a3d00';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(q>=0?'+q':'-q',x,y+1);
  const sign=q>=0?1:-1;arrow(x+18,y,x+18,y+sign*34,'#f0a500',3);
}
function update(){
  els.ev.textContent=E.toFixed(0);
  els.dv.textContent=dPar().toFixed(3);
  els.uv.textContent=U().toFixed(1);
  els.qv.textContent=(q>=0?'+':'')+q.toFixed(1);
  els.wv.textContent=Wj().toFixed(1);
}
function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  plateScene();drawPoints();drawEHandle();drawQRail();drawCharge();
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('UAB = E·d = '+E.toFixed(0)+'×'+dPar().toFixed(3)+' = '+U().toFixed(1)+' V',26,32);
  ctx.fillText('WAB = qUAB = '+(q>=0?'+':'')+q.toFixed(1)+' μC × '+U().toFixed(1)+' V = '+Wj().toFixed(1)+' μJ',26,52);
  update();
}
cv.addEventListener('pointerdown',e=>{
  const p=pos(e),ex=72,ey=112+eLen();
  if(Math.hypot(p.x-B.x,p.y-B.y)<24){drag='B';cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-ex,p.y-ey)<24){drag='E';cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-qX(),p.y-404)<24){drag='q';cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e);
  if(drag==='B'){B.x=clamp(p.x,150,585);B.y=clamp(p.y,105,328)}
  if(drag==='E')setEFromLen(p.y-112);
  if(drag==='q')setQFromX(p.x);
  playing=false;id('play').textContent='演示 A→B';prog=drag==='B'?prog:0;render();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
id('play').onclick=()=>{playing=!playing;id('play').textContent=playing?'暂停':'演示 A→B'};
id('reset').onclick=()=>{E=200;q=2;A={x:295,y:145};B={x:440,y:265};prog=0;playing=false;id('play').textContent='演示 A→B';render()};
let last=performance.now();
function loop(now){if(window.__paused){requestAnimationFrame(loop);return;}const dt=Math.min((now-last)/1000,.05);last=now;if(playing){prog+=dt*.45;if(prog>=1){prog=1;playing=false;id('play').textContent='演示 A→B'}render()}requestAnimationFrame(loop)}
render();requestAnimationFrame(loop);
var _pb=document.getElementById("play-btn");if(_pb)_pb.onclick=function(){window.__paused=!window.__paused;this.textContent=window.__paused?"▶ 播放":"⏸ 暂停";var st=document.getElementById("run-st");if(st)st.textContent=window.__paused?"已暂停":"运行中";};
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
