<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电荷与起电实验台：电子转移与电荷守恒</title>
<link rel="icon" href="data:,">
<style>
  :root { --ink:#102a43; --muted:#486581; --line:#d9e2ec; --blue:#2c7be5; --red:#c92a2a; --green:#087f5b; --orange:#f08c00; --paper:#f7f9fc; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
  .lab { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:12px; padding:12px; min-height:540px; }
  .stage,.card { background:#fff; border:1px solid var(--line); border-radius:8px; }
  .stage { overflow:hidden; position:relative; }
  canvas { display:block; width:100%; height:auto; touch-action:none; cursor:crosshair; }
  .hint { position:absolute; left:12px; bottom:10px; color:var(--muted); background:rgba(255,255,255,.9); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-size:12px; }
  .panel { display:flex; flex-direction:column; gap:10px; }
  .card { padding:10px; }
  .task { background:#fff7e6; border-left:3px solid var(--orange); color:var(--muted); line-height:1.5; font-size:13px; }
  .title { font-weight:700; margin-bottom:7px; }
  .param { display:grid; gap:3px; margin:9px 0; font-size:13px; }
  .param span { display:flex; justify-content:space-between; gap:10px; color:var(--muted); }
  .param b { color:var(--ink); font-variant-numeric:tabular-nums; white-space:nowrap; }
  input[type=range] { width:100%; accent-color:var(--blue); }
  .buttons { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  button { border:1px solid #b0bcc9; background:#fff; border-radius:6px; padding:7px 8px; cursor:pointer; color:var(--ink); font-size:13px; }
  button:hover { background:#eef2f7; }
  button.on { background:#e8f2ff; border-color:#8bbcff; color:#174ea6; font-weight:700; }
  .readout { background:var(--ink); color:#d9e2ec; border-radius:8px; padding:10px; line-height:1.75; font-size:13px; }
  .readout b { color:#ffd166; font-variant-numeric:tabular-nums; }
  .formula { font-size:13px; line-height:1.55; color:#334e68; }
  .status { font-size:13px; font-weight:700; border-radius:6px; padding:8px; border:1px solid #38b2ac; background:#e6fffa; color:var(--green); }
  @media (max-width:780px){ .lab{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="lab">
  <div class="stage">
    <canvas id="canvas" width="920" height="540" aria-label="电荷与起电实验台：电子转移装置、电荷读数图像和数据记录"></canvas>
    <div class="hint">可直接拖动中间电子手柄，改变转移的电子个数</div>
  </div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动电子手柄，对照电子转移装置、电荷读数图像和数据记录，看电子从哪边转到哪边；总电荷是否始终守恒。</div>
    <button id="playBtn" style="width:100%">▶ 播放电子转移动画</button>
    <div class="card">
      <div class="title">实验控制</div>
      <div class="buttons">
        <button class="on" data-mode="friction">摩擦起电</button>
        <button data-mode="contact">接触起电</button>
        <button data-mode="induction">感应起电</button>
        <button data-mode="quantum">元电荷</button>
      </div>
      <label class="param"><span>电子转移数 n <b id="nText">6 个</b></span><input id="n" type="range" min="-12" max="12" step="1" value="6"></label>
      <div class="buttons">
        <button data-case="glass">玻璃棒失电子</button>
        <button data-case="rubber">橡胶棒得电子</button>
        <button data-case="share">接触平分</button>
        <button data-case="invalid">非整数尝试</button>
      </div>
    </div>
    <div class="readout">
      qA=<b id="qaText">+6e</b>　qB=<b id="qbText">-6e</b><br>
      q总=<b id="sumText">0e</b>　n=<b id="nRead">6</b><br>
      量子化检查：<b id="validText">通过</b>
    </div>
    <div class="card formula">
      <div class="title">公式对照</div>
      <div>电子转移：失去电子带正电，得到电子带负电。</div>
      <div>电荷守恒：qA + qB 不会凭空改变。</div>
      <div>元电荷：q = ne，n 必须是整数。</div>
    </div>
    <div class="status" id="status">摩擦起电不是创造电荷，而是电子从一个物体转移到另一个物体。</div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const root = document.defaultView || globalThis;
  const els = { n: document.getElementById('n') };
  const ui = {
    nText: document.getElementById('nText'), qaText: document.getElementById('qaText'), qbText: document.getElementById('qbText'),
    sumText: document.getElementById('sumText'), nRead: document.getElementById('nRead'), validText: document.getElementById('validText'), status: document.getElementById('status')
  };
  const state = { mode:'friction', drag:false, hot:{}, playing:false, playT:0 };

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function n(){ return Number(els.n.value); }
  function fmtCharge(v){ return (v>0?'+':'') + v + 'e'; }
  function setN(v){ els.n.value = String(Math.round(clamp(v, -12, 12))); }

  function charges(){
    const k = n();
    if(state.mode === 'contact') return { a:2, b:2, sum:4, note:'相同金属球接触后，总电荷守恒并平均分配。', valid:true };
    if(state.mode === 'induction') return { a:0, b:0, left:-Math.abs(k), right:Math.abs(k), sum:0, note:'感应起电先是电荷重新分布；导体总电荷仍可为 0。', valid:true };
    if(state.mode === 'quantum') {
      const invalid = document.body.dataset.invalid === '1';
      return { a: invalid ? 1.5 : k, b:0, sum: invalid ? 1.5 : k, note:invalid ? '1.5e 不是整数倍电荷量，孤立带电体不可能这样带电。' : 'q=ne，n 为整数，电荷量子化检查通过。', valid:!invalid };
    }
    return { a:k, b:-k, sum:0, note:'摩擦起电不是创造电荷，而是电子从一个物体转移到另一个物体。', valid:true };
  }

  function text(s,x,y,color,align,size,weight){
    ctx.fillStyle=color||'#102a43';
    ctx.font=(weight?weight+' ':'')+(size||13)+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign=align||'center'; ctx.textBaseline='middle'; ctx.fillText(s,x,y);
  }
  function box(x,y,w,h,fill,stroke){ ctx.save(); ctx.fillStyle=fill; ctx.strokeStyle=stroke||'#d9e2ec'; ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke(); ctx.restore(); }
  function arrow(x1,y1,x2,y2,color){ const a=Math.atan2(y2-y1,x2-x1); ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45)); ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45)); ctx.closePath(); ctx.fill(); ctx.restore(); }
  function drawChargeLabel(x,y,q,label){
    const color = q >= 0 ? '#c92a2a' : '#2c7be5';
    const g=ctx.createRadialGradient(x-9,y-9,4,x,y,30); g.addColorStop(0, q>=0?'#ff8a76':'#7bb6ff'); g.addColorStop(1,color);
    ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=14;
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.fill();
    ctx.restore();
    text(q > 0 ? '+' : (q < 0 ? '-' : '0'), x, y-2, '#fff', 'center', 24, '700');
    text(label, x, y+48, '#102a43', 'center', 13, '700');
    text(fmtCharge(q), x, y+68, color, 'center', 13, '700');
  }

  function drawElectrons(count, x1, x2, y){
    const total = Math.min(12, Math.abs(count));
    for(let i=0;i<total;i++){
      const t = total === 1 ? .5 : i/(total-1);
      const x = x1 + (x2-x1)*t;
      ctx.fillStyle='#2c7be5'; ctx.beginPath(); ctx.arc(x,y + (i%2 ? 10 : -10),8,0,Math.PI*2); ctx.fill();
      text('e-', x, y + (i%2 ? 10 : -10), '#fff', 'center', 8, '700');
    }
  }

  function draw(){
    const c = charges();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#f7f9fc'; ctx.fillRect(0,0,canvas.width,canvas.height);
    box(28,48,864,250,'#fff','#d9e2ec');
    text('起电本质：电子转移或重新分布，电荷总量守恒',460,76,'#102a43','center',18,'700');
    const ax=210, bx=710, y=180;
    if(state.mode === 'induction'){
      drawChargeLabel(ax,y,0,'导体整体');
      box(420,130,160,100,'#eef2ff','#9fb3c8');
      text('导体内部',500,154,'#102a43','center',13,'700');
      text('- - -',462,194,'#2c7be5','center',20,'700');
      text('+ + +',538,194,'#c92a2a','center',20,'700');
      drawChargeLabel(bx,y,-Math.abs(n()),'靠近的带电体');
      text('左负右正只是分布改变，总电荷仍为 0。',460,276,'#486581','center',13);
    } else {
      drawChargeLabel(ax,y,c.a,'物体 A');
      drawChargeLabel(bx,y,c.b,'物体 B');
      if(state.mode === 'friction'){
        const dir = n() >= 0 ? 1 : -1;
        arrow(dir > 0 ? ax+48 : bx-48, y, dir > 0 ? bx-48 : ax+48, y, '#2c7be5');
        text('电子转移',460,y-28,'#2c7be5','center',13,'700');
        drawElectrons(n(), ax+98, bx-98, y+42);
        if(state.playing){
          const from = dir>0 ? bx-52 : ax+52, to = dir>0 ? ax+52 : bx-52;
          const f = (Math.sin(state.playT)+1)/2, ex = from+(to-from)*f;
          ctx.fillStyle='#ffd166'; ctx.beginPath(); ctx.arc(ex,y,10,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle='#8a5a00'; ctx.lineWidth=2; ctx.stroke();
          text('e-',ex,y,'#5a3d00','center',9,'700');
        }
      } else if(state.mode === 'contact'){
        arrow(ax+52,y,bx-52,y,'#087f5b');
        text('接触后电荷共享：(+6e-2e)/2=+2e',460,y-28,'#087f5b','center',13,'700');
      } else {
        text(c.valid ? 'q=ne，n 是整数。' : '1.5e 不是整数倍。',460,y-28,c.valid?'#087f5b':'#c92a2a','center',15,'700');
      }
    }
    const left=190, right=730, trackY=350;
    box(88,314,744,142,'#fff','#d9e2ec');
    text('直接拖动电子手柄',460,338,'#102a43','center',14,'700');
    ctx.strokeStyle='#9fb3c8'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(left,trackY); ctx.lineTo(right,trackY); ctx.stroke();
    const knobX = left + (n()+12)/24*(right-left);
    state.hot.knob={x:knobX,y:trackY,left,right};
    ctx.fillStyle='#ffd166'; ctx.strokeStyle='#8a5a00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(knobX,trackY,14,0,Math.PI*2); ctx.fill(); ctx.stroke();
    text(n()+' 个电子',knobX,trackY+34,'#8a5a00','center',12,'700');
    text('向左：B 失电子　向右：A 失电子',460,420,'#486581','center',13);
    updatePanel(c);
  }

  function updatePanel(c){
    ui.nText.textContent = n() + ' 个';
    ui.qaText.textContent = fmtCharge(c.a);
    ui.qbText.textContent = fmtCharge(c.b);
    ui.sumText.textContent = (c.sum > 0 ? '+' : '') + c.sum + 'e';
    ui.nRead.textContent = String(n());
    ui.validText.textContent = c.valid ? '通过' : '不可能';
    ui.validText.style.color = c.valid ? '#ffd166' : '#ff9b9b';
    ui.status.textContent = c.note;
    ui.status.style.background = c.valid ? '#e6fffa' : '#fff0f0';
    ui.status.style.color = c.valid ? '#087f5b' : '#c92a2a';
    ui.status.style.borderColor = c.valid ? '#38b2ac' : '#ff6b6b';
  }

  function eventPos(ev){ const src=ev.touches&&ev.touches.length?ev.touches[0]:(ev.changedTouches&&ev.changedTouches.length?ev.changedTouches[0]:ev); const r=canvas.getBoundingClientRect(); return {x:(src.clientX-r.left)*canvas.width/r.width,y:(src.clientY-r.top)*canvas.height/r.height}; }
  function setFromX(x){ const h=state.hot.knob; setN((x-h.left)/(h.right-h.left)*24-12); }
  function start(ev){ const p=eventPos(ev); const h=state.hot.knob; if(Math.hypot(p.x-h.x,p.y-h.y)<24){ state.drag=true; setFromX(p.x); draw(); ev.preventDefault(); } }
  function move(ev){ if(!state.drag)return; setFromX(eventPos(ev).x); document.body.dataset.invalid='0'; draw(); ev.preventDefault(); }
  function end(){ state.drag=false; }
  if(root.PointerEvent){ canvas.addEventListener('pointerdown',start); canvas.addEventListener('pointermove',move); ['pointerup','pointercancel','pointerleave'].forEach(t=>canvas.addEventListener(t,end)); }
  else { canvas.addEventListener('mousedown',start); root.addEventListener('mousemove',move); root.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start,{passive:false}); root.addEventListener('touchmove',move,{passive:false}); root.addEventListener('touchend',end); root.addEventListener('touchcancel',end); }
  els.n.addEventListener('input',()=>{ document.body.dataset.invalid='0'; draw(); });
  const playBtn = document.getElementById('playBtn');
  function animate(){ if(!state.playing)return; state.playT+=0.08; draw(); root.requestAnimationFrame(animate); }
  playBtn.addEventListener('click',()=>{
    state.playing = !state.playing;
    playBtn.textContent = state.playing ? '⏸ 暂停动画' : '▶ 播放电子转移动画';
    if(state.playing) animate(); else draw();
  });
  document.querySelectorAll('button[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{ state.mode=btn.dataset.mode; document.body.dataset.invalid='0'; document.querySelectorAll('button[data-mode]').forEach(b=>b.classList.toggle('on',b===btn)); draw(); }));
  document.querySelectorAll('button[data-case]').forEach(btn=>btn.addEventListener('click',()=>{ const id=btn.dataset.case; document.body.dataset.invalid='0'; if(id==='glass'){ state.mode='friction'; setN(6); } if(id==='rubber'){ state.mode='friction'; setN(-6); } if(id==='share'){ state.mode='contact'; setN(4); } if(id==='invalid'){ state.mode='quantum'; setN(2); document.body.dataset.invalid='1'; } document.querySelectorAll('button[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode)); draw(); }));
  draw();
})();
</script>
</body>
</html>
