<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电荷与起电实验台</title>
<link rel="icon" href="data:,">
<style>
  :root { --ink:#102a43; --muted:#486581; --line:#d9e2ec; --blue:#2c7be5; --red:#c92a2a; --green:#087f5b; --orange:#f08c00; --paper:#f7f9fc; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
  .lab { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:12px; padding:12px; }
  .stage,.card { background:#fff; border:1px solid var(--line); border-radius:8px; }
  .stage { overflow:hidden; position:relative; }
  canvas { display:block; width:100%; touch-action:none; }
  .hint { position:absolute; left:12px; bottom:10px; color:var(--muted); background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-size:12px; }
  .panel { display:flex; flex-direction:column; gap:10px; }
  .card { padding:10px; }
  .task { background:#fff7e6; border-left:3px solid var(--orange); color:var(--muted); line-height:1.5; font-size:13px; }
  .title { font-weight:700; margin-bottom:7px; }
  .param { display:grid; gap:3px; margin:9px 0; font-size:13px; }
  .param span { display:flex; justify-content:space-between; gap:10px; color:var(--muted); }
  .param b { color:var(--ink); font-variant-numeric:tabular-nums; white-space:nowrap; }
  input[type=range] { width:100%; accent-color:var(--blue); }
  .buttons { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  button { border:1px solid #b0bcc9; background:#fff; border-radius:6px; padding:7px 8px; cursor:pointer; color:var(--ink); font-size:13px; }
  button:hover { background:#eef2f7; }
  button.on { background:#e8f2ff; border-color:#8bbcff; color:#174ea6; font-weight:700; }
  .readout { background:var(--ink); color:#d9e2ec; border-radius:8px; padding:10px; line-height:1.75; font-size:13px; }
  .readout b { color:#ffd166; font-variant-numeric:tabular-nums; }
  .formula { font-size:13px; line-height:1.55; color:#334e68; }
  .status { font-size:13px; font-weight:700; border-radius:6px; padding:8px; border:1px solid #38b2ac; background:#e6fffa; color:var(--green); }
  @media (max-width:780px){ .lab{ grid-template-columns:1fr; padding:8px; } .panel{ gap:8px; } .hint{ left:8px; bottom:8px; font-size:11px; } }
</style>
</head>
<body>
<div class="lab">
  <div class="stage">
    <canvas id="canvas" aria-label="电荷与起电实验台：电子转移、金属球接触和静电感应"></canvas>
    <div class="hint">拖动黄色手柄；每个模式都把读数和画面同步显示</div>
  </div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动手柄，先看电子从哪里到哪里，再看 qA、qB 和 q总如何变化。切换到感应模式后，按顺序操作“接地”“移开带电体”。</div>
    <button id="playBtn" style="width:100%">▶ 播放过程</button>
    <div class="card">
      <div class="title">选择起电过程</div>
      <div class="buttons">
        <button class="on" data-mode="friction">摩擦起电</button>
        <button data-mode="contact">接触起电</button>
        <button data-mode="induction">静电感应</button>
        <button data-mode="quantum">元电荷检查</button>
      </div>
      <label class="param"><span id="nLabel">电子转移数 n <b id="nText">+6 个</b></span><input id="n" type="range" min="-12" max="12" step="1" value="6"></label>
      <div class="buttons">
        <button data-case="glass">玻璃棒失电子</button>
        <button data-case="rubber">橡胶棒得电子</button>
        <button data-case="share">接触平分</button>
        <button data-case="invalid">非整数尝试</button>
      </div>
      <button id="inductionStep" style="display:none;width:100%;margin-top:8px">接地</button>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card formula">
      <div class="title">公式与画面</div>
      <div><b>q=ne：</b>手柄给出 n，元电荷检查只接受整数 n。</div>
      <div><b>电荷守恒：</b>电子只转移或重新分布，不凭空产生。</div>
      <div><b>接触平分：</b>相同金属球接触后，电势相同，电荷平均分配。</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const root = document.defaultView || globalThis;
  const els = { n: document.getElementById('n'), nLabel: document.getElementById('nLabel'), nText: document.getElementById('nText'), readout: document.getElementById('readout'), status: document.getElementById('status'), play: document.getElementById('playBtn'), inductionStep: document.getElementById('inductionStep') };
  const state = { mode:'friction', drag:false, hot:{}, invalid:false, inductionStage:0, playing:false, progress:0, raf:0, W:920, H:540, dpr:1 };

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function n(){ return Number(els.n.value); }
  function signCharge(v){ return v > 0 ? '+' : ''; }
  function fmt(v){ const rounded = Math.round(v*10)/10; return (rounded > 0 ? '+' : '') + rounded + 'e'; }
  function formulaFmt(v){ const rounded=Math.round(v*10)/10; return rounded>0?'+'+rounded+'e':rounded<0?'−'+Math.abs(rounded)+'e':'0e'; }
  function setN(v){ els.n.value = String(Math.round(clamp(v,-12,12))); state.invalid=false; }
  function modeData(){
    const k=n();
    if(state.mode==='contact'){
      const initialB=-2, total=k+initialB, each=total/2;
      return { initialA:k, initialB, total, a:each, b:each, valid:true, note:'相同金属球：先守恒相加，再把总电荷平均分给两球。' };
    }
    if(state.mode==='induction'){
      const ext=k, amount=Math.abs(k), dir=ext===0?1:Math.sign(ext);
      const near=-dir*amount, far=dir*amount;
      const final=-dir*amount;
      return { ext, amount, near, far, final, valid:true, note: state.inductionStage===0 ? '只靠近、不接触：自由电子重新分布，导体总电荷仍为 0。' : state.inductionStage===1 ? '接地后电子从地面流入或流出；带电体仍未接触导体。' : '移开带电体后，导体保留与外部带电体相反的电荷。' };
    }
    if(state.mode==='quantum'){
      return { a:state.invalid?1.5:k, b:0, sum:state.invalid?1.5:k, valid:!state.invalid, note:state.invalid?'1.5e 不是元电荷 e 的整数倍，孤立带电体不能带这种电荷。':'n 是整数，q=ne 检查通过。' };
    }
    return { a:k, b:-k, sum:0, valid:true, note:'摩擦起电不是创造电荷，而是电子从一个物体转移到另一个物体。' };
  }
  function text(s,x,y,color,align,size,weight){ ctx.fillStyle=color||'#102a43'; ctx.font=(weight?weight+' ':'')+(size||13)+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif'; ctx.textAlign=align||'center'; ctx.textBaseline='middle'; ctx.fillText(s,x,y); }
  function box(x,y,w,h,fill,stroke){ ctx.save(); ctx.fillStyle=fill; ctx.strokeStyle=stroke||'#d9e2ec'; ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke(); ctx.restore(); }
  function arrow(x1,y1,x2,y2,color){ const a=Math.atan2(y2-y1,x2-x1); ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45)); ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45)); ctx.closePath(); ctx.fill(); ctx.restore(); }
  function chargeColor(q){ return q>=0?'#c92a2a':'#2c7be5'; }
  function drawCharge(x,y,q,label,sub){ const color=chargeColor(q); ctx.save(); const g=ctx.createRadialGradient(x-9,y-9,4,x,y,30); g.addColorStop(0,q>=0?'#ff8a76':'#7bb6ff'); g.addColorStop(1,color); ctx.shadowColor=color; ctx.shadowBlur=14; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.fill(); ctx.restore(); text(q>0?'+':q<0?'-':'0',x,y-2,'#fff','center',24,'700'); text(label,x,y+46,'#102a43','center',13,'700'); if(sub) text(sub,x,y+65,color,'center',12,'700'); else text(fmt(q),x,y+65,color,'center',12,'700'); }
  function drawElectrons(count,x1,x2,y){ const total=Math.min(12,Math.abs(Math.round(count))); for(let i=0;i<total;i++){ const t=total===1?.5:i/(total-1); const x=x1+(x2-x1)*t; ctx.fillStyle='#2c7be5'; ctx.beginPath(); ctx.arc(x,y+(i%2?10:-10),8,0,Math.PI*2); ctx.fill(); text('e−',x,y+(i%2?10:-10),'#fff','center',8,'700'); } }
  function responsive(){ const width=clamp(canvas.parentElement.getBoundingClientRect().width,320,920); state.W=width; state.H=width<600?620:540; state.dpr=Math.min(2,root.devicePixelRatio||1); canvas.width=Math.round(width*state.dpr); canvas.height=Math.round(state.H*state.dpr); canvas.style.height=state.H+'px'; ctx.setTransform(state.dpr,0,0,state.dpr,0,0); draw(); }
  function draw(){
    const W=state.W,H=state.H,d=modeData(), mobile=W<600; ctx.clearRect(0,0,W,H); ctx.fillStyle='#f7f9fc'; ctx.fillRect(0,0,W,H); box(12,16,W-24,mobile?330:270,'#fff','#d9e2ec'); text(state.mode==='friction'?'电子从一个物体转移到另一个物体':state.mode==='contact'?'相同金属球接触，电荷平均分配':state.mode==='induction'?'靠近 → 接地 → 移开：静电感应全过程':'电荷量子化：q=ne',W/2,42,'#102a43','center',mobile?16:18,'700');
    const ax=W*.28,bx=W*.72,y=mobile?170:160;
    if(state.mode==='friction'){
      drawCharge(ax,y,d.a,'物体 A',fmt(d.a)); drawCharge(bx,y,d.b,'物体 B',fmt(d.b)); const dir=n()>=0?1:-1; arrow(dir>0?ax+48:bx-48,y,dir>0?bx-48:ax+48,y,'#2c7be5'); text(dir>0?'电子 A → B':'电子 B → A',W/2,y-36,'#2c7be5','center',13,'700'); drawElectrons(n(),ax+82,bx-82,y+40); if(state.playing){ const from=dir>0?ax+58:bx-58,to=dir>0?bx-58:ax+58,x=from+(to-from)*state.progress; ctx.fillStyle='#ffd166'; ctx.strokeStyle='#8a5a00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill(); ctx.stroke(); text('e−',x,y,'#5a3d00','center',9,'700'); }
    } else if(state.mode==='contact'){
      drawCharge(ax,y,d.initialA,'A 接触前',fmt(d.initialA)); drawCharge(bx,y,d.initialB,'B 接触前',fmt(d.initialB)); arrow(ax+50,y,bx-50,y,'#087f5b'); text('金属球接触',W/2,y-36,'#087f5b','center',13,'700'); const p=state.playing?state.progress:1; const qa=d.initialA+(d.a-d.initialA)*p,qb=d.initialB+(d.b-d.initialB)*p; box(W*.16,mobile?250:238,W*.68,42,'#edf9f3','#74c69d'); text('接触后：qA=qB=('+fmt(d.total)+')/2='+fmt(d.a),W/2,mobile?271:259,'#087f5b','center',mobile?12:13,'700'); text('释放后',W/2,mobile?309:297,'#486581','center',12); drawCharge(W*.42,mobile?305:293,qa,'A',fmt(qa)); drawCharge(W*.58,mobile?305:293,qb,'B',fmt(qb));
    } else if(state.mode==='induction'){
      const ext=d.ext, bodyX=W*.48, bodyY=y+4; if(state.inductionStage<2) drawCharge(W*.82,y,ext,'外部带电体',fmt(ext)); else text('外部带电体已移开',W*.72,y,'#486581','center',13,'700'); box(W*.31,y-48,W*.34,104,'#eef2ff','#9fb3c8'); text('金属导体',bodyX,y-28,'#102a43','center',13,'700'); if(state.inductionStage===0){ text(d.near+'e',bodyX-W*.115,y+14,'#2c7be5','center',16,'700'); text(d.far+'e',bodyX+W*.115,y+14,'#c92a2a','center',16,'700'); text('近侧',bodyX-W*.115,y+38,'#486581','center',11); text('远侧',bodyX+W*.115,y+38,'#486581','center',11); text('q导体总=0e',bodyX,y+82,'#087f5b','center',13,'700'); } else if(state.inductionStage===1){ text('电子 ↔ 地面',bodyX,y+10,'#2c7be5','center',15,'700'); arrow(bodyX,y+54,bodyX,y+82,'#2c7be5'); text('接地中',bodyX,y+94,'#2c7be5','center',12,'700'); } else { text(fmt(d.final),bodyX,y+10,chargeColor(d.final),'center',20,'700'); text('导体保留电荷',bodyX,y+40,'#087f5b','center',12,'700'); } if(state.inductionStage<2){ text('未接触导体：先观察电荷重新分布',W/2,mobile?266:254,'#486581','center',12); }
    } else {
      drawCharge(W/2,y,d.a,'带电体',fmt(d.a)); text(d.valid?'q=ne，n 为整数':'q=+1.5e，n 不是整数',W/2,y-46,d.valid?'#087f5b':'#c92a2a','center',15,'700'); text(d.valid?'每拖一格就是一个元电荷':'这个电荷量不能单独存在',W/2,y+84,d.valid?'#486581':'#c92a2a','center',13,'700');
    }
    const trackY=mobile?470:355,left=W*.16,right=W*.84; box(W*.08,trackY-38,W*.84,150,'#fff','#d9e2ec'); text(state.mode==='contact'?'改变 A 接触前电荷':state.mode==='induction'?'改变外部带电体电荷':state.mode==='quantum'?'改变整数 n':'拖动电子手柄',W/2,trackY-14,'#102a43','center',14,'700'); ctx.strokeStyle='#9fb3c8'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(left,trackY+18); ctx.lineTo(right,trackY+18); ctx.stroke(); const knobX=left+(n()+12)/24*(right-left); state.hot.knob={x:knobX,y:trackY+18,left,right}; ctx.fillStyle='#ffd166'; ctx.strokeStyle='#8a5a00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(knobX,trackY+18,14,0,Math.PI*2); ctx.fill(); ctx.stroke(); text(signCharge(n())+n()+' 个',knobX,trackY+52,'#8a5a00','center',12,'700'); text('−12',left,trackY+76,'#486581','center',11); text('0',W/2,trackY+76,'#486581','center',11); text('+12',right,trackY+76,'#486581','center',11); text(state.mode==='friction'?'向右：电子 A→B；向左：B→A':'拖动后看上方画面和右侧读数同步变化',W/2,trackY+106,'#486581','center',mobile?11:13);
    updatePanel(d);
  }
  function updatePanel(d){
    const k=n(); els.nText.textContent=(k>0?'+':'')+k+(state.mode==='friction'?' 个':' e'); els.nLabel.firstChild.textContent=state.mode==='contact'?'A 初始电荷 qA0/e ':state.mode==='induction'?'外部带电体 q/e ':state.mode==='quantum'?'整数 n ':'电子转移数 n ';
    let html=''; if(state.mode==='induction'){ const stage=['靠近（未接触）','接地','移开后'][state.inductionStage]; html='<div>步骤：<b>'+stage+'</b></div><div>外部带电体 q=<b>'+fmt(d.ext)+'</b></div><div>导体 q总=<b>'+fmt(state.inductionStage===0?0:d.final)+'</b></div>'+(state.inductionStage<2?'<div>近侧/远侧：<b>'+fmt(d.near)+'</b> / <b>'+fmt(d.far)+'</b></div>':'<div>最终结果：<b>外部带电体已移开，导体保留 '+fmt(d.final)+'</b></div>')+'<div>物理检查：<b>不接触导体</b></div>'; els.inductionStep.style.display='block'; els.inductionStep.textContent=state.inductionStage===0?'接地':state.inductionStage===1?'移开带电体':'重置感应'; }
    else if(state.mode==='contact'){ html='<div>接触前：qA=<b>'+fmt(d.initialA)+'</b>，qB=<b>'+fmt(d.initialB)+'</b></div><div>接触前总电荷：<b>'+fmt(d.total)+'</b></div><div>接触后：qA=qB=<b>'+fmt(d.a)+'</b></div><div>q总（两球）：<b>'+fmt(d.total)+'</b></div><div>公式：<b>('+formulaFmt(d.initialA)+' '+formulaFmt(d.initialB)+')/2='+fmt(d.a)+'</b></div>'; els.inductionStep.style.display='none'; }
    else { html='<div>qA=<b>'+fmt(d.a)+'</b>　qB=<b>'+fmt(d.b)+'</b></div><div>q总=<b>'+fmt(d.sum)+'</b>　n=<b>'+k+'</b></div><div>量子化检查：<b style="color:'+(d.valid?'#ffd166':'#ff9b9b')+'">'+(d.valid?'通过':'不可能')+'</b></div>'; els.inductionStep.style.display='none'; }
    els.readout.innerHTML=html; els.status.textContent=d.note; els.status.style.background=d.valid?'#e6fffa':'#fff0f0'; els.status.style.color=d.valid?'#087f5b':'#c92a2a'; els.status.style.borderColor=d.valid?'#38b2ac':'#ff6b6b';
  }
  function eventPos(ev){ const src=ev.touches&&ev.touches.length?ev.touches[0]:(ev.changedTouches&&ev.changedTouches.length?ev.changedTouches[0]:ev); const r=canvas.getBoundingClientRect(); return {x:(src.clientX-r.left)*state.W/r.width,y:(src.clientY-r.top)*state.H/r.height}; }
  function setFromX(x){ const h=state.hot.knob; setN((x-h.left)/(h.right-h.left)*24-12); }
  function start(ev){ const p=eventPos(ev),h=state.hot.knob; if(Math.hypot(p.x-h.x,p.y-h.y)<28){ state.drag=true; setFromX(p.x); draw(); ev.preventDefault(); } }
  function move(ev){ if(!state.drag)return; setFromX(eventPos(ev).x); draw(); ev.preventDefault(); }
  function end(){ state.drag=false; }
  if(root.PointerEvent){ canvas.addEventListener('pointerdown',start); canvas.addEventListener('pointermove',move); ['pointerup','pointercancel','pointerleave'].forEach(t=>canvas.addEventListener(t,end)); } else { canvas.addEventListener('mousedown',start); root.addEventListener('mousemove',move); root.addEventListener('mouseup',end); canvas.addEventListener('touchstart',start,{passive:false}); root.addEventListener('touchmove',move,{passive:false}); root.addEventListener('touchend',end); }
  els.n.addEventListener('input',()=>{ state.invalid=false; draw(); });
  function playFrame(now){ if(!state.playing)return; if(!state.started)state.started=now; state.progress=clamp((now-state.started)/1400,0,1); draw(); if(state.progress<1)state.raf=root.requestAnimationFrame(playFrame); else { state.playing=false; els.play.textContent='▶ 重播过程'; draw(); } }
  els.play.addEventListener('click',()=>{ if(state.playing){ state.playing=false; els.play.textContent='▶ 继续播放'; if(state.raf)root.cancelAnimationFrame(state.raf); draw(); return; } state.playing=true; state.started=0; state.progress=0; els.play.textContent='⏸ 暂停动画'; state.raf=root.requestAnimationFrame(playFrame); });
  document.querySelectorAll('button[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{ state.mode=btn.dataset.mode; state.invalid=false; state.inductionStage=0; document.querySelectorAll('button[data-mode]').forEach(b=>b.classList.toggle('on',b===btn)); draw(); }));
  document.querySelectorAll('button[data-case]').forEach(btn=>btn.addEventListener('click',()=>{ const id=btn.dataset.case; if(id==='glass'){state.mode='friction';setN(6);} if(id==='rubber'){state.mode='friction';setN(-6);} if(id==='share'){state.mode='contact';setN(6);} if(id==='invalid'){state.mode='quantum';setN(2);state.invalid=true;} document.querySelectorAll('button[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode)); state.inductionStage=0; draw(); }));
  els.inductionStep.addEventListener('click',()=>{ if(state.mode!=='induction')return; state.inductionStage=state.inductionStage===2?0:state.inductionStage+1; draw(); });
  if(root.ResizeObserver){ new ResizeObserver(responsive).observe(canvas.parentElement); } else root.addEventListener('resize',responsive); responsive();
  root.__ANIM_TEST_STATE__={get:()=>({mode:state.mode,n:n(),inductionStage:state.inductionStage,invalid:state.invalid,readout:els.readout.textContent.trim()})};
})();
</script>
</body>
</html>
