<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>平行板电容器实验台</title>
<style>
:root{--ink:#102a43;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b;--purple:#7b2cbf}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
.seg button{border:0;border-radius:0}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button.on{background:#2c7be5;color:#fff}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>平行板电容器：拖板距 d、面积 S，比较接电源与断电源</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="平行板电容器交互实验台：极板侧视装置、C-d图像和数据记录"></canvas></div>
    <section class="panel">
      <button id="playBtn" style="width:100%;margin-bottom:10px">▶ 播放：自动拉开/靠近极板</button>
      <div class="seg" id="mode">
        <button class="on" data-mode="battery">接电源 U不变</button>
        <button data-mode="isolated">断电源 Q不变</button>
      </div>
      <button id="reset" style="width:100%;margin-bottom:10px">复位</button>
      <div class="read">
        <div class="chip">电容 C = <b id="cvv">0</b> pF</div>
        <div class="chip">电压 U = <b id="uv">0</b> V</div>
        <div class="chip">电量 Q = <b id="qv">0</b> pC</div>
        <div class="chip">场强 E≈U/d = <b id="ev">0</b> V/mm</div>
        <div class="chip">板距 d = <b id="dv">0</b> mm，面积 S = <b id="sv">0</b> cm²</div>
        <div class="chip">电容状态：<b id="statev">—</b></div>
      </div>
      <div class="hint"><b>观察任务</b>：拖动蓝色下极板改变 d，对照极板侧视装置、C-d 图像和数据记录；在“接电源”和“断电源”间切换，看 d 变大时 U、Q、E 谁保持不变。</div>
      <div class="formula">
        <b>公式绑定</b><br>
        C=εS/d 绑定到极板面积和间距；接电源时 U 固定、Q=CU；断电源时 Q 固定、U=Q/C。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let mode='battery',d=2.0,S=100,Uset=12,Qset=531,drag=null,playing=false,playT=0;
const Q_MIN=20,Q_MAX=1500;
const els={cvv:id('cvv'),uv:id('uv'),qv:id('qv'),ev:id('ev'),dv:id('dv'),sv:id('sv'),statev:id('statev')};
function id(s){return document.getElementById(s)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function C(){return 0.885*S/d}
function U(){return mode==='battery'?Uset:Qset/C()}
function Q(){return mode==='battery'?C()*Uset:Qset}
function E(){return U()/d}
function plateW(){return 180+(S-40)/160*250}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-8*Math.cos(a-.45),y2-8*Math.sin(a-.45));ctx.lineTo(x2-8*Math.cos(a+.45),y2-8*Math.sin(a+.45));ctx.closePath();ctx.fill();
}
function drawCharge(x,y,sign){ctx.fillStyle=sign>0?'#e03131':'#2c7be5';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.fillText(sign>0?'+':'−',x,y)}
function geometry(){
  const cx=390,top=120,dpx=45+d*31,w=plateW(),x1=cx-w/2,x2=cx+w/2,y1=top,y2=top+dpx;
  return {cx,top,dpx,w,x1,x2,y1,y2};
}
function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  const g=geometry();
  ctx.fillStyle='#fff8f0';ctx.fillRect(g.x1,g.y1,g.w,g.dpx);
  ctx.fillStyle='#e03131';ctx.fillRect(g.x1,g.y1-8,g.w,8);
  ctx.fillStyle='#2c7be5';ctx.fillRect(g.x1,g.y2,g.w,8);
  ctx.strokeStyle='#334e68';ctx.lineWidth=1.5;ctx.strokeRect(g.x1,g.y1-8,g.w,8);ctx.strokeRect(g.x1,g.y2,g.w,8);
  const dots=Math.max(2,Math.min(36,Math.round(Q()/30)));
  for(let i=0;i<dots;i++){const x=g.x1+g.w*(i+.5)/dots;drawCharge(x,g.y1-18,1);drawCharge(x,g.y2+24,-1)}
  for(let x=g.x1+35;x<g.x2-20;x+=62)arrow(x,g.y1+14,x,g.y2-12,'rgba(224,49,49,.75)',2);
  ctx.strokeStyle='#52677a';ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(g.x2+18,g.y1);ctx.lineTo(g.x2+18,g.y2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#52677a';ctx.font='12px system-ui';ctx.textAlign='left';ctx.fillText('拖 d',g.x2+26,(g.y1+g.y2)/2);
  ctx.fillStyle='#f0a500';ctx.fillRect(g.x2+6,g.y1-15,12,g.dpx+30);
  ctx.fillStyle='#8a5a00';ctx.font='12px system-ui';ctx.fillText('拖 S',g.x2+24,g.y1-2);
  if(mode==='battery'){
    ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(74,155);ctx.lineTo(74,235);ctx.moveTo(92,175);ctx.lineTo(92,215);ctx.stroke();
    ctx.fillStyle='#102a43';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('电源 '+Uset.toFixed(0)+'V',84,254);
    ctx.strokeStyle='#334e68';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(74,155);ctx.lineTo(74,g.y1-4);ctx.lineTo(g.x1,g.y1-4);ctx.moveTo(92,215);ctx.lineTo(92,g.y2+4);ctx.lineTo(g.x1,g.y2+4);ctx.stroke();
  }else{
    ctx.fillStyle='#52677a';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.fillText('断开电源：极板电量 Q 固定',190,240);
  }
  drawRail();
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';
  ctx.fillText('C=εS/d='+C().toFixed(1)+' pF，Q=CU='+Q().toFixed(0)+' pC',24,34);
  ctx.fillText(mode==='battery'?'接电源：U 不变，拉大 d 时 C、Q、E 变小':'断电源：Q 不变，拉大 d 时 C 变小、U 变大、E 近似不变',24,54);
  update();
}
function drawRail(){
  const y=404,x1=170,x2=560,t=mode==='battery'?(Uset-4)/26:(Qset-Q_MIN)/(Q_MAX-Q_MIN),x=x1+clamp(t,0,1)*(x2-x1);
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.fillStyle=mode==='battery'?'#e03131':'#7b2cbf';ctx.beginPath();ctx.arc(x,y,12,0,7);ctx.fill();ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.fillText(mode==='battery'?'拖电源电压 U':'拖固定电量 Q',365,y-18);
}
function update(){els.cvv.textContent=C().toFixed(1);els.uv.textContent=U().toFixed(1);els.qv.textContent=Q().toFixed(0);els.ev.textContent=E().toFixed(2);els.dv.textContent=d.toFixed(1);els.sv.textContent=S.toFixed(0);els.statev.textContent=playing?(mode==='battery'?'播放中：U不变，Q、E随d变化':'播放中：Q不变，U随d变化'):'静止'}
cv.addEventListener('pointerdown',e=>{
  if(playing){playing=false;id('playBtn').textContent='▶ 播放：自动拉开/靠近极板'}
  const p=pos(e),g=geometry(),railY=404,railX=mode==='battery'?170+(Uset-4)/26*390:170+(Qset-Q_MIN)/(Q_MAX-Q_MIN)*390;
  if(Math.abs(p.y-g.y2)<22&&p.x>g.x1&&p.x<g.x2){drag='d';cv.style.cursor='grabbing';return}
  if(Math.abs(p.x-(g.x2+12))<24&&p.y>g.y1-25&&p.y<g.y2+25){drag='S';cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-railX,p.y-railY)<24){drag='rail';cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e),g=geometry();
  if(drag==='d')d=clamp((p.y-g.y1-45)/31,.8,5.5);
  if(drag==='S'){const w=clamp((p.x-g.cx)*2,180,430);S=40+(w-180)/250*160}
  if(drag==='rail'){const t=(clamp(p.x,170,560)-170)/390;if(mode==='battery')Uset=4+t*26;else Qset=Q_MIN+t*(Q_MAX-Q_MIN)}
  render();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{
  const oldU=U(), oldQ=Q();
  mode=b.dataset.mode;
  document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));
  if(mode==='isolated')Qset=oldQ;else Uset=oldU;
  render();
});
id('reset').onclick=()=>{playing=false;id('playBtn').textContent='▶ 播放：自动拉开/靠近极板';mode='battery';d=2;S=100;Uset=12;Qset=531;document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x.dataset.mode===mode));render()};
function animate(){
  if(!playing)return;
  playT+=0.02;
  d=clamp(3.15+2.35*Math.sin(playT),0.8,5.5);
  render();
  requestAnimationFrame(animate);
}
id('playBtn').onclick=()=>{
  playing=!playing;
  id('playBtn').textContent=playing?'⏸ 暂停':'▶ 播放：自动拉开/靠近极板';
  if(playing)animate();else render();
};
render();
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
