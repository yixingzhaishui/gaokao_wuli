<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电势能实验台</title>
<style>
:root{--ink:#102a43;--muted:#52677a;--line:#d9e2ec;--red:#e03131;--blue:#2c7be5;--gold:#f0a500;--green:#159a6b}
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;color:var(--ink);font-family:-apple-system,"PingFang SC",system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:14px}
h2{font-size:17px;margin:0 0 10px}
.lab{display:grid;grid-template-columns:minmax(0,1fr)292px;gap:12px;align-items:start}
.stage{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab;background:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
button:hover{background:#f0f4f8}
.read{display:grid;gap:7px}
.chip{background:#102a43;color:#eef4ff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.45}
.chip b{color:#ffd166}
.hint{margin-top:10px;background:#fff7e6;border-left:3px solid var(--gold);border-radius:6px;padding:9px 11px;font-size:13px;color:#5a6b7b;line-height:1.55}
.formula{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:#334e68;line-height:1.7}
@media(max-width:820px){.lab{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h2>电势能：拖电荷位置和 q，观察 Ep=qφ 与 W=-ΔEp</h2>
  <div class="lab">
    <div class="stage"><canvas id="cv" width="720" height="450" aria-label="电势能交互实验台"></canvas><div style="padding:6px 10px;display:flex;gap:12px;align-items:center;font-size:13px;border-top:1px solid #eef2f7"><button id="play-btn" style="font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:5px 12px;cursor:pointer">⏸ 暂停</button><span>状态：<b id="run-st">运行中</b></span></div></div>
    <section class="panel">
      <div class="tools">
        <button id="play">演示 A→B</button>
        <button id="reset">复位</button>
      </div>
      <div class="read">
        <div class="chip">A 点电势 φA = <b id="phiA">0</b> V</div>
        <div class="chip">B 点电势 φB = <b id="phiB">0</b> V</div>
        <div class="chip">电荷 q = <b id="qv">+2.0</b> μC</div>
        <div class="chip">EpA = qφA = <b id="epa">0</b> μJ</div>
        <div class="chip">EpB = qφB = <b id="epb">0</b> μJ</div>
        <div class="chip">WAB = -ΔEp = <b id="work">0</b> μJ</div>
      </div>
      <div class="hint"><b>观察任务</b>：拖动黄色 B 电荷到高/低电势处，比较正电荷和负电荷的 Ep 变化；横向拖动时 φ 不变，Ep 也不变；拖 q 滑钮过 0，看 Ep 的正负关系如何翻转。</div>
      <div class="formula">
        <b>画面绑定</b><br>
        蓝色虚线是等势线；黄色电荷所在位置读 φB；柱状图比较 EpA、EpB。电场力做功等于电势能减少量：WAB=EpA-EpB=-ΔEp。
      </div>
    </section>
  </div>
</div>
<script>
(function(){
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const top=78,bottom=330,left=112,right=610;
let q=2,playing=false,prog=1,drag=null;
let A={x:300,y:135},B={x:430,y:265};
const els={phiA:id('phiA'),phiB:id('phiB'),qv:id('qv'),epa:id('epa'),epb:id('epb'),work:id('work')};
function id(s){return document.getElementById(s)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function phi(p){return 12*(1-(clamp(p.y,top,bottom)-top)/(bottom-top))}
function ep(p){return q*phi(p)}
function work(){return ep(A)-ep(B)}
function qX(){return 170+(q+5)/10*390}
function setQFromX(x){q=clamp((clamp(x,170,560)-170)/390*10-5,-5,5)}
function pos(e){const r=cv.getBoundingClientRect(),s=cv.width/r.width;return{x:(e.clientX-r.left)*s,y:(e.clientY-r.top)*s}}
function arrow(x1,y1,x2,y2,color,w){
  const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=w||2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-.45),y2-9*Math.sin(a-.45));ctx.lineTo(x2-9*Math.cos(a+.45),y2-9*Math.sin(a+.45));ctx.closePath();ctx.fill();
}
function drawField(){
  ctx.fillStyle='#fff8f0';ctx.fillRect(left,top,right-left,bottom-top);
  ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1.5;ctx.strokeRect(left,top,right-left,bottom-top);
  ctx.fillStyle='#e03131';ctx.fillRect(left,top-8,right-left,8);
  ctx.fillStyle='#2c7be5';ctx.fillRect(left,bottom,right-left,8);
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.textAlign='left';ctx.fillText('高电势 12V',left,top-18);
  ctx.textAlign='right';ctx.fillText('低电势 0V',right,bottom+28);
  for(let x=150;x<=580;x+=72)arrow(x,top+24,x,bottom-22,'rgba(224,49,49,.78)',2.2);
  ctx.setLineDash([7,5]);ctx.strokeStyle='#2c7be5';ctx.lineWidth=1.6;
  for(let i=1;i<6;i++){const y=top+(bottom-top)*i/6;ctx.beginPath();ctx.moveTo(left+12,y);ctx.lineTo(right-12,y);ctx.stroke();ctx.fillStyle='#2c7be5';ctx.font='12px system-ui';ctx.textAlign='right';ctx.fillText((12*(1-i/6)).toFixed(0)+'V',left-8,y+4)}
  ctx.setLineDash([]);
}
function drawPoints(){
  ctx.strokeStyle='rgba(8,127,91,.65)';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#087f5b';ctx.beginPath();ctx.arc(A.x,A.y,9,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('A',A.x,A.y+1);
  const x=A.x+(B.x-A.x)*prog,y=A.y+(B.y-A.y)*prog;
  ctx.fillStyle=q>=0?'#ffd166':'#7bb6ff';ctx.beginPath();ctx.arc(x,y,11,0,7);ctx.fill();
  ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#5a3d00';ctx.font='700 11px system-ui';ctx.fillText(q>=0?'+q':'-q',x,y+1);
  ctx.fillStyle='#102a43';ctx.font='12px system-ui';ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText('B 电荷',B.x+16,B.y-10);
  const sign=q>=0?1:-1;arrow(B.x+18,B.y,B.x+18,B.y+sign*34,'#f0a500',3);
}
function drawQRail(){
  const y=404,x1=170,x2=560,x=qX();
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.fillStyle='#52677a';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('-5 μC',x1,y+25);ctx.fillText('0',365,y+25);ctx.fillText('+5 μC',x2,y+25);
  ctx.fillStyle=q>=0?'#e03131':'#2c7be5';ctx.beginPath();ctx.arc(x,y,12,0,7);ctx.fill();ctx.strokeStyle='#102a43';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.fillText('拖 q 滑钮',365,y-18);
}
function drawBars(){
  const zero=265,x0=642,w=22,scale=7;
  const a=ep(A),b=ep(B),ww=work();
  ctx.strokeStyle='#ccd6e0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(620,zero);ctx.lineTo(704,zero);ctx.stroke();
  [['EpA',a,'#087f5b',632],['EpB',b,'#f0a500',662],['W',ww,'#7b2cbf',692]].forEach(([lab,val,col,x])=>{
    const h=clamp(Math.abs(val)*scale,2,135);
    ctx.fillStyle=col;ctx.fillRect(x-w/2,val>=0?zero-h:zero,w,h);
    ctx.fillStyle='#334e68';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText(lab,x,zero+28);
  });
  ctx.save();ctx.translate(708,zero-96);ctx.rotate(-Math.PI/2);ctx.fillStyle='#52677a';ctx.font='12px system-ui';ctx.fillText('能量柱(μJ)',0,0);ctx.restore();
}
function update(){
  els.phiA.textContent=phi(A).toFixed(1);els.phiB.textContent=phi(B).toFixed(1);
  els.qv.textContent=(q>=0?'+':'')+q.toFixed(1);
  els.epa.textContent=ep(A).toFixed(1);els.epb.textContent=ep(B).toFixed(1);els.work.textContent=work().toFixed(1);
}
function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#f8fbff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(16,42,67,.06)';ctx.lineWidth=1;for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  drawField();drawPoints();drawQRail();drawBars();
  ctx.fillStyle='#102a43';ctx.font='13px system-ui';ctx.textAlign='left';
  ctx.fillText('EpA=qφA='+ep(A).toFixed(1)+' μJ，EpB=qφB='+ep(B).toFixed(1)+' μJ',24,32);
  ctx.fillText('WAB=EpA-EpB='+work().toFixed(1)+' μJ；电场力做正功时 Ep 减小',24,52);
  update();
}
cv.addEventListener('pointerdown',e=>{
  const p=pos(e);
  if(Math.hypot(p.x-A.x,p.y-A.y)<24){drag='A';prog=1;cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-B.x,p.y-B.y)<26){drag='B';prog=1;cv.style.cursor='grabbing';return}
  if(Math.hypot(p.x-qX(),p.y-404)<24){drag='q';cv.style.cursor='grabbing';return}
});
cv.addEventListener('pointermove',e=>{
  if(!drag)return;const p=pos(e);
  if(drag==='A'){A.x=clamp(p.x,left+28,right-28);A.y=clamp(p.y,top+18,bottom-18)}
  if(drag==='B'){B.x=clamp(p.x,left+28,right-28);B.y=clamp(p.y,top+18,bottom-18)}
  if(drag==='q')setQFromX(p.x);
  playing=false;id('play').textContent='演示 A→B';render();
});
window.addEventListener('pointerup',()=>{drag=null;cv.style.cursor='grab'});
id('play').onclick=()=>{playing=!playing;if(playing)prog=0;id('play').textContent=playing?'暂停':'演示 A→B';render()};
id('reset').onclick=()=>{q=2;A={x:300,y:135};B={x:430,y:265};prog=1;playing=false;id('play').textContent='演示 A→B';render()};
let last=performance.now();
function loop(now){if(window.__paused){requestAnimationFrame(loop);return;}const dt=Math.min((now-last)/1000,.05);last=now;if(playing){prog+=dt*.45;if(prog>=1){prog=1;playing=false;id('play').textContent='演示 A→B'}render()}requestAnimationFrame(loop)}
render();requestAnimationFrame(loop);
var _pb=document.getElementById("play-btn");if(_pb)_pb.onclick=function(){window.__paused=!window.__paused;this.textContent=window.__paused?"▶ 播放":"⏸ 暂停";var st=document.getElementById("run-st");if(st)st.textContent=window.__paused?"已暂停":"运行中";};
})();
</script>
</body>
</html>
