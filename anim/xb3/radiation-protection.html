<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>射线危害与防护实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tabs button{font-weight:800}.tabs button.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="射线防护实验台装置：αβγ射线源、屏蔽材料、探测器表盘、距离尺、相对响应趋势和数据记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>切换 α、β、γ，直接拖动探测器距离和屏蔽厚度手柄，只比较探测响应随时间、距离、屏蔽的相对趋势。</div>
<div class="card">
<div class="title">选择射线</div>
<div class="tabs"><button id="alpha" class="active">α</button><button id="beta">β</button><button id="gamma">γ</button></div>
<label class="param"><span>距离 d <b id="dLabel">2.0 m</b></span><input id="dist" type="range" min="0.5" max="6" step="0.1" value="2"></label>
<label class="param"><span>屏蔽厚度 x <b id="xLabel">2.0 mm</b></span><input id="thick" type="range" min="0" max="10" step="0.2" value="2"></label>
<label class="param"><span>暴露时间 t <b id="timeLabel">10 min</b></span><input id="time" type="range" min="1" max="60" step="1" value="10"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录方案</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">防护记录</div><table><thead><tr><th>射线</th><th>d</th><th>x</th><th>相对响应</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>防护三原则：缩短时间、增大距离、增加合适的屏蔽。</div><div>示意趋势：响应随 t 增、随 d 增而减；屏蔽效果取决于射线与材料。</div><div>本页没有源活度、能谱、材料衰减系数和剂量标定，不能判断“安全”或输出剂量。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={alpha:document.getElementById('alpha'),beta:document.getElementById('beta'),gamma:document.getElementById('gamma'),dist:document.getElementById('dist'),thick:document.getElementById('thick'),time:document.getElementById('time'),dLabel:document.getElementById('dLabel'),xLabel:document.getElementById('xLabel'),timeLabel:document.getElementById('timeLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={ray:'alpha',run:true,t:0,exposure:10,drag:null,records:[]};
const R={alpha:{name:'α',pen:.18,ion:1,mu:2.4,color:'#e03131',level:'很低',shield:'纸张（外照射示意）'},beta:{name:'β',pen:.48,ion:.55,mu:.75,color:'#2c7be5',level:'中等',shield:'薄铝板（示意）'},gamma:{name:'γ',pen:1,ion:.22,mu:.18,color:'#7c3aed',level:'很高',shield:'厚铅或混凝土（示意）'}};function p(){const r=R[S.ray],d=+els.dist.value,x=+els.thick.value,t=+els.time.value,relative=t/(d*d)*Math.exp(-r.mu*x)*r.pen;const trend=relative<.15?'较低':relative<1?'中等':'较高';return{...r,d,x,t,relative,trend}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('射线危害与防护：时间、距离、屏蔽三原则',460,60,C.ink,'center',17,'900');drawScene(q);drawMeters(q);drawGraph(q);drawHandles(q);update(q)}
function drawScene(q){box(70,96,510,312,'#fbfdff');text('射线源-屏蔽-探测器侧视装置 + 距离尺',325,120,C.muted,'center',12,'800');const source={x:135,y:250},shieldX=310+q.x*10,detX=170+q.d/6*360;ctx.fillStyle=q.color;ctx.beginPath();ctx.arc(source.x,source.y,26,0,7);ctx.fill();text('源 '+q.name,source.x,source.y-45,q.color,'center',13,'900');ctx.fillStyle='#5b7083';ctx.fillRect(shieldX,160,18+q.x*5,180);text('屏蔽 x',shieldX+22,145,C.muted,'center',12,'900');for(let i=-3;i<=3;i++){const yy=source.y+i*18,blocked=q.x*q.mu>1.8&&S.ray!=='gamma';arrow(source.x+30,yy,detX-28,yy+(i*3),blocked?'rgba(130,154,177,.35)':q.color,2.2)}ctx.fillStyle=S.drag==='detector-handle'?C.red:'#829ab1';ctx.fillRect(detX-18,182,36,136);text('拖动探测器',detX,340,C.muted,'center',12,'900');line(source.x,365,detX,365,C.gold,4);text('d='+q.d.toFixed(1)+' m',(source.x+detX)/2,386,C.gold,'center',12,'900')}
function drawMeters(q){box(620,96,226,170,'#fff');text('穿透 / 电离的定性比较',733,120,C.ink,'center',13,'900');meter(654,158,150,18,q.pen,q.color,'穿透',q.level);meter(654,214,150,18,q.ion,C.red,'电离',q.ion>.8?'很强':q.ion>.4?'中等':'较弱');text(q.shield,733,250,C.muted,'center',12,'800')}function meter(x,y,w,h,v,c,label,level){ctx.fillStyle='#eef3f8';ctx.fillRect(x,y,w,h);ctx.fillStyle=c;ctx.fillRect(x,y,w*v,h);ctx.strokeStyle='#cad7e3';ctx.strokeRect(x,y,w,h);text(label,x-24,y+h/2,C.muted,'right',12,'800');text(level,x+w+8,y+h/2,C.ink,'left',12,'900')}
function drawGraph(q){box(620,292,226,170,'#fff');text('相对探测响应的变化趋势',733,316,C.ink,'center',13,'900');const x0=650,y0=426,w=156,h=88;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);ctx.strokeStyle=q.color;ctx.lineWidth=2.6;ctx.beginPath();for(let i=0;i<=140;i++){const d=.5+i/140*5.5,yy=y0-Math.min(1,(q.t/(d*d)*Math.exp(-q.mu*q.x)*q.pen)/10)*h,x=x0+i/140*w;if(i===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke();text('仅比较趋势，不是剂量曲线',733,446,C.muted,'center',12,'800')}
function drawHandles(q){box(108,444,430,80,'#fff');text('画面内可拖动：距离手柄 / 屏蔽厚度手柄',323,464,C.ink,'center',13,'900');line(150,494,318,494,'#d9e2ec',9);line(360,494,500,494,'#d9e2ec',9);const dx=150+(q.d-.5)/5.5*168,xx=360+q.x/10*140;ctx.fillStyle=S.drag==='distance-handle'?C.red:C.gold;ctx.beginPath();ctx.arc(dx,494,12,0,7);ctx.fill();text('d',dx,518,C.gold,'center',12,'900');ctx.fillStyle=S.drag==='shield-handle'?C.red:C.blue;ctx.beginPath();ctx.arc(xx,494,12,0,7);ctx.fill();text('x',xx,518,C.blue,'center',12,'900')}
function update(q){els.alpha.classList.toggle('active',S.ray==='alpha');els.beta.classList.toggle('active',S.ray==='beta');els.gamma.classList.toggle('active',S.ray==='gamma');els.dLabel.textContent=q.d.toFixed(1)+' m';els.xLabel.textContent=q.x.toFixed(1)+' mm';els.timeLabel.textContent=q.t+' min';els.readout.innerHTML='暴露时间：<b>'+q.t+' min</b><br>相对探测响应趋势：<b>'+q.trend+'</b><br>穿透能力：<b>'+q.level+'</b><br>屏蔽材料情境：<b>'+q.shield+'</b>';els.status.textContent='只作趋势比较：缩短时间、增大距离、选用合适屏蔽会降低响应；是否安全必须依据真实源项、材料和剂量标定。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.r+'</td><td>'+r.d+'</td><td>'+r.x+'</td><td>'+r.trend+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>';canvas.dataset.exposureModel='qualitative-relative-trend-no-dose';canvas.dataset.relativeTrend=q.trend}
function record(){const q=p();S.records.push({r:q.name,d:q.d.toFixed(1),x:q.x.toFixed(1),trend:q.trend});if(S.records.length>8)S.records.shift();update(q)}
function ray(r){S.ray=r;record();draw()}els.alpha.onclick=()=>ray('alpha');els.beta.onclick=()=>ray('beta');els.gamma.onclick=()=>ray('gamma');[els.dist,els.thick].forEach(el=>el.addEventListener('input',draw));els.time.addEventListener('input',()=>{S.exposure=+els.time.value;draw()});els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setByPointer(p0){if(S.drag==='distance-handle')els.dist.value=(.5+Math.max(0,Math.min(168,p0.x-150))/168*5.5).toFixed(1);if(S.drag==='shield-handle')els.thick.value=(Math.max(0,Math.min(140,p0.x-360))/14).toFixed(1);draw()}canvas.addEventListener('pointerdown',e=>{const p0=pos(e),q=p(),detX=170+q.d/6*360;if(Math.abs(p0.x-detX)<34&&p0.y>170&&p0.y<330)S.drag='detector-handle';else if(p0.y>474&&p0.y<514&&p0.x>132&&p0.x<335)S.drag='distance-handle';else if(p0.y>474&&p0.y<514&&p0.x>340&&p0.x<520)S.drag='shield-handle';if(S.drag){canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';if(S.drag!=='detector-handle')setByPointer(p0)}});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const p0=pos(e);if(S.drag==='detector-handle'){els.dist.value=(Math.max(.5,Math.min(6,(p0.x-170)/360*6))).toFixed(1);draw()}else setByPointer(p0)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;if(!S.drag){S.exposure=Math.min(60,S.exposure+dt*8);els.time.value=Math.round(S.exposure)}}draw();requestAnimationFrame(loop)}window.__ANIM_TEST_STATE__={get:()=>p()};record();requestAnimationFrame(loop);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
