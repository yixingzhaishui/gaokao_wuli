<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>液体表面张力实验台</title>
<style>
  *{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:14px}.stage{display:grid;grid-template-columns:minmax(0,1fr)310px;gap:12px;align-items:start}
  canvas{width:100%;height:640px;background:#fff;border:1px solid #d9e2ec;border-radius:8px;display:block;touch-action:none}
  .panel{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:12px}.row{display:flex;gap:8px;margin-bottom:10px}
  button{flex:1;border:0;border-radius:6px;background:#2c7be5;color:#fff;font-weight:700;padding:9px 10px;cursor:pointer}.secondary{background:#e6edf7;color:#102a43}
  label{display:block;font-size:13px;font-weight:700;margin-top:10px}input{width:100%;accent-color:#2c7be5}
  .readout{margin-top:12px;padding:10px;background:#eef4ff;border-radius:8px;line-height:1.65;font-size:13px}.status{margin-top:10px;padding:9px 10px;border-radius:8px;font-size:13px;line-height:1.5;background:#e6fffa;color:#087f5b;font-weight:700}.bad{background:#fff5f5;color:#c92a2a}
  .hint{margin-top:10px;color:#486581;font-size:13px;line-height:1.55}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:5px 4px;text-align:right}th:first-child,td:first-child{text-align:left}
  @media(max-width:860px){.stage{grid-template-columns:1fr}canvas{height:560px}}
</style>
</head>
<body>
<div class="wrap"><div class="stage">
  <canvas id="c" width="940" height="640" aria-label="液体表面张力实验台：液面、针、张力计、侧视和数据记录"></canvas>
  <section class="panel">
    <div class="row"><button id="playBtn" class="play-btn">播放</button><button id="resetBtn" class="secondary">重置</button><button id="recordBtn" class="secondary">记录</button></div>
    <label for="sigma">表面张力系数 σ/(N/m)：<span id="sigmaVal"></span></label><input id="sigma" type="range" min="0.02" max="0.10" step="0.005" value="0.07">
    <label for="length">有效边界长度 L/m：<span id="lengthVal"></span></label><input id="length" type="range" min="0.05" max="0.50" step="0.01" value="0.20">
    <label for="weight">物体重力 G/N：<span id="weightVal"></span></label><input id="weight" type="range" min="0.002" max="0.040" step="0.001" value="0.010">
    <div id="readout" class="readout"></div><div id="status" class="status"></div>
    <div class="hint">观察任务：拖动画面里的细针或边界尺，看液面形变、切向张力、张力计和 F=σL 读数如何同步变化。</div>
    <table><thead><tr><th>记录</th><th>F</th><th>G</th><th>状态</th></tr></thead><tbody id="recordBody"><tr><td colspan="4">点击“记录”保存一次测量</td></tr></tbody></table>
  </section>
</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const els={sigma:by('sigma'),length:by('length'),weight:by('weight'),sigmaVal:by('sigmaVal'),lengthVal:by('lengthVal'),weightVal:by('weightVal'),readout:by('readout'),status:by('status'),playBtn:by('playBtn'),resetBtn:by('resetBtn'),recordBtn:by('recordBtn'),recordBody:by('recordBody')};
function by(id){return document.getElementById(id)}
let playing=false,t=0,last=0,dragMode='',records=[];const tank={x:70,y:108,w:500,h:290};
function params(){const s=+els.sigma.value,L=+els.length.value,G=+els.weight.value,F=s*L;return{s,L,G,F,ok:F>=G,ratio:G/Math.max(F,.0001)}}
function label(s,x,y,c='#102a43',size=13,align='center',w='700'){ctx.fillStyle=c;ctx.font=`${w} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.48),y2-10*Math.sin(a-.48));ctx.lineTo(x2-10*Math.cos(a+.48),y2-10*Math.sin(a+.48));ctx.closePath();ctx.fill()}
function drawScene(p){ctx.fillStyle='#fff';ctx.fillRect(0,0,940,640);label('液体表面张力实验台：表面像被拉紧的薄膜',470,28,'#102a43',19);label('三视图联动：俯视液面、侧视形变、张力计、公式读数和数据记录',470,52,'#486581',13,'center','600');drawTank(p);drawMeters(p);drawHandles(p)}
function drawTank(p){ctx.fillStyle='#f2f7ff';ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.fillRect(tank.x,tank.y,tank.w,tank.h);ctx.strokeRect(tank.x,tank.y,tank.w,tank.h);label('俯视/侧视液面：拖动细针改变重力，拖动边界尺改变 L',tank.x+tank.w/2,tank.y+24,'#2c7be5',14);
 const sag=Math.min(78,20+p.ratio*35+(playing?Math.sin(t*4)*6:0));ctx.fillStyle='#d8f3ff';ctx.fillRect(tank.x+34,tank.y+150,tank.w-68,112);ctx.strokeStyle='#2c7be5';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(tank.x+34,tank.y+150);ctx.quadraticCurveTo(tank.x+tank.w/2,tank.y+150+sag,tank.x+tank.w-34,tank.y+150);ctx.stroke();
 for(let i=0;i<10;i++){ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(tank.x+66+i*42,tank.y+150+Math.sin(i+t)*7,5,0,Math.PI*2);ctx.fill()}
 const needleY=tank.y+132+sag*.55;ctx.fillStyle=dragMode==='needle'?'#e03131':'#444';ctx.beginPath();ctx.roundRect(tank.x+210,needleY,tank.w?110:110,14,7);ctx.fill();arrow(tank.x+265,needleY+16,tank.x+265,needleY+16+Math.min(70,p.G/.04*70),'#7b2cbf',4);label('G',tank.x+286,needleY+55,'#7b2cbf',13,'left');
 const len=50+p.F/.05*145;arrow(tank.x+250,tank.y+132,tank.x+250-len/2,tank.y+132,'#e03131',4);arrow(tank.x+280,tank.y+132,tank.x+280+len/2,tank.y+132,'#e03131',4);label('切向表面张力',tank.x+265,tank.y+102,'#e03131',13);
 ctx.strokeStyle=dragMode==='length'?'#e03131':'#38b2ac';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(tank.x+128,tank.y+318);ctx.lineTo(tank.x+128+p.L/.5*320,tank.y+318);ctx.stroke();label(`L=${p.L.toFixed(2)} m`,tank.x+300,tank.y+342,'#38b2ac',13)}
function drawMeters(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(610,92,270,236);ctx.strokeRect(610,92,270,236);label('张力计/临界读数',745,116,'#102a43',14);meter(652,168,170,18,p.F/.05,'#e03131',`F=σL=${p.F.toFixed(4)} N`);meter(652,230,170,18,p.G/.04,'#7b2cbf',`G=${p.G.toFixed(4)} N`);label(p.ok?'F≥G：液面可托住':'F<G：会压破液面',745,292,p.ok?'#087f5b':'#c92a2a',15);ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(610,364,270,142);ctx.strokeRect(610,364,270,142);label('公式绑定',745,388,'#102a43',14);label('F = σL',745,430,'#2c7be5',22);label('张力沿液面切线，竖直效果来自液面弯曲后的合力',745,470,'#486581',12)}
function meter(x,y,w,h,val,c,txt){label(txt,x,y-12,c,12,'left');ctx.fillStyle='#e9eef5';ctx.fillRect(x,y,w,h);ctx.fillStyle=c;ctx.fillRect(x,y,Math.min(w,w*val),h)}
function drawHandles(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(70,444,500,132);ctx.strokeRect(70,444,500,132);label('画面内可拖动控制',320,468,'#102a43',14);handle(124,512,180,p.L,.05,.5,'#38b2ac','边界长度');handle(342,512,160,p.G,.002,.04,'#7b2cbf','细针重力')}
function handle(x,y,w,val,min,max,c,name){ctx.strokeStyle='#d9e2ec';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke();const hx=x+(val-min)/(max-min)*w;ctx.fillStyle=c;ctx.beginPath();ctx.arc(hx,y,13,0,Math.PI*2);ctx.fill();label(name,hx,y+26,c,12)}
function update(p){els.sigmaVal.textContent=p.s.toFixed(3);els.lengthVal.textContent=p.L.toFixed(2);els.weightVal.textContent=p.G.toFixed(3);els.readout.innerHTML=[`F=σL=${p.F.toFixed(4)} N`,`G=${p.G.toFixed(4)} N`,`比较：${p.ok?'F≥G':'F<G'}`,`方向：沿液面切线`].join('<br>');els.status.className=p.ok?'status':'status bad';els.status.textContent=p.ok?'表面张力足以维持液面形变，物体可被托住。':'重力超过表面张力估算值，物体会压破液面。'}
function render(){const p=params();drawScene(p);update(p)}
function animate(now){if(!last)last=now;const dt=Math.min(.04,(now-last)/1000);last=now;if(playing)t+=dt;render();requestAnimationFrame(animate)}
function setFromPointer(e){const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;if(dragMode==='length'){const val=.05+(Math.max(124,Math.min(304,x))-124)/180*.45;els.length.value=val.toFixed(2)}if(dragMode==='needle'||dragMode==='weight'){const val=.002+(Math.max(342,Math.min(502,x))-342)/160*.038;els.weight.value=val.toFixed(3)}if(dragMode==='needle'&&y>tank.y+120&&y<tank.y+260){const val=.002+Math.max(0,Math.min(1,(y-(tank.y+120))/140))*.038;els.weight.value=val.toFixed(3)}render()}
canvas.addEventListener('pointerdown',e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;dragMode='';if(y>492&&y<536&&x>104&&x<324)dragMode='length';else if(y>492&&y<536&&x>322&&x<522)dragMode='weight';else if(x>260&&x<410&&y>220&&y<330)dragMode='needle';if(dragMode){canvas.setPointerCapture(e.pointerId);setFromPointer(e)}});canvas.addEventListener('pointermove',e=>{if(dragMode)setFromPointer(e)});canvas.addEventListener('pointerup',e=>{dragMode='';try{canvas.releasePointerCapture(e.pointerId)}catch{}});canvas.addEventListener('pointercancel',()=>dragMode='');
els.playBtn.addEventListener('click',()=>{playing=!playing;els.playBtn.textContent=playing?'暂停':'播放'});els.resetBtn.addEventListener('click',()=>{playing=false;t=0;els.sigma.value=.07;els.length.value=.20;els.weight.value=.010;els.playBtn.textContent='播放';render()});els.recordBtn.addEventListener('click',()=>{const p=params();records.unshift({F:p.F,G:p.G,ok:p.ok});records=records.slice(0,5);els.recordBody.innerHTML=records.map((r,i)=>`<tr><td>${i+1}</td><td>${r.F.toFixed(4)}</td><td>${r.G.toFixed(4)}</td><td>${r.ok?'托住':'压破'}</td></tr>`).join('')});[els.sigma,els.length,els.weight].forEach(el=>el.addEventListener('input',render));render();requestAnimationFrame(animate);
</script>
</body>
</html>
