<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液体表面张力</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:540px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}.status.bad{background:#ffe6e6;border-color:#ff6b6b;color:#b30000}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="850" height="520"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>调 σ 和 L 看 F=σL；调 G 看表面张力能否托住物体。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>表面张力系数 σ <b id="sText">0.070 N/m</b></span><input id="sigma" type="range" min="0.02" max="0.10" step="0.005" value="0.07"></label>
    <label class="param"><span>边界长度 L <b id="lText">0.20 m</b></span><input id="length" type="range" min="0.05" max="0.50" step="0.01" value="0.20"></label>
    <label class="param"><span>物体重力 G <b id="gText">0.010 N</b></span><input id="weight" type="range" min="0.002" max="0.040" step="0.001" value="0.010"></label>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">简单边界</div><div>F = σL</div><div>方向沿液面切线</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={sigma:document.getElementById('sigma'),length:document.getElementById('length'),weight:document.getElementById('weight')};function fmt(n,d){return n.toFixed(d)}function p(){const s=+els.sigma.value,L=+els.length.value,G=+els.weight.value,F=s*L;return{s,L,G,F,ok:F>=G}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-11*Math.cos(ang-.45),y2-11*Math.sin(ang-.45));ctx.lineTo(x2-11*Math.cos(ang+.45),y2-11*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function draw(){const q=p();ctx.clearRect(0,0,850,520);ctx.fillStyle='#fff';ctx.fillRect(0,0,850,520);text('液体表面张力：表面有收缩趋势，张力沿切线方向',425,34,'#102a43','center',18,'700');box(70,90,430,250,'#fff','#d9e2ec');ctx.fillStyle='#d8f3ff';ctx.fillRect(90,190,390,120);ctx.strokeStyle='#2c7be5';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(90,190);ctx.quadraticCurveTo(285,q.ok?215:250,480,190);ctx.stroke();for(let i=0;i<8;i++){ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(120+i*45,190+Math.sin(i)*8,5,0,Math.PI*2);ctx.fill()}const len=60+q.F/0.05*120;arrow(270,180,270-len/2,180,'#e03131',4);arrow(300,180,300+len/2,180,'#e03131',4);text('表面张力沿切线',285,152,'#e03131','center',14,'700');ctx.fillStyle='#444';ctx.beginPath();ctx.roundRect(245,q.ok?160:210,80,14,7);ctx.fill();arrow(285,q.ok?174:224,285,(q.ok?174:224)+50,'#7b2cbf',4);text('G',300,(q.ok?210:260),'#7b2cbf','left',13,'700');box(560,112,210,190,'#f7f9fc','#d9e2ec');text('张力比较',665,144,'#102a43','center',15,'700');text('F=σL='+fmt(q.F,4)+'N',665,190,'#e03131','center',17,'700');text('G='+fmt(q.G,4)+'N',665,226,'#7b2cbf','center',17,'700');text(q.ok?'F ≥ G，可维持':'F < G，会压破液面',665,266,q.ok?'#087f5b':'#b30000','center',15,'700');update(q)}function update(q){document.getElementById('sText').textContent=fmt(q.s,3)+' N/m';document.getElementById('lText').textContent=fmt(q.L,2)+' m';document.getElementById('gText').textContent=fmt(q.G,3)+' N';document.getElementById('readout').innerHTML='F=σL=<b>'+fmt(q.F,4)+' N</b><br>G=<b>'+fmt(q.G,4)+' N</b><br>比较：<b>'+(q.ok?'F≥G':'F&lt;G')+'</b>';const st=document.getElementById('status');st.className=q.ok?'status':'status bad';st.textContent=q.ok?'表面张力足以与重力平衡，液面可托住物体。':'重力超过表面张力估算值，物体会压破液面。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));draw();})();
</script>
</body>
</html>
