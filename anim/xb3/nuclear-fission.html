<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>核裂变链式反应</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="核裂变链式反应实验台：反应堆俯视、控制棒侧视、代数图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="neutrons">每次释放中子数：<span id="neutronsVal"></span></label>
      <input id="neutrons" type="range" min="1" max="4" value="3" step="1">
      <label for="absorb">控制棒吸收比例：<span id="absorbVal"></span></label>
      <input id="absorb" type="range" min="0" max="80" value="50" step="5">
      <label for="gen">最大代数：<span id="genVal"></span></label>
      <input id="gen" type="range" min="1" max="7" value="5" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动画面里的红色控制棒，调节中子吸收比例，让有效增殖系数 k 接近 1；播放时看链式反应是增长、稳定还是衰减。</div>
      <table aria-label="链式反应数据记录">
        <thead><tr><th>组</th><th>k</th><th>末代裂变</th><th>状态</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  neutrons: document.getElementById('neutrons'),
  absorb: document.getElementById('absorb'),
  gen: document.getElementById('gen'),
  neutronsVal: document.getElementById('neutronsVal'),
  absorbVal: document.getElementById('absorbVal'),
  genVal: document.getElementById('genVal'),
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = {
  running: false,
  last: 0,
  time: 0,
  generation: 0,
  phase: 0,
  drag: null,
  records: []
};
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const n = Number(els.neutrons.value);
  const absorb = Number(els.absorb.value) / 100;
  const gen = Number(els.gen.value);
  const k = n * (1 - absorb);
  const counts = [];
  for (let g = 0; g <= gen; g++) counts.push(Math.min(36, Math.max(1, Math.round(Math.pow(k, g)))));
  return { n, absorb, gen, k, counts };
}
function stateLabel(k) {
  if (k > 1.08) return '增长';
  if (k < 0.92) return '衰减';
  return '稳定可控';
}
function drawArrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 9 * Math.cos(a - 0.45), y2 - 9 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 9 * Math.cos(a + 0.45), y2 - 9 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawReactor(v) {
  const cx = 226, cy = 248;
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 166, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.textAlign = 'center';
  ctx.font = '13px system-ui';
  ctx.fillText('俯视反应堆实验台：铀核、慢中子、控制棒', cx, 64);
  const rods = Math.round(5 + v.absorb * 9);
  for (let i = 0; i < rods; i++) {
    const x = 96 + i * 20;
    ctx.fillStyle = '#e03131';
    ctx.fillRect(x, 112, 9, 262);
  }
  const active = Math.min(v.counts[state.generation] || 1, 24);
  for (let i = 0; i < 28; i++) {
    const a = i * Math.PI * 2 / 28;
    const r = 42 + (i % 4) * 28;
    const x = cx + r * Math.cos(a + 0.22 * (i % 3));
    const y = cy + r * Math.sin(a + 0.22 * (i % 3));
    ctx.fillStyle = i < active ? '#fff7e6' : '#f7f9fc';
    ctx.strokeStyle = i < active ? '#f0a500' : '#bcccdc';
    ctx.beginPath();
    ctx.arc(x, y, i < active ? 12 : 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    if (i < Math.min(active, 10)) {
      const tx = x + 30 * Math.cos(a + state.phase);
      const ty = y + 30 * Math.sin(a + state.phase);
      drawArrow(x, y, tx, ty, '#2c7be5');
    }
  }
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#334e68';
  ctx.fillRect(44, 400, 360, 52);
  ctx.strokeRect(44, 400, 360, 52);
  ctx.fillStyle = '#102a43';
  ctx.font = '13px system-ui';
  ctx.fillText('反应：²³⁵U + n → 裂变碎片 + ' + v.n + 'n + 能量；有效中子数 k=' + v.n + '(1-吸收率)', 224, 424);
  ctx.fillText('拖动红色控制棒上下/左右，改变吸收率', 224, 444);
}
function drawGraph(v) {
  const x0 = 470, y0 = 445, w = 210, h = 150;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  const maxC = Math.max(2, ...v.counts);
  for (let i = 0; i <= v.gen; i++) {
    const x = x0 + i / v.gen * w;
    const bh = clamp(v.counts[i] / maxC, 0, 1) * h;
    ctx.fillStyle = i === state.generation ? '#e03131' : '#2c7be5';
    ctx.fillRect(x - 8, y0 - bh, 16, bh);
    ctx.fillStyle = '#486581';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(String(i), x, y0 + 16);
  }
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('代数图像/数据记录', x0 + w / 2, y0 + 34);
  ctx.fillText('裂变数', x0 - 22, y0 - h - 6);
}
function drawControlPanel(v) {
  const x = 500, y = 84;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 154, 178);
  ctx.strokeRect(x, y, 154, 178);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('控制棒侧视读数', x + 77, y + 24);
  ctx.strokeStyle = '#bcccdc';
  ctx.beginPath();
  ctx.moveTo(x + 34, y + 48);
  ctx.lineTo(x + 34, y + 150);
  ctx.stroke();
  const knobY = y + 150 - v.absorb * 102;
  ctx.fillStyle = '#e03131';
  ctx.fillRect(x + 18, knobY - 10, 32, 20);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 14px system-ui';
  ctx.fillText('吸收 ' + Math.round(v.absorb * 100) + '%', x + 100, knobY + 5);
  ctx.fillStyle = v.k > 1.08 ? '#fff5f5' : (v.k < 0.92 ? '#fffbea' : '#e6fffa');
  ctx.fillRect(x + 70, y + 94, 64, 44);
  ctx.fillStyle = v.k > 1.08 ? '#c92a2a' : (v.k < 0.92 ? '#8a6d00' : '#087f5b');
  ctx.font = '700 15px system-ui';
  ctx.fillText('k=' + v.k.toFixed(2), x + 102, y + 114);
  ctx.fillText(stateLabel(v.k), x + 102, y + 134);
}
function draw() {
  const v = values();
  els.neutronsVal.textContent = v.n;
  els.absorbVal.textContent = Math.round(v.absorb * 100) + '%';
  els.genVal.textContent = v.gen;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('核裂变链式反应实验台：俯视反应堆 + 控制棒侧视 + 代数图像 + 数据记录', 370, 28);
  drawReactor(v);
  drawControlPanel(v);
  drawGraph(v);
  const last = v.counts[state.generation] || 1;
  els.readout.innerHTML = [
    `<div id="r1">有效增殖系数 k=${v.n}(1-${Math.round(v.absorb * 100)}%)≈${v.k.toFixed(2)}</div>`,
    `<div id="r2">当前第 ${state.generation} 代，裂变数≈${last}</div>`,
    `<div id="r3">状态判定：${stateLabel(v.k)}</div>`,
    `<div id="r4">核反应：²³⁵U+n→碎片+${v.n}n+能量，质量亏损 Δm 对应 E=Δmc²</div>`
  ].join('');
  els.status.className = Math.abs(v.k - 1) < 0.08 ? 'status' : 'status bad';
  els.status.textContent = Math.abs(v.k - 1) < 0.08
    ? '稳定可控：每代有效中子数接近不变。'
    : (v.k > 1 ? '增长：控制棒太浅，链式反应会越来越强。' : '衰减：控制棒吸收过多，中子不足以维持链式反应。');
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.k.toFixed(2)}</td><td>${p.last}</td><td>${p.label}</td></tr>`
  ).join('');
}
function setAbsorbFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const absorb = clamp((234 - y) / 128, 0, 0.8);
  els.absorb.value = String(Math.round(absorb * 100 / 5) * 5);
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    state.phase += dt * 2.8;
    const v = values();
    const next = Math.min(v.gen, Math.floor(state.time / 0.8));
    state.generation = next;
    if (next >= v.gen) state.time = 0;
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ k: v.k, last: v.counts[v.gen], label: stateLabel(v.k) });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.generation = 0;
  state.phase = 0;
  state.records = [];
  els.neutrons.value = '3';
  els.absorb.value = '50';
  els.gen.value = '5';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'control-rod-handle';
  setAbsorbFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setAbsorbFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
