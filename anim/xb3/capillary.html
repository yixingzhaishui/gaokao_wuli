<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛细现象实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="毛细现象实验台装置：水槽和细玻璃管侧视图、接触角剖面、液柱高度刻度尺、h-r图像和数据记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>直接拖动细管宽度手柄和接触角手柄，看浸润液体在细管中上升、不浸润液体下降；管径越小，毛细升降越明显。</div>
<div class="card">
<div class="title">调毛细管</div>
<label class="param"><span>管半径 r <b id="rLabel">0.50 mm</b></span><input id="radius" type="range" min="0.15" max="1.5" step="0.05" value="0.5"></label>
<label class="param"><span>接触角 θ <b id="thLabel">35°</b></span><input id="theta" type="range" min="10" max="150" step="5" value="35"></label>
<label class="param"><span>表面张力 σ <b id="sLabel">0.072 N/m</b></span><input id="sigma" type="range" min="0.03" max="0.09" step="0.002" value="0.072"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录数据</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">数据记录</div><table><thead><tr><th>r/mm</th><th>θ</th><th>h/cm</th><th>类型</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>近似关系：h=2σcosθ/(ρgr)。</div><div>θ&lt;90° 为浸润，上升；θ&gt;90° 为不浸润，下降。</div><div>r 越小，|h| 越大。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={radius:document.getElementById('radius'),theta:document.getElementById('theta'),sigma:document.getElementById('sigma'),rLabel:document.getElementById('rLabel'),thLabel:document.getElementById('thLabel'),sLabel:document.getElementById('sLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={run:true,t:0,level:0,drag:null,records:[]};
function p(){const r=+els.radius.value,theta=+els.theta.value,sigma=+els.sigma.value,cos=Math.cos(theta*Math.PI/180),h=2*sigma*cos/(1000*9.8*r*1e-3);return{r,theta,sigma,cos,h,cm:h*100,type:theta<90?'浸润上升':'不浸润下降'}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('毛细现象：表面张力、接触角与管径共同决定液柱升降',460,60,C.ink,'center',17,'900');drawTube(q);drawAngle(q);drawGraph(q);drawHandles(q);update(q)}
function drawTube(q){box(70,96,470,330,'#fbfdff');text('水槽与细玻璃管侧视实验台 + 刻度尺读数',305,120,C.muted,'center',12,'800');const baseY=332,cx=285,tubeW=26+q.r*42,hpx=Math.max(-115,Math.min(135,S.level*3.6));ctx.fillStyle='rgba(44,123,229,.24)';ctx.fillRect(105,baseY,365,64);ctx.strokeStyle='#9fb3c8';ctx.strokeRect(105,baseY,365,64);line(105,baseY,470,baseY,C.blue,2);ctx.strokeStyle='#cad7e3';ctx.lineWidth=5;line(cx-tubeW/2,158,cx-tubeW/2,394,'#cad7e3',5);line(cx+tubeW/2,158,cx+tubeW/2,394,'#cad7e3',5);const top=baseY-hpx;ctx.fillStyle='rgba(44,123,229,.42)';ctx.fillRect(cx-tubeW/2+3,Math.min(top,baseY),tubeW-6,Math.abs(hpx));ctx.strokeStyle=C.blue;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx,top,tubeW/2-4,8,0,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(44,123,229,.18)';ctx.beginPath();ctx.ellipse(cx,top,tubeW/2-4,8,0,0,Math.PI*2);ctx.fill();const hc=S.level;line(392,baseY,392,top,hc>=0?C.green:C.red,4);arrow(392,baseY,392,top,hc>=0?C.green:C.red,4);text('h(t)='+hc.toFixed(1)+' cm',424,(baseY+top)/2,hc>=0?C.green:C.red,'left',13,'900');for(let y=170;y<=390;y+=22){line(488,y,505,y,'#9fb3c8',1);text(((baseY-y)/3.6).toFixed(0),516,y,C.muted,'left',10,'700')}text('cm刻度',500,148,C.muted,'center',11,'800');text(q.type+'，平衡 h∞='+q.cm.toFixed(1)+' cm',cx,144,q.cm>=0?C.green:C.red,'center',14,'900')}
function drawAngle(q){box(585,96,262,160,'#fff');text('接触角剖面：θ 决定浸润/不浸润',716,120,C.ink,'center',13,'900');const cx=716,cy=190;line(cx-80,cy,cx+80,cy,'#9fb3c8',3);const a=(180-q.theta)*Math.PI/180;ctx.strokeStyle=C.blue;ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,64,Math.PI,Math.PI+a,false);ctx.stroke();arrow(cx,cy,cx+70*Math.cos(Math.PI+a),cy+70*Math.sin(Math.PI+a),C.gold,3);text('θ='+q.theta+'°',cx+36,cy-34,C.gold,'left',13,'900');text(q.theta<90?'液体浸润管壁，凹液面':'液体不浸润，凸液面',cx,cy+52,q.theta<90?C.green:C.red,'center',12,'900')}
function drawGraph(q){box(585,282,262,174,'#fff');text('h-r 图像记录：r 越小 |h| 越大',716,306,C.ink,'center',13,'900');const x0=622,y0=420,w=190,h=86;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0-h/2,x0,y0+h/2,'#9fb3c8',1.5);ctx.strokeStyle=q.cm>=0?C.green:C.red;ctx.lineWidth=2.6;ctx.beginPath();for(let i=0;i<=180;i++){const r=.15+i/180*1.35,cm=2*q.sigma*q.cos/(1000*9.8*r*1e-3)*100,x=x0+i/180*w,y=y0-Math.max(-40,Math.min(40,cm))*h/80;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(x0+(q.r-.15)/1.35*w,y0-Math.max(-40,Math.min(40,q.cm))*h/80,5,0,7);ctx.fill();text('公式 h=2σcosθ/(ρgr)',716,444,C.muted,'center',12,'800')}
function drawHandles(q){box(112,458,420,76,'#fff');text('画面内可拖动：管径手柄 / 接触角手柄',322,478,C.ink,'center',13,'900');line(154,506,308,506,'#d9e2ec',9);line(350,506,494,506,'#d9e2ec',9);const rx=154+(q.r-.15)/1.35*154,tx=350+(q.theta-10)/140*144;ctx.fillStyle=S.drag==='radius-handle'?C.red:C.blue;ctx.beginPath();ctx.arc(rx,506,12,0,7);ctx.fill();text('r',rx,530,C.blue,'center',12,'900');ctx.fillStyle=S.drag==='theta-handle'?C.red:C.gold;ctx.beginPath();ctx.arc(tx,506,12,0,7);ctx.fill();text('θ',tx,530,C.gold,'center',12,'900')}
function update(q){els.rLabel.textContent=q.r.toFixed(2)+' mm';els.thLabel.textContent=q.theta+'°';els.sLabel.textContent=q.sigma.toFixed(3)+' N/m';els.readout.innerHTML='当前液柱 h(t)：<b>'+S.level.toFixed(1)+' cm</b><br>平衡高度 h∞：<b>'+q.cm.toFixed(1)+' cm</b><br>cosθ：<b>'+q.cos.toFixed(2)+'</b><br>判断：<b>'+q.type+'</b><br>趋势：<b>r 越小 |h| 越大</b>';els.status.textContent=q.theta<90?'接触角小于 90°，液体浸润管壁，细管中液面上升。':'接触角大于 90°，液体不浸润管壁，细管中液面下降。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.r+'</td><td>'+r.t+'</td><td>'+r.h+'</td><td>'+r.k+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({r:q.r.toFixed(2),t:q.theta,h:q.cm.toFixed(1),k:q.theta<90?'上升':'下降'});if(S.records.length>8)S.records.shift();update(q)}
function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function restartRise(){S.level=0}[els.radius,els.theta,els.sigma].forEach(el=>el.addEventListener('input',()=>{restartRise();draw()}));function setByPointer(p0){if(S.drag==='radius-handle')els.radius.value=(.15+Math.max(0,Math.min(154,p0.x-154))/154*1.35).toFixed(2);if(S.drag==='theta-handle')els.theta.value=Math.round((10+Math.max(0,Math.min(144,p0.x-350))/144*140)/5)*5;restartRise();draw()}els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;canvas.addEventListener('pointerdown',e=>{const p0=pos(e);if(p0.y>488&&p0.y<526&&p0.x>135&&p0.x<328)S.drag='radius-handle';else if(p0.y>488&&p0.y<526&&p0.x>332&&p0.x<514)S.drag='theta-handle';if(S.drag){canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setByPointer(p0)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setByPointer(pos(e))});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;S.level+=(p().cm-S.level)*Math.min(1,dt*2.4)}draw();requestAnimationFrame(loop)}record();requestAnimationFrame(loop);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
