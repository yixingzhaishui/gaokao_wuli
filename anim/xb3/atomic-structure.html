<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原子结构：α 粒子散射</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="原子结构实验台：α粒子散射俯视、原子截面、偏转角图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="b">碰撞参数 b：<span id="bVal"></span></label>
      <input id="b" type="range" min="10" max="145" value="72" step="1">
      <label for="z">核电荷等级 Z：<span id="zVal"></span></label>
      <input id="z" type="range" min="1" max="8" value="4" step="1">
      <label for="cloud">电子云半径：<span id="cloudVal"></span></label>
      <input id="cloud" type="range" min="70" max="150" value="118" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动画面里的入射 α 粒子改变 b；点“播放”看多数直穿、少数偏转、极少反弹为什么支持“小而重的正电原子核”。</div>
      <table aria-label="散射数据记录">
        <thead><tr><th>组</th><th>b</th><th>角度</th><th>判断</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  b: document.getElementById('b'),
  z: document.getElementById('z'),
  cloud: document.getElementById('cloud'),
  bVal: document.getElementById('bVal'),
  zVal: document.getElementById('zVal'),
  cloudVal: document.getElementById('cloudVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = { running: false, last: 0, time: 0, progress: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const b = Number(els.b.value);
  const z = Number(els.z.value);
  const cloud = Number(els.cloud.value);
  const forceIndex = z * 900 / (b * b);
  const angle = Math.min(140, forceIndex * 35);
  return { b, z, cloud, forceIndex, angle, label: classify(angle) };
}
function classify(angle) {
  if (angle < 10) return '几乎直穿';
  if (angle < 75) return '明显偏转';
  return '大角反弹';
}
function pathPoint(t, v) {
  const nx = 364, ny = 246, y0 = ny - v.b;
  if (v.angle > 75) {
    const x = 36 + 330 * t - 235 * Math.max(0, t - 0.62) * 2.3;
    const y = y0 + 24 * Math.sin(t * Math.PI) + 150 * Math.max(0, t - 0.58) * 1.4;
    return { x, y };
  }
  const x = 36 + 630 * t;
  const y = y0 - v.angle * 1.25 * Math.max(0, t - 0.42) + 20 * Math.sin(t * Math.PI) * (v.angle / 80);
  return { x, y };
}
function drawPath(v) {
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let i = 0; i <= 80; i++) {
    const p = pathPoint(i / 80, v);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  const p = pathPoint(state.progress, v);
  ctx.fillStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('α', p.x, p.y + 4);
}
function drawScene(v) {
  const nx = 364, ny = 246;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(38, 70, 442, 336);
  ctx.strokeRect(38, 70, 442, 336);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('α 粒子散射俯视实验台：拖动入射粒子改变碰撞参数 b', 259, 96);
  ctx.fillStyle = '#fff7e6';
  ctx.strokeStyle = '#f0a500';
  ctx.fillRect(78, 128, 48, 228);
  ctx.strokeRect(78, 128, 48, 228);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 14px system-ui';
  ctx.fillText('薄金箔', 102, 116);
  ctx.strokeStyle = '#829ab1';
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.arc(nx, ny, v.cloud, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(44,123,229,0.18)';
  for (let i = 0; i < 14; i++) {
    const a = i * Math.PI * 2 / 14;
    ctx.beginPath();
    ctx.arc(nx + Math.cos(a) * v.cloud * 0.82, ny + Math.sin(a) * v.cloud * 0.54, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(nx, ny, 13, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '700 14px system-ui';
  ctx.fillText('+', nx, ny + 5);
  ctx.strokeStyle = '#e03131';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(nx, ny);
  ctx.lineTo(190, ny - v.b);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e03131';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('库仑斥力 F∝Z/b²', 206, (ny + (ny - v.b)) / 2 - 8);
  drawPath(v);
}
function drawStats(v) {
  const x = 514, y = 88;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 176, 318);
  ctx.strokeRect(x, y, 176, 318);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('偏转角图像/数据记录', x + 88, y + 24);
  const rows = [
    ['多数', '直穿', 0.76, '#2c7be5'],
    ['少数', '偏转', 0.18, '#f0a500'],
    ['极少', '反弹', 0.06, '#e03131']
  ];
  rows.forEach((r, i) => {
    const yy = y + 62 + i * 58;
    ctx.fillStyle = r[3];
    ctx.fillRect(x + 26, yy, 110 * r[2], 18);
    ctx.fillStyle = '#102a43';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(r[0] + ' ' + r[1], x + 26, yy - 8);
  });
  const meterY = y + 254;
  ctx.strokeStyle = '#334e68';
  ctx.beginPath();
  ctx.moveTo(x + 26, meterY);
  ctx.lineTo(x + 150, meterY);
  ctx.stroke();
  const px = x + 26 + clamp(v.angle / 140, 0, 1) * 124;
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(px, meterY, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('偏转角≈' + v.angle.toFixed(0) + '°', x + 88, meterY + 28);
}
function draw() {
  const v = values();
  els.bVal.textContent = v.b.toFixed(0);
  els.zVal.textContent = v.z.toFixed(0);
  els.cloudVal.textContent = v.cloud.toFixed(0);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('原子结构实验台：α散射俯视 + 原子截面 + 偏转角图像 + 数据记录', 370, 28);
  drawScene(v);
  drawStats(v);
  els.readout.innerHTML = [
    `<div id="r1">碰撞参数 b=${v.b.toFixed(0)}，核电荷 Z=${v.z}</div>`,
    `<div id="r2">F∝Z/b²≈${v.forceIndex.toFixed(2)}</div>`,
    `<div id="r3">偏转角≈${v.angle.toFixed(0)}°，判断：${v.label}</div>`,
    `<div id="r4">多数直穿说明原子内部空旷；大角散射说明正电荷集中在小原子核</div>`
  ].join('');
  els.status.textContent = v.label + '：这是卢瑟福 α 粒子散射实验支持核式结构的关键证据。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.b.toFixed(0)}</td><td>${p.angle.toFixed(0)}°</td><td>${p.label}</td></tr>`
  ).join('');
}
function setBFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const b = clamp(246 - y, 10, 145);
  els.b.value = b.toFixed(0);
  state.progress = 0;
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    state.progress += dt * 0.34;
    if (state.progress > 1) state.progress = 0;
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', () => { state.progress = 0; draw(); });
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ b: v.b, angle: v.angle, label: v.label });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.progress = 0;
  state.records = [];
  els.b.value = '72';
  els.z.value = '4';
  els.cloud.value = '118';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'alpha-particle-handle';
  setBFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setBFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
