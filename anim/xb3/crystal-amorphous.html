<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晶体与非晶体</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .seg { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary, button.active { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="晶体与非晶体实验台：微观结构俯视、加热曲线图像、温度计和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <div class="seg">
        <button id="crystalBtn" class="active" type="button">晶体</button>
        <button id="amorphousBtn" type="button">非晶体</button>
      </div>
      <label for="heat">加热进度：<span id="heatVal"></span></label>
      <input id="heat" type="range" min="0" max="100" value="45" step="1">
      <label for="grain">规则程度：<span id="grainVal"></span></label>
      <input id="grain" type="range" min="0" max="100" value="90" step="5">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动加热曲线上的红点，比较晶体是否出现熔化平台；切换非晶体，看它是否没有固定熔点而是逐渐软化。</div>
      <table aria-label="加热数据记录">
        <thead><tr><th>组</th><th>类型</th><th>热量</th><th>T/℃</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  crystalBtn: document.getElementById('crystalBtn'),
  amorphousBtn: document.getElementById('amorphousBtn'),
  heat: document.getElementById('heat'),
  grain: document.getElementById('grain'),
  heatVal: document.getElementById('heatVal'),
  grainVal: document.getElementById('grainVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = { type: 'crystal', running: false, last: 0, time: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function tempAt(heat, type) {
  if (type === 'crystal') {
    if (heat < 35) return -20 + heat * 2;
    if (heat < 70) return 50;
    return 50 + (heat - 70) * 2.2;
  }
  return -20 + heat * 1.45;
}
function phase(heat, type) {
  if (type === 'crystal') {
    if (heat < 35) return '固态升温';
    if (heat < 70) return '熔化平台：吸热但温度不变';
    return '液态升温';
  }
  return heat < 45 ? '逐渐升温' : '逐渐软化，无固定熔点';
}
function values() {
  const heat = Number(els.heat.value);
  const grain = Number(els.grain.value);
  const T = tempAt(heat, state.type);
  return { heat, grain, T, phase: phase(heat, state.type) };
}
function box(x, y, w, h) {
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
}
function drawStructure(v) {
  box(46, 78, 318, 286);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('微观结构俯视：粒子排列决定宏观熔化特征', 205, 104);
  const disorder = state.type === 'crystal' ? (100 - v.grain) / 100 : 0.75;
  for (let i = 0; i < 6; i++) {
    for (let j = 0; j < 4; j++) {
      const jitterX = Math.sin(i * 2.1 + j * 1.7) * 22 * disorder;
      const jitterY = Math.cos(i * 1.6 - j * 2.4) * 20 * disorder;
      const x = 92 + i * 45 + jitterX;
      const y = 150 + j * 42 + jitterY;
      ctx.fillStyle = state.type === 'crystal' ? '#2c7be5' : '#e8590c';
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fill();
      if (state.type === 'crystal' && v.heat > 35 && v.heat < 70) {
        ctx.strokeStyle = '#f0a500';
        ctx.beginPath();
        ctx.arc(x, y, 13 + Math.sin(state.time * 6 + i + j) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }
  ctx.fillStyle = '#102a43';
  ctx.font = '700 15px system-ui';
  ctx.fillText(state.type === 'crystal' ? '晶体：长程有序，熔化有平台' : '非晶体：无长程有序，逐渐软化', 205, 338);
}
function curvePoint(heat, type, x0, y0, w, h) {
  const T = tempAt(heat, type);
  const x = x0 + heat / 100 * w;
  const y = y0 - clamp((T + 30) / 160, 0, 1) * h;
  return { x, y, T };
}
function drawGraph(v) {
  const x0 = 436, y0 = 350, w = 250, h = 210;
  box(410, 78, 300, 318);
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('加热曲线图像/数据记录', x0 + w / 2, y0 + 28);
  ctx.fillText('T', x0 - 16, y0 - h - 4);
  ctx.fillText('吸热', x0 + w + 18, y0 + 4);
  ['crystal', 'amorphous'].forEach(type => {
    ctx.strokeStyle = type === 'crystal' ? '#2c7be5' : '#e8590c';
    ctx.lineWidth = state.type === type ? 4 : 2;
    ctx.globalAlpha = state.type === type ? 1 : 0.35;
    ctx.beginPath();
    for (let q = 0; q <= 100; q += 2) {
      const p = curvePoint(q, type, x0, y0, w, h);
      if (q === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
  const p = curvePoint(v.heat, state.type, x0, y0, w, h);
  ctx.fillStyle = '#c92a2a';
  ctx.beginPath();
  ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c92a2a';
  ctx.font = '700 14px system-ui';
  ctx.fillText('当前 T≈' + v.T.toFixed(0) + '℃', x0 + w / 2, 424);
}
function drawThermometer(v) {
  const x = 92, y = 404, w = 262, h = 54;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  const fill = clamp((v.T + 30) / 160, 0, 1) * (w - 40);
  ctx.fillStyle = state.type === 'crystal' ? '#2c7be5' : '#e8590c';
  ctx.fillRect(x + 20, y + 24, fill, 12);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('温度计读数与曲线红点绑定', x + w / 2, y + 18);
  ctx.fillText('T=' + v.T.toFixed(0) + '℃，' + v.phase, x + w / 2, y + 70);
}
function draw() {
  const v = values();
  els.heatVal.textContent = v.heat.toFixed(0) + '%';
  els.grainVal.textContent = v.grain.toFixed(0) + '%';
  els.crystalBtn.classList.toggle('active', state.type === 'crystal');
  els.amorphousBtn.classList.toggle('active', state.type === 'amorphous');
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('晶体与非晶体实验台：微观结构俯视 + 加热曲线图像 + 温度计 + 数据记录', 370, 28);
  drawStructure(v);
  drawGraph(v);
  drawThermometer(v);
  els.readout.innerHTML = [
    `<div id="r1">材料：${state.type === 'crystal' ? '晶体' : '非晶体'}</div>`,
    `<div id="r2">吸热进度=${v.heat.toFixed(0)}%，温度 T≈${v.T.toFixed(0)}℃</div>`,
    `<div id="r3">状态：${v.phase}</div>`,
    `<div id="r4">判断：晶体有固定熔点平台；非晶体无固定熔点</div>`
  ].join('');
  els.status.textContent = state.type === 'crystal'
    ? '晶体熔化时吸热破坏规则结构，温度在熔点附近保持不变。'
    : '非晶体没有长程有序结构，受热时温度连续变化并逐渐软化。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.type}</td><td>${p.heat.toFixed(0)}%</td><td>${p.T.toFixed(0)}</td></tr>`
  ).join('');
}
function setHeatFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const heat = clamp((x - 436) / 250 * 100, 0, 100);
  els.heat.value = String(Math.round(heat));
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    const next = (Number(els.heat.value) + dt * 18) % 101;
    els.heat.value = String(Math.round(next));
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ type: state.type === 'crystal' ? '晶体' : '非晶体', heat: v.heat, T: v.T });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.type = 'crystal';
  state.records = [];
  els.heat.value = '45';
  els.grain.value = '90';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
els.crystalBtn.addEventListener('click', () => { state.type = 'crystal'; draw(); });
els.amorphousBtn.addEventListener('click', () => { state.type = 'amorphous'; draw(); });
c.addEventListener('pointerdown', ev => {
  state.drag = 'curve-handle';
  setHeatFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setHeatFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
