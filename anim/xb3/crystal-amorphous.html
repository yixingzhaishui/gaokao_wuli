<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晶体与非晶体</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:540px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px}.seg button.active{background:#2c7be5;color:#fff;border-color:#2c7be5}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="850" height="520"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>切换晶体/非晶体并拖加热进度，看曲线是否出现熔化平台。</div>
  <div class="card"><div class="title">材料类型</div><div class="seg"><button data-type="crystal" class="active">晶体</button><button data-type="amorphous">非晶体</button></div></div>
  <div class="card"><label class="param"><span>加热进度 <b id="heatText">45%</b></span><input id="heat" type="range" min="0" max="100" step="1" value="45"></label></div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">判断</div><div>晶体：固定熔点，有平台</div><div>非晶体：无固定熔点，逐渐软化</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),heat=document.getElementById('heat');let type='crystal';function fmt(n){return n.toFixed(0)}function temp(){const h=+heat.value;if(type==='crystal'){if(h<35)return -20+h*2;if(h<70)return 50;return 50+(h-70)*2.2}else{return -20+h*1.45}}function phase(){const h=+heat.value;if(type==='crystal'){if(h<35)return'固态升温';if(h<70)return'熔化平台：吸热但温度不变';return'液态升温'}return h<45?'逐渐升温':'逐渐软化，无固定熔点'}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function drawLattice(){box(54,78,310,292,'#fff','#d9e2ec');text(type==='crystal'?'规则点阵':'无长程规则排列',209,106,'#102a43','center',16,'700');ctx.fillStyle=type==='crystal'?'#2c7be5':'#e8590c';if(type==='crystal'){for(let i=0;i<5;i++)for(let j=0;j<4;j++){ctx.beginPath();ctx.arc(110+i*45,150+j*42,8,0,Math.PI*2);ctx.fill()}}else{const pts=[[105,150],[155,132],[220,160],[280,140],[130,210],[200,205],[270,230],[105,285],[180,270],[240,300],[300,275]];for(const p of pts){ctx.beginPath();ctx.arc(p[0],p[1],8,0,Math.PI*2);ctx.fill()}}}function drawGraph(){const h=+heat.value,T=temp();box(430,78,350,292,'#fff','#d9e2ec');text('加热曲线',605,106,'#102a43','center',16,'700');ctx.strokeStyle='#829ab1';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(480,330);ctx.lineTo(740,330);ctx.moveTo(480,330);ctx.lineTo(480,140);ctx.stroke();text('时间/吸热',724,350,'#486581','center',12);text('T',462,142,'#486581','center',12);ctx.strokeStyle=type==='crystal'?'#2c7be5':'#e8590c';ctx.lineWidth=3;ctx.beginPath();if(type==='crystal'){ctx.moveTo(490,305);ctx.lineTo(570,230);ctx.lineTo(660,230);ctx.lineTo(735,160)}else{ctx.moveTo(490,305);ctx.bezierCurveTo(560,265,650,215,735,155)}ctx.stroke();const x=490+h/100*245,y=330-(T+30)/160*190;ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();text('当前 T≈'+fmt(T)+'℃',605,396,'#c92a2a','center',15,'700')}function draw(){ctx.clearRect(0,0,850,520);ctx.fillStyle='#fff';ctx.fillRect(0,0,850,520);text('晶体与非晶体：微观排列决定熔化特征',425,34,'#102a43','center',18,'700');drawLattice();drawGraph();update()}function update(){const h=+heat.value;document.getElementById('heatText').textContent=fmt(h)+'%';document.getElementById('readout').innerHTML='类型：<b>'+(type==='crystal'?'晶体':'非晶体')+'</b><br>温度：<b>'+fmt(temp())+' ℃</b><br>状态：<b>'+phase()+'</b>';document.getElementById('status').textContent=type==='crystal'?'晶体熔化时有固定熔点，曲线出现温度平台。':'非晶体没有固定熔点，受热逐渐软化。'}heat.addEventListener('input',draw);document.querySelectorAll('[data-type]').forEach(btn=>btn.addEventListener('click',()=>{type=btn.dataset.type;document.querySelectorAll('[data-type]').forEach(b=>b.classList.toggle('active',b===btn));draw()}));draw();})();
</script>
</body>
</html>
