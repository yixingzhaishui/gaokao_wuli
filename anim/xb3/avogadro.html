<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>阿伏伽德罗常数实验台</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #f7f9fc;
    color: #102a43;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 14px; }
  .stage {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    gap: 14px;
  }
  canvas {
    width: 100%;
    height: 560px;
    display: block;
    background: #fff;
    border: 1px solid #d9e2ec;
    border-radius: 8px;
    touch-action: none;
  }
  .panel {
    background: #fff;
    border: 1px solid #d9e2ec;
    border-radius: 8px;
    padding: 14px;
  }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  button {
    flex: 1;
    border: 1px solid #bcccdc;
    background: #f0f4f8;
    color: #102a43;
    border-radius: 8px;
    padding: 9px 10px;
    font-weight: 700;
    cursor: pointer;
  }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; margin: 11px 0 4px; font-size: 13px; font-weight: 700; }
  input { width: 100%; }
  .readout {
    margin-top: 12px;
    padding: 10px;
    background: #eef4ff;
    border-radius: 8px;
    line-height: 1.65;
    font-size: 13px;
  }
  table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 5px 4px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.55; }
  @media (max-width: 820px) {
    .stage { grid-template-columns: 1fr; }
    canvas { height: 500px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="790" height="560" aria-label="阿伏伽德罗常数实验台：俯视装置、换算剖面、粒子计数器、图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="resetBtn" type="button">重置</button>
        <button id="recordBtn" type="button">记录</button>
      </div>
      <label for="mass">样品质量 m/g：<span id="massVal"></span></label>
      <input id="mass" type="range" min="1" max="120" value="18" step="1">
      <label for="molar">摩尔质量 M/(g/mol)：<span id="molarVal"></span></label>
      <input id="molar" type="range" min="2" max="120" value="18" step="1">
      <label for="scale">显示比例：每点代表 mol：<span id="scaleVal"></span></label>
      <input id="scale" type="range" min="0.02" max="0.30" value="0.05" step="0.01">
      <div id="readout" class="readout"></div>
      <table aria-label="数据记录表">
        <thead><tr><th>记录</th><th>m/g</th><th>M</th><th>n/mol</th></tr></thead>
        <tbody id="records"></tbody>
      </table>
      <div class="hint">观察任务：拖动画面里的蓝色砝码改变 m，拖橙色摩尔卡改变 M；看天平读数、mol 表盘和粒子计数器怎样按 N=nNA 同步变化。</div>
    </section>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const NA = 6.02e23;
const els = {
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn'),
  recordBtn: document.getElementById('recordBtn'),
  mass: document.getElementById('mass'),
  molar: document.getElementById('molar'),
  scale: document.getElementById('scale'),
  massVal: document.getElementById('massVal'),
  molarVal: document.getElementById('molarVal'),
  scaleVal: document.getElementById('scaleVal'),
  readout: document.getElementById('readout'),
  records: document.getElementById('records')
};
const state = { running: false, time: 0, last: 0, drag: null, records: [] };

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function val(id) { return Number(els[id].value); }
function fmt(x, digits = 2) { return Number(x).toFixed(digits); }
function sci(x) {
  const e = Math.floor(Math.log10(Math.max(x, 1)));
  const a = x / Math.pow(10, e);
  return a.toFixed(2) + '×10^' + e;
}
function data() {
  const m = val('mass');
  const M = val('molar');
  const scale = val('scale');
  const n = m / M;
  const N = n * NA;
  const dots = Math.max(1, Math.min(150, Math.round(n / scale)));
  return { m, M, scale, n, N, dots };
}
function setData(next) {
  if (next.m !== undefined) els.mass.value = Math.round(clamp(next.m, 1, 120));
  if (next.M !== undefined) els.molar.value = Math.round(clamp(next.M, 2, 120));
  if (next.scale !== undefined) els.scale.value = clamp(next.scale, 0.02, 0.3).toFixed(2);
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function box(x, y, w, h, fill, stroke = '#d9e2ec') {
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, 9);
  ctx.fill();
  ctx.stroke();
}
function text(s, x, y, color = '#102a43', size = 13, weight = '400', align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(s, x, y);
}
function arrow(x1, y1, x2, y2, color, width = 3) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 11 * Math.cos(a - 0.45), y2 - 11 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 11 * Math.cos(a + 0.45), y2 - 11 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawGrid(x, y, w, h, nx, ny) {
  ctx.strokeStyle = '#e6edf5';
  ctx.lineWidth = 1;
  for (let i = 0; i <= nx; i++) {
    const xx = x + w * i / nx;
    ctx.beginPath(); ctx.moveTo(xx, y); ctx.lineTo(xx, y + h); ctx.stroke();
  }
  for (let i = 0; i <= ny; i++) {
    const yy = y + h * i / ny;
    ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x + w, yy); ctx.stroke();
  }
}
function handles(q) {
  return [
    { name: 'm', x: 94 + q.m * 1.55, y: 190, r: 15, label: '拖动 m' },
    { name: 'M', x: 368 + q.M * 1.35, y: 190, r: 15, label: '拖动 M' },
    { name: 'scale', x: 607 + q.scale * 450, y: 486, r: 13, label: '拖动显示比例' }
  ];
}
function drawBalance(q, progress) {
  box(38, 88, 210, 170, '#fff', '#d9e2ec');
  text('天平称量', 143, 112, '#102a43', 16, '700');
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(78, 214); ctx.lineTo(208, 214); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(143, 144); ctx.lineTo(143, 214); ctx.stroke();
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(82, 154); ctx.lineTo(204, 154); ctx.stroke();
  ctx.fillStyle = '#eef4ff';
  ctx.fillRect(68, 154, 56, 14);
  ctx.fillRect(162, 154, 56, 14);
  ctx.strokeStyle = '#2c7be5';
  ctx.strokeRect(68, 154, 56, 14);
  ctx.strokeRect(162, 154, 56, 14);
  const massH = 24 + q.m * 0.55 * progress;
  ctx.fillStyle = '#2c7be5';
  roundRect(84, 154 - massH, 24, massH, 4);
  ctx.fill();
  text('样品', 96, 140 - massH, '#2c7be5', 12, '700');
  ctx.fillStyle = '#d9e2ec';
  roundRect(180, 124, 22, 30, 4);
  ctx.fill();
  text('砝码', 191, 116, '#486581', 11, '700');
  text(`m = ${q.m.toFixed(0)} g`, 143, 238, '#2c7be5', 18, '700');
}
function drawMolMeter(q, progress) {
  box(292, 88, 220, 170, '#fff7e6', '#f0a500');
  text('物质的量表盘', 402, 112, '#102a43', 16, '700');
  const cx = 402, cy = 176, r = 56;
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, Math.PI * (1 + Math.min(q.n / 4, 1))); ctx.stroke();
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, Math.PI * 2); ctx.stroke();
  const angle = Math.PI + Math.PI * Math.min(q.n / 4, 1) * progress;
  arrow(cx, cy, cx + Math.cos(angle) * 45, cy + Math.sin(angle) * 45, '#9a6700', 3);
  text(`n = m/M = ${q.n.toFixed(3)} mol`, cx, 238, '#9a6700', 16, '700');
  text(`M = ${q.M.toFixed(0)} g/mol`, cx, 136, '#486581', 13, '700');
}
function drawCounter(q, progress) {
  box(554, 88, 204, 170, '#fff', '#d9e2ec');
  text('粒子计数器', 656, 112, '#102a43', 16, '700');
  const visible = Math.round(q.dots * progress);
  const cols = 12;
  for (let i = 0; i < q.dots; i++) {
    const x = 582 + (i % cols) * 13;
    const y = 138 + Math.floor(i / cols) * 13;
    ctx.globalAlpha = i < visible ? 1 : 0.14;
    ctx.fillStyle = i % 3 === 0 ? '#2c7be5' : (i % 3 === 1 ? '#0f9f6e' : '#d64545');
    ctx.beginPath(); ctx.arc(x, y, 4.3, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  text(`N = nNA = ${sci(q.N)} 个`, 656, 238, '#c92a2a', 15, '700');
}
function drawChart(q) {
  const x = 54, y = 318, w = 310, h = 160;
  box(36, 286, 348, 224, '#fff', '#d9e2ec');
  text('图像：固定 M 时 N 与 m 成正比', 210, 304, '#102a43', 14, '700');
  drawGrid(x, y, w, h, 5, 4);
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - 7, y + h - 4); ctx.moveTo(x + w, y + h); ctx.lineTo(x + w - 7, y + h + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.lineTo(x - 4, y + 7); ctx.moveTo(x, y); ctx.lineTo(x + 4, y + 7); ctx.stroke();
  const maxM = 120;
  const maxN = (120 / q.M) * NA;
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let k = 0; k <= 60; k++) {
    const m = maxM * k / 60;
    const px = x + w * m / maxM;
    const py = y + h - h * ((m / q.M) * NA) / maxN;
    if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  const px = x + w * q.m / maxM;
  const py = y + h - h * q.N / maxN;
  ctx.fillStyle = '#d64545';
  ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = '#d64545';
  ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, y + h); ctx.stroke();
  ctx.setLineDash([]);
  text('m/g', x + w - 16, y + h + 18, '#486581', 11, '400');
  text('N/个', x + 20, y + 14, '#486581', 11, '400');
}
function drawFormulaBoard(q) {
  box(420, 286, 330, 224, '#f7f9fc', '#d9e2ec');
  text('数据记录与公式绑定', 585, 306, '#102a43', 14, '700');
  text('1. 天平读质量 m', 442, 342, '#486581', 13, '700', 'left');
  text(`m = ${q.m.toFixed(0)} g`, 710, 342, '#2c7be5', 13, '700', 'right');
  text('2. 查表得到摩尔质量 M', 442, 374, '#486581', 13, '700', 'left');
  text(`M = ${q.M.toFixed(0)} g/mol`, 710, 374, '#9a6700', 13, '700', 'right');
  text('3. 物质的量 n=m/M', 442, 406, '#486581', 13, '700', 'left');
  text(`n = ${q.n.toFixed(3)} mol`, 710, 406, '#9a6700', 13, '700', 'right');
  text('4. 粒子数 N=nNA', 442, 438, '#486581', 13, '700', 'left');
  text(`N = ${sci(q.N)}`, 710, 438, '#c92a2a', 13, '700', 'right');
  const status = q.m > 0 && q.M > 0 ? '能用：对象明确、m 与 M 单位统一' : '不能用：质量或摩尔质量无效';
  text(`状态判定：${status}`, 442, 478, '#0f9f6e', 13, '700', 'left');
}
function draw() {
  const q = data();
  const progress = state.running ? Math.min(1, state.time / 2.4) : 1;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(1, '#f0f7ff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  text('阿伏伽德罗常数：从可称的质量换算到不可数的粒子', 395, 34, '#102a43', 18, '700');
  text('俯视装置 + 换算剖面 + 图像数据记录；拖动把手直接改变读数。', 395, 62, '#486581', 13, '400');
  drawBalance(q, progress);
  arrow(252, 172, 284, 172, '#2c7be5');
  text('除以 M', 268, 150, '#2c7be5', 12, '700');
  drawMolMeter(q, progress);
  arrow(518, 172, 548, 172, '#2c7be5');
  text('乘以 NA', 533, 150, '#2c7be5', 12, '700');
  drawCounter(q, progress);
  drawChart(q);
  drawFormulaBoard(q);

  for (const h of handles(q)) {
    ctx.fillStyle = h.name === 'm' ? '#2c7be5' : h.name === 'M' ? '#f0a500' : '#0f9f6e';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
    text(h.name, h.x, h.y + 1, '#fff', 12, '700');
  }
  text('拖动 m', 160, 214, '#2c7be5', 12, '700');
  text('拖动 M', 434, 214, '#9a6700', 12, '700');
  text('拖显示比例', 668, 512, '#0f9f6e', 12, '700');

  els.massVal.textContent = q.m.toFixed(0);
  els.molarVal.textContent = q.M.toFixed(0);
  els.scaleVal.textContent = q.scale.toFixed(2);
  els.playBtn.textContent = state.running ? '暂停' : '播放';
  els.readout.innerHTML = [
    `m=${q.m.toFixed(0)}g，M=${q.M.toFixed(0)}g/mol`,
    `n=m/M=<b>${q.n.toFixed(3)}mol</b>`,
    `N=nNA=<b>${sci(q.N)}个</b>`,
    `NA=<b>6.02×10^23 mol^-1</b>`
  ].join('<br>');
}
function loop(now) {
  if (!state.last) state.last = now;
  const dt = Math.min(0.04, (now - state.last) / 1000);
  state.last = now;
  if (state.running) {
    state.time += dt;
    if (state.time > 2.4) {
      state.time = 2.4;
      state.running = false;
    }
  }
  draw();
  requestAnimationFrame(loop);
}
function pos(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * canvas.width / rect.width,
    y: (evt.clientY - rect.top) * canvas.height / rect.height
  };
}
function hit(p) {
  return handles(data()).find(h => Math.hypot(p.x - h.x, p.y - h.y) <= h.r + 8);
}
canvas.addEventListener('pointerdown', evt => {
  const h = hit(pos(evt));
  if (h) {
    state.drag = h.name;
    canvas.setPointerCapture(evt.pointerId);
  }
});
canvas.addEventListener('pointermove', evt => {
  const p = pos(evt);
  if (!state.drag) {
    canvas.style.cursor = hit(p) ? 'grab' : 'default';
    return;
  }
  if (state.drag === 'm') setData({ m: (p.x - 94) / 1.55 });
  if (state.drag === 'M') setData({ M: (p.x - 368) / 1.35 });
  if (state.drag === 'scale') setData({ scale: (p.x - 607) / 450 });
  draw();
});
canvas.addEventListener('pointerup', evt => {
  state.drag = null;
  try { canvas.releasePointerCapture(evt.pointerId); } catch (e) {}
});
canvas.addEventListener('pointercancel', () => { state.drag = null; });

els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  state.last = 0;
  if (state.time >= 2.4) state.time = 0;
  draw();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  setData({ m: 18, M: 18, scale: 0.05 });
  draw();
});
els.recordBtn.addEventListener('click', () => {
  const q = data();
  state.records.unshift({ m: q.m, M: q.M, n: q.n });
  state.records = state.records.slice(0, 4);
  renderRecords();
});
function renderRecords() {
  els.records.innerHTML = state.records.map((r, idx) =>
    `<tr><td>${idx + 1}</td><td>${r.m.toFixed(0)}</td><td>${r.M.toFixed(0)}</td><td>${r.n.toFixed(3)}</td></tr>`
  ).join('');
}
for (const id of ['mass', 'molar', 'scale']) {
  els[id].addEventListener('input', draw);
}
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
