<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿伏伽德罗常数</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:540px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="520"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>固定摩尔质量 M 时把质量 m 加倍，看 n 和 N 是否加倍；固定 m 时增大 M，看同样质量对应的粒子数怎样变化。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>样品质量 m <b id="mText">18 g</b></span><input id="mass" type="range" min="1" max="120" step="1" value="18"></label><div class="stepper"><button data-step="mass" data-dir="-1">- m</button><button data-step="mass" data-dir="1">+ m</button></div>
    <label class="param"><span>摩尔质量 M <b id="MText">18 g/mol</b></span><input id="molar" type="range" min="2" max="120" step="1" value="18"></label><div class="stepper"><button data-step="molar" data-dir="-1">- M</button><button data-step="molar" data-dir="1">+ M</button></div>
    <label class="param"><span>每点代表 <b id="scaleText">0.05 mol</b></span><input id="scale" type="range" min="0.02" max="0.3" step="0.01" value="0.05"></label>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">换算链</div><div>n = m/M</div><div>N = nNA = (m/M)NA</div><div>NA = 6.02×10^23 mol^-1</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={mass:document.getElementById('mass'),molar:document.getElementById('molar'),scale:document.getElementById('scale')};const NA=6.02e23;function fmt(n,d){return n.toFixed(d==null?2:d)}function sci(x){const e=Math.floor(Math.log10(Math.max(x,1)));const a=x/Math.pow(10,e);return a.toFixed(2)+'×10^'+e}function p(){const m=+els.mass.value,M=+els.molar.value,scale=+els.scale.value,n=m/M,N=n*NA,dots=Math.max(1,Math.min(140,Math.round(n/scale)));return{m,M,scale,n,N,dots}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-11*Math.cos(ang-.45),y2-11*Math.sin(ang-.45));ctx.lineTo(x2-11*Math.cos(ang+.45),y2-11*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function draw(){const q=p();ctx.clearRect(0,0,860,520);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,520);text('阿伏伽德罗常数：把 mol 换成粒子个数',430,30,'#102a43','center',18,'700');box(40,78,190,128,'#fff','#d9e2ec');text('宏观质量',135,105,'#102a43','center',16,'700');text('m = '+fmt(q.m,0)+' g',135,142,'#2c7be5','center',24,'700');text('天平能直接测量',135,180,'#486581','center',13);arrow(238,142,318,142,'#2c7be5');text('除以 M',278,120,'#2c7be5','center',13,'700');box(326,78,190,128,'#fff7e6','#f0a500');text('物质的量',421,105,'#102a43','center',16,'700');text('n = '+fmt(q.n,3)+' mol',421,142,'#9a6700','center',22,'700');text('n = m/M',421,180,'#486581','center',13);arrow(524,142,604,142,'#2c7be5');text('乘以 NA',564,120,'#2c7be5','center',13,'700');box(612,78,200,128,'#fff','#d9e2ec');text('微观粒子数',712,105,'#102a43','center',16,'700');text('N = '+sci(q.N),712,142,'#c92a2a','center',20,'700');text('分子、原子或离子个数',712,180,'#486581','center',13);box(54,250,752,206,'#f7f9fc','#d9e2ec');text('比例粒子图：小点不是实际粒子总数，每个点代表 '+fmt(q.scale,2)+' mol',430,275,'#486581','center',13,'700');const cols=28,gap=21,startX=140,startY=312;for(let i=0;i<q.dots;i++){const x=startX+(i%cols)*gap,y=startY+Math.floor(i/cols)*gap;ctx.fillStyle=i%3===0?'#2c7be5':(i%3===1?'#e8590c':'#38b2ac');ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill()}text('显示点数约 '+q.dots+' 个；真实粒子数是 '+sci(q.N)+' 个',430,438,'#102a43','center',14,'700');update(q)}function update(q){document.getElementById('mText').textContent=fmt(q.m,0)+' g';document.getElementById('MText').textContent=fmt(q.M,0)+' g/mol';document.getElementById('scaleText').textContent=fmt(q.scale,2)+' mol';document.getElementById('readout').innerHTML='n=m/M=<b>'+fmt(q.n,3)+' mol</b><br>N=nNA=<b>'+sci(q.N)+' 个</b><br>NA=<b>6.02×10^23 mol^-1</b><br>每点代表=<b>'+fmt(q.scale,2)+' mol</b>';document.getElementById('status').textContent='NA 是每 1 mol 基本粒子的个数；先确认计数对象，再做 n 与 N 的换算。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));draw();})();
</script>
</body>
</html>
