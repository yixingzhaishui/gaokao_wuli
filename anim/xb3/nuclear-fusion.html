<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>核聚变：高温下轻核结合</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="核聚变实验台：粒子轨迹俯视、约束侧视、能垒图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="temp">温度等级：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="1" max="10" value="7" step="1">
      <label for="confine">约束强度：<span id="confineVal"></span></label>
      <input id="confine" type="range" min="1" max="10" value="8" step="1">
      <label for="count">反应次数：<span id="countVal"></span></label>
      <input id="count" type="range" min="1" max="100" value="20" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动画面里的氘核或氚核改变接近距离；点“播放”看高温热运动是否能越过电斥能垒，形成 ⁴He+n 并释放 17.6 MeV。</div>
      <table aria-label="聚变条件数据记录">
        <thead><tr><th>组</th><th>T</th><th>约束</th><th>概率</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  temp: document.getElementById('temp'),
  confine: document.getElementById('confine'),
  count: document.getElementById('count'),
  tempVal: document.getElementById('tempVal'),
  confineVal: document.getElementById('confineVal'),
  countVal: document.getElementById('countVal'),
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = {
  running: false,
  last: 0,
  time: 0,
  approach: 0.35,
  flash: 0,
  drag: null,
  records: []
};
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const temp = Number(els.temp.value);
  const conf = Number(els.confine.value);
  const count = Number(els.count.value);
  const thermal = temp / 10;
  const confine = conf / 10;
  const barrier = 0.58;
  const closeness = 1 - state.approach;
  const prob = clamp((thermal * 0.62 + confine * 0.28 + closeness * 0.36 - barrier) * 170, 0, 100);
  const ready = prob >= 50;
  const total = 17.6 * count;
  return { temp, conf, count, thermal, confine, barrier, closeness, prob, ready, total };
}
function drawArrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 9 * Math.cos(a - 0.45), y2 - 9 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 9 * Math.cos(a + 0.45), y2 - 9 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawParticle(x, y, r, label, color) {
  const grad = ctx.createRadialGradient(x - 8, y - 8, 4, x, y, r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 17px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y + 6);
}
function drawChamber(v) {
  const cx = 230, cy = 246;
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 176, 136, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('俯视聚变实验台：高温等离子体中 D、T 接近并碰撞', cx, 64);
  for (let i = 0; i < 32; i++) {
    const a = i * 1.9 + state.time;
    const r = 28 + (i % 6) * 22;
    ctx.fillStyle = i % 2 ? '#d0ebff' : '#fff7e6';
    ctx.beginPath();
    ctx.arc(cx + r * Math.cos(a), cy + 0.74 * r * Math.sin(a), 3, 0, Math.PI * 2);
    ctx.fill();
  }
  const close = 168 * state.approach;
  const leftX = cx - close / 2;
  const rightX = cx + close / 2;
  drawParticle(leftX, cy, 30, '²H', '#d0ebff');
  drawParticle(rightX, cy, 34, '³H', '#d0ebff');
  drawArrow(leftX + 34, cy, leftX + 68, cy, '#e03131');
  drawArrow(rightX - 34, cy, rightX - 68, cy, '#e03131');
  if (v.ready && state.approach < 0.18) {
    ctx.fillStyle = 'rgba(240,165,0,' + (0.25 + 0.55 * state.flash) + ')';
    ctx.beginPath();
    ctx.arc(cx, cy, 70 + 18 * state.flash, 0, Math.PI * 2);
    ctx.fill();
    drawParticle(cx - 24, cy + 82, 36, '⁴He', '#fff7e6');
    ctx.fillStyle = '#2c7be5';
    ctx.beginPath();
    ctx.arc(cx + 78, cy + 78, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#486581';
    ctx.font = '13px system-ui';
    ctx.fillText('n', cx + 78, cy + 58);
  }
  ctx.fillStyle = '#102a43';
  ctx.font = '13px system-ui';
  ctx.fillText('反应：²H + ³H → ⁴He + n + 17.6 MeV；质量亏损 Δm 对应 E=Δmc²', cx, 430);
}
function drawGauge(v) {
  const x = 492, y = 76;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 176, 176);
  ctx.strokeRect(x, y, 176, 176);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('约束侧视/概率表盘', x + 88, y + 24);
  ctx.strokeStyle = '#f0a500';
  ctx.setLineDash([7, 5]);
  ctx.beginPath();
  ctx.arc(x + 88, y + 96, 70 - v.conf * 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  const barH = clamp(v.prob / 100, 0, 1) * 90;
  ctx.fillStyle = v.ready ? '#087f5b' : '#e03131';
  ctx.fillRect(x + 128, y + 146 - barH, 18, barH);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 15px system-ui';
  ctx.fillText('概率 ' + v.prob.toFixed(0) + '%', x + 88, y + 154);
}
function drawBarrier(v) {
  const x0 = 474, y0 = 456, w = 210, h = 134;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    const x = x0 + t * w;
    const y = y0 - (0.18 + 0.78 * Math.exp(-Math.pow((t - 0.42) / 0.18, 2))) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  const energyY = y0 - v.thermal * h;
  ctx.strokeStyle = '#2c7be5';
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(x0, energyY);
  ctx.lineTo(x0 + w, energyY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('能垒图像：温度越高，热运动能量越可能越过电斥势垒', x0 + w / 2, y0 + 26);
  ctx.fillText('能量', x0 - 20, y0 - h - 4);
}
function draw() {
  const v = values();
  els.tempVal.textContent = v.temp;
  els.confineVal.textContent = v.conf;
  els.countVal.textContent = v.count;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('核聚变实验台：粒子轨迹俯视 + 约束侧视 + 能垒图像 + 数据记录', 370, 28);
  drawChamber(v);
  drawGauge(v);
  drawBarrier(v);
  els.readout.innerHTML = [
    `<div id="r1">温度等级=${v.temp}，约束强度=${v.conf}</div>`,
    `<div id="r2">聚变概率指标≈${v.prob.toFixed(0)}%，${v.ready ? '条件较充分' : '条件不足'}</div>`,
    `<div id="r3">D-T 单次聚变释放 17.6 MeV</div>`,
    `<div id="r4">${v.count} 次总能量≈${v.total.toFixed(1)} MeV，E=Δmc²</div>`
  ].join('');
  els.status.className = v.ready ? 'status' : 'status bad';
  els.status.textContent = v.ready
    ? '条件较充分：高温动能和约束时间让轻核有机会靠近到核力范围。'
    : '条件不足：轻核带正电，电斥力使它们难以靠近。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.temp}</td><td>${p.conf}</td><td>${p.prob.toFixed(0)}%</td></tr>`
  ).join('');
}
function setApproachFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  state.approach = clamp(Math.abs(x - 230) / 150, 0.08, 0.95);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    const v = values();
    const speed = 0.12 + v.thermal * 0.48;
    state.approach -= speed * dt;
    if (state.approach < 0.08) {
      state.flash = 1;
      state.approach = v.ready ? 0.08 : 0.72;
    }
    state.flash = Math.max(0, state.flash - dt * 1.6);
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ temp: v.temp, conf: v.conf, prob: v.prob });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.approach = 0.35;
  state.flash = 0;
  state.records = [];
  els.temp.value = '7';
  els.confine.value = '8';
  els.count.value = '20';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'nucleus-handle';
  setApproachFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setApproachFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
