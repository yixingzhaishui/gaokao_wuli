<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>核聚变：高温下轻核结合</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 430px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.8; font-size: 14px; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 760px) { .stage { grid-template-columns: 1fr; } canvas { height: 360px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="680" height="430" aria-label="核聚变条件模型"></canvas>
    <section class="panel">
      <label for="temp">温度等级：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="1" max="10" value="7" step="1">
      <label for="confine">约束强度：<span id="confineVal"></span></label>
      <input id="confine" type="range" min="1" max="10" value="8" step="1">
      <label for="count">反应次数：<span id="countVal"></span></label>
      <input id="count" type="range" min="1" max="100" value="20" step="1">
      <div id="readout" class="readout"></div>
      <div class="hint">观察任务：提高温度和约束，观察聚变概率；总能量按单次 17.6 MeV 乘反应次数估算。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  temp: document.getElementById('temp'),
  confine: document.getElementById('confine'),
  count: document.getElementById('count'),
  tempVal: document.getElementById('tempVal'),
  confineVal: document.getElementById('confineVal'),
  countVal: document.getElementById('countVal'),
  readout: document.getElementById('readout')
};
function draw() {
  const temp = Number(els.temp.value);
  const conf = Number(els.confine.value);
  const count = Number(els.count.value);
  const prob = Math.min(100, temp * conf);
  const close = Math.max(44, 190 - temp * 11);
  const ready = prob >= 50;
  const total = 17.6 * count;
  els.tempVal.textContent = temp;
  els.confineVal.textContent = conf;
  els.countVal.textContent = count;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#f7f9fc';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = ready ? '#f0a500' : '#829ab1';
  ctx.setLineDash([8, 6]);
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(340, 170, 126 - conf * 6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(340 - close / 2, 170, 34, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(340 + close / 2, 170, 38, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 17px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('²H', 340 - close / 2, 176);
  ctx.fillText('³H', 340 + close / 2, 176);
  if (ready) {
    ctx.fillStyle = '#fff7e6';
    ctx.strokeStyle = '#f0a500';
    ctx.beginPath();
    ctx.arc(340, 292, 44, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#102a43';
    ctx.fillText('⁴He', 340, 298);
    ctx.fillStyle = '#2c7be5';
    ctx.beginPath();
    ctx.arc(430, 282, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#486581';
    ctx.font = '13px system-ui';
    ctx.fillText('n', 430, 260);
  }
  ctx.fillStyle = ready ? '#087f5b' : '#b30000';
  ctx.font = '700 18px system-ui';
  ctx.fillText(ready ? '条件较充分：聚变概率较高' : '条件不足：难以克服电斥力', 340, 60);
  ctx.fillStyle = '#486581';
  ctx.font = '14px system-ui';
  ctx.fillText('高温提高核动能，约束提高相遇和停留机会。', 340, 390);
  els.readout.innerHTML = [
    `温度等级=${temp}，约束强度=${conf}`,
    `聚变概率指标≈${prob}%：${ready ? '条件较充分' : '条件不足'}`,
    `D-T 单次聚变约释放 17.6 MeV`,
    `反应 ${count} 次：总能量≈${total.toFixed(1)} MeV`
  ].join('<br>');
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
