<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分子动理论</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:580px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="880" height="560"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>拖温度 T 看分子平均速率和布朗颗粒轨迹；拖分子数 N 看碰撞密集程度；拖 r/r0 看分子力从斥力到引力的变化。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>温度 T <b id="tText">300 K</b></span><input id="temp" type="range" min="100" max="700" step="20" value="300"></label><div class="stepper"><button data-step="temp" data-dir="-1">- T</button><button data-step="temp" data-dir="1">+ T</button></div>
    <label class="param"><span>分子数 N <b id="nText">70</b></span><input id="count" type="range" min="25" max="120" step="5" value="70"></label><div class="stepper"><button data-step="count" data-dir="-1">- N</button><button data-step="count" data-dir="1">+ N</button></div>
    <label class="param"><span>分子间距 r/r0 <b id="rText">1.00</b></span><input id="dist" type="range" min="0.75" max="2.6" step="0.01" value="1.00"></label><div class="stepper"><button data-step="dist" data-dir="-1">- r</button><button data-step="dist" data-dir="1">+ r</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">三条基本图像</div><div>物质由大量分子组成</div><div>分子永不停息做无规则运动</div><div>分子间存在相互作用力</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={temp:document.getElementById('temp'),count:document.getElementById('count'),dist:document.getElementById('dist')};let mol=[],brown={x:250,y:250,vx:0,vy:0,trail:[]},running=true;function p(){const T=+els.temp.value,N=+els.count.value,r=+els.dist.value;return{T,N,r,speed:Math.sqrt(T/300),ek:T/300}}function ensure(q){while(mol.length<q.N){const a=Math.random()*Math.PI*2;mol.push({x:38+Math.random()*404,y:78+Math.random()*342,a})}while(mol.length>q.N)mol.pop()}function fmt(n,d){return n.toFixed(d==null?1:d)}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(ang-.45),y2-10*Math.sin(ang-.45));ctx.lineTo(x2-10*Math.cos(ang+.45),y2-10*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function forceState(r){if(r<0.96)return{txt:'r<r0：斥力主导',kind:'斥力',color:'#b30000'};if(r<1.04)return{txt:'r=r0：引力=斥力，合力约为0',kind:'平衡',color:'#087f5b'};if(r<2.15)return{txt:'r>r0：引力主导',kind:'引力',color:'#9a6700'};return{txt:'r很大：分子力近似为0',kind:'近似0',color:'#486581'}}function step(q,dt){ensure(q);const sp=82*q.speed;for(const m of mol){m.x+=Math.cos(m.a)*sp*dt;m.y+=Math.sin(m.a)*sp*dt;if(m.x<38||m.x>442){m.a=Math.PI-m.a;m.x=Math.max(38,Math.min(442,m.x))}if(m.y<78||m.y>420){m.a=-m.a;m.y=Math.max(78,Math.min(420,m.y))}if(Math.random()<0.015*q.speed)m.a+=(Math.random()-.5)*1.2}brown.vx+=(Math.random()-.5)*sp*dt*7;brown.vy+=(Math.random()-.5)*sp*dt*7;brown.vx*=0.91;brown.vy*=0.91;brown.x+=brown.vx*dt;brown.y+=brown.vy*dt;if(brown.x<60||brown.x>420){brown.vx*=-1;brown.x=Math.max(60,Math.min(420,brown.x))}if(brown.y<100||brown.y>395){brown.vy*=-1;brown.y=Math.max(100,Math.min(395,brown.y))}brown.trail.push({x:brown.x,y:brown.y});if(brown.trail.length>70)brown.trail.shift()}function draw(){const q=p(),fs=forceState(q.r);ensure(q);ctx.clearRect(0,0,880,560);ctx.fillStyle='#fff';ctx.fillRect(0,0,880,560);text('分子动理论：大量分子的随机运动产生可测的宏观热现象',440,28,'#102a43','center',18,'700');box(28,58,430,390,'#fff','#d9e2ec');text('大量分子和布朗运动',243,82,'#102a43','center',15,'700');ctx.fillStyle='#2c7be5';for(const m of mol){ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);ctx.fill()}ctx.strokeStyle='rgba(201,42,42,.55)';ctx.lineWidth=1.5;ctx.beginPath();brown.trail.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y)});ctx.stroke();ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(brown.x,brown.y,10,0,Math.PI*2);ctx.fill();text('悬浮颗粒',brown.x,brown.y-18,'#c92a2a','center',12,'700');text('T↑：平均速率↑、平均动能↑、撞击更频繁',243,430,'#486581','center',13);box(486,58,354,390,'#fff','#d9e2ec');text('分子间作用力',663,82,'#102a43','center',15,'700');const left=600,right=600+q.r*72,y=195;ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(left,y,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e8590c';ctx.beginPath();ctx.arc(right,y,22,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#829ab1';ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(left,y+42);ctx.lineTo(right,y+42);ctx.stroke();ctx.setLineDash([]);text('r = '+fmt(q.r,2)+' r0',(left+right)/2,y+58,'#486581','center',13,'700');if(q.r<0.96){arrow(left-24,y-36,left-66,y-36,'#b30000',3);arrow(right+24,y-36,right+66,y-36,'#b30000',3)}else if(q.r<1.04){text('F合≈0',(left+right)/2,y-42,'#087f5b','center',14,'700')}else if(q.r<2.15){arrow(left-24,y-36,left+20,y-36,'#9a6700',3);arrow(right+24,y-36,right-20,y-36,'#9a6700',3)}else{text('距离很大，分子力≈0',(left+right)/2,y-42,'#486581','center',14,'700')}box(540,320,250,72,'#f7f9fc','#d9e2ec');text(fs.txt,665,346,fs.color,'center',14,'700');text('近斥、平衡、远引、很远近似无力',665,374,'#486581','center',12);update(q,fs)}function update(q,fs){document.getElementById('tText').textContent=fmt(q.T,0)+' K';document.getElementById('nText').textContent=fmt(q.N,0);document.getElementById('rText').textContent=fmt(q.r,2);document.getElementById('readout').innerHTML='平均速率比例 ∝√T：<b>'+fmt(q.speed,2)+'</b><br>平均动能比例 ∝T：<b>'+fmt(q.ek,2)+'</b><br>分子数 N：<b>'+fmt(q.N,0)+'</b><br>分子力状态：<b>'+fs.kind+'</b>';document.getElementById('status').textContent='温度描述大量分子的平均动能，不描述某一个分子的固定速度；布朗运动主体是悬浮颗粒。'}Object.values(els).forEach(el=>el.addEventListener('input',()=>{draw()}));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.03);last=now;if(running)step(p(),dt);draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
