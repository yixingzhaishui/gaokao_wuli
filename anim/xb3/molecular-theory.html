<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>分子动理论</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="分子动理论实验台：布朗运动俯视、分子力侧视、速率统计图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">暂停</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="temp">温度 T/K：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="100" max="700" value="300" step="20">
      <label for="count">分子数 N：<span id="countVal"></span></label>
      <input id="count" type="range" min="25" max="120" value="70" step="5">
      <label for="dist">分子间距 r/r0：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.75" max="2.6" value="1" step="0.01">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动红色悬浮颗粒看布朗轨迹；拖动右侧分子改变 r/r0，看近斥、平衡、远引；调高 T 看平均速率和平均动能读数。</div>
      <table aria-label="分子动理论数据记录">
        <thead><tr><th>组</th><th>T</th><th>√T比</th><th>分子力</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  temp: document.getElementById('temp'),
  count: document.getElementById('count'),
  dist: document.getElementById('dist'),
  tempVal: document.getElementById('tempVal'),
  countVal: document.getElementById('countVal'),
  distVal: document.getElementById('distVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const mol = [];
const brown = { x: 225, y: 250, vx: 0, vy: 0, trail: [] };
const state = { running: true, last: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function forceState(r) {
  if (r < 0.96) return { txt: 'r<r0：斥力主导', kind: '斥力', color: '#b30000' };
  if (r < 1.04) return { txt: 'r=r0：引力=斥力，合力约为0', kind: '平衡', color: '#087f5b' };
  if (r < 2.15) return { txt: 'r>r0：引力主导', kind: '引力', color: '#9a6700' };
  return { txt: 'r很大：分子力近似为0', kind: '近似0', color: '#486581' };
}
function values() {
  const T = Number(els.temp.value);
  const N = Number(els.count.value);
  const r = Number(els.dist.value);
  return { T, N, r, speed: Math.sqrt(T / 300), ek: T / 300, fs: forceState(r) };
}
function ensure(q) {
  while (mol.length < q.N) mol.push({ x: 54 + Math.random() * 344, y: 96 + Math.random() * 286, a: Math.random() * Math.PI * 2 });
  while (mol.length > q.N) mol.pop();
}
function step(q, dt) {
  ensure(q);
  const sp = 88 * q.speed;
  mol.forEach(m => {
    m.x += Math.cos(m.a) * sp * dt;
    m.y += Math.sin(m.a) * sp * dt;
    if (m.x < 48 || m.x > 410) { m.a = Math.PI - m.a; m.x = clamp(m.x, 48, 410); }
    if (m.y < 86 || m.y > 394) { m.a = -m.a; m.y = clamp(m.y, 86, 394); }
    if (Math.random() < 0.016 * q.speed) m.a += (Math.random() - 0.5) * 1.1;
  });
  brown.vx += (Math.random() - 0.5) * sp * dt * 6.5;
  brown.vy += (Math.random() - 0.5) * sp * dt * 6.5;
  brown.vx *= 0.91;
  brown.vy *= 0.91;
  brown.x += brown.vx * dt;
  brown.y += brown.vy * dt;
  if (brown.x < 68 || brown.x > 390) { brown.vx *= -1; brown.x = clamp(brown.x, 68, 390); }
  if (brown.y < 106 || brown.y > 372) { brown.vy *= -1; brown.y = clamp(brown.y, 106, 372); }
  brown.trail.push({ x: brown.x, y: brown.y });
  if (brown.trail.length > 76) brown.trail.shift();
}
function arrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 9 * Math.cos(a - 0.45), y2 - 9 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 9 * Math.cos(a + 0.45), y2 - 9 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawMotion(q) {
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(34, 70, 404, 348);
  ctx.strokeRect(34, 70, 404, 348);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('布朗运动俯视实验台：大量分子无规则运动，红点是悬浮颗粒', 236, 96);
  ctx.fillStyle = '#2c7be5';
  mol.forEach(m => { ctx.beginPath(); ctx.arc(m.x, m.y, 3, 0, Math.PI * 2); ctx.fill(); });
  ctx.strokeStyle = 'rgba(201,42,42,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  brown.trail.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
  ctx.stroke();
  ctx.fillStyle = '#c92a2a';
  ctx.beginPath();
  ctx.arc(brown.x, brown.y, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.fillText('T↑：平均速率↑，平均动能↑；布朗运动主体是颗粒', 236, 394);
}
function drawForce(q) {
  const left = 536, right = 536 + q.r * 66, y = 190;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(472, 70, 230, 230);
  ctx.strokeRect(472, 70, 230, 230);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('分子力侧视：拖动右侧分子改变 r', 587, 96);
  ctx.fillStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(left, y, 20, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e8590c';
  ctx.beginPath();
  ctx.arc(right, y, 20, 0, Math.PI * 2);
  ctx.fill();
  if (q.r < 0.96) {
    arrow(left - 22, y - 34, left - 58, y - 34, '#b30000');
    arrow(right + 22, y - 34, right + 58, y - 34, '#b30000');
  } else if (q.r < 1.04) {
    ctx.fillStyle = '#087f5b';
    ctx.font = '700 14px system-ui';
    ctx.fillText('F合≈0', (left + right) / 2, y - 38);
  } else if (q.r < 2.15) {
    arrow(left - 22, y - 34, left + 18, y - 34, '#9a6700');
    arrow(right + 22, y - 34, right - 18, y - 34, '#9a6700');
  } else {
    ctx.fillStyle = '#486581';
    ctx.font = '700 14px system-ui';
    ctx.fillText('分子力≈0', (left + right) / 2, y - 38);
  }
  ctx.fillStyle = q.fs.color;
  ctx.font = '700 14px system-ui';
  ctx.fillText(q.fs.txt, 587, 266);
}
function drawGraph(q) {
  const x0 = 488, y0 = 448, w = 190, h = 120;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 70; i++) {
    const T = 100 + i / 70 * 600;
    const x = x0 + (T - 100) / 600 * w;
    const y = y0 - clamp(Math.sqrt(T / 300) / 1.55, 0, 1) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  const px = x0 + (q.T - 100) / 600 * w;
  const py = y0 - clamp(q.speed / 1.55, 0, 1) * h;
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('速率统计图像/数据记录：平均速率∝√T，平均动能∝T', x0 + w / 2, y0 + 28);
}
function draw() {
  const q = values();
  els.tempVal.textContent = q.T.toFixed(0);
  els.countVal.textContent = q.N.toFixed(0);
  els.distVal.textContent = q.r.toFixed(2);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('分子动理论实验台：布朗运动俯视 + 分子力侧视 + 速率图像 + 数据记录', 370, 28);
  drawMotion(q);
  drawForce(q);
  drawGraph(q);
  els.readout.innerHTML = [
    `<div id="r1">平均速率比例 ∝√T：${q.speed.toFixed(2)}</div>`,
    `<div id="r2">平均动能比例 ∝T：${q.ek.toFixed(2)}</div>`,
    `<div id="r3">分子数 N=${q.N}，分子力状态：${q.fs.kind}</div>`,
    `<div id="r4">三条图像：大量分子、无规则热运动、分子间作用力</div>`
  ].join('');
  els.status.textContent = '温度描述大量分子的平均动能，不描述某一个分子的固定速度；布朗运动主体是悬浮颗粒。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.T}</td><td>${p.speed.toFixed(2)}</td><td>${p.fs.kind}</td></tr>`
  ).join('');
}
function setFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  if (state.drag === 'brownian-particle-handle') {
    brown.x = clamp(x, 68, 390);
    brown.y = clamp(y, 106, 372);
    brown.trail.push({ x: brown.x, y: brown.y });
  } else {
    const r = clamp((x - 536) / 66, 0.75, 2.6);
    els.dist.value = r.toFixed(2);
  }
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.03, (ts - state.last) / 1000);
  state.last = ts;
  const q = values();
  if (state.running && !state.drag) step(q, dt || 0.016);
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  state.records.push(values());
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = true;
  state.records = [];
  els.temp.value = '300';
  els.count.value = '70';
  els.dist.value = '1';
  brown.x = 225; brown.y = 250; brown.vx = 0; brown.vy = 0; brown.trail = [];
  els.playBtn.textContent = '暂停';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  state.drag = x < 455 ? 'brownian-particle-handle' : 'molecule-distance-handle';
  setFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
ensure(values());
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
