<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热力学第一定律</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:540px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}.status.bad{background:#ffe6e6;border-color:#ff6b6b;color:#b30000}.status.warn{background:#fff7e6;border-color:#f0a500;color:#9a6700}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="850" height="520"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>分别拖 Q 和 W，看 ΔU 是否等于两者代数和；注意 W 是外界对系统做功。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>热量 Q <b id="qText">500 J</b></span><input id="heat" type="range" min="-800" max="1000" step="50" value="500"></label><div class="stepper"><button data-step="heat" data-dir="-1">- Q</button><button data-step="heat" data-dir="1">+ Q</button></div>
    <label class="param"><span>外界做功 W <b id="wText">200 J</b></span><input id="work" type="range" min="-800" max="1000" step="50" value="200"></label><div class="stepper"><button data-step="work" data-dir="-1">- W</button><button data-step="work" data-dir="1">+ W</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">本页符号</div><div>Q>0：系统吸热</div><div>W>0：外界对系统做功</div><div>ΔU = Q + W</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={heat:document.getElementById('heat'),work:document.getElementById('work')};function fmt(n){return n.toFixed(0)}function p(){const Q=+els.heat.value,W=+els.work.value,dU=Q+W;return{Q,W,dU}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||4;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-14*Math.cos(ang-.45),y2-14*Math.sin(ang-.45));ctx.lineTo(x2-14*Math.cos(ang+.45),y2-14*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function draw(){const q=p();ctx.clearRect(0,0,850,520);ctx.fillStyle='#fff';ctx.fillRect(0,0,850,520);text('热力学第一定律：ΔU = Q + W',425,34,'#102a43','center',20,'700');box(300,130,250,190,'#fff','#334e68');text('系统',425,166,'#102a43','center',18,'700');const level=Math.max(0,Math.min(1,(q.dU+1200)/2400));ctx.fillStyle=q.dU>=0?'rgba(240,165,0,.45)':'rgba(44,123,229,.25)';ctx.fillRect(330,282-level*110,190,level*110);text('内能变化 ΔU',425,258,'#486581','center',14);text((q.dU>=0?'+':'')+fmt(q.dU)+' J',425,292,'#f0a500','center',28,'700');if(q.Q>=0){arrow(92,210,292,210,'#e03131',Math.max(2,Math.min(8,Math.abs(q.Q)/150)));text('吸热 Q=+'+fmt(q.Q)+'J',185,184,'#e03131','center',14,'700')}else{arrow(292,210,92,210,'#2c7be5',Math.max(2,Math.min(8,Math.abs(q.Q)/150)));text('放热 Q='+fmt(q.Q)+'J',185,184,'#2c7be5','center',14,'700')}if(q.W>=0){arrow(758,210,558,210,'#7b2cbf',Math.max(2,Math.min(8,Math.abs(q.W)/150)));text('外界做功 W=+'+fmt(q.W)+'J',665,184,'#7b2cbf','center',14,'700')}else{arrow(558,210,758,210,'#7b2cbf',Math.max(2,Math.min(8,Math.abs(q.W)/150)));text('系统对外做功 W='+fmt(q.W)+'J',665,184,'#7b2cbf','center',14,'700')}box(176,382,500,58,'#f7f9fc','#d9e2ec');text('能量账本：ΔU = '+fmt(q.Q)+' + '+fmt(q.W)+' = '+fmt(q.dU)+' J',426,411,'#102a43','center',18,'700');update(q)}function update(q){document.getElementById('qText').textContent=fmt(q.Q)+' J';document.getElementById('wText').textContent=fmt(q.W)+' J';document.getElementById('readout').innerHTML='Q=<b>'+fmt(q.Q)+' J</b><br>W=<b>'+fmt(q.W)+' J</b><br>ΔU=Q+W=<b>'+fmt(q.dU)+' J</b>';const st=document.getElementById('status');if(q.dU>0){st.className='status';st.textContent='内能增加：系统获得的能量代数和为正。'}else if(q.dU<0){st.className='status bad';st.textContent='内能减少：系统流出或对外做功的能量更多。'}else{st.className='status warn';st.textContent='内能不变：吸热和做功的代数和为 0。'}}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));draw();})();
</script>
</body>
</html>
