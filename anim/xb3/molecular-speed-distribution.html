<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分子运动速率分布图像实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box} body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}canvas{display:block;width:100%;touch-action:none;cursor:crosshair}.panel{display:flex;flex-direction:column;gap:10px}.card{padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr;padding:8px}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" aria-label="分子运动速率分布实验台：可见分子运动、速率直方图和麦克斯韦分布曲线"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>固定分子质量，拖动温度探针或温度滑块。先看容器中箭头长短，再核对直方图和曲线：升温后峰位右移、峰值降低、分布变宽，但归一化面积仍接近 1。</div>
    <div class="card">
      <div class="title">改变一个物理量</div>
      <label class="param"><span>温度 T <b id="tLabel">300 K</b></span><input id="temp" type="range" min="180" max="720" step="10" value="300"></label>
      <label class="param"><span>分子质量 m <b id="mLabel">28 u</b></span><input id="mass" type="range" min="12" max="60" step="2" value="28"></label>
      <label class="param"><span>样本数 N <b id="nLabel">160</b></span><input id="count" type="range" min="80" max="240" step="20" value="160"></label>
      <div class="buttons"><button id="play">暂停分子运动</button><button id="record">记录当前曲线</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">实验记录</div><table><thead><tr><th>T/K</th><th>峰位</th><th>平均速率</th><th>面积</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula"><div class="title">公式与图像</div><div><b>麦克斯韦速率分布：</b><code>f(v)∝v²e<sup>−v²/(2a²)</sup></code>，其中 <code>a∝√(T/m)</code>。</div><div>曲线下面积是归一化后的分子比例总和，数值积分由当前曲线实时计算。</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const els={temp:document.getElementById('temp'),mass:document.getElementById('mass'),count:document.getElementById('count'),tLabel:document.getElementById('tLabel'),mLabel:document.getElementById('mLabel'),nLabel:document.getElementById('nLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
  const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed',line:'#9fb3c8'};
  const S={running:true,time:0,records:[],particles:[],drag:false,W:920,H:620,dpr:1,last:0};
  const PI=Math.PI;
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function params(){const T=+els.temp.value,m=+els.mass.value,N=+els.count.value,a=Math.sqrt(T/m)*46;const lowA=Math.sqrt(180/m)*46,highA=Math.sqrt(720/m)*46;return{T,m,N,a,lowA,highA,most:Math.sqrt(2)*a,avg:Math.sqrt(8/PI)*a,vmax:Math.max(520,4.2*Math.max(a,highA))}}
  function hash(i){let x=(i*1664525+1013904223)>>>0;x^=x>>>16;x=Math.imul(x,2246822519)>>>0;x^=x>>>13;return(x>>>0)/4294967296}
  function normal(i,j){const u=Math.max(.00001,hash(i*7+j*31+13)),v=hash(i*11+j*17+29);return Math.sqrt(-2*Math.log(u))*Math.cos(2*PI*v)}
  function rebuild(q){S.particles=[];for(let i=0;i<q.N;i++){S.particles.push({x:hash(i+1),y:hash(i+101),dir:hash(i+201)*PI*2,unit:Math.sqrt(normal(i,1)**2+normal(i,2)**2+normal(i,3)**2),phase:hash(i+301)})}}
  function ensure(q){if(S.particles.length!==q.N)rebuild(q)}
  function density(v,a){return Math.sqrt(2/PI)*v*v*Math.exp(-v*v/(2*a*a))/(a*a*a)}
  function integral(a,vmax){let sum=0,steps=360,dx=vmax/steps;for(let i=0;i<=steps;i++){const w=i===0||i===steps?.5:1;sum+=w*density(i*dx,a)}return sum*dx}
  function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();if(typeof ctx.roundRect==='function')ctx.roundRect(x,y,w,h,8);else ctx.rect(x,y,w,h);ctx.fill();ctx.stroke();ctx.restore()}
  function text(s,x,y,c=C.ink,align='center',size=13,weight='700'){ctx.fillStyle=c;ctx.font=weight+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c=C.line,w=1.5,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=2){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-9*Math.cos(a-.45),y2-9*Math.sin(a-.45));ctx.lineTo(x2-9*Math.cos(a+.45),y2-9*Math.sin(a+.45));ctx.closePath();ctx.fill()}
  function responsive(){const width=clamp(canvas.parentElement.getBoundingClientRect().width,320,920);S.W=width;S.H=width<600?720:620;S.dpr=Math.min(2,window.devicePixelRatio||1);canvas.width=Math.round(width*S.dpr);canvas.height=Math.round(S.H*S.dpr);canvas.style.height=S.H+'px';ctx.setTransform(S.dpr,0,0,S.dpr,0,0);draw()}
  function draw(){const q=params();ensure(q);const W=S.W,H=S.H,mobile=W<600;ctx.clearRect(0,0,W,H);ctx.fillStyle='#f5f7fb';ctx.fillRect(0,0,W,H);box(12,12,W-24,H-24,'#fff');text('分子运动速率分布：同一物理规律的三种读法',W/2,36,C.ink,'center',mobile?15:18,'800');if(mobile){drawContainer(q,24,58,W-48,210);drawHistogram(q,24,286,W-48,166);drawCurve(q,24,472,W-48,166);drawTrack(q,24,654,W-48)}else{drawContainer(q,28,68,W*.45-34,270);drawHistogram(q,W*.5,68,W*.46-20,270);drawCurve(q,28,362,W*.58-28,214);drawSummary(q,W*.64,362,W*.32-28,214);drawTrack(q,28,592,W-56)}update(q)}
  function drawContainer(q,x,y,w,h){box(x,y,w,h,'#fbfdff');text('① 容器：箭头越长，表示速率越大',x+w/2,y+21,C.ink,'center',13,'800');const ix=x+18,iy=y+44,iw=w-36,ih=h-72;ctx.save();ctx.fillStyle='rgba(44,123,229,.06)';ctx.fillRect(ix,iy,iw,ih);ctx.strokeStyle='#b8c8d8';ctx.strokeRect(ix,iy,iw,ih);ctx.restore();for(let gx=ix+iw/4;gx<ix+iw;gx+=iw/4)line(gx,iy,gx,iy+ih,'rgba(159,179,200,.18)',1);for(let gy=iy+ih/3;gy<iy+ih;gy+=ih/3)line(ix,gy,ix+iw,gy,'rgba(159,179,200,.18)',1);const visible=Math.min(q.N,110);for(let i=0;i<visible;i++){const p=S.particles[i],px=ix+p.x*iw,py=iy+p.y*ih,v=p.unit*q.a,step=(S.running?(.15+v/240)*.012:0);p.x+=Math.cos(p.dir)*step;p.y+=Math.sin(p.dir)*step;if(p.x<0||p.x>1){p.dir=PI-p.dir;p.x=clamp(p.x,0,1)}if(p.y<0||p.y>1){p.dir=-p.dir;p.y=clamp(p.y,0,1)}const fast=v>q.avg*1.25,slow=v<q.avg*.65,col=fast?C.red:slow?C.blue:C.green,len=8+Math.min(28,v/12);ctx.fillStyle=col;ctx.beginPath();ctx.arc(px,py,fast?3:2.5,0,2*PI);ctx.fill();arrow(px,py,px+Math.cos(p.dir)*len,py+Math.sin(p.dir)*len,col,fast?2:1.4)}text('红=快　绿=中　蓝=慢',x+w/2,y+h-13,C.muted,'center',12,'700')}
  function drawHistogram(q,x,y,w,h){box(x,y,w,h,'#fff');text('② 直方图：每根柱子是一个速率区间',x+w/2,y+21,C.ink,'center',13,'800');const px=x+34,py=y+h-32,pw=w-56,ph=h-72,bins=20,arr=Array(bins).fill(0);for(const p of S.particles){const v=Math.min(q.vmax-.001,p.unit*q.a);arr[Math.floor(v/q.vmax*bins)]++}const max=Math.max(...arr,1);line(px,py,px+pw,py,C.line,1.5);line(px,py,px,py-ph,C.line,1.5);arr.forEach((n,i)=>{const bw=pw/bins-2,bh=n/max*ph,bx=px+i*pw/bins+1;ctx.fillStyle=i/bins>.7?C.red:C.blue;ctx.fillRect(bx,py-bh,bw,bh)});const mx=px+q.most/q.vmax*pw;line(mx,py+5,mx,py-ph,C.gold,2,[4,3]);text('最概然速率',mx,py-ph-12,C.gold,'center',11,'800');text('0',px,py+14,C.muted,'center',11);text(Math.round(q.vmax),px+pw,py+14,C.muted,'center',11);text('v',px+pw+10,py,C.muted,'left',12,'800')}
  function drawCurve(q,x,y,w,h){box(x,y,w,h,'#fff');text('③ 分布曲线：峰值、峰位、宽度',x+w/2,y+20,C.ink,'center',13,'800');const px=x+38,py=y+h-28,pw=w-58,ph=h-64,allA=[q.lowA,q.a,q.highA],maxF=Math.max(...allA.map(a=>density(Math.sqrt(2)*a,a)));line(px,py,px+pw,py,C.line,1.5);line(px,py,px,py-ph,C.line,1.5);const curve=(a,col,dash)=>{ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.5;if(dash)ctx.setLineDash(dash);ctx.beginPath();for(let i=0;i<=260;i++){const v=i/260*q.vmax,xx=px+v/q.vmax*pw,yy=py-density(v,a)/maxF*ph*.9;i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy)}ctx.stroke();ctx.restore()};curve(q.lowA,C.blue,[5,4]);curve(q.a,C.red);curve(q.highA,C.green,[7,4]);const peakX=px+q.most/q.vmax*pw,peakY=py-density(q.most,q.a)/maxF*ph*.9;ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(peakX,peakY,7,0,2*PI);ctx.fill();line(peakX,peakY,peakX,py,C.gold,1,[3,3]);text('当前峰位',peakX,peakY-15,C.gold,'center',11,'800');text('低温',px+35,y+42,C.blue,'left',11,'700');text('当前',px+78,y+42,C.red,'left',11,'700');text('高温',px+125,y+42,C.green,'left',11,'700');text('速率 v',px+pw,py+15,C.muted,'right',11,'700')}
  function drawSummary(q,x,y,w,h){box(x,y,w,h,'#fbfdff');text('温度升高（m 固定）',x+w/2,y+24,C.ink,'center',13,'800');text('峰位右移',x+w/2,y+68,C.gold,'center',15,'800');text('峰值降低',x+w/2,y+106,C.red,'center',15,'800');text('分布变宽',x+w/2,y+144,C.blue,'center',15,'800');text('曲线面积由数值积分核对',x+w/2,y+h-22,C.purple,'center',11,'700')}
  function drawTrack(q,x,y,w){text('直接拖动温度探针',x+w/2,y+8,C.ink,'center',13,'800');const left=x+24,right=x+w-24,track=y+34;line(left,track,right,track,C.line,4);const knob=left+(q.T-180)/(720-180)*(right-left);ctx.fillStyle=C.gold;ctx.strokeStyle='#8a5a00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(knob,track,12,0,2*PI);ctx.fill();ctx.stroke();text('180 K',left,track+20,C.muted,'center',11);text('720 K',right,track+20,C.muted,'center',11);text(q.T+' K',knob,track-20,C.gold,'center',12,'800');S.track={left,right,y:track}}
  function update(q){els.tLabel.textContent=q.T+' K';els.mLabel.textContent=q.m+' u';els.nLabel.textContent=q.N;const area=integral(q.a,q.vmax),fastRatio=S.particles.filter(p=>p.unit*q.a>q.avg).length/Math.max(S.particles.length,1);els.readout.innerHTML='最概然速率 v<sub>p</sub>：<b>'+q.most.toFixed(0)+'</b><br>平均速率 v̄：<b>'+q.avg.toFixed(0)+'</b><br>宽度参数 a：<b>'+q.a.toFixed(0)+'</b><br>曲线面积（数值）：<b>'+area.toFixed(3)+'</b><br>样本中 v＞v̄：<b>'+(fastRatio*100).toFixed(1)+'%</b>';els.status.textContent=q.T>300?'升温观察：当前红色快分子和高速率柱段增多，曲线峰位右移、峰值降低、分布变宽。':q.T<300?'降温观察：分子更集中在低速率段，曲线峰位左移、峰值升高、分布变窄。':'基准状态：用它和低温、高温虚线曲线比较，不把每个分子都当成同一速率。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.T+'</td><td>'+r.p+'</td><td>'+r.a+'</td><td>'+r.area+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
  function record(){const q=params();S.records.push({T:q.T,p:q.most.toFixed(0),a:q.avg.toFixed(0),area:integral(q.a,q.vmax).toFixed(3)});if(S.records.length>8)S.records.shift();update(q)}
  function pointerPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*S.W/r.width,y:(e.clientY-r.top)*S.H/r.height}}
  function setTempByX(x){if(!S.track)return;els.temp.value=String(Math.round(clamp(180+(x-S.track.left)/(S.track.right-S.track.left)*540,180,720)/10)*10);draw()}
  els.temp.addEventListener('input',draw);els.mass.addEventListener('input',draw);els.count.addEventListener('input',()=>{S.particles=[];draw()});els.play.addEventListener('click',()=>{S.running=!S.running;els.play.textContent=S.running?'暂停分子运动':'播放分子运动';draw()});els.record.addEventListener('click',record);
  canvas.addEventListener('pointerdown',e=>{const p=pointerPos(e);if(S.track&&Math.abs(p.y-S.track.y)<28&&p.x>=S.track.left-20&&p.x<=S.track.right+20){S.drag=true;canvas.setPointerCapture(e.pointerId);setTempByX(p.x);e.preventDefault()}});canvas.addEventListener('pointermove',e=>{if(S.drag){setTempByX(pointerPos(e).x);e.preventDefault()}});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=false;try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=false});
  const schedule=typeof window.requestAnimationFrame==='function'?fn=>window.requestAnimationFrame(fn):fn=>window.setTimeout(()=>fn(Date.now()),16);
  let last=Date.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.running)S.time+=dt;draw();schedule(loop)}
  window.__ANIM_TEST_STATE__={get:()=>({T:+els.temp.value,m:+els.mass.value,N:+els.count.value,running:S.running,area:integral(params().a,params().vmax),records:S.records.length})};
  if(window.ResizeObserver)new ResizeObserver(responsive).observe(canvas.parentElement);else window.addEventListener('resize',responsive);responsive();record();loop(last);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>

</body>
