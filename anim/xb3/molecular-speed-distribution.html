<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分子运动速率分布图像实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="分子运动速率分布实验台装置：气体分子容器俯视图、速率直方图、麦克斯韦分布曲线、面积记录和温度比较"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>拖动温度滑块，看分子容器中快慢分子的比例、速率直方图和分布曲线怎样同步变化。重点盯住峰值、峰位和曲线下面积。</div>
<div class="card">
<div class="title">调气体状态</div>
<label class="param"><span>温度 T <b id="tLabel">300 K</b></span><input id="temp" type="range" min="120" max="900" step="10" value="300"></label>
<label class="param"><span>分子质量 m <b id="mLabel">28 u</b></span><input id="mass" type="range" min="4" max="80" step="2" value="28"></label>
<label class="param"><span>样本数 N <b id="nLabel">160</b></span><input id="count" type="range" min="60" max="260" step="20" value="160"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录曲线</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">实验记录</div><table><thead><tr><th>T/K</th><th>峰位</th><th>平均速率</th><th>面积</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>温度越高，分子平均动能越大。</div><div>曲线下面积表示分子总比例，归一化后始终为 1。</div><div>升温：峰值降低、峰位右移、宽度变大。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={temp:document.getElementById('temp'),mass:document.getElementById('mass'),count:document.getElementById('count'),tLabel:document.getElementById('tLabel'),mLabel:document.getElementById('mLabel'),nLabel:document.getElementById('nLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={run:true,t:0,records:[],mols:[],drag:null};
function p(){const T=+els.temp.value,m=+els.mass.value,N=+els.count.value,sigma=Math.sqrt(T/m)*42,peak=Math.sqrt(2)*sigma,avg=Math.sqrt(8/Math.PI)*sigma;return{T,m,N,sigma,peak,avg,vmax:360}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function ensure(q){while(S.mols.length<q.N){S.mols.push({x:90+Math.random()*330,y:112+Math.random()*212,a:Math.random()*7,phase:Math.random()*7})}S.mols.length=q.N}
function speedAt(i,q){const u=(Math.sin(i*12.989+q.T*.017)+1)/2,w=(Math.sin(i*78.23+q.m*.13)+1)/2;return q.sigma*Math.sqrt(-2*Math.log(Math.max(.02,u)))*(0.65+0.7*w)}
function dist(v,q){const s=q.sigma;return Math.sqrt(2/Math.PI)*v*v*Math.exp(-v*v/(2*s*s))/(s*s*s)}
function draw(){const q=p();ensure(q);ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('分子运动速率分布：温度改变曲线形状，但总面积不变',460,60,C.ink,'center',17,'900');drawBox(q);drawHist(q);drawCurves(q);drawCompare(q);update(q)}
function drawBox(q){box(68,92,390,252,'#fbfdff');text('气体分子容器俯视图：快慢分子混合，无规则运动',263,116,C.muted,'center',12,'800');const hot=(q.T-120)/(900-120);ctx.strokeStyle='rgba(44,123,229,.25)';for(let x=92;x<436;x+=34)line(x,140,x,320,'rgba(44,123,229,.10)',1);for(let y=140;y<320;y+=34)line(92,y,436,y,'rgba(44,123,229,.10)',1);S.mols.forEach((m,i)=>{const v=speedAt(i,q),ang=m.a+S.t*(.25+v/180);if(S.run){m.x+=Math.cos(ang)*(.35+v/180);m.y+=Math.sin(ang)*(.35+v/180);if(m.x<92||m.x>434)m.a=Math.PI-m.a;if(m.y<140||m.y>318)m.a=-m.a;m.x=Math.max(92,Math.min(434,m.x));m.y=Math.max(140,Math.min(318,m.y))}const r=2.2+Math.min(3,v/150),col=v>q.avg*1.25?C.red:v<q.avg*.65?C.blue:C.green;ctx.fillStyle=col;ctx.beginPath();ctx.arc(m.x,m.y,r,0,7);ctx.fill();ctx.globalAlpha=.28;line(m.x,m.y,m.x+Math.cos(ang)*16,m.y+Math.sin(ang)*16,col,1.5);ctx.globalAlpha=1});text('红：快分子  蓝：慢分子  绿：接近平均速率',263,332,C.muted,'center',12,'800');ctx.fillStyle='rgba(224,49,49,'+(.08+hot*.18)+')';ctx.fillRect(70,94,386,248)}
function drawHist(q){box(500,92,348,208,'#fff');text('速率直方图：统计样本中各速率段的分子数',674,116,C.ink,'center',13,'900');const x0=532,y0=260,w=280,h=120,bins=18,arr=Array(bins).fill(0);for(let i=0;i<q.N;i++){const v=Math.min(q.vmax-1,speedAt(i,q)),b=Math.floor(v/q.vmax*bins);arr[b]++}const max=Math.max(...arr,1);line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);arr.forEach((n,i)=>{const bh=n/max*h,barW=w/bins-2,x=x0+i*w/bins+1,y=y0-bh;ctx.fillStyle=i*w/bins/q.vmax*360<q.avg*.65?'#2c7be5':i*w/bins/q.vmax*360>q.avg*1.25?'#e03131':'#087f5b';ctx.fillRect(x,y,barW,bh)});arrow(x0+q.peak/q.vmax*w,y0+8,x0+q.peak/q.vmax*w,y0-h*.72,C.gold,2);text('峰位',x0+q.peak/q.vmax*w+22,y0-h*.72,C.gold,'left',12,'900');text('v',x0+w+10,y0,C.muted,'left',12,'800')}
function drawCurves(q){box(68,374,482,154,'#fff');text('麦克斯韦速率分布曲线：f(v)-v 图像',309,398,C.ink,'center',14,'900');const x0=100,y0=496,w=410,h=88;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);const scale=h/(dist(q.peak,q)*1.28);function curve(T,col,dash){const old=q.T,qq={...q,T,sigma:Math.sqrt(T/q.m)*42,peak:Math.sqrt(2)*Math.sqrt(T/q.m)*42};ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.4;if(dash)ctx.setLineDash(dash);ctx.beginPath();for(let i=0;i<=260;i++){const v=i/260*q.vmax,x=x0+v/q.vmax*w,y=y0-dist(v,qq)*scale;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();ctx.restore();return old}curve(180,C.blue,[4,4]);curve(q.T,C.red);curve(720,C.green,[7,4]);const hx=x0+q.peak/q.vmax*w,hy=y0-dist(q.peak,q)*scale;ctx.fillStyle=S.drag?'#e03131':'#f0a500';ctx.beginPath();ctx.arc(hx,hy,9,0,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();text('拖动温度探针',hx,hy-22,C.gold,'center',12,'900');text('低温',x0+70,y0-52,C.blue,'center',12,'900');text('当前',hx,hy-42,C.red,'center',12,'900');text('高温',x0+250,y0-32,C.green,'center',12,'900');text('面积=分子总比例=1',x0+305,y0-78,C.purple,'center',12,'900');text('v',x0+w+10,y0,C.muted,'left',12,'800')}
function drawCompare(q){box(585,330,263,198,'#fbfdff');text('三件事同时看',716,354,C.ink,'center',14,'900');const px=627,py=408;arrow(px,py,px+150,py,C.gold,5);text('峰位右移',px+75,py-20,C.gold,'center',13,'900');arrow(px+75,py+52,px+75,py+88,C.red,5);text('峰值降低',px+130,py+70,C.red,'center',13,'900');ctx.strokeStyle=C.purple;ctx.lineWidth=4;ctx.beginPath();ctx.arc(px+75,py+94,46,0,Math.PI*2);ctx.stroke();text('面积不变',px+75,py+94,C.purple,'center',13,'900')}
function update(q){els.tLabel.textContent=q.T+' K';els.mLabel.textContent=q.m+' u';els.nLabel.textContent=q.N;els.readout.innerHTML='最概然速率：<b>'+q.peak.toFixed(0)+'</b><br>平均速率：<b>'+q.avg.toFixed(0)+'</b><br>曲线面积：<b>1.00</b><br>分布宽度：<b>'+q.sigma.toFixed(0)+'</b>';els.status.textContent=q.T>500?'温度较高：快分子比例增加，曲线变宽，峰值降低并向高速端移动。':'温度较低：分子多集中在较低速率附近，曲线更窄、峰值更高。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.T+'</td><td>'+r.p+'</td><td>'+r.a+'</td><td>'+r.area+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({T:q.T,p:q.peak.toFixed(0),a:q.avg.toFixed(0),area:'1.00'});if(S.records.length>8)S.records.shift();update(q)}
[els.temp,els.mass,els.count].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;function setTempByPointer(e){const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;els.temp.value=Math.round(Math.max(120,Math.min(900,120+(x-90)/430*780))/10)*10;draw()}canvas.addEventListener('pointerdown',e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;if((x>90&&x<520&&y>390&&y<520)||(x>90&&x<520&&y>120&&y<330)){S.drag='temperature-handle';canvas.setPointerCapture(e.pointerId);setTempByPointer(e)}});canvas.addEventListener('pointermove',e=>{if(S.drag==='temperature-handle')setTempByPointer(e)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run)S.t+=dt;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
</body>
</html>
