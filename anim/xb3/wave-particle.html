<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>波粒二象性实验台</title>
<style>
  *{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:14px}.stage{display:grid;grid-template-columns:minmax(0,1fr)310px;gap:12px;align-items:start}
  canvas{width:100%;height:640px;background:#fff;border:1px solid #d9e2ec;border-radius:8px;display:block;touch-action:none}
  .panel{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:12px}.row{display:flex;gap:8px;margin-bottom:10px}
  button{flex:1;border:0;border-radius:6px;background:#2c7be5;color:#fff;font-weight:700;padding:9px 10px;cursor:pointer}.secondary{background:#e6edf7;color:#102a43}
  label{display:block;font-size:13px;font-weight:700;margin-top:10px}input{width:100%;accent-color:#2c7be5}
  .readout{margin-top:12px;padding:10px;background:#eef4ff;border-radius:8px;line-height:1.65;font-size:13px}.status{margin-top:10px;padding:9px 10px;border-radius:8px;font-size:13px;line-height:1.5;background:#e6fffa;color:#087f5b;font-weight:700}
  .hint{margin-top:10px;color:#486581;font-size:13px;line-height:1.55}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:5px 4px;text-align:right}th:first-child,td:first-child{text-align:left}
  @media(max-width:860px){.stage{grid-template-columns:1fr}canvas{height:560px}}
</style>
</head>
<body>
<div class="wrap"><div class="stage">
  <canvas id="c" width="940" height="640" aria-label="波粒二象性实验台：光子能量、光强、德布罗意波、双缝记录"></canvas>
  <section class="panel">
    <div class="row"><button id="playBtn" class="play-btn">播放</button><button id="resetBtn" class="secondary">重置</button><button id="recordBtn" class="secondary">记录</button></div>
    <label for="nu">光频率 ν/(10^14 Hz)：<span id="nuVal"></span></label><input id="nu" type="range" min="3" max="12" step="0.1" value="6">
    <label for="intensity">光强/光子数：<span id="intensityVal"></span></label><input id="intensity" type="range" min="1" max="5" step="1" value="3">
    <label for="mom">粒子动量 p/(h/单位)：<span id="momVal"></span></label><input id="mom" type="range" min="0.8" max="5" step="0.1" value="2">
    <div id="readout" class="readout"></div><div id="status" class="status"></div>
    <div class="hint">观察任务：拖动画面里的频率探针或动量探针，看光子能量、光子数量和德布罗意波长分别由什么决定。</div>
    <table><thead><tr><th>记录</th><th>E/eV</th><th>光子数</th><th>λ</th></tr></thead><tbody id="recordBody"><tr><td colspan="4">点击“记录”保存一次读数</td></tr></tbody></table>
  </section>
</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const els={nu:by('nu'),intensity:by('intensity'),mom:by('mom'),nuVal:by('nuVal'),intensityVal:by('intensityVal'),momVal:by('momVal'),readout:by('readout'),status:by('status'),playBtn:by('playBtn'),resetBtn:by('resetBtn'),recordBtn:by('recordBtn'),recordBody:by('recordBody')};
function by(id){return document.getElementById(id)}
let playing=false,t=0,last=0,dragMode='',records=[],hits=[],seed=20260718;
const hEV=4.136e-15;
function params(){const nu=+els.nu.value,intensity=+els.intensity.value,mom=+els.mom.value,E=hEV*nu*1e14,lambda=1/mom;return{nu,intensity,mom,E,lambda}}
function label(s,x,y,c='#102a43',size=13,align='center',w='700'){ctx.fillStyle=c;ctx.font=`${w} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.48),y2-10*Math.sin(a-.48));ctx.lineTo(x2-10*Math.cos(a+.48),y2-10*Math.sin(a+.48));ctx.closePath();ctx.fill()}
function wave(x0,y0,w,amp,cycles,c,phase=0){ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=w;i++){const y=y0+Math.sin(i/w*cycles*Math.PI*2+phase)*amp;if(i===0)ctx.moveTo(x0+i,y);else ctx.lineTo(x0+i,y)}ctx.stroke()}
function random01(){seed=(Math.imul(seed,1664525)+1013904223)>>>0;return seed/4294967296}
function sampleDoubleSlitHit(p){const fringe=10+18*p.lambda;for(let n=0;n<80;n++){const dy=(random01()*2-1)*42;const envelope=Math.exp(-.5*Math.pow(dy/34,2));const interference=.5+.5*Math.cos(2*Math.PI*dy/fringe);if(random01()<envelope*interference)return 424+dy}return 424}
function drawScene(p){ctx.fillStyle='#fff';ctx.fillRect(0,0,940,640);label('波粒二象性实验台：同一对象呈现波动和粒子读数',470,28,'#102a43',19);label('三视图联动：光子束、双缝累积、德布罗意波和仪表数据同步更新',470,52,'#486581',13,'center','600');drawPhotonBench(p);drawMatterBench(p);drawMeters(p);drawHandles(p)}
function drawPhotonBench(p){ctx.fillStyle='#f2f7ff';ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.fillRect(54,82,510,238);ctx.strokeRect(54,82,510,238);label('光实验：频率决定单个光子能量，光强决定数量',309,106,'#2c7be5',14);wave(92,166,270,24,p.nu/2,'#2c7be5',playing?t*4:0);for(let i=0;i<p.intensity;i++){const u=playing?(t*.35+i/p.intensity)%1:i/(p.intensity+1);ctx.fillStyle='#f0a500';ctx.beginPath();ctx.arc(116+u*330,238+Math.sin(u*8)*12,9,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#829ab1';ctx.fillRect(470,136,18,138);label('金属/屏',480,292,'#486581',12);arrow(488,205,544,188,'#e03131',3);label(`E=hν=${p.E.toFixed(2)} eV`,334,290,'#e03131',15)}
function drawMatterBench(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.fillRect(54,342,510,142);ctx.strokeRect(54,342,510,142);label('实物粒子双缝：单个粒子随机到达，统计累积呈干涉条纹',309,364,'#102a43',13);ctx.fillStyle='#334e68';ctx.fillRect(220,392,12,64);ctx.clearRect(220,408,12,8);ctx.clearRect(220,434,12,8);ctx.strokeStyle='#7b2cbf';ctx.lineWidth=2;for(let i=0;i<5;i++)wave(242,424,205,8+i*2,205/(p.lambda*90),'rgba(123,44,191,.35)',i*.8+(playing?t*3:0));ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(120+(playing?(t*80)%90:35),424,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f0a500';for(const h of hits){ctx.beginPath();ctx.arc(480,h,2.6,0,Math.PI*2);ctx.fill()}if(playing&&hits.length<180&&random01()<.28)hits.push(sampleDoubleSlitHit(p));label(`λ=h/p=${p.lambda.toFixed(2)}（相对单位）`,392,464,'#7b2cbf',14)}
function drawMeters(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(610,82,270,260);ctx.strokeRect(610,82,270,260);label('仪表读数/公式绑定',745,106,'#102a43',14);meter(650,154,172,18,p.nu/12,'#2c7be5',`ν=${p.nu.toFixed(1)}×10^14Hz`);meter(650,214,172,18,p.E/5,'#e03131',`E=hν=${p.E.toFixed(2)}eV`);meter(650,274,172,18,p.lambda/1.25,'#7b2cbf',`λ=h/p=${p.lambda.toFixed(2)}`);label('光强改变光子数，不改变单个光子能量',745,322,'#486581',12)}
function meter(x,y,w,h,val,c,txt){label(txt,x,y-12,c,12,'left');ctx.fillStyle='#e9eef5';ctx.fillRect(x,y,w,h);ctx.fillStyle=c;ctx.fillRect(x,y,Math.min(w,w*val),h)}
function drawHandles(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(610,374,270,154);ctx.strokeRect(610,374,270,154);label('画面内可拖动探针',745,398,'#102a43',14);handle(652,442,180,p.nu,3,12,'#2c7be5','频率探针');handle(652,494,180,p.mom,.8,5,'#7b2cbf','动量探针')}
function handle(x,y,w,val,min,max,c,name){ctx.strokeStyle='#d9e2ec';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke();const hx=x+(val-min)/(max-min)*w;ctx.fillStyle=c;ctx.beginPath();ctx.arc(hx,y,13,0,Math.PI*2);ctx.fill();label(name,hx,y+26,c,12)}
function update(p){els.nuVal.textContent=p.nu.toFixed(1);els.intensityVal.textContent=['','很弱','弱','中','强','很强'][p.intensity];els.momVal.textContent=p.mom.toFixed(1);els.readout.innerHTML=[`光子能量 E=hν=${p.E.toFixed(2)} eV`,`光强等级=${p.intensity}，表示光子数量`, `德布罗意波长 λ=h/p=${p.lambda.toFixed(2)}`,`双缝随机记录点数=${hits.length}`].join('<br>');els.status.textContent='单次落点不可预言；由双缝概率分布随机抽样，累积后才显出统计条纹。';c.dataset.hitModel='seeded-random-double-slit-rejection-sampling';c.dataset.hitCount=String(hits.length)}
function render(){const p=params();drawScene(p);update(p)}
function animate(now){if(!last)last=now;const dt=Math.min(.04,(now-last)/1000);last=now;if(playing)t+=dt;render();requestAnimationFrame(animate)}
function setFromPointer(e){const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;if(dragMode==='nu'){const val=3+(Math.max(652,Math.min(832,x))-652)/180*9;els.nu.value=val.toFixed(1)}if(dragMode==='mom'){const val=.8+(Math.max(652,Math.min(832,x))-652)/180*4.2;els.mom.value=val.toFixed(1)}render()}
canvas.addEventListener('pointerdown',e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;dragMode='';if(y>420&&y<462&&x>630&&x<850)dragMode='nu';else if(y>472&&y<514&&x>630&&x<850)dragMode='mom';if(dragMode){canvas.setPointerCapture(e.pointerId);setFromPointer(e)}});canvas.addEventListener('pointermove',e=>{if(dragMode)setFromPointer(e)});canvas.addEventListener('pointerup',e=>{dragMode='';try{canvas.releasePointerCapture(e.pointerId)}catch{}});canvas.addEventListener('pointercancel',()=>dragMode='');
function renderRecords(){els.recordBody.innerHTML=records.length?records.map((r,i)=>`<tr><td>${i+1}</td><td>${r.E.toFixed(2)}</td><td>${r.int}</td><td>${r.lam.toFixed(2)}</td></tr>`).join(''):'<tr><td colspan="4">点击“记录”保存一次读数</td></tr>'}
els.playBtn.addEventListener('click',()=>{playing=!playing;els.playBtn.textContent=playing?'暂停':'播放'});els.resetBtn.addEventListener('click',()=>{playing=false;t=0;hits=[];records=[];seed=20260718;els.nu.value=6;els.intensity.value=3;els.mom.value=2;els.playBtn.textContent='播放';renderRecords();render()});els.recordBtn.addEventListener('click',()=>{const p=params();records.unshift({E:p.E,int:p.intensity,lam:p.lambda});records=records.slice(0,5);renderRecords()});[els.nu,els.intensity,els.mom].forEach(el=>el.addEventListener('input',render));window.__ANIM_TEST_STATE__={get:()=>({...params(),hitCount:hits.length,hitModel:c.dataset.hitModel})};render();requestAnimationFrame(animate);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
