<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>分子力与分子势能</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="分子力实验台：两分子俯视、F-r图像、Ep-r图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="dist">分子间距 r/r0：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.75" max="2.5" value="1" step="0.01">
      <label for="temp">热扰动强度：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="0" max="100" value="30" step="5">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：直接拖动右侧分子改变 r；看 r&lt;r0 时斥力箭头推开、r&gt;r0 时引力箭头拉回，且 Ep 在 r0 附近最小。</div>
      <table aria-label="分子力数据记录">
        <thead><tr><th>组</th><th>r/r0</th><th>F</th><th>Ep</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  dist: document.getElementById('dist'),
  temp: document.getElementById('temp'),
  distVal: document.getElementById('distVal'),
  tempVal: document.getElementById('tempVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = { running: false, last: 0, time: 0, velocity: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function Fof(x) { return 1 / Math.pow(x, 10) - 1 / Math.pow(x, 5); }
function Epof(x) { return (1 / Math.pow(x, 9) / 9 - 1 / Math.pow(x, 4) / 4) * 4; }
function values() {
  const r = Number(els.dist.value);
  const temp = Number(els.temp.value);
  const F = Fof(r);
  const Ep = Epof(r);
  return { r, temp, F, Ep };
}
function forceLabel(F, r) {
  if (Math.abs(F) < 0.025) return '合力≈0';
  return F > 0 ? '斥力主导' : (r > 1.8 ? '分子力趋近0' : '引力主导');
}
function drawArrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(a - 0.45), y2 - 10 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 10 * Math.cos(a + 0.45), y2 - 10 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function molecule(x, y, color, label) {
  const grad = ctx.createRadialGradient(x - 10, y - 10, 4, x, y, 25);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y + 5);
}
function drawScene(v) {
  const x0 = 78, y = 222, scale = 112;
  const left = x0, right = x0 + v.r * scale;
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(38, 76, 332, 286);
  ctx.strokeRect(38, 76, 332, 286);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('两分子俯视实验台：拖动右侧分子改变 r', 204, 104);
  molecule(left, y, '#d0ebff', 'A');
  molecule(right, y, '#ffe8cc', 'B');
  ctx.strokeStyle = '#829ab1';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(left, y + 42);
  ctx.lineTo(right, y + 42);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.fillText('r=' + v.r.toFixed(2) + 'r0', (left + right) / 2, y + 62);
  const len = clamp(Math.abs(v.F) * 145, 12, 66);
  if (Math.abs(v.F) < 0.025) {
    ctx.fillStyle = '#087f5b';
    ctx.font = '700 14px system-ui';
    ctx.fillText('r=r0：引力=斥力，合力≈0', 204, 318);
  } else if (v.F > 0) {
    drawArrow(right + 28, y - 36, right + 28 + len, y - 36, '#e03131');
    drawArrow(left - 28, y - 36, left - 28 - len, y - 36, '#e03131');
    ctx.fillStyle = '#e03131';
    ctx.font = '700 14px system-ui';
    ctx.fillText('压得太近：斥力占主导，推开', 204, 318);
  } else {
    drawArrow(right - 28, y - 36, right - 28 - len, y - 36, '#2c7be5');
    drawArrow(left + 28, y - 36, left + 28 + len, y - 36, '#2c7be5');
    ctx.fillStyle = '#2c7be5';
    ctx.font = '700 14px system-ui';
    ctx.fillText(v.r > 1.8 ? '距离很大：分子力接近 0' : '拉得偏远：引力占主导，拉回', 204, 318);
  }
}
function drawGraph(v) {
  const x0 = 430, y0 = 366, w = 248, h = 250;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(404, 76, 306, 330);
  ctx.strokeRect(404, 76, 306, 330);
  ctx.strokeStyle = '#334e68';
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  const xToPix = x => x0 + (x - 0.75) / (2.5 - 0.75) * w;
  ctx.strokeStyle = '#087f5b';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(xToPix(1), y0);
  ctx.lineTo(xToPix(1), y0 - h);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#087f5b';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('r0', xToPix(1), y0 + 18);
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = 0.76; x <= 2.5; x += 0.02) {
    const px = xToPix(x);
    const py = y0 - h / 2 - clamp(Fof(x) * 75, -105, 105);
    if (x < 0.78) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.strokeStyle = '#2c7be5';
  ctx.beginPath();
  for (let x = 0.76; x <= 2.5; x += 0.02) {
    const px = xToPix(x);
    const py = y0 - h / 2 - clamp(Epof(x) * 58, -100, 100);
    if (x < 0.78) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
  const px = xToPix(v.r);
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(px, y0 - h / 2 - clamp(v.F * 75, -105, 105), 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(px, y0 - h / 2 - clamp(v.Ep * 58, -100, 100), 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('F-r 图像(红) 与 Ep-r 图像(蓝)', x0 + w / 2, y0 + 42);
  ctx.fillText('势能在 r0 附近最小；从 r0 压近或拉远，Ep 都增大', x0 + w / 2, y0 + 64);
}
function draw() {
  const v = values();
  els.distVal.textContent = v.r.toFixed(2);
  els.tempVal.textContent = v.temp.toFixed(0);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('分子力实验台：两分子俯视 + F-r图像 + Ep-r图像 + 数据记录', 370, 28);
  drawScene(v);
  drawGraph(v);
  els.readout.innerHTML = [
    `<div id="r1">r=${v.r.toFixed(2)}r0，合力 F≈${v.F.toFixed(3)}</div>`,
    `<div id="r2">状态：${forceLabel(v.F, v.r)}</div>`,
    `<div id="r3">分子势能 Ep≈${v.Ep.toFixed(3)}，r=r0 附近最小</div>`,
    `<div id="r4">判断口诀：近斥、平衡零、稍远引、很远近似无力</div>`
  ].join('');
  els.status.className = Math.abs(v.r - 1) < 0.04 ? 'status' : 'status bad';
  els.status.textContent = Math.abs(v.r - 1) < 0.04
    ? '平衡位置：引力和斥力大小相等，合力为零，分子势能最低。'
    : (v.r < 1 ? '距离小于 r0：斥力随压近迅速增大。' : '距离大于 r0：先表现为引力，距离很大时分子力趋近 0。');
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.r.toFixed(2)}</td><td>${p.F.toFixed(3)}</td><td>${p.Ep.toFixed(3)}</td></tr>`
  ).join('');
}
function setDistFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const r = clamp((x - 78) / 112, 0.75, 2.5);
  els.dist.value = r.toFixed(2);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running && !state.drag) {
    state.time += dt;
    const temp = Number(els.temp.value) / 100;
    const target = 1 + Math.sin(state.time * (1.4 + temp * 2.2)) * (0.12 + temp * 0.32);
    els.dist.value = clamp(target, 0.75, 2.5).toFixed(2);
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ r: v.r, F: v.F, Ep: v.Ep });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.records = [];
  els.dist.value = '1';
  els.temp.value = '30';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'molecule-handle';
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
