<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玻意耳定律</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:560px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="540"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>拖动 V：V 减半时看 p 是否约加倍；改变等温温度 T，看 pV 常量是否变成新的 nRT。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>体积 V <b id="vText">1.00 L</b></span><input id="vol" type="range" min="0.4" max="2" step="0.05" value="1"></label><div class="stepper"><button data-step="vol" data-dir="-1">- V</button><button data-step="vol" data-dir="1">+ V</button></div>
    <label class="param"><span>等温温度 T <b id="tText">300 K</b></span><input id="temp" type="range" min="250" max="500" step="10" value="300"></label><div class="stepper"><button data-step="temp" data-dir="-1">- T</button><button data-step="temp" data-dir="1">+ T</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">玻意耳定律</div><div>一定量、等温：</div><div>pV = 常量</div><div>p1V1 = p2V2</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={vol:document.getElementById('vol'),temp:document.getElementById('temp')};let mol=[];const nR=1;function fmt(n,d){return n.toFixed(d==null?2:d)}function p(){const V=+els.vol.value,T=+els.temp.value,C=nR*T,press=C/V;return{V,T,C,press,speed:Math.sqrt(T/300)}}function ensure(){while(mol.length<52)mol.push({x:.1+Math.random()*.8,y:.1+Math.random()*.8,a:Math.random()*Math.PI*2})}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(ang-.45),y2-10*Math.sin(ang-.45));ctx.lineTo(x2-10*Math.cos(ang+.45),y2-10*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function step(q){ensure();for(const m of mol){m.x+=Math.cos(m.a)*.007*q.speed;m.y+=Math.sin(m.a)*.007*q.speed;if(m.x<.04||m.x>.96){m.a=Math.PI-m.a;m.x=Math.max(.04,Math.min(.96,m.x))}if(m.y<.04||m.y>.96){m.a=-m.a;m.y=Math.max(.04,Math.min(.96,m.y))}if(Math.random()<.02)m.a+=(Math.random()-.5)}}function graph(q){const gx=520,gy=86,w=280,h=300;box(gx,gy,w,h,'#fff','#d9e2ec');text('p-V 等温线',gx+w/2,gy+24,'#102a43','center',15,'700');ctx.strokeStyle='#829ab1';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gx+40,gy+260);ctx.lineTo(gx+260,gy+260);ctx.moveTo(gx+40,gy+260);ctx.lineTo(gx+40,gy+55);ctx.stroke();text('V',gx+260,gy+278,'#486581','center',12);text('p',gx+24,gy+58,'#486581','center',12);ctx.strokeStyle='#e8590c';ctx.lineWidth=2;ctx.beginPath();for(let V=.4;V<=2;V+=.03){const p=q.C/V,x=gx+40+(V-.4)/(1.6)*210,y=gy+260-Math.min(190,p/(q.C/.4)*190);if(V===.4)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();const px=gx+40+(q.V-.4)/1.6*210,py=gy+260-Math.min(190,q.press/(q.C/.4)*190);ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();text('当前状态',px,py-16,'#c92a2a','center',12,'700')}function draw(){const q=p();step(q);ctx.clearRect(0,0,860,540);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,540);text('玻意耳定律：一定量气体等温时 p 与 V 成反比',430,30,'#102a43','center',18,'700');const x0=60,y0=92,h=290,w=130+q.V/2*330;box(x0,y0,w,h,'#fff','#334e68');ctx.fillStyle='rgba(44,123,229,.07)';ctx.fillRect(x0+3,y0+3,w-6,h-6);ctx.fillStyle='#2c7be5';for(const m of mol){ctx.beginPath();ctx.arc(x0+m.x*w,y0+m.y*h,3,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#829ab1';ctx.fillRect(x0+w-8,y0-8,16,h+16);const arrows=Math.max(2,Math.min(10,Math.round(q.press/45)));for(let i=0;i<arrows;i++){const yy=y0+35+i*(h-70)/Math.max(1,arrows-1);arrow(x0+w-42,yy,x0+w-12,yy,'#e03131',3)}text('p='+fmt(q.press,0),x0+w/2,y0+h+28,'#c92a2a','center',16,'700');graph(q);update(q)}function update(q){document.getElementById('vText').textContent=fmt(q.V,2)+' L';document.getElementById('tText').textContent=fmt(q.T,0)+' K';document.getElementById('readout').innerHTML='p=C/V=<b>'+fmt(q.press,1)+'</b><br>pV=<b>'+fmt(q.press*q.V,1)+'</b><br>C=nRT=<b>'+fmt(q.C,1)+'</b><br>当前 V=<b>'+fmt(q.V,2)+'</b>';document.getElementById('status').textContent='同一条等温线上 pV 保持常量；改变 T 会换一条新的等温线。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));function loop(){draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
