<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分子热运动</title>
<link rel="stylesheet" href="../common/controls.css">
<style>
body{margin:0;font-family:-apple-system,"PingFang SC",system-ui,sans-serif;background:#f7f9fc;color:#1f2933}
.container{padding:12px}
h2{font-size:16px;margin:0 0 8px;color:#102a43}
canvas{display:block;width:100%;max-width:660px;background:#fff;border:1px solid #d9e2ec;border-radius:8px}
.readouts{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;font-size:13px}
.readouts .r{background:#102a43;color:#d9e2ec;padding:6px 10px;border-radius:6px}
.readouts .r b{color:#f0a500}
.controls{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;align-items:center}
.controls label{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#334e68}
.controls input[type=range]{width:160px;accent-color:#2c7be5}
.controls button{font:inherit;padding:6px 14px;border:1px solid #b0bcc9;background:#fff;border-radius:6px;cursor:pointer}
.controls button:hover{background:#eef2f7}
.hint{background:#fff7e6;border-left:3px solid #f0a500;padding:8px 12px;border-radius:4px;font-size:13px;color:#486581;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h2>分子热运动：温度是分子平均动能的标志</h2>
  <canvas id="canvas" width="660" height="330"></canvas>
  <div class="readouts">
    <span class="r">温度 T = <b id="t-v">300</b> K</span>
    <span class="r">分子平均速率 ∝ √T = <b id="v-v">—</b></span>
    <span class="r">平均动能 ∝ T = <b id="ek-v">—</b></span>
    <span class="r">大颗粒（布朗运动）：<b id="br-v">中等</b></span>
  </div>
  <div class="controls">
    <label>温度 T = <span id="t-d">300</span> K
      <input type="range" id="t" min="100" max="600" step="10" value="300"></label>
    <button id="play-btn">暂停</button>
    <button id="reset-btn">重置</button>
  </div>
  <div class="hint">
    <p><b>观察任务</b>：小蓝点是气体分子，做<b>永不停息的无规则运动</b>。拖<b>温度 T</b> 升高→分子平均速率变大（平均动能 ∝ T），撞击更频繁猛烈。大红点是悬浮的<b>花粉/颗粒</b>，它被四面八方的分子撞击，走出无规则的"布朗运动"折线——温度越高、颗粒越小，布朗运动越剧烈。注意：布朗运动是<b>颗粒</b>的运动，间接反映了分子的运动，但它本身不是分子。</p>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let T=300, running=true;
  const N=60; let mol=[];
  let big={x:W/2,y:H/2,vx:0,vy:0,trail:[]};
  function speedScale(){return Math.sqrt(T/300);}
  function init(){
    mol=[];
    for(let i=0;i<N;i++){
      const a=Math.random()*Math.PI*2;
      mol.push({x:20+Math.random()*(W-40),y:20+Math.random()*(H-40),ang:a});
    }
    big={x:W/2,y:H/2,vx:0,vy:0,trail:[]};
  }
  function step(dt){
    const sp=90*speedScale();
    for(const m of mol){
      m.x+=Math.cos(m.ang)*sp*dt; m.y+=Math.sin(m.ang)*sp*dt;
      if(m.x<10||m.x>W-10){m.ang=Math.PI-m.ang;m.x=Math.max(10,Math.min(W-10,m.x));}
      if(m.y<10||m.y>H-10){m.ang=-m.ang;m.y=Math.max(10,Math.min(H-10,m.y));}
      if(Math.random()<0.02)m.ang+=(Math.random()-0.5);
    }
    // brownian: random kicks scaled by T
    big.vx+=(Math.random()-0.5)*sp*dt*6; big.vy+=(Math.random()-0.5)*sp*dt*6;
    big.vx*=0.92; big.vy*=0.92;
    big.x+=big.vx*dt; big.y+=big.vy*dt;
    if(big.x<20||big.x>W-20){big.vx*=-1;big.x=Math.max(20,Math.min(W-20,big.x));}
    if(big.y<20||big.y>H-20){big.vy*=-1;big.y=Math.max(20,Math.min(H-20,big.y));}
    big.trail.push({x:big.x,y:big.y}); if(big.trail.length>60)big.trail.shift();
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#d9e2ec';ctx.strokeRect(4,4,W-8,H-8);
    ctx.fillStyle='#7fa8d8';
    for(const m of mol){ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);ctx.fill();}
    // brownian trail
    ctx.strokeStyle='rgba(201,42,42,0.5)';ctx.lineWidth=1.5;ctx.beginPath();
    big.trail.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);});ctx.stroke();
    ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(big.x,big.y,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#243b53';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText('温度↑ → 分子平均动能↑、平均速率↑（∝√T）',12,H-12);
    document.getElementById('t-v').textContent=T;
    document.getElementById('v-v').textContent=speedScale().toFixed(2);
    document.getElementById('ek-v').textContent=(T/300).toFixed(2);
    document.getElementById('br-v').textContent= T<220?'较弱':(T<420?'中等':'剧烈');
  }
  document.getElementById('t').addEventListener('input',e=>{T=parseInt(e.target.value);document.getElementById('t-d').textContent=T;draw();});
  document.getElementById('play-btn').addEventListener('click',()=>{running=!running;document.getElementById('play-btn').textContent=running?'暂停':'播放';});
  document.getElementById('reset-btn').addEventListener('click',()=>{init();draw();});
  init();
  let last=performance.now();
  function loop(now){const dt=Math.min((now-last)/1000,0.03);last=now;if(running)step(dt);draw();requestAnimationFrame(loop);}
  draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
