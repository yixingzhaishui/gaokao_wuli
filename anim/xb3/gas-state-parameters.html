<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>气体状态参量</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="气体状态参量实验台：气缸侧视、压力表、状态表图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="vol">体积 V/m³：<span id="volVal"></span></label>
      <input id="vol" type="range" min="0.4" max="2" value="1" step="0.05">
      <label for="temp">温度 T/K：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="150" max="600" value="300" step="10">
      <label for="amount">物质的量 n/mol：<span id="amountVal"></span></label>
      <input id="amount" type="range" min="0.4" max="2.5" value="1" step="0.05">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：直接拖动气缸活塞改变 V；保持 n 不变时看 pV/T 是否保持 nR，改变 n 时看状态表怎样一起变化。</div>
      <table aria-label="气体状态数据记录">
        <thead><tr><th>组</th><th>V</th><th>T</th><th>p/Pa</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  vol: document.getElementById('vol'),
  temp: document.getElementById('temp'),
  amount: document.getElementById('amount'),
  volVal: document.getElementById('volVal'),
  tempVal: document.getElementById('tempVal'),
  amountVal: document.getElementById('amountVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const R = 8.31;
const molecules = [];
const state = { running: false, last: 0, time: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const V = Number(els.vol.value);
  const T = Number(els.temp.value);
  const n = Number(els.amount.value);
  const p = n * R * T / V;
  return { V, T, n, p, invV: 1 / V, k: p * V / T, count: Math.round(20 + n * 26), speed: Math.sqrt(T / 300) };
}
function ensureMolecules(q) {
  while (molecules.length < q.count) molecules.push({ x: 0.12 + Math.random() * 0.76, y: 0.12 + Math.random() * 0.76, a: Math.random() * Math.PI * 2 });
  while (molecules.length > q.count) molecules.pop();
}
function stepMolecules(q, dt) {
  ensureMolecules(q);
  molecules.forEach(m => {
    m.x += Math.cos(m.a) * dt * 0.34 * q.speed;
    m.y += Math.sin(m.a) * dt * 0.34 * q.speed;
    if (m.x < 0.04 || m.x > 0.96) { m.a = Math.PI - m.a; m.x = clamp(m.x, 0.04, 0.96); }
    if (m.y < 0.04 || m.y > 0.96) { m.a = -m.a; m.y = clamp(m.y, 0.04, 0.96); }
  });
}
function arrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 9 * Math.cos(a - 0.45), y2 - 9 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 9 * Math.cos(a + 0.45), y2 - 9 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawCylinder(q) {
  const x0 = 54, y0 = 96, h = 286, w = 150 + q.V / 2 * 330;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.fillRect(x0, y0, w, h);
  ctx.strokeRect(x0, y0, w, h);
  ctx.fillStyle = 'rgba(44,123,229,0.08)';
  ctx.fillRect(x0 + 4, y0 + 4, w - 8, h - 8);
  ctx.fillStyle = '#2c7be5';
  molecules.forEach(m => {
    ctx.beginPath();
    ctx.arc(x0 + m.x * w, y0 + m.y * h, 3.2, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = '#829ab1';
  ctx.fillRect(x0 + w - 8, y0 - 10, 16, h + 20);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('活塞手柄', x0 + w, y0 - 24);
  const arrows = clamp(Math.round(q.p / 850), 2, 10);
  for (let i = 0; i < arrows; i++) {
    const yy = y0 + 36 + i * (h - 72) / Math.max(1, arrows - 1);
    arrow(x0 + w - 48, yy, x0 + w - 14, yy, '#e03131');
  }
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.fillText('气缸侧视实验台：拖动活塞改变 V，分子碰壁形成压强 p', x0 + 250, y0 + h + 36);
}
function drawGauge(q) {
  const cx = 616, cy = 156;
  ctx.fillStyle = '#fff7e6';
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 62, Math.PI, 0);
  ctx.lineTo(cx + 62, cy + 38);
  ctx.lineTo(cx - 62, cy + 38);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  const a = Math.PI - clamp(q.p / 8000, 0, 1) * Math.PI;
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(cx, cy + 16);
  ctx.lineTo(cx + 48 * Math.cos(a), cy + 16 - 48 * Math.sin(a));
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('压力表 p', cx, cy + 58);
  ctx.fillStyle = '#e03131';
  ctx.fillText(q.p.toFixed(0) + ' Pa', cx, cy + 78);
}
function drawStatePlot(q) {
  const x0 = 488, y0 = 442, w = 200, h = 128;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 70; i++) {
    const V = 0.4 + i / 70 * 1.6;
    const p = q.n * R * q.T / V;
    const x = x0 + (V - 0.4) / 1.6 * w;
    const y = y0 - clamp(p / 8000, 0, 1) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  const px = x0 + (q.V - 0.4) / 1.6 * w;
  const py = y0 - clamp(q.p / 8000, 0, 1) * h;
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('p-V 图像/状态表：同一状态的 p、V、T、n 才能一起用', x0 + w / 2, y0 + 28);
}
function draw() {
  const q = values();
  els.volVal.textContent = q.V.toFixed(2);
  els.tempVal.textContent = q.T.toFixed(0);
  els.amountVal.textContent = q.n.toFixed(2);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('气体状态参量实验台：气缸侧视 + 压力表 + p-V图像 + 数据记录', 370, 28);
  drawCylinder(q);
  drawGauge(q);
  drawStatePlot(q);
  els.readout.innerHTML = [
    `<div id="r1">p=nRT/V≈${q.p.toFixed(0)} Pa</div>`,
    `<div id="r2">pV/T≈${q.k.toFixed(2)} Pa·m³/K，nR≈${(q.n * R).toFixed(2)}</div>`,
    `<div id="r3">状态表：V=${q.V.toFixed(2)} m³，T=${q.T.toFixed(0)} K，n=${q.n.toFixed(2)} mol</div>`,
    `<div id="r4">分子点数=${q.count}；温度升高时平均速率比例∝√T</div>`
  ].join('');
  els.status.textContent = '封闭定量气体 n 不变时，pV/T 保持 nR；若充气或漏气，n 改变，pV/T 也随之改变。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.V.toFixed(2)}</td><td>${p.T.toFixed(0)}</td><td>${p.p.toFixed(0)}</td></tr>`
  ).join('');
}
function setVolumeFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const V = clamp((x - 54 - 150) / 330 * 2, 0.4, 2);
  els.vol.value = V.toFixed(2);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  const q = values();
  stepMolecules(q, dt || 0.016);
  if (state.running && !state.drag) {
    state.time += dt;
    const V = 1.2 + 0.45 * Math.sin(state.time * 1.2);
    els.vol.value = clamp(V, 0.4, 2).toFixed(2);
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const q = values();
  state.records.push({ V: q.V, T: q.T, p: q.p });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.records = [];
  els.vol.value = '1';
  els.temp.value = '300';
  els.amount.value = '1';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'piston-handle';
  setVolumeFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setVolumeFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
