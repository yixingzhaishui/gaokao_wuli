<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气体状态参量</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:570px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="550"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>分别改变 V、T、n，看压力表 p 与 pV/T 怎样变化。注意温度已使用 K。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>体积 V <b id="vText">1.00 m³</b></span><input id="vol" type="range" min="0.4" max="2" step="0.05" value="1"></label><div class="stepper"><button data-step="vol" data-dir="-1">- V</button><button data-step="vol" data-dir="1">+ V</button></div>
    <label class="param"><span>温度 T <b id="tText">300 K</b></span><input id="temp" type="range" min="150" max="600" step="10" value="300"></label><div class="stepper"><button data-step="temp" data-dir="-1">- T</button><button data-step="temp" data-dir="1">+ T</button></div>
    <label class="param"><span>物质的量 n <b id="nText">1.00 mol</b></span><input id="amount" type="range" min="0.4" max="2.5" step="0.05" value="1"></label><div class="stepper"><button data-step="amount" data-dir="-1">- n</button><button data-step="amount" data-dir="1">+ n</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">理想气体</div><div>pV = nRT</div><div>p = nRT/V</div><div>pV/T = nR</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={vol:document.getElementById('vol'),temp:document.getElementById('temp'),amount:document.getElementById('amount')};let mol=[];const R=8.31;function fmt(n,d){return n.toFixed(d==null?2:d)}function p(){const V=+els.vol.value,T=+els.temp.value,n=+els.amount.value,press=n*R*T/V;return{V,T,n,press,k:press*V/T,speed:Math.sqrt(T/300),count:Math.round(24+n*24)}}function ensure(q){while(mol.length<q.count)mol.push({x:0.1+Math.random()*.8,y:0.1+Math.random()*.8,a:Math.random()*Math.PI*2});while(mol.length>q.count)mol.pop()}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(ang-.45),y2-10*Math.sin(ang-.45));ctx.lineTo(x2-10*Math.cos(ang+.45),y2-10*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function step(q){ensure(q);for(const m of mol){m.x+=Math.cos(m.a)*.006*q.speed;m.y+=Math.sin(m.a)*.006*q.speed;if(m.x<.04||m.x>.96){m.a=Math.PI-m.a;m.x=Math.max(.04,Math.min(.96,m.x))}if(m.y<.04||m.y>.96){m.a=-m.a;m.y=Math.max(.04,Math.min(.96,m.y))}if(Math.random()<.018)m.a+=(Math.random()-.5)}}function draw(){const q=p();step(q);ctx.clearRect(0,0,860,550);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,550);text('气体状态参量：p、V、T、n 必须对应同一状态',430,30,'#102a43','center',18,'700');const x0=70,y0=90,h=300,w=140+q.V/2*350;box(x0,y0,w,h,'#fff','#334e68');ctx.fillStyle='rgba(44,123,229,.07)';ctx.fillRect(x0+3,y0+3,w-6,h-6);ctx.fillStyle='#2c7be5';for(const m of mol){ctx.beginPath();ctx.arc(x0+m.x*w,y0+m.y*h,3,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#829ab1';ctx.fillRect(x0+w-8,y0-8,16,h+16);text('活塞',x0+w,y0-24,'#486581','center',12,'700');const arrows=Math.max(2,Math.min(10,Math.round(q.press/900)));for(let i=0;i<arrows;i++){const yy=y0+35+i*(h-70)/Math.max(1,arrows-1);arrow(x0+w-42,yy,x0+w-12,yy,'#e03131',3)}box(570,96,220,118,'#fff7e6','#f0a500');text('压力表 p',680,126,'#102a43','center',15,'700');text(fmt(q.press,0)+' Pa',680,166,'#c92a2a','center',26,'700');box(570,244,220,130,'#f7f9fc','#d9e2ec');text('状态表',680,270,'#102a43','center',15,'700');text('V='+fmt(q.V,2)+' m³',680,304,'#486581','center',14);text('T='+fmt(q.T,0)+' K',680,330,'#486581','center',14);text('n='+fmt(q.n,2)+' mol',680,356,'#486581','center',14);text('分子数显示 '+q.count+' 个点',330,430,'#486581','center',13);update(q)}function update(q){document.getElementById('vText').textContent=fmt(q.V,2)+' m³';document.getElementById('tText').textContent=fmt(q.T,0)+' K';document.getElementById('nText').textContent=fmt(q.n,2)+' mol';document.getElementById('readout').innerHTML='p=nRT/V=<b>'+fmt(q.press,0)+' Pa</b><br>pV/T=<b>'+fmt(q.k,2)+' Pa·m³/K</b><br>nR=<b>'+fmt(q.n*R,2)+'</b><br>分子点数=<b>'+q.count+'</b>';document.getElementById('status').textContent='封闭定量时 n 不变，pV/T 才保持不变；若充气或漏气，n 改变，pV/T 也改变。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));function loop(){draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
