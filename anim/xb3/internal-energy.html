<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内能</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:550px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="530"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>升高 T 看分子动能柱；增大 n 看总能量；把 r/r0 从 1 压近或拉远，看势能柱是否升高。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>温度 T <b id="tText">300 K</b></span><input id="temp" type="range" min="100" max="700" step="20" value="300"></label><div class="stepper"><button data-step="temp" data-dir="-1">- T</button><button data-step="temp" data-dir="1">+ T</button></div>
    <label class="param"><span>物质的量 n <b id="nText">1.0 mol</b></span><input id="amount" type="range" min="0.2" max="3" step="0.1" value="1"></label><div class="stepper"><button data-step="amount" data-dir="-1">- n</button><button data-step="amount" data-dir="1">+ n</button></div>
    <label class="param"><span>分子间距 r/r0 <b id="rText">1.00</b></span><input id="dist" type="range" min="0.75" max="2.2" step="0.01" value="1"></label><div class="stepper"><button data-step="dist" data-dir="-1">- r</button><button data-step="dist" data-dir="1">+ r</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">内能图像</div><div>U = 分子总动能 + 分子势能</div><div>理想气体近似：一定量时 U 只随 T 变</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={temp:document.getElementById('temp'),amount:document.getElementById('amount'),dist:document.getElementById('dist')};let mol=[];function fmt(n,d){return n.toFixed(d==null?1:d)}function p(){const T=+els.temp.value,n=+els.amount.value,r=+els.dist.value,kin=n*T/300,pot=n*(Math.pow(r-1,2)*2.2+Math.max(0,1-r)*1.4),U=kin+pot;return{T,n,r,kin,pot,U,speed:Math.sqrt(T/300),count:Math.round(22+n*18)}}function ensure(q){while(mol.length<q.count){mol.push({x:60+Math.random()*360,y:88+Math.random()*280,a:Math.random()*Math.PI*2})}while(mol.length>q.count)mol.pop()}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function step(q){ensure(q);for(const m of mol){m.x+=Math.cos(m.a)*q.speed*2;m.y+=Math.sin(m.a)*q.speed*2;if(m.x<56||m.x>424){m.a=Math.PI-m.a;m.x=Math.max(56,Math.min(424,m.x))}if(m.y<90||m.y>360){m.a=-m.a;m.y=Math.max(90,Math.min(360,m.y))}if(Math.random()<0.03)m.a+=(Math.random()-.5)}}function bar(x,y,h,val,max,c,label){const bh=Math.min(h,val/max*h);box(x,y,74,h,'#f7f9fc','#d9e2ec');ctx.fillStyle=c;ctx.fillRect(x+12,y+h-bh,50,bh);text(label,x+37,y+h+20,'#486581','center',13,'700');text(fmt(val,2),x+37,y+h-bh-12,c,'center',13,'700')}function draw(){const q=p();step(q);ctx.clearRect(0,0,860,530);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,530);text('内能：分子热运动总动能 + 分子间相互作用势能',430,30,'#102a43','center',18,'700');box(44,66,400,326,'#fff','#d9e2ec');text('物体内部微观图像',244,88,'#102a43','center',15,'700');ctx.fillStyle='rgba(44,123,229,.08)';ctx.fillRect(62,106,364,244);ctx.fillStyle='#2c7be5';for(const m of mol){ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);ctx.fill()}const cx=245,sep=45+q.r*32;ctx.fillStyle='#2c7be5';ctx.beginPath();ctx.arc(cx-sep/2,384,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e8590c';ctx.beginPath();ctx.arc(cx+sep/2,384,16,0,Math.PI*2);ctx.fill();text('r='+fmt(q.r,2)+'r0',245,424,'#486581','center',13);box(490,84,320,360,'#fff','#d9e2ec');text('能量柱（示意相对值）',650,112,'#102a43','center',15,'700');const max=Math.max(4,q.U,3);bar(540,178,190,q.kin,max,'#e03131','总动能');bar(640,178,190,q.pot,max,'#2c7be5','势能');bar(740,178,190,q.U,max,'#f0a500','内能U');text('T 控制平均动能；n 控制分子总数；r 影响势能',650,414,'#486581','center',13);update(q)}function update(q){document.getElementById('tText').textContent=fmt(q.T,0)+' K';document.getElementById('nText').textContent=fmt(q.n,1)+' mol';document.getElementById('rText').textContent=fmt(q.r,2);document.getElementById('readout').innerHTML='总动能示意 ∝nT：<b>'+fmt(q.kin,2)+'</b><br>势能示意：<b>'+fmt(q.pot,2)+'</b><br>内能示意 U：<b>'+fmt(q.U,2)+'</b><br>分子数显示：<b>'+q.count+' 个点</b>';document.getElementById('status').textContent=Math.abs(q.r-1)<.03?'r≈r0：势能最低；若看理想气体，常忽略分子势能。':'r 偏离 r0：分子势能升高，说明内能不只由温度决定。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));function loop(){draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
