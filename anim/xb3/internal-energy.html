<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>内能</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="内能实验台：微观分子俯视、分子间距侧视、能量柱图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">暂停</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="temp">温度 T/K：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="100" max="700" value="300" step="20">
      <label for="amount">物质的量 n/mol：<span id="amountVal"></span></label>
      <input id="amount" type="range" min="0.2" max="3" value="1" step="0.1">
      <label for="dist">分子间距 r/r0：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.75" max="2.2" value="1" step="0.01">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动下方两分子改变 r/r0，看势能柱如何离开 r0 后升高；调高 T 看总动能柱升高，调大 n 看三根能量柱整体增大。</div>
      <table aria-label="内能数据记录">
        <thead><tr><th>组</th><th>动能</th><th>势能</th><th>U</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  temp: document.getElementById('temp'),
  amount: document.getElementById('amount'),
  dist: document.getElementById('dist'),
  tempVal: document.getElementById('tempVal'),
  amountVal: document.getElementById('amountVal'),
  distVal: document.getElementById('distVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const mol = [];
const state = { running: true, last: 0, time: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const T = Number(els.temp.value);
  const n = Number(els.amount.value);
  const r = Number(els.dist.value);
  const kin = n * T / 300;
  const pot = n * (Math.pow(r - 1, 2) * 2.2 + Math.max(0, 1 - r) * 1.4);
  const U = kin + pot;
  return { T, n, r, kin, pot, U, speed: Math.sqrt(T / 300), count: Math.round(22 + n * 18) };
}
function ensure(q) {
  while (mol.length < q.count) mol.push({ x: 70 + Math.random() * 320, y: 100 + Math.random() * 230, a: Math.random() * Math.PI * 2 });
  while (mol.length > q.count) mol.pop();
}
function step(q, dt) {
  ensure(q);
  mol.forEach(m => {
    m.x += Math.cos(m.a) * q.speed * 82 * dt;
    m.y += Math.sin(m.a) * q.speed * 82 * dt;
    if (m.x < 60 || m.x > 410) { m.a = Math.PI - m.a; m.x = clamp(m.x, 60, 410); }
    if (m.y < 92 || m.y > 340) { m.a = -m.a; m.y = clamp(m.y, 92, 340); }
    if (Math.random() < 0.02) m.a += (Math.random() - 0.5) * 0.8;
  });
}
function drawBar(x, y, h, val, max, color, label) {
  const bh = clamp(val / max, 0, 1) * h;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 68, h);
  ctx.strokeRect(x, y, 68, h);
  ctx.fillStyle = color;
  ctx.fillRect(x + 12, y + h - bh, 44, bh);
  ctx.fillStyle = '#486581';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + 34, y + h + 20);
  ctx.fillStyle = color;
  ctx.fillText(val.toFixed(2), x + 34, y + h - bh - 10);
}
function drawMicroscopic(q) {
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(44, 76, 390, 304);
  ctx.strokeRect(44, 76, 390, 304);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('微观分子俯视：动能来自热运动，势能来自分子间作用', 239, 102);
  ctx.fillStyle = '#2c7be5';
  mol.forEach(m => { ctx.beginPath(); ctx.arc(m.x, m.y, 3, 0, Math.PI * 2); ctx.fill(); });
  const cx = 238, y = 346, sep = 44 + q.r * 44;
  ctx.fillStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(cx - sep / 2, y, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e8590c';
  ctx.beginPath();
  ctx.arc(cx + sep / 2, y, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#829ab1';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(cx - sep / 2, y + 28);
  ctx.lineTo(cx + sep / 2, y + 28);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.fillText('分子间距侧视 r=' + q.r.toFixed(2) + 'r0（拖动这里改变势能）', cx, y + 50);
}
function drawEnergy(q) {
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(476, 88, 220, 356);
  ctx.strokeRect(476, 88, 220, 356);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 15px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('能量柱图像/数据记录', 586, 116);
  const max = Math.max(3.2, q.U, q.kin, q.pot);
  drawBar(506, 176, 190, q.kin, max, '#e03131', '总动能');
  drawBar(586, 176, 190, q.pot, max, '#2c7be5', '势能');
  drawBar(666, 176, 190, q.U, max, '#f0a500', '内能U');
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('U = 分子总动能 + 分子势能', 586, 410);
  ctx.fillText('理想气体近似：一定量时 U 主要随 T 变', 586, 430);
}
function draw() {
  const q = values();
  els.tempVal.textContent = q.T.toFixed(0);
  els.amountVal.textContent = q.n.toFixed(1);
  els.distVal.textContent = q.r.toFixed(2);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('内能实验台：微观分子俯视 + 分子间距侧视 + 能量柱图像 + 数据记录', 370, 28);
  drawMicroscopic(q);
  drawEnergy(q);
  els.readout.innerHTML = [
    `<div id="r1">总动能示意 ∝nT：${q.kin.toFixed(2)}</div>`,
    `<div id="r2">分子势能示意：${q.pot.toFixed(2)}</div>`,
    `<div id="r3">内能 U=动能+势能≈${q.U.toFixed(2)}</div>`,
    `<div id="r4">分子数显示=${q.count} 个点，速率比例≈${q.speed.toFixed(2)}</div>`
  ].join('');
  els.status.className = Math.abs(q.r - 1) < 0.03 ? 'status' : 'status bad';
  els.status.textContent = Math.abs(q.r - 1) < 0.03
    ? 'r≈r0：势能最低；理想气体常忽略分子势能。'
    : 'r 偏离 r0：分子势能升高，说明内能不只由温度一个量决定。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.kin.toFixed(2)}</td><td>${p.pot.toFixed(2)}</td><td>${p.U.toFixed(2)}</td></tr>`
  ).join('');
}
function setDistFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const r = clamp((Math.abs(x - 238) * 2 - 44) / 44, 0.75, 2.2);
  els.dist.value = r.toFixed(2);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.03, (ts - state.last) / 1000);
  state.last = ts;
  const q = values();
  if (state.running) step(q, dt || 0.016);
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const q = values();
  state.records.push({ kin: q.kin, pot: q.pot, U: q.U });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = true;
  state.records = [];
  els.temp.value = '300';
  els.amount.value = '1';
  els.dist.value = '1';
  els.playBtn.textContent = '暂停';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'distance-handle';
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
ensure(values());
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
