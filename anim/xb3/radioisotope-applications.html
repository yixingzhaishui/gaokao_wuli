<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放射性同位素应用实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tabs button{font-weight:800}.tabs button.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="放射性同位素应用实验台装置：医学示踪、工业探伤、考古测年场景，射线探测器、半衰期曲线和数据记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>切换医学示踪、工业探伤、考古测年，拖动探测器或时间手柄，看射线类型、穿透能力、半衰期如何服务不同应用。</div>
<div class="card">
<div class="title">选择应用场景</div>
<div class="tabs"><button id="med" class="active">医学</button><button id="ind">探伤</button><button id="arch">测年</button></div>
<label class="param"><span>半衰期 T <b id="halfLabel">6 h</b></span><input id="half" type="range" min="1" max="100" step="1" value="6"></label>
<label class="param"><span>时间 t <b id="timeLabel">6 h</b></span><input id="time" type="range" min="0" max="300" step="1" value="6"></label>
<label class="param"><span>屏蔽/厚度 <b id="shieldLabel">30%</b></span><input id="shield" type="range" min="0" max="100" step="1" value="30"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录选择</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">记录本</div><table><thead><tr><th>场景</th><th>T</th><th>剩余</th><th>射线</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>剩余比例：N/N0=(1/2)^(t/T)。</div><div>医学示踪重视半衰期适中、剂量可控。</div><div>工业探伤重视穿透能力；考古测年重视半衰期足够长。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={med:document.getElementById('med'),ind:document.getElementById('ind'),arch:document.getElementById('arch'),half:document.getElementById('half'),time:document.getElementById('time'),shield:document.getElementById('shield'),halfLabel:document.getElementById('halfLabel'),timeLabel:document.getElementById('timeLabel'),shieldLabel:document.getElementById('shieldLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={mode:'med',run:true,t:0,drag:null,records:[],det:{x:690,y:220}};
function p(){const T=+els.half.value,t=+els.time.value,shield=+els.shield.value/100,left=Math.pow(.5,t/Math.max(1,T));return{T,t,shield,left,ray:S.mode==='ind'?'γ':S.mode==='med'?'β/γ':'β',need:S.mode==='med'?'示踪定位':S.mode==='ind'?'穿透成像':'半衰期测年'}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('放射性同位素应用：射线类型、半衰期与场景匹配',460,60,C.ink,'center',17,'900');drawScene(q);drawDecay(q);drawDetector(q);drawHandle(q);update(q)}
function drawScene(q){box(70,96,500,300,'#fbfdff');text('应用装置侧视/俯视：同位素源、对象、探测器',320,120,C.muted,'center',12,'800');const source={x:150,y:245},obj={x:330,y:245};ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(source.x,source.y,24,0,7);ctx.fill();text('同位素源',source.x,source.y-42,C.gold,'center',12,'900');if(S.mode==='med'){ctx.fillStyle='#e6fffa';ctx.strokeStyle=C.green;ctx.beginPath();ctx.roundRect(obj.x-52,obj.y-70,104,140,18);ctx.fill();ctx.stroke();text('人体器官',obj.x,obj.y,C.green,'center',14,'900')}if(S.mode==='ind'){ctx.fillStyle='#eef3f8';ctx.strokeStyle='#5b7083';ctx.lineWidth=6;ctx.strokeRect(obj.x-58,obj.y-58,116,116);ctx.strokeStyle=C.red;line(obj.x-20,obj.y-58,obj.x+18,obj.y+58,C.red,4);text('焊缝缺陷',obj.x,obj.y+82,C.red,'center',13,'900')}if(S.mode==='arch'){ctx.fillStyle='#fff7e6';ctx.strokeStyle='#8a4b0f';ctx.beginPath();ctx.roundRect(obj.x-62,obj.y-42,124,84,12);ctx.fill();ctx.stroke();text('古木样品',obj.x,obj.y,C.ink,'center',14,'900')}for(let i=-2;i<=2;i++)arrow(source.x+28,source.y+i*12,S.det.x-22,S.det.y+i*8,S.mode==='ind'?C.purple:C.blue,2.5);text('射线 '+q.ray,238,196,S.mode==='ind'?C.purple:C.blue,'center',13,'900')}
function drawDetector(q){ctx.fillStyle=S.drag==='detector-handle'?C.red:'#829ab1';ctx.fillRect(S.det.x-20,S.det.y-62,40,124);ctx.fillStyle='#fff';ctx.fillRect(S.det.x-11,S.det.y-34,22,68);text('拖动探测器',S.det.x,S.det.y+82,C.muted,'center',12,'900');const intensity=q.left*Math.exp(-q.shield*1.5)/(1+Math.max(0,S.det.x-560)/260);text('探测强度 '+Math.round(intensity*100)+'%',S.det.x,S.det.y-84,intensity>.35?C.green:C.red,'center',13,'900')}
function drawDecay(q){box(610,330,238,168,'#fff');text('半衰期曲线 N/N0',729,354,C.ink,'center',13,'900');const x0=642,y0=462,w=170,h=84;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);ctx.strokeStyle=C.green;ctx.lineWidth=2.5;ctx.beginPath();for(let i=0;i<=160;i++){const tt=i/160*300,yy=y0-Math.pow(.5,tt/q.T)*h,x=x0+i/160*w;if(i===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke();ctx.fillStyle=C.gold;ctx.beginPath();ctx.arc(x0+q.t/300*w,y0-q.left*h,5,0,7);ctx.fill();text('N/N0=(1/2)^(t/T)',729,486,C.muted,'center',12,'800')}
function drawHandle(q){box(100,430,420,86,'#fff');text('画面内可拖动时间手柄',310,452,C.ink,'center',13,'900');line(148,486,480,486,'#d9e2ec',9);const hx=148+q.t/300*332;ctx.fillStyle=S.drag==='time-handle'?C.red:C.blue;ctx.beginPath();ctx.arc(hx,486,13,0,7);ctx.fill();text(q.t+' h',hx,512,C.blue,'center',12,'900')}
function update(q){els.med.classList.toggle('active',S.mode==='med');els.ind.classList.toggle('active',S.mode==='ind');els.arch.classList.toggle('active',S.mode==='arch');els.halfLabel.textContent=q.T+' h';els.timeLabel.textContent=q.t+' h';els.shieldLabel.textContent=Math.round(q.shield*100)+'%';els.readout.innerHTML='剩余比例：<b>'+Math.round(q.left*100)+'%</b><br>推荐射线：<b>'+q.ray+'</b><br>应用目标：<b>'+q.need+'</b><br>探测器位置：<b>'+Math.round(S.det.x)+'</b><br>演示时间：<b>'+S.t.toFixed(2)+' s</b>';els.status.textContent=S.mode==='med'?'医学示踪要求能被探测、剂量可控，半衰期不能过长也不能过短。':S.mode==='ind'?'工业探伤利用穿透能力较强的射线，让内部缺陷在探测器上形成强度差。':'考古测年利用剩余放射性比例和已知半衰期反推经历时间。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.T+'</td><td>'+r.left+'</td><td>'+r.ray+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({m:S.mode==='med'?'医学':S.mode==='ind'?'探伤':'测年',T:q.T,left:Math.round(q.left*100)+'%',ray:q.ray});if(S.records.length>8)S.records.shift();update(q)}
function mode(m){S.mode=m;if(m==='arch'){els.half.value=80;els.time.value=160}else if(m==='ind'){els.half.value=30;els.time.value=20}else{els.half.value=6;els.time.value=6}record();draw()}els.med.onclick=()=>mode('med');els.ind.onclick=()=>mode('ind');els.arch.onclick=()=>mode('arch');[els.half,els.time,els.shield].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setTime(x){els.time.value=Math.round(Math.max(0,Math.min(300,(x-148)/332*300)));draw()}canvas.addEventListener('pointerdown',e=>{const p0=pos(e);if(Math.abs(p0.x-S.det.x)<46&&Math.abs(p0.y-S.det.y)<80){S.drag='detector-handle';canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing'}else if(p0.y>466&&p0.y<506&&p0.x>130&&p0.x<500){S.drag='time-handle';canvas.setPointerCapture(e.pointerId);setTime(p0.x)}});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const p0=pos(e);if(S.drag==='detector-handle'){S.det.x=Math.max(585,Math.min(820,p0.x));S.det.y=Math.max(150,Math.min(290,p0.y));draw()}if(S.drag==='time-handle')setTime(p0.x)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;if(S.t>.3){S.t=0;els.time.value=Math.min(300,+els.time.value+1)}}draw();requestAnimationFrame(loop)}record();loop();
S.t=0;last=performance.now();setTimeout(()=>loop(performance.now()),0);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
