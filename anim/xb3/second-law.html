<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热力学第二定律</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:550px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}.status.bad{background:#ffe6e6;border-color:#ff6b6b;color:#b30000}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="850" height="530"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>调高 TC 看效率上限降低；把 η 调到超过上限，看为什么判为不可能。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>高温热库 TH <b id="thText">600 K</b></span><input id="hot" type="range" min="350" max="900" step="10" value="600"></label><div class="stepper"><button data-step="hot" data-dir="-1">- TH</button><button data-step="hot" data-dir="1">+ TH</button></div>
    <label class="param"><span>低温热库 TC <b id="tcText">300 K</b></span><input id="cold" type="range" min="250" max="500" step="10" value="300"></label><div class="stepper"><button data-step="cold" data-dir="-1">- TC</button><button data-step="cold" data-dir="1">+ TC</button></div>
    <label class="param"><span>设定效率 η <b id="etaText">35%</b></span><input id="eta" type="range" min="0" max="100" step="1" value="35"></label>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">热机</div><div>η = W/QH</div><div>ηmax = 1 - TC/TH</div><div>QH = W + QC</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={hot:document.getElementById('hot'),cold:document.getElementById('cold'),eta:document.getElementById('eta')};const QH=1000;function fmt(n,d){return n.toFixed(d==null?0:d)}function p(){let TH=+els.hot.value,TC=+els.cold.value;if(TC>=TH){TC=TH-10;els.cold.value=TC}const eta=+els.eta.value/100,max=1-TC/TH,W=eta*QH,QC=QH-W;return{TH,TC,eta,max,W,QC,ok:eta<=max&&eta<1&&QC>0}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||4;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-14*Math.cos(ang-.45),y2-14*Math.sin(ang-.45));ctx.lineTo(x2-14*Math.cos(ang+.45),y2-14*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function draw(){const q=p();ctx.clearRect(0,0,850,530);ctx.fillStyle='#fff';ctx.fillRect(0,0,850,530);text('热力学第二定律：热过程有方向，热机效率有上限',425,34,'#102a43','center',18,'700');box(290,72,250,70,'#ffe6e6','#ff6b6b');text('高温热库 TH='+fmt(q.TH)+'K',415,107,'#b30000','center',16,'700');box(340,210,150,90,'#fff7e6','#f0a500');text('热机',415,242,'#102a43','center',18,'700');text('η='+fmt(q.eta*100)+'%',415,270,q.ok?'#087f5b':'#b30000','center',18,'700');box(290,372,250,58,'#e6f4ff','#2c7be5');text('低温热库 TC='+fmt(q.TC)+'K',415,401,'#2c7be5','center',16,'700');arrow(415,144,415,204,'#e03131',6);text('QH=1000J',475,174,'#e03131','left',14,'700');arrow(415,300,415,366,'#2c7be5',Math.max(2,6*q.QC/QH));text('QC='+fmt(q.QC)+'J',475,334,'#2c7be5','left',14,'700');arrow(490,255,625,255,'#102a43',Math.max(2,6*q.W/QH));text('W='+fmt(q.W)+'J',560,232,'#102a43','center',14,'700');box(72,110,170,240,'#f7f9fc','#d9e2ec');text('效率上限',157,142,'#102a43','center',15,'700');const maxH=150;ctx.fillStyle='#d9e2ec';ctx.fillRect(124,170,66,maxH);ctx.fillStyle='#38b2ac';ctx.fillRect(124,170+maxH*(1-q.max),66,maxH*q.max);text(fmt(q.max*100,1)+'%',157,344,'#087f5b','center',18,'700');update(q)}function update(q){document.getElementById('thText').textContent=fmt(q.TH)+' K';document.getElementById('tcText').textContent=fmt(q.TC)+' K';document.getElementById('etaText').textContent=fmt(q.eta*100)+'%';document.getElementById('readout').innerHTML='ηmax=1-TC/TH=<b>'+fmt(q.max*100,1)+'%</b><br>W=ηQH=<b>'+fmt(q.W)+' J</b><br>QC=QH-W=<b>'+fmt(q.QC)+' J</b><br>QH=<b>1000 J</b>';const st=document.getElementById('status');if(q.ok){st.className='status';st.textContent='可行：效率未超过第二定律允许的上限，且仍向低温热库排热。'}else{st.className='status bad';st.textContent='不可能：效率超过卡诺上限或试图把吸热全部变成功，违反第二定律。'}}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));draw();})();
</script>
</body>
</html>
