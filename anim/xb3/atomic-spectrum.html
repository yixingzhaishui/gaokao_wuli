<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>原子光谱：元素指纹</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="原子光谱实验台：放电管光路侧视、谱线屏幕、能级图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="element">元素：<span id="elementVal"></span></label>
      <input id="element" type="range" min="0" max="2" value="0" step="1">
      <label for="excite">激发强度：<span id="exciteVal"></span></label>
      <input id="excite" type="range" min="1" max="5" value="3" step="1">
      <label for="mode">光谱模式：<span id="modeVal"></span></label>
      <input id="mode" type="range" min="0" max="1" value="0" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动屏幕上的谱线探针读出波长 λ；切换元素看谱线位置变成不同“指纹”，切到吸收模式看亮线变暗线。</div>
      <table aria-label="光谱数据记录">
        <thead><tr><th>组</th><th>元素</th><th>λ/nm</th><th>模式</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  element: document.getElementById('element'),
  excite: document.getElementById('excite'),
  mode: document.getElementById('mode'),
  elementVal: document.getElementById('elementVal'),
  exciteVal: document.getElementById('exciteVal'),
  modeVal: document.getElementById('modeVal'),
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const data = [
  { name: '氢 H', lines: [410, 434, 486, 656], colors: ['#7b2cbf', '#3f37c9', '#2c7be5', '#e03131'] },
  { name: '氦 He', lines: [447, 501, 587, 667], colors: ['#3f37c9', '#38b2ac', '#f0a500', '#e03131'] },
  { name: '钠 Na', lines: [589, 590], colors: ['#f0a500', '#ffd43b'] }
];
const state = { running: false, last: 0, time: 0, probeLambda: 486, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function item() { return data[Number(els.element.value)]; }
function xFor(lambda) { return 104 + (lambda - 380) / (700 - 380) * 520; }
function lambdaFor(x) { return clamp(380 + (x - 104) / 520 * 320, 380, 700); }
function nearestLine(lambda, it) {
  return it.lines.reduce((best, line) => Math.abs(line - lambda) < Math.abs(best - lambda) ? line : best, it.lines[0]);
}
function drawGradient(x, y, w, h) {
  const g = ctx.createLinearGradient(x, 0, x + w, 0);
  g.addColorStop(0, '#7b2cbf');
  g.addColorStop(0.18, '#2c7be5');
  g.addColorStop(0.42, '#38b2ac');
  g.addColorStop(0.66, '#f0a500');
  g.addColorStop(1, '#e03131');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
}
function photon(x, y, color) {
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}
function drawApparatus(it, absorb) {
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(34, 70, 660, 176);
  ctx.strokeRect(34, 70, 660, 176);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('侧视光路实验台：放电管/连续光源 → 狭缝 → 棱镜 → 光谱屏', 364, 94);
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.fillRect(58, 126, 88, 70);
  ctx.strokeRect(58, 126, 88, 70);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 14px system-ui';
  ctx.fillText(absorb ? '连续光源' : it.name + '放电管', 102, 116);
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let x = 72; x <= 132; x += 4) {
    const y = 162 + Math.sin((x + state.time * 80) / 7) * 22;
    if (x === 72) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.fillStyle = '#334e68';
  ctx.fillRect(190, 104, 16, 124);
  ctx.clearRect(195, 148, 6, 36);
  ctx.fillStyle = '#e6fffa';
  ctx.strokeStyle = '#38b2ac';
  ctx.beginPath();
  ctx.moveTo(260, 114);
  ctx.lineTo(336, 168);
  ctx.lineTo(260, 222);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  it.lines.forEach((lambda, i) => {
    const endX = xFor(lambda);
    const endY = 310;
    const t = (state.time * (0.25 + Number(els.excite.value) * 0.06) + i * 0.18) % 1;
    const px = 150 + (endX - 150) * t;
    const py = 162 + (endY - 162) * t;
    photon(px, py, it.colors[i % it.colors.length]);
  });
}
function drawSpectrum(it, absorb) {
  const sx = 104, sy = 296, sw = 520, sh = 92;
  ctx.fillStyle = '#101820';
  ctx.fillRect(sx, sy, sw, sh);
  if (absorb) drawGradient(sx, sy, sw, sh);
  const excite = Number(els.excite.value);
  it.lines.forEach((lambda, i) => {
    const x = xFor(lambda);
    const bright = 0.28 + excite * 0.14;
    ctx.strokeStyle = absorb ? 'rgba(0,0,0,0.78)' : it.colors[i % it.colors.length];
    ctx.globalAlpha = absorb ? 0.95 : bright;
    ctx.lineWidth = it.lines.length <= 2 ? 8 : 5;
    ctx.beginPath();
    ctx.moveTo(x, sy);
    ctx.lineTo(x, sy + sh);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#486581';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(lambda + ' nm', x, sy + sh + 18);
  });
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, sw, sh);
  const px = xFor(state.probeLambda);
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(px, sy - 16);
  ctx.lineTo(px, sy + sh + 12);
  ctx.stroke();
  ctx.fillStyle = '#f08c00';
  ctx.beginPath();
  ctx.arc(px, sy - 16, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 16px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(absorb ? '吸收光谱：连续背景上的暗线' : '发射光谱：黑背景上的亮线', 364, 270);
}
function drawEnergy(it) {
  const x = 480, y = 450, w = 174, h = 116;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y - h, w, h);
  ctx.strokeRect(x, y - h, w, h);
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('能级图像：ΔE=hν=hc/λ', x + w / 2, y - h + 18);
  [0.18, 0.45, 0.74].forEach((p, i) => {
    ctx.strokeStyle = '#829ab1';
    ctx.beginPath();
    ctx.moveTo(x + 32, y - p * h);
    ctx.lineTo(x + w - 32, y - p * h);
    ctx.stroke();
    if (i < 2) {
      ctx.strokeStyle = '#e03131';
      ctx.beginPath();
      ctx.moveTo(x + 86, y - p * h);
      ctx.lineTo(x + 86, y - [0.45, 0.74][i] * h);
      ctx.stroke();
    }
  });
}
function draw() {
  const it = item();
  const excite = Number(els.excite.value);
  const absorb = Number(els.mode.value) === 1;
  state.probeLambda = nearestLine(state.probeLambda, it);
  els.elementVal.textContent = it.name;
  els.exciteVal.textContent = excite;
  els.modeVal.textContent = absorb ? '吸收光谱' : '发射光谱';
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('原子光谱实验台：光路侧视 + 谱线屏幕 + 能级图像 + 数据记录', 370, 28);
  drawApparatus(it, absorb);
  drawSpectrum(it, absorb);
  drawEnergy(it);
  const lambda = nearestLine(state.probeLambda, it);
  const freq = 3e8 / (lambda * 1e-9);
  const ev = 4.136e-15 * freq;
  els.readout.innerHTML = [
    `<div id="r1">元素=${it.name}，模式=${absorb ? '吸收' : '发射'}</div>`,
    `<div id="r2">探针读数 λ≈${lambda} nm，ν≈${freq.toExponential(2)} Hz</div>`,
    `<div id="r3">光子能量 hν=hc/λ≈${ev.toFixed(2)} eV</div>`,
    `<div id="r4">谱线组：${it.lines.join('、')} nm，强度等级=${excite}</div>`
  ].join('');
  els.status.textContent = absorb
    ? '吸收光谱：连续光经过较冷气体，特定频率被吸收，出现暗线。'
    : '发射光谱：稀薄气体受激发光，只在特定能级差对应的波长出现亮线。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.name}</td><td>${p.lambda}</td><td>${p.mode}</td></tr>`
  ).join('');
}
function setProbeFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  state.probeLambda = lambdaFor(x);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    if (Math.floor(state.time / 3) !== Math.floor((state.time - dt) / 3)) {
      els.element.value = String((Number(els.element.value) + 1) % data.length);
    }
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const it = item();
  state.records.push({ name: it.name, lambda: nearestLine(state.probeLambda, it), mode: Number(els.mode.value) ? '吸收' : '发射' });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.probeLambda = 486;
  state.records = [];
  els.element.value = '0';
  els.excite.value = '3';
  els.mode.value = '0';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'spectrum-probe-handle';
  setProbeFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setProbeFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
