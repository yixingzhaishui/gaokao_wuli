<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>玻尔模型与能级跃迁</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="玻尔能级实验台：轨道俯视、能级图像、光子波形和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="ni">初态能级 ni：<span id="niVal"></span></label>
      <input id="ni" type="range" min="1" max="6" value="3" step="1">
      <label for="nf">末态能级 nf：<span id="nfVal"></span></label>
      <input id="nf" type="range" min="1" max="6" value="2" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动能级图上的蓝色初态或红色末态手柄；向低能级跃迁看发射光子，向高能级跃迁看吸收光子，并比较 hν=|ΔE|。</div>
      <table aria-label="能级跃迁数据记录">
        <thead><tr><th>组</th><th>ni→nf</th><th>hν/eV</th><th>类型</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  ni: document.getElementById('ni'),
  nf: document.getElementById('nf'),
  niVal: document.getElementById('niVal'),
  nfVal: document.getElementById('nfVal'),
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const state = { running: false, last: 0, time: 0, progress: 0, drag: null, records: [] };
function energy(n) { return -13.6 / (n * n); }
function yFor(n) { return 392 - (energy(n) + 13.6) / 13.6 * 285; }
function values() {
  const ni = Number(els.ni.value);
  const nf = Number(els.nf.value);
  const ei = energy(ni);
  const ef = energy(nf);
  const dE = ef - ei;
  const photon = Math.abs(dE);
  const freq = photon / 4.136e-15;
  const action = dE > 0 ? '吸收光子' : dE < 0 ? '发射光子' : '没有跃迁';
  return { ni, nf, ei, ef, dE, photon, freq, action };
}
function drawArrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 11 * Math.cos(a - 0.45), y2 - 11 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 11 * Math.cos(a + 0.45), y2 - 11 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawOrbit(v) {
  const cx = 190, cy = 248;
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(42, 78, 300, 320);
  ctx.strokeRect(42, 78, 300, 320);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('轨道俯视实验台：定态不辐射，跃迁才吸收/发射', cx, 104);
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(cx, cy, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '700 14px system-ui';
  ctx.fillText('核', cx, cy + 5);
  for (let n = 1; n <= 6; n++) {
    const r = 22 + n * 18;
    ctx.strokeStyle = n === v.ni ? '#2c7be5' : n === v.nf ? '#e03131' : '#829ab1';
    ctx.lineWidth = n === v.ni || n === v.nf ? 3 : 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  const ri = 22 + v.ni * 18;
  const rf = 22 + v.nf * 18;
  const rNow = ri + (rf - ri) * state.progress;
  const a = state.time * 2.1;
  ctx.fillStyle = '#102a43';
  ctx.beginPath();
  ctx.arc(cx + rNow * Math.cos(a), cy + rNow * Math.sin(a), 6, 0, Math.PI * 2);
  ctx.fill();
}
function drawLevels(v) {
  const x0 = 420, x1 = 638;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(386, 78, 318, 320);
  ctx.strokeRect(386, 78, 318, 320);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('能级图像：En=-13.6/n² eV，光子能量 hν=|ΔE|', 545, 104);
  for (let n = 1; n <= 6; n++) {
    const y = yFor(n);
    ctx.strokeStyle = n === v.ni ? '#2c7be5' : n === v.nf ? '#e03131' : '#334e68';
    ctx.lineWidth = n === v.ni || n === v.nf ? 4 : 2;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x1, y);
    ctx.stroke();
    ctx.fillStyle = '#486581';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('n=' + n + ', E=' + energy(n).toFixed(2) + ' eV', x1 + 8, y + 4);
  }
  const yi = yFor(v.ni), yf = yFor(v.nf);
  if (v.ni !== v.nf) {
    drawArrow(500, yi, 500, yf, v.dE > 0 ? '#2c7be5' : '#e03131');
    const waveY = v.dE > 0 ? Math.min(yi, yf) - 28 : Math.max(yi, yf) + 30;
    ctx.strokeStyle = '#f0a500';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 536; x <= 668; x += 4) {
      const y = waveY + Math.sin((x - 536) / 7 + state.time * 7) * 8;
      if (x === 536) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    const photonX = 536 + 132 * state.progress;
    ctx.fillStyle = '#f0a500';
    ctx.beginPath();
    ctx.arc(photonX, waveY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = v.dE > 0 ? '#2c7be5' : '#e03131';
    ctx.font = '700 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(v.action, 594, waveY - 18);
  }
  ctx.fillStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(x0 - 18, yi, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(x0 - 18, yf, 7, 0, Math.PI * 2);
  ctx.fill();
}
function draw() {
  const v = values();
  els.niVal.textContent = v.ni;
  els.nfVal.textContent = v.nf;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('玻尔能级实验台：轨道俯视 + 能级图像 + 光子波形 + 数据记录', 370, 28);
  drawOrbit(v);
  drawLevels(v);
  els.readout.innerHTML = [
    `<div id="r1">Ei=E${v.ni}=${v.ei.toFixed(2)} eV，Ef=E${v.nf}=${v.ef.toFixed(2)} eV</div>`,
    `<div id="r2">ΔE=Ef-Ei=${v.dE.toFixed(2)} eV，判断：${v.action}</div>`,
    `<div id="r3">hν=|ΔE|=${v.photon.toFixed(2)} eV，ν≈${v.freq.toExponential(2)} Hz</div>`,
    `<div id="r4">规则：向高能级吸收，向低能级发射</div>`
  ].join('');
  els.status.textContent = v.ni === v.nf
    ? '没有跃迁：初态和末态相同，hν=0。'
    : (v.dE > 0 ? '吸收：电子跃迁到更高能级，需要外来光子能量正好等于能级差。' : '发射：电子落到更低能级，原子减少的能量变成一个光子。');
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.ni}→${p.nf}</td><td>${p.photon.toFixed(2)}</td><td>${p.action}</td></tr>`
  ).join('');
}
function nearestLevelFromY(y) {
  let best = 1, dist = Infinity;
  for (let n = 1; n <= 6; n++) {
    const d = Math.abs(y - yFor(n));
    if (d < dist) { best = n; dist = d; }
  }
  return best;
}
function pointerLevel(ev) {
  const rect = c.getBoundingClientRect();
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const n = nearestLevelFromY(y);
  if (state.drag === 'initial-handle') els.ni.value = String(n);
  if (state.drag === 'final-handle') els.nf.value = String(n);
  state.progress = 0;
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    state.progress += dt * 0.55;
    if (state.progress > 1) state.progress = 0;
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', () => {
    state.progress = 0;
    draw();
  });
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ ni: v.ni, nf: v.nf, photon: v.photon, action: v.action });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.progress = 0;
  state.records = [];
  els.ni.value = '3';
  els.nf.value = '2';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  state.drag = x < 510 ? 'initial-handle' : 'final-handle';
  pointerLevel(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  pointerLevel(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
