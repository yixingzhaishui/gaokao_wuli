<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能量守恒</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:540px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}.status.bad{background:#ffe6e6;border-color:#ff6b6b;color:#b30000}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="850" height="520"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>调输出比例和内能比例，看散失能量自动补足；如果两者超过 100%，账本会判不可能。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>输入能量 Ein <b id="einText">1000 J</b></span><input id="input" type="range" min="200" max="2000" step="50" value="1000"></label><div class="stepper"><button data-step="input" data-dir="-1">- Ein</button><button data-step="input" data-dir="1">+ Ein</button></div>
    <label class="param"><span>有用输出比例 <b id="useText">32%</b></span><input id="useful" type="range" min="0" max="120" step="1" value="32"></label>
    <label class="param"><span>内能增加比例 <b id="uText">18%</b></span><input id="internal" type="range" min="0" max="120" step="1" value="18"></label>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">能量账本</div><div>Ein = Euse + ΔU + Eloss</div><div>散失不是消失</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={input:document.getElementById('input'),useful:document.getElementById('useful'),internal:document.getElementById('internal')};function fmt(n){return n.toFixed(0)}function p(){const Ein=+els.input.value,use=+els.useful.value/100,u=+els.internal.value/100,Euse=Ein*use,DU=Ein*u,Eloss=Ein-Euse-DU,ok=Eloss>=-1e-9;return{Ein,use,u,Euse,DU,Eloss,ok}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function bar(x,y,w,h,val,max,c,label){box(x,y,w,h,'#f7f9fc','#d9e2ec');const bh=Math.max(0,Math.min(h,val/max*h));ctx.fillStyle=c;ctx.fillRect(x+12,y+h-bh,w-24,bh);text(label,x+w/2,y+h+22,'#486581','center',13,'700');text(fmt(val)+'J',x+w/2,y+h-bh-12,c,'center',13,'700')}function draw(){const q=p();ctx.clearRect(0,0,850,520);ctx.fillStyle='#fff';ctx.fillRect(0,0,850,520);text('能量守恒：输入能量 = 输出 + 储存 + 散失',425,34,'#102a43','center',18,'700');bar(70,120,110,250,q.Ein,Math.max(q.Ein,1),'#f0a500','输入');text('=',218,245,'#829ab1','center',28,'700');const max=Math.max(q.Ein,Math.abs(q.Eloss),1);bar(270,120,110,250,q.Euse,max,'#38b2ac','有用输出');text('+',410,245,'#829ab1','center',28,'700');bar(462,120,110,250,q.DU,max,'#2c7be5','内能增加');text('+',602,245,'#829ab1','center',28,'700');bar(654,120,110,250,Math.max(0,q.Eloss),max,q.ok?'#e03131':'#b30000','散失');box(172,426,506,50,q.ok?'#e6fffa':'#ffe6e6',q.ok?'#38b2ac':'#ff6b6b');text(q.ok?'账本闭合：能量没有消失，只是去向不同。':'账本不可能：输出和储存已超过输入能量。',425,451,q.ok?'#087f5b':'#b30000','center',15,'700');update(q)}function update(q){document.getElementById('einText').textContent=fmt(q.Ein)+' J';document.getElementById('useText').textContent=fmt(q.use*100)+'%';document.getElementById('uText').textContent=fmt(q.u*100)+'%';document.getElementById('readout').innerHTML='Ein=<b>'+fmt(q.Ein)+' J</b><br>Euse=<b>'+fmt(q.Euse)+' J</b><br>ΔU=<b>'+fmt(q.DU)+' J</b><br>Eloss=<b>'+fmt(q.Eloss)+' J</b>';const st=document.getElementById('status');if(q.ok){st.className='status';st.textContent='守恒：输入能量被分配到有用输出、内能增加和散失能量。'}else{st.className='status bad';st.textContent='不守恒：不能让输出和储存能量超过输入能量。'}}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));draw();})();
</script>
</body>
</html>
