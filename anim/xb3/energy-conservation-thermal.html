<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>能量守恒实验台</title>
<style>
  *{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:14px}.stage{display:grid;grid-template-columns:minmax(0,1fr)310px;gap:12px;align-items:start}
  canvas{width:100%;height:640px;background:#fff;border:1px solid #d9e2ec;border-radius:8px;display:block;touch-action:none}
  .panel{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:12px}.row{display:flex;gap:8px;margin-bottom:10px}
  button{flex:1;border:0;border-radius:6px;background:#2c7be5;color:#fff;font-weight:700;padding:9px 10px;cursor:pointer}.secondary{background:#e6edf7;color:#102a43}
  label{display:block;font-size:13px;font-weight:700;margin-top:10px}input{width:100%;accent-color:#2c7be5}
  .readout{margin-top:12px;padding:10px;background:#eef4ff;border-radius:8px;line-height:1.65;font-size:13px}.status{margin-top:10px;padding:9px 10px;border-radius:8px;font-size:13px;line-height:1.5;background:#e6fffa;color:#087f5b;font-weight:700}.bad{background:#fff5f5;color:#c92a2a}
  .hint{margin-top:10px;color:#486581;font-size:13px;line-height:1.55}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:5px 4px;text-align:right}th:first-child,td:first-child{text-align:left}
  @media(max-width:860px){.stage{grid-template-columns:1fr}canvas{height:560px}}
</style>
</head>
<body>
<div class="wrap"><div class="stage">
  <canvas id="c" width="940" height="640" aria-label="能量守恒实验台：能量流、分流阀、仪表、账本图像和数据记录"></canvas>
  <section class="panel">
    <div class="row"><button id="playBtn" class="play-btn">播放</button><button id="resetBtn" class="secondary">重置</button><button id="recordBtn" class="secondary">记录</button></div>
    <label for="input">输入能量 Ein/J：<span id="inputVal"></span></label><input id="input" type="range" min="200" max="2000" step="50" value="1000">
    <label for="useful">有用输出比例：<span id="usefulVal"></span></label><input id="useful" type="range" min="0" max="120" step="1" value="32">
    <label for="internal">内能增加比例：<span id="internalVal"></span></label><input id="internal" type="range" min="0" max="120" step="1" value="18">
    <div id="readout" class="readout"></div><div id="status" class="status"></div>
    <div class="hint">观察任务：拖动画面里的输入能量包或分流阀，看有用输出、内能增加、散失能量怎样闭合成同一个账本。</div>
    <table><thead><tr><th>记录</th><th>Ein</th><th>输出+储存</th><th>散失</th></tr></thead><tbody id="recordBody"><tr><td colspan="4">点击“记录”保存一次能量账本</td></tr></tbody></table>
  </section>
</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const els={input:by('input'),useful:by('useful'),internal:by('internal'),inputVal:by('inputVal'),usefulVal:by('usefulVal'),internalVal:by('internalVal'),readout:by('readout'),status:by('status'),playBtn:by('playBtn'),resetBtn:by('resetBtn'),recordBtn:by('recordBtn'),recordBody:by('recordBody')};
function by(id){return document.getElementById(id)}
let playing=false,t=0,last=0,dragMode='',records=[];
const flow={x:70,y:98,w:500,h:300},graph={x:610,y:92,w:260,h:230};
function params(){const Ein=+els.input.value,use=+els.useful.value/100,u=+els.internal.value/100,Euse=Ein*use,DU=Ein*u,Eloss=Ein-Euse-DU,ok=Eloss>=-1e-9;return{Ein,use,u,Euse,DU,Eloss,ok,total:Euse+DU+Math.max(0,Eloss)}}
function label(s,x,y,c='#102a43',size=13,align='center',w='700'){ctx.fillStyle=c;ctx.font=`${w} ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.48),y2-10*Math.sin(a-.48));ctx.lineTo(x2-10*Math.cos(a+.48),y2-10*Math.sin(a+.48));ctx.closePath();ctx.fill()}
function drawScene(p){ctx.fillStyle='#fff';ctx.fillRect(0,0,940,640);label('能量守恒实验台：输入能量不会消失，只会分流',470,28,'#102a43',19);label('三视图联动：能量流、仪表读数、账本柱图和数据记录同时更新',470,52,'#486581',13,'center','600');
 ctx.fillStyle='#f2f7ff';ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.fillRect(flow.x,flow.y,flow.w,flow.h);ctx.strokeRect(flow.x,flow.y,flow.w,flow.h);label('能量转化装置：拖动输入能量包和分流阀',320,122,'#2c7be5',14);
 drawFlow(p);drawGraph(p);drawLedger(p);drawHandles(p)}
function drawFlow(p){const sx=128,sy=250;ctx.fillStyle='#fff7e6';ctx.strokeStyle=dragMode==='input'?'#e03131':'#f0a500';ctx.lineWidth=3;ctx.fillRect(sx-54,sy-40,108,80);ctx.strokeRect(sx-54,sy-40,108,80);label('输入能量包',sx,sy-16,'#f0a500',12);label(`${p.Ein} J`,sx,sy+14,'#102a43',18);const valveX=306,valveY=250;arrow(sx+58,sy,valveX-36,valveY,'#f0a500',5);ctx.fillStyle='#fff';ctx.strokeStyle=dragMode==='valve'?'#e03131':'#334e68';ctx.lineWidth=3;ctx.beginPath();ctx.arc(valveX,valveY,34,0,Math.PI*2);ctx.fill();ctx.stroke();label('分流阀',valveX,valveY,'#334e68',13);arrow(valveX+36,valveY-12,502,168,'#38b2ac',Math.max(3,p.use*9));arrow(valveX+36,valveY+5,502,250,'#2c7be5',Math.max(3,p.u*9));arrow(valveX+36,valveY+22,502,330,p.ok?'#e03131':'#b30000',Math.max(3,Math.max(0,p.Eloss)/p.Ein*9));sink(514,142,'有用输出',p.Euse,'#38b2ac');sink(514,224,'内能增加',p.DU,'#2c7be5');sink(514,304,'散失到环境',p.Eloss,p.ok?'#e03131':'#b30000');energyDots(p,sx+65,sy,valveX+150)}
function sink(x,y,name,val,c){ctx.fillStyle='#fbfcfe';ctx.strokeStyle=c;ctx.lineWidth=2;ctx.fillRect(x-68,y-24,128,48);ctx.strokeRect(x-68,y-24,128,48);label(name,x,y-6,c,12);label(`${val.toFixed(0)} J`,x,y+14,'#102a43',13)}
function energyDots(p,x1,y1,x2){if(!playing)return;for(let i=0;i<10;i++){const u=(t*0.65+i/10)%1;ctx.fillStyle=['#f0a500','#38b2ac','#2c7be5','#e03131'][i%4];ctx.beginPath();ctx.arc(x1+(x2-x1)*u,y1+Math.sin(u*6+i)*18,4,0,Math.PI*2);ctx.fill()}}
function drawGraph(p){const x=graph.x,y=graph.y,w=graph.w,h=graph.h;ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.lineWidth=1;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);label('仪表：能量去向柱图',x+w/2,y+22,'#102a43',14);const max=Math.max(p.Ein,p.Euse,p.DU,Math.abs(p.Eloss),1);bar(x+34,y+62,44,128,p.Ein,max,'#f0a500','Ein');bar(x+92,y+62,44,128,p.Euse,max,'#38b2ac','Euse');bar(x+150,y+62,44,128,p.DU,max,'#2c7be5','ΔU');bar(x+208,y+62,44,128,Math.max(0,p.Eloss),max,p.ok?'#e03131':'#b30000','Eloss')}
function bar(x,y,w,h,val,max,c,txt){ctx.fillStyle='#e9eef5';ctx.fillRect(x,y,w,h);ctx.fillStyle=c;ctx.fillRect(x,y+h-Math.max(0,val)/max*h,w,Math.max(0,val)/max*h);label(txt,x+w/2,y+h+18,c,11);label(String(Math.round(val)),x+w/2,y+h-Math.max(0,val)/max*h-10,c,11)}
function drawLedger(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(610,354,260,176);ctx.strokeRect(610,354,260,176);label('账本检查/公式绑定',740,378,'#102a43',14);label('Ein = Euse + ΔU + Eloss',740,418,'#2c7be5',17);label(`${p.Ein} = ${p.Euse.toFixed(0)} + ${p.DU.toFixed(0)} + ${p.Eloss.toFixed(0)} J`,740,458,p.ok?'#087f5b':'#c92a2a',14);label(p.ok?'守恒闭合：散失不是消失':'不可能：输出和储存超过输入',740,498,p.ok?'#087f5b':'#c92a2a',14)}
function drawHandles(p){ctx.fillStyle='#fbfcfe';ctx.strokeStyle='#d9e2ec';ctx.fillRect(70,438,490,138);ctx.strokeRect(70,438,490,138);label('画面内可拖动控制',315,462,'#102a43',14);handle(118,506,160,p.Ein,200,2000,'#f0a500','输入包');handle(310,506,92,p.use,0,1.2,'#38b2ac','输出阀');handle(432,506,92,p.u,0,1.2,'#2c7be5','内能阀')}
function handle(x,y,w,val,min,max,c,name){ctx.strokeStyle='#d9e2ec';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke();const hx=x+(val-min)/(max-min)*w;ctx.fillStyle=c;ctx.beginPath();ctx.arc(hx,y,13,0,Math.PI*2);ctx.fill();label(name,hx,y+28,c,12)}
function update(p){els.inputVal.textContent=p.Ein+' J';els.usefulVal.textContent=Math.round(p.use*100)+'%';els.internalVal.textContent=Math.round(p.u*100)+'%';els.readout.innerHTML=[`Ein=${p.Ein} J`,`Euse=${p.Euse.toFixed(0)} J`,`ΔU=${p.DU.toFixed(0)} J`,`Eloss=${p.Eloss.toFixed(0)} J`].join('<br>');els.status.className=p.ok?'status':'status bad';els.status.textContent=p.ok?'守恒：输入能量被分配到输出、储存和散失。':'不守恒：不能让输出和储存超过输入。'}
function render(){const p=params();drawScene(p);update(p)}
function animate(now){if(!last)last=now;const dt=Math.min(.04,(now-last)/1000);last=now;if(playing)t+=dt;render();requestAnimationFrame(animate)}
function setFromPointer(e){const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width;if(dragMode==='input'){const val=200+(Math.max(118,Math.min(278,x))-118)/160*1800;els.input.value=String(Math.round(val/50)*50)}if(dragMode==='use'){const val=(Math.max(310,Math.min(402,x))-310)/92*120;els.useful.value=String(Math.round(val))}if(dragMode==='internal'){const val=(Math.max(432,Math.min(524,x))-432)/92*120;els.internal.value=String(Math.round(val))}render()}
canvas.addEventListener('pointerdown',e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*canvas.width/r.width,y=(e.clientY-r.top)*canvas.height/r.height;dragMode='';if(y>486&&y<532&&x>95&&x<295)dragMode='input';else if(y>486&&y<532&&x>292&&x<420)dragMode='use';else if(y>486&&y<532&&x>414&&x<542)dragMode='internal';else if(x>260&&x<344&&y>206&&y<294)dragMode='valve';if(dragMode==='valve')dragMode='use';if(dragMode){canvas.setPointerCapture(e.pointerId);setFromPointer(e)}});canvas.addEventListener('pointermove',e=>{if(dragMode)setFromPointer(e)});canvas.addEventListener('pointerup',e=>{dragMode='';try{canvas.releasePointerCapture(e.pointerId)}catch{}});canvas.addEventListener('pointercancel',()=>dragMode='');
els.playBtn.addEventListener('click',()=>{playing=!playing;els.playBtn.textContent=playing?'暂停':'播放'});els.resetBtn.addEventListener('click',()=>{playing=false;t=0;els.input.value=1000;els.useful.value=32;els.internal.value=18;els.playBtn.textContent='播放';render()});els.recordBtn.addEventListener('click',()=>{const p=params();records.unshift({Ein:p.Ein,out:p.Euse+p.DU,loss:p.Eloss});records=records.slice(0,5);els.recordBody.innerHTML=records.map((r,i)=>`<tr><td>${i+1}</td><td>${r.Ein}</td><td>${r.out.toFixed(0)}</td><td>${r.loss.toFixed(0)}</td></tr>`).join('')});[els.input,els.useful,els.internal].forEach(el=>el.addEventListener('input',render));render();requestAnimationFrame(animate);
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
