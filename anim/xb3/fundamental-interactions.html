<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四种基本相互作用尺度实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="四种基本相互作用实验台装置：多视角俯视场景、侧视尺度滑条、宇宙到原子核尺度、引力电磁强弱相互作用卡片、粒子场景图、强度尺度图像和数据记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>直接拖动尺度探针，从星系、日常物体、原子到原子核，观察主导相互作用如何变化，并比较作用对象、范围和相对强度。</div>
<div class="card">
<div class="title">调观察尺度</div>
<label class="param"><span>尺度 log10(m) <b id="scaleLabel">-15</b></span><input id="scale" type="range" min="-18" max="22" step="1" value="-15"></label>
<label class="param"><span>电荷/质量情境 <b id="chargeLabel">60%</b></span><input id="charge" type="range" min="0" max="100" step="1" value="60"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录判断</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">判断记录</div><table><thead><tr><th>尺度</th><th>主导</th><th>对象</th><th>范围</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">框架</div><div>引力：所有有质量物体，长程，宏观天体明显。</div><div>电磁：带电粒子，长程，原子分子和电路重要。</div><div>强相互作用：束缚夸克和核子，短程，原子核内强。</div><div>弱相互作用：β 衰变等，极短程。</div></div>
<div class="card formula"><div class="title">公式绑定</div><div>长程对比：F=Gm1m2/r²，F=kq1q2/r²。</div><div>短程判断：强/弱相互作用只在核尺度附近显著。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={scale:document.getElementById('scale'),charge:document.getElementById('charge'),scaleLabel:document.getElementById('scaleLabel'),chargeLabel:document.getElementById('chargeLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={run:true,t:0,drag:null,records:[]};
function p(){const s=+els.scale.value,c=+els.charge.value/100;let dom='电磁相互作用',obj='带电粒子/原子分子',range='长程';if(s>8){dom='引力相互作用';obj='天体/有质量物体';range='长程'}else if(s<-16){dom='弱相互作用';obj='夸克/轻子衰变';range='极短程'}else if(s<-14){dom='强相互作用';obj='夸克/核子';range='原子核尺度'}return{s,c,dom,obj,range}}
function box(x,y,w,h,f='#fff',st='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=st;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('四种基本相互作用：对象、强度、作用范围与尺度',460,60,C.ink,'center',17,'900');drawScale(q);drawScene(q);drawCards(q);drawGraph(q);update(q)}
function drawScale(q){box(80,420,520,110,'#fff');text('画面内可拖动尺度探针：从原子核到宇宙',340,444,C.ink,'center',13,'900');line(126,486,552,486,'#d9e2ec',9);const x=126+(q.s+18)/40*426;ctx.fillStyle=S.drag?'#e03131':'#2c7be5';ctx.beginPath();ctx.arc(x,486,14,0,7);ctx.fill();['核内','原子','日常','天体'].forEach((lab,i)=>text(lab,126+i*142,512,C.muted,'center',12,'800'));text('log10(m)='+q.s,x,462,C.blue,'center',12,'900')}
function drawScene(q){box(70,96,500,288,'#fbfdff');text('多视角俯视/侧视尺度场景图：当前主导 '+q.dom,320,120,C.muted,'center',12,'800');const cx=320,cy=242;if(q.dom.includes('引力')){ctx.fillStyle='#102a43';ctx.beginPath();ctx.arc(cx,cy,38,0,7);ctx.fill();ctx.fillStyle=C.gold;for(let i=0;i<80;i++){ctx.beginPath();ctx.arc(110+Math.random()*390,146+Math.random()*188,1.2,0,7);ctx.fill()}ctx.strokeStyle=C.green;ctx.beginPath();ctx.arc(cx,cy,92,0,7);ctx.stroke();text('天体轨道由引力主导：F=Gm1m2/r²',cx,350,C.green,'center',14,'900')}else if(q.dom.includes('电磁')){ctx.fillStyle=C.red;ctx.beginPath();ctx.arc(cx-68,cy,24,0,7);ctx.fill();ctx.fillStyle=C.blue;ctx.beginPath();ctx.arc(cx+68,cy,24,0,7);ctx.fill();arrow(cx-42,cy,cx+42,cy,C.purple,4);text('+ 与 - 的电磁相互作用：F=kq1q2/r²',cx,350,C.purple,'center',14,'900')}else if(q.dom.includes('强')){for(let i=0;i<8;i++){ctx.fillStyle=i%2?C.red:C.blue;ctx.beginPath();ctx.arc(cx+Math.cos(i)*58,cy+Math.sin(i*2)*44,22,0,7);ctx.fill()}ctx.strokeStyle=C.green;ctx.lineWidth=5;ctx.beginPath();ctx.arc(cx,cy,104,0,7);ctx.stroke();text('核子被强相互作用束缚：短程核尺度',cx,350,C.green,'center',14,'900')}else{ctx.fillStyle=C.purple;ctx.beginPath();ctx.arc(cx-35,cy,22,0,7);ctx.fill();arrow(cx,cy,cx+90,cy-42,C.gold,4);text('β 衰变等弱相互作用过程：极短程',cx,350,C.gold,'center',14,'900')}}
function card(x,y,name,col,range,obj,active){box(x,y,142,108,active?'#fff7e6':'#fff',active?col:'#d9e2ec');text(name,x+71,y+24,col,'center',15,'900');text(range,x+71,y+56,C.muted,'center',12,'800');text(obj,x+71,y+84,C.ink,'center',12,'800')}function drawCards(q){box(610,96,250,238,'#fbfdff');text('相互作用卡片',735,120,C.ink,'center',13,'900');card(628,142,'引力',C.green,'长程','质量',q.dom.includes('引力'));card(704,142,'电磁',C.purple,'长程','电荷',q.dom.includes('电磁'));card(628,256,'强',C.red,'短程','核子/夸克',q.dom.includes('强'));card(704,256,'弱',C.blue,'极短程','衰变',q.dom.includes('弱'))}
function drawGraph(q){box(610,366,250,164,'#fff');text('尺度-主导作用图像',735,390,C.ink,'center',13,'900');const x0=642,y0=488,w=182,h=74;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);const bands=[[-18,-16,C.blue],[-16,-14,C.red],[-14,8,C.purple],[8,22,C.green]];bands.forEach((b,i)=>{ctx.fillStyle=b[2];ctx.globalAlpha=.28;ctx.fillRect(x0+(b[0]+18)/40*w,y0-h,(b[1]-b[0])/40*w,h);ctx.globalAlpha=1});const px=x0+(q.s+18)/40*w;arrow(px,y0+8,px,y0-h-8,C.gold,3);text('当前',px,y0-h-22,C.gold,'center',12,'900')}
function update(q){els.scaleLabel.textContent=q.s;els.chargeLabel.textContent=Math.round(q.c*100)+'%';els.readout.innerHTML='当前主导：<b>'+q.dom+'</b><br>作用对象：<b>'+q.obj+'</b><br>作用范围：<b>'+q.range+'</b><br>尺度：<b>10^'+q.s+' m</b>';els.status.textContent='判断相互作用时先看对象和尺度：宏观天体看引力，带电粒子看电磁，原子核内部看强相互作用，β 衰变等看弱相互作用。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.s+'</td><td>'+r.d+'</td><td>'+r.o+'</td><td>'+r.r+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({s:'10^'+q.s,d:q.dom.replace('相互作用',''),o:q.obj,r:q.range});if(S.records.length>8)S.records.shift();update(q)}
[els.scale,els.charge].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setScale(x){els.scale.value=Math.round(-18+Math.max(0,Math.min(426,x-126))/426*40);draw()}canvas.addEventListener('pointerdown',e=>{const p0=pos(e);if(p0.y>464&&p0.y<508&&p0.x>108&&p0.x<572){S.drag='scale-handle';canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setScale(p0.x)}});canvas.addEventListener('pointermove',e=>{if(S.drag)setScale(pos(e).x)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;if(S.t>.45){S.t=0;els.scale.value=+els.scale.value>=22?-18:+els.scale.value+1}}draw();requestAnimationFrame(loop)}record();loop();
S.t=0;last=performance.now();setTimeout(()=>loop(performance.now()),0);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
</body>
</html>
