<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液晶、半导体与纳米材料微观结构实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.tabs button{font-weight:800}.tabs button.active{background:#102a43;color:#fff;border-color:#102a43}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="材料微观结构实验台装置：液晶分子取向俯视图、半导体能带和载流子图像、纳米尺度剖面、宏观性质数据记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>切换液晶、半导体、纳米材料，直接拖动画面里的电场/掺杂/尺度手柄，看微观结构怎样改变透光率、导电性或比表面积。</div>
<div class="card">
<div class="title">选择材料情境</div>
<div class="tabs"><button id="lc" class="active">液晶</button><button id="semi">半导体</button><button id="nano">纳米</button></div>
<label class="param"><span>外场/电压 <b id="fieldLabel">45%</b></span><input id="field" type="range" min="0" max="100" step="1" value="45"></label>
<label class="param"><span>温度 <b id="tempLabel">300 K</b></span><input id="temp" type="range" min="260" max="420" step="5" value="300"></label>
<label class="param"><span>掺杂/尺寸 <b id="sizeLabel">30 nm</b></span><input id="size" type="range" min="5" max="100" step="1" value="30"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录状态</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">状态记录</div><table><thead><tr><th>材料</th><th>参数</th><th>性质</th><th>判断</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>材料性质常由微观结构决定。</div><div>半导体导电性介于导体和绝缘体之间，受掺杂、温度、光照影响。</div><div>纳米材料常因尺度小、比表面积大而表现特殊性质。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={lc:document.getElementById('lc'),semi:document.getElementById('semi'),nano:document.getElementById('nano'),field:document.getElementById('field'),temp:document.getElementById('temp'),size:document.getElementById('size'),fieldLabel:document.getElementById('fieldLabel'),tempLabel:document.getElementById('tempLabel'),sizeLabel:document.getElementById('sizeLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={mode:'lc',run:true,t:0,drag:null,records:[]};
function p(){const f=+els.field.value/100,T=+els.temp.value,nm=+els.size.value;return{f,T,nm,align:f,trans:.15+.75*f,carrier:(.2+f*1.1)*(T/300),surface:600/nm}}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function draw(){const q=p();ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('液晶、半导体与纳米材料：微观结构决定宏观性质',460,60,C.ink,'center',17,'900');if(S.mode==='lc')drawLC(q);if(S.mode==='semi')drawSemi(q);if(S.mode==='nano')drawNano(q);drawHandle(q);drawPanel(q);update(q)}
function drawLC(q){box(70,96,500,320,'#fbfdff');text('液晶显示单元俯视/侧视：电场改变分子取向与透光率',320,120,C.muted,'center',12,'800');const alpha=.12+.5*q.trans;ctx.fillStyle='rgba(44,123,229,'+alpha+')';ctx.fillRect(110,154,420,190);for(let i=0;i<72;i++){const col=i%12,row=Math.floor(i/12),x=135+col*34,y=178+row*30,ang=(1-q.align)*(Math.sin(i)*1.4)+q.align*Math.PI/2;ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.fillStyle=i%2?C.purple:C.blue;ctx.fillRect(-12,-3,24,6);ctx.restore()}arrow(116,370,520,370,C.gold,5);text('偏振光/背光通过',318,392,C.gold,'center',13,'900');text('透光率 '+Math.round(q.trans*100)+'%',320,144,C.green,'center',14,'900')}
function drawSemi(q){box(70,96,500,320,'#fbfdff');text('半导体能带/载流子图像：掺杂或升温增加载流子',320,120,C.muted,'center',12,'800');const x0=126,y0=300,w=360;line(x0,y0,x0+w,y0,C.blue,5);line(x0,y0-125,x0+w,y0-125,C.red,5);text('价带',x0-25,y0,C.blue,'right',12,'900');text('导带',x0-25,y0-125,C.red,'right',12,'900');arrow(260,y0-18,260,y0-104,C.gold,3);text('能隙 Eg',286,y0-62,C.gold,'left',12,'900');const n=Math.round(12+q.carrier*20);for(let i=0;i<n;i++){const x=x0+20+(i*29)%330,y=i%2?y0-125:y0;ctx.fillStyle=i%2?C.red:C.blue;ctx.beginPath();ctx.arc(x,y+(i%2?-12:12),4,0,7);ctx.fill()}text('载流子浓度相对值 '+q.carrier.toFixed(2),320,154,C.green,'center',14,'900');text('导电性随掺杂、温度、光照可调',320,386,C.muted,'center',13,'800')}
function drawNano(q){box(70,96,500,320,'#fbfdff');text('纳米尺度剖面：尺寸小，比表面积大，表面效应明显',320,120,C.muted,'center',12,'800');const cx=306,cy=246,R=Math.max(22,110-q.nm*.75);ctx.strokeStyle='rgba(44,123,229,.2)';for(let r=R;r>8;r-=16){ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke()}for(let i=0;i<42;i++){const a=i/42*Math.PI*2+S.t*.3,r=R*(.78+.18*Math.sin(i));ctx.fillStyle=i%3?C.blue:C.purple;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,5,0,7);ctx.fill()}ctx.strokeStyle=C.gold;ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();text(q.nm+' nm',cx,cy,C.ink,'center',24,'900');text('比表面积相对值 '+q.surface.toFixed(1),320,386,C.green,'center',14,'900');text('拖动尺度手柄：尺寸越小，表面原子比例越大',320,145,C.muted,'center',12,'800')}
function drawHandle(q){box(104,444,430,76,'#fff');text('画面内可拖动控制手柄',318,464,C.ink,'center',13,'900');line(150,492,488,492,'#d9e2ec',9);const hx=150+q.f*338;ctx.fillStyle=S.drag?'#e03131':'#2c7be5';ctx.beginPath();ctx.arc(hx,492,13,0,7);ctx.fill();text(S.mode==='lc'?'电场':S.mode==='semi'?'掺杂':'尺度',hx,516,C.blue,'center',12,'900')}
function drawPanel(q){box(610,100,230,420,'#fbfdff');text('实物装置 + 图像记录',725,126,C.ink,'center',14,'900');const y=178;ctx.fillStyle='#eef3f8';ctx.strokeStyle='#cbd8e4';ctx.fillRect(642,y,166,88);ctx.strokeRect(642,y,166,88);text(S.mode==='lc'?'液晶屏像素':S.mode==='semi'?'半导体芯片':'纳米颗粒',725,y+22,C.ink,'center',13,'900');text(S.mode==='lc'?'电压控光':S.mode==='semi'?'导电可调':'表面效应',725,y+56,C.muted,'center',12,'800');const x0=650,y0=438,w=150,h=110;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);ctx.strokeStyle=C.green;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=100;i++){const u=i/100,v=S.mode==='lc'?.15+.75*u:S.mode==='semi'?.2+1.1*u:600/(5+u*95)/20;const x=x0+u*w,yy=y0-Math.min(1,v)*h;if(i===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke();text('性质-参数图像',725,304,C.muted,'center',12,'800');text('结构变 → 性质变',725,470,C.green,'center',13,'900')}
function update(q){els.lc.classList.toggle('active',S.mode==='lc');els.semi.classList.toggle('active',S.mode==='semi');els.nano.classList.toggle('active',S.mode==='nano');els.fieldLabel.textContent=Math.round(q.f*100)+'%';els.tempLabel.textContent=q.T+' K';els.sizeLabel.textContent=S.mode==='nano'?q.nm+' nm':Math.round(q.f*100)+'%';els.readout.innerHTML=S.mode==='lc'?'取向程度：<b>'+Math.round(q.align*100)+'%</b><br>透光率：<b>'+Math.round(q.trans*100)+'%</b><br>宏观应用：<b>显示器像素</b>':S.mode==='semi'?'载流子相对值：<b>'+q.carrier.toFixed(2)+'</b><br>导电性：<b>可调</b><br>宏观应用：<b>芯片/传感器</b>':'尺寸：<b>'+q.nm+' nm</b><br>比表面积：<b>'+q.surface.toFixed(1)+'</b><br>宏观应用：<b>催化/材料增强</b>';els.readout.innerHTML+='<br>结构参数滑块：<b>'+els.size.value+'</b><br>演示时间：<b>'+S.t.toFixed(2)+' s</b>';els.status.textContent=S.mode==='lc'?'液晶分子在外电场下取向改变，透光状态随之改变。':S.mode==='semi'?'半导体不是简单“导体或绝缘体”，受掺杂、温度、光照调控。':'纳米材料尺度很小，表面原子比例高，常出现明显表面效应和尺寸效应。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.m+'</td><td>'+r.p+'</td><td>'+r.v+'</td><td>'+r.j+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({m:S.mode==='lc'?'液晶':S.mode==='semi'?'半导体':'纳米',p:S.mode==='nano'?q.nm+'nm':Math.round(q.f*100)+'%',v:S.mode==='lc'?Math.round(q.trans*100)+'%':S.mode==='semi'?q.carrier.toFixed(2):q.surface.toFixed(1),j:'结构控性质'});if(S.records.length>8)S.records.shift();update(q)}
function mode(m){S.mode=m;record();draw()}els.lc.onclick=()=>mode('lc');els.semi.onclick=()=>mode('semi');els.nano.onclick=()=>mode('nano');[els.field,els.temp,els.size].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setByX(x){const v=Math.round(Math.max(0,Math.min(100,(x-150)/338*100)));if(S.mode==='nano')els.size.value=Math.max(5,Math.min(100,5+v*.95));else els.field.value=v;draw()}canvas.addEventListener('pointerdown',e=>{const p0=pos(e);if(p0.y>470&&p0.y<515&&p0.x>132&&p0.x<506){S.drag='structure-handle';canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing';setByX(p0.x)}});canvas.addEventListener('pointermove',e=>{if(S.drag==='structure-handle')setByX(pos(e).x)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run){S.t+=dt;if(!S.drag){if(S.mode==='nano')els.size.value=Math.round(30+22*Math.sin(S.t*.9));else els.field.value=Math.round(50+35*Math.sin(S.t*1.1))}}draw();requestAnimationFrame(loop)}record();requestAnimationFrame(loop);
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script>
<script>/* GKWL: unified full reset (2026-07-12 review remediation) */
(function(){
  var btns=[].slice.call(document.querySelectorAll('button'));
  var resets=btns.filter(function(b){return /重置|复位/.test(b.textContent)});
  if(!resets.length)return;
  var scoped=/播放|时间|回放/;
  var primary=resets[0];
  if(scoped.test(primary.textContent)){
    var nb=document.createElement('button');
    nb.textContent='全部重置';
    nb.className=primary.className;
    nb.setAttribute('data-gkwl-full-reset','1');
    nb.addEventListener('click',function(){location.reload()});
    primary.parentNode.insertBefore(nb,primary.nextSibling);
  }else{
    resets.forEach(function(b){b.addEventListener('click',function(){setTimeout(function(){location.reload()},60)})});
  }
})();
</script>
<script src="guided-lesson.js"></script>
</body>
</html>
