<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扩散、布朗运动与温度微观解释实验台</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr)330px;gap:12px;padding:12px;min-height:690px}.stage,.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px}.stage{overflow:hidden}.card{padding:10px}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}@media(max-width:850px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
<div class="stage"><canvas id="canvas" width="920" height="610" aria-label="扩散与布朗运动实验台装置：液体显微镜俯视图、染料扩散剖面、花粉颗粒轨迹、温度计和均方位移图像记录"></canvas></div>
<div class="panel">
<div class="card task"><b>观察任务：</b>直接拖动花粉颗粒或温度手柄，看液体分子无规则碰撞如何造成布朗运动；升温后染料扩散更快、花粉轨迹更乱。</div>
<div class="card">
<div class="title">调微观运动</div>
<label class="param"><span>温度 T <b id="tLabel">300 K</b></span><input id="temp" type="range" min="260" max="420" step="5" value="300"></label>
<label class="param"><span>花粉半径 r <b id="rLabel">3.0 μm</b></span><input id="radius" type="range" min="1" max="8" step="0.5" value="3"></label>
<label class="param"><span>染料浓度差 <b id="cLabel">80%</b></span><input id="conc" type="range" min="10" max="100" step="5" value="80"></label>
<div class="buttons"><button id="play">暂停</button><button id="record">记录状态</button></div>
</div>
<div class="readout" id="readout"></div>
<div class="card"><div class="title">记录本</div><table><thead><tr><th>T</th><th>r</th><th>扩散</th><th>抖动</th></tr></thead><tbody id="rows"></tbody></table></div>
<div class="card formula"><div class="title">公式与图像</div><div>温度是分子平均动能的标志。</div><div>布朗运动来自液体分子对悬浮颗粒的不平衡碰撞。</div><div>扩散是大量粒子无规则运动导致的宏观混合。</div></div>
<div class="status" id="status"></div>
</div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const els={temp:document.getElementById('temp'),radius:document.getElementById('radius'),conc:document.getElementById('conc'),tLabel:document.getElementById('tLabel'),rLabel:document.getElementById('rLabel'),cLabel:document.getElementById('cLabel'),readout:document.getElementById('readout'),rows:document.getElementById('rows'),status:document.getElementById('status'),play:document.getElementById('play'),record:document.getElementById('record')};
const C={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',green:'#087f5b',gold:'#f0a500',purple:'#7c3aed'};
const S={run:true,t:0,drag:null,records:[],dye:[],mol:[],pollen:{x:282,y:244},trail:[]};
function p(){const T=+els.temp.value,r=+els.radius.value,c=+els.conc.value/100;return{T,r,c,thermal:(T-260)/160,diff:(T/300)*c/r,brown:(T/300)/Math.sqrt(r)}}
function init(){if(S.dye.length)return;for(let i=0;i<160;i++)S.dye.push({x:105+Math.random()*80,y:140+Math.random()*210,vx:0,vy:0});for(let i=0;i<80;i++)S.mol.push({x:100+Math.random()*360,y:128+Math.random()*230,a:Math.random()*7})}
function box(x,y,w,h,f='#fff',s='#d9e2ec'){ctx.save();ctx.fillStyle=f;ctx.strokeStyle=s;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function text(s,x,y,c=C.ink,a='center',z=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+z+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,d){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(d)ctx.setLineDash(d);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill()}
function step(q){if(!S.run||S.drag)return;S.dye.forEach((d,i)=>{const k=q.diff*(.5+((i*37)%100)/100);d.x+=(-.5+Math.random())*k*2.2+q.diff*.34;d.y+=(-.5+Math.random())*k*1.4;d.x=Math.max(100,Math.min(455,d.x));d.y=Math.max(130,Math.min(350,d.y))});let fx=0,fy=0;S.mol.forEach((m,i)=>{const sp=.8+q.thermal*2.2;m.x+=Math.cos(m.a)*sp;m.y+=Math.sin(m.a)*sp;if(m.x<100||m.x>455)m.a=Math.PI-m.a;if(m.y<130||m.y>350)m.a=-m.a;m.x=Math.max(100,Math.min(455,m.x));m.y=Math.max(130,Math.min(350,m.y));const dx=S.pollen.x-m.x,dy=S.pollen.y-m.y,rr=Math.hypot(dx,dy);if(rr<38+q.r*2){fx+=dx/(rr+1)*sp;fy+=dy/(rr+1)*sp;m.a+=Math.PI*.7}});S.pollen.x=Math.max(130,Math.min(430,S.pollen.x+fx*.09+(-.5+Math.random())*q.brown*2.6));S.pollen.y=Math.max(155,Math.min(330,S.pollen.y+fy*.09+(-.5+Math.random())*q.brown*2.6));S.trail.push({x:S.pollen.x,y:S.pollen.y});if(S.trail.length>90)S.trail.shift()}
function draw(){const q=p();init();step(q);ctx.clearRect(0,0,920,610);box(34,34,852,528,'#fff');text('扩散、布朗运动与温度：大量分子的无规则运动',460,60,C.ink,'center',17,'900');drawMicro(q);drawDiff(q);drawGraph(q);drawTemp(q);update(q)}
function drawMicro(q){box(68,96,420,280,'#fbfdff');text('显微镜俯视实验台：液体分子碰撞花粉颗粒',278,120,C.muted,'center',12,'800');ctx.fillStyle='rgba(44,123,229,.07)';ctx.fillRect(100,130,355,220);S.dye.forEach(d=>{ctx.fillStyle='rgba(124,58,237,.32)';ctx.beginPath();ctx.arc(d.x,d.y,3,0,7);ctx.fill()});S.mol.forEach((m,i)=>{ctx.fillStyle=i%3?'#2c7be5':'#38b2ac';ctx.globalAlpha=.28+.35*q.thermal;ctx.beginPath();ctx.arc(m.x,m.y,2.2,0,7);ctx.fill();ctx.globalAlpha=1});ctx.strokeStyle=C.gold;ctx.lineWidth=2;ctx.beginPath();S.trail.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y)});ctx.stroke();ctx.fillStyle=S.drag?'#e03131':'#f0a500';ctx.beginPath();ctx.arc(S.pollen.x,S.pollen.y,13+q.r*1.5,0,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();text('拖动花粉',S.pollen.x,S.pollen.y-28,C.gold,'center',12,'900');text('轨迹越乱，说明不平衡碰撞越明显',278,362,C.muted,'center',12,'800')}
function drawDiff(q){box(530,96,318,178,'#fff');text('染料扩散剖面：浓度梯度逐渐变平',689,120,C.ink,'center',13,'900');const x0=566,y0=232,w=240,h=80;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);ctx.strokeStyle=C.purple;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=220;i++){const u=i/220,spread=.18+S.t*q.diff*.018,yy=y0-h*(q.c*Math.exp(-Math.pow((u-.18-spread),2)/(0.025+spread*.18))+.12);const x=x0+u*w;if(i===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke();arrow(x0+40,y0-22,x0+188,y0-22,C.purple,3);text('由高浓度向低浓度净扩散',x0+130,y0-45,C.purple,'center',12,'900')}
function drawGraph(q){box(530,300,318,176,'#fff');text('布朗轨迹与均方位移记录',689,324,C.ink,'center',13,'900');const x0=566,y0=438,w=240,h=82;line(x0,y0,x0+w,y0,'#9fb3c8',1.5);line(x0,y0,x0,y0-h,'#9fb3c8',1.5);ctx.strokeStyle=C.gold;ctx.lineWidth=2.5;ctx.beginPath();for(let i=0;i<=180;i++){const u=i/180,yy=y0-h*Math.min(1,u*q.brown*.9+.06*Math.sin(i*.35+S.t));const x=x0+u*w;if(i===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke();text('温度高/颗粒小 → 抖动更明显',x0+132,y0-h-16,C.gold,'center',12,'900')}
function drawTemp(q){box(110,410,382,84,'#fff');text('画面内可拖动温度手柄',300,430,C.ink,'center',13,'900');line(160,466,430,466,'#d9e2ec',9);const hx=160+(q.T-260)/160*270;ctx.fillStyle=S.drag==='temperature-handle'?C.red:C.blue;ctx.beginPath();ctx.arc(hx,466,13,0,7);ctx.fill();text(q.T+' K',hx,492,C.blue,'center',12,'900');text('T↑ → 分子平均动能↑',300,448,C.muted,'center',12,'800')}
function update(q){els.tLabel.textContent=q.T+' K';els.rLabel.textContent=q.r.toFixed(1)+' μm';els.cLabel.textContent=Math.round(q.c*100)+'%';els.readout.innerHTML='扩散快慢：<b>'+q.diff.toFixed(2)+'</b><br>布朗抖动：<b>'+q.brown.toFixed(2)+'</b><br>花粉轨迹点：<b>'+S.trail.length+'</b><br>微观原因：<b>无规则碰撞</b>';els.status.textContent=q.T>340?'升温后分子热运动更剧烈，染料扩散更快，花粉颗粒轨迹更曲折。':'低温时分子热运动较弱，扩散和布朗运动都较缓。';els.rows.innerHTML=S.records.slice(-6).map(r=>'<tr><td>'+r.T+'</td><td>'+r.r+'</td><td>'+r.d+'</td><td>'+r.b+'</td></tr>').join('')||'<tr><td colspan="4">暂无记录</td></tr>'}
function record(){const q=p();S.records.push({T:q.T,r:q.r.toFixed(1),d:q.diff.toFixed(2),b:q.brown.toFixed(2)});if(S.records.length>8)S.records.shift();update(q)}
function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}function setTemp(x){els.temp.value=Math.round((260+Math.max(0,Math.min(270,x-160))/270*160)/5)*5;draw()}[els.temp,els.radius,els.conc].forEach(el=>el.addEventListener('input',draw));els.play.onclick=()=>{S.run=!S.run;els.play.textContent=S.run?'暂停':'播放'};els.record.onclick=record;canvas.addEventListener('pointerdown',e=>{const q=p(),p0=pos(e);if(Math.hypot(p0.x-S.pollen.x,p0.y-S.pollen.y)<35){S.drag='pollen-handle';canvas.setPointerCapture(e.pointerId);canvas.style.cursor='grabbing'}else if(p0.y>446&&p0.y<488&&p0.x>140&&p0.x<450){S.drag='temperature-handle';canvas.setPointerCapture(e.pointerId);setTemp(p0.x)}});canvas.addEventListener('pointermove',e=>{if(!S.drag)return;const p0=pos(e);if(S.drag==='pollen-handle'){S.pollen.x=Math.max(130,Math.min(430,p0.x));S.pollen.y=Math.max(155,Math.min(330,p0.y));S.trail.push({x:S.pollen.x,y:S.pollen.y});draw()}if(S.drag==='temperature-handle')setTemp(p0.x)});canvas.addEventListener('pointerup',e=>{if(S.drag)record();S.drag=null;canvas.style.cursor='grab';try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('pointercancel',()=>{S.drag=null});let last=performance.now();function loop(now){const dt=Math.min((now-last)/1000,.04);last=now;if(S.run)S.t+=dt;draw();requestAnimationFrame(loop)}record();loop();
})();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script></body>
</html>
