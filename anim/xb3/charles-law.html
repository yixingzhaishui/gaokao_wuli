<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查理定律</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:560px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}.stepper{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="540"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>固定 n，T 从 300K 到 600K，看 p 是否加倍；注意 ℃ 读数不能直接做比例。</div>
  <div class="card"><div class="title">参数</div>
    <label class="param"><span>热力学温度 T <b id="tText">300 K</b></span><input id="temp" type="range" min="200" max="700" step="10" value="300"></label><div class="stepper"><button data-step="temp" data-dir="-1">- T</button><button data-step="temp" data-dir="1">+ T</button></div>
    <label class="param"><span>物质的量 n <b id="nText">1.00 mol</b></span><input id="amount" type="range" min="0.5" max="2.5" step="0.05" value="1"></label><div class="stepper"><button data-step="amount" data-dir="-1">- n</button><button data-step="amount" data-dir="1">+ n</button></div>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">查理定律</div><div>一定量、等容：</div><div>p/T = 常量</div><div>p1/T1 = p2/T2</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={temp:document.getElementById('temp'),amount:document.getElementById('amount')};let mol=[];const RdivV=1;function fmt(n,d){return n.toFixed(d==null?2:d)}function p(){const T=+els.temp.value,n=+els.amount.value,press=n*RdivV*T;return{T,n,press,k:press/T,c:tC(T),speed:Math.sqrt(T/300),count:Math.round(24+n*24)}}function tC(T){return T-273.15}function ensure(q){while(mol.length<q.count)mol.push({x:80+Math.random()*330,y:95+Math.random()*260,a:Math.random()*Math.PI*2});while(mol.length>q.count)mol.pop()}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function arrow(x1,y1,x2,y2,c,w){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(ang-.45),y2-10*Math.sin(ang-.45));ctx.lineTo(x2-10*Math.cos(ang+.45),y2-10*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function step(q){ensure(q);for(const m of mol){m.x+=Math.cos(m.a)*2*q.speed;m.y+=Math.sin(m.a)*2*q.speed;if(m.x<72||m.x>420){m.a=Math.PI-m.a;m.x=Math.max(72,Math.min(420,m.x))}if(m.y<92||m.y>356){m.a=-m.a;m.y=Math.max(92,Math.min(356,m.y))}if(Math.random()<.02)m.a+=(Math.random()-.5)}}function graph(q){const gx=520,gy=86,w=280,h=300;box(gx,gy,w,h,'#fff','#d9e2ec');text('p-T(K) 图像',gx+w/2,gy+24,'#102a43','center',15,'700');ctx.strokeStyle='#829ab1';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gx+42,gy+260);ctx.lineTo(gx+260,gy+260);ctx.moveTo(gx+42,gy+260);ctx.lineTo(gx+42,gy+55);ctx.stroke();text('T/K',gx+256,gy+278,'#486581','center',12);text('p',gx+25,gy+58,'#486581','center',12);ctx.strokeStyle='#e8590c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(gx+42,gy+260);ctx.lineTo(gx+250,gy+260-q.n*180);ctx.stroke();const px=gx+42+(q.T/700)*208,py=gy+260-(q.press/(2.5*700))*180;ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();text('当前',px,py-15,'#c92a2a','center',12,'700')}function draw(){const q=p();step(q);ctx.clearRect(0,0,860,540);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,540);text('查理定律：一定量气体等容时 p 与 T(K) 成正比',430,30,'#102a43','center',18,'700');box(58,76,380,310,'#fff','#334e68');ctx.fillStyle='rgba(44,123,229,.07)';ctx.fillRect(62,80,372,302);ctx.fillStyle='#2c7be5';for(const m of mol){ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);ctx.fill()}const arrows=Math.max(2,Math.min(10,Math.round(q.press/140)));for(let i=0;i<arrows;i++){const yy=110+i*230/Math.max(1,arrows-1);arrow(390,yy,430,yy,'#e03131',3)}text('硬质容器：V不变',248,408,'#486581','center',13,'700');text('压力表 p='+fmt(q.press,0),248,436,'#c92a2a','center',16,'700');graph(q);update(q)}function update(q){document.getElementById('tText').textContent=fmt(q.T,0)+' K';document.getElementById('nText').textContent=fmt(q.n,2)+' mol';document.getElementById('readout').innerHTML='p=nRT/V=<b>'+fmt(q.press,1)+'</b><br>p/T=<b>'+fmt(q.k,2)+'</b><br>摄氏温度 t=<b>'+fmt(q.c,1)+' ℃</b><br>分子点数=<b>'+q.count+'</b>';document.getElementById('status').textContent='正比例关系是 p 与热力学温度 T(K)，不是 p 与摄氏温度 t(℃)。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-step]').forEach(btn=>btn.addEventListener('click',()=>{const el=els[btn.dataset.step],step=+el.step||1,dir=+btn.dataset.dir;el.value=Math.max(+el.min,Math.min(+el.max,+el.value+dir*step));el.dispatchEvent(new Event('input',{bubbles:true}))}));function loop(){draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
