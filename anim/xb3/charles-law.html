<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>查理定律</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="查理定律实验台：等容硬质容器侧视、温度计、压力表、p-T图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="temp">热力学温度 T/K：<span id="tempVal"></span></label>
      <input id="temp" type="range" min="200" max="700" value="300" step="10">
      <label for="amount">物质的量 n/mol：<span id="amountVal"></span></label>
      <input id="amount" type="range" min="0.5" max="2.5" value="1" step="0.05">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动画面里的温度计改变 T；固定 n 时，把 T 从 300K 到 600K，看压力表 p 是否约加倍，并注意不能用 ℃ 直接成比例。</div>
      <table aria-label="查理定律数据记录">
        <thead><tr><th>组</th><th>T/K</th><th>p</th><th>p/T</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  temp: document.getElementById('temp'),
  amount: document.getElementById('amount'),
  tempVal: document.getElementById('tempVal'),
  amountVal: document.getElementById('amountVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const mol = [];
const state = { running: false, last: 0, time: 0, drag: null, records: [] };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function values() {
  const T = Number(els.temp.value);
  const n = Number(els.amount.value);
  const p = n * T;
  return { T, n, p, k: p / T, celsius: T - 273.15, speed: Math.sqrt(T / 300), count: Math.round(24 + n * 24) };
}
function ensure(q) {
  while (mol.length < q.count) mol.push({ x: 84 + Math.random() * 310, y: 106 + Math.random() * 244, a: Math.random() * Math.PI * 2 });
  while (mol.length > q.count) mol.pop();
}
function step(q, dt) {
  ensure(q);
  mol.forEach(m => {
    m.x += Math.cos(m.a) * q.speed * 96 * dt;
    m.y += Math.sin(m.a) * q.speed * 96 * dt;
    if (m.x < 72 || m.x > 414) { m.a = Math.PI - m.a; m.x = clamp(m.x, 72, 414); }
    if (m.y < 96 || m.y > 360) { m.a = -m.a; m.y = clamp(m.y, 96, 360); }
  });
}
function arrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 9 * Math.cos(a - 0.45), y2 - 9 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 9 * Math.cos(a + 0.45), y2 - 9 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawContainer(q) {
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.fillRect(58, 88, 380, 304);
  ctx.strokeRect(58, 88, 380, 304);
  ctx.fillStyle = 'rgba(44,123,229,0.08)';
  ctx.fillRect(62, 92, 372, 296);
  ctx.fillStyle = '#2c7be5';
  mol.forEach(m => { ctx.beginPath(); ctx.arc(m.x, m.y, 3, 0, Math.PI * 2); ctx.fill(); });
  const arrows = clamp(Math.round(q.p / 140), 2, 10);
  for (let i = 0; i < arrows; i++) {
    const yy = 118 + i * 230 / Math.max(1, arrows - 1);
    arrow(392, yy, 430, yy, '#e03131');
  }
  ctx.fillStyle = '#486581';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('硬质容器侧视：V 不变，升温使撞壁更猛烈', 248, 420);
}
function drawThermometer(q) {
  const x = 500, y = 80;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 176, 126);
  ctx.strokeRect(x, y, 176, 126);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('温度计侧视读数', x + 88, y + 24);
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(x + 42, y + 34);
  ctx.lineTo(x + 42, y + 104);
  ctx.stroke();
  const fill = clamp((q.T - 200) / 500, 0, 1) * 70;
  ctx.strokeStyle = '#e03131';
  ctx.beginPath();
  ctx.moveTo(x + 42, y + 104);
  ctx.lineTo(x + 42, y + 104 - fill);
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.fillText(q.T + ' K', x + 112, y + 70);
}
function drawGraph(q) {
  const x0 = 488, y0 = 438, w = 202, h = 150;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.strokeStyle = '#e8590c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0 - clamp(q.n / 2.5, 0, 1) * h);
  ctx.stroke();
  const px = x0 + (q.T - 200) / 500 * w;
  const py = y0 - clamp(q.p / (2.5 * 700), 0, 1) * h;
  ctx.fillStyle = '#c92a2a';
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('p-T(K) 图像/数据记录：等容一定量时 p/T=常量', x0 + w / 2, y0 + 28);
}
function draw() {
  const q = values();
  els.tempVal.textContent = q.T.toFixed(0);
  els.amountVal.textContent = q.n.toFixed(2);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('查理定律实验台：等容容器侧视 + 温度计 + 压力表/p-T图像 + 数据记录', 370, 28);
  drawContainer(q);
  drawThermometer(q);
  drawGraph(q);
  els.readout.innerHTML = [
    `<div id="r1">p=nRT/V≈${q.p.toFixed(1)}</div>`,
    `<div id="r2">p/T≈${q.k.toFixed(2)}，nR/V≈${q.n.toFixed(2)}</div>`,
    `<div id="r3">T=${q.T.toFixed(0)} K，摄氏温度 t≈${q.celsius.toFixed(1)} ℃</div>`,
    `<div id="r4">查理定律：一定量、等容时 p1/T1=p2/T2</div>`
  ].join('');
  els.status.textContent = '正比例关系是 p 与热力学温度 T(K)，不是 p 与摄氏温度 t(℃)。';
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.T.toFixed(0)}</td><td>${p.p.toFixed(1)}</td><td>${p.k.toFixed(2)}</td></tr>`
  ).join('');
}
function setTempFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const T = clamp(700 - (y - 80) / 126 * 500, 200, 700);
  els.temp.value = String(Math.round(T / 10) * 10);
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  const q = values();
  step(q, dt || 0.016);
  if (state.running && !state.drag) {
    state.time += dt;
    els.temp.value = String(Math.round((450 + 180 * Math.sin(state.time * 1.1)) / 10) * 10);
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const q = values();
  state.records.push({ T: q.T, p: q.p, k: q.k });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.records = [];
  els.temp.value = '300';
  els.amount.value = '1';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'thermometer-handle';
  setTempFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setTempFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
