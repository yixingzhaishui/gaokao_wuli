<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p-V 图像</title>
<link rel="icon" href="data:,">
<style>
  body{margin:0;background:#f7f9fc;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:10px;padding:10px;box-sizing:border-box;min-height:580px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto}.panel{display:flex;flex-direction:column;gap:7px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:8px}.task{background:#fff7e6;border-left:3px solid #f0a500;color:#486581;line-height:1.38;font-size:12px}.title{font-weight:700;margin-bottom:4px}.seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.seg button.active{background:#2c7be5;color:#fff;border-color:#2c7be5}.param{display:grid;gap:2px;margin:6px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:10px}.param b{color:#102a43;font-variant-numeric:tabular-nums;white-space:nowrap}input[type=range]{width:100%;accent-color:#2c7be5}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:5px 8px;cursor:pointer}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:8px;line-height:1.45;font-size:13px}.readout b{color:#f0a500;font-variant-numeric:tabular-nums}.formula{font-size:13px;line-height:1.42;color:#334e68}.status{font-size:12px;font-weight:700;border-radius:6px;padding:7px;border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;line-height:1.35}@media(max-width:780px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="860" height="560"></canvas></div><div class="panel">
  <div class="card task"><b>观察任务：</b>切换过程类型，看图线形状；调 V2 到小于 V1，看做功符号如何改变。</div>
  <div class="card"><div class="title">过程类型</div><div class="seg"><button data-mode="isoT" class="active">等温</button><button data-mode="isoP">等压</button><button data-mode="isoV">等容</button></div></div>
  <div class="card"><div class="title">状态参数</div>
    <label class="param"><span>初态体积 V1 <b id="v1Text">1.0</b></span><input id="v1" type="range" min="0.5" max="2.5" step="0.1" value="1"></label>
    <label class="param"><span>末态体积 V2 <b id="v2Text">2.0</b></span><input id="v2" type="range" min="0.5" max="2.5" step="0.1" value="2"></label>
    <label class="param"><span>初态压强 p1 <b id="p1Text">2.0</b></span><input id="p1" type="range" min="0.8" max="4" step="0.1" value="2"></label>
  </div>
  <div class="readout" id="readout"></div>
  <div class="card formula"><div class="title">读图规则</div><div>水平线：等压</div><div>竖直线：等容，W=0</div><div>曲线面积：W=∫p dV</div></div>
  <div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const els={v1:document.getElementById('v1'),v2:document.getElementById('v2'),p1:document.getElementById('p1')};let mode='isoT';function fmt(n,d){return n.toFixed(d==null?2:d)}function p(){const V1=+els.v1.value,V2=+els.v2.value,p1=+els.p1.value;let p2=p1,work=0,label='';if(mode==='isoT'){p2=p1*V1/V2;work=p1*V1*Math.log(V2/V1);label='等温：pV=常量'}if(mode==='isoP'){p2=p1;work=p1*(V2-V1);label='等压：p=常量'}if(mode==='isoV'){p2=+els.p1.value*1.6;work=0;label='等容：V=常量；此时 V2 读作压强终态调节无效'}return{V1,V2:mode==='isoV'?V1:V2,p1,p2,work,label}}function text(s,x,y,c,a,size,w){ctx.fillStyle=c||'#102a43';ctx.font=(w?w+' ':'')+(size||13)+'px -apple-system,\"PingFang SC\",sans-serif';ctx.textAlign=a||'center';ctx.textBaseline='middle';ctx.fillText(s,x,y)}function box(x,y,w,h,fill,stroke){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#d9e2ec';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c){const ang=Math.atan2(y2-y1,x2-x1);ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(ang-.45),y2-10*Math.sin(ang-.45));ctx.lineTo(x2-10*Math.cos(ang+.45),y2-10*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore()}function mapX(V){return 90+(V-.4)/2.3*420}function mapY(p){return 430-(p-.4)/4.0*320}function draw(){const q=p();ctx.clearRect(0,0,860,560);ctx.fillStyle='#fff';ctx.fillRect(0,0,860,560);text('p-V 图像：图线形状读过程，面积读做功',430,30,'#102a43','center',18,'700');box(56,62,500,420,'#fff','#d9e2ec');ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(90,430);ctx.lineTo(520,430);ctx.moveTo(90,430);ctx.lineTo(90,90);ctx.stroke();text('V',525,448,'#486581','center',13);text('p',72,92,'#486581','center',13);ctx.fillStyle='rgba(240,165,0,.18)';ctx.beginPath();ctx.moveTo(mapX(q.V1),430);if(mode==='isoT'){for(let V=q.V1; q.V2>=q.V1?V<=q.V2:V>=q.V2; V+=q.V2>=q.V1?.03:-.03){ctx.lineTo(mapX(V),mapY(q.p1*q.V1/V))}}else if(mode==='isoP'){ctx.lineTo(mapX(q.V1),mapY(q.p1));ctx.lineTo(mapX(q.V2),mapY(q.p1))}else{ctx.lineTo(mapX(q.V1),mapY(q.p1));ctx.lineTo(mapX(q.V1),mapY(q.p2))}ctx.lineTo(mapX(q.V2),430);ctx.closePath();if(mode!=='isoV')ctx.fill();ctx.strokeStyle=mode==='isoT'?'#e8590c':mode==='isoP'?'#2c7be5':'#7b2cbf';ctx.lineWidth=3;ctx.beginPath();if(mode==='isoT'){let first=true;for(let V=q.V1; q.V2>=q.V1?V<=q.V2+.001:V>=q.V2-.001; V+=q.V2>=q.V1?.03:-.03){const x=mapX(V),y=mapY(q.p1*q.V1/V);if(first){ctx.moveTo(x,y);first=false}else ctx.lineTo(x,y)}}else{ctx.moveTo(mapX(q.V1),mapY(q.p1));ctx.lineTo(mapX(q.V2),mapY(q.p2))}ctx.stroke();arrow(mapX(q.V1),mapY(q.p1),mapX((q.V1+q.V2)/2),mapY(mode==='isoT'?q.p1*q.V1/((q.V1+q.V2)/2):(q.p1+q.p2)/2),'#c92a2a');ctx.fillStyle='#102a43';ctx.beginPath();ctx.arc(mapX(q.V1),mapY(q.p1),5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c92a2a';ctx.beginPath();ctx.arc(mapX(q.V2),mapY(q.p2),5,0,Math.PI*2);ctx.fill();text('1',mapX(q.V1)-12,mapY(q.p1)-12,'#102a43','center',13,'700');text('2',mapX(q.V2)+12,mapY(q.p2)-12,'#c92a2a','center',13,'700');box(610,110,190,240,'#f7f9fc','#d9e2ec');text(q.label,705,142,'#102a43','center',14,'700');text('p1='+fmt(q.p1,2),705,184,'#486581','center',13);text('V1='+fmt(q.V1,2),705,212,'#486581','center',13);text('p2='+fmt(q.p2,2),705,240,'#486581','center',13);text('V2='+fmt(q.V2,2),705,268,'#486581','center',13);text('W='+fmt(q.work,2),705,310,q.work>=0?'#087f5b':'#b30000','center',18,'700');update(q)}function update(q){document.getElementById('v1Text').textContent=fmt(q.V1,1);document.getElementById('v2Text').textContent=fmt(+els.v2.value,1);document.getElementById('p1Text').textContent=fmt(q.p1,1);document.getElementById('readout').innerHTML='过程：<b>'+q.label+'</b><br>末态 p2=<b>'+fmt(q.p2,2)+'</b><br>做功 W(示意)=<b>'+fmt(q.work,2)+'</b><br>方向：<b>'+(q.V2>q.V1?'膨胀':q.V2<q.V1?'压缩':'体积不变')+'</b>';document.getElementById('status').textContent=q.work>0?'向右膨胀，气体对外做正功。':q.work<0?'向左压缩，气体对外做负功。':'体积不变，气体对外做功为 0。'}Object.values(els).forEach(el=>el.addEventListener('input',draw));document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{mode=btn.dataset.mode;document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b===btn));draw()}));draw();})();
</script>
</body>
</html>
