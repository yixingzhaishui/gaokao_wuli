<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙速度专题</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;padding:12px;min-height:650px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43}input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="900" height="600" aria-label="宇宙速度实验台：牛顿大炮侧视、地球轨道俯视、速度能量图像和轨迹记录"></canvas></div><div class="panel">
<div class="card task"><b>观察任务：</b>拖动发射速度；看炮弹从落地、环绕、椭圆到逃逸的变化，区分第一、第二、第三宇宙速度的含义。</div>
<div class="card"><div class="title">发射条件</div><label class="param"><span>初速度 v <b id="vLab">7.9 km/s</b></span><input id="speed" type="range" min="2" max="18" step="0.1" value="7.9"></label><label class="param"><span>发射高度 h <b id="hLab">0 km</b></span><input id="height" type="range" min="0" max="1200" step="50" value="0"></label><div class="buttons"><button id="play">播放</button><button id="reset">重置</button></div></div>
<div class="readout" id="readout"></div><div class="card formula"><div class="title">公式绑定</div><div>近地第一宇宙速度：v1=√(GM/R)≈7.9 km/s。</div><div>逃逸速度：v2=√(2GM/R)≈11.2 km/s；太阳系逃逸约 16.7 km/s。</div></div><div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const el={speed:id('speed'),height:id('height'),vLab:id('vLab'),hLab:id('hLab'),readout:id('readout'),status:id('status'),play:id('play')};const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};const state={playing:false,t:0,drag:null,trail:[]};function id(s){return document.getElementById(s)}function vals(){const v=+el.speed.value,h=+el.height.value,R=6370,mu=398600,v1=Math.sqrt(mu/(R+h)),v2=Math.sqrt(2*mu/(R+h));let kind=v<7.3?'落地':v<v2*.98?(Math.abs(v-v1)<.4?'近圆轨道':'椭圆轨道'):v<16.7?'地球逃逸':'太阳系逃逸';return{v,h,R,mu,v1,v2,kind}}function fmt(n,d=1){return n.toFixed(d)}function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
function pathPoint(x){const cx=330,cy=250,R=116,alt=x.h/1200*32,r=R+alt,t=state.t;const ratio=x.v/x.v1;if(x.kind==='落地'){const a=-Math.PI/2+t*1.9;const rr=r-38*t*t;return{x:cx+rr*Math.cos(a),y:cy+rr*Math.sin(a)}}if(x.kind==='近圆轨道'){const a=-Math.PI/2+t*2.4;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}}if(x.kind==='椭圆轨道'){const a=-Math.PI/2+t*2.0,b=r*(.75+Math.min(.55,(ratio-1)*.45));return{x:cx+r*Math.cos(a),y:cy+b*Math.sin(a)}}const a=-Math.PI/2+t*1.15,rr=r+44*t*t;return{x:cx+rr*Math.cos(a),y:cy+rr*Math.sin(a)}}function drawScene(x){box(42,72,810,296,'#fff');text('牛顿大炮轨道俯视：初速度决定落地、环绕、椭圆或逃逸',447,100,colors.ink,'center',16,'900');const cx=330,cy=250,R=116;const grad=ctx.createRadialGradient(cx-30,cy-30,20,cx,cy,R);grad.addColorStop(0,'#7dd3fc');grad.addColorStop(1,'#2563eb');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();text('地球',cx,cy,'#fff','center',18,'900');line(cx-R-40,cy-R,cx+R+420,cy-R,colors.green,2,[6,6]);text('发射切线方向',cx+188,cy-R-18,colors.green,'center',12,'900');arrow(cx,cy-R,cx+70+x.v*5,cy-R,colors.gold,4);text('v0',cx+80+x.v*5,cy-R-18,colors.gold,'center',12,'900');const p=pathPoint(x);state.trail.push(p);if(state.trail.length>180)state.trail.shift();state.trail.forEach((q,i)=>{ctx.fillStyle='rgba(124,58,237,'+(i/state.trail.length*.55)+')';ctx.beginPath();ctx.arc(q.x,q.y,3,0,Math.PI*2);ctx.fill()});ctx.fillStyle=x.kind.includes('逃逸')?colors.red:x.kind==='落地'?colors.gold:colors.green;ctx.beginPath();ctx.arc(p.x,p.y,9,0,Math.PI*2);ctx.fill();box(540,170,230,102,'#fbfdff');text('轨道判定',655,196,colors.ink,'center',14,'900');text(x.kind,655,226,x.kind.includes('逃逸')?colors.red:x.kind==='落地'?colors.gold:colors.green,'center',18,'900');text('v1≈'+fmt(x.v1,2)+' km/s  v2≈'+fmt(x.v2,2)+' km/s',655,252,colors.muted,'center',12,'900')}
function drawGraph(x){box(42,400,810,128,'#fff');text('速度分区图像',447,426,colors.ink,'center',15,'900');const gx=108,gy=492,gw=650;line(gx,gy,gx+gw,gy,colors.ink,3);[['落地',2,7.3,colors.gold],['环绕/椭圆',7.3,x.v2,colors.green],['地球逃逸',x.v2,16.7,colors.red],['太阳系逃逸',16.7,18,colors.purple]].forEach(s=>{const x1=gx+(s[1]-2)/16*gw,x2=gx+(s[2]-2)/16*gw;line(x1,gy-20,x2,gy-20,s[3],12);text(s[0],(x1+x2)/2,gy-42,s[3],'center',12,'900')});const px=gx+(x.v-2)/16*gw;ctx.fillStyle=colors.blue;ctx.beginPath();ctx.arc(px,gy,8,0,Math.PI*2);ctx.fill();text('当前v',px,gy+24,colors.blue,'center',12,'900')}
function update(x){el.vLab.textContent=fmt(x.v,1)+' km/s';el.hLab.textContent=fmt(x.h,0)+' km';el.readout.innerHTML='当前速度：<b>'+fmt(x.v,1)+' km/s</b><br>第一宇宙速度：<b>'+fmt(x.v1,2)+' km/s</b><br>第二宇宙速度：<b>'+fmt(x.v2,2)+' km/s</b><br>轨道类型：<b>'+x.kind+'</b>';el.status.textContent=x.kind==='落地'?'速度不足，仍会落回地球。':x.kind==='近圆轨道'?'速度接近第一宇宙速度，可近地圆周运动。':x.kind==='椭圆轨道'?'速度大于圆轨道速度但小于逃逸速度，轨道为椭圆。':'速度达到逃逸条件，机械能不再被地球束缚。'}
function draw(){const x=vals();ctx.clearRect(0,0,900,600);const bg=ctx.createLinearGradient(0,0,0,600);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,600);text('B2-26 宇宙速度实验台：牛顿大炮 + 轨道俯视 + 速度分区图像',450,34,colors.ink,'center',18,'900');drawScene(x);drawGraph(x);update(x)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{state.drag='speed';canvas.setPointerCapture(e.pointerId);move(e)});canvas.addEventListener('pointermove',move);function move(e){if(!state.drag)return;const p=pos(e);el.speed.value=Math.max(2,Math.min(18,((p.x-110)/38).toFixed(1)));state.trail=[];draw();e.preventDefault()}canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);[el.speed,el.height].forEach(x=>x.addEventListener('input',()=>{state.trail=[];draw()}));el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};id('reset').onclick=()=>{el.speed.value=7.9;el.height.value=0;state.t=0;state.trail=[];draw()};function loop(){if(state.playing){state.t+=.02;if(state.t>5)state.t=0}else state.t=0;draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
