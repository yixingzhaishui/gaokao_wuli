<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功能关系实验台：做功对应能量变化</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --ink: #102a43;
    --muted: #486581;
    --line: #d9e2ec;
    --blue: #2c7be5;
    --purple: #7b2cbf;
    --green: #087f5b;
    --orange: #f08c00;
    --red: #c92a2a;
    --paper: #f7f9fc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }
  .lab {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    gap: 12px;
    padding: 12px;
    min-height: 540px;
  }
  .stage, .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .stage { overflow: hidden; position: relative; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; }
  .hint {
    position: absolute;
    left: 12px;
    bottom: 10px;
    color: var(--muted);
    background: rgba(255,255,255,.9);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
  }
  .panel { display: flex; flex-direction: column; gap: 10px; }
  .card { padding: 10px; }
  .task {
    background: #fff7e6;
    border-left: 3px solid var(--orange);
    color: var(--muted);
    line-height: 1.5;
    font-size: 13px;
  }
  .title { font-weight: 700; margin-bottom: 7px; }
  .param { display: grid; gap: 3px; margin: 9px 0; font-size: 13px; }
  .param span { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); }
  .param b { color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
  input[type=range] { width: 100%; accent-color: var(--blue); }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  button {
    border: 1px solid #b0bcc9;
    background: #fff;
    border-radius: 6px;
    padding: 7px 8px;
    cursor: pointer;
    color: var(--ink);
    font-size: 13px;
  }
  button:hover { background: #eef2f7; }
  button.primary { background: #e8f2ff; border-color: #8bbcff; color: #174ea6; font-weight: 700; }
  .readout {
    background: var(--ink);
    color: #d9e2ec;
    border-radius: 8px;
    padding: 10px;
    line-height: 1.75;
    font-size: 13px;
  }
  .readout b { color: #ffd166; font-variant-numeric: tabular-nums; }
  .formula { font-size: 13px; line-height: 1.55; color: #334e68; }
  .status {
    font-size: 13px;
    font-weight: 700;
    border-radius: 6px;
    padding: 8px;
    border: 1px solid #38b2ac;
    background: #e6fffa;
    color: var(--green);
  }
  @media (max-width: 780px) {
    .lab { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="lab">
  <div class="stage">
    <canvas id="canvas" width="920" height="540" aria-label="功能关系实验台"></canvas>
    <div class="hint">可直接拖动小球改变过程，拖动橙色高度手柄改变高度</div>
  </div>
  <div class="panel">
    <div class="card task">
      <b>观察任务：</b>拖动小球时同时看三行账本：合力总功对动能，重力做功对势能，摩擦做功对机械能。
    </div>
    <div class="card">
      <div class="title">实验控制</div>
      <label class="param"><span>质量 m <b id="mText">2.0 kg</b></span><input id="m" type="range" min="0.5" max="8" step="0.1" value="2"></label>
      <label class="param"><span>高度 h <b id="hText">5.0 m</b></span><input id="h" type="range" min="1" max="8" step="0.1" value="5"></label>
      <label class="param"><span>摩擦因数 μ <b id="muText">0.00</b></span><input id="mu" type="range" min="0" max="0.45" step="0.01" value="0"></label>
      <label class="param"><span>过程位置 <b id="uText">0%</b></span><input id="u" type="range" min="0" max="1" step="0.01" value="0"></label>
      <div class="buttons">
        <button class="primary" id="play">播放</button>
        <button id="reset">重置</button>
        <button data-case="smooth">光滑下滑</button>
        <button data-case="rough">增大摩擦</button>
        <button data-case="high">增高</button>
        <button data-case="mass">大质量</button>
      </div>
    </div>
    <div class="readout">
      W合=<b id="wtText">0.0 J</b>　ΔEk=<b id="dekText">0.0 J</b><br>
      WG=<b id="wgText">0.0 J</b>　-ΔEp=<b id="depText">0.0 J</b><br>
      Wf=<b id="wfText">0.0 J</b>　ΔE机=<b id="demText">0.0 J</b>
    </div>
    <div class="card formula">
      <div class="title">公式对照</div>
      <div>W合 = ΔEk：看合力总功和蓝色动能变化。</div>
      <div>WG = -ΔEp：看高度减少和紫色势能减少。</div>
      <div>Wf = ΔE机：看摩擦负功和绿色机械能减少。</div>
      <div>问哪个力，就找对应哪种能量变化。</div>
    </div>
    <div class="status" id="status">光滑：Wf=0，机械能不变；但 W合 与 WG 仍分别对应自己的能量变化。</div>
  </div>
</div>
<script>
(function(){
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const root = document.defaultView || globalThis;
  const g = 10;
  const theta = 32 * Math.PI / 180;
  const els = {
    m: document.getElementById('m'),
    h: document.getElementById('h'),
    mu: document.getElementById('mu'),
    u: document.getElementById('u')
  };
  const ui = {
    mText: document.getElementById('mText'),
    hText: document.getElementById('hText'),
    muText: document.getElementById('muText'),
    uText: document.getElementById('uText'),
    wtText: document.getElementById('wtText'),
    dekText: document.getElementById('dekText'),
    wgText: document.getElementById('wgText'),
    depText: document.getElementById('depText'),
    wfText: document.getElementById('wfText'),
    demText: document.getElementById('demText'),
    status: document.getElementById('status'),
    play: document.getElementById('play')
  };
  const state = { running: false, drag: null, hot: {}, lastTime: 0 };

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function fmt(n, d) {
    const v = Math.abs(n) < 0.0005 ? 0 : n;
    return v.toFixed(d == null ? 1 : d);
  }

  function p() {
    return {
      m: Number(els.m.value),
      h: Number(els.h.value),
      mu: Number(els.mu.value),
      u: Number(els.u.value)
    };
  }

  function setValue(name, value) {
    const el = els[name];
    el.value = String(clamp(value, Number(el.min), Number(el.max)));
  }

  function stopRun() {
    state.running = false;
    ui.play.textContent = '播放';
  }

  function calc(q) {
    const path = q.h / Math.sin(theta);
    const sNow = path * q.u;
    const wg = q.m * g * q.h * q.u;
    const wf = -q.mu * q.m * g * Math.cos(theta) * sNow;
    const wt = wg + wf;
    const dek = wt;
    const dep = wg;
    const dem = wf;
    const ek = Math.max(0, dek);
    const epLoss = dep;
    const mechLoss = -dem;
    const v = Math.sqrt(Math.max(0, 2 * ek / q.m));
    return { path, sNow, wg, wf, wt, dek, dep, dem, ek, epLoss, mechLoss, v };
  }

  function text(s, x, y, color, align, size, weight) {
    ctx.fillStyle = color || '#102a43';
    ctx.font = (weight ? weight + ' ' : '') + (size || 13) + 'px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s, x, y);
  }

  function box(x, y, w, h, fill, stroke) {
    ctx.save();
    ctx.fillStyle = fill || '#fff';
    ctx.strokeStyle = stroke || '#d9e2ec';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function line(x1, y1, x2, y2, color, width, dash) {
    ctx.save();
    ctx.strokeStyle = color || '#486581';
    ctx.lineWidth = width || 1;
    ctx.setLineDash(dash || []);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function arrow(x1, y1, x2, y2, color, width) {
    const a = Math.atan2(y2 - y1, x2 - x1);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = width || 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 10 * Math.cos(a - 0.45), y2 - 10 * Math.sin(a - 0.45));
    ctx.lineTo(x2 - 10 * Math.cos(a + 0.45), y2 - 10 * Math.sin(a + 0.45));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function trackGeometry(q) {
    const bottom = { x: 86, y: 276 };
    const scaleY = 26;
    const hPx = q.h * scaleY;
    const pathPx = hPx / Math.sin(theta);
    const top = { x: bottom.x + pathPx * Math.cos(theta), y: bottom.y - hPx };
    const ball = {
      x: top.x + (bottom.x - top.x) * q.u,
      y: top.y + (bottom.y - top.y) * q.u
    };
    return { bottom, top, ball, hPx, pathPx, scaleY };
  }

  function drawTrack(q, r) {
    const geo = trackGeometry(q);
    state.hot.ball = { x: geo.ball.x, y: geo.ball.y - 12, radius: 18, geo };
    state.hot.height = { x: geo.top.x + 36, y: geo.top.y, geo };
    box(24, 48, 536, 250, '#fff', '#d9e2ec');
    text('实物过程：先看力做功，再找能量变化', 292, 74, '#102a43', 'center', 16, '700');
    line(54, geo.bottom.y, 520, geo.bottom.y, '#d9e2ec', 2);
    line(geo.bottom.x, geo.bottom.y, geo.top.x, geo.top.y, '#334e68', 4);
    line(geo.bottom.x, geo.bottom.y, geo.bottom.x, geo.top.y, '#f08c00', 2.2, [6, 5]);
    line(geo.top.x, geo.top.y, geo.bottom.x, geo.top.y, '#9fb3c8', 1.2, [5, 4]);
    text('h=' + fmt(q.h, 1) + 'm', geo.bottom.x - 38, (geo.bottom.y + geo.top.y) / 2, '#f08c00', 'center', 13, '700');
    ctx.fillStyle = '#fff7e6';
    ctx.strokeStyle = '#f08c00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(geo.top.x + 36, geo.top.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    text('拖 h', geo.top.x + 36, geo.top.y - 18, '#b36b00', 'center', 11, '700');

    if (q.mu > 0.005) {
      line(geo.bottom.x + 28, geo.bottom.y - 2, geo.bottom.x + 118, geo.bottom.y - 70, '#c92a2a', 5);
      text('摩擦力做负功', geo.bottom.x + 110, geo.bottom.y - 86, '#c92a2a', 'center', 12, '700');
    }

    ctx.fillStyle = '#2c7be5';
    ctx.strokeStyle = '#174ea6';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(geo.ball.x, geo.ball.y - 12, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    text('小球', geo.ball.x - 26, geo.ball.y - 38, '#174ea6', 'center', 12, '700');
    arrow(geo.ball.x, geo.ball.y - 12, geo.ball.x, geo.ball.y + 40, '#7b2cbf', 2.6);
    text('mg 做功 WG', geo.ball.x + 44, geo.ball.y + 22, '#7b2cbf', 'left', 12, '700');
    if (q.mu > 0.005) {
      arrow(geo.ball.x - 2, geo.ball.y - 12, geo.ball.x - 2 - 48 * Math.cos(theta), geo.ball.y - 12 - 48 * Math.sin(theta), '#c92a2a', 2.6);
      text('f 做功 Wf', geo.ball.x - 84, geo.ball.y - 48, '#c92a2a', 'center', 12, '700');
    }
    if (r.v > 0.05) {
      arrow(geo.ball.x + 18, geo.ball.y - 8, geo.ball.x + 18 + Math.min(78, r.v * 9) * Math.cos(theta), geo.ball.y - 8 + Math.min(78, r.v * 9) * Math.sin(theta), '#e03131', 2.6);
      text('ΔEk 看速度变化', geo.ball.x + 94, geo.ball.y + 8, '#e03131', 'center', 12, '700');
    }
    text(q.mu === 0 ? '光滑：W合=WG，机械能不变。' : '粗糙：W合=WG+Wf，机械能减少。', 292, 34, q.mu === 0 ? '#087f5b' : '#c92a2a', 'center', 13, '700');
  }

  function drawRelationMap(q, r) {
    box(594, 48, 302, 250, '#fff', '#d9e2ec');
    text('关系图：哪个功对应哪个能量', 745, 74, '#102a43', 'center', 16, '700');
    const rows = [
      { y: 122, left: 'W合', right: 'ΔEk', value1: r.wt, value2: r.dek, color: '#2c7be5' },
      { y: 178, left: 'WG', right: '-ΔEp', value1: r.wg, value2: r.dep, color: '#7b2cbf' },
      { y: 234, left: 'Wf', right: 'ΔE机', value1: r.wf, value2: r.dem, color: '#c92a2a' }
    ];
    rows.forEach(row => {
      box(622, row.y - 24, 246, 42, '#f7f9fc', '#d9e2ec');
      text(row.left + '=' + fmt(row.value1, 1), 686, row.y, row.color, 'center', 13, '700');
      arrow(730, row.y, 782, row.y, '#486581', 1.8);
      text(row.right + '=' + fmt(row.value2, 1), 828, row.y, row.color, 'center', 13, '700');
    });
    text('每一行都要先问：是谁做功？', 745, 276, '#486581', 'center', 13);
  }

  function drawBars(q, r) {
    box(24, 322, 872, 174, '#fff', '#d9e2ec');
    text('三本账同时核对：合力账、重力账、机械能账', 460, 348, '#102a43', 'center', 16, '700');
    const items = [
      { key: 'W合', value: r.wt, color: '#2c7be5' },
      { key: 'ΔEk', value: r.dek, color: '#2c7be5' },
      { key: 'WG', value: r.wg, color: '#7b2cbf' },
      { key: '-ΔEp', value: r.dep, color: '#7b2cbf' },
      { key: 'Wf', value: r.wf, color: '#c92a2a' },
      { key: 'ΔE机', value: r.dem, color: '#c92a2a' }
    ];
    const maxAbs = Math.max(10, q.m * g * q.h);
    const base = 430;
    line(98, base, 842, base, '#486581', 1.5);
    items.forEach((item, i) => {
      const x = 122 + i * 121;
      const h = Math.abs(item.value) / maxAbs * 60;
      const y = item.value >= 0 ? base - h : base;
      ctx.fillStyle = item.color;
      ctx.fillRect(x, y, 48, Math.max(2, h));
      ctx.strokeStyle = '#102a43';
      ctx.strokeRect(x, item.value >= 0 ? base - 60 : base, 48, 60);
      text(item.key, x + 24, 474, '#334e68', 'center', 13, '700');
      text(fmt(item.value, 1), x + 24, item.value >= 0 ? y - 12 : y + h + 12, item.color, 'center', 12, '700');
    });
    text(q.mu === 0 ? '没有摩擦时，Wf=0，所以 ΔE机=0。' : '有摩擦时，Wf<0，所以 ΔE机<0，机械能减少。', 460, 310, q.mu === 0 ? '#087f5b' : '#c92a2a', 'center', 13, '700');
  }

  function updatePanel(q, r) {
    ui.mText.textContent = fmt(q.m, 1) + ' kg';
    ui.hText.textContent = fmt(q.h, 1) + ' m';
    ui.muText.textContent = fmt(q.mu, 2);
    ui.uText.textContent = Math.round(q.u * 100) + '%';
    ui.wtText.textContent = fmt(r.wt, 1) + ' J';
    ui.dekText.textContent = fmt(r.dek, 1) + ' J';
    ui.wgText.textContent = fmt(r.wg, 1) + ' J';
    ui.depText.textContent = fmt(r.dep, 1) + ' J';
    ui.wfText.textContent = fmt(r.wf, 1) + ' J';
    ui.demText.textContent = fmt(r.dem, 1) + ' J';
    if (q.mu === 0) {
      ui.status.textContent = '光滑：Wf=0，机械能不变；但 W合 与 WG 仍分别对应自己的能量变化。';
      ui.status.style.background = '#e6fffa';
      ui.status.style.color = '#087f5b';
      ui.status.style.borderColor = '#38b2ac';
    } else {
      ui.status.textContent = '粗糙：摩擦负功让 ΔE机<0；求动能变化仍要看 W合。';
      ui.status.style.background = '#fff0f0';
      ui.status.style.color = '#c92a2a';
      ui.status.style.borderColor = '#ff6b6b';
    }
  }

  function draw() {
    const q = p();
    const r = calc(q);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f7f9fc';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawTrack(q, r);
    drawRelationMap(q, r);
    drawBars(q, r);
    updatePanel(q, r);
  }

  function eventPos(ev) {
    const src = ev.touches && ev.touches.length ? ev.touches[0] : (ev.changedTouches && ev.changedTouches.length ? ev.changedTouches[0] : ev);
    const rect = canvas.getBoundingClientRect();
    return {
      x: (src.clientX - rect.left) * canvas.width / rect.width,
      y: (src.clientY - rect.top) * canvas.height / rect.height
    };
  }

  function dist(a, x, y) {
    return Math.hypot(a.x - x, a.y - y);
  }

  function setProgressFromPoint(pos) {
    const geo = state.hot.ball.geo;
    const vx = geo.bottom.x - geo.top.x;
    const vy = geo.bottom.y - geo.top.y;
    const wx = pos.x - geo.top.x;
    const wy = pos.y - geo.top.y;
    const u = (wx * vx + wy * vy) / (vx * vx + vy * vy);
    setValue('u', u);
  }

  function setHeightFromPoint(pos) {
    const geo = state.hot.height.geo;
    const h = (geo.bottom.y - pos.y) / geo.scaleY;
    setValue('h', h);
  }

  function startDrag(ev) {
    const pos = eventPos(ev);
    draw();
    if (state.hot.ball && dist(state.hot.ball, pos.x, pos.y) < 28) state.drag = 'ball';
    else if (state.hot.height && dist(state.hot.height, pos.x, pos.y) < 24) state.drag = 'height';
    if (state.drag) {
      stopRun();
      if (ev.pointerId != null && canvas.setPointerCapture) canvas.setPointerCapture(ev.pointerId);
      ev.preventDefault();
    }
  }

  function moveDrag(ev) {
    if (!state.drag) return;
    const pos = eventPos(ev);
    if (state.drag === 'ball') setProgressFromPoint(pos);
    if (state.drag === 'height') setHeightFromPoint(pos);
    draw();
    ev.preventDefault();
  }

  function endDrag(ev) {
    if (state.drag && ev.pointerId != null && canvas.hasPointerCapture && canvas.hasPointerCapture(ev.pointerId)) {
      canvas.releasePointerCapture(ev.pointerId);
    }
    state.drag = null;
  }

  if (root.PointerEvent) {
    canvas.addEventListener('pointerdown', startDrag);
    canvas.addEventListener('pointermove', moveDrag);
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(type => canvas.addEventListener(type, endDrag));
  } else {
    canvas.addEventListener('mousedown', startDrag);
    root.addEventListener('mousemove', moveDrag);
    root.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', startDrag, { passive: false });
    root.addEventListener('touchmove', moveDrag, { passive: false });
    root.addEventListener('touchend', endDrag);
    root.addEventListener('touchcancel', endDrag);
  }

  Object.values(els).forEach(el => {
    el.addEventListener('input', () => {
      stopRun();
      draw();
    });
  });

  ui.play.addEventListener('click', () => {
    state.running = !state.running;
    ui.play.textContent = state.running ? '暂停' : '播放';
    state.lastTime = performance.now();
  });

  document.getElementById('reset').addEventListener('click', () => {
    setValue('m', 2);
    setValue('h', 5);
    setValue('mu', 0);
    setValue('u', 0);
    stopRun();
    draw();
  });

  document.querySelectorAll('button[data-case]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.case;
      if (name === 'smooth') {
        setValue('m', 2); setValue('h', 5); setValue('mu', 0); setValue('u', 0.75);
      } else if (name === 'rough') {
        setValue('m', 2); setValue('h', 5); setValue('mu', 0.25); setValue('u', 0.75);
      } else if (name === 'high') {
        setValue('m', 2); setValue('h', 7); setValue('mu', 0.12); setValue('u', 0.7);
      } else {
        setValue('m', 5); setValue('h', 5); setValue('mu', 0.18); setValue('u', 0.65);
      }
      stopRun();
      draw();
    });
  });

  function tick(now) {
    if (state.running) {
      const dt = Math.min(0.035, (now - state.lastTime) / 1000 || 0.016);
      state.lastTime = now;
      let next = Number(els.u.value) + dt * 0.35;
      if (next > 1) next = 0;
      els.u.value = String(next);
    }
    draw();
    requestAnimationFrame(tick);
  }

  draw();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
