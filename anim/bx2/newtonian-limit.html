<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛顿力学局限与相对论边界</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;padding:12px;min-height:650px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}button.active{background:#2c7be5;color:#fff;border-color:#2c7be5;font-weight:800}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43}input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="900" height="600" aria-label="牛顿力学边界实验台：速度尺度侧视、相对论因子图像、强引力和微观边界记录"></canvas></div><div class="panel">
<div class="card task"><b>观察任务：</b>把速度从日常低速拖到接近光速；看 γ 因子、运动钟、长度和适用理论区域怎样变化。</div>
<div class="card"><div class="title">边界参数</div><div class="buttons"><button data-domain="speed" class="active">高速</button><button data-domain="gravity">强引力</button><button data-domain="micro">微观</button><button data-domain="cosmos">宇宙观</button></div><label class="param"><span>速度 β=v/c <b id="betaLab">0.10</b></span><input id="beta" type="range" min="0" max="0.99" step="0.01" value="0.10"></label><label class="param"><span>强引力程度 <b id="gLab">10%</b></span><input id="grav" type="range" min="0" max="100" step="1" value="10"></label><div class="buttons"><button id="play">播放</button><button id="reset">重置</button></div></div>
<div class="readout" id="readout"></div><div class="card formula"><div class="title">公式绑定</div><div>狭义相对论：γ=1/√(1-β²)，Δt=γΔt0，L=L0/γ。</div><div>牛顿力学适合低速、弱引力、宏观尺度。</div></div><div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const el={beta:id('beta'),grav:id('grav'),betaLab:id('betaLab'),gLab:id('gLab'),readout:id('readout'),status:id('status'),play:id('play')};const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};const state={domain:'speed',playing:false,t:0,drag:null};function id(s){return document.getElementById(s)}function vals(){const b=+el.beta.value,G=+el.grav.value,gamma=1/Math.sqrt(1-b*b);return{b,G,gamma,time:gamma,length:1/gamma,classic:b<.1&&G<30}}function fmt(n,d=2){return n.toFixed(d)}function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
function drawMap(x){box(42,72,810,286,'#fff');text('理论适用地图：低速弱引力宏观用牛顿，越过边界要换理论',447,100,colors.ink,'center',16,'900');const zones=[['低速宏观',150,150,150,90,colors.green],['高速接近光速',350,150,170,90,colors.blue],['强引力/宇宙',570,150,170,90,colors.purple],['微观粒子',350,268,170,52,colors.gold]];zones.forEach(z=>{box(z[1],z[2],z[3],z[4],z[5]+'22',z[5]);text(z[0],z[1]+z[3]/2,z[2]+z[4]/2,z[5],'center',14,'900')});const px=150+Math.min(1,x.b/.99)*370,py=195-Math.min(80,x.G*.55);ctx.fillStyle=colors.red;ctx.beginPath();ctx.arc(px,py,10,0,Math.PI*2);ctx.fill();text('当前问题',px,py-20,colors.red,'center',12,'900');arrow(156,342,742,342,colors.muted,3);text('速度/能量/尺度逐渐超出经典范围',450,365,colors.muted,'center',13,'900')}
function drawRelativity(x){box(42,390,810,138,'#fff');text('γ 因子图像与钟尺读数',447,416,colors.ink,'center',15,'900');const gx=96,gy=500,gw=330,gh=72;line(gx,gy,gx+gw,gy,colors.ink,2);line(gx,gy,gx,gy-gh,colors.ink,2);ctx.strokeStyle=colors.blue;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=99;i++){const b=i/100,g=1/Math.sqrt(1-b*b),xx=gx+b*gw,yy=gy-Math.min(1,(g-1)/4)*gh;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)}ctx.stroke();const px=gx+x.b*gw,py=gy-Math.min(1,(x.gamma-1)/4)*gh;ctx.fillStyle=colors.red;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();box(510,438,260,58,'#fbfdff');text('运动钟：Δt='+fmt(x.time,2)+'Δt0',640,458,colors.blue,'center',13,'900');text('运动方向长度：L='+fmt(x.length,2)+'L0',640,482,colors.purple,'center',13,'900')}
function update(x){el.betaLab.textContent=fmt(x.b,2);el.gLab.textContent=Math.round(x.G)+'%';const domain={speed:'高速',gravity:'强引力',micro:'微观',cosmos:'宇宙观'}[state.domain];el.readout.innerHTML='当前主题：<b>'+domain+'</b><br>β=v/c：<b>'+fmt(x.b,2)+'</b><br>γ：<b>'+fmt(x.gamma,3)+'</b><br>运动钟放慢倍数：<b>'+fmt(x.time,2)+'</b><br>长度比例：<b>'+fmt(x.length,2)+'</b>';el.status.textContent=x.classic?'经典牛顿力学足够好：低速、弱引力、宏观尺度。':'已接近或越过经典边界：需用相对论、量子或宇宙学观点修正。'}
function draw(){const x=vals();ctx.clearRect(0,0,900,600);const bg=ctx.createLinearGradient(0,0,0,600);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,600);text('B2-27 牛顿力学局限：速度尺度侧视 + γ图像 + 理论边界记录',450,34,colors.ink,'center',18,'900');drawMap(x);drawRelativity(x);update(x)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{state.drag='beta';canvas.setPointerCapture(e.pointerId);move(e)});canvas.addEventListener('pointermove',move);function move(e){if(!state.drag)return;const p=pos(e);el.beta.value=Math.max(0,Math.min(.99,((p.x-100)/650).toFixed(2)));draw();e.preventDefault()}canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);document.querySelectorAll('[data-domain]').forEach(b=>b.onclick=()=>{state.domain=b.dataset.domain;document.querySelectorAll('[data-domain]').forEach(x=>x.classList.toggle('active',x===b));draw()});[el.beta,el.grav].forEach(x=>x.addEventListener('input',draw));el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};id('reset').onclick=()=>{el.beta.value=.1;el.grav.value=10;draw()};function loop(){if(state.playing){state.t+=.03;el.beta.value=(.5+.49*Math.sin(state.t)).toFixed(2)}draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
id('reset').onclick=()=>{el.beta.value=.1;el.grav.value=10;state.domain='speed';state.playing=false;state.t=0;el.play.textContent='播放';document.querySelectorAll('[data-domain]').forEach(b=>b.classList.toggle('active',b.dataset.domain==='speed'));draw()};
})();
</script>
</body>
</html>
