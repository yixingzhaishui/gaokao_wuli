<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>离心现象与生活应用</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}.root{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;padding:12px;min-height:650px}.stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}.panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}.task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}.param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43}input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}.readout b{color:#ffd166}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}.formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root"><div class="stage"><canvas id="canvas" width="900" height="600" aria-label="离心现象实验台：转盘俯视、汽车弯道侧视、力箭头、临界速度图像和状态记录"></canvas></div><div class="panel">
<div class="card task"><b>观察任务：</b>调速度、半径和摩擦因数；看所需向心力超过最大静摩擦时，物体为什么沿切线方向偏离圆周。</div>
<div class="card"><div class="title">弯道参数</div><label class="param"><span>速度 v <b id="vLab">12 m/s</b></span><input id="speed" type="range" min="2" max="32" step="1" value="12"></label><label class="param"><span>半径 r <b id="rLab">40 m</b></span><input id="radius" type="range" min="12" max="80" step="2" value="40"></label><label class="param"><span>摩擦因数 μ <b id="muLab">0.40</b></span><input id="mu" type="range" min="0.05" max="0.9" step="0.01" value="0.40"></label><div class="buttons"><button id="play">播放</button><button id="reset">重置</button></div></div>
<div class="readout" id="readout"></div><div class="card formula"><div class="title">公式绑定</div><div>需要向心力：F_n = mv²/r。</div><div>水平弯道最大静摩擦：f_max = μmg，临界速度 v_max=√(μgr)。</div></div><div class="status" id="status"></div>
</div></div>
<script>
(function(){'use strict';const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');const el={speed:id('speed'),radius:id('radius'),mu:id('mu'),vLab:id('vLab'),rLab:id('rLab'),muLab:id('muLab'),readout:id('readout'),status:id('status'),play:id('play')};const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};const state={playing:false,t:0,drag:null};function id(s){return document.getElementById(s)}function vals(){const v=+el.speed.value,r=+el.radius.value,mu=+el.mu.value,g=10,need=v*v/r,limit=mu*g,vmax=Math.sqrt(mu*g*r);return{v,r,mu,g,need,limit,vmax,slip:need>limit}}function fmt(n,d=1){return n.toFixed(d)}function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
function drawScene(x){box(42,72,810,286,'#fff');text('弯道/转盘俯视：离心不是多出一个离心力，而是向心力不足',447,100,colors.ink,'center',16,'900');const cx=302,cy=224,rr=x.r*2.2;ctx.strokeStyle='#d9e2ec';ctx.lineWidth=24;ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=colors.muted;ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();const a=state.t*(x.v/12),px=cx+rr*Math.cos(a),py=cy+rr*Math.sin(a);const out=18+Math.max(0,x.need-x.limit)*20;const carX=x.slip?px+out*Math.cos(a):px,carY=x.slip?py+out*Math.sin(a):py;ctx.fillStyle=x.slip?colors.red:colors.blue;ctx.beginPath();ctx.roundRect(carX-18,carY-10,36,20,4);ctx.fill();arrow(carX,carY,cx,cy,colors.green,4);arrow(carX,carY,carX-58*Math.sin(a),carY+58*Math.cos(a),colors.gold,4);if(x.slip)arrow(px,py,carX+52*Math.cos(a),carY+52*Math.sin(a),colors.red,4);text('向心方向',cx+(carX-cx)*.55,cy+(carY-cy)*.55-14,colors.green,'center',12,'900');text('切线速度',carX-45*Math.sin(a),carY+45*Math.cos(a)-18,colors.gold,'center',12,'900');text(x.slip?'打滑：沿切线/外侧偏离':'不打滑：摩擦足够提供向心力',610,160,x.slip?colors.red:colors.green,'center',15,'900');box(498,190,260,96,'#fbfdff');text('力的比较',628,214,colors.ink,'center',14,'900');line(548,252,548+Math.min(180,x.need/x.limit*120),252,colors.red,12);line(548,276,548+120,276,colors.green,12);text('mv²/r',520,252,colors.red,'right',12,'900');text('μg',520,276,colors.green,'right',12,'900')}
function drawGraph(x){box(42,388,810,144,'#fff');text('速度-临界图像：v 超过 v_max 就会离心偏离',447,414,colors.ink,'center',15,'900');const gx=108,gy=500,gw=650,gh=70;line(gx,gy,gx+gw,gy,colors.ink,2);line(gx,gy,gx,gy-gh,colors.ink,2);const vx=gx+x.v/32*gw,vc=gx+x.vmax/32*gw;line(vc,gy,vc,gy-gh,colors.green,3,[5,5]);text('vmax',vc,gy-gh-12,colors.green,'center',12,'900');ctx.fillStyle=x.slip?colors.red:colors.blue;ctx.beginPath();ctx.arc(vx,gy-gh*.55,8,0,Math.PI*2);ctx.fill();text('当前v',vx,gy-gh*.55-18,x.slip?colors.red:colors.blue,'center',12,'900')}
function update(x){el.vLab.textContent=fmt(x.v,0)+' m/s';el.rLab.textContent=fmt(x.r,0)+' m';el.muLab.textContent=fmt(x.mu,2);el.readout.innerHTML='所需向心加速度：<b>'+fmt(x.need,2)+' m/s²</b><br>最大摩擦加速度：<b>'+fmt(x.limit,2)+' m/s²</b><br>临界速度：<b>'+fmt(x.vmax,1)+' m/s</b><br>状态：<b>'+(x.slip?'离心偏离':'安全转弯')+'</b>';el.status.textContent=x.slip?'向心力不足，物体并非受离心力，而是不能继续沿圆周弯过去。':'最大静摩擦足以提供向心力，物体能沿圆周运动。'}
function draw(){const x=vals();ctx.clearRect(0,0,900,600);const bg=ctx.createLinearGradient(0,0,0,600);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,600);text('B2-25 离心现象实验台：弯道俯视 + 力箭头 + 临界速度图像',450,34,colors.ink,'center',18,'900');drawScene(x);drawGraph(x);update(x)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}canvas.addEventListener('pointerdown',e=>{state.drag='speed';canvas.setPointerCapture(e.pointerId);move(e)});canvas.addEventListener('pointermove',move);function move(e){if(!state.drag)return;const p=pos(e);el.speed.value=Math.max(2,Math.min(32,Math.round((p.x-100)/20)));draw();e.preventDefault()}canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);[el.speed,el.radius,el.mu].forEach(x=>x.addEventListener('input',draw));el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};id('reset').onclick=()=>{el.speed.value=12;el.radius.value=40;el.mu.value=.4;state.t=0;draw()};function loop(){if(state.playing)state.t+=.035;draw();requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
id('reset').onclick=()=>{el.speed.value=12;el.radius.value=40;el.mu.value=.4;state.playing=false;state.t=0;el.play.textContent='播放';draw()};
})();
</script>
<script>
window.B2_GUIDE={id:'B2-25',question:'弯道半径和摩擦条件不变，车速显著增大后为什么会沿切线偏离？',observe:'在惯性系中只分析真实力。把速度从12 m/s提高到32 m/s，比较所需向心作用和最大静摩擦。',options:[{value:'insufficient',label:'所需向心力超过最大静摩擦，约束不足'},{value:'outward',label:'出现了一个真实的向外离心力'},{value:'gravity',label:'重力突然消失'}],correct:'insufficient',actions:[{selector:'#speed',value:'32'}],result:'所需向心力超过最大静摩擦，车辆不能继续沿原圆弧转弯。',evidence:'mv²/r对应的需求超过μmg上限，状态切换为沿原速度切线偏离。',explanation:'惯性系中没有额外真实离心力；物体保持原运动趋势，是向内约束不足。',transfer:'水平弯道临界题比较mv²/r与最大静摩擦，并说明离心力只可作为旋转参考系中的惯性力。'};
</script><script src="guided-lesson.js"></script>
</body>
</html>
