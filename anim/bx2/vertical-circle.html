<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆周临界模型实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#edf3f8;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:10px;padding:10px;min-height:760px}
  .stage{background:#fff;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}
  .panel{display:flex;flex-direction:column;gap:8px}
  .card{background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:9px}
  .task{border-left:4px solid #f59e0b;background:#fff7ed;color:#475569;font-size:12px;line-height:1.45}
  .title{font-weight:800;margin-bottom:5px;color:#0f172a}
  .chips,.mode{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{border:1px solid #94a3b8;background:#fff;border-radius:7px;min-height:31px;cursor:pointer;color:#102a43;font-weight:700}
  button.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .readout{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .meter{background:#0f172a;color:#dbeafe;border-radius:7px;padding:7px;min-height:50px}
  .meter span{display:block;font-size:11px;color:#b6c5d8}
  .meter b{display:block;margin-top:2px;color:#fbbf24;font-size:15px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .formula{display:grid;gap:5px;font-size:12px;color:#334155}
  .formula div{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed #d7dee8;padding-bottom:4px}
  .formula div:last-child{border-bottom:0;padding-bottom:0}
  .formula b{white-space:nowrap;color:#0f172a}
  .small{font-size:12px;line-height:1.5;color:#475569}
  .status{border:1px solid #14b8a6;background:#ecfdf5;color:#0f766e;border-radius:8px;padding:8px;font-size:12px;font-weight:800;line-height:1.45}
  .status.warn{border-color:#f59e0b;background:#fff7ed;color:#b45309}
  @media(max-width:820px){.root{grid-template-columns:1fr}.readout{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="960" height="760" aria-label="圆周临界模型交互实验台"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖 `position_angle` 到最高点，比较绳/杆；再拖 `v` 和 `g`，看约束力何时为 0。磁场迁移看 `r=mv/qB`。</div>
    <div class="chips"><button id="playBtn">播放</button><button id="resetBtn">重置</button></div>
    <div class="card">
      <div class="title">type_rope_or_rod</div>
      <div class="mode"><button id="ropeBtn" class="active">绳模型</button><button id="rodBtn">杆/圆管模型</button></div>
    </div>
    <div class="card">
      <div class="title">快速情境</div>
      <div class="chips">
        <button data-case="critical">最高点临界</button>
        <button data-case="fast">速度更大</button>
        <button data-case="slow">杆低速过顶</button>
        <button data-case="bridge">拱桥顶端</button>
      </div>
    </div>
    <div class="card">
      <div class="title">实时读数</div>
      <div class="readout">
        <div class="meter"><span>ΣF径 / mv²/r</span><b id="radialText">5.0 / 5.0 N</b></div>
        <div class="meter"><span>约束力</span><b id="forceText">0.0 N</b></div>
        <div class="meter"><span>v_min / 最低点N</span><b id="critText">3.1 / 29.8</b></div>
        <div class="meter"><span>磁场半径</span><b id="magText">r=mv/qB</b></div>
      </div>
    </div>
    <div class="card formula">
      <div><span>径向方程</span><b>ΣF径=mv²/r</b></div>
      <div><span>绳最高点</span><b>v_min=√(gr)</b></div>
      <div><span>最低点</span><b>N-mg=mv²/r</b></div>
      <div><span>磁场迁移</span><b>r=mv/qB</b></div>
    </div>
    <div class="card small"><b>三视图：</b>左侧是侧视圆周轨道；右侧是受力图和临界图像记录；底部可拖 `m,r,v,g,position_angle`。</div>
    <div class="status" id="status">先找圆心方向，再沿径向列方程。</div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const state={m:.5,r:1,v:3.13,g:9.8,type:'rope',angle:0,running:false,drag:null};
  const els={radial:document.getElementById('radialText'),force:document.getElementById('forceText'),crit:document.getElementById('critText'),mag:document.getElementById('magText'),status:document.getElementById('status'),play:document.getElementById('playBtn'),rope:document.getElementById('ropeBtn'),rod:document.getElementById('rodBtn')};
  const colors={red:'#dc2626',blue:'#2563eb',purple:'#7c3aed',green:'#0f766e',orange:'#f59e0b',cyan:'#0891b2',ink:'#102a43',muted:'#64748b'};
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
  const fmt=(v,d=2)=>Number.isFinite(v)?(Math.abs(v)<1e-9?0:v).toFixed(d):'--';
  function values(){
    const radNeed=state.m*state.v*state.v/state.r;
    const mgIn=state.m*state.g*Math.cos(state.angle);
    const constraint=radNeed-mgIn;
    const topCrit=Math.sqrt(state.g*state.r);
    const bottomN=state.m*(state.g+state.v*state.v/state.r);
    const canTrack=state.type==='rod'||constraint>=-1e-9||Math.abs(state.angle)>0.08;
    const magR=state.m*state.v/1;
    return{radNeed,mgIn,constraint,topCrit,bottomN,canTrack,magR};
  }
  function text(s,x,y,c=colors.ink,a='center',size=13,weight='700'){ctx.fillStyle=c;ctx.font=`${weight} ${size}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c='#94a3b8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=3){if(Math.hypot(x2-x1,y2-y1)<2)return;const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-13*Math.cos(a-.42),y2-13*Math.sin(a-.42));ctx.lineTo(x2-13*Math.cos(a+.42),y2-13*Math.sin(a+.42));ctx.closePath();ctx.fill();ctx.restore()}
  function box(x,y,w,h,r,fill,stroke='#cbd5e1'){ctx.save();ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke()}ctx.restore()}
  function circleGeom(){const O={x:298,y:292},R=clamp(state.r*126,58,196);return{O,R}}
  function massPoint(g){return{x:g.O.x+g.R*Math.sin(state.angle),y:g.O.y-g.R*Math.cos(state.angle)}}
  function drawTrack(vs){
    box(34,56,552,480,8,'#fff','#d7dee8');text('侧视圆周轨道：position_angle 可拖',310,84,'#0f172a','center',16,'900');
    const g=circleGeom(),O=g.O,R=g.R,p=massPoint(g),inward={x:O.x-p.x,y:O.y-p.y},len=Math.hypot(inward.x,inward.y),ux=inward.x/len,uy=inward.y/len,tx=uy,ty=-ux;
    ctx.save();ctx.strokeStyle=state.type==='rope'?'#94a3b8':'#334155';ctx.lineWidth=state.type==='rope'?2:5;if(state.type==='rope')ctx.setLineDash([7,5]);ctx.beginPath();ctx.arc(O.x,O.y,R,0,Math.PI*2);ctx.stroke();ctx.restore();
    line(O.x,O.y,p.x,p.y,'#d7dee8',2);
    arrow(p.x,p.y,p.x+tx*70,p.y+ty*70,colors.green,3);text('v 切线',p.x+tx*90,p.y+ty*90,colors.green,'center',12,'900');
    arrow(p.x,p.y,p.x,p.y+64,colors.red,3);text('mg',p.x+20,p.y+50,colors.red,'left',12,'900');
    if(vs.constraint>=0){arrow(p.x,p.y,p.x+ux*clamp(vs.constraint*12,28,110),p.y+uy*clamp(vs.constraint*12,28,110),colors.purple,3);text(state.type==='rope'?'T/N 指向圆心':'N 指向圆心',p.x+ux*100,p.y+uy*100,colors.purple,'center',12,'900')}
    else if(state.type==='rod'){arrow(p.x,p.y,p.x-ux*clamp(Math.abs(vs.constraint)*12,28,110),p.y-uy*clamp(Math.abs(vs.constraint)*12,28,110),colors.orange,3);text('杆向外托/推',p.x-ux*100,p.y-uy*100,colors.orange,'center',12,'900')}
    else{text('绳松弛',p.x,p.y-28,colors.orange,'center',14,'900')}
    ctx.fillStyle=vs.canTrack?colors.blue:colors.orange;ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#102a43';ctx.stroke();
    const top={x:O.x,y:O.y-R};arrow(top.x,top.y,top.x+54+state.v*14,top.y,colors.blue,4);text(`v=${fmt(state.v,1)}m/s`,top.x+72+state.v*14,top.y-12,colors.blue,'left',12,'900');
    const right={x:O.x+R,y:O.y};line(O.x,O.y,right.x,right.y,colors.orange,3);handle(right.x,right.y,'r',state.drag==='radiusDirect',colors.orange);
    text(`θ=${fmt(state.angle*180/Math.PI,0)}°（从最高点计）`,310,512,colors.muted,'center',13,'900');
  }
  function handle(x,y,label,active,c){ctx.save();ctx.fillStyle=active?'#fde68a':'#fff';ctx.strokeStyle=active?'#b45309':c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();text(label,x,y-22,active?'#92400e':c,'center',12,'900')}
  function drawForcePanel(vs){
    box(612,70,298,198,8,'#fff','#d7dee8');text('瞬时受力图：只画真实力',761,94,'#0f172a','center',14,'900');
    const x=760,y=146;ctx.fillStyle=colors.blue;ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#102a43';ctx.stroke();
    arrow(x,y,x,y+58,colors.red,3);text('mg',x+22,y+44,colors.red,'left',12,'900');
    arrow(x,y,x,y+clamp(vs.radNeed*16,36,96),colors.cyan,2);text('需要ΣF径',x+54,y+68,colors.cyan,'left',12,'900');
    if(vs.constraint>=0)arrow(x-30,y,x-30,y+clamp(vs.constraint*16,28,90),colors.purple,3);
    else arrow(x-30,y,x-30,y-clamp(Math.abs(vs.constraint)*16,28,90),colors.orange,3);
    text(`约束=${fmt(vs.constraint,2)}N`,760,238,vs.constraint>=0?colors.purple:colors.orange,'center',13,'900');
    box(612,294,298,152,8,'#f8fafc','#d7dee8');text('临界图像记录',761,318,'#0f172a','center',14,'900');
    line(650,394,880,394,'#94a3b8',2);line(650,394,650,346,'#94a3b8',2);
    const critX=650+230*vs.topCrit/8,lineX=650+230*state.v/8;
    line(critX,346,critX,402,colors.orange,2,[5,4]);text('√gr',critX,416,colors.orange,'center',11,'900');
    line(650,370,lineX,370,state.v>=vs.topCrit?colors.green:colors.red,8);
    text(`v_top ${state.v>=vs.topCrit?'≥':'<'} √gr`,765,364,state.v>=vs.topCrit?colors.green:colors.red,'center',13,'900');
  }
  function drawMagneticPanel(vs){
    box(612,470,298,76,8,'#fff','#d7dee8');
    text('磁场圆周迁移：r=mv/qB',761,492,'#0f172a','center',14,'900');
    text(`若 qB=1，当前 r磁=${fmt(vs.magR,2)} m`,760,522,colors.cyan,'center',13,'900');
  }
  function ruler(x1,y,x2,label,c,hx,txt,active){
    line(x1,y,x2,y,'#0f172a',2);for(let i=0;i<=5;i++){const x=x1+(x2-x1)*i/5;line(x,y-5,x,y+5,'#0f172a',1)}text(label,(x1+x2)/2,y-18,c,'center',12,'900');handle(hx,y,txt,active,c);
  }
  function geometry(){
    return{
      m:{x:58+(state.m-.2)/1.8*150,y:646},
      r:{x:238+(state.r-.3)/1.7*150,y:646},
      v:{x:418+state.v/8*150,y:646},
      g:{x:598+(state.g-2)/13*150,y:646},
      angle:{x:778+state.angle/(Math.PI*2)*150,y:646}
    };
  }
  function drawControls(vs,g0){
    box(34,610,876,104,8,'#fff','#d7dee8');
    text('拖动 m、r、v、g、position_angle；切换 type_rope_or_rod 看约束力能否取负',386,628,colors.orange,'center',12,'900');
    ruler(58,646,208,'m',colors.purple,g0.m,`m=${fmt(state.m,1)}kg`,state.drag==='m');
    ruler(238,646,388,'r',colors.orange,g0.r,`r=${fmt(state.r,1)}m`,state.drag==='r');
    ruler(418,646,568,'v',colors.blue,g0.v,`v=${fmt(state.v,1)}m/s`,state.drag==='v');
    ruler(598,646,748,'g',colors.green,g0.g,`g=${fmt(state.g,1)}`,state.drag==='g');
    ruler(778,646,928,'position_angle',colors.cyan,g0.angle,`${fmt(state.angle*180/Math.PI,0)}°`,state.drag==='angle');
  }
  function update(vs){
    els.radial.textContent=`${fmt(vs.mgIn+vs.constraint,2)} / ${fmt(vs.radNeed,2)} N`;
    els.force.textContent=`${fmt(vs.constraint,2)} N`;
    els.crit.textContent=`${fmt(vs.topCrit,2)} / ${fmt(vs.bottomN,1)} N`;
    els.mag.textContent=`${fmt(vs.magR,2)} m`;
    els.rope.classList.toggle('active',state.type==='rope');els.rod.classList.toggle('active',state.type==='rod');
    const warn=state.type==='rope'&&Math.abs(state.angle)<0.08&&vs.constraint<0;
    els.status.className='status'+(warn?' warn':'');
    els.status.textContent=warn?'绳最高点速度不足：约束力需要为负，绳会松弛。':state.type==='rod'&&vs.constraint<0?'杆/圆管可提供向外约束，低速过顶不必套 √gr。':'径向合力满足 mv²/r，按当前位置的圆心方向列式。';
    els.play.textContent=state.running?'暂停':'播放';
  }
  function draw(){
    const vs=values(),g0=geometry();
    ctx.clearRect(0,0,960,760);
    const bg=ctx.createLinearGradient(0,0,0,760);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#eaf0f7');ctx.fillStyle=bg;ctx.fillRect(0,0,960,760);
    text('圆周临界模型实验台：找圆心方向，约束力为 0 就是临界',480,28,'#0f172a','center',20,'900');
    drawTrack(vs);drawForcePanel(vs);drawMagneticPanel(vs);drawControls(vs,g0);update(vs);
  }
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
  function near(p,h,rad=25){return Math.hypot(p.x-h.x,p.y-h.y)<=rad}
  function down(e){
    state.running=false;const p=pos(e),g0=geometry(),cg=circleGeom(),right={x:cg.O.x+cg.R,y:cg.O.y};state.drag=null;
    if(near(p,right,28))state.drag='radiusDirect';
    else{for(const key of ['m','r','v','g','angle']){if(near(p,g0[key],24)){state.drag=key;break}}}
    if(state.drag){canvas.setPointerCapture(e.pointerId);move(e)}
  }
  function move(e){
    if(!state.drag)return;const p=pos(e),cg=circleGeom();
    if(state.drag==='m')state.m=clamp(.2+(p.x-58)/150*1.8,.2,2);
    if(state.drag==='r')state.r=clamp(.3+(p.x-238)/150*1.7,.3,2);
    if(state.drag==='v')state.v=clamp((p.x-418)/150*8,0,8);
    if(state.drag==='g')state.g=clamp(2+(p.x-598)/150*13,2,15);
    if(state.drag==='angle')state.angle=clamp((p.x-778)/150*Math.PI*2,0,Math.PI*2);
    if(state.drag==='radiusDirect')state.r=clamp((p.x-cg.O.x)/126,.3,2);
    draw();
  }
  function up(e){if(state.drag){state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}draw()}}
  canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);
  els.rope.addEventListener('click',()=>{state.type='rope';draw()});els.rod.addEventListener('click',()=>{state.type='rod';draw()});
  els.play.addEventListener('click',()=>{state.running=!state.running;draw()});
  document.getElementById('resetBtn').addEventListener('click',()=>{Object.assign(state,{m:.5,r:1,v:Math.sqrt(9.8),g:9.8,type:'rope',angle:0,running:false});draw()});
  document.querySelectorAll('[data-case]').forEach(btn=>btn.addEventListener('click',()=>{const c=btn.dataset.case;if(c==='critical'){state.r=1;state.g=9.8;state.v=Math.sqrt(state.g*state.r);state.type='rope';state.angle=0}if(c==='fast'){state.r=1;state.g=9.8;state.v=4.8;state.type='rope';state.angle=0}if(c==='slow'){state.r=1;state.g=9.8;state.v=1.2;state.type='rod';state.angle=0}if(c==='bridge'){state.r=1.5;state.g=9.8;state.v=2.6;state.type='rod';state.angle=0}draw()}));
  function tick(){if(state.running){state.angle=(state.angle+Math.max(.35,state.v/state.r)*.014)%(Math.PI*2)}draw();requestAnimationFrame(tick)}
  draw();requestAnimationFrame(tick);
})();
</script>
</body>
</html>
