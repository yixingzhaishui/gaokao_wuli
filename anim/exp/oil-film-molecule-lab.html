<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>油膜法估测分子大小实验台</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 14px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; }
  canvas { width: 100%; height: 560px; display: block; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; touch-action: none; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { flex: 1; border: 1px solid #bcccdc; background: #f0f4f8; color: #102a43; border-radius: 8px; padding: 9px 10px; font-weight: 700; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 13px; font-weight: 700; margin: 11px 0 4px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 10px; background: #eef4ff; border-radius: 8px; line-height: 1.6; font-size: 13px; }
  table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 5px 4px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.55; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 500px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="790" height="560" aria-label="油膜法实验台：俯视水槽、方格图像、单分子层剖面和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="resetBtn" type="button">重置</button>
        <button id="recordBtn" type="button">记录</button>
      </div>
      <label for="ratio">稀释倍数 1/：<span id="ratioVal"></span></label>
      <input id="ratio" type="range" min="300" max="800" value="500" step="50">
      <label for="drops">滴数 n：<span id="dropsVal"></span></label>
      <input id="drops" type="range" min="1" max="5" value="1" step="1">
      <label for="dropVolume">每滴体积/mL：<span id="dropVolumeVal"></span></label>
      <input id="dropVolume" type="range" min="0.03" max="0.08" value="0.05" step="0.01">
      <label for="filmArea">油膜面积/(10³cm²)：<span id="filmAreaVal"></span></label>
      <input id="filmArea" type="range" min="2.0" max="10.0" value="5.0" step="0.1">
      <label for="areaError">面积计数误差/%：<span id="areaErrorVal"></span></label>
      <input id="areaError" type="range" min="-12" max="12" value="2" step="1">
      <div id="readout" class="readout"></div>
      <table aria-label="数据记录表">
        <thead><tr><th>记录</th><th>S/m²</th><th>d/10⁻¹⁰m</th><th>判定</th></tr></thead>
        <tbody id="records"></tbody>
      </table>
      <div class="hint">观察任务：先播放看液滴铺展成单分子油膜；再拖动蓝色油膜边界和紫色滴管，看 S、V、d=V/S 如何同时变。</div>
    </section>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn'),
  recordBtn: document.getElementById('recordBtn'),
  ratio: document.getElementById('ratio'),
  drops: document.getElementById('drops'),
  dropVolume: document.getElementById('dropVolume'),
  filmArea: document.getElementById('filmArea'),
  areaError: document.getElementById('areaError'),
  ratioVal: document.getElementById('ratioVal'),
  dropsVal: document.getElementById('dropsVal'),
  dropVolumeVal: document.getElementById('dropVolumeVal'),
  filmAreaVal: document.getElementById('filmAreaVal'),
  areaErrorVal: document.getElementById('areaErrorVal'),
  readout: document.getElementById('readout'),
  records: document.getElementById('records')
};
const state = { running: false, time: 2.6, last: 0, drag: null, records: [] };
const D0 = 2.0e-10;

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function val(id) { return Number(els[id].value); }
function setValues(next) {
  if (next.ratio !== undefined) els.ratio.value = Math.round(clamp(next.ratio, 300, 800) / 50) * 50;
  if (next.drops !== undefined) els.drops.value = Math.round(clamp(next.drops, 1, 5));
  if (next.dropVolume !== undefined) els.dropVolume.value = clamp(next.dropVolume, 0.03, 0.08).toFixed(2);
  if (next.filmArea !== undefined) els.filmArea.value = clamp(next.filmArea, 2, 10).toFixed(1);
  if (next.areaError !== undefined) els.areaError.value = Math.round(clamp(next.areaError, -12, 12));
}
function model() {
  const ratio = val('ratio');
  const drops = val('drops');
  const dropMl = val('dropVolume');
  const areaUnit = val('filmArea');
  const err = val('areaError') / 100;
  const pureMl = drops * dropMl / ratio;
  const pureM3 = pureMl * 1e-6;
  const trueArea = pureM3 / D0;
  const tracedArea = areaUnit * 1000 * 1e-4;
  const measuredArea = tracedArea * (1 + err);
  const d = pureM3 / measuredArea;
  const trueD = D0;
  const rel = Math.abs(d - trueD) / trueD * 100;
  const ok = d > 0.8e-10 && d < 8e-10 && rel < 10;
  return { ratio, drops, dropMl, areaUnit, err, pureMl, pureM3, trueArea, tracedArea, measuredArea, d, trueD, rel, ok };
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function box(x, y, w, h, fill, stroke = '#d9e2ec') {
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, 9);
  ctx.fill();
  ctx.stroke();
}
function text(s, x, y, color = '#102a43', size = 13, weight = '400', align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(s, x, y);
}
function arrow(x1, y1, x2, y2, color, width = 3) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(a - 0.45), y2 - 10 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 10 * Math.cos(a + 0.45), y2 - 10 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function filmRadius(q) { return Math.sqrt(q.tracedArea / 0.5) * 116; }
function handles(q) {
  const r = filmRadius(q);
  return [
    { name: 'filmArea', x: 260 + r, y: 226, r: 14 },
    { name: 'dropVolume', x: 122, y: 86 - q.dropMl * 450, r: 13 },
    { name: 'areaError', x: 548 + (val('areaError') + 12) * 4.8, y: 286, r: 13 }
  ];
}
function drawGrid(x0, y0, w, h) {
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 1;
  for (let x = x0; x <= x0 + w; x += 25) { ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + h); ctx.stroke(); }
  for (let y = y0; y <= y0 + h; y += 25) { ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + w, y); ctx.stroke(); }
}
function drawFilm(q, progress) {
  box(36, 86, 448, 292, '#fff', '#d9e2ec');
  text('俯视水槽：方格纸估算油膜面积 S', 260, 110, '#102a43', 14, '700');
  drawGrid(70, 132, 380, 210);
  const r = filmRadius(q) * progress;
  ctx.fillStyle = 'rgba(44,123,229,.16)';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 80; i++) {
    const a = Math.PI * 2 * i / 80;
    const wobble = 1 + 0.08 * Math.sin(5 * a) + 0.05 * Math.cos(9 * a);
    const x = 260 + Math.cos(a) * r * wobble;
    const y = 226 + Math.sin(a) * r * 0.66 * wobble;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  text('单分子油膜', 260, 226, '#2c7be5', 14, '700');
  const dropY = 62 + Math.min(1, state.time / 0.9) * 72;
  ctx.strokeStyle = '#7b2cbf';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(122, 48); ctx.lineTo(122, 86); ctx.stroke();
  ctx.fillStyle = '#7b2cbf';
  ctx.beginPath(); ctx.arc(122, dropY, 10 + q.dropMl * 72, 0, Math.PI * 2); ctx.fill();
  text('滴管', 122, 36, '#7b2cbf', 12, '700');
  arrow(145, 100, 210, 166, '#7b2cbf', 3);
  for (const h of handles(q)) {
    ctx.fillStyle = h.name === 'filmArea' ? '#2c7be5' : h.name === 'dropVolume' ? '#7b2cbf' : '#f0a500';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
    text(h.name === 'filmArea' ? 'S' : h.name === 'dropVolume' ? 'V' : 'e', h.x, h.y + 1, '#fff', 11, '700');
  }
  text(`方格读数 S=${q.measuredArea.toFixed(3)} m²`, 260, 360, '#486581', 13, '700');
}
function drawSection(q) {
  box(520, 86, 224, 180, '#f7f9fc', '#d9e2ec');
  text('剖面视图：单分子层', 632, 110, '#102a43', 14, '700');
  ctx.fillStyle = '#e6f4ff';
  ctx.fillRect(550, 206, 164, 22);
  ctx.strokeStyle = '#2c7be5';
  ctx.strokeRect(550, 206, 164, 22);
  const count = 15;
  for (let i = 0; i < count; i++) {
    const x = 560 + i * 10;
    ctx.fillStyle = i % 2 ? '#38b2ac' : '#2c7be5';
    ctx.beginPath(); ctx.arc(x, 196, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#486581';
    ctx.beginPath(); ctx.moveTo(x, 196); ctx.lineTo(x, 206); ctx.stroke();
  }
  arrow(724, 196, 724, 206, '#d64545', 2);
  text('d', 734, 201, '#d64545', 13, '700');
  text(`d≈${(q.d * 1e10).toFixed(2)}×10⁻¹⁰ m`, 632, 246, '#d64545', 14, '700');
  text('厚度不是水深，而是油酸层厚度', 632, 136, '#486581', 12, '700');
}
function drawErrorBar(q) {
  box(520, 278, 224, 78, '#fff7e6', '#f0a500');
  text('面积计数误差', 632, 300, '#102a43', 14, '700');
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(548, 286); ctx.lineTo(664, 286); ctx.stroke();
  text(`${(q.err * 100).toFixed(0)}%`, 632, 332, '#9a6700', 16, '700');
  text('数格偏大 -> d 偏小', 632, 350, '#486581', 11, '700');
}
function drawFormula(q) {
  box(54, 408, 690, 112, '#f7f9fc', '#d9e2ec');
  text('数据记录与公式绑定', 399, 428, '#102a43', 14, '700');
  text(`纯油酸体积 V = nV滴/稀释倍数 = ${q.pureM3.toExponential(2)} m³`, 78, 456, '#486581', 13, '700', 'left');
  text(`油膜面积 S = ${q.measuredArea.toFixed(3)} m²`, 78, 484, '#486581', 13, '700', 'left');
  text(`分子直径 d = V/S = ${q.d.toExponential(2)} m = ${(q.d * 1e10).toFixed(2)}×10⁻¹⁰ m`, 78, 512, '#102a43', 13, '700', 'left');
  text(q.ok ? '状态判定：能用，结果在 10⁻¹⁰m 量级且数格误差可接受' : '状态判定：需重做，检查面积、稀释倍数或滴数', 420, 512, q.ok ? '#087f5b' : '#b30000', 12, '700', 'left');
}
function draw() {
  const q = model();
  const progress = state.running ? clamp((state.time - 0.55) / 1.75, 0, 1) : 1;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(1, '#f0f7ff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  text('油膜法估测分子大小：把纯油酸铺成单分子层', 395, 34, '#102a43', 18, '700');
  text('俯视水槽 + 方格图像 + 剖面视图 + 数据记录：用 S 和 V 读出 d=V/S。', 395, 62, '#486581', 13);
  drawFilm(q, progress);
  drawSection(q);
  drawErrorBar(q);
  drawFormula(q);

  els.ratioVal.textContent = q.ratio.toFixed(0);
  els.dropsVal.textContent = q.drops.toFixed(0);
  els.dropVolumeVal.textContent = q.dropMl.toFixed(2);
  els.filmAreaVal.textContent = q.areaUnit.toFixed(1);
  els.areaErrorVal.textContent = (q.err * 100).toFixed(0);
  els.playBtn.textContent = state.running ? '暂停' : '播放';
  els.readout.innerHTML = [
    `V=nV滴/稀释倍数=<b>${q.pureM3.toExponential(2)}m³</b>`,
    `S=<b>${q.measuredArea.toFixed(3)}m²</b>`,
    `d=V/S=<b>${q.d.toExponential(2)}m</b>`,
    `换算：<b>${(q.d * 1e10).toFixed(2)}×10⁻¹⁰m</b>，误差≈<b>${q.rel.toFixed(1)}%</b>`,
    q.ok ? '判定=<b>能用</b>' : '判定=<b>需重做</b>'
  ].join('<br>');
  window.__EXP_TEST_STATE__={D0,trueD:q.trueD,pureM3:q.pureM3,trueArea:q.trueArea,tracedArea:q.tracedArea,measuredArea:q.measuredArea,d:q.d,rel:q.rel};
}
function loop(now) {
  if (!state.last) state.last = now;
  const dt = Math.min(0.04, (now - state.last) / 1000);
  state.last = now;
  if (state.running) {
    state.time += dt;
    if (state.time > 2.6) {
      state.time = 2.6;
      state.running = false;
    }
  }
  draw();
  requestAnimationFrame(loop);
}
function pos(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * canvas.width / rect.width,
    y: (evt.clientY - rect.top) * canvas.height / rect.height
  };
}
function hit(p) {
  return handles(model()).find(h => Math.hypot(p.x - h.x, p.y - h.y) <= h.r + 8);
}
canvas.addEventListener('pointerdown', evt => {
  const h = hit(pos(evt));
  if (h) {
    state.drag = h.name;
    canvas.setPointerCapture(evt.pointerId);
  }
});
canvas.addEventListener('pointermove', evt => {
  const p = pos(evt);
  if (!state.drag) {
    canvas.style.cursor = hit(p) ? 'grab' : 'default';
    return;
  }
  if (state.drag === 'filmArea') {
    const r = Math.max(45, Math.abs(p.x - 260));
    const areaM2 = Math.pow(r / 116, 2) * 0.5;
    setValues({ filmArea: areaM2 / 0.1 });
  }
  if (state.drag === 'dropVolume') setValues({ dropVolume: (86 - p.y) / 450 });
  if (state.drag === 'areaError') setValues({ areaError: (p.x - 548) / 4.8 - 12 });
  draw();
});
canvas.addEventListener('pointerup', evt => {
  state.drag = null;
  try { canvas.releasePointerCapture(evt.pointerId); } catch (e) {}
});
canvas.addEventListener('pointercancel', () => { state.drag = null; });
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  state.last = 0;
  if (state.time >= 2.6) state.time = 0;
  draw();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 2.6;
  state.records = [];
  setValues({ ratio: 500, drops: 1, dropVolume: 0.05, filmArea: 5, areaError: 2 });
  renderRecords();
  draw();
});
els.recordBtn.addEventListener('click', () => {
  const q = model();
  state.records.unshift({ S: q.measuredArea, d: q.d, ok: q.ok });
  state.records = state.records.slice(0, 4);
  renderRecords();
});
function renderRecords() {
  els.records.innerHTML = state.records.map((r, idx) =>
    `<tr><td>${idx + 1}</td><td>${r.S.toFixed(3)}</td><td>${(r.d * 1e10).toFixed(2)}</td><td>${r.ok ? '能用' : '重做'}</td></tr>`
  ).join('');
}
for (const id of ['ratio', 'drops', 'dropVolume', 'filmArea', 'areaError']) els[id].addEventListener('input', draw);
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-experiment.js"></script>
</body>
</html>
