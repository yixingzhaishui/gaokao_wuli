<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>验证平行四边形定则实验台</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 14px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; }
  canvas { width: 100%; height: 560px; display: block; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; touch-action: none; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { flex: 1; border: 1px solid #bcccdc; background: #f0f4f8; color: #102a43; border-radius: 8px; padding: 9px 10px; font-weight: 700; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 13px; font-weight: 700; margin: 11px 0 4px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 10px; background: #eef4ff; border-radius: 8px; line-height: 1.65; font-size: 13px; }
  table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 5px 4px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.55; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 500px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="790" height="560" aria-label="验证平行四边形定则实验台：俯视木板、弹簧测力计、作图图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="resetBtn" type="button">重置</button>
        <button id="recordBtn" type="button">记录</button>
      </div>
      <label for="f1">F1/N：<span id="f1Val"></span></label>
      <input id="f1" type="range" min="1" max="8" value="4" step="0.1">
      <label for="f2">F2/N：<span id="f2Val"></span></label>
      <input id="f2" type="range" min="1" max="8" value="5" step="0.1">
      <label for="theta">夹角 θ/°：<span id="thetaVal"></span></label>
      <input id="theta" type="range" min="15" max="165" value="70" step="1">
      <label for="error">读数/作图误差：<span id="errorVal"></span></label>
      <input id="error" type="range" min="0" max="5" value="1" step="1">
      <div id="readout" class="readout"></div>
      <table aria-label="数据记录表">
        <thead><tr><th>记录</th><th>F作/N</th><th>F实/N</th><th>误差</th></tr></thead>
        <tbody id="records"></tbody>
      </table>
      <div class="hint">观察任务：拖动画面内两只蓝色测力计端点改变分力，播放看“两力拉到 O”和“单力拉到同一 O”两步是否等效。</div>
    </section>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn'),
  recordBtn: document.getElementById('recordBtn'),
  f1: document.getElementById('f1'),
  f2: document.getElementById('f2'),
  theta: document.getElementById('theta'),
  error: document.getElementById('error'),
  f1Val: document.getElementById('f1Val'),
  f2Val: document.getElementById('f2Val'),
  thetaVal: document.getElementById('thetaVal'),
  errorVal: document.getElementById('errorVal'),
  readout: document.getElementById('readout'),
  records: document.getElementById('records')
};
const state = { running: false, time: 0, last: 0, drag: null, records: [] };
const O = { x: 300, y: 238 };
const scale = 32;

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function val(id) { return Number(els[id].value); }
function setValues(next) {
  if (next.F1 !== undefined) els.f1.value = clamp(next.F1, 1, 8).toFixed(1);
  if (next.F2 !== undefined) els.f2.value = clamp(next.F2, 1, 8).toFixed(1);
  if (next.theta !== undefined) els.theta.value = Math.round(clamp(next.theta, 15, 165));
  if (next.error !== undefined) els.error.value = Math.round(clamp(next.error, 0, 5));
}
function model() {
  const F1 = val('f1');
  const F2 = val('f2');
  const theta = val('theta') * Math.PI / 180;
  const error = val('error');
  const a = { x: F1, y: 0 };
  const b = { x: F2 * Math.cos(theta), y: -F2 * Math.sin(theta) };
  const r = { x: a.x + b.x, y: a.y + b.y };
  const R = Math.hypot(r.x, r.y);
  const dir = Math.atan2(-r.y, r.x);
  const expR = R * (1 + error * 0.012);
  const expDir = dir + error * Math.PI / 180 * 1.4;
  const magErr = Math.abs(expR - R) / R * 100;
  const dirErr = Math.abs(expDir - dir) * 180 / Math.PI;
  return { F1, F2, theta, error, a, b, r, R, dir, expR, expDir, magErr, dirErr };
}
function pt(v) { return { x: O.x + v.x * scale, y: O.y + v.y * scale }; }
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function box(x, y, w, h, fill, stroke = '#d9e2ec') {
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, 9);
  ctx.fill();
  ctx.stroke();
}
function text(s, x, y, color = '#102a43', size = 13, weight = '400', align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(s, x, y);
}
function arrow(x1, y1, x2, y2, color, width = 4) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 12 * Math.cos(a - 0.45), y2 - 12 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 12 * Math.cos(a + 0.45), y2 - 12 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function springScale(x1, y1, x2, y2, label, value, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  const len = Math.hypot(x2 - x1, y2 - y1);
  ctx.save();
  ctx.translate(x1, y1);
  ctx.rotate(a);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(len, 0); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#829ab1';
  roundRect(len - 92, -16, 74, 32, 7);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '700 12px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${label} ${value.toFixed(1)}N`, len - 55, 0);
  ctx.restore();
}
function drawProtractor(cx, cy) {
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 74, Math.PI, Math.PI * 2); ctx.stroke();
  for (let d = 0; d <= 180; d += 15) {
    const a = Math.PI - d * Math.PI / 180;
    const r1 = d % 45 === 0 ? 61 : 67;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy - Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * 74, cy - Math.sin(a) * 74);
    ctx.stroke();
  }
  text('量角器读 θ', cx, cy + 20, '#486581', 11, '700');
}
function handles(q) {
  const A = pt(q.a);
  const B = pt(q.b);
  const E = { x: O.x + Math.cos(q.expDir) * q.expR * scale, y: O.y - Math.sin(q.expDir) * q.expR * scale };
  return [
    { name: 'F1', x: A.x, y: A.y, r: 14 },
    { name: 'F2', x: B.x, y: B.y, r: 14 },
    { name: 'Fexp', x: E.x, y: E.y, r: 14 }
  ];
}
function drawBoard(q) {
  const progress = state.running ? (Math.sin(state.time * 2.2) + 1) / 2 : 1;
  const A = pt(q.a), B = pt(q.b), C = pt(q.r);
  const expEnd = { x: O.x + Math.cos(q.expDir) * q.expR * scale, y: O.y - Math.sin(q.expDir) * q.expR * scale };

  box(28, 78, 520, 280, '#fff', '#d9e2ec');
  text('俯视木板：两只弹簧测力计把结点拉到同一 O 点', 288, 101, '#102a43', 14, '700');
  ctx.strokeStyle = '#edf2f7';
  ctx.lineWidth = 1;
  for (let x = 50; x <= 530; x += 24) { ctx.beginPath(); ctx.moveTo(x, 122); ctx.lineTo(x, 340); ctx.stroke(); }
  for (let y = 122; y <= 340; y += 24) { ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(530, y); ctx.stroke(); }
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(82, O.y); ctx.lineTo(O.x, O.y); ctx.stroke();
  text('固定端', 94, O.y - 20, '#486581', 12, '700');
  ctx.fillStyle = '#d64545';
  ctx.beginPath(); ctx.arc(O.x, O.y, 7, 0, Math.PI * 2); ctx.fill();
  text('结点 O', O.x, O.y + 22, '#486581', 12, '700');

  drawProtractor(O.x, O.y);
  ctx.setLineDash([6, 5]);
  ctx.strokeStyle = '#9fb3c8';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(C.x, C.y); ctx.lineTo(B.x, B.y); ctx.stroke();
  ctx.setLineDash([]);

  springScale(O.x, O.y, A.x, A.y, 'F1', q.F1, '#2c7be5');
  springScale(O.x, O.y, B.x, B.y, 'F2', q.F2, '#2c7be5');
  arrow(O.x, O.y, C.x, C.y, '#d64545', 5);
  text('作图合力', C.x + 30, C.y - 20, '#d64545', 12, '700');
  if (progress > 0.45 || !state.running) {
    arrow(O.x, O.y, expEnd.x, expEnd.y, '#f0a500', 4);
    text('实验合力', expEnd.x + 34, expEnd.y + 18, '#9a6700', 12, '700');
  }
  for (const h of handles(q)) {
    ctx.fillStyle = h.name === 'Fexp' ? '#f0a500' : '#2c7be5';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
    text(h.name === 'Fexp' ? 'F' : h.name.slice(1), h.x, h.y + 1, '#fff', 11, '700');
  }
  text(state.running && progress < 0.45 ? '步骤 1：两只测力计共同拉到 O' : '步骤 2：单只测力计拉到同一 O', 288, 334, '#102a43', 13, '700');
}
function drawChart(q) {
  box(580, 78, 170, 280, '#f7f9fc', '#d9e2ec');
  text('图像记录：力矢量', 665, 102, '#102a43', 14, '700');
  const ox = 660, oy = 228, s = 18;
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 1;
  for (let x = 596; x <= 730; x += 18) { ctx.beginPath(); ctx.moveTo(x, 136); ctx.lineTo(x, 322); ctx.stroke(); }
  for (let y = 136; y <= 322; y += 18) { ctx.beginPath(); ctx.moveTo(596, y); ctx.lineTo(730, y); ctx.stroke(); }
  arrow(ox, oy, ox + q.a.x * s, oy + q.a.y * s, '#2c7be5', 3);
  arrow(ox, oy, ox + q.b.x * s, oy + q.b.y * s, '#2c7be5', 3);
  arrow(ox, oy, ox + q.r.x * s, oy + q.r.y * s, '#d64545', 4);
  text(`F作=${q.R.toFixed(2)}N`, 665, 338, '#d64545', 13, '700');
  text(`方向=${(q.dir * 180 / Math.PI).toFixed(1)}°`, 665, 356, '#486581', 12);
}
function drawFormula(q) {
  box(52, 390, 698, 128, '#f7f9fc', '#d9e2ec');
  text('数据记录与公式绑定', 400, 412, '#102a43', 14, '700');
  text(`F作 = √(F1² + F2² + 2F1F2cosθ) = ${q.R.toFixed(2)} N`, 78, 444, '#102a43', 14, '700', 'left');
  text(`F实 = ${q.expR.toFixed(2)} N，方向差 ${q.dirErr.toFixed(1)}°，大小误差 ${q.magErr.toFixed(1)}%`, 78, 476, '#9a6700', 14, '700', 'left');
  const ok = q.magErr < 5 && q.dirErr < 6;
  text(`状态判定：${ok ? '能用，同一 O 点且误差可接受' : '需重做，误差偏大或 O 点未对齐'}`, 78, 504, ok ? '#087f5b' : '#b30000', 13, '700', 'left');
}
function draw() {
  const q = model();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(1, '#f0f7ff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  text('验证平行四边形定则：同一 O 点，比较作图合力与实验合力', 395, 34, '#102a43', 18, '700');
  text('俯视实验台 + 作图图像 + 弹簧测力计读数 + 数据记录；拖动蓝色端点直接改力。', 395, 62, '#486581', 13);
  drawBoard(q);
  drawChart(q);
  drawFormula(q);
  els.f1Val.textContent = q.F1.toFixed(1);
  els.f2Val.textContent = q.F2.toFixed(1);
  els.thetaVal.textContent = (q.theta * 180 / Math.PI).toFixed(0);
  els.errorVal.textContent = q.error.toFixed(0);
  els.playBtn.textContent = state.running ? '暂停' : '播放';
  const process = state.running ? (Math.sin(state.time * 2.2) + 1) / 2 : 0;
  els.readout.innerHTML = [
    `F1=<b>${q.F1.toFixed(1)}N</b>，F2=<b>${q.F2.toFixed(1)}N</b>，θ=<b>${(q.theta * 180 / Math.PI).toFixed(0)}°</b>`,
    `F作=√(F1²+F2²+2F1F2cosθ)=<b>${q.R.toFixed(2)}N</b>`,
    `F实=<b>${q.expR.toFixed(2)}N</b>，方向差=<b>${q.dirErr.toFixed(1)}°</b>`,
    `误差=<b>${q.magErr.toFixed(1)}%</b>`,
    `实验进度=<b>${Math.round(process * 100)}%</b>：${process < .5 ? '两只测力计共同拉到 O' : '单只测力计复现合力到同一 O'}`,
    `演示时间=<b>${state.time.toFixed(2)}s</b>`
  ].join('<br>');
}
function loop(now) {
  if (!state.last) state.last = now;
  const dt = Math.min(0.04, (now - state.last) / 1000);
  state.last = now;
  if (state.running) state.time += dt;
  draw();
  requestAnimationFrame(loop);
}
function pos(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * canvas.width / rect.width,
    y: (evt.clientY - rect.top) * canvas.height / rect.height
  };
}
function hit(p) {
  return handles(model()).find(h => Math.hypot(p.x - h.x, p.y - h.y) <= h.r + 8);
}
canvas.addEventListener('pointerdown', evt => {
  const h = hit(pos(evt));
  if (h) {
    state.drag = h.name;
    canvas.setPointerCapture(evt.pointerId);
  }
});
canvas.addEventListener('pointermove', evt => {
  const p = pos(evt);
  if (!state.drag) {
    canvas.style.cursor = hit(p) ? 'grab' : 'default';
    return;
  }
  const dx = (p.x - O.x) / scale;
  const dy = -(p.y - O.y) / scale;
  if (state.drag === 'F1') {
    setValues({ F1: Math.hypot(dx, dy) });
  }
  if (state.drag === 'F2') {
    const F2 = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    setValues({ F2, theta: angle });
  }
  if (state.drag === 'Fexp') {
    const q = model();
    const err = clamp(Math.abs(Math.hypot(dx, dy) - q.R) / q.R / 0.012, 0, 5);
    setValues({ error: err });
  }
  draw();
});
canvas.addEventListener('pointerup', evt => {
  state.drag = null;
  try { canvas.releasePointerCapture(evt.pointerId); } catch (e) {}
});
canvas.addEventListener('pointercancel', () => { state.drag = null; });
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  state.last = 0;
  draw();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.records = [];
  setValues({ F1: 4, F2: 5, theta: 70, error: 1 });
  renderRecords();
  draw();
});
els.recordBtn.addEventListener('click', () => {
  const q = model();
  state.records.unshift({ R: q.R, expR: q.expR, err: q.magErr });
  state.records = state.records.slice(0, 4);
  renderRecords();
});
function renderRecords() {
  els.records.innerHTML = state.records.map((r, idx) =>
    `<tr><td>${idx + 1}</td><td>${r.R.toFixed(2)}</td><td>${r.expR.toFixed(2)}</td><td>${r.err.toFixed(1)}%</td></tr>`
  ).join('');
}
for (const id of ['f1', 'f2', 'theta', 'error']) els[id].addEventListener('input', draw);
renderRecords();
requestAnimationFrame(loop);
</script>
</body>
</html>
