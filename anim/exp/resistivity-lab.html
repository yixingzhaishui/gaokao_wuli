<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>测电阻率</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="测金属丝电阻率实验"></canvas>
    <section class="panel">
      <label for="length">接入长度 L/cm：<span id="lengthVal"></span></label>
      <input id="length" type="range" min="30" max="100" value="60" step="5">
      <label for="diameter">直径读数 d/mm：<span id="diameterVal"></span></label>
      <input id="diameter" type="range" min="0.20" max="0.80" value="0.40" step="0.01">
      <label for="voltage">电压 U/V：<span id="voltageVal"></span></label>
      <input id="voltage" type="range" min="0.2" max="3.0" value="1.2" step="0.1">
      <label for="rho">真实电阻率 ρ/(10^-6 Ω·m)：<span id="rhoVal"></span></label>
      <input id="rho" type="range" min="0.30" max="1.50" value="0.50" step="0.05">
      <label for="heat">温升误差：<span id="heatVal"></span></label>
      <input id="heat" type="range" min="0" max="12" value="3" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：改变直径读数，看截面积 S 和 ρ 为什么对 d 的误差特别敏感。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  length: document.getElementById('length'),
  diameter: document.getElementById('diameter'),
  voltage: document.getElementById('voltage'),
  rho: document.getElementById('rho'),
  heat: document.getElementById('heat'),
  lengthVal: document.getElementById('lengthVal'),
  diameterVal: document.getElementById('diameterVal'),
  voltageVal: document.getElementById('voltageVal'),
  rhoVal: document.getElementById('rhoVal'),
  heatVal: document.getElementById('heatVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status')
};
function line(x1,y1,x2,y2,color,w=3) {
  ctx.strokeStyle = color || '#334e68';
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}
function meter(x,y,label,value) {
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x,y,34,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 15px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label,x,y-6);
  ctx.font = '12px system-ui';
  ctx.fillText(value,x,y+14);
}
function draw() {
  const Lcm = Number(els.length.value);
  const dmm = Number(els.diameter.value);
  const U = Number(els.voltage.value);
  const rhoTrue = Number(els.rho.value) * 1e-6;
  const heat = Number(els.heat.value) / 100;
  const L = Lcm / 100;
  const d = dmm / 1000;
  const S = Math.PI * d * d / 4;
  const Rtrue = rhoTrue * L / S;
  const Rmeas = Rtrue * (1 + heat);
  const I = U / Rmeas;
  const rhoMeas = Rmeas * S / L;
  const rel = Math.abs(rhoMeas - rhoTrue) / rhoTrue * 100;
  els.lengthVal.textContent = Lcm.toFixed(0);
  els.diameterVal.textContent = dmm.toFixed(2);
  els.voltageVal.textContent = U.toFixed(1);
  els.rhoVal.textContent = Number(els.rho.value).toFixed(2);
  els.heatVal.textContent = Math.round(heat*100) + '%';

  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('测电阻率：伏安法测 R，尺和螺旋测微器测 L、d', 350, 30);

  line(82,238,160,238);
  meter(200,238,'A',I.toFixed(3)+'A');
  line(234,238,340,238);
  ctx.fillStyle = '#ffe8cc';
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 3;
  ctx.fillRect(340,226,190,24);
  ctx.strokeRect(340,226,190,24);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('待测金属丝 L=' + Lcm.toFixed(0) + 'cm',435,219);
  line(530,238,610,238);
  line(610,238,610,330);
  line(610,330,82,330);
  line(82,330,82,238);
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#334e68';
  ctx.fillRect(116,306,88,48);
  ctx.strokeRect(116,306,88,48);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('电源',160,335);
  meter(435,150,'V',U.toFixed(2)+'V');
  line(352,226,390,174,'#2c7be5',2);
  line(518,226,480,174,'#2c7be5',2);

  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.fillRect(72,70,190,86);
  ctx.strokeRect(72,70,190,86);
  ctx.fillStyle = '#334e68';
  ctx.fillRect(92,112,140,16);
  ctx.fillStyle = '#d9e2ec';
  ctx.fillRect(120,96,20,48);
  ctx.fillRect(196,96,20,48);
  ctx.fillStyle = '#102a43';
  ctx.font = '13px system-ui';
  ctx.fillText('螺旋测微器读直径 d=' + dmm.toFixed(2) + 'mm',167,164);

  const gx = 424, gy = 418, gw = 190, gh = 78;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx,gy);
  ctx.lineTo(gx+gw,gy);
  ctx.moveTo(gx,gy);
  ctx.lineTo(gx,gy-gh);
  ctx.stroke();
  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let i=0;i<=8;i++) {
    const u = i*0.375;
    const px = gx + u/3*gw;
    const py = gy - Math.min(1, (u/Rmeas)/0.5) * gh;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(gx + U/3*gw, gy - Math.min(1, I/0.5)*gh, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('I-U 图斜率=1/R', gx+96, gy+28);
  ctx.fillText('U', gx+gw+12, gy+4);
  ctx.fillText('I', gx-14, gy-gh-4);

  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('公式链：R=U/I，S=πd²/4，ρ=RS/L。直径 d 要多点测量取平均。',350,452);

  els.readout.innerHTML = [
    `<div id="r1">R=U/I≈${Rmeas.toFixed(2)}Ω</div>`,
    `<div id="r2">S=πd²/4≈${(S*1e6).toFixed(4)}mm²</div>`,
    `<div id="r3">ρ=RS/L≈${(rhoMeas/1e-6).toFixed(3)}×10^-6Ω·m</div>`,
    `<div id="r4">真实ρ≈${(rhoTrue/1e-6).toFixed(3)}×10^-6Ω·m，误差≈${rel.toFixed(1)}%</div>`,
    `<div id="r5">电流 I≈${I.toFixed(3)}A，温升会使金属电阻偏大</div>`
  ].join('');
  els.status.className = rel < 5 && I < 0.7 ? 'status' : 'status bad';
  els.status.textContent = I >= 0.7
    ? '不通过：电流偏大，金属丝发热明显，应减小电压。'
    : rel < 5
      ? '通过：由 U、I、L、d 算出的电阻率接近真实值。'
      : '不通过：温升或读数误差使电阻率偏离，应减小电流并多次测直径。';
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
