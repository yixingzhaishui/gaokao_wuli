<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>验证机械能守恒</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  .panel button { width: 100%; min-height: 36px; border: 1px solid #b0bcc9; background: #fff; border-radius: 8px; cursor: pointer; font: inherit; font-weight: 700; color: #102a43; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="验证机械能守恒实验台：侧视纸带、能量柱、ΔEk-ΔEp图像和数据记录"></canvas>
    <section class="panel">
      <button id="playBtn">▶ 自动扫描测量点</button>
      <button id="recordBtn" style="margin-top:8px">记录当前测点</button>
      <label for="height">释放高度 h/m：<span id="heightVal"></span></label>
      <input id="height" type="range" min="0.5" max="1.8" value="1.2" step="0.1">
      <label for="mass">重物质量 m/kg：<span id="massVal"></span></label>
      <input id="mass" type="range" min="0.05" max="0.30" value="0.10" step="0.01">
      <label for="point">测量点 n：<span id="pointVal"></span></label>
      <input id="point" type="range" min="5" max="13" value="8" step="1">
      <label for="loss">阻力（占重力百分比）：<span id="lossVal"></span></label>
      <input id="loss" type="range" min="0" max="12" value="2" step="1">
      <div id="readout" class="readout"></div>
      <table style="width:100%;margin-top:10px;border-collapse:collapse;font-size:12px"><thead><tr><th>n</th><th>ΔEp/J</th><th>ΔEk/J</th><th>|W阻|/J</th></tr></thead><tbody id="records"></tbody></table>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：调大阻力损失，看 ΔEk 是否小于 ΔEp；移动测量点，看速度是由前后两点间距算出的。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  height: document.getElementById('height'),
  mass: document.getElementById('mass'),
  point: document.getElementById('point'),
  loss: document.getElementById('loss'),
  heightVal: document.getElementById('heightVal'),
  massVal: document.getElementById('massVal'),
  pointVal: document.getElementById('pointVal'),
  lossVal: document.getElementById('lossVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  play: document.getElementById('playBtn'),
  record: document.getElementById('recordBtn'),
  records: document.getElementById('records')
};
const g = 9.8;
const T = 0.04;
let autoScan = false;
let autoDir = 1;
let lastScan = 0;
let drag = null;
const records = [];
function yAt(n, loss) {
  return 0.5 * g * Math.pow(n * T, 2) * (1 - loss);
}
function drawBar(x, y, w, h, value, max, color, label) {
  ctx.strokeStyle = '#d9e2ec';
  ctx.fillStyle = '#f7f9fc';
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  const bh = Math.max(0, Math.min(h, value / max * h));
  ctx.fillStyle = color;
  ctx.fillRect(x + 10, y + h - bh, w - 20, bh);
  ctx.fillStyle = '#486581';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w / 2, y + h + 20);
  ctx.fillStyle = color;
  ctx.fillText(value.toFixed(3) + 'J', x + w / 2, y + h - bh - 8);
}
function drawGraph(x0, y0, w, h, m, loss) {
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('ΔEp', x0 + w + 6, y0 + 4);
  ctx.fillText('ΔEk', x0 - 28, y0 - h - 4);
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#e03131';
  for (let n = 5; n <= 13; n++) {
    const y = yAt(n, loss);
    const v = (yAt(n + 1, loss) - yAt(n - 1, loss)) / (2 * T);
    const dep = m * g * y;
    const dek = 0.5 * m * v * v;
    const max = 0.9;
    const px = x0 + Math.min(1, dep / max) * w;
    const py = y0 - Math.min(1, dek / max) * h;
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}
function draw() {
  const h = Number(els.height.value);
  const m = Number(els.mass.value);
  const n = Number(els.point.value);
  const loss = Number(els.loss.value) / 100;
  const yPrev = yAt(n - 1, loss);
  const y = yAt(n, loss);
  const yNext = yAt(n + 1, loss);
  const v = (yNext - yPrev) / (2 * T);
  const dep = m * g * y;
  const dek = 0.5 * m * v * v;
  const fDrag = loss * m * g;
  const wDrag = fDrag * y;
  const residual = dep > 0 ? Math.abs(dep - dek - wDrag) / dep * 100 : 0;
  const rel = dep > 0 ? Math.abs(dep - dek) / dep * 100 : 0;
  const valid = yNext < h;
  els.heightVal.textContent = h.toFixed(1);
  els.massVal.textContent = m.toFixed(2);
  els.pointVal.textContent = n;
  els.lossVal.textContent = Math.round(loss * 100) + '%';
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('机械能守恒实验台：侧视纸带 + 能量柱 + ΔEk-ΔEp图像 + 数据记录', 350, 30);

  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(78, 70);
  ctx.lineTo(78, 420);
  ctx.moveTo(58, 70);
  ctx.lineTo(210, 70);
  ctx.stroke();
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  ctx.fillRect(98, 82, 78, 36);
  ctx.strokeRect(98, 82, 78, 36);
  ctx.fillStyle = '#102a43';
  ctx.font = '13px system-ui';
  ctx.fillText('打点计时器', 137, 105);
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(137, 118);
  ctx.lineTo(137, 418);
  ctx.stroke();
  const scale = 250 / h;
  for (let i = 1; i <= 14; i++) {
    const yy = 118 + yAt(i, loss) * scale;
    if (yy > 418) continue;
    ctx.fillStyle = i === n ? '#e03131' : '#102a43';
    ctx.beginPath();
    ctx.arc(137, yy, i === n ? 5 : 3.3, 0, Math.PI * 2);
    ctx.fill();
    if (i === n || i === n - 1 || i === n + 1) {
      ctx.fillStyle = '#486581';
      ctx.font = '11px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText('点' + i, 150, yy + 4);
    }
  }
  const massY = Math.min(388, 118 + y * scale);
  ctx.fillStyle = '#ffe8cc';
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 2;
  ctx.fillRect(190, massY - 22, 42, 44);
  ctx.strokeRect(190, massY - 22, 42, 44);
  ctx.fillStyle = '#e03131';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('v≈' + v.toFixed(2) + 'm/s', 211, massY - 34);
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(260, 118);
  ctx.lineTo(260, 118 + y * scale);
  ctx.stroke();
  ctx.fillStyle = '#2c7be5';
  ctx.fillText('下落高度 y=' + y.toFixed(3) + 'm', 332, 130 + y * scale / 2);

  const maxE = Math.max(dep, dek, wDrag, 0.2);
  drawBar(394, 105, 78, 190, dep, maxE, '#7b2cbf', 'ΔEp=mgy');
  drawBar(500, 105, 78, 190, dek, maxE, '#2c7be5', 'ΔEk=1/2mv²');
  drawGraph(410, 420, 210, 90, m, loss);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('灰线表示 ΔEk=ΔEp；红点越贴近灰线，实验越支持守恒。', 515, 320);
  ctx.fillStyle = '#102a43';
  ctx.textAlign = 'left';
  ctx.fillText('直接拖动红色测量点/重物手柄，改变纸带测点 n', 58, 452);

  els.readout.innerHTML = [
    `<div id="r1">纸带周期 T=${T.toFixed(2)}s，测点 n=${n}</div>`,
    `<div id="r2">v_n≈(y_{n+1}-y_{n-1})/(2T)=${v.toFixed(2)}m/s</div>`,
    `<div id="r3">ΔEp=mgy=${dep.toFixed(3)}J</div>`,
    `<div id="r4">ΔEk=1/2mv²=${dek.toFixed(3)}J</div>`,
    `<div id="r5">|W阻|=F阻y=${wDrag.toFixed(3)}J；ΔEp-(ΔEk+|W阻|) 相对残差≈${residual.toFixed(1)}%</div>`
  ].join('');
  els.status.className = valid && residual < 5 ? 'status' : 'status bad';
  els.status.textContent = !valid
    ? '测点太低：前后点超过释放高度，应选更高释放点或更靠前的纸带点。'
    : loss < 0.01 && rel < 5
      ? '通过：阻力可忽略时，ΔEk 与 ΔEp 接近，机械能近似守恒。'
      : residual < 5
        ? '含阻力：机械能不守恒，但能量关系 ΔEp≈ΔEk+|W阻| 闭合。'
        : '数据不闭合：请检查测点是否越过释放高度或测量参数。';
  window.__EXP_TEST_STATE__={n,dep,dek,fDrag,wDrag,residual,loss,valid,records:records.length};
}
function stopAuto() {
  autoScan = false;
  els.play.textContent = '▶ 自动扫描测量点';
}
function setPointFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const h = Number(els.height.value);
  const loss = Number(els.loss.value) / 100;
  const scale = 250 / h;
  let best = Number(els.point.value);
  let bestDist = Infinity;
  for (let i = 5; i <= 13; i++) {
    const yy = 118 + yAt(i, loss) * scale;
    const d = Math.abs(y - yy);
    if (d < bestDist) {
      best = i;
      bestDist = d;
    }
  }
  els.point.value = String(best);
  draw();
}
function scan(now) {
  if (!autoScan) return;
  if (!lastScan || now - lastScan > 520) {
    const next = Number(els.point.value) + autoDir;
    if (next >= 13 || next <= 5) autoDir *= -1;
    els.point.value = Math.max(5, Math.min(13, next));
    draw();
    lastScan = now;
  }
  requestAnimationFrame(scan);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', () => {
    stopAuto();
    draw();
  });
});
els.play.addEventListener('click', () => {
  autoScan = !autoScan;
  els.play.textContent = autoScan ? '⏸ 暂停扫描测量点' : '▶ 自动扫描测量点';
  if (autoScan) {
    lastScan = 0;
    requestAnimationFrame(scan);
  }
});
els.record.addEventListener('click',()=>{const q=window.__EXP_TEST_STATE__;if(!q.valid)return;records.unshift({n:q.n,dep:q.dep,dek:q.dek,wDrag:q.wDrag});records.splice(5);els.records.innerHTML=records.map(r=>`<tr><td>${r.n}</td><td>${r.dep.toFixed(3)}</td><td>${r.dek.toFixed(3)}</td><td>${r.wDrag.toFixed(3)}</td></tr>`).join('');draw();});
c.addEventListener('pointerdown', ev => {
  drag = 'measurement-handle';
  stopAuto();
  setPointFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!drag) return;
  setPointFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { drag = null; });
c.addEventListener('pointerleave', () => { drag = null; });
draw();
</script>
<div data-audit-reset-bar><button type="button" data-audit-reset aria-label="重置当前动画">重置</button></div><script>(function(){var b=document.querySelector("[data-audit-reset]");if(b)b.addEventListener("click",function(){location.reload()});})();</script><script src="guided-experiment.js"></script></body>
</html>
