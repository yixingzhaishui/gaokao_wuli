<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>测万有引力常数</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="卡文迪许扭秤实验"></canvas>
    <section class="panel">
      <label for="bigM">大球质量 M/kg：<span id="bigMVal"></span></label>
      <input id="bigM" type="range" min="0.5" max="5" value="1.5" step="0.1">
      <label for="smallM">小球质量 m/kg：<span id="smallMVal"></span></label>
      <input id="smallM" type="range" min="0.01" max="0.05" value="0.02" step="0.005">
      <label for="dist">球心距离 r/m：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.04" max="0.12" value="0.05" step="0.005">
      <label for="kappa">扭转系数 κ/(10^-7 N·m/rad)：<span id="kappaVal"></span></label>
      <input id="kappa" type="range" min="0.5" max="3" value="1" step="0.1">
      <label for="error">读数误差：<span id="errorVal"></span></label>
      <input id="error" type="range" min="-8" max="8" value="2" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：增大 M 或减小 r，看扭转角 θ 如何变大；调误差，看 G 测量值如何偏离标准值。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  bigM: document.getElementById('bigM'),
  smallM: document.getElementById('smallM'),
  dist: document.getElementById('dist'),
  kappa: document.getElementById('kappa'),
  error: document.getElementById('error'),
  bigMVal: document.getElementById('bigMVal'),
  smallMVal: document.getElementById('smallMVal'),
  distVal: document.getElementById('distVal'),
  kappaVal: document.getElementById('kappaVal'),
  errorVal: document.getElementById('errorVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status')
};
const G0 = 6.67e-11;
const L = 0.10;
function sci(n) {
  return n.toExponential(2).replace('e', '×10^');
}
function drawGraph(x0, y0, w, h, M, m, kappa) {
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('1/r²', x0 + w + 6, y0 + 4);
  ctx.fillText('θ', x0 - 16, y0 - h - 4);
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#e03131';
  for (let i = 0; i < 8; i++) {
    const r = 0.045 + i * 0.01;
    const F = G0 * M * m / (r * r);
    const theta = 2 * F * L / kappa;
    const xVal = (1 / (r * r) - 65) / 560;
    const yVal = theta / 0.006;
    const px = x0 + Math.max(0, Math.min(1, xVal)) * w;
    const py = y0 - Math.max(0, Math.min(1, yVal)) * h;
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}
function draw() {
  const M = Number(els.bigM.value);
  const m = Number(els.smallM.value);
  const r = Number(els.dist.value);
  const kappa = Number(els.kappa.value) * 1e-7;
  const err = Number(els.error.value) / 100;
  const F = G0 * M * m / (r * r);
  const theta = 2 * F * L / kappa;
  const thetaRead = theta * (1 + err);
  const Gmeas = kappa * thetaRead * r * r / (2 * M * m * L);
  const rel = Math.abs(Gmeas - G0) / G0 * 100;
  els.bigMVal.textContent = M.toFixed(1);
  els.smallMVal.textContent = m.toFixed(3);
  els.distVal.textContent = r.toFixed(3);
  els.kappaVal.textContent = Number(els.kappa.value).toFixed(1);
  els.errorVal.textContent = Math.round(err * 100) + '%';

  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('卡文迪许扭秤：由极小扭转角反推万有引力常数 G', 350, 30);

  const cx = 230, cy = 220;
  const scaleTheta = thetaRead * 3500;
  const ang = -0.18 + Math.max(-0.35, Math.min(0.35, scaleTheta));
  const rod = 180;
  const x1 = cx + rod * Math.cos(ang);
  const y1 = cy + rod * Math.sin(ang);
  const x2 = cx - rod * Math.cos(ang);
  const y2 = cy - rod * Math.sin(ang);
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, 66);
  ctx.lineTo(cx, cy);
  ctx.stroke();
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = '#ffe8cc';
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x1, y1, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x2, y2, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#d0ebff';
  ctx.strokeStyle = '#2c7be5';
  ctx.beginPath();
  ctx.arc(x1 + 48, y1 - 34, 24 + M * 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x2 - 48, y2 + 34, 24 + M * 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + 42, y1 - 28);
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 42, y2 + 28);
  ctx.stroke();
  ctx.fillStyle = '#e03131';
  ctx.font = '700 13px system-ui';
  ctx.fillText('F', x1 + 28, y1 - 36);
  ctx.fillText('F', x2 - 28, y2 + 42);

  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(448, 120 + thetaRead * 18000);
  ctx.stroke();
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.fillRect(450, 84, 150, 90);
  ctx.strokeRect(450, 84, 150, 90);
  ctx.fillStyle = '#38b2ac';
  ctx.fillRect(452, 126 + thetaRead * 18000, 146, 4);
  ctx.fillStyle = '#486581';
  ctx.textAlign = 'center';
  ctx.font = '13px system-ui';
  ctx.fillText('光斑位移放大 θ', 525, 192);

  drawGraph(430, 398, 190, 165, M, m, kappa);
  ctx.fillStyle = '#486581';
  ctx.fillText('θ 与 1/r² 近似正比；r 很小的误差会明显影响 G。', 350, 452);

  els.readout.innerHTML = [
    `<div id="r1">F=GMm/r²≈${sci(F)}N</div>`,
    `<div id="r2">力矩平衡：κθ=2FL</div>`,
    `<div id="r3">θ读≈${(thetaRead * 1000).toFixed(2)}mrad</div>`,
    `<div id="r4">G测≈${(Gmeas / 1e-11).toFixed(2)}×10^-11</div>`,
    `<div id="r5">相对误差≈${rel.toFixed(1)}%</div>`
  ].join('');
  els.status.className = rel < 5 ? 'status' : 'status bad';
  els.status.textContent = rel < 5
    ? '通过：由扭转角反推的 G 与标准值接近。'
    : '不通过：光斑读数或距离测量误差会明显放大到 G 的结果中。';
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
