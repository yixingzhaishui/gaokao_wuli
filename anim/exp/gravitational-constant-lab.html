<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>测万有引力常数</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 0 0 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="卡文迪许扭秤俯视实验台、光点尺读数、θ-1/r²图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="bigM">大球质量 M/kg：<span id="bigMVal"></span></label>
      <input id="bigM" type="range" min="0.5" max="5" value="1.5" step="0.1">
      <label for="smallM">小球质量 m/kg：<span id="smallMVal"></span></label>
      <input id="smallM" type="range" min="0.01" max="0.05" value="0.02" step="0.005">
      <label for="dist">球心距离 r/m：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.04" max="0.12" value="0.05" step="0.005">
      <label for="kappa">扭转系数 κ/(10^-7 N·m/rad)：<span id="kappaVal"></span></label>
      <input id="kappa" type="range" min="0.5" max="3" value="1" step="0.1">
      <label for="error">读数误差：<span id="errorVal"></span></label>
      <input id="error" type="range" min="-8" max="8" value="2" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：拖动画面里的蓝色大球改变 r，点“播放”看轻杆缓慢偏转、光点尺放大 θ；记录几组点后看 θ-1/r² 图线是否接近直线。</div>
      <table aria-label="数据记录">
        <thead><tr><th>组</th><th>r/m</th><th>θ/mrad</th><th>G/10^-11</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  bigM: document.getElementById('bigM'),
  smallM: document.getElementById('smallM'),
  dist: document.getElementById('dist'),
  kappa: document.getElementById('kappa'),
  error: document.getElementById('error'),
  bigMVal: document.getElementById('bigMVal'),
  smallMVal: document.getElementById('smallMVal'),
  distVal: document.getElementById('distVal'),
  kappaVal: document.getElementById('kappaVal'),
  errorVal: document.getElementById('errorVal'),
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const G0 = 6.67e-11;
const L = 0.10;
const state = {
  running: false,
  last: 0,
  time: 0,
  theta: 0,
  omega: 0,
  drag: null,
  records: []
};
function sci(n) {
  return n.toExponential(2).replace('e', '×10^');
}
function values() {
  const M = Number(els.bigM.value);
  const m = Number(els.smallM.value);
  const r = Number(els.dist.value);
  const kappa = Number(els.kappa.value) * 1e-7;
  const err = Number(els.error.value) / 100;
  const F = G0 * M * m / (r * r);
  const thetaIdeal = 2 * F * L / kappa;
  const thetaRead = state.theta * (1 + err);
  const thetaEquilRead = thetaIdeal * (1 + err);
  const Gmeas = kappa * thetaRead * r * r / (2 * M * m * L);
  const rel = Math.abs(Gmeas - G0) / G0 * 100;
  return { M, m, r, kappa, err, F, thetaIdeal, thetaRead, thetaEquilRead, Gmeas, rel };
}
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
function arrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(a - 0.45), y2 - 10 * Math.sin(a - 0.45));
  ctx.lineTo(x2 - 10 * Math.cos(a + 0.45), y2 - 10 * Math.sin(a + 0.45));
  ctx.closePath();
  ctx.fill();
}
function drawGraph(x0, y0, w, h, v) {
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('1/r² 图像', x0 + w - 58, y0 + 18);
  ctx.fillText('θ', x0 - 14, y0 - h - 4);
  ctx.strokeStyle = '#829ab1';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0 - h);
  ctx.stroke();
  ctx.setLineDash([]);
  const points = state.records.length ? state.records : [
    { r: 0.045, theta: 2 * G0 * v.M * v.m * L / (0.045 * 0.045 * v.kappa) },
    { r: 0.060, theta: 2 * G0 * v.M * v.m * L / (0.060 * 0.060 * v.kappa) },
    { r: 0.085, theta: 2 * G0 * v.M * v.m * L / (0.085 * 0.085 * v.kappa) }
  ];
  ctx.fillStyle = '#e03131';
  points.forEach(p => {
    const xVal = (1 / (p.r * p.r) - 60) / 570;
    const yVal = p.theta / 0.006;
    const px = x0 + clamp(xVal, 0, 1) * w;
    const py = y0 - clamp(yVal, 0, 1) * h;
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  });
  const nowX = x0 + clamp((1 / (v.r * v.r) - 60) / 570, 0, 1) * w;
  const nowY = y0 - clamp(v.thetaRead / 0.006, 0, 1) * h;
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(nowX, nowY, 8, 0, Math.PI * 2);
  ctx.stroke();
}
function drawScale(x, y, theta) {
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(x, y, 160, 104);
  ctx.strokeRect(x, y, 160, 104);
  for (let i = 0; i <= 8; i++) {
    const yy = y + 14 + i * 9;
    ctx.strokeStyle = i === 4 ? '#829ab1' : '#d9e2ec';
    ctx.lineWidth = i === 4 ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(x + 14, yy);
    ctx.lineTo(x + 146, yy);
    ctx.stroke();
  }
  const spotY = clamp(y + 52 + theta * 18000, y + 12, y + 92);
  ctx.fillStyle = '#38b2ac';
  ctx.fillRect(x + 12, spotY - 3, 136, 6);
  ctx.fillStyle = '#486581';
  ctx.textAlign = 'center';
  ctx.font = '12px system-ui';
  ctx.fillText('光点尺读数 θ', x + 80, y + 122);
}
function draw() {
  const v = values();
  els.bigMVal.textContent = v.M.toFixed(1);
  els.smallMVal.textContent = v.m.toFixed(3);
  els.distVal.textContent = v.r.toFixed(3);
  els.kappaVal.textContent = Number(els.kappa.value).toFixed(1);
  els.errorVal.textContent = Math.round(v.err * 100) + '%';

  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('卡文迪许扭秤实验台：俯视装置 + 光点尺读数 + θ-1/r²图像 + 数据记录', 370, 28);

  const cx = 224, cy = 242;
  const scaleTheta = v.thetaRead * 3500;
  const ang = -0.18 + clamp(scaleTheta, -0.34, 0.34);
  const rod = 172;
  const x1 = cx + rod * Math.cos(ang);
  const y1 = cy + rod * Math.sin(ang);
  const x2 = cx - rod * Math.cos(ang);
  const y2 = cy - rod * Math.sin(ang);
  const gap = 32 + (v.r - 0.04) / 0.08 * 72;
  const bx1 = x1 + gap;
  const by1 = y1 - gap * 0.58;
  const bx2 = x2 - gap;
  const by2 = y2 + gap * 0.58;

  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(30, 54, 380, 326);
  ctx.strokeRect(30, 54, 380, 326);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('俯视实验台：拖动蓝色大球手柄，保持 M、m、κ 不变改变 r', 48, 78);

  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, 82);
  ctx.lineTo(cx, cy);
  ctx.stroke();
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = '#ffe8cc';
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 2;
  [ [x1, y1], [x2, y2] ].forEach(p => {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });
  ctx.fillStyle = '#d0ebff';
  ctx.strokeStyle = '#2c7be5';
  [ [bx1, by1], [bx2, by2] ].forEach(p => {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 24 + v.M * 2.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#2c7be5';
    ctx.beginPath();
    ctx.arc(p[0], p[1], 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d0ebff';
  });
  arrow(x1, y1, x1 + 36, y1 - 24, '#e03131');
  arrow(x2, y2, x2 - 36, y2 + 24, '#e03131');
  ctx.fillStyle = '#e03131';
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('F=GMm/r²', x1 + 32, y1 - 40);
  ctx.fillText('F', x2 - 32, y2 + 44);

  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(462, 108 + v.thetaRead * 18000);
  ctx.stroke();
  drawScale(470, 78, v.thetaRead);
  drawGraph(454, 444, 220, 146, v);

  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(40, 398, 360, 100);
  ctx.strokeRect(40, 398, 360, 100);
  const barTheta = clamp(Math.abs(v.thetaRead) / 0.006, 0, 1);
  const barForce = clamp(v.F / 1.5e-10, 0, 1);
  ctx.fillStyle = '#486581';
  ctx.textAlign = 'left';
  ctx.font = '13px system-ui';
  ctx.fillText('侧视/读数面板：力矩平衡 κθ=2FL，光点位移把极小 θ 放大', 54, 420);
  ctx.fillStyle = '#e03131';
  ctx.fillRect(54, 440, 240 * barForce, 14);
  ctx.fillStyle = '#38b2ac';
  ctx.fillRect(54, 466, 240 * barTheta, 14);
  ctx.fillStyle = '#102a43';
  ctx.fillText('引力 F', 306, 452);
  ctx.fillText('扭角 θ', 306, 478);

  els.readout.innerHTML = [
    `<div id="r1">F=GMm/r²≈${sci(v.F)} N</div>`,
    `<div id="r2">力矩平衡：κθ=2FL，L=${L.toFixed(2)} m</div>`,
    `<div id="r3">θ读≈${(v.thetaRead * 1000).toFixed(2)} mrad，平衡值≈${(v.thetaEquilRead * 1000).toFixed(2)} mrad</div>`,
    `<div id="r4">G测≈${(v.Gmeas / 1e-11).toFixed(2)}×10^-11 N·m²/kg²</div>`,
    `<div id="r5">相对误差≈${v.rel.toFixed(1)}%</div>`
  ].join('');
  els.status.className = v.rel < 5 && Math.abs(state.theta - v.thetaIdeal) < v.thetaIdeal * 0.08 ? 'status' : 'status bad';
  els.status.textContent = Math.abs(state.theta - v.thetaIdeal) > v.thetaIdeal * 0.08
    ? '状态：扭秤还在靠近平衡，等待光点稳定后再读 θ。'
    : (v.rel < 5 ? '通过：稳定读数反推出的 G 与标准值接近。' : '不通过：距离或光点读数误差会被带入 G 的结果。');
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.r.toFixed(3)}</td><td>${(p.theta * 1000).toFixed(2)}</td><td>${(p.G / 1e-11).toFixed(2)}</td></tr>`
  ).join('');
}
function setRFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  const dx = Math.abs(x - 224);
  const dy = Math.abs(y - 242);
  const d = clamp((dx + dy) * 0.00052, 0.04, 0.12);
  els.dist.value = d.toFixed(3);
}
function handlePointerDown(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const y = (ev.clientY - rect.top) * c.height / rect.height;
  if ((x > 250 && x < 470 && y > 80 && y < 250) || (x > 35 && x < 220 && y > 215 && y < 360)) {
    state.drag = 'big-ball-handle';
    setRFromPointer(ev);
    state.running = true;
    els.playBtn.textContent = '暂停';
    ev.preventDefault();
  }
}
function handlePointerMove(ev) {
  if (!state.drag) return;
  setRFromPointer(ev);
  ev.preventDefault();
}
function handlePointerUp() {
  state.drag = null;
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  const v = values();
  if (state.running) {
    state.time += dt;
    const accel = (v.thetaIdeal - state.theta) * 22 - state.omega * 5.6;
    state.omega += accel * dt;
    state.theta += state.omega * dt;
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') {
    el.addEventListener('input', () => {
      state.running = true;
      els.playBtn.textContent = '暂停';
    });
  }
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  state.records.push({ r: v.r, theta: v.thetaRead, G: v.Gmeas });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.time = 0;
  state.theta = 0;
  state.omega = 0;
  state.records = [];
  els.bigM.value = '1.5';
  els.smallM.value = '0.02';
  els.dist.value = '0.05';
  els.kappa.value = '1';
  els.error.value = '2';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', handlePointerDown);
c.addEventListener('pointermove', handlePointerMove);
c.addEventListener('pointerup', handlePointerUp);
c.addEventListener('pointerleave', handlePointerUp);
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-experiment.js"></script>
</body>
</html>
