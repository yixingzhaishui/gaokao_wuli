<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>验证动量守恒实验台</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 14px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; }
  canvas { width: 100%; height: 560px; display: block; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; touch-action: none; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { flex: 1; border: 1px solid #bcccdc; background: #f0f4f8; color: #102a43; border-radius: 8px; padding: 9px 10px; font-weight: 700; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 13px; font-weight: 700; margin: 11px 0 4px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 10px; background: #eef4ff; border-radius: 8px; line-height: 1.6; font-size: 13px; }
  table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 5px 4px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.55; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 500px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="790" height="560" aria-label="验证动量守恒实验台：侧视气垫导轨、光电门、速度箭头、动量图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="resetBtn" type="button">重置</button>
        <button id="recordBtn" type="button">记录</button>
      </div>
      <label for="mode">碰撞类型：<span id="modeVal"></span></label>
      <input id="mode" type="range" min="0" max="1" value="1" step="1">
      <label for="m1">小车1质量 m1/kg：<span id="m1Val"></span></label>
      <input id="m1" type="range" min="0.2" max="1.2" value="0.6" step="0.1">
      <label for="m2">小车2质量 m2/kg：<span id="m2Val"></span></label>
      <input id="m2" type="range" min="0.2" max="1.2" value="0.8" step="0.1">
      <label for="v1">碰前 v1/(m/s)：<span id="v1Val"></span></label>
      <input id="v1" type="range" min="-2" max="3" value="2" step="0.1">
      <label for="v2">碰前 v2/(m/s)：<span id="v2Val"></span></label>
      <input id="v2" type="range" min="-2" max="2" value="0" step="0.1">
      <label for="loss">外界误差/摩擦/%：<span id="lossVal"></span></label>
      <input id="loss" type="range" min="0" max="10" value="2" step="1">
      <div id="readout" class="readout"></div>
      <table aria-label="数据记录表">
        <thead><tr><th>记录</th><th>p前</th><th>p后</th><th>差</th></tr></thead>
        <tbody id="records"></tbody>
      </table>
      <div class="hint">观察任务：先播放看碰撞前后两次光电门测速；再拖小车速度箭头和质量把手，比较 p前 与 p后 是否接近。</div>
    </section>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  resetBtn: document.getElementById('resetBtn'),
  recordBtn: document.getElementById('recordBtn'),
  mode: document.getElementById('mode'),
  m1: document.getElementById('m1'),
  m2: document.getElementById('m2'),
  v1: document.getElementById('v1'),
  v2: document.getElementById('v2'),
  loss: document.getElementById('loss'),
  modeVal: document.getElementById('modeVal'),
  m1Val: document.getElementById('m1Val'),
  m2Val: document.getElementById('m2Val'),
  v1Val: document.getElementById('v1Val'),
  v2Val: document.getElementById('v2Val'),
  lossVal: document.getElementById('lossVal'),
  readout: document.getElementById('readout'),
  records: document.getElementById('records')
};
const state = { running: false, time: 0, last: 0, drag: null, records: [] };

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function val(id) { return Number(els[id].value); }
function setValues(next) {
  if (next.mode !== undefined) els.mode.value = Math.round(clamp(next.mode, 0, 1));
  if (next.m1 !== undefined) els.m1.value = clamp(next.m1, 0.2, 1.2).toFixed(1);
  if (next.m2 !== undefined) els.m2.value = clamp(next.m2, 0.2, 1.2).toFixed(1);
  if (next.v1 !== undefined) els.v1.value = clamp(next.v1, -2, 3).toFixed(1);
  if (next.v2 !== undefined) els.v2.value = clamp(next.v2, -2, 2).toFixed(1);
  if (next.loss !== undefined) els.loss.value = Math.round(clamp(next.loss, 0, 10));
}
function calc() {
  const mode = val('mode'), m1 = val('m1'), m2 = val('m2'), v1 = val('v1'), v2 = val('v2'), loss = val('loss');
  let u1, u2;
  if (mode === 0) {
    const v = (m1 * v1 + m2 * v2) / (m1 + m2);
    u1 = v; u2 = v;
  } else {
    u1 = ((m1 - m2) * v1 + 2 * m2 * v2) / (m1 + m2);
    u2 = (2 * m1 * v1 + (m2 - m1) * v2) / (m1 + m2);
  }
  const factor = 1 - loss / 100;
  u1 *= factor; u2 *= factor;
  const p0 = m1 * v1 + m2 * v2;
  const p1 = m1 * u1 + m2 * u2;
  const k0 = 0.5 * m1 * v1 * v1 + 0.5 * m2 * v2 * v2;
  const k1 = 0.5 * m1 * u1 * u1 + 0.5 * m2 * u2 * u2;
  const rel = Math.abs(p1 - p0) / Math.max(0.05, Math.abs(p0)) * 100;
  const ok = rel < 5;
  return { mode, m1, m2, v1, v2, loss, u1, u2, p0, p1, k0, k1, rel, ok };
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}
function box(x, y, w, h, fill, stroke = '#d9e2ec') {
  ctx.fillStyle = fill; ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; roundRect(x, y, w, h, 9); ctx.fill(); ctx.stroke();
}
function text(s, x, y, color = '#102a43', size = 13, weight = '400', align = 'center') {
  ctx.fillStyle = color; ctx.font = `${weight} ${size}px system-ui, -apple-system, sans-serif`; ctx.textAlign = align; ctx.textBaseline = 'middle'; ctx.fillText(s, x, y);
}
function arrow(x1, y1, x2, y2, color, width = 4) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = width;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x2 - 11 * Math.cos(a - 0.45), y2 - 11 * Math.sin(a - 0.45)); ctx.lineTo(x2 - 11 * Math.cos(a + 0.45), y2 - 11 * Math.sin(a + 0.45)); ctx.closePath(); ctx.fill();
}
function cart(x, y, m, color, label, v) {
  const w = 58 + m * 34;
  ctx.fillStyle = color; ctx.strokeStyle = '#334e68'; ctx.lineWidth = 2;
  roundRect(x - w / 2, y - 28, w, 34, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#334e68';
  ctx.beginPath(); ctx.arc(x - w / 2 + 16, y + 12, 7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w / 2 - 16, y + 12, 7, 0, Math.PI * 2); ctx.fill();
  text(label, x, y - 11, '#102a43', 12, '700');
  if (Math.abs(v) > 0.04) arrow(x, y - 42, x + v * 34, y - 42, '#e03131', 3);
}
function positions(q) {
  const t = state.running ? state.time : 0;
  const before = t < 2;
  const s = before ? t / 2 : Math.min(1, (t - 2) / 1.8);
  const x1pre = 180 + q.v1 * 35 * s;
  const x2pre = 450 + q.v2 * 35 * s;
  let x1post = 300 + q.u1 * 42 * s;
  let x2post = q.mode === 0 ? x1post + 72 : 390 + q.u2 * 42 * s;
  if (!state.running) { x1post = 300; x2post = q.mode === 0 ? 372 : 390; }
  return before ? { x1: x1pre, x2: x2pre, v1: q.v1, v2: q.v2, label: '碰前：光电门测 v1、v2' } : { x1: x1post, x2: x2post, v1: q.u1, v2: q.u2, label: '碰后：光电门测 v1′、v2′' };
}
function handles(q) {
  const p = positions(q);
  return [
    { name: 'v1', x: p.x1 + q.v1 * 34, y: 158, r: 13 },
    { name: 'v2', x: p.x2 + q.v2 * 34, y: 158, r: 13 },
    { name: 'm1', x: p.x1, y: 224, r: 13 },
    { name: 'm2', x: p.x2, y: 224, r: 13 }
  ];
}
function drawTrack(q) {
  const p = positions(q);
  box(36, 82, 500, 250, '#fff', '#d9e2ec');
  text('侧视气垫导轨：播放碰撞，光电门读速度', 286, 106, '#102a43', 14, '700');
  ctx.strokeStyle = '#334e68'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(72, 230); ctx.lineTo(500, 230); ctx.stroke();
  for (const gx of [150, 260, 380, 490]) {
    ctx.strokeStyle = '#7b2cbf'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(gx, 156); ctx.lineTo(gx, 230); ctx.stroke();
    text('光电门', gx, 144, '#7b2cbf', 10, '700');
  }
  cart(p.x1, 210, q.m1, '#d0ebff', `m1=${q.m1.toFixed(1)}kg`, p.v1);
  cart(p.x2, 210, q.m2, '#ffe8cc', `m2=${q.m2.toFixed(1)}kg`, p.v2);
  text(p.label, 286, 306, '#486581', 13, '700');
  for (const h of handles(q)) {
    ctx.fillStyle = h.name.startsWith('v') ? '#e03131' : '#2c7be5';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
    text(h.name, h.x, h.y + 1, '#fff', 10, '700');
  }
}
function drawBars(q) {
  box(568, 82, 178, 250, '#f7f9fc', '#d9e2ec');
  text('图像记录：总动量', 657, 106, '#102a43', 14, '700');
  const max = Math.max(1, Math.abs(q.p0), Math.abs(q.p1));
  const zero = 657;
  ctx.strokeStyle = '#829ab1'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(zero, 136); ctx.lineTo(zero, 276); ctx.stroke();
  function bar(y, val, color, label) {
    const len = val / max * 70;
    ctx.fillStyle = color;
    ctx.fillRect(len >= 0 ? zero : zero + len, y - 13, Math.abs(len), 26);
    text(`${label}=${val.toFixed(3)}`, 657, y + 30, color, 12, '700');
  }
  bar(162, q.p0, '#2c7be5', 'p前');
  bar(238, q.p1, '#38b2ac', 'p后');
  text(`差 ${(q.rel).toFixed(1)}%`, 657, 304, q.ok ? '#087f5b' : '#b30000', 14, '700');
}
function drawFormula(q) {
  box(52, 390, 694, 132, '#f7f9fc', '#d9e2ec');
  text('数据记录与公式绑定', 399, 412, '#102a43', 14, '700');
  text(`p前=m1v1+m2v2=${q.p0.toFixed(3)} kg·m/s`, 78, 442, '#486581', 13, '700', 'left');
  text(`p后=m1v1′+m2v2′=${q.p1.toFixed(3)} kg·m/s，相对差=${q.rel.toFixed(1)}%`, 78, 470, '#486581', 13, '700', 'left');
  text(`Ek前=${q.k0.toFixed(3)}J，Ek后=${q.k1.toFixed(3)}J：动量守恒不等于动能一定守恒`, 78, 498, '#102a43', 13, '700', 'left');
  text(`状态判定：${q.ok ? '能用，系统水平方向合外力近似为零' : '需重做，摩擦/测量误差过大'}`, 420, 442, q.ok ? '#087f5b' : '#b30000', 13, '700', 'left');
}
function draw() {
  const q = calc();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(1, '#f0f7ff');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
  text('验证动量守恒：碰前总动量 ≈ 碰后总动量', 395, 34, '#102a43', 18, '700');
  text('侧视导轨 + 光电门读数 + 动量图像 + 数据记录：向右为正，比较代数和。', 395, 62, '#486581', 13);
  drawTrack(q);
  drawBars(q);
  drawFormula(q);
  els.modeVal.textContent = q.mode === 0 ? '完全非弹性' : '弹性';
  els.m1Val.textContent = q.m1.toFixed(1);
  els.m2Val.textContent = q.m2.toFixed(1);
  els.v1Val.textContent = q.v1.toFixed(1);
  els.v2Val.textContent = q.v2.toFixed(1);
  els.lossVal.textContent = q.loss.toFixed(0);
  els.playBtn.textContent = state.running ? '暂停' : '播放';
  els.readout.innerHTML = [
    `p前=<b>${q.p0.toFixed(3)}kg·m/s</b>`,
    `p后=<b>${q.p1.toFixed(3)}kg·m/s</b>`,
    `相对差≈<b>${q.rel.toFixed(1)}%</b>`,
    `Ek前=<b>${q.k0.toFixed(3)}J</b>，Ek后=<b>${q.k1.toFixed(3)}J</b>`,
    q.ok ? '判定=<b>能用</b>' : '判定=<b>需重做</b>'
  ].join('<br>');
}
function loop(now) {
  if (!state.last) state.last = now;
  const dt = Math.min(0.04, (now - state.last) / 1000);
  state.last = now;
  if (state.running) {
    state.time += dt;
    if (state.time > 3.8) { state.time = 3.8; state.running = false; }
  }
  draw();
  requestAnimationFrame(loop);
}
function pos(evt) {
  const rect = canvas.getBoundingClientRect();
  return { x: (evt.clientX - rect.left) * canvas.width / rect.width, y: (evt.clientY - rect.top) * canvas.height / rect.height };
}
function hit(p) {
  return handles(calc()).find(h => Math.hypot(p.x - h.x, p.y - h.y) <= h.r + 8);
}
canvas.addEventListener('pointerdown', evt => {
  const h = hit(pos(evt));
  if (h) { state.drag = h.name; canvas.setPointerCapture(evt.pointerId); }
});
canvas.addEventListener('pointermove', evt => {
  const p = pos(evt), q = calc(), base = positions(q);
  if (!state.drag) { canvas.style.cursor = hit(p) ? 'grab' : 'default'; return; }
  if (state.drag === 'v1') setValues({ v1: (p.x - base.x1) / 34 });
  if (state.drag === 'v2') setValues({ v2: (p.x - base.x2) / 34 });
  if (state.drag === 'm1') setValues({ m1: (p.y - 174) / 42 });
  if (state.drag === 'm2') setValues({ m2: (p.y - 174) / 42 });
  draw();
});
canvas.addEventListener('pointerup', evt => { state.drag = null; try { canvas.releasePointerCapture(evt.pointerId); } catch (e) {} });
canvas.addEventListener('pointercancel', () => { state.drag = null; });
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  state.last = 0;
  if (state.time >= 3.8) state.time = 0;
  draw();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false; state.time = 0;
  state.records = [];
  setValues({ mode: 1, m1: 0.6, m2: 0.8, v1: 2, v2: 0, loss: 2 });
  renderRecords();
  draw();
});
els.recordBtn.addEventListener('click', () => {
  const q = calc();
  state.records.unshift({ p0: q.p0, p1: q.p1, rel: q.rel });
  state.records = state.records.slice(0, 4);
  renderRecords();
});
function renderRecords() {
  els.records.innerHTML = state.records.map((r, idx) =>
    `<tr><td>${idx + 1}</td><td>${r.p0.toFixed(3)}</td><td>${r.p1.toFixed(3)}</td><td>${r.rel.toFixed(1)}%</td></tr>`
  ).join('');
}
for (const id of ['mode', 'm1', 'm2', 'v1', 'v2', 'loss']) els[id].addEventListener('input', draw);
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-experiment.js"></script>
</body>
</html>
