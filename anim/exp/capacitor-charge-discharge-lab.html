<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观察电容器充、放电现象实验台</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f5f7fb; color: #102a43; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
  .root { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 12px; padding: 12px; min-height: 700px; }
  .stage { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; overflow: hidden; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; }
  .panel { display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 10px; }
  .task { background: #fff7e6; border-left: 4px solid #f0a500; color: #486581; font-size: 13px; line-height: 1.5; }
  .title { font-weight: 800; margin-bottom: 7px; color: #102a43; }
  .param { display: grid; gap: 2px; margin: 8px 0; font-size: 13px; }
  .param span { display: flex; justify-content: space-between; color: #486581; gap: 8px; }
  .param b { color: #102a43; font-variant-numeric: tabular-nums; white-space: nowrap; }
  input[type=range] { width: 100%; accent-color: #2c7be5; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  button { border: 1px solid #b0bcc9; background: #fff; border-radius: 6px; padding: 7px 8px; cursor: pointer; font: inherit; font-size: 13px; }
  button:hover { background: #eef2f7; }
  .readout { background: #102a43; color: #d9e2ec; border-radius: 8px; padding: 10px; line-height: 1.65; font-size: 13px; }
  .readout b { color: #ffd166; font-variant-numeric: tabular-nums; }
  .status { border: 1px solid #38b2ac; background: #e6fffa; color: #087f5b; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 800; line-height: 1.45; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  .formula { font-size: 13px; color: #334e68; line-height: 1.6; }
  @media (max-width: 820px) { .root { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="root">
  <div class="stage">
    <canvas id="canvas" width="900" height="620" aria-label="电容器充放电实验台：电路俯视装置、极板侧视、U-t/I-t图像和数据记录"></canvas>
  </div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动画面内三挡开关到“充电/断开/放电”，看电压表、电流表、灯泡亮度和 U-t/I-t 图像怎样同步变化；记录多组点后判断时间常数 τ=RC。</div>
    <div class="card">
      <div class="title">调仪器</div>
      <label class="param"><span>电阻 R <b id="rLabel">20 kΩ</b></span><input id="r" type="range" min="5" max="80" step="1" value="20"></label>
      <label class="param"><span>电容 C <b id="cLabel">100 μF</b></span><input id="c" type="range" min="20" max="300" step="5" value="100"></label>
      <label class="param"><span>电源电压 E <b id="eLabel">6.0 V</b></span><input id="e" type="range" min="3" max="12" step="0.5" value="6"></label>
      <div class="buttons"><button id="play">暂停</button><button id="record">记录点</button><button id="reset">重置</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card">
      <div class="title">数据记录</div>
      <table>
        <thead><tr><th>状态</th><th>t/s</th><th>Uc/V</th><th>I/mA</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="card formula">
      <div class="title">公式与图像</div>
      <div>充电：Uc = E(1-e<sup>-t/RC</sup>)，I = (E/R)e<sup>-t/RC</sup></div>
      <div>放电：Uc = U0e<sup>-t/RC</sup>，I = -(U0/R)e<sup>-t/RC</sup></div>
      <div>图像法：Uc 达到 0.632E 的时间约为 τ=RC。</div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const els = {
    r: document.getElementById('r'), c: document.getElementById('c'), e: document.getElementById('e'),
    rLabel: document.getElementById('rLabel'), cLabel: document.getElementById('cLabel'), eLabel: document.getElementById('eLabel'),
    readout: document.getElementById('readout'), rows: document.getElementById('rows'), status: document.getElementById('status'),
    play: document.getElementById('play')
  };
  const state = { mode: 'charge', running: true, t: 0, Uc: 0, I: 0, drag: null, probe: null, history: [], records: [] };
  const colors = { ink: '#102a43', muted: '#486581', blue: '#2c7be5', red: '#e03131', green: '#087f5b', gold: '#f0a500', purple: '#7c3aed' };

  function param() {
    return { Rk: +els.r.value, Cu: +els.c.value, E: +els.e.value };
  }
  function tau() {
    const p = param();
    return p.Rk * 1000 * p.Cu * 1e-6;
  }
  function fmt(n, d=2) { return Math.abs(n) < 1e-9 ? (0).toFixed(d) : n.toFixed(d); }
  function text(s, x, y, color=colors.ink, align='center', size=13, weight='700') {
    ctx.fillStyle = color; ctx.font = weight + ' ' + size + 'px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = align; ctx.textBaseline = 'middle'; ctx.fillText(s, x, y);
  }
  function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash) {
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=w; if (dash) ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
  }
  function box(x,y,w,h,fill='#fff',stroke='#d9e2ec') {
    ctx.save(); ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.fill(); ctx.stroke(); ctx.restore();
  }
  function arrow(x1,y1,x2,y2,c,w=3) {
    const a = Math.atan2(y2-y1,x2-x1);
    line(x1,y1,x2,y2,c,w);
    ctx.save(); ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-10*Math.cos(a-.45), y2-10*Math.sin(a-.45));
    ctx.lineTo(x2-10*Math.cos(a+.45), y2-10*Math.sin(a+.45));
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  function switchPos() {
    return { charge:{x:150,y:122}, open:{x:225,y:122}, discharge:{x:300,y:122} }[state.mode];
  }
  function setModeFromX(x) {
    state.mode = x < 188 ? 'charge' : (x < 263 ? 'open' : 'discharge');
    state.t = 0;
    state.history = [];
  }
  function circuit() {
    box(40,62,390,230,'#fbfdff');
    text('电路俯视装置：拖动三挡开关',235,84,colors.ink,'center',15,'800');
    line(92,170,340,170,'#334e68',3);
    line(92,170,92,255,'#334e68',3); line(340,170,340,255,'#334e68',3);
    box(70,250,58,34,'#e6fffa','#38b2ac'); text('电源 E',99,267,colors.green,'center',12,'800');
    box(304,250,72,34,'#fff7e6','#f0a500'); text('R',340,267,colors.gold,'center',14,'900');
    line(183,238,183,282,'#2c7be5',5); line(205,238,205,282,'#2c7be5',5);
    text('C',194,224,colors.blue,'center',14,'900');
    text('+',166,244,colors.red,'center',17,'900'); text('-',222,244,colors.blue,'center',17,'900');
    const qDots = Math.round(Math.max(0, state.Uc / Math.max(0.1, param().E)) * 7);
    for (let i=0;i<qDots;i++) {
      text('+',166,256+i*3.6,colors.red,'center',11,'900');
      text('-',222,256+i*3.6,colors.blue,'center',11,'900');
    }
    ['charge','open','discharge'].forEach((m,i)=>{
      const x = 150 + i*75;
      box(x-28,102,56,40, state.mode===m ? '#e0f2fe' : '#fff', state.mode===m ? '#2c7be5' : '#d9e2ec');
      text(m==='charge'?'充电':m==='open'?'断开':'放电', x,122, state.mode===m?colors.blue:colors.muted,'center',12,'900');
    });
    const sw = switchPos();
    ctx.fillStyle = colors.purple; ctx.beginPath(); ctx.arc(sw.x, sw.y+48, 11, 0, Math.PI*2); ctx.fill();
    arrow(sw.x, sw.y+39, sw.x, sw.y+10, colors.purple, 3);
    const bright = Math.min(1, Math.abs(state.I) / Math.max(0.0001, param().E / (param().Rk*1000)));
    ctx.save();
    ctx.shadowColor = `rgba(240,165,0,${0.25+0.6*bright})`; ctx.shadowBlur = 22*bright;
    ctx.fillStyle = `rgba(240,165,0,${0.15+0.75*bright})`; ctx.beginPath(); ctx.arc(405,170,20,0,Math.PI*2); ctx.fill();
    ctx.restore(); text('灯',405,170,colors.ink,'center',12,'900');
    if (Math.abs(state.I)>1e-5) arrow(120,170,165,170,state.I>0?colors.red:colors.blue,3);
  }
  function meters() {
    box(462,62,380,230,'#fff');
    text('极板侧视 + 仪表读数',652,84,colors.ink,'center',15,'800');
    const p=param();
    const vH = 150 * state.Uc / Math.max(1,p.E);
    box(502,116,72,150,'#eef2ff','#9fb3c8'); line(538,266,538,266-vH,colors.blue,10);
    text('电压表 V',538,104,colors.blue,'center',12,'800'); text(fmt(state.Uc,2)+' V',538,284,colors.blue,'center',14,'900');
    const iMax = p.E/(p.Rk*1000);
    const iRatio = Math.min(1, Math.abs(state.I)/Math.max(0.00001,iMax));
    box(626,116,72,150,'#fff0f0','#ffb3b3'); line(662,266,662,266-150*iRatio,colors.red,10);
    text('电流表 A',662,104,colors.red,'center',12,'800'); text(fmt(state.I*1000,2)+' mA',662,284,colors.red,'center',14,'900');
    box(748,116,58,150,'#f8fafc','#d9e2ec');
    line(758,246,796,246,colors.green,3); line(758,246-95,796,246-95,colors.gold,2,[4,4]);
    text('0.632E',777,246-105,colors.gold,'center',11,'800');
    text('τ=RC='+fmt(tau(),2)+' s',777,284,colors.green,'center',12,'900');
  }
  function graphs() {
    box(40,326,802,250,'#fff');
    text('U-t / I-t 图像与探针读数',441,350,colors.ink,'center',15,'800');
    const gx=86, gy=540, gw=700, gh=150;
    line(gx,gy,gx+gw,gy,'#334e68',2); line(gx,gy,gx,gy-gh,'#334e68',2);
    text('t/s',gx+gw+18,gy+8,colors.muted,'left',12,'700'); text('U, I',gx-10,gy-gh,colors.muted,'right',12,'700');
    for (let k=1;k<=4;k++) line(gx,gy-gh*k/4,gx+gw,gy-gh*k/4,'#e8eef5',1);
    const p=param();
    const maxT = Math.max(3*tau(), 1);
    function px(t){ return gx + Math.min(1,t/maxT)*gw; }
    function pyU(u){ return gy - Math.max(0,Math.min(1,u/Math.max(1,p.E)))*gh; }
    function pyI(i){
      const im = p.E/(p.Rk*1000);
      return gy - Math.max(-1,Math.min(1,i/Math.max(0.00001,im)))*gh/2 - gh/2;
    }
    ctx.lineWidth=3; ctx.strokeStyle=colors.blue; ctx.beginPath();
    state.history.forEach((h,i)=>{ const x=px(h.t), y=pyU(h.U); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
    ctx.strokeStyle=colors.red; ctx.beginPath();
    state.history.forEach((h,i)=>{ const x=px(h.t), y=pyI(h.I); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
    text('蓝：Uc',gx+70,gy-gh-18,colors.blue,'left',12,'900'); text('红：I',gx+140,gy-gh-18,colors.red,'left',12,'900');
    const tauX = px(tau()); line(tauX,gy,tauX,gy-gh,colors.gold,2,[5,5]); text('τ',tauX,gy+16,colors.gold,'center',12,'900');
    const latest = state.history[state.history.length-1];
    if (latest) {
      const x=px(latest.t), y=pyU(latest.U); ctx.fillStyle=colors.blue; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
      if (state.probe) {
        const idx = Math.max(0, Math.min(state.history.length-1, Math.round(state.probe * (state.history.length-1))));
        const h = state.history[idx]; const qx = px(h.t);
        line(qx,gy,qx,gy-gh,colors.purple,2,[3,4]);
        text('探针 t='+fmt(h.t,2)+'s U='+fmt(h.U,2)+'V I='+fmt(h.I*1000,2)+'mA', qx, gy-gh-36, colors.purple, 'center', 12, '900');
      }
    }
  }
  function updatePanel() {
    const p=param();
    els.rLabel.textContent = p.Rk.toFixed(0)+' kΩ';
    els.cLabel.textContent = p.Cu.toFixed(0)+' μF';
    els.eLabel.textContent = p.E.toFixed(1)+' V';
    els.readout.innerHTML =
      '开关状态：<b>' + (state.mode==='charge'?'充电':state.mode==='open'?'断开':'放电') + '</b><br>' +
      '电压表 Uc：<b>' + fmt(state.Uc,2) + ' V</b><br>' +
      '电流表 I：<b>' + fmt(state.I*1000,2) + ' mA</b><br>' +
      '时间常数 τ=RC：<b>' + fmt(tau(),2) + ' s</b>';
    els.rows.innerHTML = state.records.slice(-6).map(r =>
      '<tr><td>'+r.mode+'</td><td>'+fmt(r.t,2)+'</td><td>'+fmt(r.U,2)+'</td><td>'+fmt(r.I*1000,2)+'</td></tr>'
    ).join('') || '<tr><td colspan="4">暂无记录</td></tr>';
    if (state.mode === 'charge') els.status.textContent = '充电：Uc 上升，I 逐渐衰减；约 t=RC 时 Uc≈0.632E。';
    else if (state.mode === 'discharge') els.status.textContent = '放电：Uc 和灯泡亮度都衰减，电流方向与充电相反。';
    else els.status.textContent = '断开：理想电容器电压近似保持，电路电流为 0。';
  }
  function step(dt) {
    const p=param(), T=tau();
    state.t += dt;
    if (state.mode === 'charge') {
      const du = (p.E - state.Uc) * (1 - Math.exp(-dt/T));
      state.Uc += du;
      state.I = (p.E - state.Uc) / (p.Rk*1000);
    } else if (state.mode === 'discharge') {
      const old = state.Uc;
      state.Uc *= Math.exp(-dt/T);
      state.I = -(old - state.Uc) / (p.Rk*1000*Math.max(dt,0.001));
    } else {
      state.I = 0;
    }
    if (!state.history.length || state.t - state.history[state.history.length-1].t > 0.045) {
      state.history.push({ t: state.t, U: state.Uc, I: state.I });
      if (state.history.length > 260) state.history.shift();
    }
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const bg=ctx.createLinearGradient(0,0,0,canvas.height); bg.addColorStop(0,'#fbfdff'); bg.addColorStop(1,'#edf3f8');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
    text('E-21 电容器充放电实验台：电路俯视 + 极板侧视 + U-t/I-t 图像 + 数据记录',450,30,colors.ink,'center',18,'900');
    circuit(); meters(); graphs(); updatePanel();
  }
  function pos(ev){ const r=canvas.getBoundingClientRect(); return {x:(ev.clientX-r.left)*canvas.width/r.width, y:(ev.clientY-r.top)*canvas.height/r.height}; }
  canvas.addEventListener('pointerdown', ev => {
    const p=pos(ev);
    const sw=switchPos();
    if (Math.hypot(p.x-sw.x,p.y-(sw.y+48))<32 || (p.y>95&&p.y<165&&p.x>115&&p.x<335)) {
      state.drag='switch'; canvas.setPointerCapture(ev.pointerId); setModeFromX(p.x); draw(); ev.preventDefault(); return;
    }
    if (p.x>86&&p.x<786&&p.y>390&&p.y<550) {
      state.drag='probe'; state.probe=(p.x-86)/700; canvas.setPointerCapture(ev.pointerId); draw(); ev.preventDefault();
    }
  });
  canvas.addEventListener('pointermove', ev => {
    if (!state.drag) return;
    const p=pos(ev);
    if (state.drag==='switch') setModeFromX(p.x);
    if (state.drag==='probe') state.probe=Math.max(0,Math.min(1,(p.x-86)/700));
    draw(); ev.preventDefault();
  });
  canvas.addEventListener('pointerup', ev => { state.drag=null; try{canvas.releasePointerCapture(ev.pointerId)}catch(e){} });
  canvas.addEventListener('pointercancel', () => { state.drag=null; });
  [els.r,els.c,els.e].forEach(el => el.addEventListener('input', draw));
  els.play.addEventListener('click', () => { state.running=!state.running; els.play.textContent=state.running?'暂停':'播放'; });
  document.getElementById('reset').addEventListener('click', () => { state.mode='charge'; state.running=true; state.t=0; state.Uc=0; state.I=0; state.probe=null; state.history=[]; state.records=[]; els.r.value=20; els.c.value=100; els.e.value=6; els.play.textContent='暂停'; draw(); });
  document.getElementById('record').addEventListener('click', () => {
    state.records.push({ mode: state.mode==='charge'?'充电':state.mode==='open'?'断开':'放电', t: state.t, U: state.Uc, I: state.I });
    if (state.records.length>8) state.records.shift();
    draw();
  });
  let last=performance.now();
  function loop(now) {
    const dt=Math.min(0.04,(now-last)/1000); last=now;
    if (state.running && !state.drag) step(dt*1.6);
    draw();
    requestAnimationFrame(loop);
  }
  draw(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
