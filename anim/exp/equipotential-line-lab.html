<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>描绘电场等势线</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="导电纸描绘等势线实验"></canvas>
    <section class="panel">
      <label for="voltage">电源电压 U/V：<span id="voltageVal"></span></label>
      <input id="voltage" type="range" min="4" max="16" value="10" step="1">
      <label for="spacing">电极间距 d/cm：<span id="spacingVal"></span></label>
      <input id="spacing" type="range" min="12" max="28" value="20" step="1">
      <label for="target">目标电势 φ/V：<span id="targetVal"></span></label>
      <input id="target" type="range" min="1" max="9" value="5" step="0.5">
      <label for="probeX">探针横坐标 x/cm：<span id="probeXVal"></span></label>
      <input id="probeX" type="range" min="0" max="20" value="10" step="0.5">
      <label for="probeY">探针纵坐标 y/cm：<span id="probeYVal"></span></label>
      <input id="probeY" type="range" min="-8" max="8" value="3" step="0.5">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：移动探针，让电压表读数接近目标电势；把这些点连起来，就是一条等势线。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  voltage: document.getElementById('voltage'),
  spacing: document.getElementById('spacing'),
  target: document.getElementById('target'),
  probeX: document.getElementById('probeX'),
  probeY: document.getElementById('probeY'),
  voltageVal: document.getElementById('voltageVal'),
  spacingVal: document.getElementById('spacingVal'),
  targetVal: document.getElementById('targetVal'),
  probeXVal: document.getElementById('probeXVal'),
  probeYVal: document.getElementById('probeYVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status')
};
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function drawArrow(x1, y1, x2, y2, color) {
  const a = Math.atan2(y2-y1, x2-x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10*Math.cos(a-0.45), y2 - 10*Math.sin(a-0.45));
  ctx.lineTo(x2 - 10*Math.cos(a+0.45), y2 - 10*Math.sin(a+0.45));
  ctx.closePath();
  ctx.fill();
}
function draw() {
  const U = Number(els.voltage.value);
  const d = Number(els.spacing.value);
  let target = Number(els.target.value);
  if (target >= U) target = U - 0.5;
  const xCm = Number(els.probeX.value);
  const yCm = Number(els.probeY.value);
  const phi = U * (1 - clamp(xCm, 0, d) / d);
  const diff = Math.abs(phi - target);
  const E = U / (d / 100);
  const targetX = d * (1 - target / U);
  const match = diff <= 0.25;
  els.voltageVal.textContent = U.toFixed(0);
  els.spacingVal.textContent = d.toFixed(0);
  els.targetVal.textContent = target.toFixed(1);
  els.probeXVal.textContent = xCm.toFixed(1);
  els.probeYVal.textContent = yCm.toFixed(1);

  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('导电纸描点：同一电势的点连成等势线', 350, 30);

  const ox = 92, oy = 88, w = 420, h = 270;
  const sx = w / d, sy = h / 18;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(ox, oy, w, h);
  ctx.strokeRect(ox, oy, w, h);
  for (let i = 0; i <= d; i += 4) {
    const x = ox + i * sx;
    ctx.strokeStyle = '#e5ecf3';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, oy);
    ctx.lineTo(x, oy + h);
    ctx.stroke();
  }
  for (let j = -8; j <= 8; j += 4) {
    const y = oy + h/2 - j * sy;
    ctx.strokeStyle = '#e5ecf3';
    ctx.beginPath();
    ctx.moveTo(ox, y);
    ctx.lineTo(ox + w, y);
    ctx.stroke();
  }
  ctx.fillStyle = '#e03131';
  ctx.fillRect(ox - 12, oy, 12, h);
  ctx.fillStyle = '#2c7be5';
  ctx.fillRect(ox + w, oy, 12, h);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('+ ' + U.toFixed(0) + 'V', ox - 10, oy - 14);
  ctx.fillText('0V', ox + w + 12, oy - 14);

  for (let p = 0.2; p < 1; p += 0.2) {
    const lineX = ox + d * (1 - p) * sx;
    ctx.strokeStyle = '#2c7be5';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.beginPath();
    ctx.moveTo(lineX, oy + 12);
    ctx.lineTo(lineX, oy + h - 12);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#2c7be5';
    ctx.font = '12px system-ui';
    ctx.fillText((U*p).toFixed(0) + 'V', lineX, oy + h + 18);
  }
  const tx = ox + targetX * sx;
  ctx.strokeStyle = '#7b2cbf';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(tx, oy + 8);
  ctx.lineTo(tx, oy + h - 8);
  ctx.stroke();
  ctx.fillStyle = '#7b2cbf';
  ctx.font = '700 13px system-ui';
  ctx.fillText('目标等势线 ' + target.toFixed(1) + 'V', tx, oy + h + 40);

  for (let j = 0; j < 5; j++) {
    const y = oy + 45 + j * 45;
    drawArrow(ox + 42, y, ox + w - 42, y, '#e03131');
  }
  ctx.fillStyle = '#e03131';
  ctx.font = '700 13px system-ui';
  ctx.fillText('电场线方向：高电势 → 低电势，且垂直等势线', ox + w/2, oy - 34);

  const px = ox + clamp(xCm, 0, d) * sx;
  const py = oy + h/2 - yCm * sy;
  ctx.fillStyle = match ? '#087f5b' : '#f08c00';
  ctx.strokeStyle = '#102a43';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px, py, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 12px system-ui';
  ctx.fillText('探针', px + 28, py - 12);

  const gx = 548, gy = 350, gw = 108, gh = 220;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx, gy);
  ctx.lineTo(gx + gw, gy);
  ctx.moveTo(gx, gy);
  ctx.lineTo(gx, gy - gh);
  ctx.stroke();
  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(gx, gy - gh);
  ctx.lineTo(gx + gw, gy);
  ctx.stroke();
  const ppx = gx + clamp(xCm/d, 0, 1) * gw;
  const ppy = gy - clamp(phi/U, 0, 1) * gh;
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(ppx, ppy, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('φ-x 图像', gx + 54, gy + 26);
  ctx.fillText('φ', gx - 16, gy - gh - 4);
  ctx.fillText('x', gx + gw + 10, gy + 4);

  els.readout.innerHTML = [
    `<div id="r1">探针电势 φ≈${phi.toFixed(2)}V</div>`,
    `<div id="r2">目标电势 φ0=${target.toFixed(2)}V，差值≈${diff.toFixed(2)}V</div>`,
    `<div id="r3">等势线位置 x=d(1-φ0/U)≈${targetX.toFixed(1)}cm</div>`,
    `<div id="r4">场强估计 E≈U/d=${E.toFixed(0)}V/m</div>`,
    `<div id="r5">沿等势线移动：UAB=0，W=qUAB=0</div>`
  ].join('');
  els.status.className = match ? 'status' : 'status bad';
  els.status.textContent = match
    ? '通过：探针读数接近目标电势，可以把该点标在等势线上。'
    : '继续找点：横向移动探针，让读数接近目标电势。';
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
