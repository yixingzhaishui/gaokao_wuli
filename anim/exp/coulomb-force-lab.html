<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>探究库仑力</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 540px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  button { border: 1px solid #bcccdc; background: #fff; color: #243b53; border-radius: 8px; padding: 8px 6px; font-weight: 800; cursor: pointer; }
  button.primary { background: #2c7be5; border-color: #2c7be5; color: #fff; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 11px; }
  input { width: 100%; }
  .readout { margin-top: 12px; padding: 11px; background: #eef4ff; border-radius: 8px; line-height: 1.68; font-size: 14px; }
  .status { margin-top: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.58; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border-bottom: 1px solid #d9e2ec; padding: 4px 3px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  @media (max-width: 820px) { .stage { grid-template-columns: 1fr; } canvas { height: 460px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="740" height="540" aria-label="库仑扭秤实验台：带电小球俯视、扭秤读数、F-1/r²图像和数据记录"></canvas>
    <section class="panel">
      <div class="row">
        <button id="playBtn" class="primary" type="button">播放</button>
        <button id="recordBtn" type="button">记录</button>
        <button id="resetBtn" type="button">重置</button>
      </div>
      <label for="q1">电荷 q1/nC：<span id="q1Val"></span></label>
      <input id="q1" type="range" min="-50" max="50" value="20" step="5">
      <label for="q2">电荷 q2/nC：<span id="q2Val"></span></label>
      <input id="q2" type="range" min="-50" max="50" value="30" step="5">
      <label for="dist">球心距离 r/m：<span id="distVal"></span></label>
      <input id="dist" type="range" min="0.06" max="0.24" value="0.10" step="0.01">
      <label for="mode">图像横轴：<span id="modeVal"></span></label>
      <input id="mode" type="range" min="0" max="1" value="1" step="1">
      <label for="leak">电荷漏失/读数误差：<span id="leakVal"></span></label>
      <input id="leak" type="range" min="0" max="12" value="2" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：直接拖动右侧小球改变 r；点“播放”看扭秤读数逐渐偏转，记录多组点后比较 F 与 1/r² 是否成正比。</div>
      <table aria-label="库仑力数据记录">
        <thead><tr><th>组</th><th>r/m</th><th>F/mN</th><th>方向</th></tr></thead>
        <tbody id="recordRows"></tbody>
      </table>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  playBtn: document.getElementById('playBtn'),
  recordBtn: document.getElementById('recordBtn'),
  resetBtn: document.getElementById('resetBtn'),
  q1: document.getElementById('q1'),
  q2: document.getElementById('q2'),
  dist: document.getElementById('dist'),
  mode: document.getElementById('mode'),
  leak: document.getElementById('leak'),
  q1Val: document.getElementById('q1Val'),
  q2Val: document.getElementById('q2Val'),
  distVal: document.getElementById('distVal'),
  modeVal: document.getElementById('modeVal'),
  leakVal: document.getElementById('leakVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status'),
  recordRows: document.getElementById('recordRows')
};
const k0 = 8.99e9;
const state = { running: false, last: 0, time: 0, meter: 0, drag: null, records: [], rejected: 0 };
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function force(q1n, q2n, r) { return k0 * Math.abs(q1n * 1e-9 * q2n * 1e-9) / (r * r); }
function fmtF(f) { return f >= 0.001 ? f.toFixed(4) : (f * 1000).toFixed(3) + 'm'; }
function values() {
  const q1 = Number(els.q1.value);
  const q2 = Number(els.q2.value);
  const r = Number(els.dist.value);
  const mode = Number(els.mode.value);
  const leak = Number(els.leak.value);
  const F = force(q1, q2, r);
  const Fsettled = F * (1 - leak / 100);
  const Fread = Fsettled * state.meter;
  const kMeas = Math.abs(q1 * q2) > 0 ? Fread * r * r / Math.abs(q1 * 1e-9 * q2 * 1e-9) : 0;
  const rel = Math.abs(kMeas - k0) / k0 * 100;
  const relation = q1 * q2 > 0 ? '同号相斥' : q1 * q2 < 0 ? '异号相吸' : '有一球不带电';
  return { q1, q2, r, mode, leak, F, Fsettled, Fread, kMeas, rel, relation };
}
function drawCharge(x, y, q, label) {
  ctx.fillStyle = q >= 0 ? '#ffe8cc' : '#d0ebff';
  ctx.strokeStyle = q >= 0 ? '#f08c00' : '#2c7be5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(q >= 0 ? '+' : '-', x, y + 6);
  ctx.font = '13px system-ui';
  ctx.fillText(label, x, y + 52);
}
function drawGraph(v) {
  const x0 = 452, y0 = 424, w = 188, h = 210;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - h);
  ctx.stroke();
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + w, y0 - h);
  ctx.stroke();
  state.records.forEach(p => {
    const xVal = v.mode === 0 ? Math.abs(p.q1 * p.q2) / 2500 : (1 / (p.r * p.r) - 15) / 270;
    const yVal = p.F / 0.004;
    ctx.fillStyle = '#7b2cbf';
    ctx.beginPath();
    ctx.arc(x0 + clamp(xVal, 0, 1) * w, y0 - clamp(yVal, 0, 1) * h, 4, 0, Math.PI * 2);
    ctx.fill();
  });
  const xVal = v.mode === 0 ? Math.abs(v.q1 * v.q2) / 2500 : (1 / (v.r * v.r) - 15) / 270;
  const yVal = v.Fread / 0.004;
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(x0 + clamp(xVal, 0, 1) * w, y0 - clamp(yVal, 0, 1) * h, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText((v.mode === 0 ? 'F-|q1q2|' : 'F-1/r²') + ' 图像/数据记录', x0 + w / 2, y0 + 28);
}
function drawScene(v) {
  const x1 = 160, y = 220, x2 = 160 + v.r * 1250;
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#d9e2ec';
  ctx.lineWidth = 2;
  ctx.fillRect(48, 70, 342, 350);
  ctx.strokeRect(48, 70, 342, 350);
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('带电小球俯视实验台：拖动右侧小球改变 r', 219, 96);
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1, y - 106);
  ctx.lineTo(x1, y);
  ctx.stroke();
  drawCharge(x1, y, v.q1, 'q1');
  drawCharge(x2, y, v.q2, 'q2');
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y + 82);
  ctx.lineTo(x2, y + 82);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.fillText('r=' + v.r.toFixed(2) + 'm', (x1 + x2) / 2, y + 105);
  const attract = v.q1 * v.q2 < 0;
  const len = clamp(v.Fread / 0.004 * 72, 8, 72);
  if (v.q1 * v.q2 !== 0) {
    ctx.strokeStyle = '#e03131';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(x1, y - 48);
    ctx.lineTo(x1 + (attract ? len : -len), y - 48);
    ctx.moveTo(x2, y - 48);
    ctx.lineTo(x2 + (attract ? -len : len), y - 48);
    ctx.stroke();
  }
  ctx.fillStyle = '#e03131';
  ctx.font = '700 13px system-ui';
  ctx.fillText(v.relation, (x1 + x2) / 2, y - 58);
  ctx.fillStyle = '#fff7e6';
  ctx.strokeStyle = '#f0a500';
  ctx.fillRect(76, 352, 286, 44);
  ctx.strokeRect(76, 352, 286, 44);
  ctx.fillStyle = '#2c7be5';
  ctx.fillRect(88, 369, Math.min(262, v.Fread / 0.004 * 262), 12);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('扭秤读数 F≈' + fmtF(v.Fread) + 'N', 219, 388);
}
function draw() {
  const v = values();
  els.q1Val.textContent = v.q1;
  els.q2Val.textContent = v.q2;
  els.distVal.textContent = v.r.toFixed(2);
  els.modeVal.textContent = v.mode === 0 ? '|q1q2|' : '1/r²';
  els.leakVal.textContent = v.leak + '%';
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('库仑扭秤实验台：带电小球俯视 + 扭秤读数 + F-1/r²图像 + 数据记录', 370, 28);
  drawScene(v);
  drawGraph(v);
  els.readout.innerHTML = [
    `<div id="r1">方向：${v.relation}</div>`,
    `<div id="r2">F理论=k|q1q2|/r²≈${fmtF(v.F)}N</div>`,
    `<div id="r3">F读≈${fmtF(v.Fread)}N</div>`,
    `<div id="r4">F·r²/|q1q2|≈${(v.kMeas / 1e9).toFixed(2)}×10^9</div>`,
    `<div id="r5">相对误差≈${v.rel.toFixed(1)}%</div>`
  ].join('');
  const settled = state.meter >= 0.99;
  els.status.className = settled && v.rel < 5 && v.q1 * v.q2 !== 0 ? 'status' : 'status bad';
  els.status.textContent = v.q1 * v.q2 === 0 ? '不通过：有电荷为 0，无法验证库仑力关系。' : !settled ? (state.rejected ? '已拒绝未稳定读数（'+state.rejected+' 次）：继续播放，待扭秤稳定后再记录。' : '等待：扭秤尚未稳定，当前读数不能反查静电力常量。') : (v.rel < 5 ? '通过：稳定读数反查的静电力常量接近 9.0×10^9。' : '不通过：漏电或读数误差使实验点明显偏离库仑定律。');
  window.__EXP_TEST_STATE__={...v,meter:state.meter,settled,recordCount:state.records.length};
}
function renderRecords() {
  els.recordRows.innerHTML = state.records.slice(-5).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.r.toFixed(2)}</td><td>${(p.F * 1000).toFixed(2)}</td><td>${p.relation}</td></tr>`
  ).join('');
}
function setDistFromPointer(ev) {
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * c.width / rect.width;
  const r = clamp((x - 160) / 1250, 0.06, 0.24);
  els.dist.value = r.toFixed(2);
  state.meter = 0;
  draw();
}
function loop(ts) {
  if (!state.last) state.last = ts;
  const dt = Math.min(0.05, (ts - state.last) / 1000);
  state.last = ts;
  if (state.running) {
    state.time += dt;
    state.meter += (1 - state.meter) * dt * 2.8;
  }
  draw();
  requestAnimationFrame(loop);
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', () => { state.meter = 0; state.rejected=0; draw(); });
});
els.playBtn.addEventListener('click', () => {
  state.running = !state.running;
  if (state.running) { state.meter = 0; state.rejected=0; }
  els.playBtn.textContent = state.running ? '暂停' : '播放';
});
els.recordBtn.addEventListener('click', () => {
  const v = values();
  if (state.meter < 0.99) { state.rejected++; draw(); return; }
  state.records.push({ q1: v.q1, q2: v.q2, r: v.r, F: v.Fread, relation: v.relation });
  renderRecords();
});
els.resetBtn.addEventListener('click', () => {
  state.running = false;
  state.meter = 0;
  state.rejected = 0;
  state.records = [];
  els.q1.value = '20';
  els.q2.value = '30';
  els.dist.value = '0.10';
  els.mode.value = '1';
  els.leak.value = '2';
  els.playBtn.textContent = '播放';
  renderRecords();
  draw();
});
c.addEventListener('pointerdown', ev => {
  state.drag = 'charged-ball-handle';
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointermove', ev => {
  if (!state.drag) return;
  setDistFromPointer(ev);
  ev.preventDefault();
});
c.addEventListener('pointerup', () => { state.drag = null; });
c.addEventListener('pointerleave', () => { state.drag = null; });
state.meter = 0;
renderRecords();
requestAnimationFrame(loop);
</script>
<script src="guided-experiment.js"></script>
</body>
</html>
