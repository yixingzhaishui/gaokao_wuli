<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>变压器匝数与电压关系实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:12px;padding:12px;min-height:690px}
  .stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  .panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}
  .task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}
  .buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}
  button.active{background:#2c7be5;border-color:#2c7be5;color:#fff;font-weight:800}
  .param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}
  .readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}
  table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}th:first-child,td:first-child{text-align:left}
  .formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="900" height="620" aria-label="变压器实验台：铁芯线圈侧视装置、电压表、电流表、U2-n2图像和数据记录"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>保持原线圈匝数和输入交流电压不变，拖动副线圈匝数滑块或画面中的副线圈；看副线圈电压表读数是否随 n2 成正比变化。</div>
    <div class="card">
      <div class="title">实验条件</div>
      <label class="param"><span>原线圈匝数 n1 <b id="n1Label">800</b></span><input id="n1" type="range" min="200" max="1200" step="50" value="800"></label>
      <label class="param"><span>副线圈匝数 n2 <b id="n2Label">200</b></span><input id="n2" type="range" min="50" max="1000" step="50" value="200"></label>
      <label class="param"><span>原边电压 U1 <b id="u1Label">12.0 V</b></span><input id="u1" type="range" min="2" max="24" step="0.5" value="12"></label>
      <label class="param"><span>负载电阻 R <b id="rLabel">24 Ω</b></span><input id="load" type="range" min="6" max="80" step="2" value="24"></label>
      <div class="buttons"><button id="play">播放</button><button id="record">记录</button><button id="reset">重置</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">数据记录</div><table><thead><tr><th>n2/n1</th><th>U1/V</th><th>U2/V</th><th>U2/U1</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula"><div class="title">规律</div><div>理想变压器：U1/U2 = n1/n2，即 U2 = U1·n2/n1。</div><div>负载会改变电流和功率；空载或轻载时更适合验证电压比。</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const ids=['n1','n2','u1','load','n1Label','n2Label','u1Label','rLabel','readout','rows','status','play'];
  const el=Object.fromEntries(ids.map(k=>[k,document.getElementById(k)]));
  const state={phase:0,playing:false,drag:null,records:[]};
  const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};
  function val(){const n1=+el.n1.value,n2=+el.n2.value,u1=+el.u1.value,R=+el.load.value,u2=u1*n2/n1,i2=u2/R,p2=u2*i2,i1=p2/u1;return{n1,n2,u1,R,u2,i2,i1,p2,ratio:n2/n1,type:n2>n1?'升压':n2<n1?'降压':'等压'};}
  function fmt(n,d=2){return(Math.abs(n)<1e-9?0:n).toFixed(d)}
  function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
  function meter(x,y,label,display,numeric,c){box(x-58,y-42,116,84,'#fbfdff');text(label,x,y-22,colors.muted,'center',12,'900');ctx.save();ctx.translate(x,y+8);ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,36,Math.PI,0);ctx.stroke();const a=-0.95+Math.min(1.9,Math.abs(numeric)/32*1.9);arrow(0,0,32*Math.cos(Math.PI-a),-32*Math.sin(Math.PI-a),c,3);ctx.restore();text(display,x,y+31,c,'center',14,'900')}
  function drawCoils(v){box(42,70,810,262,'#fff');text('铁芯互感装置：原线圈通交流电，副线圈感应交流电压',447,98,colors.ink,'center',16,'900');ctx.save();ctx.strokeStyle='#334e68';ctx.lineWidth=16;ctx.beginPath();ctx.roundRect(310,130,280,145,22);ctx.stroke();ctx.restore();const pTurns=Math.round(v.n1/80),sTurns=Math.round(v.n2/80);for(let i=0;i<pTurns;i++){ctx.strokeStyle=colors.blue;ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(305-i*5,202,15,62,0,0,Math.PI*2);ctx.stroke()}for(let i=0;i<sTurns;i++){ctx.strokeStyle=colors.red;ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(595+i*5,202,15,62,0,0,Math.PI*2);ctx.stroke()}text('原线圈 n1='+v.n1,220,286,colors.blue,'center',13,'900');text('副线圈 n2='+v.n2,682,286,colors.red,'center',13,'900');line(155,202,260,202,colors.ink,3);line(640,202,745,202,colors.ink,3);meter(137,202,'交流电压表 U1',fmt(v.u1,1)+' V',v.u1,colors.blue);meter(765,202,'交流电压表 U2',fmt(v.u2,1)+' V',v.u2,colors.red);const flux=60+18*Math.sin(state.phase);arrow(395,156+flux/6,505,156+flux/6,colors.green,3);arrow(505,244-flux/8,395,244-flux/8,colors.green,3);text('交变磁通 Φ',450,122,colors.green,'center',13,'900');const knobX=595+(v.n2-50)/(1000-50)*185;ctx.fillStyle=colors.purple;ctx.beginPath();ctx.arc(knobX,318,10,0,Math.PI*2);ctx.fill();text('拖动调 n2',knobX,342,colors.purple,'center',12,'900')}
  function drawWave(v){box(42,352,370,216,'#fff');text('交流输入与输出波形',227,378,colors.ink,'center',15,'900');const ox=74,oy=492,w=300,h=70;line(ox,oy,ox+w,oy,colors.ink,2);line(ox,oy-h,ox,oy+h,colors.ink,2);ctx.lineWidth=2.5;ctx.strokeStyle=colors.blue;ctx.beginPath();for(let i=0;i<=w;i++){const y=oy-Math.sin(i/35+state.phase)*h*.72;if(i===0)ctx.moveTo(ox+i,y);else ctx.lineTo(ox+i,y)}ctx.stroke();ctx.strokeStyle=colors.red;ctx.beginPath();const scale=Math.min(1.15,v.ratio);for(let i=0;i<=w;i++){const y=oy-Math.sin(i/35+state.phase)*h*.72*scale;if(i===0)ctx.moveTo(ox+i,y);else ctx.lineTo(ox+i,y)}ctx.stroke();text('蓝 U1',100,410,colors.blue,'left',12,'900');text('红 U2',165,410,colors.red,'left',12,'900')}
  function graphY(gy,gh,u){return gy-Math.min(1.05,u/32)*gh}
  function drawGraph(v){box(438,352,414,216,'#fff');text('U2-n2 作图：斜率 = U1/n1',645,378,colors.ink,'center',15,'900');const gx=486,gy=528,gw=310,gh=120;line(gx,gy,gx+gw,gy,colors.ink,2);line(gx,gy,gx,gy-gh,colors.ink,2);text('n2',gx+gw+18,gy,colors.muted,'center',12,'900');text('U2',gx,gy-gh-18,colors.muted,'center',12,'900');ctx.strokeStyle=colors.gold;ctx.lineWidth=2.5;ctx.beginPath();for(let n=50;n<=1000;n+=25){const x=gx+(n-50)/950*gw,y=graphY(gy,gh,+el.u1.value*n/+el.n1.value);if(n===50)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();state.records.forEach(r=>{const x=gx+(r.n2-50)/950*gw,y=graphY(gy,gh,r.u2);ctx.fillStyle=colors.purple;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill()});const x=gx+(v.n2-50)/950*gw,y=graphY(gy,gh,v.u2);ctx.fillStyle=colors.red;ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();text('当前点',x,y-16,colors.red,'center',12,'900')}
  function update(v){el.n1Label.textContent=v.n1;el.n2Label.textContent=v.n2;el.u1Label.textContent=fmt(v.u1,1)+' V';el.rLabel.textContent=v.R+' Ω';el.readout.innerHTML='类型：<b>'+v.type+'变压器</b><br>U2=U1·n2/n1：<b>'+fmt(v.u2,2)+' V</b><br>U2/U1：<b>'+fmt(v.u2/v.u1,3)+'</b><br>n2/n1：<b>'+fmt(v.ratio,3)+'</b><br>副边电流：<b>'+fmt(v.i2,2)+' A</b>';el.rows.innerHTML=state.records.slice(-6).map(r=>'<tr><td>'+fmt(r.ratio,3)+'</td><td>'+fmt(r.u1,1)+'</td><td>'+fmt(r.u2,2)+'</td><td>'+fmt(r.u2/r.u1,3)+'</td></tr>').join('')||'<tr><td colspan=\"4\">暂无记录</td></tr>';const err=Math.abs(v.u2/v.u1-v.ratio);el.status.textContent='验证：U2/U1 与 n2/n1 的差约为 '+fmt(err,3)+'。保持 U1、n1 不变时，U2-n2 图像应近似过原点直线。'}
  function draw(){const v=val();ctx.clearRect(0,0,900,620);const bg=ctx.createLinearGradient(0,0,0,620);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,620);text('E-24 变压器实验台：铁芯线圈侧视 + 波形图像 + U2-n2数据图线',450,34,colors.ink,'center',18,'900');drawCoils(v);drawWave(v);drawGraph(v);update(v)}
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
  canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.y>295&&p.y<350&&p.x>585&&p.x<790){state.drag='n2';canvas.setPointerCapture(e.pointerId);move(e);e.preventDefault()}});
  canvas.addEventListener('pointermove',move);function move(e){if(state.drag!=='n2')return;const p=pos(e);let n=50+(p.x-595)/185*950;n=Math.max(50,Math.min(1000,Math.round(n/50)*50));el.n2.value=n;draw();e.preventDefault()}
  canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);
  [el.n1,el.n2,el.u1,el.load].forEach(x=>x.addEventListener('input',draw));
  el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};
  document.getElementById('record').onclick=()=>{state.records.push(val());draw()};
  document.getElementById('reset').onclick=()=>{el.n1.value=800;el.n2.value=200;el.u1.value=12;el.load.value=24;state.phase=0;state.playing=false;state.records=[];el.play.textContent='播放';draw()};
  function loop(){if(state.playing)state.phase+=0.08;draw();requestAnimationFrame(loop)}
  draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
