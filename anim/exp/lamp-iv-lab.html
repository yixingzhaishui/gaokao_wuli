<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>描绘小灯泡伏安特性曲线</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="小灯泡伏安特性实验"></canvas>
    <section class="panel">
      <label for="voltage">灯泡两端电压 U/V：<span id="voltageVal"></span></label>
      <input id="voltage" type="range" min="0" max="3.0" value="1.5" step="0.1">
      <label for="rated">额定电压/V：<span id="ratedVal"></span></label>
      <input id="rated" type="range" min="2.0" max="6.0" value="3.0" step="0.5">
      <label for="coldR">冷态电阻 R0/Ω：<span id="coldRVal"></span></label>
      <input id="coldR" type="range" min="1" max="8" value="3" step="0.5">
      <label for="heat">温度效应：<span id="heatVal"></span></label>
      <input id="heat" type="range" min="0" max="180" value="120" step="10">
      <label for="error">读数误差：<span id="errorVal"></span></label>
      <input id="error" type="range" min="0" max="8" value="2" step="1">
      <div id="readout" class="readout"></div>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：逐步升高 U，看灯泡变亮时电阻 R=U/I 如何变大，I-U 曲线为何向下弯。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  voltage: document.getElementById('voltage'),
  rated: document.getElementById('rated'),
  coldR: document.getElementById('coldR'),
  heat: document.getElementById('heat'),
  error: document.getElementById('error'),
  voltageVal: document.getElementById('voltageVal'),
  ratedVal: document.getElementById('ratedVal'),
  coldRVal: document.getElementById('coldRVal'),
  heatVal: document.getElementById('heatVal'),
  errorVal: document.getElementById('errorVal'),
  readout: document.getElementById('readout'),
  status: document.getElementById('status')
};
function lamp(U, rated, R0, heat) {
  const ratio = rated > 0 ? U / rated : 0;
  const R = R0 * (1 + heat * ratio * ratio);
  return { R, I: R > 0 ? U / R : 0, P: R > 0 ? U * U / R : 0 };
}
function line(x1,y1,x2,y2,color,w=3) {
  ctx.strokeStyle = color || '#334e68';
  ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}
function meter(x,y,label,value) {
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x,y,34,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 15px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(label,x,y-6);
  ctx.font = '12px system-ui';
  ctx.fillText(value,x,y+14);
}
function draw() {
  const U = Number(els.voltage.value);
  const rated = Number(els.rated.value);
  const R0 = Number(els.coldR.value);
  const heat = Number(els.heat.value) / 100;
  const err = Number(els.error.value) / 100;
  const q = lamp(U, rated, R0, heat);
  const Iread = q.I * (1 - err);
  const Rmeas = Iread > 0 ? U / Iread : 0;
  const bright = Math.min(1, q.P / (rated*rated/(R0*(1+heat))));
  els.voltageVal.textContent = U.toFixed(1);
  els.ratedVal.textContent = rated.toFixed(1);
  els.coldRVal.textContent = R0.toFixed(1);
  els.heatVal.textContent = Math.round(heat*100) + '%';
  els.errorVal.textContent = Math.round(err*100) + '%';

  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('小灯泡伏安特性：灯丝升温，电阻增大，I-U 曲线弯曲', 350, 30);

  line(78,238,150,238);
  meter(190,238,'A',Iread.toFixed(3)+'A');
  line(224,238,330,238);
  ctx.fillStyle = `rgba(240,165,0,${0.12 + bright*0.68})`;
  ctx.strokeStyle = '#f08c00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(410,238,42,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(382,238);
  ctx.bezierCurveTo(394,210,426,266,438,238);
  ctx.stroke();
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('小灯泡',410,294);
  line(452,238,612,238);
  line(612,238,612,330);
  line(612,330,78,330);
  line(78,330,78,238);
  ctx.fillStyle = '#f7f9fc';
  ctx.strokeStyle = '#334e68';
  ctx.fillRect(112,306,88,48);
  ctx.strokeRect(112,306,88,48);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 13px system-ui';
  ctx.fillText('电源/滑变',156,335);
  meter(410,142,'V',U.toFixed(2)+'V');
  line(374,207,394,172,'#2c7be5',2);
  line(446,207,426,172,'#2c7be5',2);

  const gx = 470, gy = 405, gw = 160, gh = 230;
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx,gy);
  ctx.lineTo(gx+gw,gy);
  ctx.moveTo(gx,gy);
  ctx.lineTo(gx,gy-gh);
  ctx.stroke();
  ctx.strokeStyle = '#38b2ac';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let i=0;i<=30;i++) {
    const u = rated * i / 30;
    const qi = lamp(u, rated, R0, heat);
    const px = gx + u / rated * gw;
    const py = gy - Math.min(1, qi.I / (rated/R0)) * gh;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.strokeStyle = '#829ab1';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,5]);
  ctx.beginPath();
  ctx.moveTo(gx,gy);
  ctx.lineTo(gx+gw, gy - Math.min(1, (rated/R0)/(rated/R0))*gh);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e03131';
  ctx.beginPath();
  ctx.arc(gx + U/rated*gw, gy - Math.min(1, q.I/(rated/R0))*gh, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.fillText('实线：小灯泡', gx+74, gy+28);
  ctx.fillText('虚线：定值电阻', gx+88, gy+44);
  ctx.fillText('U', gx+gw+12, gy+4);
  ctx.fillText('I', gx-14, gy-gh-4);

  ctx.fillStyle = '#486581';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('读数链：每调一次滑动变阻器，记录一组 U、I，再把点描到 I-U 图像上。',350,452);

  els.readout.innerHTML = [
    `<div id="r1">U=${U.toFixed(2)}V，I读≈${Iread.toFixed(3)}A</div>`,
    `<div id="r2">R=U/I≈${Rmeas.toFixed(2)}Ω</div>`,
    `<div id="r3">P=UI≈${(U*Iread).toFixed(2)}W，亮度≈${Math.round(bright*100)}%</div>`,
    `<div id="r4">曲线斜率 ΔI/ΔU 逐渐减小，说明 R 逐渐增大</div>`,
    `<div id="r5">额定电压 ${rated.toFixed(1)}V，超过后不能继续加压</div>`
  ].join('');
  els.status.className = U <= rated ? 'status' : 'status bad';
  els.status.textContent = U <= rated
    ? '通过：当前点可记录到 I-U 图像；灯泡越亮，电阻越大。'
    : '不通过：超过额定电压，可能烧坏灯泡，应降低电压。';
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
