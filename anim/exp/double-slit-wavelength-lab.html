<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>双缝干涉测波长</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 286px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 470px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; touch-action:none; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .row { display:flex; gap:8px; margin-bottom:10px; }
  button { flex:1; border:1px solid #bcccdc; background:#f0f4f8; color:#102a43; border-radius:8px; padding:8px; font-weight:700; cursor:pointer; }
  button.primary { background:#2c7be5; border-color:#2c7be5; color:#fff; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.72; font-size: 14px; }
  .status { margin-top: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; line-height: 1.55; background: #e6fffa; color: #087f5b; font-weight: 700; }
  .status.bad { background: #fff5f5; color: #c92a2a; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 400px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="470" aria-label="双缝干涉测波长实验"></canvas>
    <section class="panel">
      <div class="row"><button id="playBtn" class="primary" type="button">播放</button><button id="resetBtn" type="button">重置</button><button id="recordBtn" type="button">记录</button></div>
      <label for="lambda">真实波长 λ/nm：<span id="lambdaVal"></span></label>
      <input id="lambda" type="range" min="400" max="700" value="550" step="10">
      <label for="slit">双缝间距 d/mm：<span id="slitVal"></span></label>
      <input id="slit" type="range" min="0.10" max="0.50" value="0.25" step="0.01">
      <label for="screenDistance">屏距 L/m：<span id="screenVal"></span></label>
      <input id="screenDistance" type="range" min="0.5" max="2.0" value="1.0" step="0.1">
      <label for="count">测量条纹数 N：<span id="countVal"></span></label>
      <input id="count" type="range" min="2" max="8" value="5" step="1">
      <label for="error">读数误差：<span id="errorVal"></span></label>
      <input id="error" type="range" min="-5" max="5" value="1" step="1">
      <div id="readout" class="readout"></div>
      <table style="width:100%;margin-top:10px;border-collapse:collapse;font-size:12px"><thead><tr><th style="text-align:left;border-bottom:1px solid #d9e2ec">记录</th><th style="border-bottom:1px solid #d9e2ec">NΔx/mm</th><th style="border-bottom:1px solid #d9e2ec">λ/nm</th></tr></thead><tbody id="records"></tbody></table>
      <div id="status" class="status"></div>
      <div class="hint">观察任务：改变 d 和 L，看条纹间距 Δx 如何变化；测多条条纹再除以 N 可减小误差。</div>
    </section>
  </div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const els={lambda:document.getElementById('lambda'),slit:document.getElementById('slit'),screenDistance:document.getElementById('screenDistance'),count:document.getElementById('count'),error:document.getElementById('error'),lambdaVal:document.getElementById('lambdaVal'),slitVal:document.getElementById('slitVal'),screenVal:document.getElementById('screenVal'),countVal:document.getElementById('countVal'),errorVal:document.getElementById('errorVal'),readout:document.getElementById('readout'),status:document.getElementById('status'),playBtn:document.getElementById('playBtn'),resetBtn:document.getElementById('resetBtn'),recordBtn:document.getElementById('recordBtn'),records:document.getElementById('records')};
const state={running:false,time:0,last:0,drag:null,records:[]};
function draw(){
  const lam=+els.lambda.value,dmm=+els.slit.value,L=+els.screenDistance.value,N=+els.count.value,err=+els.error.value/100;
  const dx=L*lam*1e-9/(dmm*1e-3); // m
  const width=N*dx*(1+err);
  const dxMeasured=width/N;
  const lamMeasured=dxMeasured*(dmm*1e-3)/L;
  const rel=Math.abs(lamMeasured-lam*1e-9)/(lam*1e-9)*100;
  els.lambdaVal.textContent=lam.toFixed(0);els.slitVal.textContent=dmm.toFixed(2);els.screenVal.textContent=L.toFixed(1);els.countVal.textContent=N;els.errorVal.textContent=Math.round(err*100)+'%';
  ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle='#102a43';ctx.font='700 18px system-ui';ctx.textAlign='center';ctx.fillText('双缝干涉实验台：俯视光路 + 屏上条纹 + 测量尺 + 数据记录',350,30);
  const slitX=150,screenX=560,cy=235;
  ctx.strokeStyle='#334e68';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(slitX,100);ctx.lineTo(slitX,205);ctx.moveTo(slitX,265);ctx.lineTo(slitX,370);ctx.stroke();
  ctx.fillStyle='#486581';ctx.font='13px system-ui';ctx.fillText('双缝 d',slitX,82);ctx.fillText('屏',screenX,82);
  ctx.strokeStyle='#d9e2ec';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(screenX,78);ctx.lineTo(screenX,392);ctx.stroke();
  for(let k=-8;k<=8;k++){
    const y=cy+k*dx*9000;
    if(y<84||y>386)continue;
    const bright=Math.max(0.18,1-Math.abs(k)/10);
    ctx.fillStyle=`rgba(240,165,0,${bright})`;ctx.fillRect(screenX-18,y-3,36,6);
    if(k===0){ctx.fillStyle='#e03131';ctx.fillText('中央亮纹',screenX+70,y+4);}
  }
  ctx.strokeStyle='#2c7be5';ctx.lineWidth=2;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(slitX,220);ctx.lineTo(screenX,cy);ctx.moveTo(slitX,250);ctx.lineTo(screenX,cy+dx*9000);ctx.stroke();ctx.setLineDash([]);
  if(state.running){ctx.strokeStyle='rgba(44,123,229,.35)';ctx.lineWidth=1.5;for(let k=0;k<7;k++){ctx.beginPath();ctx.arc(slitX,cy,(state.time*80+k*28)%210,-.55,.55);ctx.stroke();}}
  const y1=cy, y2=cy+N*dx*9000*(1+err);
  ctx.strokeStyle='#7b2cbf';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(screenX+48,y1);ctx.lineTo(screenX+48,y2);ctx.stroke();
  ctx.fillStyle='#7b2cbf';ctx.font='700 13px system-ui';ctx.fillText('NΔx='+(width*1000).toFixed(2)+'mm',screenX+80,(y1+y2)/2);
  ctx.fillStyle='#0f9f6e';ctx.beginPath();ctx.arc(slitX,235,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='700 10px system-ui';ctx.fillText('d',slitX,239);
  ctx.fillStyle='#e03131';ctx.beginPath();ctx.arc(screenX,408,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillText('L',screenX,412);
  ctx.fillStyle='#f7f9fc';ctx.strokeStyle='#d9e2ec';ctx.fillRect(70,390,280,42);ctx.strokeRect(70,390,280,42);
  ctx.fillStyle='#102a43';ctx.font='700 13px system-ui';ctx.fillText('相邻条纹间距 Δx≈'+(dxMeasured*1000).toFixed(3)+'mm',210,416);
  ctx.fillStyle='#486581';ctx.font='13px system-ui';ctx.fillText('条纹越宽越容易读数；测多条条纹可减小相对误差。',350,452);
  els.readout.innerHTML=[
    `<div id="r1">理论 Δx=Lλ/d≈${(dx*1000).toFixed(3)}mm</div>`,
    `<div id="r2">测得 NΔx≈${(width*1000).toFixed(3)}mm，Δx≈${(dxMeasured*1000).toFixed(3)}mm</div>`,
    `<div id="r3">λ测=dΔx/L≈${(lamMeasured*1e9).toFixed(0)}nm</div>`,
    `<div id="r4">真实 λ=${lam.toFixed(0)}nm，相对误差≈${rel.toFixed(1)}%</div>`,
    `<div id="r5">d 变大条纹变窄；L 变大条纹变宽</div>`
  ].join('');
  const ok=rel<5 && dx*1000>0.5;
  els.status.className=ok?'status':'status bad';
  els.status.textContent=dx*1000<=0.5?'不通过：条纹太密，读数困难，应增大 L 或减小 d。':rel<5?'通过：由条纹间距反算的波长在误差范围内合理。':'不通过：读数误差偏大，应测多条条纹并取平均。';
  els.playBtn.textContent=state.running?'暂停':'播放';
}
Object.values(els).forEach(el=>{ if(el && el.tagName==='INPUT') el.addEventListener('input',draw); });
function pos(e){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*c.width/r.width,y:(e.clientY-r.top)*c.height/r.height};}
c.addEventListener('pointerdown',e=>{const p=pos(e);if(Math.hypot(p.x-150,p.y-235)<24){state.drag='d';c.setPointerCapture(e.pointerId);}else if(Math.hypot(p.x-560,p.y-408)<24){state.drag='L';c.setPointerCapture(e.pointerId);}});
c.addEventListener('pointermove',e=>{const p=pos(e);if(!state.drag){c.style.cursor='grab';return;}if(state.drag==='d')els.slit.value=Math.max(.1,Math.min(.5,(p.y-180)/180*.4+.1)).toFixed(2);if(state.drag==='L')els.screenDistance.value=Math.max(.5,Math.min(2,(p.x-400)/160)).toFixed(1);draw();});
c.addEventListener('pointerup',e=>{state.drag=null;try{c.releasePointerCapture(e.pointerId)}catch(err){}});c.addEventListener('pointercancel',()=>{state.drag=null;});
els.playBtn.addEventListener('click',()=>{state.running=!state.running;state.last=0;draw();});
els.resetBtn.addEventListener('click',()=>{state.running=false;state.time=0;els.lambda.value=550;els.slit.value=.25;els.screenDistance.value=1;els.count.value=5;els.error.value=1;draw();});
els.recordBtn.addEventListener('click',()=>{const lam=+els.lambda.value,dmm=+els.slit.value,L=+els.screenDistance.value,N=+els.count.value,err=+els.error.value/100,dx=L*lam*1e-9/(dmm*1e-3),width=N*dx*(1+err),dxMeasured=width/N,lamMeasured=dxMeasured*(dmm*1e-3)/L;state.records.unshift({width:width*1000,lam:lamMeasured*1e9});state.records=state.records.slice(0,4);els.records.innerHTML=state.records.map((r,i)=>`<tr><td style="text-align:left;border-bottom:1px solid #d9e2ec">${i+1}</td><td style="border-bottom:1px solid #d9e2ec">${r.width.toFixed(2)}</td><td style="border-bottom:1px solid #d9e2ec">${r.lam.toFixed(0)}</td></tr>`).join('');});
function loop(now){if(!state.last)state.last=now;const dt=Math.min(.04,(now-state.last)/1000);state.last=now;if(state.running)state.time+=dt;draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
</html>
