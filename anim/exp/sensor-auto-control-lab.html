<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>传感器自动控制装置实验台</title>
<link rel="icon" href="data:,">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f5f7fb;color:#102a43;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .root{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:12px;padding:12px;min-height:690px}
  .stage{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%;height:auto;touch-action:none;cursor:grab}
  .panel{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1px solid #d9e2ec;border-radius:8px;padding:10px}
  .task{background:#fff7e6;border-left:4px solid #f0a500;color:#486581;font-size:13px;line-height:1.5}.title{font-weight:800;margin-bottom:7px}
  .buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button{border:1px solid #b0bcc9;background:#fff;border-radius:6px;padding:7px 8px;cursor:pointer;font:inherit;font-size:13px}
  button.active{background:#2c7be5;border-color:#2c7be5;color:#fff;font-weight:800}
  .param{display:grid;gap:2px;margin:8px 0;font-size:13px}.param span{display:flex;justify-content:space-between;color:#486581;gap:8px}.param b{color:#102a43;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:#2c7be5}.readout{background:#102a43;color:#d9e2ec;border-radius:8px;padding:10px;line-height:1.65;font-size:13px}
  .readout b{color:#ffd166;font-variant-numeric:tabular-nums}.status{border:1px solid #38b2ac;background:#e6fffa;color:#087f5b;border-radius:8px;padding:8px;font-size:13px;font-weight:800;line-height:1.45}
  table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #d9e2ec;padding:4px 3px;text-align:right;font-variant-numeric:tabular-nums}th:first-child,td:first-child{text-align:left}
  .formula{font-size:13px;color:#334e68;line-height:1.6}@media(max-width:820px){.root{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="root">
  <div class="stage"><canvas id="canvas" width="900" height="620" aria-label="传感器自动控制实验台：光控电路侧视装置、比较器表盘、数据图像和记录表"></canvas></div>
  <div class="panel">
    <div class="card task"><b>观察任务：</b>拖动画面中的光源或调节阈值；看传感器电压、参考电压、比较器输出和继电器开关怎样共同决定灯泡/风扇是否工作。</div>
    <div class="card">
      <div class="title">控制参数</div>
      <div class="buttons"><button data-mode="dark" class="active">暗时开灯</button><button data-mode="bright">亮时开风扇</button><button id="disturb">扰动</button></div>
      <label class="param"><span>环境光照 <b id="lightLabel">45%</b></span><input id="light" type="range" min="0" max="100" step="1" value="45"></label>
      <label class="param"><span>阈值设定 <b id="thLabel">50%</b></span><input id="threshold" type="range" min="10" max="90" step="1" value="50"></label>
      <label class="param"><span>滞回宽度 <b id="hysLabel">6%</b></span><input id="hys" type="range" min="0" max="20" step="1" value="6"></label>
      <div class="buttons"><button id="play">播放</button><button id="record">记录</button><button id="reset">重置</button></div>
    </div>
    <div class="readout" id="readout"></div>
    <div class="card"><div class="title">数据记录</div><table><thead><tr><th>模式</th><th>光照/%</th><th>阈值/%</th><th>输出</th></tr></thead><tbody id="rows"></tbody></table></div>
    <div class="card formula"><div class="title">控制公式</div><div>分压：U_s = U·R_s/(R_s+R_0)。</div><div>比较：U_s 与 U_ref 比较，输出控制继电器；滞回可防止临界点反复跳变。</div></div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  const ids=['light','threshold','hys','lightLabel','thLabel','hysLabel','readout','rows','status','play'];
  const el=Object.fromEntries(ids.map(k=>[k,document.getElementById(k)]));
  const state={mode:'dark',on:false,playing:false,t:0,drag:null,records:[],history:[]};
  const colors={ink:'#102a43',muted:'#486581',blue:'#2c7be5',red:'#e03131',gold:'#f0a500',green:'#087f5b',purple:'#7c3aed'};
  function v(){const L=+el.light.value,T=+el.threshold.value,H=+el.hys.value,Us=5*(100-L)/100,Uref=5*T/100;return{L,T,H,Us,Uref};}
  function logic(x){const dark=x.L<x.T,bright=x.L>x.T;if(state.mode==='dark'){if(!state.on&&x.L<x.T-x.H/2)state.on=true;if(state.on&&x.L>x.T+x.H/2)state.on=false;return{active:state.on,target:'灯泡',condition:dark?'低于阈值':'高于阈值'}}if(!state.on&&x.L>x.T+x.H/2)state.on=true;if(state.on&&x.L<x.T-x.H/2)state.on=false;return{active:state.on,target:'风扇',condition:bright?'高于阈值':'低于阈值'}}
  function fmt(n,d=1){return(Math.abs(n)<1e-9?0:n).toFixed(d)}
  function text(s,x,y,c=colors.ink,a='center',size=13,w='700'){ctx.fillStyle=c;ctx.font=w+' '+size+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign=a;ctx.textBaseline='middle';ctx.fillText(s,x,y)}
  function line(x1,y1,x2,y2,c='#9fb3c8',w=2,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
  function box(x,y,w,h,fill='#fff',stroke='#d9e2ec'){ctx.save();ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();ctx.restore()}
  function arrow(x1,y1,x2,y2,c,w=3){const a=Math.atan2(y2-y1,x2-x1);line(x1,y1,x2,y2,c,w);ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.45),y2-10*Math.sin(a-.45));ctx.lineTo(x2-10*Math.cos(a+.45),y2-10*Math.sin(a+.45));ctx.closePath();ctx.fill();ctx.restore()}
  function meter(x,y,label,value,max,c){box(x-50,y-36,100,72,'#fbfdff');text(label,x,y-18,colors.muted,'center',12,'900');ctx.save();ctx.translate(x,y+10);ctx.strokeStyle='#334e68';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,30,Math.PI,0);ctx.stroke();const a=-.9+Math.min(1.8,value/max*1.8);arrow(0,0,27*Math.cos(Math.PI-a),-27*Math.sin(Math.PI-a),c,3);ctx.restore();text(fmt(value,2)+' V',x,y+25,c,'center',13,'900')}
  function drawCircuit(x,out){box(42,72,810,258,'#fff');text('光敏传感器自动控制装置：电路侧视 + 比较器 + 执行器',447,100,colors.ink,'center',16,'900');const lampX=142+(100-x.L)/100*110;ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(lampX,154,28,0,Math.PI*2);ctx.fill();ctx.strokeStyle=colors.gold;ctx.lineWidth=2;ctx.stroke();text('拖动光源',lampX,196,colors.gold,'center',12,'900');for(let i=0;i<8;i++)arrow(lampX+28,145+i*5,282,144+i*7,colors.gold,1.3);box(284,122,100,88,'#eef4ff',colors.blue);text('光敏电阻',334,148,colors.blue,'center',13,'900');text('Rs 随光变',334,174,colors.muted,'center',12,'700');line(384,166,452,166,colors.ink,3);box(452,120,118,92,'#fff7e6',colors.gold);text('比较器',511,148,colors.ink,'center',14,'900');text('Us ? Uref',511,176,colors.muted,'center',12,'900');line(570,166,644,166,colors.ink,3);box(644,118,142,96,out.active?'#e6fffa':'#f8fafc',out.active?colors.green:'#9fb3c8');text('继电器 '+(out.active?'闭合':'断开'),715,145,out.active?colors.green:colors.muted,'center',14,'900');text(out.target+(out.active?'工作':'停止'),715,176,out.active?colors.green:colors.muted,'center',13,'900');meter(276,270,'传感器电压 Us',x.Us,5,colors.blue);meter(420,270,'参考电压 Uref',x.Uref,5,colors.red);text('阈值附近加入滞回，避免输出在临界点抖动',635,270,colors.purple,'center',13,'900')}
  function drawGraph(x){box(42,356,810,210,'#fff');text('光照-输出数据图像与记录轨迹',447,382,colors.ink,'center',15,'900');const gx=90,gy=526,gw=690,gh=110;line(gx,gy,gx+gw,gy,colors.ink,2);line(gx,gy,gx,gy-gh,colors.ink,2);text('光照/%',gx+gw+30,gy,colors.muted,'center',12,'900');text('输出',gx,gy-gh-16,colors.muted,'center',12,'900');line(gx+x.T/100*gw,gy,gx+x.T/100*gw,gy-gh,colors.red,2,[5,5]);text('阈值',gx+x.T/100*gw,gy-gh-16,colors.red,'center',12,'900');ctx.strokeStyle=colors.blue;ctx.lineWidth=2.5;ctx.beginPath();state.history.slice(-160).forEach((h,i)=>{const px=gx+i/159*gw,py=gy-h.L/100*gh;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)});ctx.stroke();state.history.slice(-160).forEach((h,i)=>{const px=gx+i/159*gw,py=h.on?gy-gh:gy;ctx.fillStyle=h.on?colors.green:'#9fb3c8';ctx.fillRect(px,py-3,3,6)});text('蓝线：光照变化',130,410,colors.blue,'left',12,'900');text('绿条：执行器工作',245,410,colors.green,'left',12,'900')}
  function update(x,out){el.lightLabel.textContent=fmt(x.L,0)+'%';el.thLabel.textContent=fmt(x.T,0)+'%';el.hysLabel.textContent=fmt(x.H,0)+'%';el.readout.innerHTML='模式：<b>'+state.mode+'</b><br>传感器电压 Us：<b>'+fmt(x.Us,2)+' V</b><br>参考电压 Uref：<b>'+fmt(x.Uref,2)+' V</b><br>比较结果：<b>'+out.condition+'</b><br>输出状态：<b>'+out.target+(out.active?'工作':'停止')+'</b>';el.rows.innerHTML=state.records.slice(-6).map(r=>'<tr><td>'+r.mode+'</td><td>'+fmt(r.L,0)+'</td><td>'+fmt(r.T,0)+'</td><td>'+r.target+(r.active?'开':'停')+'</td></tr>').join('')||'<tr><td colspan=\"4\">暂无记录</td></tr>';el.status.textContent='闭环：传感器把光照变成电压，比较器把电压与阈值比较，继电器再控制'+out.target+'。'}
  function draw(){const x=v(),out=logic(x);ctx.clearRect(0,0,900,620);const bg=ctx.createLinearGradient(0,0,0,620);bg.addColorStop(0,'#fbfdff');bg.addColorStop(1,'#edf3f8');ctx.fillStyle=bg;ctx.fillRect(0,0,900,620);text('E-25 传感器自动控制实验台：电路侧视 + 表盘 + 数据图像',450,34,colors.ink,'center',18,'900');drawCircuit(x,out);drawGraph(x);update(x,out);state.history.push({L:x.L,on:out.active});if(state.history.length>220)state.history.shift()}
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
  canvas.addEventListener('pointerdown',e=>{const p=pos(e);if(p.y>116&&p.y<205&&p.x>90&&p.x<260){state.drag='light';canvas.setPointerCapture(e.pointerId);move(e);e.preventDefault()}});
  canvas.addEventListener('pointermove',move);function move(e){if(state.drag!=='light')return;const p=pos(e);const L=100-(p.x-142)/110*100;el.light.value=Math.max(0,Math.min(100,Math.round(L)));draw();e.preventDefault()}
  canvas.addEventListener('pointerup',e=>{state.drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(err){}});canvas.addEventListener('pointercancel',()=>state.drag=null);
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{state.mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));state.on=false;draw()}));
  [el.light,el.threshold,el.hys].forEach(x=>x.addEventListener('input',draw));
  el.play.onclick=()=>{state.playing=!state.playing;el.play.textContent=state.playing?'暂停':'播放'};
  document.getElementById('disturb').onclick=()=>{el.light.value=Math.max(0,Math.min(100,+el.light.value+(Math.random()-.5)*38));draw()};
  document.getElementById('record').onclick=()=>{const x=v(),out=logic(x);state.records.push({...x,...out,mode:state.mode});draw()};
  document.getElementById('reset').onclick=()=>{el.light.value=45;el.threshold.value=50;el.hys.value=6;state.mode='dark';state.on=false;state.playing=false;state.t=0;state.records=[];state.history=[];el.play.textContent='播放';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='dark'));draw()};
  function loop(){if(state.playing){state.t+=0.04;el.light.value=Math.round(50+38*Math.sin(state.t));}draw();requestAnimationFrame(loop)}
  draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
