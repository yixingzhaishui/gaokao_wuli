<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>探究加速度与力、质量关系</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #102a43; background: #f7f9fc; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .stage { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 14px; align-items: stretch; }
  canvas { width: 100%; height: 460px; background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; display: block; }
  .panel { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-top: 12px; }
  input { width: 100%; }
  .readout { margin-top: 14px; padding: 12px; background: #eef4ff; border-radius: 8px; line-height: 1.75; font-size: 14px; }
  .hint { margin-top: 10px; color: #486581; font-size: 13px; line-height: 1.6; }
  @media (max-width: 780px) { .stage { grid-template-columns: 1fr; } canvas { height: 390px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="700" height="460" aria-label="牛顿第二定律实验"></canvas>
    <section class="panel">
      <label for="mode">实验模式：<span id="modeVal"></span></label>
      <input id="mode" type="range" min="0" max="1" value="0" step="1">
      <label for="force">拉力 F/N：<span id="forceVal"></span></label>
      <input id="force" type="range" min="0.2" max="4" value="2" step="0.2">
      <label for="mass">总质量 m/kg：<span id="massVal"></span></label>
      <input id="mass" type="range" min="0.4" max="3" value="1" step="0.1">
      <label for="friction">摩擦补偿：<span id="frictionVal"></span></label>
      <input id="friction" type="range" min="0" max="100" value="90" step="5">
      <div id="readout" class="readout"></div>
      <div class="hint">观察任务：补偿充分时图像接近过原点；补偿不足时 a-F 图像会出现横截距。</div>
    </section>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const els = {
  mode: document.getElementById('mode'),
  force: document.getElementById('force'),
  mass: document.getElementById('mass'),
  friction: document.getElementById('friction'),
  modeVal: document.getElementById('modeVal'),
  forceVal: document.getElementById('forceVal'),
  massVal: document.getElementById('massVal'),
  frictionVal: document.getElementById('frictionVal'),
  readout: document.getElementById('readout')
};
function drawGraph(x0, y0, w, h, mode, F, m, comp) {
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0+w, y0);
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0-h);
  ctx.stroke();
  ctx.fillStyle = '#486581';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(mode === 0 ? 'F' : '1/m', x0+w+6, y0+4);
  ctx.fillText('a', x0-16, y0-h-4);
  ctx.strokeStyle = '#e03131';
  ctx.lineWidth = 3;
  ctx.beginPath();
  if (mode === 0) {
    for (let i = 0; i <= 8; i++) {
      const f = i * 0.5;
      const a = Math.max(0, (f - (1-comp)*0.8) / m);
      const px = x0 + f / 4 * w;
      const py = y0 - Math.min(1, a / 5) * h;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
  } else {
    for (let i = 0; i <= 8; i++) {
      const inv = 0.3 + i * 0.28;
      const a = Math.max(0, F * inv - (1-comp)*0.4);
      const px = x0 + (inv-0.3) / 2.24 * w;
      const py = y0 - Math.min(1, a / 5) * h;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
  }
  ctx.stroke();
}
function draw() {
  const mode = Number(els.mode.value);
  const F = Number(els.force.value);
  const m = Number(els.mass.value);
  const comp = Number(els.friction.value) / 100;
  const fLoss = (1 - comp) * 0.8;
  const a = Math.max(0, (F - fLoss) / m);
  els.modeVal.textContent = mode === 0 ? 'a-F' : 'a-1/m';
  els.forceVal.textContent = F.toFixed(1);
  els.massVal.textContent = m.toFixed(1);
  els.frictionVal.textContent = Math.round(comp*100) + '%';
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#f7f9fc';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#d9e2ec';
  ctx.fillRect(54, 164, 360, 18);
  ctx.fillStyle = '#eef4ff';
  ctx.strokeStyle = '#2c7be5';
  ctx.lineWidth = 2;
  const carX = 110 + Math.min(150, a * 35);
  ctx.fillRect(carX, 110, 112, 54);
  ctx.strokeRect(carX, 110, 112, 54);
  ctx.fillStyle = '#334e68';
  ctx.beginPath(); ctx.arc(carX+28, 170, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(carX+84, 170, 10, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#334e68';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(carX+112, 136);
  ctx.lineTo(430, 136);
  ctx.lineTo(430, 232);
  ctx.stroke();
  ctx.fillStyle = '#fff7e6';
  ctx.strokeStyle = '#f0a500';
  ctx.fillRect(410, 232, 40, 46);
  ctx.strokeRect(410, 232, 40, 46);
  ctx.fillStyle = '#e03131';
  ctx.font = '700 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`a=${a.toFixed(2)}m/s²`, carX+56, 96);
  drawGraph(470, 360, 180, 220, mode, F, m, comp);
  ctx.fillStyle = '#102a43';
  ctx.font = '700 16px system-ui';
  ctx.fillText(mode === 0 ? '固定 m，看 a 与 F' : '固定 F，看 a 与 1/m', 560, 88);
  ctx.fillStyle = '#486581';
  ctx.font = '14px system-ui';
  ctx.fillText('F合 = F - 未补偿摩擦，补偿越充分越接近 F=ma。', 350, 420);
  els.readout.innerHTML = [
    `<div id="r1">模式=${mode === 0 ? '固定 m，改变 F' : '固定 F，改变 m'}</div>`,
    `<div id="r2">补偿后合力≈F-${fLoss.toFixed(2)}=${Math.max(0,F-fLoss).toFixed(2)}N</div>`,
    `<div id="r3">a=F合/m≈${a.toFixed(2)}m/s²</div>`,
    `<div id="r4">${mode === 0 ? `a-F 图像斜率≈1/m=${(1/m).toFixed(2)}` : `a-1/m 图像斜率≈F=${F.toFixed(1)}N`}</div>`
  ].join('<br>');
}
Object.values(els).forEach(el => {
  if (el && el.tagName === 'INPUT') el.addEventListener('input', draw);
});
draw();
</script>
</body>
</html>
