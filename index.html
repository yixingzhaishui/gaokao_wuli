<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四川高考物理</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    :root {
      --sidebar-width: 320px;
      --sidebar-bg: #f7f9fc;
      --sidebar-border: #d9e2ec;
      --text-main: #102a43;
      --text-muted: #486581;
      --accent: #2c7be5;
    }
    html, body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text-main);
      background: #fff;
    }
    body.ready {
      overflow-x: hidden;
    }
    .app-nav { font-size: 14px; }
    .review-banner {
      position: fixed;
      top: 0;
      left: var(--sidebar-width);
      right: 0;
      z-index: 30;
      padding: 9px 16px;
      border-bottom: 1px solid #f0b429;
      background: #fff3bf;
      color: #7c4a03;
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
    }
    .content { padding-top: 42px; }

    /* 强制目录在左侧。Docsify 默认在窄屏会把目录折叠/挤到页面流里，
       本站是学习路径型网页，目录必须始终作为左侧导航存在。 */
    .sidebar {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      bottom: 0 !important;
      width: var(--sidebar-width) !important;
      min-width: var(--sidebar-width) !important;
      padding: 18px 0 28px !important;
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--sidebar-border) !important;
      overflow-y: auto !important;
      transform: none !important;
      z-index: 20;
    }
    .sidebar-toggle {
      display: none !important;
    }
    .mobile-nav-toggle,
    .mobile-nav-scrim {
      display: none;
    }
    .sidebar .app-name {
      margin: 0 18px 14px !important;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--sidebar-border);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }
    .sidebar-nav {
      padding: 0 14px 24px !important;
    }
    .sidebar-nav ul {
      margin: 0 !important;
    }
    .sidebar-nav li {
      margin: 2px 0 !important;
      line-height: 1.45;
    }
    .sidebar-nav a,
    .sidebar .mobile-route-button {
      border-radius: 6px;
      color: var(--text-muted);
      display: block;
      padding: 4px 8px;
      white-space: normal;
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }
    .sidebar .mobile-route-form { margin: 0; }
    .sidebar-nav a:hover,
    .sidebar .mobile-route-button:hover,
    .sidebar-nav .active > a {
      background: #e8f1ff;
      color: var(--accent);
      text-decoration: none;
    }
    .content {
      position: relative !important;
      left: auto !important;
      margin-left: var(--sidebar-width) !important;
      width: calc(100vw - var(--sidebar-width)) !important;
      max-width: calc(100vw - var(--sidebar-width)) !important;
      padding-top: 0 !important;
      box-sizing: border-box;
    }
    .markdown-section {
      max-width: 1080px !important;
      padding: 30px 36px 80px !important;
    }
    .markdown-section iframe {
      background: #fff;
      max-width: 100%;
    }
    .anchor span {
      color: var(--text-main);
    }

    .graph-shell {
      min-height: 680px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      overflow: hidden;
    }
    .graph-stage {
      min-height: 680px;
      position: relative;
    }
    .graph-stage svg {
      width: 100%;
      height: 680px;
      display: block;
    }
    .graph-panel {
      border-left: 1px solid #d9e2ec;
      background: #f7f9fc;
      padding: 14px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .graph-panel h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--text-main);
    }
    .graph-panel .legend {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }
    .graph-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      margin-bottom: 6px;
    }
    .graph-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .graph-tooltip {
      position: fixed;
      pointer-events: none;
      background: #102a43;
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.45;
      max-width: 260px;
      box-shadow: 0 10px 24px rgba(16,42,67,.22);
      z-index: 50;
      display: none;
    }
    .graph-node {
      cursor: pointer;
    }
    .graph-node text {
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .graph-node.dim,
    .graph-link.dim {
      opacity: .18;
    }
    .graph-node.selected circle {
      stroke: #f0a500;
      stroke-width: 4px;
    }
    .graph-link {
      fill: none;
      stroke-width: 1.6px;
      opacity: .75;
    }
    .graph-loading,
    .graph-error {
      padding: 24px;
      color: var(--text-muted);
    }
    .bank-toolbar,
    .error-toolbar {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      margin: 12px 0 18px;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      background: #f7f9fc;
    }
    .bank-toolbar input,
    .bank-toolbar select,
    .error-toolbar input,
    .error-toolbar select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      padding: 8px 9px;
      background: #fff;
      color: var(--text-main);
      font-size: 14px;
    }
    .bank-summary,
    .error-summary {
      color: var(--text-muted);
      font-size: 14px;
      margin: 8px 0 12px;
    }
    .problem-list,
    .trap-list {
      display: grid;
      gap: 14px;
    }
    .problem-item,
    .trap-item {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .problem-meta,
    .trap-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .problem-pill,
    .trap-pill {
      border: 1px solid #bcccdc;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: #334e68;
      background: #f7f9fc;
    }
    .problem-stem {
      margin: 8px 0 10px;
      line-height: 1.75;
    }
    .problem-options {
      margin: 6px 0 10px;
      padding-left: 0;
      list-style: none;
    }
    .problem-options li {
      margin: 4px 0;
    }
    .problem-diagram svg {
      max-width: 100%;
      height: auto;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      margin: 8px 0 10px;
      background: #fff;
    }
    .problem-item details,
    .trap-item details {
      border-top: 1px solid #d9e2ec;
      margin-top: 10px;
      padding-top: 10px;
    }
    .problem-item summary,
    .trap-item summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }
    .verified-bank-link {
      border: 1px solid #93c5fd;
      border-radius: 8px;
      background: #eff6ff;
      color: #1e3a5f;
      padding: 14px 16px;
      line-height: 1.65;
      margin: 16px 0;
    }
    .verified-bank-link a { font-weight: 700; }
    .status.review {
      background: #fff3cd;
      color: #7c4a03;
    }
    @media (max-width: 760px) {
      :root { --sidebar-width: 270px; }
      .review-banner {
        left: 0;
        padding: 7px 10px;
        font-size: 12px;
      }
      .content { padding-top: 54px; }
      .sidebar {
        transform: translateX(-100%) !important;
        transition: transform .2s ease !important;
        box-shadow: none;
      }
      body.mobile-nav-open .sidebar {
        transform: translateX(0) !important;
        box-shadow: 8px 0 24px rgba(16,42,67,.22);
      }
      .content {
        margin-left: 0 !important;
        width: 100vw !important;
        max-width: 100vw !important;
      }
      .mobile-nav-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        left: 12px;
        bottom: 14px;
        z-index: 31;
        min-width: 52px;
        min-height: 44px;
        padding: 8px 12px;
        border: 1px solid #1e5fa8;
        border-radius: 999px;
        background: #2c7be5;
        color: #fff;
        box-shadow: 0 6px 16px rgba(16,42,67,.25);
        font: 700 14px -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }
      .mobile-nav-scrim {
        position: fixed;
        inset: 0 0 0 var(--sidebar-width);
        z-index: 19;
        background: rgba(16,42,67,.35);
      }
      body.mobile-nav-open .mobile-nav-scrim { display: block; }
      .markdown-section { padding: 24px 18px 70px !important; }
      .graph-shell { grid-template-columns: 1fr; }
      .graph-panel { border-left: 0; border-top: 1px solid #d9e2ec; }
      .bank-toolbar,
      .error-toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="review-banner" role="status">
    非四川省教育考试院官方项目 · 当前为内容审校测试版 · 交互通过不代表物理内容、答案与来源均已审定
  </div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '四川高考物理',
      loadSidebar: true,
      // 使用 _sidebar.md 作为唯一学习路径。不能让 Docsify 自动把每个
      // “9. 公式绑定 / 10. 适用条件”抽成目录，否则学生会跳到没上下文的位置。
      subMaxLevel: 0,
      maxLevel: 4,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索知识点、公式、模型、实验',
        noData: '没有找到相关内容',
        depth: 4
      },
      pagination: {
        previousText: '上一节',
        nextText: '下一节'
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            setTimeout(hideUnverifiedExercises, 0);
            setTimeout(syncRouteAnchor, 0);
            initMobileNavigation();
            watchMobileSidebarRoutes();
            if (location.hash.indexOf('/graph') !== -1) {
              renderKnowledgeGraph();
            }
            if (location.hash.indexOf('/papers') !== -1) {
              renderProblemBank();
            }
            if (location.hash.indexOf('/errors') !== -1) {
              renderErrorHub();
            }
          });
        }
      ]
    };

    function routeAnchorId() {
      const match = location.hash.match(/[?&]id=([^&]+)/);
      return match ? decodeURIComponent(match[1]) : '';
    }

    function syncRouteAnchor() {
      const id = routeAnchorId();
      if (!id) return;
      const target = document.getElementById(id);
      if (!target) return;
      requestAnimationFrame(function() {
        target.scrollIntoView({ block: 'start', behavior: 'auto' });
      });
    }

    function initMobileNavigation() {
      if (document.getElementById('mobile-nav-toggle')) return;
      const toggle = document.createElement('button');
      const scrim = document.createElement('div');
      toggle.id = 'mobile-nav-toggle';
      toggle.className = 'mobile-nav-toggle';
      toggle.type = 'button';
      toggle.setAttribute('aria-label', '打开学习目录');
      toggle.setAttribute('aria-expanded', 'false');
      toggle.textContent = '目录';
      scrim.className = 'mobile-nav-scrim';
      document.body.append(scrim, toggle);
      const close = function() {
        document.body.classList.remove('mobile-nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };
      toggle.addEventListener('click', function() {
        const open = !document.body.classList.contains('mobile-nav-open');
        document.body.classList.toggle('mobile-nav-open', open);
        toggle.setAttribute('aria-expanded', String(open));
      });
      scrim.addEventListener('click', close);
      document.addEventListener('click', function(event) {
        if (event.target.closest('.sidebar a')) close();
      });
      window.addEventListener('hashchange', function() {
        close();
        setTimeout(syncRouteAnchor, 0);
      });
    }

    function bindMobileSidebarRoutes() {
      if (!window.matchMedia('(max-width: 760px)').matches) return;
      document.querySelectorAll('.sidebar a[href^="#/"]').forEach(function(link) {
        const route = link.getAttribute('href');
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'mobile-route-button';
        button.dataset.mobileRouteBound = 'true';
        button.dataset.mobileRoute = route;
        button.textContent = link.textContent;
        if (link.title) button.title = link.title;
        button.addEventListener('click', function(event) {
          event.preventDefault();
          document.body.classList.remove('mobile-nav-open');
          const toggle = document.getElementById('mobile-nav-toggle');
          if (toggle) toggle.setAttribute('aria-expanded', 'false');
          // Route directly through Docsify's hash router.  Native form submit
          // is inconsistent in mobile webviews and could leave the pressed
          // directory item on screen without actually changing the lesson.
          if (location.hash === route) syncRouteAnchor();
          else location.hash = route;
        });
        link.replaceWith(button);
      });
    }

    function watchMobileSidebarRoutes() {
      if (document.documentElement.dataset.mobileRouteWatcher === 'true') {
        bindMobileSidebarRoutes();
        return;
      }
      document.documentElement.dataset.mobileRouteWatcher = 'true';
      let attempts = 0;
      const bindWhenSidebarIsReady = function() {
        bindMobileSidebarRoutes();
        if (document.querySelector('.sidebar .mobile-route-button') || attempts >= 20) return;
        attempts += 1;
        setTimeout(bindWhenSidebarIsReady, 50);
      };
      bindWhenSidebarIsReady();
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean))).sort((a, b) => String(a).localeCompare(String(b), 'zh-CN'));
    }

    async function hideUnverifiedExercises() {
      const section = document.querySelector('.markdown-section');
      if (!section) return;
      const headers = Array.from(section.querySelectorAll('h3, h4, h5, h6'));
      // 在任何网络请求之前先隐藏自由文本旧题，避免请求挂起时短暂暴露。
      for (const heading of headers) {
        const title = (heading.textContent || '').replace(/\s+/g, '');
        if (!/(例题|训练题)/.test(title)) continue;
        heading.hidden = true;
        let node = heading.nextElementSibling;
        while (node && !/^H[2-4]$/.test(node.tagName)) {
          node.hidden = true;
          node = node.nextElementSibling;
        }
      }
      let verified = [];
      let idMap = {};
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);
      try {
        const [rawProblems, rawDiagnostic, rawIdMap] = await Promise.all([
          fetch('data/verified-problems.json', { signal: controller.signal }).then(r => { if (!r.ok) throw new Error('题库请求失败'); return r.json(); }),
          fetch('data/verified-diagnostic-2024cee.json', { signal: controller.signal }).then(r => { if (!r.ok) throw new Error('诊断题请求失败'); return r.json(); }),
          fetch('data/id-map.json', { signal: controller.signal }).then(r => { if (!r.ok) throw new Error('目录请求失败'); return r.json(); })
        ]);
        idMap = rawIdMap || {};
        verified = problemList(rawProblems).concat(problemList(rawDiagnostic)).filter(isPublishableProblem);
      } catch (err) {
        // 保持旧题隐藏；后续以明确的不可用提示替换。
      } finally {
        clearTimeout(timeout);
      }
      for (const heading of headers) {
        if (heading.dataset.verifiedReplacement === '1') continue;
        const title = (heading.textContent || '').replace(/\s+/g, '');
        if (!/(例题|训练题)/.test(title)) continue;
        let knowledgeId = '';
        let cursor = heading.previousElementSibling;
        while (cursor) {
          if (/^H[3-4]$/.test(cursor.tagName) && cursor.id) {
            knowledgeId = Object.keys(idMap).find(id => idMap[id].slug === cursor.id) || '';
            if (knowledgeId) break;
          }
          cursor = cursor.previousElementSibling;
        }
        const related = knowledgeId
          ? verified.filter(p => (p.knowledge_ids || []).includes(knowledgeId) || (p.model_ids || []).includes(knowledgeId)).slice(0, 3)
          : [];
        heading.dataset.verifiedReplacement = '1';
        const replacement = document.createElement('aside');
        replacement.className = 'verified-bank-link';
        if (related.length) {
          replacement.innerHTML = '<b>来源复核记录中的例题</b>（与本知识点直接关联；最终发布等级仍按政策 2.0 复核）' + related.map(p => renderProblemCard(p, idMap)).join('') + '<p>更多题目可到<a href="#/papers">来源复核中的题库</a>按知识点筛选。</p>';
        } else {
          replacement.innerHTML = '<b>本知识点的旧例题已下架</b>：题库数据暂不可用，或题目尚未达到来源发布门槛。请到<a href="#/papers">来源复核中的题库</a>查看当前状态。';
        }
        heading.replaceWith(replacement);
        let node = replacement.nextElementSibling;
        while (node && !/^H[2-4]$/.test(node.tagName)) {
          const next = node.nextElementSibling;
          node.hidden = true;
          node = next;
        }
      }
    }

    function problemList(data) {
      return Array.isArray(data) ? data : (data.problems || []);
    }

    function isPublishableProblem(p) {
      if (!['official_exam', 'regional_exam', 'published_simulation', 'diagnostic_exam'].includes(p.source_kind)) return false;
      if (p.source_policy_version !== '2.0' || p.verification_status !== 'double_checked') return false;
      const independentB = Array.isArray(p.independent_secondary_sources) && p.independent_secondary_sources.filter(s => s && s.tier === 'B').length >= 2;
      if (!(p.primary_source_tier === 'A' || (independentB && p.no_primary_source_reason))) return false;
      if (!p.scan_page || !p.file_sha256 || !p.stem_checked_by || !p.answer_checked_by || !p.solution_recalculated_by) return false;
      if (p.source_verified !== true || !p.source_detail || !p.exam || !p.question_no || !Array.isArray(p.source_urls) || !p.source_urls.length || !p.verified_at) return false;
      if (!p.source || !p.stem || !p.answer || !p.solution || !p.method) return false;
      if (!(p.knowledge_ids || []).length && !(p.model_ids || []).length) return false;
      if (['单选', '多选'].includes(p.type) && (!Array.isArray(p.options) || p.options.length < 3)) return false;
      // 符号推导题可以不含数字；用显式字段保留严格的发布过滤，同时避免静默误杀。
      if (p.type === '计算' && p.symbolic !== true && !/[0-9０-９]/.test(p.stem || '')) return false;
      if ((p.solution || '').replace(/\s/g, '').length < 35) return false;
      if ((p.method || '').replace(/\s/g, '').length < 8) return false;
      const needsFigure = /(如图|下图|图示|所示|图中|右图|左图)/.test(p.stem || '');
      if ((needsFigure || p.diagram_required) && !(p.diagram || p.image || p.img || p.figure || p.svg)) return false;
      if ((needsFigure || p.diagram_required) && !p.figure_fidelity_checked_by) return false;
      return true;
    }

    function idLabel(id, idMap) {
      const meta = idMap[id];
      return meta ? id + ' ' + meta.title : id;
    }

    function sourceKindLabel(kind) {
      return ({ official_exam: '高考真题', regional_exam: '适应性/联考原卷', published_simulation: '正式出版模拟卷', diagnostic_exam: '诊断考试原卷' })[kind] || '来源待审核';
    }

    function renderProblemCard(p, idMap) {
      const knowledge = (p.knowledge_ids || []).map(id => '<span class="problem-pill">' + escapeHtml(idLabel(id, idMap)) + '</span>').join('');
      const models = (p.model_ids || []).map(id => '<span class="problem-pill">' + escapeHtml(idLabel(id, idMap)) + '</span>').join('');
      const options = (p.options || []).length ? '<ul class="problem-options">' + p.options.map(o => '<li>' + escapeHtml(o) + '</li>').join('') + '</ul>' : '';
      const diagram = p.diagram && p.diagram.svg ? '<div class="problem-diagram" aria-label="' + escapeHtml(p.diagram.title || '题图') + '">' + p.diagram.svg + '</div>' : '';
      const source = p.source;
      const sourceLinks = (p.source_urls || []).map((url, index) => '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">来源' + (index + 1) + '</a>').join(' · ');
      return [
        '<article class="problem-item">',
        '  <div class="problem-meta">',
        '    <span class="problem-pill">' + escapeHtml(p.id) + '</span>',
        '    <span class="problem-pill">' + escapeHtml(source || '') + '</span>',
        '    <span class="problem-pill">' + escapeHtml(sourceKindLabel(p.source_kind)) + '</span>',
        '    <span class="problem-pill">' + escapeHtml(p.year || '') + '</span>',
        '    <span class="problem-pill">' + escapeHtml(p.type || '') + '</span>',
        '    <span class="problem-pill">' + escapeHtml(p.difficulty || '') + '</span>',
             knowledge,
             models,
        '  </div>',
        '  <div class="problem-stem">' + escapeHtml(p.stem || '') + '</div>',
           diagram,
           options,
        '  <p class="bank-summary"><b>可追溯来源：</b>' + escapeHtml(p.exam || '') + ' 第' + escapeHtml(p.question_no || '') + '题；' + sourceLinks + '<br><b>核验记录：</b>' + escapeHtml(p.verification || '') + '</p>',
        '  <details><summary>点击查看答案与解析</summary>',
        '    <p><b>答案：</b>' + escapeHtml(p.answer || '') + '</p>',
        '    <p><b>解析：</b>' + escapeHtml(p.solution || '') + '</p>',
        '    <p><b>方法提炼：</b>' + escapeHtml(p.method || '') + '</p>',
        (p.traps || []).length ? '    <p><b>易错点：</b>' + p.traps.map(escapeHtml).join('；') + '</p>' : '',
        '  </details>',
        '</article>'
      ].join('');
    }

    async function renderProblemBank() {
      const mount = document.getElementById('problem-bank');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载题库...</div>';
      try {
        const [rawProblems, rawDiagnostic, idMap] = await Promise.all([
          fetch('data/verified-problems.json').then(r => r.json()),
          fetch('data/verified-diagnostic-2024cee.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        const allProblems = problemList(rawProblems).concat(problemList(rawDiagnostic));
        const problems = allProblems.filter(isPublishableProblem);
        const knowledgeIds = unique(problems.flatMap(p => p.knowledge_ids || []));
        const modelIds = unique(problems.flatMap(p => p.model_ids || []));
        const difficulties = unique(problems.map(p => p.difficulty));
        const types = unique(problems.map(p => p.type));
        const sources = unique(problems.map(p => p.source));

        mount.innerHTML = [
          '<p class="bank-summary">仅展示已核验原卷题：每题都附卷名、题号、来源链接与核验记录。收录高考真题，以及有原卷和答案可复核的正式联考、诊断卷；改编题和未核验题均不展示。</p>',
          '<div class="bank-toolbar">',
          '  <input id="bank-q" type="search" placeholder="搜索题干 / 编号 / 方法">',
          '  <select id="bank-knowledge"><option value="">全部知识点</option>' + knowledgeIds.map(id => '<option value="' + escapeHtml(id) + '">' + escapeHtml(idLabel(id, idMap)) + '</option>').join('') + '</select>',
          '  <select id="bank-model"><option value="">全部模型</option>' + modelIds.map(id => '<option value="' + escapeHtml(id) + '">' + escapeHtml(idLabel(id, idMap)) + '</option>').join('') + '</select>',
          '  <select id="bank-difficulty"><option value="">全部难度</option>' + difficulties.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="bank-type"><option value="">全部题型</option>' + types.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="bank-source"><option value="">全部来源</option>' + sources.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '</div>',
          '<div id="bank-summary" class="bank-summary"></div>',
          '<div id="bank-list" class="problem-list"></div>'
        ].join('');

        const controls = ['bank-q', 'bank-knowledge', 'bank-model', 'bank-difficulty', 'bank-type', 'bank-source']
          .map(id => document.getElementById(id));
        const listEl = document.getElementById('bank-list');
        const summaryEl = document.getElementById('bank-summary');
        function apply() {
          const q = controls[0].value.trim().toLowerCase();
          const k = controls[1].value;
          const m = controls[2].value;
          const d = controls[3].value;
          const t = controls[4].value;
          const s = controls[5].value;
          const filtered = problems.filter(p => {
            const hay = [p.id, p.stem, p.answer, p.solution, p.method].join(' ').toLowerCase();
            return (!q || hay.includes(q))
              && (!k || (p.knowledge_ids || []).includes(k))
              && (!m || (p.model_ids || []).includes(m))
              && (!d || p.difficulty === d)
              && (!t || p.type === t)
              && (!s || p.source === s);
          });
          summaryEl.textContent = '当前显示 ' + filtered.length + ' / ' + problems.length + ' 题';
          listEl.innerHTML = filtered.map(p => renderProblemCard(p, idMap)).join('') || '<p>没有符合条件的题。</p>';
        }
        controls.forEach(el => el.addEventListener('input', apply));
        apply();
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">题库加载失败：' + err.message + '</div>';
      }
    }

    async function renderErrorHub() {
      const mount = document.getElementById('error-hub');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载易错点...</div>';
      try {
        const [rawProblems, rawDiagnostic, idMap] = await Promise.all([
          fetch('data/verified-problems.json').then(r => r.json()),
          fetch('data/verified-diagnostic-2024cee.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        const problems = problemList(rawProblems).concat(problemList(rawDiagnostic)).filter(isPublishableProblem);
        const traps = new Map();
        for (const p of problems) {
          for (const trap of p.traps || []) {
            if (!traps.has(trap)) traps.set(trap, []);
            traps.get(trap).push(p);
          }
        }
        const rows = Array.from(traps, ([trap, items]) => ({ trap, items }))
          .sort((a, b) => b.items.length - a.items.length || a.trap.localeCompare(b.trap, 'zh-CN'));
        const modules = unique(rows.flatMap(r => r.items.flatMap(p => p.knowledge_ids || []).map(id => (idMap[id] || {}).file)));
        const types = unique(problems.map(p => p.type));
        mount.innerHTML = [
          '<div class="error-toolbar">',
          '  <input id="error-q" type="search" placeholder="搜索错因 / 题干">',
          '  <select id="error-module"><option value="">全部模块</option>' + modules.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="error-type"><option value="">全部题型</option>' + types.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '</div>',
          '<div id="error-summary" class="error-summary"></div>',
          '<div id="trap-list" class="trap-list"></div>'
        ].join('');

        const qEl = document.getElementById('error-q');
        const moduleEl = document.getElementById('error-module');
        const typeEl = document.getElementById('error-type');
        const listEl = document.getElementById('trap-list');
        const summaryEl = document.getElementById('error-summary');
        function apply() {
          const q = qEl.value.trim().toLowerCase();
          const module = moduleEl.value;
          const type = typeEl.value;
          const filtered = rows.map(row => ({
            trap: row.trap,
            items: row.items.filter(p => {
              const hay = [row.trap, p.id, p.stem, p.solution, p.method].join(' ').toLowerCase();
              const files = (p.knowledge_ids || []).map(id => (idMap[id] || {}).file);
              return (!q || hay.includes(q))
                && (!module || files.includes(module))
                && (!type || p.type === type);
            })
          })).filter(row => row.items.length);
          summaryEl.textContent = '当前显示 ' + filtered.length + ' 类易错点，共关联 ' + filtered.reduce((n, r) => n + r.items.length, 0) + ' 道题';
          listEl.innerHTML = filtered.map(row => {
            const sample = row.items.slice(0, 5);
            return [
              '<article class="trap-item">',
              '  <div class="trap-meta"><span class="trap-pill">' + escapeHtml(row.items.length) + ' 题</span>' + sample.flatMap(p => p.knowledge_ids || []).slice(0, 4).map(id => '<span class="trap-pill">' + escapeHtml(idLabel(id, idMap)) + '</span>').join('') + '</div>',
              '  <h3>' + escapeHtml(row.trap) + '</h3>',
              '  <details><summary>查看关联题与纠正方法</summary>',
              sample.map(p => '<p><b>' + escapeHtml(p.id) + '</b> ' + escapeHtml(p.stem) + '<br><b>纠正：</b>' + escapeHtml(p.method || p.solution || '') + '</p>').join(''),
              row.items.length > sample.length ? '<p>还有 ' + (row.items.length - sample.length) + ' 道相关题，可在题库按关键词筛选。</p>' : '',
              '  </details>',
              '</article>'
            ].join('');
          }).join('') || '<p>没有符合条件的易错点。</p>';
        }
        [qEl, moduleEl, typeEl].forEach(el => el.addEventListener('input', apply));
        apply();
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">易错点加载失败：' + err.message + '</div>';
      }
    }

    async function renderKnowledgeGraph() {
      const mount = document.getElementById('knowledge-graph');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载知识图谱...</div>';

      try {
        const [graph, progress, idMap] = await Promise.all([
          fetch('data/graph.json').then(r => r.json()),
          fetch('data/progress.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        if (!window.d3) throw new Error('D3 未加载');

        const progressById = progress || {};
        const idMapById = idMap || {};
        const nodes = (graph.nodes || []).map(n => ({
          ...n,
          ...(progressById[n.id] || {}),
          ...(idMapById[n.id] || {})
        }));
        const nodeIds = new Set(nodes.map(n => n.id));
        const links = (graph.edges || []).filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
          .map(e => ({ ...e, source: e.from, target: e.to }));

        mount.innerHTML = [
          '<div class="graph-shell">',
          '  <div class="graph-stage"><svg role="img" aria-label="四川高考物理知识图谱"></svg></div>',
          '  <aside class="graph-panel">',
          '    <h3>知识图谱</h3>',
          '    <p>点击节点跳到对应知识点；悬停查看模块、完成状态和前后关系。图谱排版完成后会自动静止，只有拖动节点时才会短暂重新排列。</p>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#2c7be5"></span>interaction passed · content pending</div>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#f0a500"></span>interaction partial · content pending</div>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#9fb3c8"></span>pending</div>',
          '    <div class="legend">',
          '      <div><b>prerequisite</b>：前置知识</div>',
          '      <div><b>application</b>：应用关系</div>',
          '      <div><b>analogy</b>：类比关系</div>',
          '      <div><b>model</b>：模型关系</div>',
          '    </div>',
          '    <p id="graph-selection" style="margin-top:14px;">当前：未选中节点</p>',
          '  </aside>',
          '</div>',
          '<div class="graph-tooltip" id="graph-tooltip"></div>'
        ].join('');

        const svg = d3.select(mount).select('svg');
        const stage = mount.querySelector('.graph-stage');
        const width = Math.max(720, stage.clientWidth || 900);
        const height = 680;
        svg.attr('viewBox', [0, 0, width, height]);

        const moduleOrder = ['必修1','必修2','必修3','选择性必修1','选择性必修2','选择性必修3'];
        const color = status => status === 'done' ? '#2c7be5' : status === 'partial' ? '#f0a500' : '#9fb3c8';
        const edgeColor = type => type === 'prerequisite' ? '#486581' : type === 'application' ? '#7b2cbf' : type === 'analogy' ? '#2f9e44' : '#e03131';
        const moduleX = module => {
          const i = Math.max(0, moduleOrder.indexOf(module));
          return 90 + i * ((width - 180) / Math.max(1, moduleOrder.length - 1));
        };

        nodes.forEach((n, i) => {
          n.x = moduleX(n.module);
          n.y = 70 + (i % 11) * 52;
        });

        svg.append('defs').append('marker')
          .attr('id', 'graph-arrow')
          .attr('viewBox', '0 -5 10 10')
          .attr('refX', 17)
          .attr('refY', 0)
          .attr('markerWidth', 6)
          .attr('markerHeight', 6)
          .attr('orient', 'auto')
          .append('path')
          .attr('d', 'M0,-5L10,0L0,5')
          .attr('fill', '#829ab1');

        const simulation = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(links).id(d => d.id).distance(86).strength(0.42))
          .force('charge', d3.forceManyBody().strength(-280))
          .force('x', d3.forceX(d => moduleX(d.module)).strength(0.42))
          .force('y', d3.forceY(height / 2).strength(0.06))
          .force('collide', d3.forceCollide(34));
        // A knowledge map is a reference diagram, not a decorative animation.
        // Cap each force-layout pass so it settles quickly and then stays still.
        let layoutTicks = 0;
        const maxLayoutTicks = 90;
        let draggingNode = false;

        const link = svg.append('g')
          .attr('stroke-linecap', 'round')
          .selectAll('path')
          .data(links)
          .join('path')
          .attr('class', 'graph-link')
          .attr('stroke', d => edgeColor(d.type))
          .attr('marker-end', 'url(#graph-arrow)');

        const node = svg.append('g')
          .selectAll('g')
          .data(nodes)
          .join('g')
          .attr('class', 'graph-node')
          .on('mouseenter', function(event, d) {
            const tip = document.getElementById('graph-tooltip');
            const statusText = d.status === 'done' ? 'interaction passed · content pending' : d.status === 'partial' ? 'interaction partial · content pending' : d.status;
            tip.innerHTML = '<b>' + d.id + ' ' + d.title + '</b><br>' + d.module + ' · ' + d.level + '档 · ' + statusText;
            tip.style.left = (event.clientX + 12) + 'px';
            tip.style.top = (event.clientY + 12) + 'px';
            tip.style.display = 'block';
          })
          .on('mousemove', function(event) {
            const tip = document.getElementById('graph-tooltip');
            tip.style.left = (event.clientX + 12) + 'px';
            tip.style.top = (event.clientY + 12) + 'px';
          })
          .on('mouseleave', function() {
            document.getElementById('graph-tooltip').style.display = 'none';
          })
          .on('click', function(event, d) {
            const related = new Set([d.id]);
            links.forEach(e => {
              const s = typeof e.source === 'object' ? e.source.id : e.source;
              const t = typeof e.target === 'object' ? e.target.id : e.target;
              if (s === d.id) related.add(t);
              if (t === d.id) related.add(s);
            });
            node.classed('dim', n => !related.has(n.id)).classed('selected', n => n.id === d.id);
            link.classed('dim', e => !related.has(e.source.id) || !related.has(e.target.id));
            const selection = document.getElementById('graph-selection');
            selection.innerHTML = '当前：<b>' + d.id + ' ' + d.title + '</b><br><a href="#/' + d.file + '?id=' + d.slug + '">跳到知识点</a>';
          })
          .call(d3.drag()
            .on('start', (event, d) => {
              if (!event.active) {
                layoutTicks = 0;
                simulation.alpha(0.32).alphaTarget(0.18).restart();
              }
              draggingNode = true;
              d.fx = d.x;
              d.fy = d.y;
            })
            .on('drag', (event, d) => {
              d.fx = event.x;
              d.fy = event.y;
            })
            .on('end', (event, d) => {
              if (!event.active) simulation.alphaTarget(0);
              draggingNode = false;
              d.fx = null;
              d.fy = null;
            }));

        node.append('circle')
          .attr('r', d => d.level === 'A' ? 16 : 13)
          .attr('fill', d => color(d.status))
          .attr('stroke', '#102a43')
          .attr('stroke-width', 1.2);

        node.append('text')
          .attr('x', 20)
          .attr('y', 4)
          .text(d => d.id + ' ' + d.title);

        const moduleLabels = svg.append('g').selectAll('text')
          .data(moduleOrder)
          .join('text')
          .attr('x', d => moduleX(d))
          .attr('y', 24)
          .attr('text-anchor', 'middle')
          .attr('font-size', 13)
          .attr('font-weight', 700)
          .attr('fill', '#334e68')
          .text(d => d);

        simulation.on('tick', () => {
          nodes.forEach(d => {
            d.x = Math.max(36, Math.min(width - 180, d.x));
            d.y = Math.max(48, Math.min(height - 34, d.y));
          });
          link.attr('d', d => {
            const dx = d.target.x - d.source.x;
            const dy = d.target.y - d.source.y;
            const dr = Math.sqrt(dx * dx + dy * dy) * 1.45;
            return 'M' + d.source.x + ',' + d.source.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + d.target.x + ',' + d.target.y;
          });
          node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
          moduleLabels.attr('x', d => moduleX(d));
          layoutTicks += 1;
          if (!draggingNode && layoutTicks >= maxLayoutTicks) simulation.stop();
        });
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">知识图谱加载失败：' + err.message + '</div>';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
