<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四川高考物理</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    :root {
      --sidebar-width: 320px;
      --sidebar-bg: #f7f9fc;
      --sidebar-border: #d9e2ec;
      --text-main: #102a43;
      --text-muted: #486581;
      --accent: #2c7be5;
    }
    html, body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text-main);
      background: #fff;
      max-width: 100%;
      overflow-x: hidden;
    }
    body.ready {
      overflow-x: hidden;
    }
    .app-nav { font-size: 14px; }

    /* 强制目录在左侧。Docsify 默认在窄屏会把目录折叠/挤到页面流里，
       本站是学习路径型网页，目录必须始终作为左侧导航存在。 */
    .sidebar {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      bottom: 0 !important;
      width: var(--sidebar-width) !important;
      min-width: var(--sidebar-width) !important;
      padding: 18px 0 28px !important;
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--sidebar-border) !important;
      overflow-y: auto !important;
      transform: none !important;
      z-index: 20;
    }
    .sidebar-toggle {
      display: none !important;
    }
    .sidebar .app-name {
      margin: 0 18px 14px !important;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--sidebar-border);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }
    .sidebar-nav {
      padding: 0 14px 24px !important;
    }
    .sidebar-nav ul {
      margin: 0 !important;
    }
    .sidebar-nav li {
      margin: 2px 0 !important;
      line-height: 1.45;
    }
    .sidebar-nav a {
      border-radius: 6px;
      color: var(--text-muted);
      display: block;
      padding: 4px 8px;
      white-space: normal;
    }
    .sidebar-nav a:hover,
    .sidebar-nav .active > a {
      background: #e8f1ff;
      color: var(--accent);
      text-decoration: none;
    }
    .content {
      position: relative !important;
      left: auto !important;
      margin-left: var(--sidebar-width) !important;
      width: calc(100vw - var(--sidebar-width)) !important;
      max-width: calc(100vw - var(--sidebar-width)) !important;
      min-width: 0;
      padding-top: 0 !important;
      box-sizing: border-box;
    }
    .markdown-section {
      max-width: 1080px !important;
      padding: 30px 36px 80px !important;
    }
    .markdown-section iframe {
      background: #fff;
      max-width: 100%;
    }
    .anchor span {
      color: var(--text-main);
    }

    .graph-shell {
      min-height: 680px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      overflow: hidden;
    }
    .graph-stage {
      min-height: 680px;
      position: relative;
    }
    .graph-stage svg {
      width: 100%;
      height: 680px;
      display: block;
    }
    .graph-panel {
      border-left: 1px solid #d9e2ec;
      background: #f7f9fc;
      padding: 14px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .graph-panel h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--text-main);
    }
    .graph-panel .legend {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }
    .graph-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      margin-bottom: 6px;
    }
    .graph-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .graph-tooltip {
      position: fixed;
      pointer-events: none;
      background: #102a43;
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.45;
      max-width: 260px;
      box-shadow: 0 10px 24px rgba(16,42,67,.22);
      z-index: 50;
      display: none;
    }
    .graph-node {
      cursor: pointer;
    }
    .graph-node text {
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .graph-node.dim,
    .graph-link.dim {
      opacity: .18;
    }
    .graph-node.selected circle {
      stroke: #f0a500;
      stroke-width: 4px;
    }
    .graph-link {
      fill: none;
      stroke-width: 1.6px;
      opacity: .75;
    }
    .graph-loading,
    .graph-error {
      padding: 24px;
      color: var(--text-muted);
    }
    .bank-toolbar,
    .error-toolbar {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      margin: 12px 0 18px;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      background: #f7f9fc;
    }
    .bank-toolbar input,
    .bank-toolbar select,
    .error-toolbar input,
    .error-toolbar select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      padding: 8px 9px;
      background: #fff;
      color: var(--text-main);
      font-size: 14px;
    }
    .bank-summary,
    .error-summary {
      color: var(--text-muted);
      font-size: 14px;
      margin: 8px 0 12px;
    }
    .problem-list,
    .trap-list {
      display: grid;
      gap: 14px;
    }
    .problem-item,
    .trap-item {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .problem-meta,
    .trap-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .problem-pill,
    .trap-pill {
      border: 1px solid #bcccdc;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: #334e68;
      background: #f7f9fc;
    }
    .problem-stem {
      margin: 8px 0 10px;
      line-height: 1.75;
    }
    .problem-options {
      margin: 6px 0 10px;
      padding-left: 0;
      list-style: none;
    }
    .problem-options li {
      margin: 4px 0;
    }
    .problem-diagram svg {
      max-width: 100%;
      height: auto;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      margin: 8px 0 10px;
      background: #fff;
    }
    .problem-item details,
    .trap-item details {
      border-top: 1px solid #d9e2ec;
      margin-top: 10px;
      padding-top: 10px;
    }
    .problem-item summary,
    .trap-item summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }
    #mobile-sidebar-toggle,
    #mobile-sidebar-backdrop {
      display: none;
    }
    @media (max-width: 760px) {
      :root { --sidebar-width: min(84vw, 320px); }
      .sidebar {
        transform: translateX(-100%) !important;
        box-shadow: 8px 0 24px rgba(16, 42, 67, .16);
        transition: transform .2s ease;
      }
      body.sidebar-open .sidebar { transform: translateX(0) !important; }
      .content {
        margin-left: 0 !important;
        width: 100% !important;
        max-width: none !important;
      }
      .markdown-section {
        box-sizing: border-box;
        width: 100% !important;
        max-width: none !important;
        padding: 24px 18px 70px !important;
      }
      #mobile-sidebar-toggle {
        display: inline-flex;
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 30;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 1px solid #bcccdc;
        border-radius: 8px;
        background: #fff;
        color: var(--text-main);
        box-shadow: 0 4px 12px rgba(16, 42, 67, .12);
        font-size: 22px;
        cursor: pointer;
      }
      body.sidebar-open #mobile-sidebar-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 19;
        background: rgba(16, 42, 67, .2);
      }
      .graph-shell { grid-template-columns: 1fr; }
      .graph-panel { border-left: 0; border-top: 1px solid #d9e2ec; }
      .bank-toolbar,
      .error-toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <button id="mobile-sidebar-toggle" type="button" aria-label="打开目录" aria-expanded="false">☰</button>
  <div id="mobile-sidebar-backdrop" aria-hidden="true"></div>
  <script>
    window.$docsify = {
      name: '四川高考物理',
      nameLink: '#/',
      loadSidebar: true,
      // 使用 _sidebar.md 作为唯一学习路径。不能让 Docsify 自动把每个
      // “9. 公式绑定 / 10. 适用条件”抽成目录，否则学生会跳到没上下文的位置。
      subMaxLevel: 0,
      maxLevel: 4,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索知识点、公式、模型、实验',
        noData: '没有找到相关内容',
        depth: 4
      },
      pagination: {
        previousText: '上一节',
        nextText: '下一节'
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            setupMobileSidebar();
            window.setTimeout(setupMobileSidebar, 250);
            if (location.hash.indexOf('/graph') !== -1) {
              renderKnowledgeGraph();
            }
            if (location.hash.indexOf('/papers') !== -1) {
              renderProblemBank();
            }
            if (location.hash.indexOf('/errors') !== -1) {
              renderErrorHub();
            }
          });
        }
      ]
    };

    function closeMobileSidebar() {
      document.body.classList.remove('sidebar-open');
      const button = document.getElementById('mobile-sidebar-toggle');
      if (button) {
        button.setAttribute('aria-expanded', 'false');
        button.setAttribute('aria-label', '打开目录');
      }
    }

    function setupMobileSidebar() {
      const button = document.getElementById('mobile-sidebar-toggle');
      const backdrop = document.getElementById('mobile-sidebar-backdrop');
      if (!button) return;
      if (button.dataset.bound !== '1') {
        button.dataset.bound = '1';
        button.addEventListener('click', function() {
          const open = document.body.classList.toggle('sidebar-open');
          button.setAttribute('aria-expanded', String(open));
          button.setAttribute('aria-label', open ? '关闭目录' : '打开目录');
        });
      }
      if (backdrop && backdrop.dataset.bound !== '1') {
        backdrop.dataset.bound = '1';
        backdrop.addEventListener('click', closeMobileSidebar);
      }
      if (button.dataset.navBound !== '1') {
        button.dataset.navBound = '1';
        document.addEventListener('click', function(event) {
          const target = event.target && typeof event.target.closest === 'function' ? event.target : null;
          const link = target && target.closest('.sidebar-nav a');
          const href = link && link.getAttribute('href');
          if (!href || !href.startsWith('#/')) return;
          closeMobileSidebar();
          window.setTimeout(function() {
            if (location.hash !== href) location.hash = href;
          }, 0);
        }, true);
      }
      if (button.dataset.hashBound !== '1') {
        button.dataset.hashBound = '1';
        window.addEventListener('hashchange', closeMobileSidebar);
      }
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean))).sort((a, b) => String(a).localeCompare(String(b), 'zh-CN'));
    }

    function problemList(data) {
      return Array.isArray(data) ? data : (data.problems || []);
    }

    function idLabel(id, idMap) {
      const meta = idMap[id];
      return meta ? id + ' ' + meta.title : id;
    }

    function safeSvgNode(svgText) {
      if (!svgText) return null;
      const documentNode = new DOMParser().parseFromString(String(svgText), 'image/svg+xml');
      if (documentNode.querySelector('parsererror') || documentNode.documentElement.nodeName.toLowerCase() !== 'svg') return null;
      documentNode.querySelectorAll('script, foreignObject').forEach(node => node.remove());
      documentNode.querySelectorAll('*').forEach(node => {
        Array.from(node.attributes).forEach(attribute => {
          const name = attribute.name.toLowerCase();
          const value = attribute.value.trim().toLowerCase();
          if (name.startsWith('on') || ((name === 'href' || name === 'xlink:href' || name === 'src') && value.startsWith('javascript:'))) {
            node.removeAttribute(attribute.name);
          }
        });
      });
      return document.importNode(documentNode.documentElement, true);
    }

    function appendText(parent, tag, value, className) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      element.textContent = value == null ? '' : String(value);
      parent.appendChild(element);
      return element;
    }

    function renderProblemCard(p, idMap) {
      const article = document.createElement('article');
      article.className = 'problem-item';
      const meta = document.createElement('div');
      meta.className = 'problem-meta';
      const source = p.source_verified === false ? `${p.source || ''}（未核验原卷图号）` : p.source;
      [p.id, source, p.year, p.type, p.difficulty]
        .concat((p.knowledge_ids || []).map(id => idLabel(id, idMap)))
        .concat((p.model_ids || []).map(id => idLabel(id, idMap)))
        .forEach(value => appendText(meta, 'span', value, 'problem-pill'));
      article.appendChild(meta);
      appendText(article, 'div', p.stem, 'problem-stem');

      if (p.diagram && p.diagram.svg) {
        const diagram = document.createElement('div');
        diagram.className = 'problem-diagram';
        diagram.setAttribute('aria-label', p.diagram.title || '题图');
        const svg = safeSvgNode(p.diagram.svg);
        if (svg) diagram.appendChild(svg);
        else appendText(diagram, 'p', '题图数据无法安全加载。');
        article.appendChild(diagram);
      }

      if ((p.options || []).length) {
        const options = document.createElement('ul');
        options.className = 'problem-options';
        p.options.forEach(option => appendText(options, 'li', option));
        article.appendChild(options);
      }

      const details = document.createElement('details');
      const summary = appendText(details, 'summary', '点击查看答案与解析');
      summary.setAttribute('role', 'button');
      appendText(details, 'p', `答案：${p.answer || ''}`);
      appendText(details, 'p', `解析：${p.solution || ''}`);
      appendText(details, 'p', `方法提炼：${p.method || ''}`);
      if ((p.traps || []).length) appendText(details, 'p', `易错点：${p.traps.join('；')}`);
      article.appendChild(details);
      return article;
    }

    function renderTrapRow(row, idMap) {
      const article = document.createElement('article');
      article.className = 'trap-item';
      const meta = document.createElement('div');
      meta.className = 'trap-meta';
      appendText(meta, 'span', `${row.items.length} 题`, 'trap-pill');
      row.items.slice(0, 5).flatMap(p => p.knowledge_ids || []).slice(0, 4)
        .forEach(id => appendText(meta, 'span', idLabel(id, idMap), 'trap-pill'));
      article.appendChild(meta);
      appendText(article, 'h3', row.trap);
      const details = document.createElement('details');
      appendText(details, 'summary', '查看关联题与纠正方法');
      row.items.slice(0, 5).forEach(problem => {
        const paragraph = document.createElement('p');
        appendText(paragraph, 'b', problem.id);
        paragraph.appendChild(document.createTextNode(` ${problem.stem || ''}`));
        paragraph.appendChild(document.createElement('br'));
        appendText(paragraph, 'b', '纠正：');
        paragraph.appendChild(document.createTextNode(problem.method || problem.solution || ''));
        details.appendChild(paragraph);
      });
      if (row.items.length > 5) appendText(details, 'p', `还有 ${row.items.length - 5} 道相关题，可在题库按关键词筛选。`);
      article.appendChild(details);
      return article;
    }

    async function renderProblemBank() {
      const mount = document.getElementById('problem-bank');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载题库...</div>';
      try {
        const [rawProblems, rawPageExamples, rawSpecExamples, idMap] = await Promise.all([
          fetch('data/problems.json').then(r => r.json()),
          fetch('data/page-examples.json').then(r => r.json()),
          fetch('data/spec-supplement-examples.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        const problems = problemList(rawProblems)
          .concat(rawPageExamples.examples || [])
          .concat(rawSpecExamples.examples || []);
        const knowledgeIds = unique(problems.flatMap(p => p.knowledge_ids || []));
        const modelIds = unique(problems.flatMap(p => p.model_ids || []));
        const difficulties = unique(problems.map(p => p.difficulty));
        const types = unique(problems.map(p => p.type));
        const sources = unique(problems.map(p => p.source));

        mount.innerHTML = [
          '<div class="bank-toolbar">',
          '  <input id="bank-q" type="search" placeholder="搜索题干 / 编号 / 方法">',
          '  <select id="bank-knowledge"><option value="">全部知识点</option>' + knowledgeIds.map(id => '<option value="' + escapeHtml(id) + '">' + escapeHtml(idLabel(id, idMap)) + '</option>').join('') + '</select>',
          '  <select id="bank-model"><option value="">全部模型</option>' + modelIds.map(id => '<option value="' + escapeHtml(id) + '">' + escapeHtml(idLabel(id, idMap)) + '</option>').join('') + '</select>',
          '  <select id="bank-difficulty"><option value="">全部难度</option>' + difficulties.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="bank-type"><option value="">全部题型</option>' + types.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="bank-source"><option value="">全部来源</option>' + sources.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '</div>',
          '<div id="bank-summary" class="bank-summary"></div>',
          '<div id="bank-list" class="problem-list"></div>'
        ].join('');

        const controls = ['bank-q', 'bank-knowledge', 'bank-model', 'bank-difficulty', 'bank-type', 'bank-source']
          .map(id => document.getElementById(id));
        const listEl = document.getElementById('bank-list');
        const summaryEl = document.getElementById('bank-summary');
        function apply() {
          const q = controls[0].value.trim().toLowerCase();
          const k = controls[1].value;
          const m = controls[2].value;
          const d = controls[3].value;
          const t = controls[4].value;
          const s = controls[5].value;
          const filtered = problems.filter(p => {
            const hay = [p.id, p.stem, p.answer, p.solution, p.method].join(' ').toLowerCase();
            return (!q || hay.includes(q))
              && (!k || (p.knowledge_ids || []).includes(k))
              && (!m || (p.model_ids || []).includes(m))
              && (!d || p.difficulty === d)
              && (!t || p.type === t)
              && (!s || p.source === s);
          });
          summaryEl.textContent = '当前显示 ' + filtered.length + ' / ' + problems.length + ' 题';
          listEl.replaceChildren(...(filtered.length
            ? filtered.map(p => renderProblemCard(p, idMap))
            : [appendText(document.createDocumentFragment(), 'p', '没有符合条件的题。')]));
        }
        controls.forEach(el => el.addEventListener('input', apply));
        apply();
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">题库加载失败：' + escapeHtml(err.message) + '</div>';
      }
    }

    async function renderErrorHub() {
      const mount = document.getElementById('error-hub');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载易错点...</div>';
      try {
        const [rawProblems, rawPageExamples, rawSpecExamples, idMap] = await Promise.all([
          fetch('data/problems.json').then(r => r.json()),
          fetch('data/page-examples.json').then(r => r.json()),
          fetch('data/spec-supplement-examples.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        const problems = problemList(rawProblems)
          .concat(rawPageExamples.examples || [])
          .concat(rawSpecExamples.examples || []);
        const traps = new Map();
        for (const p of problems) {
          for (const trap of p.traps || []) {
            if (!traps.has(trap)) traps.set(trap, []);
            traps.get(trap).push(p);
          }
        }
        const rows = Array.from(traps, ([trap, items]) => ({ trap, items }))
          .sort((a, b) => b.items.length - a.items.length || a.trap.localeCompare(b.trap, 'zh-CN'));
        const modules = unique(rows.flatMap(r => r.items.flatMap(p => p.knowledge_ids || []).map(id => (idMap[id] || {}).file)));
        const types = unique(problems.map(p => p.type));
        mount.innerHTML = [
          '<div class="error-toolbar">',
          '  <input id="error-q" type="search" placeholder="搜索错因 / 题干">',
          '  <select id="error-module"><option value="">全部模块</option>' + modules.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '  <select id="error-type"><option value="">全部题型</option>' + types.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>').join('') + '</select>',
          '</div>',
          '<div id="error-summary" class="error-summary"></div>',
          '<div id="trap-list" class="trap-list"></div>'
        ].join('');

        const qEl = document.getElementById('error-q');
        const moduleEl = document.getElementById('error-module');
        const typeEl = document.getElementById('error-type');
        const listEl = document.getElementById('trap-list');
        const summaryEl = document.getElementById('error-summary');
        function apply() {
          const q = qEl.value.trim().toLowerCase();
          const module = moduleEl.value;
          const type = typeEl.value;
          const filtered = rows.map(row => ({
            trap: row.trap,
            items: row.items.filter(p => {
              const hay = [row.trap, p.id, p.stem, p.solution, p.method].join(' ').toLowerCase();
              const files = (p.knowledge_ids || []).map(id => (idMap[id] || {}).file);
              return (!q || hay.includes(q))
                && (!module || files.includes(module))
                && (!type || p.type === type);
            })
          })).filter(row => row.items.length);
          summaryEl.textContent = '当前显示 ' + filtered.length + ' 类易错点，共关联 ' + filtered.reduce((n, r) => n + r.items.length, 0) + ' 道题';
          listEl.replaceChildren(...(filtered.length
            ? filtered.map(row => renderTrapRow(row, idMap))
            : [appendText(document.createDocumentFragment(), 'p', '没有符合条件的易错点。')]));
        }
        [qEl, moduleEl, typeEl].forEach(el => el.addEventListener('input', apply));
        apply();
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">易错点加载失败：' + escapeHtml(err.message) + '</div>';
      }
    }

    async function renderKnowledgeGraph() {
      const mount = document.getElementById('knowledge-graph');
      if (!mount || mount.dataset.rendered === '1') return;
      mount.dataset.rendered = '1';
      mount.innerHTML = '<div class="graph-loading">正在加载知识图谱...</div>';

      try {
        const [graph, progress, idMap] = await Promise.all([
          fetch('data/graph.json').then(r => r.json()),
          fetch('data/progress.json').then(r => r.json()),
          fetch('data/id-map.json').then(r => r.json())
        ]);
        if (!window.d3) throw new Error('D3 未加载');

        const progressById = progress || {};
        const idMapById = idMap || {};
        const nodes = (graph.nodes || []).map(n => ({
          ...n,
          ...(progressById[n.id] || {}),
          ...(idMapById[n.id] || {})
        }));
        const nodeIds = new Set(nodes.map(n => n.id));
        const links = (graph.edges || []).filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
          .map(e => ({ ...e, source: e.from, target: e.to }));

        mount.innerHTML = [
          '<div class="graph-shell">',
          '  <div class="graph-stage"><svg role="img" aria-label="四川高考物理知识图谱"></svg></div>',
          '  <aside class="graph-panel">',
          '    <h3>知识图谱</h3>',
          '    <p>点击节点跳到对应知识点；悬停查看模块、完成状态和前后关系。</p>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#2c7be5"></span>done</div>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#f0a500"></span>partial</div>',
          '    <div class="graph-chip"><span class="graph-dot" style="background:#9fb3c8"></span>pending</div>',
          '    <div class="legend">',
          '      <div><b>prerequisite</b>：前置知识</div>',
          '      <div><b>application</b>：应用关系</div>',
          '      <div><b>analogy</b>：类比关系</div>',
          '      <div><b>model</b>：模型关系</div>',
          '    </div>',
          '    <p id="graph-selection" style="margin-top:14px;">当前：未选中节点</p>',
          '  </aside>',
          '</div>',
          '<div class="graph-tooltip" id="graph-tooltip"></div>'
        ].join('');

        const svg = d3.select(mount).select('svg');
        const stage = mount.querySelector('.graph-stage');
        const width = Math.max(720, stage.clientWidth || 900);
        const height = 680;
        svg.attr('viewBox', [0, 0, width, height]);

        const moduleOrder = ['必修1','必修2','必修3','选择性必修1','选择性必修2','选择性必修3'];
        const color = status => status === 'done' ? '#2c7be5' : status === 'partial' ? '#f0a500' : '#9fb3c8';
        const edgeColor = type => type === 'prerequisite' ? '#486581' : type === 'application' ? '#7b2cbf' : type === 'analogy' ? '#2f9e44' : '#e03131';
        const moduleX = module => {
          const i = Math.max(0, moduleOrder.indexOf(module));
          return 90 + i * ((width - 180) / Math.max(1, moduleOrder.length - 1));
        };

        nodes.forEach((n, i) => {
          n.x = moduleX(n.module);
          n.y = 70 + (i % 11) * 52;
        });

        svg.append('defs').append('marker')
          .attr('id', 'graph-arrow')
          .attr('viewBox', '0 -5 10 10')
          .attr('refX', 17)
          .attr('refY', 0)
          .attr('markerWidth', 6)
          .attr('markerHeight', 6)
          .attr('orient', 'auto')
          .append('path')
          .attr('d', 'M0,-5L10,0L0,5')
          .attr('fill', '#829ab1');

        const simulation = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(links).id(d => d.id).distance(86).strength(0.42))
          .force('charge', d3.forceManyBody().strength(-280))
          .force('x', d3.forceX(d => moduleX(d.module)).strength(0.42))
          .force('y', d3.forceY(height / 2).strength(0.06))
          .force('collide', d3.forceCollide(34));

        const link = svg.append('g')
          .attr('stroke-linecap', 'round')
          .selectAll('path')
          .data(links)
          .join('path')
          .attr('class', 'graph-link')
          .attr('stroke', d => edgeColor(d.type))
          .attr('marker-end', 'url(#graph-arrow)');

        const node = svg.append('g')
          .selectAll('g')
          .data(nodes)
          .join('g')
          .attr('class', 'graph-node')
          .on('mouseenter', function(event, d) {
            const tip = document.getElementById('graph-tooltip');
            tip.replaceChildren();
            appendText(tip, 'b', d.id + ' ' + d.title);
            tip.appendChild(document.createElement('br'));
            tip.appendChild(document.createTextNode(d.module + ' · ' + d.level + '档 · ' + d.status));
            tip.style.left = (event.clientX + 12) + 'px';
            tip.style.top = (event.clientY + 12) + 'px';
            tip.style.display = 'block';
          })
          .on('mousemove', function(event) {
            const tip = document.getElementById('graph-tooltip');
            tip.style.left = (event.clientX + 12) + 'px';
            tip.style.top = (event.clientY + 12) + 'px';
          })
          .on('mouseleave', function() {
            document.getElementById('graph-tooltip').style.display = 'none';
          })
          .on('click', function(event, d) {
            const related = new Set([d.id]);
            links.forEach(e => {
              const s = typeof e.source === 'object' ? e.source.id : e.source;
              const t = typeof e.target === 'object' ? e.target.id : e.target;
              if (s === d.id) related.add(t);
              if (t === d.id) related.add(s);
            });
            node.classed('dim', n => !related.has(n.id)).classed('selected', n => n.id === d.id);
            link.classed('dim', e => !related.has(e.source.id) || !related.has(e.target.id));
            const selection = document.getElementById('graph-selection');
            selection.replaceChildren();
            selection.appendChild(document.createTextNode('当前：'));
            appendText(selection, 'b', d.id + ' ' + d.title);
            selection.appendChild(document.createElement('br'));
            const anchor = document.createElement('a');
            anchor.href = '#/' + encodeURIComponent(d.file) + '?id=' + encodeURIComponent(d.slug);
            anchor.textContent = '跳到知识点';
            selection.appendChild(anchor);
          })
          .call(d3.drag()
            .on('start', (event, d) => {
              if (!event.active) simulation.alphaTarget(0.25).restart();
              d.fx = d.x;
              d.fy = d.y;
            })
            .on('drag', (event, d) => {
              d.fx = event.x;
              d.fy = event.y;
            })
            .on('end', (event, d) => {
              if (!event.active) simulation.alphaTarget(0);
              d.fx = null;
              d.fy = null;
            }));

        node.append('circle')
          .attr('r', d => d.level === 'A' ? 16 : 13)
          .attr('fill', d => color(d.status))
          .attr('stroke', '#102a43')
          .attr('stroke-width', 1.2);

        node.append('text')
          .attr('x', 20)
          .attr('y', 4)
          .text(d => d.id + ' ' + d.title);

        const moduleLabels = svg.append('g').selectAll('text')
          .data(moduleOrder)
          .join('text')
          .attr('x', d => moduleX(d))
          .attr('y', 24)
          .attr('text-anchor', 'middle')
          .attr('font-size', 13)
          .attr('font-weight', 700)
          .attr('fill', '#334e68')
          .text(d => d);

        simulation.on('tick', () => {
          nodes.forEach(d => {
            d.x = Math.max(36, Math.min(width - 180, d.x));
            d.y = Math.max(48, Math.min(height - 34, d.y));
          });
          link.attr('d', d => {
            const dx = d.target.x - d.source.x;
            const dy = d.target.y - d.source.y;
            const dr = Math.sqrt(dx * dx + dy * dy) * 1.45;
            return 'M' + d.source.x + ',' + d.source.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + d.target.x + ',' + d.target.y;
          });
          node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
          moduleLabels.attr('x', d => moduleX(d));
        });
      } catch (err) {
        mount.innerHTML = '<div class="graph-error">知识图谱加载失败：' + escapeHtml(err.message) + '</div>';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@2.0.2/dist/docsify-katex.js"></script>
</body>
