name: Repository checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify generated data is current
        run: node scripts/gen-data.js --check
      - name: Verify progress reports are current
        run: node scripts/update-progress-report.js --check
      - name: Run full repository gate
        run: npm run check
      - name: Audit animations
        run: node scripts/anim-audit.js
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run B1 priority pedagogy tests
        run: npm run audit:pedagogy:b1
      - name: Run B1 remaining physics and boundary tests
        run: npm run audit:physics:b1
      - name: Run B2 physics and pedagogy boundary tests
        run: npm run audit:physics:b2
      - name: Run B3 physics and pedagogy boundary tests
        run: npm run audit:physics:b3
      - name: Run B3 guided teaching-path tests
        run: npm run audit:pedagogy:b3
      - name: Run B2 guided teaching-path tests
        run: npm run audit:pedagogy:b2
