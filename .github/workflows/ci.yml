name: Repository checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify generated data is current
        run: node scripts/gen-data.js --check
      - name: Verify progress reports are current
        run: node scripts/update-progress-report.js --check
      - name: Run strict repository checks
        run: node scripts/check.js --strict
      - name: Audit animations
        run: node scripts/anim-audit.js
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run B1 priority pedagogy tests
        run: npm run audit:pedagogy:b1
